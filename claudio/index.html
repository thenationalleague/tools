  v3.1 (18/04/2026) — Typography system + word-by-word typewriter

      flex: 1;
      background: var(--navy); color: var(--white); border: none;
      padding: 10px 14px; border-radius: var(--radius);
      font-family: var(--font); font-size: 12px;
      font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-new:hover { background: var(--navy-mid); }
    .sidebar__list {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    .conv-item {
      padding: 12px 14px; border-radius: var(--radius); cursor: pointer;
      margin-bottom: 4px; position: relative;
      transition: background 0.15s; border: 1px solid transparent;
    }
    .conv-item:hover { background: var(--off-white); }
    .conv-item.active { background: var(--off-white); border-color: var(--border); }
    .conv-item__title {
      font-size: 14px; font-weight: 600; font-variation-settings: 'wght' 600;
      color: var(--text); overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; padding-right: 24px;
    }
    .conv-item__time {
      font-size: 11px; color: var(--text-muted);
      font-weight: 600; font-variation-settings: 'wght' 600;
      margin-top: 2px;
    }
    .conv-item__del {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 22px; height: 22px; border: none; background: none;
      font-size: 16px; color: var(--text-muted); cursor: pointer;
      border-radius: 4px; opacity: 0; transition: opacity 0.15s;
      line-height: 1;
    }
    .conv-item:hover .conv-item__del { opacity: 1; }
    .conv-item__del:hover { background: var(--red-light); color: var(--red); }

    .sidebar__empty {
      padding: 32px 16px; text-align: center;
      color: var(--text-muted); font-size: 13px;
    }

    /* ===== v3.0 — persona roster in sidebar ===== */
    .persona-roster {
      border-top: 1px solid var(--border);
      padding: 12px 8px 8px;
    }
    .persona-roster__title {
      font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-muted); padding: 0 8px 8px;
    }
    .persona-roster__item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: var(--radius); cursor: pointer;
      margin-bottom: 2px; transition: background 0.15s;
    }
    .persona-roster__item:hover { background: var(--off-white); }
    .persona-roster__item.is-unavailable {
      cursor: not-allowed; opacity: 0.55;
    }
    .persona-roster__item.is-unavailable:hover { background: transparent; }
    .persona-roster__name {
      font-size: 13px; font-weight: 700; font-variation-settings: 'wght' 700;
      color: var(--text); line-height: 1.2;
    }
    .persona-roster__item.is-unavailable .persona-roster__name {
      text-decoration: line-through; color: var(--text-muted);
    }
    .persona-roster__role {
      font-size: 11px; color: var(--text-muted); line-height: 1.3;
      font-weight: 500; font-variation-settings: 'wght' 500;
    }
    .persona-roster__status {
      font-size: 9px; font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-top: 1px;
    }
    .persona-roster__body { flex: 1; min-width: 0; }

    /* Persona avatars (initials in coloured circle) */
    .persona-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; font-variation-settings: 'wght' 800;
      color: var(--white); flex-shrink: 0;
      font-family: var(--font);
    }
    .persona-avatar--sm {
      width: 22px; height: 22px; font-size: 10px;
    }
    .persona-avatar--claudio    { background: #223b7c; }  /* NL navy */
    .persona-avatar--roger      { background: #4a7c59; }  /* sage green */
    .persona-avatar--seth       { background: #9e0000; }  /* NL red */
    .persona-avatar--mark       { background: #33383d; }  /* charcoal */
    .persona-avatar--jacqueline { background: #2c7a7b; }  /* teal */

    /* Conv-item: small persona avatar next to title */
    .conv-item__head {
      display: flex; align-items: center; gap: 8px;
    }
    .conv-item__body { flex: 1; min-width: 0; }

    /* ===== v3.0 Phase 1 — persona header above chat ===== */
    .persona-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px 0;
      position: relative;
      transition: border-color 0.3s ease;
    }
    .persona-header__row {
      display: flex; align-items: center; gap: 14px;
      padding-bottom: 10px;
    }
    .persona-header__body { flex: 1; min-width: 0; }
    .persona-header__name {
      font-size: 17px; font-weight: 800; font-variation-settings: 'wght' 800;
      color: var(--text); line-height: 1.2;
      transition: color 0.3s ease;
    }
    .persona-header__role {
      font-size: 12px; font-weight: 500; font-variation-settings: 'wght' 500;
      color: var(--text-muted); margin-top: 2px;
    }
    .persona-header__accent {
      height: 3px; width: 100%; transition: background 0.3s ease;
    }
    .persona-header__accent--claudio    { background: #223b7c; }
    .persona-header__accent--roger      { background: #4a7c59; }
    .persona-header__accent--seth       { background: #9e0000; }
    .persona-header__accent--mark       { background: #33383d; }
    .persona-header__accent--jacqueline { background: #2c7a7b; }

    /* Persona avatar — bigger variant for the header (40px) */
    .persona-avatar--lg {
      width: 40px; height: 40px; font-size: 15px;
    }

    /* ===== Triage cards (welcome screen) ===== */
    .triage-cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 12px;
      margin-top: 20px;
      width: 100%; max-width: 640px;
    }
    @media (max-width: 720px) {
      .triage-cards { grid-template-columns: 1fr; }
    }
    .triage-card {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: left;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font);
      box-shadow: 0 1px 3px rgba(10,22,40,0.04);
    }
    .triage-card:hover:not(.is-unavailable) {
      border-color: var(--navy);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(10,22,40,0.10);
    }
    .triage-card.is-unavailable {
      cursor: not-allowed; opacity: 0.55;
    }
    .triage-card__body { flex: 1; min-width: 0; }
    .triage-card__name {
      font-size: 15px; font-weight: 800; font-variation-settings: 'wght' 800;
      color: var(--text); line-height: 1.2;
    }
    .triage-card.is-unavailable .triage-card__name {
      text-decoration: line-through; color: var(--text-muted);
    }
    .triage-card__role {
      font-size: 12px; font-weight: 500; font-variation-settings: 'wght' 500;
      color: var(--text-muted); line-height: 1.35; margin-top: 2px;
    }
    .triage-card__status {
      font-size: 9px; font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); margin-top: 4px;
    }

    .triage-chatme {
      margin-top: 16px;
      background: none; border: none; padding: 10px 16px;
      font-family: var(--font); font-size: 13px;
      color: var(--text-muted);
      text-decoration: underline; text-decoration-color: rgba(26,42,68,0.25);
      text-underline-offset: 3px;
      cursor: pointer; transition: color 0.15s;
    }
    .triage-chatme:hover { color: var(--text); }

    /* Persona intro stub — shown after triage card click, before first message */
    .persona-intro {
      display: flex; align-items: center; gap: 14px;
      max-width: 560px; margin: 48px auto;
      padding: 20px 22px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 1px 3px rgba(10,22,40,0.04);
    }
    .persona-intro__body { flex: 1; min-width: 0; }
    .persona-intro__name {
      font-size: 16px; font-weight: 800; font-variation-settings: 'wght' 800;
      color: var(--text);
    }
    .persona-intro__role {
      font-size: 12px; font-weight: 500; font-variation-settings: 'wght' 500;
      color: var(--text-muted); margin-top: 2px;
    }
    .persona-intro__hint {
      font-size: 13px; color: var(--text-muted);
      margin-top: 8px; font-style: italic;
    }

    /* ===== v3.0 S3: out-of-scope suggestion chips ===== */
    .msg__chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 10px; padding-left: 46px;  /* align to message bubble */
    }
    .msg__chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px 8px 10px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-family: var(--font); font-size: 12px;
      font-weight: 700; font-variation-settings: 'wght' 700;
      color: var(--text); cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 1px 2px rgba(10,22,40,0.04);
    }
    .msg__chip:hover {
      border-color: var(--navy);
      box-shadow: 0 2px 8px rgba(10,22,40,0.08);
      transform: translateY(-1px);
    }
    .msg__chip__av {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; color: var(--white);
      flex-shrink: 0;
    }
    .msg__chip__av--claudio    { background: #223b7c; }
    .msg__chip__av--roger      { background: #4a7c59; }
    .msg__chip__av--seth       { background: #9e0000; }
    .msg__chip__av--mark       { background: #33383d; }
    .msg__chip__av--jacqueline { background: #2c7a7b; }
    .msg__chip__arrow { font-size: 14px; color: var(--text-muted); line-height: 1; }
    .msg__chip__dismiss {
      background: none; border: none; padding: 0;
      width: 20px; height: 20px; border-radius: 50%;
      font-size: 14px; line-height: 1; color: var(--text-muted);
      cursor: pointer; margin-left: 2px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font);
    }
    .msg__chip__dismiss:hover { background: var(--off-white); color: var(--text); }

    /* ===== v2.20: long-chat collapse ===== */
    .show-earlier {
      display: block; margin: 10px auto 20px;
      padding: 8px 18px;
      background: var(--white);
      border: 1px dashed var(--border);
      border-radius: 20px;
      font-family: var(--font); font-size: 12px;
      font-weight: 700; font-variation-settings: 'wght' 700;
      color: var(--text-muted);
      cursor: pointer; transition: all 0.15s;
    }
    .show-earlier:hover {
      border-style: solid; border-color: var(--navy);
      color: var(--text);
      background: var(--off-white);
    }

    /* ===== v2.20: inline title editing in sidebar ===== */
    .conv-item__title--editing {
      background: var(--white); border: 1px solid var(--navy);
      border-radius: 4px; padding: 2px 6px;
      outline: none; font: inherit; color: var(--text);
      width: 100%;
    }
    .conv-item__actions {
      display: flex; gap: 2px; align-items: center;
    }
    .conv-item__rename {
      background: none; border: none; padding: 2px 4px;
      color: var(--text-muted); font-size: 11px;
      cursor: pointer; opacity: 0; transition: opacity 0.15s;
      font-family: var(--font);
    }
    .conv-item:hover .conv-item__rename { opacity: 1; }
    .conv-item__rename:hover { color: var(--text); }

    /* v2.20: avatar morph animation */
    @keyframes avatar-morph-in {
      0% { transform: scale(0.6) rotate(-10deg); opacity: 0; }
      60% { transform: scale(1.08) rotate(2deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }
    .persona-avatar.is-morphing {
      animation: avatar-morph-in 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes header-slide {
      0% { transform: translateX(-4px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }
    .persona-header.is-morphing {
      animation: header-slide 400ms ease-out;
    }

    /* ===== v3.1: typewriter + emphasis animations ===== */

    /* Typewriter \u2014 words fade-in as they get revealed. Uses per-word
       <span class="tw-word"> wrappers emitted by the typewriter engine. */
    .tw-word {
      opacity: 0;
      display: inline;
      transition: opacity 150ms ease-out;
    }
    .tw-word.tw-visible {
      opacity: 1;
    }
    /* Blinking caret while typing */
    .tw-caret {
      display: inline-block;
      width: 2px; height: 1.1em;
      vertical-align: text-bottom;
      background: currentColor;
      opacity: 0.6;
      animation: tw-caret-blink 600ms steps(1) infinite;
      margin-left: 1px;
    }
    @keyframes tw-caret-blink {
      50% { opacity: 0; }
    }

    /* Emphasis animation \u2014 applies to <strong> and <em> as each is revealed.
       Animation differs per persona. Base: word briefly expands then settles. */
    .msg__text .tw-emph {
      display: inline-block;
      transition:
        font-variation-settings 350ms cubic-bezier(0.34, 1.56, 0.64, 1),
        transform 350ms cubic-bezier(0.34, 1.56, 0.64, 1),
        color 350ms ease-out;
    }
    /* Landing state \u2014 animation peak. Removed after ~400ms to settle. */
    .msg__text .tw-emph.tw-emph--peak {
      /* default peak (used if no persona-specific override) */
      transform: scale(1.05);
    }

    /* Claudio \u2014 pinot-grigio-modern (variable sans).
       Weight 500 \u2192 700 with tiny scale on emphasis. */
    .msg--ai[data-persona="claudio"] .msg__text .tw-emph {
      font-variation-settings: 'wght' 700;
    }
    .msg--ai[data-persona="claudio"] .msg__text .tw-emph.tw-emph--peak {
      font-variation-settings: 'wght' 900;
      transform: scale(1.04);
    }

    /* Roger \u2014 LTC Italian Old Style Pro (static serif, not variable).
       Can't animate weight axis. Use subtle scale pop. Understated. */
    .msg--ai[data-persona="roger"] .msg__text .tw-emph {
      font-weight: 700;
    }
    .msg--ai[data-persona="roger"] .msg__text .tw-emph.tw-emph--peak {
      transform: scale(1.03);
    }

    /* Seth \u2014 stinger-variable. Full broadcast-graphic energy:
       width AND weight both animate. Biggest peak. */
    .msg--ai[data-persona="seth"] .msg__text .tw-emph {
      font-variation-settings: 'wght' 700, 'wdth' 110;
    }
    .msg--ai[data-persona="seth"] .msg__text .tw-emph.tw-emph--peak {
      font-variation-settings: 'wght' 800, 'wdth' 125;
      transform: scale(1.02);
    }

    /* Mark \u2014 edita (static serif with multiple weights).
       Dignified editor's emphasis: swap to bold, tiny scale. */
    .msg--ai[data-persona="mark"] .msg__text .tw-emph {
      font-weight: 700;
    }
    .msg--ai[data-persona="mark"] .msg__text .tw-emph.tw-emph--peak {
      transform: scale(1.03);
    }

    /* Jacqueline \u2014 fuzzy-bubbles (hand-drawn, not variable).
       Can't animate weight smoothly; use a playful scale pop with rotate. */
    .msg--ai[data-persona="jacqueline"] .msg__text .tw-emph {
      font-weight: 700;
    }
    .msg--ai[data-persona="jacqueline"] .msg__text .tw-emph.tw-emph--peak {
      transform: scale(1.08) rotate(-1deg);
    }

    /* ===== Chat main ===== */
    .chat {
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
      background: var(--off-white);
    }
    .chat__scroll {
      flex: 1; overflow-y: auto;
      padding: 32px 0;
    }
    .chat__inner {
      max-width: 820px; margin: 0 auto; padding: 0 24px;
    }

    /* ===== Welcome screen ===== */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 40px 20px;
    }
    .welcome__avatar {
      width: 120px; height: 120px; border-radius: 0;
      background: transparent; color: var(--navy);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: 900; font-variation-settings: 'wght' 900;
      margin-bottom: 20px;
    }
    .welcome__title {
      font-size: 28px; font-weight: 900; font-variation-settings: 'wght' 900;
      color: var(--text); margin-bottom: 8px;
    }
    .welcome__sub {
      font-size: 15px; color: var(--text-muted);
      max-width: 520px; margin-bottom: 28px;
    }
    .welcome__prompts {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; width: 100%; max-width: 560px;
    }
    @media (max-width: 600px) { .welcome__prompts { grid-template-columns: 1fr; } }
    .welcome__prompt {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      text-align: left; cursor: pointer;
      font-family: var(--font); font-size: 14px;
      color: var(--text); transition: all 0.15s;
    }
    .welcome__prompt:hover {
      border-color: var(--navy); box-shadow: var(--shadow);
    }
    .welcome__prompt strong {
      display: block; font-weight: 800; font-variation-settings: 'wght' 800;
      color: var(--navy); font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 4px;
    }

    /* ===== Messages ===== */
    .msg {
      display: flex; gap: 14px; margin-bottom: 20px;
      animation: msgIn 0.25s ease;
    }
    /* v2.6: Claudio on the right, user on the left.
       Row-reverse flips avatar to the right side; text-align + flex-align
       flip the body content to match. */
    .msg--ai {
      flex-direction: row-reverse;
    }
    .msg--ai .msg__body {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .msg--ai .msg__name {
      text-align: right;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg__avatar {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; font-variation-settings: 'wght' 900;
      color: var(--white);
    }
    .msg__avatar--user { background: var(--primary); }
    /* v2.10: Claudio's avatar now has no background — the SVG stands on
       its own. Larger than the user's C to give him presence. */
    .msg__avatar--ai   { background: transparent; color: var(--navy); }

    /* v2.9/2.10: Claudio avatar image. Larger and unframed.
       No overflow:hidden so the SVG shows as designed. object-fit:contain
       so the whole icon is visible rather than cropped to a circle. */
    .msg__avatar img,
    .welcome__avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .msg__avatar--ai img {
      /* Slight upscale — Claudio's icon should breathe beyond the 48px box */
      transform: scale(1.15);
      transform-origin: center;
    }
    .msg__body { flex: 1; min-width: 0; }
    .msg__name {
      font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 4px;
    }
    .msg__text {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      font-size: 15px; line-height: 1.55;
      color: var(--text);
      overflow-wrap: break-word; word-wrap: break-word;
      white-space: pre-wrap;
    }
    /* v3.1: per-persona prose \u2014 each persona gets their own face.
       Applied via data-persona on the .msg element. Fallback is serif
       (preserves the old Claudio-in-LTC default if no persona set). */
    .msg--ai .msg__text {
      font-family: var(--font-claudio);
      font-size: 17px;
      line-height: 1.5;
      font-weight: 400;
    }
    .msg--ai[data-persona="claudio"] .msg__text {
      font-family: var(--font-claudio);
      font-weight: 500;
      font-variation-settings: 'wght' 500;
    }
    .msg--ai[data-persona="roger"] .msg__text {
      font-family: var(--font-roger);
      font-size: 17px;
      line-height: 1.55;
      font-weight: 400;
    }
    .msg--ai[data-persona="seth"] .msg__text {
      font-family: var(--font-seth);
      font-size: 17px;
      font-weight: 400;
      line-height: 1.55;
      font-variation-settings: 'wght' 400, 'wdth' 100;
    }
    .msg--ai[data-persona="mark"] .msg__text {
      font-family: var(--font-mark);
      font-size: 16px;
      line-height: 1.6;
      font-weight: 400;
    }
    .msg--ai[data-persona="jacqueline"] .msg__text {
      font-family: var(--font-jacqueline);
      font-size: 18px;
      line-height: 1.5;
      font-weight: 400;
    }
    .msg--ai .msg__text em,
    .msg--ai .msg__text i {
      font-style: italic;
      font-weight: inherit;
    }
    .msg--ai .msg__text strong,
    .msg--ai .msg__text b {
      font-weight: 700;
    }
    /* Draft blocks — anything Claudio generates for onward use
       (emails, letters, comms) renders in a distinct block that:
       1) uses carbona (clean NL voice, not Italian-inflected)
       2) is visually separated so the user knows it's copy-paste content
       3) has a subtle header and copy affordance
       This is rendered via the lightweight markdown-ish parser in renderClaudioText(). */
    .msg__draft {
      margin: 12px 0 4px;
      background: var(--off-white);
      border: 1px solid var(--border);
      border-left: 3px solid var(--navy);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      white-space: pre-wrap;
      font-weight: 400;
      font-variation-settings: 'wght' 400;
    }
    .msg__draft-label {
      display: block;
      margin-bottom: 8px;
      font-family: var(--font);
      font-size: 10px;
      font-weight: 800;
      font-variation-settings: 'wght' 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .msg__draft-copy {
      float: right;
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 8px;
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      font-variation-settings: 'wght' 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .msg__draft-copy:hover {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }

    /* Markdown tables rendered by Claudio inside chat bubbles (v2.4).
       Used when tool responses return arrays of similar items — standings,
       H2H last-5, streak match lists, etc. Uses carbona font (same as drafts)
       because tables are reference data, not conversation. */
    .claudio-table {
      width: 100%;
      margin: 10px 0 4px;
      border-collapse: collapse;
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.35;
      font-variation-settings: 'wght' 400;
      background: var(--off-white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .claudio-table thead th {
      background: var(--navy);
      color: var(--white);
      text-align: left;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 800;
      font-variation-settings: 'wght' 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }
    .claudio-table tbody td {
      padding: 6px 10px;
      border-top: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .claudio-table tbody tr:nth-child(even) td {
      background: rgba(30, 58, 138, 0.025);
    }

    /* Hyperlinks rendered by Claudio — visibly distinct NL navy, underlined,
       with a subtle hover lift. Used for /history/* redirects and other
       authoritative sources. Deliberately NOT the text-muted colour (that
       would blend in with conversational prose). */
    .claudio-link {
      color: var(--navy);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
      font-weight: 600;
      font-variation-settings: 'wght' 600;
      transition: color 0.15s, text-decoration-thickness 0.15s;
    }
    .claudio-link:hover {
      color: #0f1e4a;
      text-decoration-thickness: 2px;
    }
    .claudio-link:visited {
      color: var(--navy);
    }

    /* ======================================================================
       v2.5 — NL-branded styled table (nlt).
       Matches the /history/league-tables-by-season v3.38i dashboard:
       - Zone colours: gold champion, silver promoted, green po-semi,
         light-green po-elim, pink relegated, grey expelled, black folded
       - Dotted dividers at zone boundaries (cut-*-after)
       - Clinched-* emphasis for as-of tables
       - Footnote block below for deductions/expulsions
       ====================================================================== */

    .nlt-wrap {
      margin: 12px 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      font-family: var(--font);
    }
    .nlt-caption {
      background: #9e0000;
      color: #fff;
      text-align: center;
      font-weight: 700;
      font-variation-settings: 'wght' 700;
      padding: 10px 14px;
      font-size: 14px;
      letter-spacing: 0.02em;
    }
    /* v2.7: subtitle under the red caption (perspective indicator) */
    .nlt-subcaption {
      text-align: center;
      padding: 5px 12px 8px;
      font-family: var(--font-claudio);
      font-style: italic;
      font-size: 12px;
      color: var(--text-muted);
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .nlt-scroll {
      max-width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    /* v2.7: vertical scroll container for long H2H lists */
    .nlt-scroll-v {
      max-height: 400px;
      overflow-y: auto;
    }
    .nlt-scroll-v thead th {
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .nlt {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      line-height: 1.35;
    }
    .nlt thead th {
      background: #000;
      color: #fff;
      text-transform: uppercase;
      font-size: 10px;
      font-weight: 800;
      font-variation-settings: 'wght' 800;
      letter-spacing: 0.06em;
      padding: 8px 10px;
      text-align: center;
      white-space: nowrap;
    }
    .nlt thead th.nlt-team-col { text-align: left; }
    .nlt tbody td {
      padding: 6px 10px;
      text-align: center;
      white-space: nowrap;
      vertical-align: middle;
      color: #0f172a;
    }
    .nlt tbody td.nlt-team-col {
      text-align: left;
      white-space: normal;
      word-break: break-word;
    }
    .nlt tbody td.nlt-strong,
    .nlt thead th.nlt-strong {
      font-weight: 800;
      font-variation-settings: 'wght' 800;
    }
    /* Zebra rows */
    .nlt tbody tr.nlt-zebra-odd  td { background: #f6f6f6; }
    .nlt tbody tr.nlt-zebra-even td { background: #fff; }

    /* Zone colours — match dashboard exactly */
    .nlt tbody tr.nlt-champion      td { background: gold;    color: #000; }
    .nlt tbody tr.nlt-promoted      td { background: #c0c0c0; color: #000; }
    .nlt tbody tr.nlt-playoff-semi  td { background: #bfe9c8; color: #000; }
    .nlt tbody tr.nlt-playoff-elim  td { background: #e7f7ea; color: #000; }
    .nlt tbody tr.nlt-relegated     td { background: #ffe0e6; color: #000; }
    .nlt tbody tr.nlt-relegation-zone td { background: #ffe0e6; color: #000; }
    .nlt tbody tr.nlt-folded        td { background: #000;    color: #fff !important; }
    .nlt tbody tr.nlt-expelled      td { background: #555;    color: #fff !important; }

    /* Clinched emphasis (as-of tables) — use same zone colour + small left bar */
    .nlt tbody tr.nlt-clinched-champion   td { background: gold;    color: #000; }
    .nlt tbody tr.nlt-clinched-po-semi    td {
      background: #bfe9c8; color: #000;
      background-image: linear-gradient(to right, rgba(0,96,32,.6) 0 4px, transparent 4px);
    }
    .nlt tbody tr.nlt-clinched-po-elim    td {
      background: #e7f7ea; color: #000;
      background-image: linear-gradient(to right, rgba(0,96,32,.28) 0 4px, transparent 4px);
    }
    .nlt tbody tr.nlt-clinched-relegated  td { background: #ffe0e6; color: #000; }

    /* Dotted dividers (cut-*-after) */
    .nlt tbody tr.nlt-cut-champion-after td,
    .nlt tbody tr.nlt-cut-automatic-after td,
    .nlt tbody tr.nlt-cut-playoff-byes-after td,
    .nlt tbody tr.nlt-cut-playoff-after td,
    .nlt tbody tr.nlt-cut-relegation-after td {
      border-bottom: 2px dotted #333 !important;
    }

    /* Movement column */
    .nlt-move-col { width: 1.8ch; font-weight: 700; }
    .nlt-move-up   { color: #0a7d2a; }
    .nlt-move-down { color: #b00020; }
    .nlt-move-none { opacity: 0.35; }

    /* GD colouring */
    .nlt-gd-pos  { color: #0a7d2a; }
    .nlt-gd-zero { color: #555; }
    .nlt-gd-neg  { color: #b00020; }

    /* Override in folded/expelled rows so everything reads white */
    .nlt tbody tr.nlt-folded td,
    .nlt tbody tr.nlt-expelled td,
    .nlt tbody tr.nlt-folded .nlt-gd-pos,
    .nlt tbody tr.nlt-folded .nlt-gd-zero,
    .nlt tbody tr.nlt-folded .nlt-gd-neg,
    .nlt tbody tr.nlt-expelled .nlt-gd-pos,
    .nlt tbody tr.nlt-expelled .nlt-gd-zero,
    .nlt tbody tr.nlt-expelled .nlt-gd-neg,
    .nlt tbody tr.nlt-folded .nlt-move-up,
    .nlt tbody tr.nlt-folded .nlt-move-down,
    .nlt tbody tr.nlt-folded .nlt-move-none,
    .nlt tbody tr.nlt-expelled .nlt-move-up,
    .nlt tbody tr.nlt-expelled .nlt-move-down,
    .nlt tbody tr.nlt-expelled .nlt-move-none {
      color: #fff !important;
      opacity: 1 !important;
    }

    /* Footnotes below the table */
    .nlt-footnotes {
      padding: 10px 14px;
      background: #f8f8f8;
      border-top: 1px solid var(--border);
      border-left: 4px solid #9e0000;
      font-size: 12px;
      color: #222;
      line-height: 1.45;
    }
    .nlt-footnote { margin: 2px 0; }

    /* H2H last-5 table — W/D/L pill styling */
    .nlt-result-cell { text-align: center; }
    .nlt-result-pill {
      display: inline-grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      font-variation-settings: 'wght' 900;
      color: #fff;
    }
    .nlt-result-w { background: #1e7e34; }
    .nlt-result-d { background: #e67e22; color: #000; }
    .nlt-result-l { background: #c0392b; }
    .nlt-result--,
    .nlt-result-n { background: #555; }

    /* v2.7: H2H neutral-perspective — winning team short name in coloured cell */
    .nlt-winner-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 800;
      font-variation-settings: 'wght' 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      min-width: 50px;
    }
    .nlt-winner-a { background: #1e7e34; color: #fff; }
    .nlt-winner-b { background: #c0392b; color: #fff; }
    .nlt-winner-draw { background: #e67e22; color: #000; }
    .nlt-winner-none { background: #eef1f4; color: #64748b; }

    .msg--user .msg__text {
      background: #eef3ff; border-color: #d1def5;
    }
    .msg__cost {
      margin-top: 6px; display: flex; gap: 10px;
      font-size: 11px; color: var(--text-muted);
      font-weight: 700; font-variation-settings: 'wght' 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      opacity: 0;
      animation: costIn 0.6s ease 0.3s forwards;
    }
    @keyframes costIn { to { opacity: 1; } }
    .msg__cost-num {
      color: var(--navy); font-weight: 900; font-variation-settings: 'wght' 900;
    }

    /* Tool-call chips — shown on assistant messages that used tools */
    .msg__tools {
      margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px;
      align-items: center;
      font-size: 11px;
    }
    .msg__tools-label {
      color: var(--text-muted);
      font-weight: 700; font-variation-settings: 'wght' 700;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .msg__tool-chip {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(30, 58, 138, 0.08);
      color: var(--navy);
      border-radius: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      font-weight: 600;
    }

    /* Typing indicator */
    .typing {
      display: flex; gap: 14px; margin-bottom: 20px;
      flex-direction: row-reverse;   /* v2.6: match Claudio's right-aligned bubbles */
      position: relative;
    }
    .typing__dots {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      display: flex; gap: 5px;
    }
    .typing__dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      animation: typingPulse 1.2s ease infinite;
    }
    .typing__dot:nth-child(2) { animation-delay: 0.15s; }
    .typing__dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingPulse {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* v2.6: heckle bubbles.
       Appear near the typing indicator while Claudio thinks. Two shell
       types — "shout" (red terrace heckle, rough callout) and "broadcast"
       (clean pundit speech bubble, italic serif). One at a time, soft
       enter/exit, small float while visible. */
    .heckle-stage {
      position: absolute;
      top: -10px;
      bottom: -10px;
      right: 60px;      /* to the left of Claudio's avatar since we're row-reverse */
      width: 0;
      pointer-events: none;
      overflow: visible;
    }
    .heckle {
      position: absolute;
      white-space: nowrap;
      font-family: var(--font);
      font-size: 13px;
      opacity: 0;
      animation: heckleInOut 2400ms ease-in-out forwards;
      pointer-events: none;
    }
    @keyframes heckleInOut {
      0%   { opacity: 0; transform: translate(var(--hx-from, 20px), var(--hy-from, 6px)) rotate(var(--hr, -3deg)) scale(0.8); }
      15%  { opacity: 1; transform: translate(0, 0) rotate(var(--hr, -3deg)) scale(1); }
      75%  { opacity: 1; transform: translate(0, -2px) rotate(var(--hr, -3deg)) scale(1); }
      100% { opacity: 0; transform: translate(var(--hx-to, -10px), var(--hy-to, -12px)) rotate(var(--hr, -3deg)) scale(0.9); }
    }
    @media (prefers-reduced-motion: reduce) {
      .heckle { animation-duration: 400ms; }
    }

    /* Shout style: red terrace heckle. Bold carbona, white text,
       rough cloud-y shape via border-radius, slight rotation. */
    .heckle--shout {
      background: var(--primary);
      color: var(--white);
      font-weight: 900;
      font-variation-settings: 'wght' 900;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 8px 14px;
      border-radius: 22px 4px 22px 8px;
      box-shadow: 2px 3px 0 rgba(0,0,0,0.12), 0 0 0 2px #fff;
      font-size: 14px;
    }
    /* Rough pointer tail pointing down-right toward Claudio */
    .heckle--shout::after {
      content: '';
      position: absolute;
      bottom: -8px;
      right: 18px;
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid var(--primary);
      filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.1));
    }

    /* Broadcast style: clean pundit speech bubble. Serif italic, navy text
       on white with navy border — matches Claudio's voice register. */
    .heckle--broadcast {
      background: var(--white);
      color: var(--navy);
      border: 1.5px solid var(--navy);
      font-family: var(--font-claudio);
      font-style: italic;
      font-weight: 400;
      padding: 7px 13px;
      border-radius: 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      font-size: 14px;
    }
    .heckle--broadcast::after {
      content: '';
      position: absolute;
      bottom: -10px;
      right: 20px;
      width: 12px; height: 12px;
      background: var(--white);
      border-right: 1.5px solid var(--navy);
      border-bottom: 1.5px solid var(--navy);
      transform: rotate(45deg);
    }

    /* ===== Composer ===== */
    .composer {
      background: var(--white); border-top: 1px solid var(--border);
      padding: 16px 24px;
    }
    .composer__inner {
      max-width: 820px; margin: 0 auto;
      display: flex; gap: 10px; align-items: flex-end;
    }
    .composer__input {
      flex: 1;
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px; font-size: 15px;
      font-family: var(--font); font-variation-settings: 'wght' 400;
      color: var(--text); background: var(--white);
      resize: none; min-height: 46px; max-height: 200px;
      line-height: 1.4; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .composer__input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(158,0,0,0.10);
    }
    .composer__input:disabled {
      background: var(--off-white); color: var(--text-muted); cursor: not-allowed;
    }
    .composer__send {
      background: var(--primary); color: var(--white); border: none;
      padding: 0 22px; height: 46px; border-radius: var(--radius);
      font-family: var(--font); font-size: 12px;
      font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      cursor: pointer; transition: background 0.15s;
      flex-shrink: 0;
    }
    .composer__send:hover:not(:disabled) { background: var(--primary-dim); }
    .composer__send:disabled {
      background: var(--text-muted); opacity: 0.5; cursor: not-allowed;
    }
    .composer__hint {
      max-width: 820px; margin: 6px auto 0;
      font-size: 11px; color: var(--text-muted);
      text-align: center;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--navy); color: var(--white);
      padding: 12px 18px; border-radius: var(--radius);
      font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 999; transform: translateY(80px); opacity: 0;
      transition: all 0.25s ease; max-width: 320px; pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid var(--green); }
    .toast.error   { border-left: 4px solid var(--red); }

    /* ===== Mobile ===== */
    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .sidebar.open { display: flex; position: fixed; top: 72px; left: 0; width: 85vw; height: calc(100vh - 72px); z-index: 50; box-shadow: 4px 0 20px rgba(0,0,0,0.15); }
      .topbar__meta { display: none; }
      
      .composer { padding: 12px 16px; }
      .chat__inner { padding: 0 16px; }
    }
    .menu-toggle {
      display: none;
      background: none; border: 1px solid rgba(255,255,255,0.3); color: var(--white);
      width: 36px; height: 36px; border-radius: var(--radius);
      cursor: pointer; font-size: 18px;
    }
    @media (max-width: 720px) { .menu-toggle { display: flex; align-items: center; justify-content: center; } }
  
/* ── Standard NL Tools Topbar (see nl-brand skill) ─────────────────────── */
.topbar {
  background: var(--primary);
  color: var(--white);
  padding: 0 20px;
  height: 72px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  border-bottom: 7px solid var(--navy);
  width: 100%;
  box-sizing: border-box;
}
.topbar__logo {
  height: 42px;
  flex-shrink: 0;
}
.topbar__title-wrap {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  line-height: 1;
  gap: 3px;
}
.topbar__title {
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  font-size: 20px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar__kicker {
  font-size: 9px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.6);
  white-space: nowrap;
}
.topbar__user {
  font-size: 13px;
  color: rgba(255,255,255,0.8);
  font-weight: 600;
  font-variation-settings: 'wght' 600;
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar__btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: var(--white);
  padding: 7px 14px;
  border-radius: var(--radius);
  font-size: 11px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar__btn:hover { background: rgba(255,255,255,0.12); }
.topbar__btn--icon {
  padding: 7px 10px;
  font-size: 14px;
}
/* Mobile: hide user name, icon-only Portal. Kicker stays visible. */
@media (max-width: 700px) {
  .topbar { padding: 0 14px; gap: 10px; }
  .topbar__user { display: none; }
  .topbar__btn-text-portal { display: none; }
  .topbar__btn--portal { padding: 7px 10px; }
  .topbar__title { font-size: 17px; }
}

</style>
</head>

<body>
  <div id="pageWrap" style="display:none;">

    <header class="topbar">
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle conversations">☰</button>
  <img class="topbar__logo"
    src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png"
    alt="National League"
    onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
  <div class="topbar__title-wrap">
    <span class="topbar__title">Claudio</span>
    <span class="topbar__kicker">NL Tools</span>
  </div>
  <div class="topbar__meta">
    <div class="topbar__meta-item" id="dailyMeta" title="Messages used today">
      <span class="topbar__meta-num" id="dailyCount">0</span>
      <span>/ <span id="dailyLimit">50</span> today</span>

  <script>
    // =========================================================================
    // CONSTANTS
    // =========================================================================
    var NL_GAS_URL = 'https://script.google.com/macros/s/AKfycbyHutd1esz1kykMR5aLXBkgXY2LPC-CzhUWOLBAFjhN-6XCPlxocQ1N9BAoCpE6cdof/exec';
    var CLUBS_META_URL = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/data/clubs-meta.json';

    // Historical context files — fetched from the 'site' repo (not 'tools').
    // These are DIFFERENT to the current-72-clubs list above. They contain
    // rich historical metadata (phoenix/merger/nicknames/first-season) and
    // season notes (points deductions, expulsions, reprieves, format history).
    // Injected into Claudio's system prompt for historical awareness.
    var SITE_CLUBS_META_URL    = 'https://raw.githubusercontent.com/thenationalleague/site/refs/heads/main/clubs-meta.json';
    var SITE_SEASON_NOTES_URL  = 'https://raw.githubusercontent.com/thenationalleague/site/refs/heads/main/season-notes.json';
    var SITE_LEAGUE_TABLES_URL = 'https://raw.githubusercontent.com/thenationalleague/site/refs/heads/main/league-tables.json';
    // results.json deliberately NOT fetched — too large (~500k+ tokens).
    // Deferred to v2 with tool-use for on-demand match lookups.
    // league-tables.json IS fetched but trimmed client-side at load time
    // (champions/promoted/relegated/drama only — not full standings).

    // How many past messages to send back to Claudio per request.
    // Keeps long conversations cheap — older context is dropped.
    var HISTORY_WINDOW = 15;

    // =========================================================================
    // STATE
    // =========================================================================
    // PERSONAS — v3.0 Phase 1 scaffolding
    // Only Claudio is "live" in Phase 1. The rest are shown for visual
    // continuity but are flagged { available: false } and don't route.
    // =========================================================================

      claudio: {
        key: 'claudio',
        name: 'Claudio',
        initial: 'C',
        role: 'Manager & front desk',
        roleShort: 'Front desk',

        colour: '#223b7c'
      },
      roger: {
        key: 'roger',

      },

    // =========================================================================
    var STATE = {
      session:   null,
      db:        null,
      clubs:     [],
      staff:     [],
      historicalContext: null,  // { clubsMeta, seasonNotes, leagueTables } from site repo — injected into system prompt
      convs:     [],       // list of conversations, sorted newest first

    // =========================================================================
    // BOOT — called by auth-guard once session is confirmed
    // =========================================================================

/* Standard topbar wiring — set user name and bind sign out */
function wireTopbar(session) {
  var userEl = document.getElementById('topbarUser');
  if (userEl) userEl.textContent = session && (session.name || session.email) || '';
  var btn = document.getElementById('signOutBtn');

}

    window.nlAuthReady = function(session) {
      STATE.session = session;
      STATE.db      = firebase.database();
      document.getElementById('pageWrap').style.display = 'block';

      // Load staff directory + clubs + historical context in parallel.
      // Historical context fetches are wrapped to never reject — if they fail,
      // Claudio still boots and works, just without the rich history.
      Promise.all([loadClubs(), loadStaff(), loadHistoricalContext()])
        .then(function() {
          return Promise.all([loadConversations(), loadDailyUsage()]);
        })
        .then(function() {
          renderWelcome();
          renderConvList();
          renderPersonaRoster();   // v3.0: render the "your team" sidebar section
          renderPersonaHeader(null); // v3.0 S2: start in triage mode, header hidden
          updateComposerPlaceholder('claudio');
          wireUI();
        })
        .catch(function(err) {
          console.error('Boot failed', err);
          showToast('Failed to load. Please refresh.', 'error');
        });
    };

    // =========================================================================
    // DATA LOADING
    // =========================================================================
    function loadClubs() {
      return fetch(CLUBS_META_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          STATE.clubs = (data && data.clubs) ? data.clubs : [];
        })
        .catch(function() { STATE.clubs = []; });
    }

    function loadHistoricalContext() {
      // Fetches clubs-meta, season-notes, and league-tables from the 'site' repo.
      // Never rejects — if any fail, STATE.historicalContext stays null/partial and
      // the system prompt simply omits that section. Claudio still works fine.
      //
      // Browsers cache the raw.githubusercontent response aggressively thanks to
      // GitHub's CDN headers, so repeat loads in the same day are essentially free.
      //
      // league-tables.json is LARGE (every team every season since 1979-80). We
      // trim it client-side to champions/promoted/relegated/drama only — keeps
      // the system prompt payload ~10% of the raw file size while preserving
      // the most useful info for Claudio to answer "who won season X" questions.
      var fetchJson = function(url) {
        return fetch(url)
          .then(function(r) { return r.ok ? r.json() : null; })
          .catch(function() { return null; });
      };
      return Promise.all([
        fetchJson(SITE_CLUBS_META_URL),
        fetchJson(SITE_SEASON_NOTES_URL),
        fetchJson(SITE_LEAGUE_TABLES_URL)
      ])
        .then(function(arr) {
          var clubsMeta     = arr[0];
          var seasonNotes   = arr[1];
          var leagueTables  = arr[2] ? trimLeagueTables(arr[2]) : null;
          if (clubsMeta || seasonNotes || leagueTables) {
            STATE.historicalContext = {
              clubsMeta:    clubsMeta,
              seasonNotes:  seasonNotes,
              leagueTables: leagueTables
            };
          }
        })
        .catch(function() { /* swallow — not fatal */ });
    }

    // Reduces the league-tables file from full standings to a compact
    // season-by-season summary. For each division in each season we keep:
    //   - champion (top row with 'champion' class)
    //   - promotedViaPlayoff (rows with 'promoted' class but NOT champion)
    //   - playoffFinalists (rows with 'playoff' class — lost in final)
    //   - relegated (rows with 'relegated' class)
    //   - folded / expelled (rows with those classes)
    //   - note (the per-division drama note, if any)
    // Everything else (mid-table teams, detailed stats) is dropped.
    function trimLeagueTables(full) {
      if (!full || !full.seasons) return null;
      var out = { seasons: [] };
      full.seasons.forEach(function(s) {
        if (!s || !s.divisions) return;
        var divs = {};
        Object.keys(s.divisions).forEach(function(divKey) {
          var div = s.divisions[divKey];
          if (!div) return;
          var rows = Array.isArray(div.rows) ? div.rows : [];
          var summary = {
            title: div.title || divKey
          };
          if (div.note) summary.note = div.note;
          rows.forEach(function(r) {
            if (!r) return;
            var cls = Array.isArray(r.classes) ? r.classes : [];
            var team = r.team || r.entity;
            if (cls.indexOf('champion') !== -1) {
              summary.champion = { team: team, entity: r.entity, pts: r.Pts };
            }
            if (cls.indexOf('promoted') !== -1 && cls.indexOf('champion') === -1) {
              summary.promotedViaPlayoff = { team: team, entity: r.entity, pos: r.pos };
            }
            if (cls.indexOf('playoff') !== -1) {
              if (!summary.playoffTeams) summary.playoffTeams = [];
              summary.playoffTeams.push({ team: team, entity: r.entity, pos: r.pos });
            }
            if (cls.indexOf('relegated') !== -1) {
              if (!summary.relegated) summary.relegated = [];
              summary.relegated.push({ team: team, entity: r.entity, pos: r.pos });
            }
            if (cls.indexOf('folded') !== -1) {
              if (!summary.folded) summary.folded = [];
              summary.folded.push({ team: team, entity: r.entity });
            }
            if (cls.indexOf('expelled') !== -1) {
              if (!summary.expelled) summary.expelled = [];
              summary.expelled.push({ team: team, entity: r.entity });
            }
          });
          divs[divKey] = summary;
        });
        out.seasons.push({ season: s.season, divisions: divs });
      });
      return out;
    }

    function loadStaff() {
      // Staff directory — names, roles, orgs, job titles, line-manager links.
      // Public within NL staff context. We need uid + lineManagerUid + approverUid
      // so we can resolve manager names for "who's my line manager?" questions.
      // Email included so Claudio can recognise staff when user types an email.
      return ensureAuth().then(function() {
        return STATE.db.ref('users').once('value');
      }).then(function(snap) {
        var users = snap.val() || {};
        var arr = [];
        Object.keys(users).forEach(function(uid) {
          var u = users[uid] || {};
          // Only include NL staff (not club users) — that's who Claudio talks about
          if (u.role === 'club') return;
          arr.push({
            uid:             uid,
            name:            u.name || '',
            email:           u.email || '',
            role:            u.role || '',
            org:             u.org || '',
            jobTitle:        u.jobTitle || '',
            lineManagerUid:  u.lineManagerUid || '',
            approverUid:     u.approverUid || ''
          });
        });
        STATE.staff = arr;
      }).catch(function() { STATE.staff = []; });
    }

    // Given a UID, find the matching staff member's name. Returns '' if not found.
    // Used when resolving lineManagerUid / approverUid into human-readable names.
    function resolveStaffName(uid) {
      if (!uid) return '';
      for (var i = 0; i < STATE.staff.length; i++) {
        if (STATE.staff[i].uid === uid) return STATE.staff[i].name;
      }
      return '';
    }

    function loadConversations() {
      return ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid).once('value');
      }).then(function(snap) {
        var obj = snap.val() || {};
        var arr = [];
        Object.keys(obj).forEach(function(cid) {
          var c = obj[cid];
          if (!c) return;
          arr.push({
            id:       cid,
            title:    c.title || 'Untitled chat',
            persona:  c.persona || 'claudio',
            userRenamed: !!c.userRenamed,
            updated:  c.updated || 0,
            created:  c.created || 0
          });
        });
        arr.sort(function(a, b) { return (b.updated || 0) - (a.updated || 0); });
        STATE.convs = arr;
      }).catch(function(err) {
        console.error('loadConversations failed', err);
        STATE.convs = [];
      });
    }

    function loadDailyUsage() {
      var today = todayKey();
      return ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/usage/' + STATE.session.uid + '/' + today).once('value');
      }).then(function(snap) {
        var u = snap.val() || {};
        STATE.dailyCount     = u.count || 0;
        STATE.costTodayPence = u.cost_pence || 0;
        updateMetaUI();
      }).catch(function() { /* ignore — will show 0 */ });
    }

    // =========================================================================
    // ensureAuth() — see nl-tools skill
    // =========================================================================
    function ensureAuth() {
      return new Promise(function(resolve, reject) {
        var unsub = firebase.auth().onAuthStateChanged(function(u) {
          unsub();
          if (u) resolve(u);
          else   reject(new Error('Not authenticated — please reload and try again.'));
        });
      });
    }

    // =========================================================================
    // UI — welcome screen
    // =========================================================================
    function renderWelcome() {
      var el = document.getElementById('chatInner');
      clearChildren(el);

      var w = document.createElement('div');
      w.className = 'welcome';

      var avatar = document.createElement('div');
      avatar.className = 'welcome__avatar';
      setClaudioAvatar(avatar);
      w.appendChild(avatar);

      var title = document.createElement('div');
      title.className = 'welcome__title';
      title.textContent = 'Ciao ' + firstName(STATE.session.name) + '! I\'m Claudio.';
      w.appendChild(title);

      var sub = document.createElement('div');
      sub.className = 'welcome__sub';
      sub.textContent = 'Who would you like to speak to today? Or just chat with me \u2014 I\'ll help where I can.';
      w.appendChild(sub);

      // v3.0 Phase 1: triage cards instead of the old suggestion chips.
      var cards = document.createElement('div');
      cards.className = 'triage-cards';

      PERSONA_ORDER.forEach(function(key) {
        if (key === 'claudio') return;  // user is already talking to Claudio here
        var p = PERSONAS[key];
        if (!p) return;

        var card = document.createElement('button');
        card.type = 'button';
        card.className = 'triage-card' + (p.available ? '' : ' is-unavailable');
        card.disabled = !p.available;

        var av = document.createElement('div');
        av.className = 'persona-avatar persona-avatar--' + p.key;
        av.textContent = p.initial;

        var body = document.createElement('div');
        body.className = 'triage-card__body';

        var name = document.createElement('div');
        name.className = 'triage-card__name';
        name.textContent = p.name;

        var role = document.createElement('div');
        role.className = 'triage-card__role';
        role.textContent = p.role;

        body.appendChild(name);
        body.appendChild(role);

        if (!p.available) {
          var status = document.createElement('div');
          status.className = 'triage-card__status';
          status.textContent = 'Coming soon';
          body.appendChild(status);
        }

        card.appendChild(av);
        card.appendChild(body);

        if (p.available) {
          card.addEventListener('click', function() { pickPersona(p.key); });
        }

        cards.appendChild(card);
      });

      w.appendChild(cards);

      // Small "or chat with Claudio" option below
      var orLine = document.createElement('button');
      orLine.type = 'button';
      orLine.className = 'triage-chatme';
      orLine.textContent = 'Or chat with me here \u2014 I handle staff lookups, the website, and general questions.';
      orLine.addEventListener('click', function() {
        document.getElementById('composerInput').focus();
      });
      w.appendChild(orLine);

      el.appendChild(w);
    }

    // v3.0 Phase 1: user picked a persona card on the welcome screen.
    // Sets pendingPersona, updates the composer placeholder and header,
    // morphs avatar into the chosen persona.
    function pickPersona(personaKey) {
      var p = PERSONAS[personaKey];
      if (!p || !p.available) return;

      STATE.pendingPersona = personaKey;
      updateComposerPlaceholder(personaKey);
      renderPersonaHeader(personaKey);

      // Replace the welcome screen with an empty scroller showing only the
      // new persona's brief intro line. User types to begin.
      var inner = document.getElementById('chatInner');
      clearChildren(inner);

      var stub = document.createElement('div');
      stub.className = 'persona-intro';

      var sav = document.createElement('div');
      sav.className = 'persona-intro__avatar persona-avatar persona-avatar--' + p.key;
      sav.textContent = p.initial;

      var sbody = document.createElement('div');
      sbody.className = 'persona-intro__body';

      var sname = document.createElement('div');
      sname.className = 'persona-intro__name';
      sname.textContent = p.name;

      var srole = document.createElement('div');
      srole.className = 'persona-intro__role';
      srole.textContent = p.role;

      var shint = document.createElement('div');
      shint.className = 'persona-intro__hint';
      shint.textContent = 'What can I help with?';

      sbody.appendChild(sname);
      sbody.appendChild(srole);
      sbody.appendChild(shint);

      stub.appendChild(sav);
      stub.appendChild(sbody);

      inner.appendChild(stub);

      document.getElementById('composerInput').focus();
    }

    // =========================================================================
    // UI — conversation list (sidebar)
    // =========================================================================
    function renderConvList() {
      var list = document.getElementById('convList');
      clearChildren(list);

      if (!STATE.convs.length) {
        var empty = document.createElement('div');
        empty.className = 'sidebar__empty';
        empty.textContent = 'No conversations yet. Start one below.';
        list.appendChild(empty);
        return;
      }

      STATE.convs.forEach(function(c) {
        var item = document.createElement('div');
        item.className = 'conv-item' + (c.id === STATE.activeId ? ' active' : '');

        // v3.0: persona avatar on each conv-item
        var head = document.createElement('div');
        head.className = 'conv-item__head';

        var personaKey = c.persona || 'claudio';
        var persona = PERSONAS[personaKey] || PERSONAS.claudio;

        var av = document.createElement('div');
        av.className = 'persona-avatar persona-avatar--sm persona-avatar--' + persona.key;
        av.textContent = persona.initial;

        var body = document.createElement('div');
        body.className = 'conv-item__body';

        var title = document.createElement('div');
        title.className = 'conv-item__title';
        title.textContent = c.title;
        title.title = 'Double-click to rename';

        // v2.20: double-click to rename
        title.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          beginRenameConv(c.id, title);
        });

        var time = document.createElement('div');
        time.className = 'conv-item__time';
        time.textContent = relTime(c.updated || c.created);

        body.appendChild(title);
        body.appendChild(time);

        head.appendChild(av);
        head.appendChild(body);

        var del = document.createElement('button');
        del.className = 'conv-item__del';
        del.type = 'button';
        del.textContent = '×';
        del.title = 'Delete conversation';
        del.addEventListener('click', function(e) {
          e.stopPropagation();
          if (confirm('Delete this conversation? This can\'t be undone.')) {
            deleteConversation(c.id);
          }
        });

        item.appendChild(head);
        item.appendChild(del);
        item.addEventListener('click', function() { openConversation(c.id); });

        list.appendChild(item);
      });
    }

    // =========================================================================
    // UI — persona roster (sidebar) — v3.0 Phase 1
    // Shows the "team" of personas. In Phase 1 only Claudio is clickable.
    // Others are visibly strikethrough with "coming soon" labels.
    // =========================================================================
    function renderPersonaRoster() {
      var roster = document.getElementById('personaRoster');
      if (!roster) return;
      // Clear everything except the title
      while (roster.children.length > 1) roster.removeChild(roster.lastChild);

      PERSONA_ORDER.forEach(function(key) {
        var p = PERSONAS[key];
        if (!p) return;

        var item = document.createElement('div');
        item.className = 'persona-roster__item' + (p.available ? '' : ' is-unavailable');
        item.title = p.available ? ('Start a new chat with ' + p.name) : (p.name + ' isn\'t with us yet \u2014 coming soon');

        var av = document.createElement('div');
        av.className = 'persona-avatar persona-avatar--sm persona-avatar--' + p.key;
        av.textContent = p.initial;

        var body = document.createElement('div');
        body.className = 'persona-roster__body';

        var name = document.createElement('div');
        name.className = 'persona-roster__name';
        name.textContent = p.name;

        var role = document.createElement('div');
        role.className = 'persona-roster__role';
        role.textContent = p.roleShort;

        body.appendChild(name);
        body.appendChild(role);

        if (!p.available) {
          var status = document.createElement('div');
          status.className = 'persona-roster__status';
          status.textContent = 'Coming soon';
          body.appendChild(status);
        }

        item.appendChild(av);
        item.appendChild(body);

        item.addEventListener('click', function() {
          if (!p.available) {
            showToast(p.name + ' isn\'t with us yet \u2014 coming soon', 'info');
            return;
          }
          // Available persona click \u2014 start a new chat "with" that persona.
          // In Phase 1 this just means new Claudio chat; the persona plumbing
          // becomes real in Session 2.
          startNewChat(p.key);
        });

        roster.appendChild(item);
      });
    }

    // =========================================================================
    // UI — chat messages
    // =========================================================================
    function renderMessages() {
      var el = document.getElementById('chatInner');
      clearChildren(el);

      if (!STATE.messages.length) {
        renderWelcome();
        return;
      }

      // v2.20: collapse messages older than the most recent 20 turns
      // (where a "turn" is roughly a user+assistant pair, so 20 messages
      // shown by default). Show a "Show earlier messages (N)" toggle.
      // User can click to expand; click again to collapse.
      var COLLAPSE_AT = 20;
      var total = STATE.messages.length;
      var showAll = !!STATE._showAllMessages;
      var startIdx = 0;

      if (total > COLLAPSE_AT && !showAll) {
        startIdx = total - COLLAPSE_AT;

        var earlierBtn = document.createElement('button');
        earlierBtn.type = 'button';
        earlierBtn.className = 'show-earlier';
        earlierBtn.textContent = 'Show earlier messages (' + startIdx + ')';
        earlierBtn.addEventListener('click', function() {
          STATE._showAllMessages = true;
          renderMessages();
        });
        el.appendChild(earlierBtn);
      } else if (showAll && total > COLLAPSE_AT) {
        var collapseBtn = document.createElement('button');
        collapseBtn.type = 'button';
        collapseBtn.className = 'show-earlier';
        collapseBtn.textContent = 'Collapse earlier messages';
        collapseBtn.addEventListener('click', function() {
          STATE._showAllMessages = false;
          renderMessages();
        });
        el.appendChild(collapseBtn);
      }

      for (var i = startIdx; i < total; i++) {
        el.appendChild(buildMsgEl(STATE.messages[i]));
      }
      scrollToBottom();
    }

    // Render Claudio's text, splitting out code blocks as distinct
    // "draft" blocks that use the NL-standard carbona font rather than the
    // Italian serif of his chat voice. This keeps his chatter expressive
    // but ensures anything he generates for onward delivery (emails,
    // letters, comms) lands in a clean NL voice the user can copy-paste.
    //
    // Parser handles:
    //   - fenced code blocks (```...```), with or without a language tag
    //   - simple **bold** and *italic* / _italic_ in the chat portions
    //   - everything else passes through as plain text (white-space: pre-wrap)
    //
    // Drafts get a "DRAFT" label and a copy-to-clipboard button. Copy button
    // writes the exact draft body (no label, no preamble) to the clipboard.
    function renderClaudioText(container, content) {
      clearChildren(container);
      var src = String(content || '');

      // v2.13: pre-strip unclosed `nl-table` fenced blocks. When Claudio's
      // output gets truncated mid-JSON (large tables hitting the output
      // token limit), the trailing content has no closing ``` and falls
      // through the main parser as literal text \u2014 dumping raw JSON into
      // the chat. Detect and strip silently. Claudio's prose before the
      // block still renders normally.
      //
      // Pattern: find ```nl-table ... and check whether a matching ``` appears
      // afterwards. If not, snip from the opening fence to the end.
      var fenceIdx = src.indexOf('```nl-table');
      while (fenceIdx !== -1) {
        // Look for the nearest closing ``` after the opening fence
        var afterOpen = fenceIdx + '```nl-table'.length;
        var closingIdx = src.indexOf('```', afterOpen);
        if (closingIdx === -1) {
          // Unclosed \u2014 snip from the opening fence to end of content.
          src = src.substring(0, fenceIdx).replace(/\s+$/, '');
          break;
        }
        // Closed normally; skip past it and look for the next one
        fenceIdx = src.indexOf('```nl-table', closingIdx + 3);
      }

      // v2.5: three-way fenced block routing.
      //   ```nl-table  → styled NL-branded HTML table (standings / h2h last-5)
      //   ```(other)   → draft-voice block (emails, letters, copy)
      //   plain text   → markdown tables + inline formatting
      var parts = src.split(/```([a-zA-Z0-9_-]*)\n([\s\S]*?)```/);
      for (var i = 0; i < parts.length; i++) {
        if (i % 3 === 0) {
          // Text chunk — may contain markdown tables
          var chunk = parts[i];
          if (!chunk) continue;
          renderTextWithTables(container, chunk);
        } else if (i % 3 === 1) {
          // Lang tag — handled when we get the code chunk
          continue;
        } else if (i % 3 === 2) {
          var lang = String(parts[i - 1] || '').toLowerCase();
          var code = parts[i];
          if (code == null) continue;
          if (lang === 'nl-table') {
            var nlTable = buildNLTable(code.trim());
            // v2.11: retry with light cleanup if the first parse failed.
            // Common LLM failures: trailing "}}" instead of "}", stray
            // markdown fences baked in, leading/trailing whitespace.
            if (!nlTable) {
              var cleaned = code.trim();
              // Strip any stray backticks
              cleaned = cleaned.replace(/^`+|`+$/g, '').trim();
              // Fix common bracket overrun (trailing double close where one was expected)
              if (/}}\s*$/.test(cleaned) && !/{{/.test(cleaned)) {
                cleaned = cleaned.replace(/}\s*$/, '');
              }
              nlTable = buildNLTable(cleaned);
            }
            if (nlTable) {
              container.appendChild(nlTable);
            }
            // v2.11: if still malformed, SILENTLY skip. Do not dump raw JSON
            // into the chat. Claudio's prose that follows will carry the
            // answer. The old behaviour rendered a visible draft block
            // containing raw JSON which was awful.
          } else {
            container.appendChild(buildDraftBlock(code.replace(/\s+$/, '')));
          }
        }
      }
      // Edge case: no code block at all — the split produced a single element
      if (parts.length === 1 && !container.childNodes.length) {
        renderTextWithTables(container, src);
      }
    }

    // Splits a text chunk on markdown tables. A table is a block of
    // consecutive lines each starting/ending with '|', with a separator row
    // like | --- | --- |. Between tables, text runs through inline formatting.
    function renderTextWithTables(container, text) {
      var lines = text.split('\n');
      var i = 0;
      var buffer = [];

      function flushBuffer() {
        if (!buffer.length) return;
        var joined = buffer.join('\n');
        if (joined.length) {
          var span = document.createElement('span');
          renderInlineFormatting(span, joined);
          container.appendChild(span);
        }
        buffer = [];
      }

      while (i < lines.length) {
        // Look ahead: is there a table starting at line i?
        // A table needs: line i looks like '|...|', line i+1 is a separator.
        var isTableStart = false;
        if (i + 1 < lines.length) {
          var l0 = lines[i].trim();
          var l1 = lines[i + 1].trim();
          if (/^\|.*\|$/.test(l0) && /^\|[\s\-:|]+\|$/.test(l1) && l1.indexOf('-') !== -1) {
            isTableStart = true;
          }
        }

        if (isTableStart) {
          flushBuffer();
          // Collect consecutive table rows
          var tableLines = [lines[i], lines[i + 1]];
          var j = i + 2;
          while (j < lines.length && /^\|.*\|$/.test(lines[j].trim())) {
            tableLines.push(lines[j]);
            j++;
          }
          container.appendChild(buildMarkdownTable(tableLines));
          i = j;
          // Keep a single newline after the table so flow continues naturally
          if (i < lines.length) buffer.push('');
        } else {
          buffer.push(lines[i]);
          i++;
        }
      }
      flushBuffer();
    }

    // Parse a block of markdown table lines into a real <table>.
    // Format expected:
    //   | Header 1 | Header 2 |
    //   | --- | --- |
    //   | Cell   | Cell    |
    function buildMarkdownTable(lines) {
      var table = document.createElement('table');
      table.className = 'claudio-table';

      function splitRow(line) {
        var trimmed = line.trim().replace(/^\|/, '').replace(/\|$/, '');
        return trimmed.split('|').map(function(c) { return c.trim(); });
      }

      if (lines.length === 0) return table;
      var headerCells = splitRow(lines[0]);
      var thead = document.createElement('thead');
      var trh = document.createElement('tr');
      headerCells.forEach(function(c) {
        var th = document.createElement('th');
        renderInlineFormatting(th, c);
        trh.appendChild(th);
      });
      thead.appendChild(trh);
      table.appendChild(thead);

      // skip line[1] — separator
      var tbody = document.createElement('tbody');
      for (var r = 2; r < lines.length; r++) {
        var cells = splitRow(lines[r]);
        var tr = document.createElement('tr');
        cells.forEach(function(c) {
          var td = document.createElement('td');
          renderInlineFormatting(td, c);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      return table;
    }

    // Very light inline formatting: **bold**, *italic*/_italic_, and [text](url) links.
    // Everything else is plain text. Links take precedence over italic so that
    // bracketed URLs don't get misinterpreted.
    function renderInlineFormatting(container, text) {
      // Split on bold, then links, then italic, creating a flat sequence of nodes.
      // Use textContent throughout so we never inject raw HTML.
      var tokens = [{ t: 'text', v: text }];
      // Bold pass
      tokens = expandTokens(tokens, /\*\*([^*]+)\*\*/g, 'strong');
      // Link pass — [display text](https://url)
      tokens = expandLinks(tokens);
      // Italic pass — avoid matching the ** already consumed by using \*(?!\*)
      tokens = expandTokens(tokens, /(?:^|[^*])\*([^*\n]+)\*(?!\*)/g, 'em-guarded');
      // Underscore italic pass — _foo_ but not inside words
      tokens = expandTokens(tokens, /(^|\s)_([^_\n]+)_(?=\s|[.,;:!?)\]]|$)/g, 'em-under');

      for (var i = 0; i < tokens.length; i++) {
        var tk = tokens[i];
        if (tk.t === 'text') {
          container.appendChild(document.createTextNode(tk.v));
        } else if (tk.t === 'strong') {
          var s = document.createElement('strong');
          s.textContent = tk.v;
          container.appendChild(s);
        } else if (tk.t === 'em') {
          var e = document.createElement('em');
          e.textContent = tk.v;
          container.appendChild(e);
        } else if (tk.t === 'link') {
          var a = document.createElement('a');
          a.textContent = tk.v;
          a.href = tk.href;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.className = 'claudio-link';
          container.appendChild(a);
        }
      }
    }

    // Parse markdown-style [text](url) links. Only accepts absolute URLs
    // (http:, https:, mailto:) to avoid accidental false matches.
    function expandLinks(tokens) {
      var regex = /\[([^\]]+)\]\((https?:\/\/[^\s)]+|mailto:[^\s)]+)\)/g;
      var out = [];
      for (var i = 0; i < tokens.length; i++) {
        var tk = tokens[i];
        if (tk.t !== 'text') { out.push(tk); continue; }
        var str = tk.v;
        var last = 0;
        var m;
        regex.lastIndex = 0;
        while ((m = regex.exec(str)) !== null) {
          if (m.index > last) out.push({ t: 'text', v: str.slice(last, m.index) });
          out.push({ t: 'link', v: m[1], href: m[2] });
          last = regex.lastIndex;
          if (regex.lastIndex === m.index) regex.lastIndex++;
        }
        if (last < str.length) out.push({ t: 'text', v: str.slice(last) });
      }
      return out;
    }

    // Run a regex over the token list, splitting text tokens where it matches
    // and inserting a new token of the given type for the capture group.
    function expandTokens(tokens, regex, kind) {
      var out = [];
      for (var i = 0; i < tokens.length; i++) {
        var tk = tokens[i];
        if (tk.t !== 'text') { out.push(tk); continue; }
        var str = tk.v;
        var last = 0;
        var m;
        regex.lastIndex = 0;
        while ((m = regex.exec(str)) !== null) {
          if (kind === 'em-guarded') {
            // The italic regex includes the char before * in the match
            // to avoid matching **. That char is not part of the italic.
            var prefixChar = m[0].charAt(0) === '*' ? '' : m[0].charAt(0);
            var start = m.index + (prefixChar ? 1 : 0);
            if (start > last) out.push({ t: 'text', v: str.slice(last, start) });
            out.push({ t: 'em', v: m[1] });
            last = regex.lastIndex;
          } else if (kind === 'em-under') {
            // Underscore regex includes leading whitespace in group 1, preserve it
            var leader = m[1] || '';
            var chunkStart = m.index + leader.length;
            if (chunkStart > last) out.push({ t: 'text', v: str.slice(last, chunkStart) });
            out.push({ t: 'em', v: m[2] });
            last = regex.lastIndex;
          } else {
            // Plain — m[0] is the whole match, m[1] is the content
            if (m.index > last) out.push({ t: 'text', v: str.slice(last, m.index) });
            out.push({ t: kind, v: m[1] });
            last = regex.lastIndex;
          }
          if (regex.lastIndex === m.index) regex.lastIndex++; // safety
        }
        if (last < str.length) out.push({ t: 'text', v: str.slice(last) });
      }
      return out;
    }

    // Build a styled "draft" block with label and copy button.
    function buildDraftBlock(code) {
      var block = document.createElement('div');
      block.className = 'msg__draft';

      var label = document.createElement('span');
      label.className = 'msg__draft-label';
      label.textContent = 'Draft';

      var copy = document.createElement('button');
      copy.className = 'msg__draft-copy';
      copy.type = 'button';
      copy.textContent = 'Copy';
      copy.addEventListener('click', function() {
        // Use the clipboard API where available, fall back to execCommand.
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(code).then(function() {
            copy.textContent = 'Copied';
