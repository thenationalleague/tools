            setTimeout(function() { copy.textContent = 'Copy'; }, 1500);
          }).catch(function() {
            showToast('Could not copy to clipboard', 'error');
          });
        } else {
          // Fallback: select + execCommand
          var ta = document.createElement('textarea');
          ta.value = code;
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch(e) {}
          document.body.removeChild(ta);
          copy.textContent = 'Copied';
          setTimeout(function() { copy.textContent = 'Copy'; }, 1500);
        }
      });

      label.appendChild(copy);
      block.appendChild(label);

      var body = document.createElement('div');
      body.textContent = code;
      block.appendChild(body);

      return block;
    }

    // v2.5: Styled NL-branded table renderer.
    // Parses rendererPayload JSON emitted by getLeagueTable / getHeadToHead
    // and builds a styled HTML <table> matching the league-tables-by-season
    // v3.38i dashboard. Returns null on parse error so the caller can fall
    // back gracefully.
    function buildNLTable(jsonStr) {
      var payload;
      try { payload = JSON.parse(jsonStr); }
      catch (e) { return null; }
      if (!payload || typeof payload !== 'object') return null;
      if (payload.type === 'standings') return buildNLStandingsTable(payload);
      if (payload.type === 'h2h-meetings') return buildNLH2HMeetingsTable(payload);
      if (payload.type === 'h2h-last5') return buildNLH2HMeetingsTable(payload); // legacy alias
      if (payload.type === 'club-matches') return buildNLClubMatchesTable(payload);
      return null;
    }

    function buildNLStandingsTable(payload) {
      var wrap = document.createElement('div');
      wrap.className = 'nlt-wrap';

      var caption = document.createElement('div');
      caption.className = 'nlt-caption';
      var capLabel = payload.title || ((payload.division || '') + ' ' + (payload.season || ''));
      if (!payload.isFinal && payload.asOf) {
        capLabel += ' (as of ' + formatNLTDate(payload.asOf) + ')';
      }
      caption.textContent = capLabel;
      wrap.appendChild(caption);

      var scroll = document.createElement('div');
      scroll.className = 'nlt-scroll';

      var table = document.createElement('table');
      table.className = 'nlt';

      var thead = document.createElement('thead');
      var thr = document.createElement('tr');
      var headers = ['Pos', '', 'Team', 'P', 'W', 'D', 'L', 'GF', 'GA', 'GD', 'Pts'];
      headers.forEach(function(h, i) {
        var th = document.createElement('th');
        th.textContent = h;
        var cls = [];
        if (i === 1) cls.push('nlt-move-col');
        if (i === 2) cls.push('nlt-team-col');
        if (i === 0 || i === 10) cls.push('nlt-strong');
        if (cls.length) th.className = cls.join(' ');
        thr.appendChild(th);
      });
      thead.appendChild(thr);
      table.appendChild(thead);

      var tbody = document.createElement('tbody');
      var rows = Array.isArray(payload.rows) ? payload.rows : [];
      var zones = payload.zones || {};

      rows.forEach(function(r, idx) {
        var tr = document.createElement('tr');
        var classes = Array.isArray(r.classes) ? r.classes.slice() : [];
        classes.forEach(function(c) { tr.classList.add('nlt-' + c); });

        var hasSpecial = classes.some(function(c) {
          return ['champion','promoted','playoff-semi','playoff-elim','relegated','relegation-zone','folded','expelled','clinched-champion','clinched-po-semi','clinched-po-elim','clinched-relegated'].indexOf(c) !== -1;
        });
        if (!hasSpecial) {
          tr.classList.add((idx % 2 === 0) ? 'nlt-zebra-odd' : 'nlt-zebra-even');
        }

        // Dotted dividers — match dashboard cut-*-after semantics
        if (zones.championEnd && r.pos === zones.championEnd) tr.classList.add('nlt-cut-champion-after');
        else if (zones.automaticEnd && r.pos === zones.automaticEnd) tr.classList.add('nlt-cut-automatic-after');
        else if (zones.playoffSemiEnd && r.pos === zones.playoffSemiEnd) tr.classList.add('nlt-cut-playoff-byes-after');
        else if (zones.playoffElimEnd && r.pos === zones.playoffElimEnd) tr.classList.add('nlt-cut-playoff-after');
        if (zones.relegationLine && r.pos === zones.relegationLine) tr.classList.add('nlt-cut-relegation-after');

        function td(text, extraCls) {
          var c = document.createElement('td');
          c.textContent = String(text == null ? '' : text);
          if (extraCls) c.className = extraCls;
          return c;
        }
        tr.appendChild(td(r.pos, 'nlt-strong'));

        var mvCell = document.createElement('td');
        mvCell.className = 'nlt-move-col';
        if (r.move === 'up') { mvCell.textContent = '↑'; mvCell.className += ' nlt-move-up'; }
        else if (r.move === 'down') { mvCell.textContent = '↓'; mvCell.className += ' nlt-move-down'; }
        else { mvCell.className += ' nlt-move-none'; }
        tr.appendChild(mvCell);

        tr.appendChild(td(r.team, 'nlt-team-col'));
        tr.appendChild(td(r.P));
        tr.appendChild(td(r.W));
        tr.appendChild(td(r.D));
        tr.appendChild(td(r.L));
        tr.appendChild(td(r.GF));
        tr.appendChild(td(r.GA));

        var gdCell = document.createElement('td');
        var gd = Number(r.GD) || 0;
        gdCell.textContent = gd > 0 ? ('+' + gd) : String(gd);
        gdCell.className = gd > 0 ? 'nlt-gd-pos' : (gd < 0 ? 'nlt-gd-neg' : 'nlt-gd-zero');
        tr.appendChild(gdCell);

        var ptsCell = document.createElement('td');
        ptsCell.className = 'nlt-strong';
        if (r.deduction && r.deduction !== 0) {
          ptsCell.textContent = String(r.Pts) + '*';
          ptsCell.title = 'Points deduction: ' + r.deduction;
        } else {
          ptsCell.textContent = String(r.Pts);
        }
        tr.appendChild(ptsCell);

        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      scroll.appendChild(table);
      wrap.appendChild(scroll);

      var fns = Array.isArray(payload.footnotes) ? payload.footnotes : [];
      if (fns.length) {
        var notes = document.createElement('div');
        notes.className = 'nlt-footnotes';
        fns.forEach(function(f) {
          var line = document.createElement('div');
          line.className = 'nlt-footnote';
          if (f.team) {
            var label = document.createElement('strong');
            label.textContent = f.team + ': ';
            line.appendChild(label);
          }
          line.appendChild(document.createTextNode(f.text || ''));
          notes.appendChild(line);
        });
        wrap.appendChild(notes);
      }

      return wrap;
    }

    /* v2.7: full H2H meetings renderer. Handles perspective modes (clubA /
       clubB / neutral) and scrollable max-height container for 12+ meetings.
       In neutral mode the Result column shows the winning team's short name
       in a green cell (or "Draw" in amber) rather than a W/D/L pill. */
    function buildNLH2HMeetingsTable(payload) {
      var wrap = document.createElement('div');
      wrap.className = 'nlt-wrap';

      var caption = document.createElement('div');
      caption.className = 'nlt-caption';
      caption.textContent = payload.title || 'Meetings';
      wrap.appendChild(caption);

      // Subtitle line ("from Chester's perspective" / "neutral")
      if (payload.subtitle) {
        var sub = document.createElement('div');
        sub.className = 'nlt-subcaption';
        sub.textContent = payload.subtitle;
        wrap.appendChild(sub);
      }

      var scroll = document.createElement('div');
      scroll.className = 'nlt-scroll';
      // v2.7: vertical max-height scroll when many meetings
      if (payload.scrollable) scroll.classList.add('nlt-scroll-v');

      var table = document.createElement('table');
      table.className = 'nlt nlt-h2h';

      var thead = document.createElement('thead');
      var thr = document.createElement('tr');
      ['Date', 'Season', 'Home', 'Score', 'Away', 'Comp.', 'Result'].forEach(function(h) {
        var th = document.createElement('th');
        th.textContent = h;
        thr.appendChild(th);
      });
      thead.appendChild(thr);
      table.appendChild(thead);

      var perspective = String(payload.perspective || 'clubA').toLowerCase();
      var shortA = payload.clubAShort || payload.clubALabel || 'A';
      var shortB = payload.clubBShort || payload.clubBLabel || 'B';

      var tbody = document.createElement('tbody');
      (payload.meetings || []).forEach(function(m, idx) {
        var tr = document.createElement('tr');
        tr.classList.add((idx % 2 === 0) ? 'nlt-zebra-odd' : 'nlt-zebra-even');

        function td(text, cls) {
          var c = document.createElement('td');
          c.textContent = String(text == null ? '' : text);
          if (cls) c.className = cls;
          return c;
        }

        tr.appendChild(td(formatNLTDate(m.date)));
        tr.appendChild(td(m.season || ''));
        tr.appendChild(td(m.home || ''));
        tr.appendChild(td(m.score || '', 'nlt-strong'));
        tr.appendChild(td(m.away || ''));
        tr.appendChild(td(m.competition || ''));

        var rCell = document.createElement('td');
        rCell.className = 'nlt-result-cell';

        if (perspective === 'neutral') {
          // Winning team's short name in a coloured cell
          var tag = document.createElement('span');
          tag.className = 'nlt-winner-tag';
          if (m.result === 'winA') {
            tag.classList.add('nlt-winner-a');
            tag.textContent = shortA;
          } else if (m.result === 'winB') {
            tag.classList.add('nlt-winner-b');
            tag.textContent = shortB;
          } else if (m.result === 'draw') {
            tag.classList.add('nlt-winner-draw');
            tag.textContent = 'Draw';
          } else {
            tag.classList.add('nlt-winner-none');
            tag.textContent = '-';
          }
          rCell.appendChild(tag);
        } else {
          // clubA or clubB perspective — W/D/L pill
          var pill = document.createElement('span');
          var rCode = String(m.result || '-').toUpperCase();
          pill.className = 'nlt-result-pill nlt-result-' + rCode.toLowerCase();
          pill.textContent = (rCode === 'W' || rCode === 'D' || rCode === 'L') ? rCode : '-';
          rCell.appendChild(pill);
        }
        tr.appendChild(rCell);

        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      scroll.appendChild(table);
      wrap.appendChild(scroll);

      // Truncation note if we hit the 100-meeting cap
      if (payload.truncated) {
        var foot = document.createElement('div');
        foot.className = 'nlt-footnotes';
        var line = document.createElement('div');
        line.className = 'nlt-footnote';
        line.textContent = 'Showing 100 most recent of ' + payload.totalMeetings + ' total meetings. Older meetings available on the history page.';
        foot.appendChild(line);
        wrap.appendChild(foot);
      }

      return wrap;
    }

    function formatNLTDate(iso) {
      var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(iso || ''));
      if (!m) return String(iso || '');
      var dt = new Date(Date.UTC(+m[1], +m[2] - 1, +m[3]));
      var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return days[dt.getUTCDay()] + ' ' + (+m[3]) + ' ' + months[+m[2] - 1] + ' ' + m[1];
    }

    /* v2.11: Renderer for getClubMatches — one club's match list with
       W/D/L coloured cells. Pattern mirrors buildNLH2HMeetingsTable but
       simpler: no perspective param, just per-match outcome from the
       club's view. */
    function buildNLClubMatchesTable(payload) {
      var wrap = document.createElement('div');
      wrap.className = 'nlt-wrap';

      var caption = document.createElement('div');
      caption.className = 'nlt-caption';
      caption.textContent = payload.title || (payload.clubLabel || 'Matches');
      wrap.appendChild(caption);

      if (payload.subtitle && payload.subtitle !== 'all-time') {
        var sub = document.createElement('div');
        sub.className = 'nlt-subcaption';
        sub.textContent = payload.subtitle;
        wrap.appendChild(sub);
      }

      var scroll = document.createElement('div');
      scroll.className = 'nlt-scroll';
      if (payload.scrollable) scroll.classList.add('nlt-scroll-v');

      var table = document.createElement('table');
      table.className = 'nlt nlt-h2h';

      var thead = document.createElement('thead');
      var thr = document.createElement('tr');
      ['Date', 'Season', 'Home', 'Score', 'Away', 'Comp.', 'Result'].forEach(function(h) {
        var th = document.createElement('th');
        th.textContent = h;
        thr.appendChild(th);
      });
      thead.appendChild(thr);
      table.appendChild(thead);

      var tbody = document.createElement('tbody');
      (payload.matches || []).forEach(function(m, idx) {
        var tr = document.createElement('tr');
        tr.classList.add((idx % 2 === 0) ? 'nlt-zebra-odd' : 'nlt-zebra-even');

        function td(text, cls) {
          var c = document.createElement('td');
          c.textContent = String(text == null ? '' : text);
          if (cls) c.className = cls;
          return c;
        }

        tr.appendChild(td(formatNLTDate(m.date)));
        tr.appendChild(td(m.season || ''));
        tr.appendChild(td(m.home || ''));
        tr.appendChild(td(m.score || '', 'nlt-strong'));
        tr.appendChild(td(m.away || ''));
        tr.appendChild(td(m.competition || ''));

        var rCell = document.createElement('td');
        rCell.className = 'nlt-result-cell';
        var pill = document.createElement('span');
        var rCode = String(m.outcome || '-').toUpperCase();
        pill.className = 'nlt-result-pill nlt-result-' + rCode.toLowerCase();
        pill.textContent = (rCode === 'W' || rCode === 'D' || rCode === 'L') ? rCode : '-';
        rCell.appendChild(pill);
        tr.appendChild(rCell);

        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      scroll.appendChild(table);
      wrap.appendChild(scroll);

      if (payload.truncated) {
        var foot = document.createElement('div');
        foot.className = 'nlt-footnotes';
        var line = document.createElement('div');
        line.className = 'nlt-footnote';
        line.textContent = 'Showing ' + (payload.matches || []).length + ' of ' + payload.totalMatches + ' matches. Refine with filters or season for more detail.';
        foot.appendChild(line);
        wrap.appendChild(foot);
      }

      return wrap;
    }

    /* v2.9: Set an avatar element to show the Claudio SVG icon.
       Falls back to the "C" text if the image fails to load (missing asset,
       network error, etc). `alt` empty so screen readers don't double up
       with the "Claudio" label next to it. */
    function setClaudioAvatar(el) {
      clearChildren(el);
      var img = document.createElement('img');
      img.src = 'https://thenationalleague.github.io/tools/assets/icons/claudio.svg';
      img.alt = '';
      img.onerror = function() {
        this.onerror = null;
        // Drop the image and fall back to the "C" letter
        if (this.parentNode) this.parentNode.removeChild(this);
        el.textContent = 'C';
      };
      el.appendChild(img);
    }

    // =========================================================================
    // v3.1: Typewriter reveal engine
    // =========================================================================
    // On fresh assistant messages, post-process the rendered DOM to wrap each
    // word in a <span class="tw-word">, then reveal them word-by-word on a
    // timer. When a word sits inside <strong> or <em>, it plays the persona's
    // emphasis animation (peak-and-settle) as it appears.
    //
    // Works with any existing content rendered by renderClaudioText \u2014 including
    // tables, nl-table blocks, draft blocks, links. We only walk text nodes
    // that live inside .msg__text, we never touch tables/code/drafts.
    //
    // Pacing:
    //   - 35ms between ordinary words
    //   - +40ms extra pause at commas
    //   - +120ms extra pause at full stops / question marks
    //   - +300ms pause when landing on an emphasised word (lets the animation breathe)
    // =========================================================================

    var TW_MS_PER_WORD      = 35;
    var TW_PAUSE_COMMA      = 40;
    var TW_PAUSE_FULLSTOP   = 120;
    var TW_PAUSE_EMPH       = 300;
    var TW_EMPH_PEAK_MS     = 400;   // how long the peak class stays applied
    var TW_MAX_WORDS        = 600;   // safety cap \u2014 beyond this, just show it

    function scheduleTypewriterReveal(textContainer) {
      try {
        // Walk tree, find leaf text nodes NOT inside .nl-table, table, pre, code.
        // Wrap each run of non-whitespace into a tw-word span. Also mark
        // words inside <strong>/<em> so we know to animate them.
        var wordSpans = [];
        wrapWordsInNode(textContainer, null, wordSpans);

        if (wordSpans.length === 0) return;
        if (wordSpans.length > TW_MAX_WORDS) {
          // Too long \u2014 reveal everything instantly
          for (var q = 0; q < wordSpans.length; q++) {
            wordSpans[q].el.classList.add('tw-visible');
          }
          return;
        }

        // Add caret at end of container
        var caret = document.createElement('span');
        caret.className = 'tw-caret';
        textContainer.appendChild(caret);

        // Kick off reveal loop
        var i = 0;
        var reveal = function() {
          if (i >= wordSpans.length) {
            if (caret.parentNode) caret.parentNode.removeChild(caret);
            return;
          }
          var w = wordSpans[i];
          w.el.classList.add('tw-visible');

          // If this word is inside emphasis, play peak-then-settle
          if (w.emph) {
            var emphEl = w.emphEl;
            // Accumulate emphasis \u2014 mark peak, schedule un-peak
            if (emphEl && !emphEl._twPeakScheduled) {
              emphEl._twPeakScheduled = true;
              emphEl.classList.add('tw-emph--peak');
              setTimeout(function() {
                emphEl.classList.remove('tw-emph--peak');
              }, TW_EMPH_PEAK_MS);
            }
          }

          // Autoscroll every few words
          if ((i % 4) === 0) {
            var scroller = document.getElementById('chatScroll');
            if (scroller) scroller.scrollTop = scroller.scrollHeight;
          }

          // Decide pause before next word
          var delay = TW_MS_PER_WORD;
          var last = w.word.charAt(w.word.length - 1);
          if (last === ',' || last === ';' || last === ':') {
            delay += TW_PAUSE_COMMA;
          } else if (last === '.' || last === '!' || last === '?') {
            delay += TW_PAUSE_FULLSTOP;
          }
          if (w.emph) delay += TW_PAUSE_EMPH;

          i++;
          setTimeout(reveal, delay);
        };

        // Tiny initial delay so mount and fade-in don't collide
        setTimeout(reveal, 80);
      } catch (err) {
        // Fatal typewriter error \u2014 reveal everything so user isn't stuck
        console.warn('typewriter failed', err);
        var els = textContainer.querySelectorAll('.tw-word');
        for (var z = 0; z < els.length; z++) els[z].classList.add('tw-visible');
      }
    }

    // Walk a DOM node and wrap each word in a text descendant with a tw-word
    // span. Skips content inside tables, pre, code, nl-table containers,
    // links (so links stay intact), and draft blocks.
    //
    // `emphEl` is the CURRENT containing emphasis element (strong/em/b/i),
    // passed by reference through the recursion. Null at top level.
    function wrapWordsInNode(node, emphEl, wordSpans) {
      // Skip nodes we shouldn't walk into
      if (node.nodeType === 1) {
        var tag = node.tagName.toUpperCase();
        if (tag === 'TABLE' || tag === 'PRE' || tag === 'CODE' || tag === 'A') {
          return;
        }
        if (node.classList && (
              node.classList.contains('msg__draft') ||
              node.classList.contains('nl-table'))) {
          return;
        }
      }

      // If entering an emphasis element, use THIS as the emph parent for
      // descendants. Also tag it so the CSS base transition applies.
      var currentEmph = emphEl;
      if (node.nodeType === 1) {
        var t = node.tagName.toUpperCase();
        if (t === 'STRONG' || t === 'EM' || t === 'B' || t === 'I') {
          node.classList.add('tw-emph');
          currentEmph = node;
        }
      }

      // Text node: split into word spans in place
      if (node.nodeType === 3) {
        var text = node.nodeValue;
        if (!text) return;
        var frag = document.createDocumentFragment();
        var tokens = text.split(/(\s+)/);
        for (var k = 0; k < tokens.length; k++) {
          var tk = tokens[k];
          if (tk === '') continue;
          if (/^\s+$/.test(tk)) {
            frag.appendChild(document.createTextNode(tk));
          } else {
            var span = document.createElement('span');
            span.className = 'tw-word';
            span.textContent = tk;
            frag.appendChild(span);
            wordSpans.push({
              el: span,
              word: tk,
              emph: !!emphEl,
              emphEl: emphEl
            });
          }
        }
        if (node.parentNode) node.parentNode.replaceChild(frag, node);
        return;
      }

      // Element node: recurse children (snapshot \u2014 we mutate during iteration)
      if (node.childNodes) {
        var children = [];
        for (var c = 0; c < node.childNodes.length; c++) children.push(node.childNodes[c]);
        for (var cc = 0; cc < children.length; cc++) {
          wrapWordsInNode(children[cc], currentEmph, wordSpans);
        }
      }
    }

    function buildMsgEl(m) {
      var wrap = document.createElement('div');
      wrap.className = 'msg ' + (m.role === 'user' ? 'msg--user' : 'msg--ai');
      // v3.1: set data-persona so per-persona CSS takes hold
      if (m.role === 'assistant') {
        wrap.setAttribute('data-persona', m.persona || 'claudio');
      }

      var avatar = document.createElement('div');
      avatar.className = 'msg__avatar ' + (m.role === 'user' ? 'msg__avatar--user' : 'msg__avatar--ai');
      if (m.role === 'user') {
        avatar.textContent = firstName(STATE.session.name).charAt(0).toUpperCase() || 'Y';
      } else {
        // v3.0 S3: persona-aware avatar. Claudio keeps his SVG; everyone
        // else uses initials-in-circle in their colour.
        var pKey = m.persona || 'claudio';
        if (pKey === 'claudio') {
          setClaudioAvatar(avatar);
        } else {
          var p = PERSONAS[pKey] || PERSONAS.claudio;
          avatar.className = 'msg__avatar persona-avatar persona-avatar--' + p.key;
          avatar.textContent = p.initial;
        }
      }

      var body = document.createElement('div');
      body.className = 'msg__body';

      var name = document.createElement('div');
      name.className = 'msg__name';
      if (m.role === 'user') {
        name.textContent = 'You';
      } else {
        var nKey = m.persona || 'claudio';
        name.textContent = (PERSONAS[nKey] || PERSONAS.claudio).name;
      }

      var text = document.createElement('div');
      text.className = 'msg__text';
      if (m.role === 'assistant') {
        renderClaudioText(text, m.content || '');
        // v3.1: typewriter reveal on fresh messages only. Loaded-from-RTDB
        // messages carry _loaded=true and appear instantly.
        if (!m._loaded) {
          scheduleTypewriterReveal(text);
        }
      } else {
        text.textContent = m.content;
      }

      body.appendChild(name);
      body.appendChild(text);

      // Tool-call chips on assistant messages — show which tools were invoked
      if (m.role === 'assistant' && m.tool_calls && m.tool_calls.length) {
        var toolsRow = document.createElement('div');
        toolsRow.className = 'msg__tools';
        var toolLabel = document.createElement('span');
        toolLabel.className = 'msg__tools-label';
        toolLabel.textContent = '🔍 Looked up: ';
        toolsRow.appendChild(toolLabel);
        for (var t = 0; t < m.tool_calls.length; t++) {
          var chip = document.createElement('span');
          chip.className = 'msg__tool-chip';
          chip.textContent = m.tool_calls[t].name;
          toolsRow.appendChild(chip);
        }
        body.appendChild(toolsRow);
      }

      // v3.0 S3: out-of-scope suggestion chips — render below message if
      // the response contained suggestions and they haven't been dismissed.
      if (m.role === 'assistant' && m.suggestions && m.suggestions.length) {
        var activeSuggestions = m.suggestions.filter(function(s) {
          return !(m.dismissedChips && m.dismissedChips.indexOf(s.persona) !== -1);
        });
        if (activeSuggestions.length) {
          var chipsRow = document.createElement('div');
          chipsRow.className = 'msg__chips';
          activeSuggestions.forEach(function(sug) {
            var destPersona = PERSONAS[sug.persona];
            if (!destPersona) return;

            var chipEl = document.createElement('div');
            chipEl.className = 'msg__chip';

            var av = document.createElement('div');
            av.className = 'msg__chip__av msg__chip__av--' + sug.persona;
            av.textContent = destPersona.initial;

            var label = document.createElement('span');
            label.textContent = sug.label || ('Ask ' + destPersona.name);

            var arrow = document.createElement('span');
            arrow.className = 'msg__chip__arrow';
            arrow.textContent = '\u2192';

            var dismiss = document.createElement('button');
            dismiss.className = 'msg__chip__dismiss';
            dismiss.type = 'button';
            dismiss.textContent = '\u00d7';
            dismiss.title = 'Dismiss';
            dismiss.addEventListener('click', function(e) {
              e.stopPropagation();
              onChipDismiss(m, sug.persona);
            });

            chipEl.appendChild(av);
            chipEl.appendChild(label);
            chipEl.appendChild(arrow);
            chipEl.appendChild(dismiss);

            chipEl.addEventListener('click', function() {
              onChipClick(sug);
            });

            chipsRow.appendChild(chipEl);
          });
          body.appendChild(chipsRow);
        }
      }

      // Cost tag on assistant messages only
      if (m.role === 'assistant' && m.cost_pence != null) {
        var cost = document.createElement('div');
        cost.className = 'msg__cost';

        var costNum = document.createElement('span');
        costNum.className = 'msg__cost-num';
        costNum.textContent = formatPence(m.cost_pence);

        var costLabel = document.createElement('span');
        costLabel.textContent = '• ' + (m.tokens || 0) + ' tokens';

        cost.appendChild(costNum);
        cost.appendChild(costLabel);
        body.appendChild(cost);

        // Animated count-up on first render
        animateCountUp(costNum, 0, m.cost_pence, 400);
      }

      wrap.appendChild(avatar);
      wrap.appendChild(body);
      return wrap;
    }

    // v3.0 S3: chip click handler \u2014 opens new chat with destination
    // persona, pre-fills composer with the seeded prompt, does not auto-send.
    function onChipClick(sug) {
      var destPersona = PERSONAS[sug.persona];
      if (!destPersona) return;
      if (!destPersona.available) {
        showToast(destPersona.name + ' isn\'t with us yet \u2014 coming soon', 'info');
        return;
      }
      startNewChat(sug.persona);
      // Pre-fill composer
      var input = document.getElementById('composerInput');
      if (input && sug.seededPrompt) {
        input.value = sug.seededPrompt;
        autoResize(input);
        input.focus();
        input.selectionStart = input.selectionEnd = input.value.length;
      }
    }

    // v3.0 S3: chip dismiss \u2014 store in message metadata so it doesn't
    // re-appear on re-render. Persist to RTDB so it survives refresh.
    function onChipDismiss(msg, personaKey) {
      if (!msg.dismissedChips) msg.dismissedChips = [];
      if (msg.dismissedChips.indexOf(personaKey) === -1) {
        msg.dismissedChips.push(personaKey);
      }
      // Persist dismissal to RTDB so it survives refresh
      if (msg.ts && STATE.activeId) {
        ensureAuth().then(function() {
          return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + STATE.activeId + '/messages')
            .orderByChild('ts').equalTo(msg.ts).once('value');
        }).then(function(snap) {
          var val = snap.val();
          if (val) {
            var keys = Object.keys(val);
            if (keys.length) {
              STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + STATE.activeId + '/messages/' + keys[0]).update({
                dismissedChips: msg.dismissedChips
              });
            }
          }
        }).catch(function() {});  // non-fatal
      }
      renderMessages();
    }

    function addTypingIndicator() {
      var el = document.getElementById('chatInner');
      var wrap = document.createElement('div');
      wrap.className = 'typing';
      wrap.id = 'typingIndicator';

      // v3.1: typing indicator uses the active persona's avatar
      var avatar = document.createElement('div');
      var pKey = STATE.pendingPersona || 'claudio';
      if (pKey === 'claudio') {
        avatar.className = 'msg__avatar msg__avatar--ai';
        setClaudioAvatar(avatar);
      } else {
        var p = PERSONAS[pKey] || PERSONAS.claudio;
        avatar.className = 'msg__avatar persona-avatar persona-avatar--' + p.key;
        avatar.textContent = p.initial;
      }

      var dots = document.createElement('div');
      dots.className = 'typing__dots';
      for (var i = 0; i < 3; i++) {
        var d = document.createElement('div');
        d.className = 'typing__dot';
        dots.appendChild(d);
      }

      // v2.6: stage div that holds the rotating heckle bubbles
      var stage = document.createElement('div');
      stage.className = 'heckle-stage';
      stage.id = 'heckleStage';

      wrap.appendChild(avatar);
      wrap.appendChild(dots);
      wrap.appendChild(stage);
      el.appendChild(wrap);
      scrollToBottom();

      // v3.1: Heckles are Claudio's character \u2014 no heckles for others.
      if ((STATE.pendingPersona || 'claudio') === 'claudio') {
        startHeckleCycle();
      }
    }

    function removeTypingIndicator() {
      stopHeckleCycle();
      var t = document.getElementById('typingIndicator');
      if (t && t.parentNode) t.parentNode.removeChild(t);
    }

    /* v2.6: football terrace / pundit heckles that pop in while Claudio
       thinks. Two shell types — "shout" (red terrace) and "broadcast"
       (navy pundit italic). One at a time, soft enter/exit, small float.
       First heckle appears ~1.5s after typing starts so instant answers
       don't trigger anything. */
    var HECKLE_SHOUTS = [
      'Stop timewasting!',
      'Get on with it!',
      'Any day now!',
      'Wakey wakey!',
      'Come on, ref!',
      'Oi Claudio!',
      'You having a laugh?',
      'Hurry up!',
      'We haven\'t got all day!',
      'Pick it up, son!'
    ];
    var HECKLE_BROADCASTS = [
      'He\'s taking his time here…',
      'Bit pensive, Claudio…',
      'Still thinking about this one…',
      'You can see him weighing it up…',
      'He needs to calm down and pick a pass…',
      'Considering his options…',
      'Not rushing into anything…'
    ];

    var _heckleTimer = null;
    var _heckleKickoffTimer = null;
    var _lastHeckleWasShout = Math.random() < 0.5;

    function startHeckleCycle() {
      stopHeckleCycle();
      // First heckle after 1.5s — instant replies get nothing
      _heckleKickoffTimer = setTimeout(function() {
        showOneHeckle();
        // Then every ~2.7s while typing indicator is still there
        _heckleTimer = setInterval(showOneHeckle, 2700);
      }, 1500);
    }

    function stopHeckleCycle() {
      if (_heckleKickoffTimer) { clearTimeout(_heckleKickoffTimer); _heckleKickoffTimer = null; }
      if (_heckleTimer) { clearInterval(_heckleTimer); _heckleTimer = null; }
    }

    function showOneHeckle() {
      var stage = document.getElementById('heckleStage');
      if (!stage) return;

      // Alternate types roughly — flip a biased coin so it's not strict ABAB
      var useShout = Math.random() < (_lastHeckleWasShout ? 0.35 : 0.65);
      _lastHeckleWasShout = useShout;

      var pool = useShout ? HECKLE_SHOUTS : HECKLE_BROADCASTS;
      var text = pool[Math.floor(Math.random() * pool.length)];

      var bubble = document.createElement('div');
      bubble.className = 'heckle ' + (useShout ? 'heckle--shout' : 'heckle--broadcast');
      bubble.textContent = text;

      // Random entrance direction and rotation — feels alive
      var angles = useShout
        ? [-6, -4, -3, 4, 6, 7]      // shouts wobble more
        : [-2, -1, 1, 2];             // broadcasts stay tidier
      var rot = angles[Math.floor(Math.random() * angles.length)];

      // Enter from a randomish direction (above-right mostly, some from below)
      var entryFromTop = Math.random() < 0.6;
      var hxFrom = (Math.random() * 30 + 10) + 'px';
      var hyFrom = (entryFromTop ? -(Math.random() * 20 + 10) : (Math.random() * 20 + 10)) + 'px';
      var hxTo = -(Math.random() * 20 + 5) + 'px';
      var hyTo = -(Math.random() * 15 + 8) + 'px';

      bubble.style.setProperty('--hr', rot + 'deg');
      bubble.style.setProperty('--hx-from', hxFrom);
      bubble.style.setProperty('--hy-from', hyFrom);
      bubble.style.setProperty('--hx-to', hxTo);
      bubble.style.setProperty('--hy-to', hyTo);

      // Position the bubble above the typing dots (top coordinate within stage)
      // Slight vertical jitter so they don't land in the same spot each time
      bubble.style.top = (Math.random() * 20 - 20) + 'px';
      // Anchor right-edge of bubble to right of stage
      bubble.style.right = '0';

      stage.appendChild(bubble);

      // Clean up after animation — each heckle lives ~2.4s per CSS
      setTimeout(function() {
        if (bubble.parentNode) bubble.parentNode.removeChild(bubble);
      }, 2500);
    }

    function scrollToBottom() {
      var scroll = document.getElementById('chatScroll');
      scroll.scrollTop = scroll.scrollHeight;
    }

    function updateMetaUI() {
      document.getElementById('dailyCount').textContent = STATE.dailyCount;
      document.getElementById('dailyLimit').textContent = STATE.dailyLimit;
      document.getElementById('costToday').textContent  = formatPence(STATE.costTodayPence);
    }

    // =========================================================================
    // CONVERSATIONS — open, new, delete
    // =========================================================================
    // v3.0 Phase 1 — composer placeholder adapts to whoever's active.
    function updateComposerPlaceholder(personaKey) {
      var input = document.getElementById('composerInput');
      if (!input) return;
      var p = PERSONAS[personaKey] || PERSONAS.claudio;
      input.setAttribute('placeholder', 'Ask ' + p.name + ' anything\u2026');
    }

    // v3.0 Phase 1 — render the thin persona header above the chat area.
    // Call with null to hide it (e.g. when showing the fresh-chat welcome).
    function renderPersonaHeader(personaKey) {
      var el = document.getElementById('personaHeader');
      if (!el) return;

      if (!personaKey) {
        el.style.display = 'none';
        clearChildren(el);
        el.classList.remove('is-morphing');
        el.removeAttribute('data-persona');
        return;
      }

      // v2.20: only animate if the persona is actually CHANGING. A re-render
      // of the same persona (e.g. on message append) should be silent.
      var prevKey = el.getAttribute('data-persona');
      var shouldAnimate = prevKey && prevKey !== personaKey;

      var p = PERSONAS[personaKey] || PERSONAS.claudio;
      clearChildren(el);
      el.setAttribute('data-persona', p.key);

      var row = document.createElement('div');
      row.className = 'persona-header__row';

      var av = document.createElement('div');
      av.className = 'persona-avatar persona-avatar--lg persona-avatar--' + p.key;
      if (shouldAnimate) av.classList.add('is-morphing');
      av.textContent = p.initial;

      var body = document.createElement('div');
      body.className = 'persona-header__body';

      var name = document.createElement('div');
      name.className = 'persona-header__name';
      name.textContent = p.name;

      var role = document.createElement('div');
      role.className = 'persona-header__role';
      role.textContent = p.role;

      body.appendChild(name);
      body.appendChild(role);

      row.appendChild(av);
      row.appendChild(body);

      var accent = document.createElement('div');
      accent.className = 'persona-header__accent persona-header__accent--' + p.key;

      el.appendChild(row);
      el.appendChild(accent);
      el.style.display = 'block';

      if (shouldAnimate) {
        el.classList.add('is-morphing');
        setTimeout(function() {
          el.classList.remove('is-morphing');
          av.classList.remove('is-morphing');
        }, 450);
      }
    }

    // v3.0: composer draft auto-save per chat, localStorage-backed.
    // Restores when a chat opens, saves as user types, clears on send.
    function draftKey(cid) {
      return 'claudio.draft.' + (STATE.session && STATE.session.uid || 'anon') + '.' + (cid || 'NEW');
    }
    function saveDraft(cid, text) {
      try { localStorage.setItem(draftKey(cid), text || ''); }
      catch (e) { /* quota etc. \u2014 not fatal */ }
    }
    function restoreDraft(cid) {
      var input = document.getElementById('composerInput');
      if (!input) return;
      var saved = '';
      try { saved = localStorage.getItem(draftKey(cid)) || ''; }
      catch (e) {}
      input.value = saved;
      autoResize(input);
    }
    function clearDraft(cid) {
      try { localStorage.removeItem(draftKey(cid)); }
      catch (e) {}
    }

    function openConversation(cid) {
      STATE.activeId = cid;
      STATE._showAllMessages = false;   // v2.20: reset collapse state per chat
      // Carry the conv's persona into pendingPersona so future triage / header
      // treatments know who this chat "belongs to". Harmless in Phase 1 where
      // everything is still Claudio.
      var conv = STATE.convs.filter(function(c) { return c.id === cid; })[0];
      var pKey = (conv && conv.persona) || 'claudio';
      STATE.pendingPersona = pKey;
      renderConvList();
      renderPersonaHeader(pKey);           // v3.0 S2: show persona header
      updateComposerPlaceholder(pKey);
      restoreDraft(cid);

      ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid + '/messages').once('value');
      }).then(function(snap) {
        var obj = snap.val() || {};
        var arr = [];
        Object.keys(obj).forEach(function(mid) {
          var m = obj[mid];
          if (!m) return;
          // Mark existing messages so animations don't replay
          m._loaded = true;
          arr.push(m);
        });
        arr.sort(function(a, b) { return (a.ts || 0) - (b.ts || 0); });
        STATE.messages = arr;
        renderMessages();
      }).catch(function(err) {
        console.error('openConversation failed', err);
        showToast('Couldn\'t open that chat.', 'error');
      });
    }

    function startNewConversation() {
      STATE.activeId = null;
      STATE.messages = [];
      STATE.pendingPersona = 'claudio';  // v3.0: default persona for the next chat
      renderConvList();
      renderPersonaHeader(null);  // v3.0 S2: hide header for triage mode
      updateComposerPlaceholder('claudio');
      renderWelcome();
      restoreDraft(null);
      document.getElementById('composerInput').focus();
    }

    // v3.0 Phase 1 — `startNewChat(personaKey)` is called from the team
    // roster. Skips Claudio triage \u2014 goes straight to the chosen persona.
    function startNewChat(personaKey) {
      STATE.pendingPersona = personaKey || 'claudio';
      STATE.activeId = null;
      STATE.messages = [];
      renderConvList();
      // v3.0 S2: if user picked Claudio from roster, run triage.
      // For anyone else, render persona header + intro stub directly.
      if (!personaKey || personaKey === 'claudio') {
        renderPersonaHeader(null);
        updateComposerPlaceholder('claudio');
        renderWelcome();
      } else {
        pickPersona(personaKey);
      }
      restoreDraft(null);
      document.getElementById('composerInput').focus();
    }

    // v2.20: inline title editing. Double-click a conv title in the
    // sidebar \u2192 turns into an input \u2192 Enter saves, Esc cancels,
    // blur saves.
    function beginRenameConv(cid, titleEl) {
      var conv = STATE.convs.filter(function(c) { return c.id === cid; })[0];
      if (!conv) return;

      var originalTitle = conv.title;
      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'conv-item__title conv-item__title--editing';
      input.value = originalTitle;
      input.setAttribute('maxlength', '80');

      titleEl.parentNode.replaceChild(input, titleEl);

      input.focus();
      input.select();

      var done = false;
      var finish = function(save) {
        if (done) return;
        done = true;
        var newTitle = (input.value || '').trim();
        if (save && newTitle && newTitle !== originalTitle) {
          conv.title = newTitle;
          conv.userRenamed = true;
          // Persist to RTDB
          ensureAuth().then(function() {
            return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid).update({
              title: newTitle,
              userRenamed: true
            });
          }).catch(function(err) {
            console.error('Rename failed', err);
            conv.title = originalTitle;
            renderConvList();
            showToast('Couldn\'t save rename.', 'error');
            return;
          });
        }
        renderConvList();
      };

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter')     { e.preventDefault(); finish(true); }
        else if (e.key === 'Escape'){ e.preventDefault(); finish(false); }
      });
      input.addEventListener('blur', function() { finish(true); });
      input.addEventListener('click', function(e) { e.stopPropagation(); });
    }

    function deleteConversation(cid) {
      ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid).remove();
      }).then(function() {
        STATE.convs = STATE.convs.filter(function(c) { return c.id !== cid; });
        if (STATE.activeId === cid) {
          STATE.activeId = null;
          STATE.messages = [];
          STATE.pendingPersona = 'claudio';
          renderPersonaHeader(null);
          updateComposerPlaceholder('claudio');
          renderWelcome();
        }
        renderConvList();
        showToast('Conversation deleted.', 'success');
      }).catch(function(err) {
        console.error('deleteConversation failed', err);
        showToast('Couldn\'t delete that chat.', 'error');
      });
    }

    // =========================================================================
    // SEND — the core of the tool
    // =========================================================================
    function sendMessage() {
      if (STATE.sending) return;

      var input = document.getElementById('composerInput');
      var text  = input.value.trim();
      if (!text) return;

      if (STATE.dailyCount >= STATE.dailyLimit) {
        showToast('Daily limit reached. Resets at midnight.', 'error');
        return;
      }

      STATE.sending = true;
      setSendingUI(true);

      // If this is a new conversation, create it first
      var isNew = !STATE.activeId;
      var convId = STATE.activeId || ('c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8));

      // Build the user message locally
      var userMsg = {
        role:    'user',
        content: text,
        ts:      Date.now()
      };
      STATE.messages.push(userMsg);
      input.value = '';
      clearDraft(convId);
      clearDraft(null);  // also clear the 'NEW' draft if this was a new chat
      autoResize(input);

      // If opening welcome screen, switch to messages view
      if (STATE.messages.length === 1) {
        renderMessages();
      } else {
        document.getElementById('chatInner').appendChild(buildMsgEl(userMsg));
      }
      addTypingIndicator();

      // v3.0 S2: show persona header now the user's committed to this persona
      var pendingKey = STATE.pendingPersona || 'claudio';
      renderPersonaHeader(pendingKey);

      // v3.0: determine active persona for this turn.
      // For a new chat, pendingPersona (set by triage card or roster click); default claudio.
      // For an existing chat, read the persona from the conv record.
      var activePersona = STATE.pendingPersona || 'claudio';
      if (!isNew) {
        var existingConv = STATE.convs.filter(function(c) { return c.id === convId; })[0];
        if (existingConv && existingConv.persona) activePersona = existingConv.persona;
      }

      // Build the request to GAS — persona-specific system prompt + tool allowlist
      var systemPrompt = buildSystemPrompt(activePersona);
      var apiMessages = STATE.messages.slice(-HISTORY_WINDOW).map(function(m) {
        return { role: m.role, content: m.content };
      });

      var reqBody = {
        action: 'claudio',
        uid: STATE.session.uid,
        system: systemPrompt,
        messages: apiMessages,
        persona: activePersona,     // v3.0: server uses this to filter tools
        cacheSystem: true
      };

      // First call: create the conv record in RTDB (so it appears in sidebar immediately)
      var personaForConv = activePersona;
      var createPromise = isNew
        ? saveConversationRecord(convId, deriveTitle(text), personaForConv)
        : Promise.resolve();

      createPromise
        .then(function() {
          STATE.activeId = convId;
          if (isNew) {
            STATE.convs.unshift({
              id: convId,
              title: deriveTitle(text),
              persona: personaForConv,
              updated: Date.now(),
              created: Date.now()
            });
            STATE.pendingPersona = null;  // consumed
            renderConvList();
          }
          // Save user message to RTDB
          return saveMessageToRTDB(convId, userMsg);
        })
        .then(function() {
          // Call GAS → Anthropic
          return fetch(NL_GAS_URL + '?cb=' + Date.now(), {
            method:  'POST',
            headers: { 'Content-Type': 'text/plain' },
            body:    JSON.stringify(reqBody)
          });
        })
        .then(function(r) { return r.json(); })
        .then(function(result) {
          removeTypingIndicator();

          if (!result.ok) {
            // Remove the user message we optimistically pushed? No — keep it, user sent it.
            // Just show the error.
            showToast(result.error || 'Claudio couldn\'t respond.', 'error');
            STATE.sending = false;
            setSendingUI(false);
            return;
          }

          var aiMsg = {
            role:       'assistant',
            persona:    activePersona,          // v3.0 S3: tag the speaker
            content:    result.reply || '',
            ts:         Date.now(),
            cost_pence: result.cost_pence || 0,
            tokens:     result.tokens
              ? ((result.tokens.input || 0) + (result.tokens.output || 0) + (result.tokens.cache_read || 0) + (result.tokens.cache_write || 0))
              : 0,
            tool_calls: result.tool_calls || [],
            suggestions: result.suggestions || []  // v3.0 S3: out-of-scope chips
          };
          STATE.messages.push(aiMsg);
          document.getElementById('chatInner').appendChild(buildMsgEl(aiMsg));
          scrollToBottom();

          // Update daily counters (from GAS response — source of truth)
          if (typeof result.count === 'number')      STATE.dailyCount = result.count;
          if (typeof result.cost_today === 'number') STATE.costTodayPence = result.cost_today;
          updateMetaUI();

          // Persist assistant message + bump conv updated timestamp
          saveMessageToRTDB(convId, aiMsg);
          bumpConversationTimestamp(convId);

          STATE.sending = false;
          setSendingUI(false);
        })
        .catch(function(err) {
          removeTypingIndicator();
          console.error('Send failed', err);
          showToast('Network error. Try again.', 'error');
          STATE.sending = false;
          setSendingUI(false);
        });
    }

    function setSendingUI(sending) {
      document.getElementById('composerInput').disabled = sending;
      document.getElementById('btnSend').disabled = sending;
      document.getElementById('btnSend').textContent = sending ? '...' : 'Send';
    }

    // =========================================================================
    // RTDB WRITES
    // =========================================================================
    function saveConversationRecord(cid, title, persona) {
      return ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid).update({
          title:   title,
          persona: persona || 'claudio',   // v3.0: tag each conv with its persona
          created: firebase.database.ServerValue.TIMESTAMP,
          updated: firebase.database.ServerValue.TIMESTAMP
        });
      });
    }

    function saveMessageToRTDB(cid, msg) {
      return ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid + '/messages').push({
          role:       msg.role,
          persona:    msg.persona || null,
          content:    msg.content,
          ts:         msg.ts,
          cost_pence: msg.cost_pence || 0,
          tokens:     msg.tokens || 0,
          tool_calls: msg.tool_calls || null,
          suggestions: msg.suggestions && msg.suggestions.length ? msg.suggestions : null,
          dismissedChips: msg.dismissedChips || null
        });
      });
    }

    function bumpConversationTimestamp(cid) {
      return ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid + '/updated').set(firebase.database.ServerValue.TIMESTAMP);
      });
    }

    function buildClaudioSystemPrompt() {
      // v2.4: staff directory no longer inlined — the getStaff tool handles
      // lookups on demand. Previous versions dumped all 80 staff + their
      // line-manager relationships which ate ~2k tokens on every message,
      // even for simple unrelated questions.
      //
      // We DO still inline the current user's own line-manager/approver info
      // below, because that's universally relevant ("who's my line manager?")
      // and it's tiny (a handful of tokens).

      // Compact clubs list — single line per division instead of per-club.
      var clubsByDiv = {};
      STATE.clubs.forEach(function(c) {
        var d = c.division || 'Unknown';
        if (!clubsByDiv[d]) clubsByDiv[d] = [];
        clubsByDiv[d].push(c.name);
      });
      var clubsList = Object.keys(clubsByDiv).map(function(div) {
        return div + ': ' + clubsByDiv[div].join(', ');
      }).join('\n');

      // Build a richer current-user block. We pull from STATE.session for the
      // basics, but also look up the session uid in STATE.staff to get the
      // lineManagerUid/approverUid we need to resolve names. This is why
      // loadStaff now includes uid — without it, we couldn't link "me" to
      // my line manager.
      var me = STATE.staff.filter(function(s) { return s.uid === STATE.session.uid; })[0];
      var currentUserLines = ['The person you are talking to right now:'];
      currentUserLines.push('- Name: ' + (STATE.session.name || '(unknown)'));
      if (STATE.session.email)    currentUserLines.push('- Email: ' + STATE.session.email);
      if (STATE.session.jobTitle) currentUserLines.push('- Job title: ' + STATE.session.jobTitle);
      if (STATE.session.org)      currentUserLines.push('- Organisation: ' + STATE.session.org);
      if (STATE.session.role)     currentUserLines.push('- Access level: ' + STATE.session.role);
      if (me) {
        var myLm = resolveStaffName(me.lineManagerUid);
        var myAp = resolveStaffName(me.approverUid);
        if (myLm) currentUserLines.push('- Line manager: ' + myLm);
        if (myAp && myAp !== myLm) currentUserLines.push('- Approver (for leave/expenses): ' + myAp);
      }
      currentUserLines.push('When the user says "me", "my", "I", refer to the person above. For questions like "who\'s my line manager?", use the line manager name above.');

      // Today's date — so Claudio can resolve "this season", "last season",
      // "next week" etc correctly. British format per NL convention.
      var today = new Date();
      var dd = String(today.getDate()).padStart(2, '0');
      var mm = String(today.getMonth() + 1).padStart(2, '0');
      var yyyy = today.getFullYear();
      var todayStr = dd + '/' + mm + '/' + yyyy;
      // Derive "current season" — football seasons run Aug to May, so before August
      // we're in the season that started the previous calendar year.

    // =========================================================================
    // UI WIRING
    // =========================================================================
    function wireUI() {
      var input = document.getElementById('composerInput');

      // Auto-resize + draft auto-save as user types
      input.addEventListener('input', function() {
        autoResize(input);
        saveDraft(STATE.activeId, input.value);
      });

      // Enter to send, Shift+Enter for newline
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      document.getElementById('btnSend').addEventListener('click', sendMessage);
      document.getElementById('btnNew').addEventListener('click', startNewConversation);

      document.getElementById('menuToggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('open');
      });
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 200) + 'px';
    }

    // =========================================================================
    // HELPERS
    // =========================================================================
    function firstName(full) {
      return String(full || 'there').split(' ')[0];
    }

    function deriveTitle(firstMessage) {
      // v2.20: smarter title heuristic. Strips common question starters
      // ("tell me", "show me", "what's", "how did" etc) and trims to
      // something more scannable. If nothing's left, falls back to the
      // full trimmed message.
      var t = String(firstMessage || '').trim().replace(/\s+/g, ' ');
      if (!t) return 'Untitled chat';

      var cleaned = t
        // Common question starters
        .replace(/^(please\s+)?(can\s+you\s+|could\s+you\s+|would\s+you\s+)?/i, '')
        .replace(/^(tell\s+me|show\s+me|give\s+me|find\s+me|look\s+up)(\s+about)?\s+/i, '')
        .replace(/^(what(\'s|s|\s+is|\s+are|\s+was|\s+were)?)\s+/i, '')
        .replace(/^(who(\'s|s|\s+is|\s+are|\s+was|\s+were)?)\s+/i, '')
        .replace(/^(how(\'s|s|\s+did|\s+have|\s+has|\s+do|\s+does)?)\s+/i, '')
        .replace(/^(when\s+(did|was|were|is|are))\s+/i, '')
        .replace(/^(i\s+(want|need|would like)\s+to\s+know\s+)/i, '')
        .replace(/\?+\s*$/, '')
        .replace(/\s+/g, ' ')
        .trim();

      // Capitalise first letter
      if (cleaned) cleaned = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);

      var result = cleaned || t;
      if (result.length > 48) result = result.slice(0, 45) + '\u2026';
      return result || 'Untitled chat';
    }

    function todayKey() {
      // UK date (YYYY-MM-DD) — matches GAS Europe/London key
      var d = new Date();
      var pad = function(n) { return n < 10 ? '0' + n : String(n); };
      // This uses local time; for users outside UK this may differ by a few hours
      // from the server's Europe/London key. Acceptable drift for a usage counter.
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }

    function formatPence(p) {
      if (p == null) return '0.00p';
      var n = Number(p) || 0;
      if (n < 1) return n.toFixed(2) + 'p';
      if (n < 100) return n.toFixed(1) + 'p';
      return '£' + (n / 100).toFixed(2);
    }

    function animateCountUp(el, from, to, duration) {
      var start = performance.now();
      function step(now) {
        var t = Math.min(1, (now - start) / duration);
        // Ease-out cubic
        var eased = 1 - Math.pow(1 - t, 3);
        var val = from + (to - from) * eased;
        el.textContent = formatPence(val);
        if (t < 1) requestAnimationFrame(step);
        else el.textContent = formatPence(to);
      }
      requestAnimationFrame(step);
    }

    function relTime(ts) {
      if (!ts) return '';
      var diff = Date.now() - ts;
      var mins = Math.floor(diff / 60000);
      if (mins < 1)  return 'just now';
      if (mins < 60) return mins + 'm ago';
      var hrs = Math.floor(mins / 60);
      if (hrs < 24)  return hrs + 'h ago';
      var days = Math.floor(hrs / 24);
      if (days < 7)  return days + 'd ago';
      var d = new Date(ts);
      var pad = function(n) { return n < 10 ? '0' + n : String(n); };
      return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear();
    }

    function clearChildren(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type || 'success') + ' show';
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(function() { t.classList.remove('show'); }, 3500);
    }
  </script>
</body>
</html>
