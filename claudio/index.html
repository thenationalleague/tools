<!--
  Claudio — NL AI Assistant
  Version: 2.3
  Date: 17/04/2026

  CHANGELOG
  v2.3 (17/04/2026)
    - System prompt trimmed from ~37k tokens to ~5k tokens. Previously dumped
      the full clubsMeta + seasonNotes + trimmed leagueTables JSON inline,
      which was hitting Anthropic's per-minute token ceiling and costing up
      to 5p per first-message. Historical queries now route through the new
      getClubSummary tool instead. Only thing kept inline is a one-line-per-
      season champions summary for quick answers.
    - Tool guidance rewritten: split into "current season" (NLS live feed)
      vs "historical" (getClubSummary + /history/* redirects) sections.
      Explicit instructions on phoenix/merger lineage — never assume combining
      without asking, always surface relatedLineage options when offered.

  v2.2 (17/04/2026)
    - Two-register voice: chat replies render in LTC Italian Old Style Pro
      (warm serif, Ranieri-inflected English). Generated drafts — emails,
      letters, comms — render in a separate code block in carbona (clean
      NL professional voice). System prompt rewritten with explicit
      chat-voice / draft-voice split. UI adds copy-to-clipboard on drafts.
    - Added lightweight markdown renderer for assistant messages: handles
      fenced code blocks as drafts, plus inline *italic* and **bold**.
      User messages remain plain text.
    - Typekit link for LTC Italian Old Style Pro added; font-family used
      only on .msg--ai .msg__text. Drafts and rest of UI stay in carbona.

  v2.1 (17/04/2026)
    - Voice tweak: Claudio now writes as an Italian speaking English, a la
      Claudio Ranieri. Warm, expressive, occasional light Italian words
      (certo, allora, amico, piano piano). Explicit guardrails against
      broken-English caricature, phonetic spelling, and overdoing it.
      Voice is stable across serious/light content. Adds ~400 tokens to
      the system prompt — cost impact negligible with prompt caching.

  v2.0 (17/04/2026)
    - Topbar refactored to use standard nl-brand tokens and markup.

  v1.3.1 (17/04/2026)
    - Fix: request body field `systemPrompt` renamed to `system` to match
      what ClaudioChat.gs reads. Previous v1.3 build always triggered the
      "Missing system prompt" validation error because the field names
      didn't line up. One-line fix — no GAS change needed.

  v1.3 (17/04/2026)
    - Added tool-use support. Claudio can now call 6 tools when needed:
      5 NLS data tools (getStandings, getFixtures, getRecentResults,
      getMatchDetail, getTeamForm) and 1 domain-locked web fetch
      (fetchNLSite — thenationalleague.org.uk only).
    - Top scorers DELIBERATELY not a tool: NLS live data has acknowledged
      gaps in per-match goal event entry, so aggregation would be
      unreliable. All top-scorer questions redirect to
      /history/top-scorers (authoritative hand-written page).
    - System prompt updated to describe tools and when to use each.
    - Historical-redirect URLs baked into prompt: Claudio points users to
      /history/our-story, /history/stats-dashboard, /history/league-records,
      /history/league-tables-by-season, /history/results-by-club,
      /history/head-to-head, /history/top-scorers for detail beyond the
      injected data.
    - UI shows "Looking that up..." indicator while tool calls run.
    - Guardrail softened further: Claudio can now answer live current-season
      questions via the tools, instead of refusing.
    - Fix: response field names (cost_pence, tokens.*, count) corrected to
      match the GAS shape — the cost tag and daily counter now update.

  v1.2 (17/04/2026)
    - Added league-tables injection (trimmed summary): champions, promoted,
      relegated, and notable drama notes for every season 1979-80 onwards,
      across all three divisions. Full per-row data trimmed client-side at
      load to keep system-prompt size sane (~90% size reduction).
    - Injected today's date into system prompt so "last season", "this season"
      etc resolve correctly. Previously Claudio didn't know the current date.
    - Staff directory now includes line-manager resolution: each staff row
      shows their resolved line manager / approver name (not UIDs).
    - Current user block now includes their own org, role, email, and resolved
      line manager — so questions like "who's my line manager?" work.
    - Softened "no live data" guardrail: Claudio can now answer common football
      knowledge questions from its own knowledge (who won in year X, famous
      moments etc), only refusing when asked to fabricate specific recent
      match data it cannot verify.

  v1.1 (17/04/2026)
    - Added historical context injection: fetches rich clubs-meta (phoenix/merger/
      nicknames/first-season) and season-notes (points deductions, expulsions,
      reprieves, format history) from the thenationalleague/site repo.
    - Both files fetched once per session, cached in JS memory, injected into
      system prompt. Prompt caching means ~0.4p extra cost per session total.
    - NOT fetching results.json (too large — deferred to v2 with tool-use).
    - Graceful fallback: if fetches fail, Claudio still works with the basic
      72-club list and staff directory.

  v1.0 (17/04/2026)
    - Initial MVP. Chat UI, per-user conversation history isolated in RTDB,
      prompt caching on system prompt, Haiku 4.5 model, daily message cap,
      cost-per-message display, staff directory + clubs injected as context.
-->

  <style>
    @font-face {
      font-family: "carbona-variable";
      src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
           url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
      font-display: swap; font-style: normal; font-weight: 200 900; font-stretch: normal;
    }

    :root {
      --primary:     #9e0000;
      --primary-dim: #7a0000;
      --navy:        #223b7c;
      --navy-mid:    #1a2f63;
      --navy-light:  #2a4a8c;
      --red:         #c0392b;
      --red-light:   #fdf0ef;
      --green:       #1e7e34;
      --green-light: #edf7ee;
      --amber:       #e67e22;
      --amber-light: #fef6ec;
      --white:       #ffffff;
      --off-white:   #f4f6f9;
      --text:        #1a2a44;
      --text-muted:  #5a6a82;
      --border:      #dde3ed;
      --radius:      6px;
      --shadow:      0 2px 12px rgba(10,22,40,0.10);
      --font:        'carbona-variable','carbona',sans-serif;
      --font-claudio: 'ltc-italian-old-style-pro', 'Lora', Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }
    body {
      font-family: var(--font); font-size: 17px; line-height: 1.5;
      font-variation-settings: 'wght' 400;
      color: var(--text); background: var(--off-white);
      overflow: hidden;
    }

    /* ===== Topbar ===== */
    
    
    
    
    
    .topbar__meta {
      display: flex; align-items: center; gap: 12px;
      font-size: 11px; font-weight: 700; font-variation-settings: 'wght' 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.85);
    }
    .topbar__meta-item { display: flex; align-items: center; gap: 6px; }
    .topbar__meta-num { color: var(--white); font-weight: 900; font-variation-settings: 'wght' 900; font-size: 13px; }
    
    

    /* ===== Main layout: sidebar + chat ===== */
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 72px);
      overflow: hidden;
    }

    /* ===== Sidebar (conversation list) ===== */
    .sidebar {
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar__head {
      padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .btn-new {
      flex: 1;
      background: var(--navy); color: var(--white); border: none;
      padding: 10px 14px; border-radius: var(--radius);
      font-family: var(--font); font-size: 12px;
      font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-new:hover { background: var(--navy-mid); }
    .sidebar__list {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    .conv-item {
      padding: 12px 14px; border-radius: var(--radius); cursor: pointer;
      margin-bottom: 4px; position: relative;
      transition: background 0.15s; border: 1px solid transparent;
    }
    .conv-item:hover { background: var(--off-white); }
    .conv-item.active { background: var(--off-white); border-color: var(--border); }
    .conv-item__title {
      font-size: 14px; font-weight: 600; font-variation-settings: 'wght' 600;
      color: var(--text); overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; padding-right: 24px;
    }
    .conv-item__time {
      font-size: 11px; color: var(--text-muted);
      font-weight: 600; font-variation-settings: 'wght' 600;
      margin-top: 2px;
    }
    .conv-item__del {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 22px; height: 22px; border: none; background: none;
      font-size: 16px; color: var(--text-muted); cursor: pointer;
      border-radius: 4px; opacity: 0; transition: opacity 0.15s;
      line-height: 1;
    }
    .conv-item:hover .conv-item__del { opacity: 1; }
    .conv-item__del:hover { background: var(--red-light); color: var(--red); }

    .sidebar__empty {
      padding: 32px 16px; text-align: center;
      color: var(--text-muted); font-size: 13px;
    }

    /* ===== Chat main ===== */
    .chat {
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
      background: var(--off-white);
    }
    .chat__scroll {
      flex: 1; overflow-y: auto;
      padding: 32px 0;
    }
    .chat__inner {
      max-width: 820px; margin: 0 auto; padding: 0 24px;
    }

    /* ===== Welcome screen ===== */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 40px 20px;
    }
    .welcome__avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--navy); color: var(--white);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 900; font-variation-settings: 'wght' 900;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .welcome__title {
      font-size: 28px; font-weight: 900; font-variation-settings: 'wght' 900;
      color: var(--text); margin-bottom: 8px;
    }
    .welcome__sub {
      font-size: 15px; color: var(--text-muted);
      max-width: 520px; margin-bottom: 28px;
    }
    .welcome__prompts {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; width: 100%; max-width: 560px;
    }
    @media (max-width: 600px) { .welcome__prompts { grid-template-columns: 1fr; } }
    .welcome__prompt {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      text-align: left; cursor: pointer;
      font-family: var(--font); font-size: 14px;
      color: var(--text); transition: all 0.15s;
    }
    .welcome__prompt:hover {
      border-color: var(--navy); box-shadow: var(--shadow);
    }
    .welcome__prompt strong {
      display: block; font-weight: 800; font-variation-settings: 'wght' 800;
      color: var(--navy); font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 4px;
    }

    /* ===== Messages ===== */
    .msg {
      display: flex; gap: 14px; margin-bottom: 20px;
      animation: msgIn 0.25s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg__avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; font-variation-settings: 'wght' 900;
      color: var(--white);
    }
    .msg__avatar--user { background: var(--primary); }
    .msg__avatar--ai   { background: var(--navy); }
    .msg__body { flex: 1; min-width: 0; }
    .msg__name {
      font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 4px;
    }
    .msg__text {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      font-size: 15px; line-height: 1.55;
      color: var(--text);
      overflow-wrap: break-word; word-wrap: break-word;
      white-space: pre-wrap;
    }
    /* Claudio speaks in LTC Italian Old Style — a literary, warm serif.
       Only applies to assistant bubbles; user bubbles stay in carbona.
       Note: the serif sits differently on the baseline than carbona, so
       we bump font-size slightly to match visual weight. */
    .msg--ai .msg__text {
      font-family: var(--font-claudio);
      font-size: 17px;
      line-height: 1.5;
      font-weight: 400;
    }
    .msg--ai .msg__text em,
    .msg--ai .msg__text i {
      font-style: italic;
      font-weight: 400;
    }
    .msg--ai .msg__text strong,
    .msg--ai .msg__text b {
      font-weight: 700;
    }
    /* Draft blocks — anything Claudio generates for onward use
       (emails, letters, comms) renders in a distinct block that:
       1) uses carbona (clean NL voice, not Italian-inflected)
       2) is visually separated so the user knows it's copy-paste content
       3) has a subtle header and copy affordance
       This is rendered via the lightweight markdown-ish parser in renderClaudioText(). */
    .msg__draft {
      margin: 12px 0 4px;
      background: var(--off-white);
      border: 1px solid var(--border);
      border-left: 3px solid var(--navy);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      white-space: pre-wrap;
      font-weight: 400;
      font-variation-settings: 'wght' 400;
    }
    .msg__draft-label {
      display: block;
      margin-bottom: 8px;
      font-family: var(--font);
      font-size: 10px;
      font-weight: 800;
      font-variation-settings: 'wght' 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .msg__draft-copy {
      float: right;
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 8px;
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      font-variation-settings: 'wght' 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .msg__draft-copy:hover {
      background: var(--navy);
      color: var(--white);
      border-color: var(--navy);
    }
    .msg--user .msg__text {
      background: #eef3ff; border-color: #d1def5;
    }
    .msg__cost {
      margin-top: 6px; display: flex; gap: 10px;
      font-size: 11px; color: var(--text-muted);
      font-weight: 700; font-variation-settings: 'wght' 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      opacity: 0;
      animation: costIn 0.6s ease 0.3s forwards;
    }
    @keyframes costIn { to { opacity: 1; } }
    .msg__cost-num {
      color: var(--navy); font-weight: 900; font-variation-settings: 'wght' 900;
    }

    /* Tool-call chips — shown on assistant messages that used tools */
    .msg__tools {
      margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px;
      align-items: center;
      font-size: 11px;
    }
    .msg__tools-label {
      color: var(--text-muted);
      font-weight: 700; font-variation-settings: 'wght' 700;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .msg__tool-chip {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(30, 58, 138, 0.08);
      color: var(--navy);
      border-radius: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      font-weight: 600;
    }

    /* Typing indicator */
    .typing {
      display: flex; gap: 14px; margin-bottom: 20px;
    }
    .typing__dots {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      display: flex; gap: 5px;
    }
    .typing__dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      animation: typingPulse 1.2s ease infinite;
    }
    .typing__dot:nth-child(2) { animation-delay: 0.15s; }
    .typing__dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingPulse {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* ===== Composer ===== */
    .composer {
      background: var(--white); border-top: 1px solid var(--border);
      padding: 16px 24px;
    }
    .composer__inner {
      max-width: 820px; margin: 0 auto;
      display: flex; gap: 10px; align-items: flex-end;
    }
    .composer__input {
      flex: 1;
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px; font-size: 15px;
      font-family: var(--font); font-variation-settings: 'wght' 400;
      color: var(--text); background: var(--white);
      resize: none; min-height: 46px; max-height: 200px;
      line-height: 1.4; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .composer__input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(158,0,0,0.10);
    }
    .composer__input:disabled {
      background: var(--off-white); color: var(--text-muted); cursor: not-allowed;
    }
    .composer__send {
      background: var(--primary); color: var(--white); border: none;
      padding: 0 22px; height: 46px; border-radius: var(--radius);
      font-family: var(--font); font-size: 12px;
      font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      cursor: pointer; transition: background 0.15s;
      flex-shrink: 0;
    }
    .composer__send:hover:not(:disabled) { background: var(--primary-dim); }
    .composer__send:disabled {
      background: var(--text-muted); opacity: 0.5; cursor: not-allowed;
    }
    .composer__hint {
      max-width: 820px; margin: 6px auto 0;
      font-size: 11px; color: var(--text-muted);
      text-align: center;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--navy); color: var(--white);
      padding: 12px 18px; border-radius: var(--radius);
      font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 999; transform: translateY(80px); opacity: 0;
      transition: all 0.25s ease; max-width: 320px; pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid var(--green); }
    .toast.error   { border-left: 4px solid var(--red); }

    /* ===== Mobile ===== */
    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .sidebar.open { display: flex; position: fixed; top: 72px; left: 0; width: 85vw; height: calc(100vh - 72px); z-index: 50; box-shadow: 4px 0 20px rgba(0,0,0,0.15); }
      .topbar__meta { display: none; }
      
      .composer { padding: 12px 16px; }
      .chat__inner { padding: 0 16px; }
    }
    .menu-toggle {
      display: none;
      background: none; border: 1px solid rgba(255,255,255,0.3); color: var(--white);
      width: 36px; height: 36px; border-radius: var(--radius);
      cursor: pointer; font-size: 18px;
    }
    @media (max-width: 720px) { .menu-toggle { display: flex; align-items: center; justify-content: center; } }
  
/* ── Standard NL Tools Topbar (see nl-brand skill) ─────────────────────── */
.topbar {
  background: var(--primary);
  color: var(--white);
  padding: 0 20px;
  height: 72px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  border-bottom: 7px solid var(--navy);
  width: 100%;
  box-sizing: border-box;
}
.topbar__logo {
  height: 42px;
  flex-shrink: 0;
}
.topbar__title-wrap {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  line-height: 1;
  gap: 3px;
}
.topbar__title {
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  font-size: 20px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar__kicker {
  font-size: 9px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.6);
  white-space: nowrap;
}
.topbar__user {
  font-size: 13px;
  color: rgba(255,255,255,0.8);
  font-weight: 600;
  font-variation-settings: 'wght' 600;
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar__btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: var(--white);
  padding: 7px 14px;
  border-radius: var(--radius);
  font-size: 11px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar__btn:hover { background: rgba(255,255,255,0.12); }
.topbar__btn--icon {
  padding: 7px 10px;
  font-size: 14px;
}
/* Mobile: hide user name, icon-only Portal. Kicker stays visible. */
@media (max-width: 700px) {
  .topbar { padding: 0 14px; gap: 10px; }
  .topbar__user { display: none; }
  .topbar__btn-text-portal { display: none; }
  .topbar__btn--portal { padding: 7px 10px; }
  .topbar__title { font-size: 17px; }
}

<body>
  <div id="pageWrap" style="display:none;">

    <header class="topbar">
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle conversations">☰</button>
  <img class="topbar__logo"
    src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png"
    alt="National League"
    onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
  <div class="topbar__title-wrap">
    <span class="topbar__title">Claudio</span>
    <span class="topbar__kicker">NL Tools</span>
  </div>
  <div class="topbar__meta">
    <div class="topbar__meta-item" id="dailyMeta" title="Messages used today">
      <span class="topbar__meta-num" id="dailyCount">0</span>
      <span>/ <span id="dailyLimit">50</span> today</span>
    </div>
    <div class="topbar__meta-item" id="costMeta" title="Your cost today">
      <span class="topbar__meta-num" id="costToday">0.00p</span>
      <span>today</span>
    </div>
  </div>
  <span class="topbar__user" id="topbarUser"></span>
  <a href="/tools/portal/" class="topbar__btn topbar__btn--portal" aria-label="Back to portal">
    <span>←</span><span class="topbar__btn-text-portal">Portal</span>
  </a>
  <button class="topbar__btn" id="signOutBtn">Sign out</button>
</header>

    <div class="app">
      <!-- Sidebar: conversation list -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__head">
          <button class="btn-new" id="btnNew">New chat</button>
        </div>
        <div class="sidebar__list" id="convList">
          <div class="sidebar__empty">No conversations yet. Start one below.</div>
        </div>
      </aside>

      <!-- Chat area -->
      <main class="chat">
        <div class="chat__scroll" id="chatScroll">
          <div class="chat__inner" id="chatInner">
            <!-- Welcome screen rendered here by default -->
          </div>
        </div>

        <div class="composer">
          <div class="composer__inner">
            <textarea
              id="composerInput"
              class="composer__input"
              placeholder="Ask Claudio anything…"
              rows="1"></textarea>
            <button class="composer__send" id="btnSend">Send</button>
          </div>
          <div class="composer__hint">
            Claudio knows NL staff and clubs. Don't share sensitive personal data.
            Messages are private to you.
          </div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    // =========================================================================
    // CONSTANTS
    // =========================================================================
    var NL_GAS_URL = 'https://script.google.com/macros/s/AKfycbyHutd1esz1kykMR5aLXBkgXY2LPC-CzhUWOLBAFjhN-6XCPlxocQ1N9BAoCpE6cdof/exec';
    var CLUBS_META_URL = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/data/clubs-meta.json';

    // Historical context files — fetched from the 'site' repo (not 'tools').
    // These are DIFFERENT to the current-72-clubs list above. They contain
    // rich historical metadata (phoenix/merger/nicknames/first-season) and
    // season notes (points deductions, expulsions, reprieves, format history).
    // Injected into Claudio's system prompt for historical awareness.
    var SITE_CLUBS_META_URL    = 'https://raw.githubusercontent.com/thenationalleague/site/refs/heads/main/clubs-meta.json';
    var SITE_SEASON_NOTES_URL  = 'https://raw.githubusercontent.com/thenationalleague/site/refs/heads/main/season-notes.json';
    var SITE_LEAGUE_TABLES_URL = 'https://raw.githubusercontent.com/thenationalleague/site/refs/heads/main/league-tables.json';
    // results.json deliberately NOT fetched — too large (~500k+ tokens).
    // Deferred to v2 with tool-use for on-demand match lookups.
    // league-tables.json IS fetched but trimmed client-side at load time
    // (champions/promoted/relegated/drama only — not full standings).

    // How many past messages to send back to Claudio per request.
    // Keeps long conversations cheap — older context is dropped.
    var HISTORY_WINDOW = 15;

    // =========================================================================
    // STATE
    // =========================================================================
    var STATE = {
      session:   null,
      db:        null,
      clubs:     [],
      staff:     [],
      historicalContext: null,  // { clubsMeta, seasonNotes, leagueTables } from site repo — injected into system prompt
      convs:     [],       // list of conversations, sorted newest first
      activeId:  null,     // currently-open conversation ID
      messages:  [],       // messages in active conversation
      sending:   false,    // guard to prevent double-send
      dailyLimit: 50,
      dailyCount: 0,
      costTodayPence: 0
    };

    // =========================================================================
    // BOOT — called by auth-guard once session is confirmed
    // =========================================================================

/* Standard topbar wiring — set user name and bind sign out */
function wireTopbar(session) {
  var userEl = document.getElementById('topbarUser');
  if (userEl) userEl.textContent = session && (session.name || session.email) || '';
  var btn = document.getElementById('signOutBtn');
  if (btn) {
    btn.addEventListener('click', function() {
      firebase.auth().signOut().then(function() { window.location.replace('/tools/'); });
    });
  }
}

    window.nlAuthReady = function(session) {
      STATE.session = session;
      STATE.db      = firebase.database();
      document.getElementById('pageWrap').style.display = 'block';

      // Load staff directory + clubs + historical context in parallel.
      // Historical context fetches are wrapped to never reject — if they fail,
      // Claudio still boots and works, just without the rich history.
      Promise.all([loadClubs(), loadStaff(), loadHistoricalContext()])
        .then(function() {
          return Promise.all([loadConversations(), loadDailyUsage()]);
        })
        .then(function() {
          renderWelcome();
          renderConvList();
          wireUI();
        })
        .catch(function(err) {
          console.error('Boot failed', err);
          showToast('Failed to load. Please refresh.', 'error');
        });
    };

    // =========================================================================
    // DATA LOADING
    // =========================================================================
    function loadClubs() {
      return fetch(CLUBS_META_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          STATE.clubs = (data && data.clubs) ? data.clubs : [];
        })
        .catch(function() { STATE.clubs = []; });
    }

    function loadHistoricalContext() {
      // Fetches clubs-meta, season-notes, and league-tables from the 'site' repo.
      // Never rejects — if any fail, STATE.historicalContext stays null/partial and
      // the system prompt simply omits that section. Claudio still works fine.
      //
      // Browsers cache the raw.githubusercontent response aggressively thanks to
      // GitHub's CDN headers, so repeat loads in the same day are essentially free.
      //
      // league-tables.json is LARGE (every team every season since 1979-80). We
      // trim it client-side to champions/promoted/relegated/drama only — keeps
      // the system prompt payload ~10% of the raw file size while preserving
      // the most useful info for Claudio to answer "who won season X" questions.
      var fetchJson = function(url) {
        return fetch(url)
          .then(function(r) { return r.ok ? r.json() : null; })
          .catch(function() { return null; });
      };
      return Promise.all([
        fetchJson(SITE_CLUBS_META_URL),
        fetchJson(SITE_SEASON_NOTES_URL),
        fetchJson(SITE_LEAGUE_TABLES_URL)
      ])
        .then(function(arr) {
          var clubsMeta     = arr[0];
          var seasonNotes   = arr[1];
          var leagueTables  = arr[2] ? trimLeagueTables(arr[2]) : null;
          if (clubsMeta || seasonNotes || leagueTables) {
            STATE.historicalContext = {
              clubsMeta:    clubsMeta,
              seasonNotes:  seasonNotes,
              leagueTables: leagueTables
            };
          }
        })
        .catch(function() { /* swallow — not fatal */ });
    }

    // Reduces the league-tables file from full standings to a compact
    // season-by-season summary. For each division in each season we keep:
    //   - champion (top row with 'champion' class)
    //   - promotedViaPlayoff (rows with 'promoted' class but NOT champion)
    //   - playoffFinalists (rows with 'playoff' class — lost in final)
    //   - relegated (rows with 'relegated' class)
    //   - folded / expelled (rows with those classes)
    //   - note (the per-division drama note, if any)
    // Everything else (mid-table teams, detailed stats) is dropped.
    function trimLeagueTables(full) {
      if (!full || !full.seasons) return null;
      var out = { seasons: [] };
      full.seasons.forEach(function(s) {
        if (!s || !s.divisions) return;
        var divs = {};
        Object.keys(s.divisions).forEach(function(divKey) {
          var div = s.divisions[divKey];
          if (!div) return;
          var rows = Array.isArray(div.rows) ? div.rows : [];
          var summary = {
            title: div.title || divKey
          };
          if (div.note) summary.note = div.note;
          rows.forEach(function(r) {
            if (!r) return;
            var cls = Array.isArray(r.classes) ? r.classes : [];
            var team = r.team || r.entity;
            if (cls.indexOf('champion') !== -1) {
              summary.champion = { team: team, entity: r.entity, pts: r.Pts };
            }
            if (cls.indexOf('promoted') !== -1 && cls.indexOf('champion') === -1) {
              summary.promotedViaPlayoff = { team: team, entity: r.entity, pos: r.pos };
            }
            if (cls.indexOf('playoff') !== -1) {
              if (!summary.playoffTeams) summary.playoffTeams = [];
              summary.playoffTeams.push({ team: team, entity: r.entity, pos: r.pos });
            }
            if (cls.indexOf('relegated') !== -1) {
              if (!summary.relegated) summary.relegated = [];
              summary.relegated.push({ team: team, entity: r.entity, pos: r.pos });
            }
            if (cls.indexOf('folded') !== -1) {
              if (!summary.folded) summary.folded = [];
              summary.folded.push({ team: team, entity: r.entity });
            }
            if (cls.indexOf('expelled') !== -1) {
              if (!summary.expelled) summary.expelled = [];
              summary.expelled.push({ team: team, entity: r.entity });
            }
          });
          divs[divKey] = summary;
        });
        out.seasons.push({ season: s.season, divisions: divs });
      });
      return out;
    }

    function loadStaff() {
      // Staff directory — names, roles, orgs, job titles, line-manager links.
      // Public within NL staff context. We need uid + lineManagerUid + approverUid
      // so we can resolve manager names for "who's my line manager?" questions.
      // Email included so Claudio can recognise staff when user types an email.
      return ensureAuth().then(function() {
        return STATE.db.ref('users').once('value');
      }).then(function(snap) {
        var users = snap.val() || {};
        var arr = [];
        Object.keys(users).forEach(function(uid) {
          var u = users[uid] || {};
          // Only include NL staff (not club users) — that's who Claudio talks about
          if (u.role === 'club') return;
          arr.push({
            uid:             uid,
            name:            u.name || '',
            email:           u.email || '',
            role:            u.role || '',
            org:             u.org || '',
            jobTitle:        u.jobTitle || '',
            lineManagerUid:  u.lineManagerUid || '',
            approverUid:     u.approverUid || ''
          });
        });
        STATE.staff = arr;
      }).catch(function() { STATE.staff = []; });
    }

    // Given a UID, find the matching staff member's name. Returns '' if not found.
    // Used when resolving lineManagerUid / approverUid into human-readable names.
    function resolveStaffName(uid) {
      if (!uid) return '';
      for (var i = 0; i < STATE.staff.length; i++) {
        if (STATE.staff[i].uid === uid) return STATE.staff[i].name;
      }
      return '';
    }

    function loadConversations() {
      return ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid).once('value');
      }).then(function(snap) {
        var obj = snap.val() || {};
        var arr = [];
        Object.keys(obj).forEach(function(cid) {
          var c = obj[cid];
          if (!c) return;
          arr.push({
            id:       cid,
            title:    c.title || 'Untitled chat',
            updated:  c.updated || 0,
            created:  c.created || 0
          });
        });
        arr.sort(function(a, b) { return (b.updated || 0) - (a.updated || 0); });
        STATE.convs = arr;
      }).catch(function(err) {
        console.error('loadConversations failed', err);
        STATE.convs = [];
      });
    }

    function loadDailyUsage() {
      var today = todayKey();
      return ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/usage/' + STATE.session.uid + '/' + today).once('value');
      }).then(function(snap) {
        var u = snap.val() || {};
        STATE.dailyCount     = u.count || 0;
        STATE.costTodayPence = u.cost_pence || 0;
        updateMetaUI();
      }).catch(function() { /* ignore — will show 0 */ });
    }

    // =========================================================================
    // ensureAuth() — see nl-tools skill
    // =========================================================================
    function ensureAuth() {
      return new Promise(function(resolve, reject) {
        var unsub = firebase.auth().onAuthStateChanged(function(u) {
          unsub();
          if (u) resolve(u);
          else   reject(new Error('Not authenticated — please reload and try again.'));
        });
      });
    }

    // =========================================================================
    // UI — welcome screen
    // =========================================================================
    function renderWelcome() {
      var el = document.getElementById('chatInner');
      clearChildren(el);

      var w = document.createElement('div');
      w.className = 'welcome';

      var avatar = document.createElement('div');
      avatar.className = 'welcome__avatar';
      avatar.textContent = 'C';
      w.appendChild(avatar);

      var title = document.createElement('div');
      title.className = 'welcome__title';
      title.textContent = 'Hello ' + firstName(STATE.session.name) + '. I\'m Claudio.';
      w.appendChild(title);

      var sub = document.createElement('div');
      sub.className = 'welcome__sub';
      sub.textContent = 'Your NL assistant. I know the staff, the 72 clubs, and how things work here. Ask me anything — or start with one of these.';
      w.appendChild(sub);

      var prompts = document.createElement('div');
      prompts.className = 'welcome__prompts';

      var suggestions = [
        { label: 'Draft an email',    text: 'Help me draft an email to ' },
        { label: 'Who handles...',    text: 'Who at NL handles ' },
        { label: 'Summarise text',    text: 'Summarise this for me:\n\n' },
        { label: 'Clubs in a league', text: 'Which clubs are in the National League North?' }
      ];
      suggestions.forEach(function(s) {
        var b = document.createElement('button');
        b.className = 'welcome__prompt';
        b.type = 'button';
        var strong = document.createElement('strong');
        strong.textContent = s.label;
        b.appendChild(strong);
        b.appendChild(document.createTextNode(s.text));
        b.addEventListener('click', function() {
          document.getElementById('composerInput').value = s.text;
          document.getElementById('composerInput').focus();
          // Move cursor to end
          var inp = document.getElementById('composerInput');
          inp.selectionStart = inp.selectionEnd = inp.value.length;
        });
        prompts.appendChild(b);
      });
      w.appendChild(prompts);

      el.appendChild(w);
    }

    // =========================================================================
    // UI — conversation list (sidebar)
    // =========================================================================
    function renderConvList() {
      var list = document.getElementById('convList');
      clearChildren(list);

      if (!STATE.convs.length) {
        var empty = document.createElement('div');
        empty.className = 'sidebar__empty';
        empty.textContent = 'No conversations yet. Start one below.';
        list.appendChild(empty);
        return;
      }

      STATE.convs.forEach(function(c) {
        var item = document.createElement('div');
        item.className = 'conv-item' + (c.id === STATE.activeId ? ' active' : '');

        var title = document.createElement('div');
        title.className = 'conv-item__title';
        title.textContent = c.title;

        var time = document.createElement('div');
        time.className = 'conv-item__time';
        time.textContent = relTime(c.updated || c.created);

        var del = document.createElement('button');
        del.className = 'conv-item__del';
        del.type = 'button';
        del.textContent = '×';
        del.title = 'Delete conversation';
        del.addEventListener('click', function(e) {
          e.stopPropagation();
          if (confirm('Delete this conversation? This can\'t be undone.')) {
            deleteConversation(c.id);
          }
        });

        item.appendChild(title);
        item.appendChild(time);
        item.appendChild(del);
        item.addEventListener('click', function() { openConversation(c.id); });

        list.appendChild(item);
      });
    }

    // =========================================================================
    // UI — chat messages
    // =========================================================================
    function renderMessages() {
      var el = document.getElementById('chatInner');
      clearChildren(el);

      if (!STATE.messages.length) {
        renderWelcome();
        return;
      }

      STATE.messages.forEach(function(m) {
        el.appendChild(buildMsgEl(m));
      });
      scrollToBottom();
    }

    // Render Claudio's text, splitting out code blocks as distinct
    // "draft" blocks that use the NL-standard carbona font rather than the
    // Italian serif of his chat voice. This keeps his chatter expressive
    // but ensures anything he generates for onward delivery (emails,
    // letters, comms) lands in a clean NL voice the user can copy-paste.
    //
    // Parser handles:
    //   - fenced code blocks (```...```), with or without a language tag
    //   - simple **bold** and *italic* / _italic_ in the chat portions
    //   - everything else passes through as plain text (white-space: pre-wrap)
    //
    // Drafts get a "DRAFT" label and a copy-to-clipboard button. Copy button
    // writes the exact draft body (no label, no preamble) to the clipboard.
    function renderClaudioText(container, content) {
      clearChildren(container);
      var src = String(content || '');
      // Split on fenced code blocks. Using a permissive regex: allows
      // optional language hint (```email), tolerates CRLF, keeps content verbatim.
      var parts = src.split(/```([a-zA-Z0-9_-]*)\n([\s\S]*?)```/);
      // parts alternates: [text, lang, code, text, lang, code, ...]
      for (var i = 0; i < parts.length; i++) {
        if (i % 3 === 0) {
          // Text chunk
          var chunk = parts[i];
          if (!chunk) continue;
          var textNode = document.createElement('span');
          renderInlineFormatting(textNode, chunk);
          container.appendChild(textNode);
        } else if (i % 3 === 2) {
          // Code chunk (i%3===1 is the lang tag, ignored here but available)
          var code = parts[i];
          if (code == null) continue;
          container.appendChild(buildDraftBlock(code.replace(/\s+$/, '')));
        }
      }
      // Edge case: no code block at all — the split produced a single element
      if (parts.length === 1 && !container.childNodes.length) {
        renderInlineFormatting(container, src);
      }
    }

    // Very light inline formatting: **bold** and *italic*/_italic_.
    // Everything else is plain text. No links, no headings, no lists — those
    // rarely appear in chat and would complicate the Italian-font rendering.
    function renderInlineFormatting(container, text) {
      // Split on bold, then italic, creating a flat sequence of nodes.
      // Use textContent throughout so we never inject raw HTML.
      var tokens = [{ t: 'text', v: text }];
      // Bold pass
      tokens = expandTokens(tokens, /\*\*([^*]+)\*\*/g, 'strong');
      // Italic pass — avoid matching the ** already consumed by using \*(?!\*)
      tokens = expandTokens(tokens, /(?:^|[^*])\*([^*\n]+)\*(?!\*)/g, 'em-guarded');
      // Underscore italic pass — _foo_ but not inside words
      tokens = expandTokens(tokens, /(^|\s)_([^_\n]+)_(?=\s|[.,;:!?)\]]|$)/g, 'em-under');

      for (var i = 0; i < tokens.length; i++) {
        var tk = tokens[i];
        if (tk.t === 'text') {
          container.appendChild(document.createTextNode(tk.v));
        } else if (tk.t === 'strong') {
          var s = document.createElement('strong');
          s.textContent = tk.v;
          container.appendChild(s);
        } else if (tk.t === 'em') {
          var e = document.createElement('em');
          e.textContent = tk.v;
          container.appendChild(e);
        }
      }
    }

    // Run a regex over the token list, splitting text tokens where it matches
    // and inserting a new token of the given type for the capture group.
    function expandTokens(tokens, regex, kind) {
      var out = [];
      for (var i = 0; i < tokens.length; i++) {
        var tk = tokens[i];
        if (tk.t !== 'text') { out.push(tk); continue; }
        var str = tk.v;
        var last = 0;
        var m;
        regex.lastIndex = 0;
        while ((m = regex.exec(str)) !== null) {
          if (kind === 'em-guarded') {
            // The italic regex includes the char before * in the match
            // to avoid matching **. That char is not part of the italic.
            var prefixChar = m[0].charAt(0) === '*' ? '' : m[0].charAt(0);
            var start = m.index + (prefixChar ? 1 : 0);
            if (start > last) out.push({ t: 'text', v: str.slice(last, start) });
            out.push({ t: 'em', v: m[1] });
            last = regex.lastIndex;
          } else if (kind === 'em-under') {
            // Underscore regex includes leading whitespace in group 1, preserve it
            var leader = m[1] || '';
            var chunkStart = m.index + leader.length;
            if (chunkStart > last) out.push({ t: 'text', v: str.slice(last, chunkStart) });
            out.push({ t: 'em', v: m[2] });
            last = regex.lastIndex;
          } else {
            // Plain — m[0] is the whole match, m[1] is the content
            if (m.index > last) out.push({ t: 'text', v: str.slice(last, m.index) });
            out.push({ t: kind, v: m[1] });
            last = regex.lastIndex;
          }
          if (regex.lastIndex === m.index) regex.lastIndex++; // safety
        }
        if (last < str.length) out.push({ t: 'text', v: str.slice(last) });
      }
      return out;
    }

    // Build a styled "draft" block with label and copy button.
    function buildDraftBlock(code) {
      var block = document.createElement('div');
      block.className = 'msg__draft';

      var label = document.createElement('span');
      label.className = 'msg__draft-label';
      label.textContent = 'Draft';

      var copy = document.createElement('button');
      copy.className = 'msg__draft-copy';
      copy.type = 'button';
      copy.textContent = 'Copy';
      copy.addEventListener('click', function() {
        // Use the clipboard API where available, fall back to execCommand.
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(code).then(function() {
            copy.textContent = 'Copied';
            setTimeout(function() { copy.textContent = 'Copy'; }, 1500);
          }).catch(function() {
            showToast('Could not copy to clipboard', 'error');
          });
        } else {
          // Fallback: select + execCommand
          var ta = document.createElement('textarea');
          ta.value = code;
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch(e) {}
          document.body.removeChild(ta);
          copy.textContent = 'Copied';
          setTimeout(function() { copy.textContent = 'Copy'; }, 1500);
        }
      });

      label.appendChild(copy);
      block.appendChild(label);

      var body = document.createElement('div');
      body.textContent = code;
      block.appendChild(body);

    function buildMsgEl(m) {
      var wrap = document.createElement('div');
      wrap.className = 'msg ' + (m.role === 'user' ? 'msg--user' : 'msg--ai');

      var avatar = document.createElement('div');
      avatar.className = 'msg__avatar ' + (m.role === 'user' ? 'msg__avatar--user' : 'msg__avatar--ai');
      avatar.textContent = m.role === 'user' ? (firstName(STATE.session.name).charAt(0).toUpperCase() || 'Y') : 'C';

      var body = document.createElement('div');
      body.className = 'msg__body';

      var name = document.createElement('div');
      name.className = 'msg__name';
      name.textContent = m.role === 'user' ? 'You' : 'Claudio';

      var text = document.createElement('div');
      text.className = 'msg__text';
      if (m.role === 'assistant') {
        renderClaudioText(text, m.content || '');
      } else {
        text.textContent = m.content;
      }

      body.appendChild(name);
      body.appendChild(text);

      // Tool-call chips on assistant messages — show which tools were invoked
      if (m.role === 'assistant' && m.tool_calls && m.tool_calls.length) {
        var toolsRow = document.createElement('div');
        toolsRow.className = 'msg__tools';
        var toolLabel = document.createElement('span');
        toolLabel.className = 'msg__tools-label';
        toolLabel.textContent = '🔍 Looked up: ';
        toolsRow.appendChild(toolLabel);
        for (var t = 0; t < m.tool_calls.length; t++) {
          var chip = document.createElement('span');
          chip.className = 'msg__tool-chip';
          chip.textContent = m.tool_calls[t].name;
          toolsRow.appendChild(chip);
        }
        body.appendChild(toolsRow);
      }

      // Cost tag on assistant messages only
      if (m.role === 'assistant' && m.cost_pence != null) {
        var cost = document.createElement('div');
        cost.className = 'msg__cost';

        var costNum = document.createElement('span');
        costNum.className = 'msg__cost-num';
        costNum.textContent = formatPence(m.cost_pence);

        var costLabel = document.createElement('span');
        costLabel.textContent = '• ' + (m.tokens || 0) + ' tokens';

        cost.appendChild(costNum);
        cost.appendChild(costLabel);
        body.appendChild(cost);

        // Animated count-up on first render
        animateCountUp(costNum, 0, m.cost_pence, 400);
      }

      wrap.appendChild(avatar);
      wrap.appendChild(body);
      return wrap;
    }

    function addTypingIndicator() {
      var el = document.getElementById('chatInner');
      var wrap = document.createElement('div');
      wrap.className = 'typing';
      wrap.id = 'typingIndicator';

      var avatar = document.createElement('div');
      avatar.className = 'msg__avatar msg__avatar--ai';
      avatar.textContent = 'C';

      var dots = document.createElement('div');
      dots.className = 'typing__dots';
      for (var i = 0; i < 3; i++) {

        d.className = 'typing__dot';
        dots.appendChild(d);

      wrap.appendChild(dots);

    // =========================================================================
    // CONVERSATIONS — open, new, delete
    // =========================================================================
    function openConversation(cid) {
      STATE.activeId = cid;
      renderConvList();

      ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid + '/messages').once('value');
      }).then(function(snap) {
        var obj = snap.val() || {};
        var arr = [];
        Object.keys(obj).forEach(function(mid) {
          var m = obj[mid];
          if (!m) return;
          // Mark existing messages so animations don't replay
          m._loaded = true;
          arr.push(m);
        });
        arr.sort(function(a, b) { return (a.ts || 0) - (b.ts || 0); });
        STATE.messages = arr;
        renderMessages();
      }).catch(function(err) {
        console.error('openConversation failed', err);
        showToast('Couldn\'t open that chat.', 'error');
      });
    }

    function startNewConversation() {
      STATE.activeId = null;
      STATE.messages = [];
      renderConvList();
      renderWelcome();
      document.getElementById('composerInput').focus();
    }

    function deleteConversation(cid) {
      ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid).remove();
      }).then(function() {
        STATE.convs = STATE.convs.filter(function(c) { return c.id !== cid; });
        if (STATE.activeId === cid) {
          STATE.activeId = null;
          STATE.messages = [];
          renderWelcome();
        }
        renderConvList();
        showToast('Conversation deleted.', 'success');
      }).catch(function(err) {
        console.error('deleteConversation failed', err);
        showToast('Couldn\'t delete that chat.', 'error');
      });
    }

    // =========================================================================
    // SEND — the core of the tool
    // =========================================================================
    function sendMessage() {
      if (STATE.sending) return;

      var input = document.getElementById('composerInput');
      var text  = input.value.trim();
      if (!text) return;

      if (STATE.dailyCount >= STATE.dailyLimit) {
        showToast('Daily limit reached. Resets at midnight.', 'error');
        return;
      }

      STATE.sending = true;
      setSendingUI(true);

      // If this is a new conversation, create it first
      var isNew = !STATE.activeId;
      var convId = STATE.activeId || ('c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8));

      // Build the user message locally
      var userMsg = {
        role:    'user',
        content: text,
        ts:      Date.now()
      };
      STATE.messages.push(userMsg);
      input.value = '';
      autoResize(input);

      // If opening welcome screen, switch to messages view
      if (STATE.messages.length === 1) {
        renderMessages();
      } else {
        document.getElementById('chatInner').appendChild(buildMsgEl(userMsg));
      }
      addTypingIndicator();

      // Build the request to GAS
      var systemPrompt = buildSystemPrompt();
      var apiMessages = STATE.messages.slice(-HISTORY_WINDOW).map(function(m) {
        return { role: m.role, content: m.content };
      });

      var reqBody = {
        action: 'claudio',
        uid: STATE.session.uid,
        system: systemPrompt,
        messages: apiMessages,
        cacheSystem: true
      };

      // First call: create the conv record in RTDB (so it appears in sidebar immediately)
      var createPromise = isNew
        ? saveConversationRecord(convId, deriveTitle(text))
        : Promise.resolve();

      createPromise
        .then(function() {
          STATE.activeId = convId;
          if (isNew) {
            STATE.convs.unshift({
              id: convId,
              title: deriveTitle(text),
              updated: Date.now(),
              created: Date.now()
            });
            renderConvList();
          }
          // Save user message to RTDB
          return saveMessageToRTDB(convId, userMsg);
        })
        .then(function() {
          // Call GAS → Anthropic
          return fetch(NL_GAS_URL + '?cb=' + Date.now(), {
            method:  'POST',
            headers: { 'Content-Type': 'text/plain' },
            body:    JSON.stringify(reqBody)
          });
        })
        .then(function(r) { return r.json(); })
        .then(function(result) {
          removeTypingIndicator();

          if (!result.ok) {
            // Remove the user message we optimistically pushed? No — keep it, user sent it.
            // Just show the error.
            showToast(result.error || 'Claudio couldn\'t respond.', 'error');
            STATE.sending = false;
            setSendingUI(false);
            return;
          }

          var aiMsg = {
            role:       'assistant',
            content:    result.reply || '',
            ts:         Date.now(),
            cost_pence: result.cost_pence || 0,
            tokens:     result.tokens
              ? ((result.tokens.input || 0) + (result.tokens.output || 0) + (result.tokens.cache_read || 0) + (result.tokens.cache_write || 0))
              : 0,
            tool_calls: result.tool_calls || []
          };
          STATE.messages.push(aiMsg);
          document.getElementById('chatInner').appendChild(buildMsgEl(aiMsg));
          scrollToBottom();

          // Update daily counters (from GAS response — source of truth)
          if (typeof result.count === 'number')      STATE.dailyCount = result.count;
          if (typeof result.cost_today === 'number') STATE.costTodayPence = result.cost_today;
          updateMetaUI();

          // Persist assistant message + bump conv updated timestamp
          saveMessageToRTDB(convId, aiMsg);
          bumpConversationTimestamp(convId);

          STATE.sending = false;
          setSendingUI(false);
        })
        .catch(function(err) {
          removeTypingIndicator();
          console.error('Send failed', err);
          showToast('Network error. Try again.', 'error');
          STATE.sending = false;
          setSendingUI(false);
        });
    }

    function setSendingUI(sending) {
      document.getElementById('composerInput').disabled = sending;
      document.getElementById('btnSend').disabled = sending;
      document.getElementById('btnSend').textContent = sending ? '...' : 'Send';
    }

    // =========================================================================
    // RTDB WRITES
    // =========================================================================
    function saveConversationRecord(cid, title) {
      return ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid).update({
          title:   title,
          created: firebase.database.ServerValue.TIMESTAMP,
          updated: firebase.database.ServerValue.TIMESTAMP
        });
      });
    }

    function saveMessageToRTDB(cid, msg) {
      return ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid + '/messages').push({
          role:       msg.role,
          content:    msg.content,
          ts:         msg.ts,
          cost_pence: msg.cost_pence || 0,
          tokens:     msg.tokens || 0,
          tool_calls: msg.tool_calls || null
        });
      });
    }

    function bumpConversationTimestamp(cid) {
      return ensureAuth().then(function() {
        return STATE.db.ref('app-data/staff-claudio/conversations/' + STATE.session.uid + '/' + cid + '/updated').set(firebase.database.ServerValue.TIMESTAMP);
      });
    }

      var staffList = STATE.staff.slice(0, 80).map(function(s) {
        var parts = [s.name];
        if (s.jobTitle) parts.push('(' + s.jobTitle + ')');
        if (s.org) parts.push('— ' + s.org);
        var lmName = resolveStaffName(s.lineManagerUid);
        var apName = resolveStaffName(s.approverUid);
        if (lmName) parts.push('[line manager: ' + lmName + ']');
        if (apName && apName !== lmName) parts.push('[approver: ' + apName + ']');
        return parts.join(' ');
      }).join('\n');

      var clubsByDiv = {};
      STATE.clubs.forEach(function(c) {
        var d = c.division || 'Unknown';
        if (!clubsByDiv[d]) clubsByDiv[d] = [];
        clubsByDiv[d].push(c.name);
      });
      var clubsList = Object.keys(clubsByDiv).map(function(div) {
        return div + ':\n  ' + clubsByDiv[div].join(', ');
      }).join('\n');

      // Build a richer current-user block. We pull from STATE.session for the
      // basics, but also look up the session uid in STATE.staff to get the
      // lineManagerUid/approverUid we need to resolve names. This is why
      // loadStaff now includes uid — without it, we couldn't link "me" to
      // my line manager.
      var me = STATE.staff.filter(function(s) { return s.uid === STATE.session.uid; })[0];
      var currentUserLines = ['The person you are talking to right now:'];
      currentUserLines.push('- Name: ' + (STATE.session.name || '(unknown)'));

        'The code block is how the UI knows to present the draft in a clean, copy-paste-ready block in NL\'s standard font, separated from your chat voice. Outside the block, in your chat voice, you can say a brief line before and/or after — e.g. "Here you are, my friend — have a look and tell me what you want to change." Keep the surrounding chat short; let the draft do the work.',
        '',
        'If the user just wants a one-liner response suggestion (not a full email/letter), you can put even a single sentence in a code block — better to err on the side of blocking-it-off than to let draft content bleed into your chat voice.',
        '',
        '## One final thing',
        'Steady, helpful, a bit avuncular, unflappable. An assistant, not a decision-maker. The person you\'re helping makes the calls — you just help them see the pitch clearly.'
      ].join('\n');
    }

    // =========================================================================
    // UI WIRING
    // =========================================================================
    function wireUI() {
      var input = document.getElementById('composerInput');

      // Auto-resize composer as user types
      input.addEventListener('input', function() { autoResize(input); });

      // Enter to send, Shift+Enter for newline
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      document.getElementById('btnSend').addEventListener('click', sendMessage);
      document.getElementById('btnNew').addEventListener('click', startNewConversation);

      document.getElementById('menuToggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('open');
      });
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 200) + 'px';
    }

    // =========================================================================
    // HELPERS
    // =========================================================================
    function firstName(full) {
      return String(full || 'there').split(' ')[0];
    }

    function deriveTitle(firstMessage) {
      // Use first ~50 chars of the user's first message as a title
      var t = String(firstMessage || '').trim().replace(/\s+/g, ' ');
      if (t.length > 50) t = t.slice(0, 47) + '…';
      return t || 'Untitled chat';
    }

    function todayKey() {
      // UK date (YYYY-MM-DD) — matches GAS Europe/London key
      var d = new Date();
      var pad = function(n) { return n < 10 ? '0' + n : String(n); };
      // This uses local time; for users outside UK this may differ by a few hours
      // from the server's Europe/London key. Acceptable drift for a usage counter.
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }

    function formatPence(p) {
      if (p == null) return '0.00p';
      var n = Number(p) || 0;
      if (n < 1) return n.toFixed(2) + 'p';
      if (n < 100) return n.toFixed(1) + 'p';
      return '£' + (n / 100).toFixed(2);
    }

    function animateCountUp(el, from, to, duration) {
      var start = performance.now();
      function step(now) {
        var t = Math.min(1, (now - start) / duration);
        // Ease-out cubic
        var eased = 1 - Math.pow(1 - t, 3);
        var val = from + (to - from) * eased;
        el.textContent = formatPence(val);
        if (t < 1) requestAnimationFrame(step);
        else el.textContent = formatPence(to);
      }
      requestAnimationFrame(step);
    }

    function relTime(ts) {
      if (!ts) return '';
      var diff = Date.now() - ts;
      var mins = Math.floor(diff / 60000);
      if (mins < 1)  return 'just now';
      if (mins < 60) return mins + 'm ago';
      var hrs = Math.floor(mins / 60);
      if (hrs < 24)  return hrs + 'h ago';
      var days = Math.floor(hrs / 24);
      if (days < 7)  return days + 'd ago';
      var d = new Date(ts);
      var pad = function(n) { return n < 10 ? '0' + n : String(n); };
      return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear();
    }

    function clearChildren(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type || 'success') + ' show';
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(function() { t.classList.remove('show'); }, 3500);
    }
  </script>
</body>
</html>
