<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Lookup — Playoff SF Planner</title>
<!--
  Train Lookup Tool v1.0 — 15/04/2026
  Queries TransportAPI journey planner for all feasible SF routes.
  Runs client-side in your browser. No server needed.
  Outputs JSON data to paste into the main planner tool.
-->
<style>
@font-face {
  font-family: "carbona-variable";
  src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
       url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
  font-display: swap; font-style: normal; font-weight: 200 900;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'carbona-variable','carbona',sans-serif; font-size: 15px; line-height: 1.5; color: #1a2a44; background: #f4f6f9; }
.topbar { background: #9e0000; color: #fff; padding: 0 18px; height: 56px; display: flex; align-items: center; gap: 12px; border-bottom: 5px solid #223b7c; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
.topbar img { height: 32px; }
.topbar__title { font-weight: 900; font-size: 16px; text-transform: uppercase; letter-spacing: 0.04em; }
.topbar__title span { opacity: 0.55; }
.wrap { max-width: 960px; margin: 0 auto; padding: 18px 14px 60px; }
.card { background: #fff; border-radius: 6px; border: 1px solid #dde3ed; box-shadow: 0 2px 12px rgba(10,22,40,0.10); margin-bottom: 20px; overflow: hidden; }
.card-header { background: #223b7c; color: #fff; padding: 11px 20px; font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; }
.card-body { padding: 16px 20px; }
label { font-size: 12px; font-weight: 700; color: #5a6a82; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 4px; }
input[type="text"] { width: 100%; padding: 8px 12px; border: 1px solid #dde3ed; border-radius: 4px; font-size: 14px; font-family: inherit; color: #1a2a44; margin-bottom: 12px; }
input[type="text"]:focus { outline: 2px solid #9e0000; outline-offset: -1px; }
.btn { display: inline-block; padding: 10px 24px; border: none; border-radius: 4px; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; font-family: inherit; }
.btn-primary { background: #9e0000; color: #fff; }
.btn-primary:hover { background: #7a0000; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-navy { background: #223b7c; color: #fff; }
.btn-navy:hover { background: #1a2f63; }
.progress-wrap { margin: 16px 0; }
.progress-bar { height: 8px; background: #dde3ed; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: #1e7e34; border-radius: 4px; transition: width 0.3s; width: 0%; }
.progress-text { font-size: 12px; color: #5a6a82; margin-top: 6px; }
.log { background: #f4f6f9; border: 1px solid #dde3ed; border-radius: 4px; padding: 12px; max-height: 300px; overflow-y: auto; font-size: 12px; line-height: 1.8; color: #1a2a44; margin-top: 12px; }
.log-entry { border-bottom: 1px solid #eef1f6; padding: 2px 0; }
.log-entry:last-child { border-bottom: none; }
.log-ok { color: #1e7e34; }
.log-warn { color: #e67e22; }
.log-err { color: #c0392b; }
.log-info { color: #223b7c; }
.results-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
.results-table th { background: #223b7c; color: #fff; padding: 8px 10px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 800; }
.results-table td { padding: 8px 10px; border-bottom: 1px solid #dde3ed; vertical-align: top; }
.results-table tr:hover td { background: #f4f6f9; }
.feasible { color: #1e7e34; font-weight: 700; }
.tight { color: #e67e22; font-weight: 700; }
.not-feasible { color: #c0392b; font-weight: 700; }
.unknown { color: #5a6a82; }
textarea { width: 100%; height: 120px; font-family: monospace; font-size: 11px; padding: 8px; border: 1px solid #dde3ed; border-radius: 4px; margin-top: 8px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; }
.row > * { flex: 1; min-width: 200px; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
.pill-green { background: #edf7ee; color: #1e7e34; }
.pill-amber { background: #fef6ec; color: #e67e22; }
.pill-red { background: #fdf0ef; color: #c0392b; }
.pill-grey { background: #f4f6f9; color: #5a6a82; }
</style>
</head>
<body>

<div class="topbar">
  <img src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png"
    alt="NL" onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
  <div class="topbar__title">Train <span>Lookup</span></div>
</div>

<div class="wrap">
  <div class="card">
    <div class="card-header">TransportAPI Credentials</div>
    <div class="card-body">
      <div class="row">
        <div>
          <label>App ID</label>
          <input type="text" id="appId" value="d347c855">
        </div>
        <div>
          <label>App Key</label>
          <input type="text" id="appKey" value="daa125de19f0f403e225946f573fab38">
        </div>
      </div>
      <div class="row">
        <div>
          <label>Delay between calls (ms)</label>
          <input type="text" id="delay" value="2500">
        </div>
        <div>
          <label>Status</label>
          <div id="apiStatus" style="padding:8px 0;font-size:13px;color:#5a6a82">Not started</div>
        </div>
      </div>
      <button class="btn btn-primary" id="btnStart" onclick="startLookup()">Run All Lookups</button>
      <button class="btn btn-navy" id="btnTest" onclick="testApi()" style="margin-left:8px">Test Connection</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Progress</div>
    <div class="card-body">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">0 / 0 routes queried</div>
      </div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Results</div>
    <div class="card-body">
      <div id="resultsArea">No results yet — run lookups above.</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Export Data</div>
    <div class="card-body">
      <p style="font-size:12px;color:#5a6a82;margin-bottom:8px">Copy this JSON and paste it into the main planner tool's train data import.</p>
      <textarea id="exportData" readonly></textarea>
      <button class="btn btn-navy" onclick="copyExport()" style="margin-top:8px">Copy to Clipboard</button>
    </div>
  </div>
</div>

<script>
// ── Station codes (CRS) for each team ──
var STATIONS = {
  // National
  "York City": "YRK",
  "Rochdale": "RCD",
  "Carlisle United": "CAR",
  "Boreham Wood": "ELS",       // Elstree & Borehamwood
  "Scunthorpe United": "SCA",
  "Forest Green Rovers": "STD", // Stroud
  "Southend United": "SOC",     // Southend Central
  // North
  "South Shields": "EBD",       // East Boldon (closest)
  "AFC Fylde": "KKM",           // Kirkham & Wesham
  "Kidderminster Harriers": "KID",
  "Macclesfield": "MAC",
  "Merthyr Town": "MER",        // Merthyr Tydfil
  "Scarborough Athletic": "SCA2", // Will use name-based query
  "Chester": "CTR",
  "Darlington": "DAR",
  "Buxton": "BUX",
  "AFC Telford United": "TFC",  // Telford Central
  "Spennymoor Town": "DHM",     // Durham
  // South
  "Worthing": "WRH",
  "Dorking Wanderers": "DKG",   // Dorking
  "Torquay United": "TRR",      // Torre
  "Hornchurch": "UPM",          // Upminster
  "Weston-super-Mare": "WSM",
  "Hemel Hempstead Town": "HML",
  "Ebbsfleet United": "NFL",    // Northfleet (use Ebbsfleet Intl as backup)
  "Maidenhead United": "MAI",
  "Maidstone United": "MDE",    // Maidstone East
  "Chesham United": "CSM",
  "Chelmsford City": "CHM"
};

// Scarborough doesn't have a simple CRS — we'll use name query
// Northfleet station is very small — Ebbsfleet International (EBD) may be better
// We'll handle edge cases in the query builder

// ── Route definitions ──
// For each division: hosts (2nd/3rd feasible) and away teams (4th-7th feasible)
var ROUTES = {
  National: {
    date: "2026-05-03", // Sunday
    dayLabel: "Sun 03/05",
    hosts: ["York City", "Rochdale", "Carlisle United", "Boreham Wood"],
    aways: ["Carlisle United", "Boreham Wood", "Scunthorpe United", "Forest Green Rovers", "Southend United"]
  },
  North: {
    date: "2026-05-02", // Saturday
    dayLabel: "Sat 02/05",
    hosts: ["South Shields", "AFC Fylde", "Kidderminster Harriers", "Macclesfield"],
    aways: ["Kidderminster Harriers", "Macclesfield", "Merthyr Town", "Scarborough Athletic", "Chester", "Darlington", "Buxton", "AFC Telford United", "Spennymoor Town"]
  },
  South: {
    date: "2026-05-02", // Saturday
    dayLabel: "Sat 02/05",
    hosts: ["Worthing", "Dorking Wanderers", "Torquay United", "Hornchurch", "Weston-super-Mare", "Hemel Hempstead Town", "Ebbsfleet United", "Maidenhead United", "Maidstone United", "Chesham United", "Chelmsford City"],
    aways: ["Worthing", "Dorking Wanderers", "Torquay United", "Hornchurch", "Weston-super-Mare", "Hemel Hempstead Town", "Ebbsfleet United", "Maidenhead United", "Maidstone United", "Chesham United", "Chelmsford City"]
  }
};

// Query times — we query outbound arriving by these times, return departing after these times
var OUTBOUND_ARRIVE_TIMES = ["11:00", "14:00"]; // Covers early KO (12:00) and late KO (15:15)
var RETURN_DEPART_TIMES = ["15:30", "19:30"];    // Covers early KO end (12:00+3.5h) and late KO end (16:15+3.5h)

var RESULTS = {};
var LOG_EL, PROGRESS_EL, PROGRESS_TEXT;
var totalQueries = 0;
var completedQueries = 0;
var running = false;

function log(msg, cls) {
  var el = document.getElementById('log');
  var div = document.createElement('div');
  div.className = 'log-entry ' + (cls || 'log-info');
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function updateProgress() {
  var pct = totalQueries > 0 ? (completedQueries / totalQueries * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = completedQueries + ' / ' + totalQueries + ' queries completed';
}

function getStationCode(team) {
  return STATIONS[team] || null;
}

// Build all unique routes (away → host, excluding same team)
function buildRouteList() {
  var routes = [];
  ['National', 'North', 'South'].forEach(function(div) {
    var cfg = ROUTES[div];
    cfg.hosts.forEach(function(host) {
      cfg.aways.forEach(function(away) {
        if (host === away) return; // Can't play yourself
        var hostCRS = getStationCode(host);
        var awayCRS = getStationCode(away);
        if (!hostCRS || !awayCRS) {
          // Will use name-based query
        }
        routes.push({
          division: div,
          date: cfg.date,
          host: host,
          away: away,
          hostCRS: hostCRS,
          awayCRS: awayCRS,
          key: div + '|' + away + '→' + host
        });
      });
    });
  });
  return routes;
}

function sleep(ms) {
  return new Promise(function(resolve) { setTimeout(resolve, ms); });
}

async function queryJourney(from, to, date, time, type) {
  var appId = document.getElementById('appId').value.trim();
  var appKey = document.getElementById('appKey').value.trim();

  // Use CRS codes if available, otherwise use station names
  var fromParam = from.crs ? 'station:' + from.crs : from.name;
  var toParam = to.crs ? 'station:' + to.crs : to.name;

  var timeType = type === 'arrive' ? 'arriving' : 'departing';
  var url = 'https://transportapi.com/v3/uk/public/journey/from/' +
    encodeURIComponent(fromParam) + '/to/' + encodeURIComponent(toParam) +
    '/' + timeType + '/' + date + '/' + time + '.json' +
    '?app_id=' + appId + '&app_key=' + appKey +
    '&modes=train-bus' +
    '&service=southern|thameslink|avanti|crosscountry|northern|transpennine|gwr|lner|southeastern|c2c|greater-anglia|east-midlands|transport-for-wales|scotrail|chiltern|south-western';

  try {
    var resp = await fetch(url);
    if (!resp.ok) {
      var errText = await resp.text();
      return { error: resp.status + ': ' + errText };
    }
    return await resp.json();
  } catch (e) {
    return { error: e.message };
  }
}

function extractJourneyInfo(data) {
  if (!data || data.error) return { error: data ? data.error : 'No data' };
  if (!data.routes || data.routes.length === 0) return { error: 'No routes found' };

  var journeys = [];
  data.routes.forEach(function(route) {
    var depart = route.departure_datetime || '';
    var arrive = route.arrival_datetime || '';
    var duration = route.duration || '';
    var parts = route.route_parts || [];
    var changes = parts.length > 0 ? parts.length - 1 : 0;

    // Extract just times
    var departTime = depart ? depart.split('T')[1].substring(0, 5) : '?';
    var arriveTime = arrive ? arrive.split('T')[1].substring(0, 5) : '?';

    // Duration in minutes
    var durMins = 0;
    if (duration) {
      var durMatch = duration.match(/(\d+):(\d+):(\d+)/);
      if (durMatch) durMins = parseInt(durMatch[1]) * 60 + parseInt(durMatch[2]);
    }

    journeys.push({
      depart: departTime,
      arrive: arriveTime,
      durationMins: durMins,
      changes: changes,
      durationText: duration,
      modes: parts.map(function(p) { return p.mode || ''; }).join(', ')
    });
  });

  return { journeys: journeys };
}

async function testApi() {
  log('Testing API connection...', 'log-info');
  document.getElementById('apiStatus').textContent = 'Testing...';

  var result = await queryJourney(
    { crs: 'YRK', name: 'York' },
    { crs: 'RCD', name: 'Rochdale' },
    '2026-05-03', '11:00', 'arrive'
  );

  if (result.error) {
    log('API Error: ' + result.error, 'log-err');
    document.getElementById('apiStatus').innerHTML = '<span style="color:#c0392b">Error: ' + result.error + '</span>';
  } else if (result.routes && result.routes.length > 0) {
    var j = extractJourneyInfo(result);
    log('API OK! Test route York→Rochdale: depart ' + j.journeys[0].depart + ', arrive ' + j.journeys[0].arrive + ', ' + j.journeys[0].changes + ' changes', 'log-ok');
    document.getElementById('apiStatus').innerHTML = '<span style="color:#1e7e34">Connected ✓</span>';
  } else {
    log('API returned empty results — may need different date or stations', 'log-warn');
    document.getElementById('apiStatus').innerHTML = '<span style="color:#e67e22">Connected but no results</span>';
  }
}

async function startLookup() {
  if (running) return;
  running = true;
  document.getElementById('btnStart').disabled = true;
  RESULTS = {};

  var routes = buildRouteList();
  // Each route needs: 2 outbound queries (arrive by 11:00, arrive by 14:00) + 2 return queries (depart 15:30, depart 19:30)
  totalQueries = routes.length * 4;
  completedQueries = 0;
  updateProgress();

  log('Starting lookups for ' + routes.length + ' routes (' + totalQueries + ' total queries)', 'log-info');

  var delayMs = parseInt(document.getElementById('delay').value) || 2500;

  for (var i = 0; i < routes.length; i++) {
    var r = routes[i];
    var key = r.key;
    RESULTS[key] = { division: r.division, host: r.host, away: r.away, date: r.date, outbound: [], returnJourneys: [] };

    log(r.division + ': ' + r.away + ' → ' + r.host + ' (' + r.date + ')', 'log-info');

    // Outbound queries (away fans travelling TO the ground)
    for (var oi = 0; oi < OUTBOUND_ARRIVE_TIMES.length; oi++) {
      var oTime = OUTBOUND_ARRIVE_TIMES[oi];
      var oResult = await queryJourney(
        { crs: r.awayCRS, name: r.away },
        { crs: r.hostCRS, name: r.host },
        r.date, oTime, 'arrive'
      );
      var oInfo = extractJourneyInfo(oResult);
      if (oInfo.error) {
        log('  Outbound arrive-by ' + oTime + ': ERROR — ' + oInfo.error, 'log-err');
      } else {
        oInfo.journeys.forEach(function(j) {
          RESULTS[key].outbound.push({ arriveBy: oTime, depart: j.depart, arrive: j.arrive, durationMins: j.durationMins, changes: j.changes });
          log('  Outbound arrive-by ' + oTime + ': depart ' + j.depart + ' → arrive ' + j.arrive + ' (' + j.durationMins + 'min, ' + j.changes + ' chg)', 'log-ok');
        });
      }
      completedQueries++;
      updateProgress();
      await sleep(delayMs);
    }

    // Return queries (away fans travelling HOME)
    for (var ri = 0; ri < RETURN_DEPART_TIMES.length; ri++) {
      var rTime = RETURN_DEPART_TIMES[ri];
      var rResult = await queryJourney(
        { crs: r.hostCRS, name: r.host },
        { crs: r.awayCRS, name: r.away },
        r.date, rTime, 'depart'
      );
      var rInfo = extractJourneyInfo(rResult);
      if (rInfo.error) {
        log('  Return depart ' + rTime + ': ERROR — ' + rInfo.error, 'log-err');
      } else {
        rInfo.journeys.forEach(function(j) {
          RESULTS[key].returnJourneys.push({ departAfter: rTime, depart: j.depart, arrive: j.arrive, durationMins: j.durationMins, changes: j.changes });
          log('  Return depart ' + rTime + ': depart ' + j.depart + ' → arrive ' + j.arrive + ' (' + j.durationMins + 'min, ' + j.changes + ' chg)', 'log-ok');
        });
      }
      completedQueries++;
      updateProgress();
      await sleep(delayMs);
    }
  }

  log('Complete! ' + routes.length + ' routes queried.', 'log-ok');
  running = false;
  document.getElementById('btnStart').disabled = false;
  renderResults();
  document.getElementById('exportData').value = JSON.stringify(RESULTS, null, 2);
}

function assessFeasibility(routeData, koMins) {
  // koMins = KO time in minutes from midnight
  // Outbound: need to arrive by koMins - 60
  // Return: can leave at koMins + 210 (3.5h), home past midnight OK, depart >= 06:00 (360)
  var arriveBy = koMins - 60;
  var leaveAfter = koMins + 210;

  var bestOut = null;
  routeData.outbound.forEach(function(o) {
    var arrMins = timeToMins(o.arrive);
    if (arrMins <= arriveBy) {
      var depMins = timeToMins(o.depart);
      if (depMins >= 360) { // Depart on or after 06:00
        if (!bestOut || depMins > timeToMins(bestOut.depart)) bestOut = o; // Latest possible departure that still arrives in time
      }
    }
  });

  var bestRet = null;
  routeData.returnJourneys.forEach(function(r) {
    var depMins = timeToMins(r.depart);
    if (depMins >= leaveAfter) {
      if (!bestRet || depMins < timeToMins(bestRet.depart)) bestRet = r; // Earliest departure after match
    }
  });

  return { outbound: bestOut, returnJ: bestRet, feasible: bestOut && bestRet };
}

function timeToMins(t) {
  if (!t || t === '?') return -1;
  var parts = t.split(':');
  var h = parseInt(parts[0]);
  var m = parseInt(parts[1]);
  // Handle past midnight (next day)
  return h * 60 + m;
}

function renderResults() {
  var html = '<table class="results-table"><thead><tr><th>Division</th><th>Route (Away → Host)</th><th>Best Outbound</th><th>Best Return</th><th>12:30 KO</th><th>16:00 KO</th></tr></thead><tbody>';

  Object.keys(RESULTS).forEach(function(key) {
    var r = RESULTS[key];
    var bestOutText = r.outbound.length > 0 ?
      r.outbound.map(function(o) { return o.depart + '→' + o.arrive + ' (' + o.changes + 'chg)'; }).join('<br>') :
      '<span class="unknown">No data</span>';
    var bestRetText = r.returnJourneys.length > 0 ?
      r.returnJourneys.map(function(j) { return j.depart + '→' + j.arrive + ' (' + j.changes + 'chg)'; }).join('<br>') :
      '<span class="unknown">No data</span>';

    // Assess for 12:30 and 16:00 KOs
    var assess1230 = assessFeasibility(r, 750);
    var assess1600 = assessFeasibility(r, 960);

    function pillFor(a) {
      if (a.feasible) return '<span class="pill pill-green">Feasible</span>';
      if (a.outbound && !a.returnJ) return '<span class="pill pill-amber">Out OK, return?</span>';
      if (!a.outbound && a.returnJ) return '<span class="pill pill-red">Can\'t get there</span>';
      return '<span class="pill pill-grey">No data</span>';
    }

    html += '<tr>'
      + '<td>' + r.division + '</td>'
      + '<td><strong>' + r.away + '</strong> → ' + r.host + '</td>'
      + '<td>' + bestOutText + '</td>'
      + '<td>' + bestRetText + '</td>'
      + '<td>' + pillFor(assess1230) + '</td>'
      + '<td>' + pillFor(assess1600) + '</td>'
      + '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('resultsArea').innerHTML = html;
}

function copyExport() {
  var ta = document.getElementById('exportData');
  ta.select();
  document.execCommand('copy');
  // Brief visual feedback
  var btn = event.target;
  btn.textContent = 'Copied!';
  setTimeout(function() { btn.textContent = 'Copy to Clipboard'; }, 2000);
}
</script>
</body>
</html>
