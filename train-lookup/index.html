<html lang="en">
<head>

<title>Train Journey Finder — Playoff SF</title>
<!--
  Train Journey Finder v3.0 — 15/04/2026
  v2.0 - Initial chain engine with National recipes
  v3.0 - Speed: delay dropped to 200ms. Fixed recipes:
    - Rochdale routes now use MCV (Manchester Victoria) not MAN (Piccadilly)
    - Boreham Wood→Rochdale routes via EUS→MCV
    - Added EUS as London interchange for north-bound WCML services
    - Added North + South division recipes
    - More start times for broader coverage
-->
<style>
@font-face{font-family:"carbona-variable";src:url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");font-display:swap;font-style:normal;font-weight:200 900}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'carbona-variable','carbona',sans-serif;font-size:15px;line-height:1.5;color:#1a2a44;background:#f4f6f9}
.topbar{background:#9e0000;color:#fff;padding:0 18px;height:56px;display:flex;align-items:center;gap:12px;border-bottom:5px solid #223b7c;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.topbar img{height:32px}.topbar__title{font-weight:900;font-size:16px;text-transform:uppercase;letter-spacing:0.04em}.topbar__title span{opacity:0.55}
.wrap{max-width:960px;margin:0 auto;padding:18px 14px 60px}
.card{background:#fff;border-radius:6px;border:1px solid #dde3ed;box-shadow:0 2px 12px rgba(10,22,40,0.10);margin-bottom:20px;overflow:hidden}
.card-header{background:#223b7c;color:#fff;padding:11px 20px;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:0.08em}
.card-body{padding:16px 20px}
label{font-size:12px;font-weight:700;color:#5a6a82;text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:4px}
input[type="text"]{width:100%;padding:8px 12px;border:1px solid #dde3ed;border-radius:4px;font-size:14px;font-family:inherit;color:#1a2a44;margin-bottom:12px}
.btn{display:inline-block;padding:10px 24px;border:none;border-radius:4px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;font-family:inherit;margin-right:8px;margin-bottom:6px}
.btn-primary{background:#9e0000;color:#fff}.btn-primary:hover{background:#7a0000}.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-navy{background:#223b7c;color:#fff}.btn-navy:hover{background:#1a2f63}
.btn-sm{padding:6px 14px;font-size:11px}
.progress-bar{height:8px;background:#dde3ed;border-radius:4px;overflow:hidden;margin:12px 0 6px}
.progress-fill{height:100%;background:#1e7e34;border-radius:4px;transition:width 0.3s;width:0%}
.progress-text{font-size:12px;color:#5a6a82}
.log{background:#1a2a44;border-radius:4px;padding:12px;max-height:500px;overflow-y:auto;font-size:11px;line-height:1.6;color:#8892b0;margin-top:12px;font-family:monospace}
.log .ok{color:#22c55e}.log .warn{color:#f59e0b}.log .err{color:#ef4444}.log .info{color:#64b5f6}.log .dim{color:#5a6a82}.log .head{color:#fff;font-weight:700}
.route-card{border:1px solid #dde3ed;border-radius:6px;margin:10px 0;overflow:hidden;background:#fff}
.route-header{background:#f4f6f9;padding:8px 14px;border-bottom:1px solid #dde3ed;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.route-title{font-weight:800;font-size:13px;color:#9e0000}
.route-meta{font-size:11px;color:#5a6a82}
.journey-row{padding:8px 14px;border-bottom:1px solid #eef1f6;font-size:12px;display:flex;gap:12px;align-items:baseline;flex-wrap:wrap}
.journey-row:last-child{border-bottom:none}
.j-time{font-weight:800;color:#223b7c;font-size:14px;min-width:110px}
.j-detail{color:#5a6a82;flex:1}
.j-duration{font-weight:700;color:#1a2a44;min-width:80px;text-align:right}
.leg{display:inline-flex;align-items:center;gap:4px;background:#f4f6f9;border-radius:3px;padding:2px 8px;font-size:11px;margin:2px 0}
.leg-op{font-weight:700;color:#223b7c}.leg-arrow{color:#5a6a82}
.section-label{padding:6px 14px;font-size:10px;font-weight:800;color:#223b7c;text-transform:uppercase;background:#f8f9fb;border-bottom:1px solid #eef1f6}
.row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1;min-width:150px}
textarea{width:100%;height:150px;font-family:monospace;font-size:11px;padding:8px;border:1px solid #dde3ed;border-radius:4px;margin-top:8px}
.tabs{display:flex;gap:4px;background:#fff;border:1px solid #dde3ed;border-radius:6px;padding:3px;margin-bottom:16px}
.tab{flex:1;text-align:center;padding:8px 12px;border-radius:4px;font-size:11px;font-weight:800;cursor:pointer;color:#5a6a82;border:none;background:none;text-transform:uppercase;letter-spacing:0.08em;font-family:inherit}
.tab.active{background:#9e0000;color:#fff}
.stats{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
.stat{background:#f4f6f9;border-radius:4px;padding:8px 14px;font-size:12px;color:#5a6a82}
.stat strong{color:#1a2a44;font-size:18px;display:block}
</style>
</head>
<body>

<div class="topbar">
  <img src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png" alt="NL" onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
  <div class="topbar__title">Train <span>Journey Finder</span></div>
</div>

<div class="wrap">
  <div class="card">
    <div class="card-header">Config</div>
    <div class="card-body">
      <div class="row">
        <div><label>App ID</label><input type="text" id="appId" value="d347c855"></div>
        <div><label>App Key</label><input type="text" id="appKey" value="daa125de19f0f403e225946f573fab38"></div>
        <div><label>Delay (ms)</label><input type="text" id="delay" value="200"></div>
      </div>
      <button class="btn btn-navy btn-sm" onclick="testAPI()">Test</button>
      <span id="apiStatus" style="font-size:12px;color:#5a6a82"></span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Run</div>
    <div class="card-body">
      <div class="tabs">
        <button class="tab active" onclick="switchDiv('National',this)">National (Sun)</button>
        <button class="tab" onclick="switchDiv('North',this)">North (Sat)</button>
        <button class="tab" onclick="switchDiv('South',this)">South (Sat)</button>
      </div>
      <div id="divInfo" style="font-size:12px;color:#5a6a82;margin-bottom:12px">National — Sun 03/05/2026</div>
      <button class="btn btn-primary" id="btnRun" onclick="runCurrentDiv()">Run National</button>
      <button class="btn btn-primary" onclick="runAllDivs()">Run All</button>
      <button class="btn btn-navy btn-sm" onclick="stopRun()">Stop</button>
      <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
      <div class="progress-text" id="pText">Ready</div>
      <div class="stats">
        <div class="stat"><strong id="statCalls">0</strong>API calls</div>
        <div class="stat"><strong id="statFound">0</strong>Journeys found</div>
        <div class="stat"><strong id="statFailed">0</strong>Routes failed</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Log</div>
    <div class="card-body"><div class="log" id="log"></div></div>
  </div>

  <div class="card">
    <div class="card-header">Results</div>
    <div class="card-body" id="resultsArea">Run lookups to see results.</div>
  </div>

  <div class="card">
    <div class="card-header">Export</div>
    <div class="card-body">
      <textarea id="exportJSON" readonly></textarea>
      <button class="btn btn-navy btn-sm" onclick="copyJSON()" style="margin-top:8px">Copy</button>
    </div>
  </div>
</div>

<script>
var API_BASE='https://transportapi.com/v3/uk/train';
var currentDiv='National';
var running=false;
var shouldStop=false;
var totalAPICalls=0;
var totalFound=0;
var totalFailed=0;

// ── Station CRS codes ──
// Key London stations
var EUS='EUS',KGX='KGX',STP='STP',FST='FST',LST='LST',PAD='PAD';
// Key interchange stations
var LDS='LDS',MAN='MAN',MCV='MCV',PRE='PRE',BHM='BHM',DON='DON',NCL='NCL',SHF='SHF',CRE='CRE';

// ── Recipes ──
// Format: RECIPES["Away→Host"] = [ recipe1, recipe2, ... ]
// Each recipe = [ {from:CRS, seekStops:[CRS], to:CRS}, ... ]
// seekStops are intermediate stations the service might call at en route to `to`
var R={};
function add(away,host,legs){var k=away+'→'+host;if(!R[k])R[k]=[];R[k].push(legs);}

// ═══════════════════════════════════════════
// NATIONAL (Sun 03/05) — Hosts: YRK, RCD, CAR, ELS
// Aways: CAR, ELS, SCA, STD, SOC
// ═══════════════════════════════════════════

// -- To York (YRK) --
add('Carlisle United','York City',[{from:'CAR',seekStops:['LDS'],to:'LDS'},{from:'LDS',seekStops:['YRK'],to:'YRK'}]);
add('Boreham Wood','York City',[{from:'ELS',seekStops:['STP'],to:'STP'},{from:'KGX',seekStops:['YRK'],to:'YRK'}]);
add('Scunthorpe United','York City',[{from:'SCA',seekStops:['DON'],to:'DON'},{from:'DON',seekStops:['YRK'],to:'YRK'}]);
add('Forest Green Rovers','York City',[{from:'STD',seekStops:['SWI','GLO','CNM'],to:'PAD'}]); // Needs tube PAD→KGX
add('Forest Green Rovers','York City',[{from:'STD',seekStops:['BHM','CNM','GLO'],to:'BHM'},{from:'BHM',seekStops:['LDS','YRK','DON'],to:'YRK'}]);
add('Southend United','York City',[{from:'SOC',seekStops:['FST','LFS'],to:'FST'},{from:'KGX',seekStops:['YRK'],to:'YRK'}]);

// -- To Rochdale (RCD) — KEY FIX: use MCV not MAN --
add('Carlisle United','Rochdale',[{from:'CAR',seekStops:['LDS'],to:'LDS'},{from:'LDS',seekStops:['RCD','MCV'],to:'RCD'}]);
add('Carlisle United','Rochdale',[{from:'CAR',seekStops:['PRE','LAN'],to:'PRE'},{from:'PRE',seekStops:['MCV','RCD'],to:'MCV'},{from:'MCV',seekStops:['RCD'],to:'RCD'}]);
add('Boreham Wood','Rochdale',[{from:'ELS',seekStops:['STP','EUS'],to:'EUS'},{from:'EUS',seekStops:['MAN','MCV','SPT'],to:'MAN'},{from:'MCV',seekStops:['RCD'],to:'RCD'}]); // FIX: via Euston→Manchester→Victoria→Rochdale
add('Boreham Wood','Rochdale',[{from:'ELS',seekStops:['STP'],to:'STP'},{from:'STP',seekStops:['SHF','MAN'],to:'SHF'},{from:'SHF',seekStops:['MCV','MAN'],to:'MCV'},{from:'MCV',seekStops:['RCD'],to:'RCD'}]);
add('Scunthorpe United','Rochdale',[{from:'SCA',seekStops:['DON','SHF'],to:'DON'},{from:'DON',seekStops:['SHF','LDS'],to:'SHF'},{from:'SHF',seekStops:['MCV','MAN'],to:'MCV'},{from:'MCV',seekStops:['RCD'],to:'RCD'}]);
add('Scunthorpe United','Rochdale',[{from:'SCA',seekStops:['DON'],to:'DON'},{from:'DON',seekStops:['LDS'],to:'LDS'},{from:'LDS',seekStops:['RCD','MCV'],to:'RCD'}]);
add('Forest Green Rovers','Rochdale',[{from:'STD',seekStops:['BHM','CNM','GLO'],to:'BHM'},{from:'BHM',seekStops:['MAN','MCV'],to:'MAN'},{from:'MCV',seekStops:['RCD'],to:'RCD'}]);
add('Southend United','Rochdale',[{from:'SOC',seekStops:['FST'],to:'FST'},{from:'EUS',seekStops:['MAN','MCV','SPT'],to:'MAN'},{from:'MCV',seekStops:['RCD'],to:'RCD'}]);

// -- To Carlisle (CAR) --
add('Boreham Wood','Carlisle United',[{from:'ELS',seekStops:['STP','EUS'],to:'EUS'},{from:'EUS',seekStops:['CAR'],to:'CAR'}]);
add('Scunthorpe United','Carlisle United',[{from:'SCA',seekStops:['DON'],to:'DON'},{from:'DON',seekStops:['YRK'],to:'YRK'},{from:'YRK',seekStops:['LDS'],to:'LDS'},{from:'LDS',seekStops:['CAR'],to:'CAR'}]);
add('Scunthorpe United','Carlisle United',[{from:'SCA',seekStops:['DON'],to:'DON'},{from:'DON',seekStops:['LDS','YRK'],to:'LDS'},{from:'LDS',seekStops:['CAR'],to:'CAR'}]);
add('Forest Green Rovers','Carlisle United',[{from:'STD',seekStops:['BHM','CNM','GLO'],to:'BHM'},{from:'BHM',seekStops:['CAR','PRE'],to:'CAR'}]);
add('Forest Green Rovers','Carlisle United',[{from:'STD',seekStops:['SWI','PAD'],to:'PAD'}]); // Needs tube to Euston
add('Southend United','Carlisle United',[{from:'SOC',seekStops:['FST'],to:'FST'},{from:'EUS',seekStops:['CAR'],to:'CAR'}]);

// -- To Boreham Wood (ELS) --
add('Carlisle United','Boreham Wood',[{from:'CAR',seekStops:['EUS'],to:'EUS'},{from:'EUS',seekStops:['ELS'],to:'ELS'}]); // Avanti south, Thameslink north
add('Carlisle United','Boreham Wood',[{from:'CAR',seekStops:['EUS','PRE'],to:'EUS'},{from:'STP',seekStops:['ELS'],to:'ELS'}]); // Via StP Thameslink
add('Scunthorpe United','Boreham Wood',[{from:'SCA',seekStops:['DON'],to:'DON'},{from:'DON',seekStops:['KGX'],to:'KGX'},{from:'STP',seekStops:['ELS'],to:'ELS'}]);
add('Forest Green Rovers','Boreham Wood',[{from:'STD',seekStops:['SWI','PAD','GLO'],to:'PAD'}]); // Needs tube/walk
add('Forest Green Rovers','Boreham Wood',[{from:'STD',seekStops:['SWI'],to:'SWI'},{from:'SWI',seekStops:['PAD'],to:'PAD'}]);
add('Southend United','Boreham Wood',[{from:'SOC',seekStops:['FST','SRA','WFJ'],to:'FST'}]); // Needs connection via London

// ═══════════════════════════════════════════
// NORTH (Sat 02/05) — Hosts: EBD(S.Shields), KKM(Fylde), KID, MAC
// Aways: KID, MAC, MER, SCA(Scarborough=SCB), CTR, DAR, BUX, TFC, DHM
// ═══════════════════════════════════════════

// Scarborough CRS is actually SCB not SCA
// South Shields closest = East Boldon EBD... but better to use NCL+Metro. Let's use Sunderland SUN or just NCL.

// -- To South Shields (via Newcastle) --
add('Kidderminster Harriers','South Shields',[{from:'KID',seekStops:['BHM'],to:'BHM'},{from:'BHM',seekStops:['YRK','NCL'],to:'NCL'}]); // Then Metro
add('Macclesfield','South Shields',[{from:'MAC',seekStops:['MAN','SPT','SHF'],to:'MAN'},{from:'MAN',seekStops:['LDS','YRK'],to:'YRK'},{from:'YRK',seekStops:['NCL'],to:'NCL'}]);
add('Merthyr Town','South Shields',[{from:'MER',seekStops:['CDF'],to:'CDF'},{from:'CDF',seekStops:['BHM','BRI'],to:'BHM'},{from:'BHM',seekStops:['NCL','YRK'],to:'NCL'}]);
add('Chester','South Shields',[{from:'CTR',seekStops:['CRE','MAN'],to:'MAN'},{from:'MAN',seekStops:['LDS','YRK'],to:'YRK'},{from:'YRK',seekStops:['NCL'],to:'NCL'}]);
add('Darlington','South Shields',[{from:'DAR',seekStops:['NCL'],to:'NCL'}]); // Then Metro
add('Buxton','South Shields',[{from:'BUX',seekStops:['MAC','SPT','MAN'],to:'MAN'},{from:'MAN',seekStops:['LDS','YRK'],to:'YRK'},{from:'YRK',seekStops:['NCL'],to:'NCL'}]);
add('Spennymoor Town','South Shields',[{from:'DHM',seekStops:['NCL'],to:'NCL'}]); // Then Metro

// -- To AFC Fylde (Kirkham & Wesham KKM) --
add('Kidderminster Harriers','AFC Fylde',[{from:'KID',seekStops:['BHM'],to:'BHM'},{from:'BHM',seekStops:['PRE'],to:'PRE'},{from:'PRE',seekStops:['KKM'],to:'KKM'}]);
add('Macclesfield','AFC Fylde',[{from:'MAC',seekStops:['MAN','SPT'],to:'MAN'},{from:'MAN',seekStops:['PRE'],to:'PRE'},{from:'PRE',seekStops:['KKM'],to:'KKM'}]);
add('Merthyr Town','AFC Fylde',[{from:'MER',seekStops:['CDF'],to:'CDF'},{from:'CDF',seekStops:['BHM','BRI'],to:'BHM'},{from:'BHM',seekStops:['PRE'],to:'PRE'},{from:'PRE',seekStops:['KKM'],to:'KKM'}]);
add('Chester','AFC Fylde',[{from:'CTR',seekStops:['PRE','WGN'],to:'PRE'},{from:'PRE',seekStops:['KKM'],to:'KKM'}]);
add('Darlington','AFC Fylde',[{from:'DAR',seekStops:['YRK'],to:'YRK'},{from:'YRK',seekStops:['LDS','MAN'],to:'LDS'},{from:'LDS',seekStops:['PRE'],to:'PRE'},{from:'PRE',seekStops:['KKM'],to:'KKM'}]);
add('Buxton','AFC Fylde',[{from:'BUX',seekStops:['MAC','MAN'],to:'MAN'},{from:'MAN',seekStops:['PRE'],to:'PRE'},{from:'PRE',seekStops:['KKM'],to:'KKM'}]);
add('Spennymoor Town','AFC Fylde',[{from:'DHM',seekStops:['DAR','YRK','NCL'],to:'YRK'},{from:'YRK',seekStops:['LDS','MAN'],to:'LDS'},{from:'LDS',seekStops:['PRE'],to:'PRE'},{from:'PRE',seekStops:['KKM'],to:'KKM'}]);

// -- To Kidderminster (KID) --
add('Macclesfield','Kidderminster Harriers',[{from:'MAC',seekStops:['MAN','SPT','SHF'],to:'MAN'},{from:'MAN',seekStops:['BHM'],to:'BHM'},{from:'BHM',seekStops:['KID'],to:'KID'}]);
add('Merthyr Town','Kidderminster Harriers',[{from:'MER',seekStops:['CDF'],to:'CDF'},{from:'CDF',seekStops:['BHM'],to:'BHM'},{from:'BHM',seekStops:['KID'],to:'KID'}]);
add('Chester','Kidderminster Harriers',[{from:'CTR',seekStops:['CRE','BHM','WVH'],to:'BHM'},{from:'BHM',seekStops:['KID'],to:'KID'}]);
add('Darlington','Kidderminster Harriers',[{from:'DAR',seekStops:['YRK'],to:'YRK'},{from:'YRK',seekStops:['BHM','LDS'],to:'BHM'},{from:'BHM',seekStops:['KID'],to:'KID'}]);
add('Buxton','Kidderminster Harriers',[{from:'BUX',seekStops:['MAC','MAN'],to:'MAN'},{from:'MAN',seekStops:['BHM','WVH'],to:'BHM'},{from:'BHM',seekStops:['KID'],to:'KID'}]);
add('Spennymoor Town','Kidderminster Harriers',[{from:'DHM',seekStops:['DAR','YRK','NCL'],to:'YRK'},{from:'YRK',seekStops:['BHM'],to:'BHM'},{from:'BHM',seekStops:['KID'],to:'KID'}]);
add('AFC Fylde','Kidderminster Harriers',[{from:'KKM',seekStops:['PRE'],to:'PRE'},{from:'PRE',seekStops:['BHM','CRE'],to:'BHM'},{from:'BHM',seekStops:['KID'],to:'KID'}]);
add('South Shields','Kidderminster Harriers',[{from:'NCL',seekStops:['YRK','DAR'],to:'YRK'},{from:'YRK',seekStops:['BHM'],to:'BHM'},{from:'BHM',seekStops:['KID'],to:'KID'}]);

// -- To Macclesfield (MAC) --
add('Kidderminster Harriers','Macclesfield',[{from:'KID',seekStops:['BHM'],to:'BHM'},{from:'BHM',seekStops:['MAN','MAC','SPT'],to:'MAC'}]);
add('Merthyr Town','Macclesfield',[{from:'MER',seekStops:['CDF'],to:'CDF'},{from:'CDF',seekStops:['BHM'],to:'BHM'},{from:'BHM',seekStops:['MAC','MAN','SPT'],to:'MAC'}]);
add('Chester','Macclesfield',[{from:'CTR',seekStops:['CRE','MAN'],to:'CRE'},{from:'CRE',seekStops:['MAC','SPT','MAN'],to:'MAC'}]);
add('Darlington','Macclesfield',[{from:'DAR',seekStops:['YRK'],to:'YRK'},{from:'YRK',seekStops:['MAN','LDS'],to:'LDS'},{from:'LDS',seekStops:['MAN','MAC'],to:'MAN'},{from:'MAN',seekStops:['MAC','SPT'],to:'MAC'}]);
add('South Shields','Macclesfield',[{from:'NCL',seekStops:['YRK','DAR'],to:'YRK'},{from:'YRK',seekStops:['LDS','MAN'],to:'LDS'},{from:'LDS',seekStops:['MAN'],to:'MAN'},{from:'MAN',seekStops:['MAC','SPT'],to:'MAC'}]);

// ═══════════════════════════════════════════
// SOUTH (Sat 02/05) — Very open. Focus on longest-distance pairs.
// Hosts/Aways: WRH,DKG,TRR,UPM,WSM,HML,EBD(Ebbsfleet=EBD clash!),MAI,MDE,CSM,CHM
// Ebbsfleet International = EBF. Northfleet = NFL. Let's use EBF.
// ═══════════════════════════════════════════

// Torquay is the outlier in the South — focus on Torquay routes
add('Torquay United','Hornchurch',[{from:'TRR',seekStops:['NTA','EXD','PAD'],to:'PAD'}]); // Then tube to Upminster — can't chain
add('Torquay United','Worthing',[{from:'TRR',seekStops:['NTA','EXD'],to:'EXD'},{from:'EXD',seekStops:['CLJ','GTW','BRH'],to:'CLJ'},{from:'CLJ',seekStops:['WRH'],to:'WRH'}]);
add('Torquay United','Hemel Hempstead Town',[{from:'TRR',seekStops:['NTA','EXD','PAD'],to:'PAD'}]); // Then tube/Overground
add('Torquay United','Dorking Wanderers',[{from:'TRR',seekStops:['NTA','EXD'],to:'EXD'},{from:'EXD',seekStops:['CLJ','SUR'],to:'CLJ'},{from:'CLJ',seekStops:['DKG','LHD'],to:'DKG'}]);
add('Torquay United','Weston-super-Mare',[{from:'TRR',seekStops:['EXD','NTA','BRI'],to:'BRI'},{from:'BRI',seekStops:['WSM'],to:'WSM'}]);
add('Torquay United','Ebbsfleet United',[{from:'TRR',seekStops:['NTA','EXD','PAD'],to:'PAD'}]); // Tube needed

// Weston-super-Mare long routes
add('Weston-super-Mare','Hornchurch',[{from:'WSM',seekStops:['BRI'],to:'BRI'},{from:'BRI',seekStops:['PAD','SWI'],to:'PAD'}]); // Then tube
add('Weston-super-Mare','Chelmsford City',[{from:'WSM',seekStops:['BRI'],to:'BRI'},{from:'BRI',seekStops:['PAD','SWI'],to:'PAD'}]); // Then tube to Liverpool St

// Hornchurch (Upminster UPM) — actually on District/C2C line
add('Hornchurch','Torquay United',[{from:'UPM',seekStops:['FST'],to:'FST'},{from:'PAD',seekStops:['EXD','NTA','TRR'],to:'TRR'}]); // Needs tube FST→PAD
add('Hornchurch','Weston-super-Mare',[{from:'UPM',seekStops:['FST'],to:'FST'},{from:'PAD',seekStops:['BRI','SWI'],to:'BRI'},{from:'BRI',seekStops:['WSM'],to:'WSM'}]);


/* ─────────────────────────────────────────────
   API + ENGINE
   ───────────────────────────────────────────── */

function creds(){return{id:document.getElementById('appId').value.trim(),key:document.getElementById('appKey').value.trim()}}
function apiUrl(path){var c=creds();var s=path.indexOf('?')>=0?'&':'?';return API_BASE+path+s+'app_id='+c.id+'&app_key='+c.key}
function delay(){return parseInt(document.getElementById('delay').value)||200}

async function apiFetch(path){
  var url=apiUrl(path);
  totalAPICalls++;
  document.getElementById('statCalls').textContent=totalAPICalls;
  try{var r=await fetch(url);if(!r.ok)return{_error:r.status};return await r.json()}catch(e){return{_error:e.message}}
}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

async function getDepartures(crs,date,time){
  var d=await apiFetch('/station/'+crs+'/'+date+'/'+time+'/timetable.json?train_status=passenger');
  if(d._error)return[];
  if(!d.departures||!d.departures.all)return[];
  return d.departures.all.filter(function(x){return x.mode==='train'});
}

async function getServiceStops(uid,date){
  var d=await apiFetch('/service_timetables/'+uid+':'+date+'.json');
  if(d._error||!d.stops)return null;
  return d.stops;
}

function findStopAt(stops,targets,afterTime){
  var aft=tm(afterTime);
  for(var i=0;i<stops.length;i++){
    var s=stops[i];
    if(targets.indexOf(s.station_code)>=0){
      var t=s.aimed_arrival_time||s.aimed_departure_time;
      if(t&&tm(t)>=aft)return s;
    }
  }
  return null;
}

function stationName(stops,crs){
  for(var i=0;i<stops.length;i++)if(stops[i].station_code===crs)return stops[i].station_name;
  return crs;
}

function tm(t){if(!t)return-1;var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1])}
function ft(m){if(m<0)return'??:??';return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}

async function findJourney(recipe,date,startTime){
  var curTime=startTime;
  var legs=[];
  var d=delay();

  for(var li=0;li<recipe.length;li++){
    var leg=recipe[li];
    var minConn=li>0?8:0; // 8 min connection
    var searchFrom=li>0?ft(tm(curTime)+minConn):curTime;

    log('  Leg '+(li+1)+': '+leg.from+' after '+searchFrom,'dim');

    var deps=await getDepartures(leg.from,date,searchFrom);
    await sleep(d);
    if(deps.length===0){log('  No departures from '+leg.from+' after '+searchFrom,'err');return null}

    var found=false;
    var checked=0;
    for(var di=0;di<Math.min(deps.length,20)&&!found;di++){
      var dep=deps[di];
      if(tm(dep.aimed_departure_time)<tm(searchFrom))continue;

      var stops=await getServiceStops(dep.train_uid,date);
      await sleep(d);
      checked++;
      if(!stops)continue;

      // Check if this service calls at our target
      var allTargets=leg.seekStops.concat([leg.to]);
      var hit=findStopAt(stops,allTargets,dep.aimed_departure_time);
      if(!hit)continue;

      // Does it reach our actual `to` station?
      var dest=findStopAt(stops,[leg.to],dep.aimed_departure_time);
      if(dest){
        var arr=dest.aimed_arrival_time||dest.aimed_departure_time;
        legs.push({from:leg.from,to:leg.to,fromName:stationName(stops,leg.from)||leg.from,toName:dest.station_name||leg.to,depart:dep.aimed_departure_time,arrive:arr,operator:dep.operator_name,uid:dep.train_uid});
        curTime=arr;
        found=true;
        log('  ✓ '+leg.from+' '+dep.aimed_departure_time+' → '+leg.to+' '+arr+' ('+dep.operator_name+')','ok');
      }
    }

    if(!found){log('  ✗ No train '+leg.from+' → '+leg.to+' (checked '+checked+')','warn');return null}
    if(shouldStop)return null;
  }

  var total=tm(legs[legs.length-1].arrive)-tm(legs[0].depart);
  if(total<0)total+=1440;
  totalFound++;
  document.getElementById('statFound').textContent=totalFound;
  return{legs:legs,totalMins:total,changes:legs.length-1};
}

/* ─────────────────────────────────────────────
   DIVISION CONFIG + ROUTE BUILDER
   ───────────────────────────────────────────── */

var CFG={
  National:{date:'2026-05-03',label:'Sun 03/05/2026',
    hosts:['York City','Rochdale','Carlisle United','Boreham Wood'],
    aways:['Carlisle United','Boreham Wood','Scunthorpe United','Forest Green Rovers','Southend United']},
  North:{date:'2026-05-02',label:'Sat 02/05/2026',
    hosts:['South Shields','AFC Fylde','Kidderminster Harriers','Macclesfield'],
    aways:['Kidderminster Harriers','Macclesfield','Merthyr Town','Scarborough Athletic','Chester','Darlington','Buxton','AFC Telford United','Spennymoor Town']},
  South:{date:'2026-05-02',label:'Sat 02/05/2026',
    hosts:['Worthing','Dorking Wanderers','Torquay United','Hornchurch','Weston-super-Mare','Hemel Hempstead Town','Ebbsfleet United','Maidenhead United','Maidstone United','Chesham United','Chelmsford City'],
    aways:['Worthing','Dorking Wanderers','Torquay United','Hornchurch','Weston-super-Mare','Hemel Hempstead Town','Ebbsfleet United','Maidenhead United','Maidstone United','Chesham United','Chelmsford City']}
};

var STARTS=['06:00','07:00','07:30','08:00','08:30','09:00','09:30','10:00','10:30'];
var RET_STARTS=['15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00'];

function routesFor(div){
  var c=CFG[div];var out=[];
  c.hosts.forEach(function(h){c.aways.forEach(function(a){
    if(h===a)return;
    var k=a+'→'+h;
    if(R[k])out.push({away:a,host:h,key:k,date:c.date});
  })});
  return out;
}

var ALL={};

async function runDiv(div){
  var routes=routesFor(div);
  var c=CFG[div];
  log('═══ '+div.toUpperCase()+' ('+c.label+') — '+routes.length+' routes ═══','head');

  for(var ri=0;ri<routes.length;ri++){
    if(shouldStop)break;
    var r=routes[ri];
    updateProgress(ri,routes.length,div+': '+r.away+' → '+r.host);
    log('Route: '+r.away+' → '+r.host,'info');

    var outbound={};
    var recipes=R[r.key]||[];

    for(var si=0;si<STARTS.length&&!shouldStop;si++){
      for(var rci=0;rci<recipes.length;rci++){
        log(' Recipe '+(rci+1)+' dep ~'+STARTS[si],'dim');
        var j=await findJourney(recipes[rci],r.date,STARTS[si]);
        if(j){
          var jk=j.legs[0].depart;
          if(!outbound[jk]||j.totalMins<outbound[jk].totalMins)outbound[jk]=j;
          break;
        }
      }
    }

    // Return journeys
    var retKey=r.host+'→'+r.away;
    var retRecipes=R[retKey]||[];
    var returns={};

    if(retRecipes.length>0){
      log('Return: '+r.host+' → '+r.away,'info');
      for(var rti=0;rti<RET_STARTS.length&&!shouldStop;rti++){
        for(var rrci=0;rrci<retRecipes.length;rrci++){
          var rj=await findJourney(retRecipes[rrci],r.date,RET_STARTS[rti]);
          if(rj){var rjk=rj.legs[0].depart;if(!returns[rjk]||rj.totalMins<returns[rjk].totalMins)returns[rjk]=rj;break;}
        }
      }
    } else {
      log('No return recipes for '+retKey,'warn');
    }

    if(Object.keys(outbound).length===0)totalFailed++;
    document.getElementById('statFailed').textContent=totalFailed;

    ALL[r.key]={
      division:div,away:r.away,host:r.host,date:r.date,
      outbound:Object.values(outbound).sort(function(a,b){return tm(a.legs[0].depart)-tm(b.legs[0].depart)}),
      returns:Object.values(returns).sort(function(a,b){return tm(a.legs[0].depart)-tm(b.legs[0].depart)})
    };
  }
  updateProgress(routes.length,routes.length,div+' done');
  log('═══ '+div.toUpperCase()+' COMPLETE ═══','ok');
}

/* ─────────────────────────────────────────────
   UI
   ───────────────────────────────────────────── */

function log(msg,cls){var el=document.getElementById('log');var d=document.createElement('div');d.className=cls||'info';d.textContent=msg;el.appendChild(d);el.scrollTop=el.scrollHeight}
function updateProgress(done,total,txt){
  var pct=total>0?(done/total*100):0;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pText').textContent=txt||(done+'/'+total);
}

function switchDiv(div,btn){
  currentDiv=div;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
  var c=CFG[div];var routes=routesFor(div);
  document.getElementById('divInfo').textContent=div+' — '+c.label+' — '+routes.length+' routes';
  document.getElementById('btnRun').textContent='Run '+div;
}

async function testAPI(){
  document.getElementById('apiStatus').textContent='Testing...';
  var deps=await getDepartures('YRK','2026-05-03','08:00');
  document.getElementById('apiStatus').innerHTML=deps.length>0?'<span style="color:#1e7e34">OK ✓ '+deps.length+' deps</span>':'<span style="color:#c0392b">Failed</span>';
}

async function runCurrentDiv(){running=true;shouldStop=false;await runDiv(currentDiv);renderResults();updateExport();running=false}
async function runAllDivs(){running=true;shouldStop=false;await runDiv('National');await runDiv('North');await runDiv('South');renderResults();updateExport();running=false}
function stopRun(){shouldStop=true;log('STOPPED','err')}

function renderResults(){
  var html='';
  Object.keys(ALL).forEach(function(key){
    var r=ALL[key];
    html+='<div class="route-card"><div class="route-header"><span class="route-title">'+esc(r.away)+' → '+esc(r.host)+'</span><span class="route-meta">'+esc(r.division)+' · '+esc(r.date)+'</span></div>';
    if(r.outbound.length){
      html+='<div class="section-label">Outbound</div>';
      r.outbound.forEach(function(j){html+=jRow(j)});
    } else html+='<div class="journey-row" style="color:#c0392b">No outbound journeys found</div>';
    if(r.returns.length){
      html+='<div class="section-label">Return</div>';
      r.returns.forEach(function(j){html+=jRow(j)});
    } else html+='<div class="journey-row" style="color:#e67e22">No return recipes/journeys</div>';
    html+='</div>';
  });
  document.getElementById('resultsArea').innerHTML=html||'No results.';
}

function jRow(j){
  var dep=j.legs[0].depart;var arr=j.legs[j.legs.length-1].arrive;
  var h=Math.floor(j.totalMins/60);var m=j.totalMins%60;
  var legs=j.legs.map(function(l){return'<span class="leg"><span class="leg-op">'+esc(l.operator)+'</span> '+esc(l.fromName)+' '+esc(l.depart)+' <span class="leg-arrow">→</span> '+esc(l.toName)+' '+esc(l.arrive)+'</span>'}).join(' ');
  return'<div class="journey-row"><span class="j-time">'+esc(dep)+' → '+esc(arr)+'</span><span class="j-detail">'+legs+'</span><span class="j-duration">'+h+'h'+String(m).padStart(2,'0')+' · '+j.changes+'chg</span></div>';
}

function updateExport(){document.getElementById('exportJSON').value=JSON.stringify(ALL,null,2)}
function copyJSON(){var t=document.getElementById('exportJSON');t.select();document.execCommand('copy')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

switchDiv('National',document.querySelector('.tab.active'));
</script>
