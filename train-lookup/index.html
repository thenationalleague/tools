  Chains timetable + service_timetable endpoints to build multi-leg journeys.
  Runs client-side. Uses TransportAPI timetable data.
-->

<div class="wrap">

  <!-- Credentials -->

<script>
/* ─────────────────────────────────────────────
   CONFIG & ROUTING RECIPES
   ───────────────────────────────────────────── */

var API_BASE = 'https://transportapi.com/v3/uk/train';
var DELAY_MS = 1200; // ms between API calls
var currentDiv = 'National';

// Station CRS codes
var CRS = {
  'York City':'YRK','Rochdale':'RCD','Carlisle United':'CAR','Boreham Wood':'ELS',
  'Scunthorpe United':'SCA','Forest Green Rovers':'STD','Southend United':'SOC',
  'South Shields':'EBD','AFC Fylde':'KKM','Kidderminster Harriers':'KID',
  'Macclesfield':'MAC','Merthyr Town':'MER','Scarborough Athletic':'SCA',
  'Chester':'CTR','Darlington':'DAR','Buxton':'BUX','AFC Telford United':'TFC',
  'Spennymoor Town':'DHM',
  'Worthing':'WRH','Dorking Wanderers':'DKG','Torquay United':'TRR',
  'Hornchurch':'UPM','Weston-super-Mare':'WSM','Hemel Hempstead Town':'HML',
  'Ebbsfleet United':'EBD','Maidenhead United':'MAI','Maidstone United':'MDE',
  'Chesham United':'CSM','Chelmsford City':'CHM'
};

// Routing recipes: for each (from_team → to_team), define the connection pattern.
// Each recipe is an array of legs: [{from: CRS, direction: [dest CRS codes to look for], changeTo: CRS}]
// The tool will: query departures from `from`, find services calling at any `direction` station,
// follow that service timetable to the `changeTo` station, then continue to next leg.
// Final leg ends at the destination.

// Key interchange stations
var EUS = 'EUS'; // London Euston
var KGX = 'KGX'; // London Kings Cross
var STP = 'STP'; // London St Pancras
var LDS = 'LDS'; // Leeds
var MAN = 'MAN'; // Manchester
var MCV = 'MCV'; // Manchester Victoria
var PRE = 'PRE'; // Preston
var BHM = 'BHM'; // Birmingham New Street
var DON = 'DON'; // Doncaster
var NCL = 'NCL'; // Newcastle
var CBG = 'CBG'; // Cambridge

// Routing recipes per route — "away team → host team"
// Each recipe: array of {from:CRS, seekStops:[CRS], to:CRS}
// The tool queries `from` departures, finds trains that call at any of `seekStops`,
// follows the service timetable to `to` (the change station or final dest),
// then moves to the next leg.
var RECIPES = {};

function addRecipe(away, host, legs) {
  var key = away + '→' + host;
  if (!RECIPES[key]) RECIPES[key] = [];
  RECIPES[key].push(legs);
}

// ── NATIONAL DIVISION (Sunday 03/05) ──
// Hosts: York (YRK), Rochdale (RCD), Carlisle (CAR), Boreham Wood (ELS)
// Aways: Carlisle (CAR), Boreham Wood (ELS), Scunthorpe (SCA), Forest Green (STD), Southend (SOC)

// Carlisle → York: direct via Settle-Carlisle (Northern) or via Newcastle/LNER
addRecipe('Carlisle United','York City', [{from:'CAR',seekStops:['LDS','YRK'],to:'YRK'}]); // Direct Settle-Carlisle→Leeds then Leeds→York
addRecipe('Carlisle United','York City', [{from:'CAR',seekStops:['LDS'],to:'LDS'},{from:'LDS',seekStops:['YRK'],to:'YRK'}]);

// Carlisle → Rochdale: Carlisle→Preston/Leeds→Rochdale, or Carlisle→Manchester→Rochdale
addRecipe('Carlisle United','Rochdale', [{from:'CAR',seekStops:['PRE','LDS','MCV','MAN'],to:'LDS'},{from:'LDS',seekStops:['RCD'],to:'RCD'}]);
addRecipe('Carlisle United','Rochdale', [{from:'CAR',seekStops:['PRE'],to:'PRE'},{from:'PRE',seekStops:['MCV','MAN','RCD'],to:'RCD'}]);

// Carlisle → Boreham Wood: Carlisle→Euston (Avanti)→Elstree (Thameslink)
addRecipe('Carlisle United','Boreham Wood', [{from:'CAR',seekStops:['EUS'],to:'EUS'},{from:'EUS',seekStops:['ELS'],to:'ELS'}]);

// Boreham Wood → York: Elstree→StPancras/KGX (Thameslink)→York (LNER)
addRecipe('Boreham Wood','York City', [{from:'ELS',seekStops:['STP','KGX'],to:'STP'},{from:'STP',seekStops:['YRK'],to:'YRK'}]);
addRecipe('Boreham Wood','York City', [{from:'ELS',seekStops:['STP'],to:'STP'},{from:'KGX',seekStops:['YRK'],to:'YRK'}]);

// Boreham Wood → Rochdale: Elstree→StPancras→Sheffield/Manchester→Rochdale (complex)
addRecipe('Boreham Wood','Rochdale', [{from:'ELS',seekStops:['STP'],to:'STP'},{from:'STP',seekStops:['MAN','SHF','LDS'],to:'MAN'},{from:'MAN',seekStops:['RCD'],to:'RCD'}]);

// Boreham Wood → Carlisle: Elstree→Euston (Thameslink south)→Euston (Avanti north)→Carlisle
addRecipe('Boreham Wood','Carlisle United', [{from:'ELS',seekStops:['STP','EUS'],to:'EUS'},{from:'EUS',seekStops:['CAR'],to:'CAR'}]);

// Scunthorpe → York: via Doncaster most likely
addRecipe('Scunthorpe United','York City', [{from:'SCA',seekStops:['DON'],to:'DON'},{from:'DON',seekStops:['YRK'],to:'YRK'}]);

// Scunthorpe → Rochdale: Scunthorpe→Sheffield/Manchester→Rochdale
addRecipe('Scunthorpe United','Rochdale', [{from:'SCA',seekStops:['DON','SHF'],to:'SHF'},{from:'SHF',seekStops:['MAN','MCV'],to:'MAN'},{from:'MAN',seekStops:['RCD'],to:'RCD'}]);

// Scunthorpe → Carlisle: Scunthorpe→Doncaster→York/Leeds→Carlisle
addRecipe('Scunthorpe United','Carlisle United', [{from:'SCA',seekStops:['DON'],to:'DON'},{from:'DON',seekStops:['YRK'],to:'YRK'},{from:'YRK',seekStops:['CAR'],to:'CAR'}]);

// Scunthorpe → Boreham Wood: Scunthorpe→Doncaster→KGX→StPancras→Elstree
addRecipe('Scunthorpe United','Boreham Wood', [{from:'SCA',seekStops:['DON'],to:'DON'},{from:'DON',seekStops:['KGX'],to:'KGX'},{from:'KGX',seekStops:['ELS'],to:'ELS'}]);

// Forest Green (Stroud) → York: Stroud→Cheltenham/Bristol→Birmingham→Leeds→York or Stroud→Swindon→London→York
addRecipe('Forest Green Rovers','York City', [{from:'STD',seekStops:['CNM','BHM'],to:'BHM'},{from:'BHM',seekStops:['LDS','YRK'],to:'YRK'}]);
addRecipe('Forest Green Rovers','York City', [{from:'STD',seekStops:['SWI','PAD'],to:'PAD'},{from:'KGX',seekStops:['YRK'],to:'YRK'}]);

// Forest Green → Rochdale: Stroud→Birmingham→Manchester→Rochdale
addRecipe('Forest Green Rovers','Rochdale', [{from:'STD',seekStops:['CNM','BHM'],to:'BHM'},{from:'BHM',seekStops:['MAN'],to:'MAN'},{from:'MAN',seekStops:['RCD'],to:'RCD'}]);

// Forest Green → Carlisle: Stroud→Birmingham→Carlisle (Avanti via Crewe/Preston)
addRecipe('Forest Green Rovers','Carlisle United', [{from:'STD',seekStops:['CNM','BHM'],to:'BHM'},{from:'BHM',seekStops:['CAR','PRE'],to:'CAR'}]);

// Forest Green → Boreham Wood: Stroud→Swindon→London Paddington→(tube/walk)→StPancras→Elstree
addRecipe('Forest Green Rovers','Boreham Wood', [{from:'STD',seekStops:['SWI','PAD'],to:'PAD'}]); // After Paddington needs tube — flag manually

// Southend → York: Southend Central→London (c2c/GA)→KGX→York (LNER)
addRecipe('Southend United','York City', [{from:'SOC',seekStops:['FST','LST'],to:'FST'},{from:'KGX',seekStops:['YRK'],to:'YRK'}]);

// Southend → Rochdale: Southend→London→Euston→Manchester→Rochdale
addRecipe('Southend United','Rochdale', [{from:'SOC',seekStops:['FST','LST'],to:'FST'},{from:'EUS',seekStops:['MAN','MCV'],to:'MAN'},{from:'MAN',seekStops:['RCD'],to:'RCD'}]);

// Southend → Carlisle: Southend→London→Euston→Carlisle
addRecipe('Southend United','Carlisle United', [{from:'SOC',seekStops:['FST','LST'],to:'FST'},{from:'EUS',seekStops:['CAR'],to:'CAR'}]);

// Southend → Boreham Wood: Southend→Stratford/Liverpool St→(connect)→Elstree
addRecipe('Southend United','Boreham Wood', [{from:'SOC',seekStops:['SRA','FST','LST'],to:'SRA'}]); // Needs Overground/tube — may not chain cleanly


/* ─────────────────────────────────────────────
   API HELPERS
   ───────────────────────────────────────────── */

function getCredentials() {
  return { id: document.getElementById('appId').value.trim(), key: document.getElementById('appKey').value.trim() };
}

function apiUrl(path) {
  var c = getCredentials();
  var sep = path.indexOf('?') >= 0 ? '&' : '?';
  return API_BASE + path + sep + 'app_id=' + c.id + '&app_key=' + c.key;
}

async function apiFetch(path) {
  var url = apiUrl(path);
  try {
    var resp = await fetch(url);
    if (!resp.ok) return { _error: resp.status + ' ' + resp.statusText };
    return await resp.json();
  } catch(e) {
    return { _error: e.message };
  }
}

function sleep(ms) { return new Promise(function(r){setTimeout(r,ms)}); }

// Get departures from a station on a date, starting from a time
// Returns array of {mode, departure_time, destination_name, train_uid, operator_name, service_timetable_url}
async function getDepartures(stationCRS, date, fromTime) {
  var path = '/station/' + stationCRS + '/' + date + '/' + fromTime + '/timetable.json?train_status=passenger';
  var data = await apiFetch(path);
  if (data._error) return { error: data._error };
  if (!data.departures || !data.departures.all) return { error: 'No departures data' };
  return data.departures.all.filter(function(d) { return d.mode === 'train'; });
}

// Get a service timetable — returns array of stops with times
async function getServiceTimetable(trainUid, date) {
  var path = '/service_timetables/' + trainUid + ':' + date + '.json';
  var data = await apiFetch(path);
  if (data._error) return { error: data._error };
  if (!data.stops) return { error: 'No stops data' };
  return data.stops;
}

// Check if a service calls at any of the target stations
// Returns the stop data for the first matching station, or null
function serviceCallsAt(stops, targetCRS, afterTime) {
  var afterMins = timeToMins(afterTime);
  for (var i = 0; i < stops.length; i++) {
    var s = stops[i];
    if (targetCRS.indexOf(s.station_code) >= 0) {
      var arrTime = s.aimed_arrival_time || s.aimed_departure_time;
      if (arrTime && timeToMins(arrTime) >= afterMins) {
        return s;
      }
    }
  }
  return null;
}

function timeToMins(t) {
  if (!t) return -1;
  var p = t.split(':');
  return parseInt(p[0]) * 60 + parseInt(p[1]);
}

function minsToTime(m) {
  if (m < 0) return '??:??';
  var h = Math.floor(m / 60) % 24;
  var mm = m % 60;
  return String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
}

/* ─────────────────────────────────────────────
   JOURNEY CHAIN ENGINE
   ───────────────────────────────────────────── */

// For a given recipe (array of legs), attempt to find a journey departing after `startTime`
// Returns: {legs: [{from, to, depart, arrive, operator, trainUid}], totalMins, changes} or null
async function findJourneyForRecipe(recipe, date, startTime) {
  var currentTime = startTime;
  var legs = [];
  var apiCalls = 0;

  for (var li = 0; li < recipe.length; li++) {
    var leg = recipe[li];
    var minConnectionTime = li > 0 ? 10 : 0; // 10 min minimum connection
    var searchFrom = li > 0 ? minsToTime(timeToMins(currentTime) + minConnectionTime) : currentTime;

    logMsg('  Leg ' + (li+1) + ': departures from ' + leg.from + ' after ' + searchFrom, 'dim');

    // Get departures
    var deps = await getDepartures(leg.from, date, searchFrom);
    apiCalls++;
    await sleep(DELAY_MS);

    if (deps.error || deps.length === 0) {
      logMsg('  No departures from ' + leg.from + ' after ' + searchFrom, 'err');
      return null;
    }

    // Try each departure to see if it reaches our target
    var found = false;
    for (var di = 0; di < Math.min(deps.length, 15); di++) {
      var dep = deps[di];
      var depTime = dep.aimed_departure_time;
      if (timeToMins(depTime) < timeToMins(searchFrom)) continue;

      // Get service timetable to check if it calls at our target
      var stops = await getServiceTimetable(dep.train_uid, date);
      apiCalls++;
      await sleep(DELAY_MS);

      if (stops.error) continue;

      var targetStop = serviceCallsAt(stops, leg.seekStops.concat([leg.to]), depTime);
      if (targetStop && targetStop.station_code === leg.to) {
        // Direct to our target station on this leg
        var arrTime = targetStop.aimed_arrival_time || targetStop.aimed_departure_time;
        legs.push({
          from: leg.from, to: leg.to,
          fromName: getStationNameFromStops(stops, leg.from) || leg.from,
          toName: targetStop.station_name || leg.to,
          depart: depTime, arrive: arrTime,
          operator: dep.operator_name, trainUid: dep.train_uid
        });
        currentTime = arrTime;
        found = true;
        logMsg('  ✓ ' + leg.from + ' ' + depTime + ' → ' + leg.to + ' ' + arrTime + ' (' + dep.operator_name + ')', 'ok');
        break;
      } else if (targetStop) {
        // Calls at a seek station but not the final target — check if it reaches to
        var finalStop = serviceCallsAt(stops, [leg.to], depTime);
        if (finalStop) {
          var arrTime2 = finalStop.aimed_arrival_time || finalStop.aimed_departure_time;
          legs.push({
            from: leg.from, to: leg.to,
            fromName: getStationNameFromStops(stops, leg.from) || leg.from,
            toName: finalStop.station_name || leg.to,
            depart: depTime, arrive: arrTime2,
            operator: dep.operator_name, trainUid: dep.train_uid
          });
          currentTime = arrTime2;
          found = true;
          logMsg('  ✓ ' + leg.from + ' ' + depTime + ' → ' + leg.to + ' ' + arrTime2 + ' (' + dep.operator_name + ')', 'ok');
          break;
        }
      }
    }

    if (!found) {
      logMsg('  ✗ No train from ' + leg.from + ' reaching ' + leg.to + ' (checked ' + Math.min(deps.length, 15) + ' services)', 'warn');
      return null;
    }
  }

  // Calculate total
  var totalMins = timeToMins(legs[legs.length-1].arrive) - timeToMins(legs[0].depart);
  if (totalMins < 0) totalMins += 1440; // past midnight

  return { legs: legs, totalMins: totalMins, changes: legs.length - 1, apiCalls: apiCalls };
}

function getStationNameFromStops(stops, crs) {
  for (var i = 0; i < stops.length; i++) {
    if (stops[i].station_code === crs) return stops[i].station_name;
  }
  return null;
}

/* ─────────────────────────────────────────────
   ROUTE BUILDER
   ───────────────────────────────────────────── */

var DIVISION_CONFIG = {
  National: { date: '2026-05-03', label: 'Sun 03/05/2026', hosts: ['York City','Rochdale','Carlisle United','Boreham Wood'], aways: ['Carlisle United','Boreham Wood','Scunthorpe United','Forest Green Rovers','Southend United'] },
  North: { date: '2026-05-02', label: 'Sat 02/05/2026', hosts: ['South Shields','AFC Fylde','Kidderminster Harriers','Macclesfield'], aways: ['Kidderminster Harriers','Macclesfield','Merthyr Town','Scarborough Athletic','Chester','Darlington','Buxton','AFC Telford United','Spennymoor Town'] },
  South: { date: '2026-05-02', label: 'Sat 02/05/2026', hosts: ['Worthing','Dorking Wanderers','Torquay United','Hornchurch','Weston-super-Mare','Hemel Hempstead Town','Ebbsfleet United','Maidenhead United','Maidstone United','Chesham United','Chelmsford City'], aways: ['Worthing','Dorking Wanderers','Torquay United','Hornchurch','Weston-super-Mare','Hemel Hempstead Town','Ebbsfleet United','Maidenhead United','Maidstone United','Chesham United','Chelmsford City'] }
};

// Start times to try for outbound journeys
var START_TIMES = ['06:00','07:00','08:00','09:00','10:00'];

var ALL_RESULTS = {};

function getRouteKey(away, host) { return away + '→' + host; }

function getRoutesForDiv(div) {
  var cfg = DIVISION_CONFIG[div];
  var routes = [];
  cfg.hosts.forEach(function(host) {
    cfg.aways.forEach(function(away) {
      if (host === away) return;
      var key = getRouteKey(away, host);
      if (RECIPES[key]) {
        routes.push({ away: away, host: host, key: key, date: cfg.date });
      }
    });
  });
  return routes;
}

/* ─────────────────────────────────────────────
   UI
   ───────────────────────────────────────────── */

function logMsg(msg, cls) {
  var el = document.getElementById('log');
  var d = document.createElement('div');
  d.className = cls || 'info';
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function updateProgress(done, total, text) {
  var pct = total > 0 ? (done/total*100) : 0;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pText').textContent = text || (done + ' / ' + total);
}

function switchDiv(div, btn) {
  currentDiv = div;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
  var cfg = DIVISION_CONFIG[div];
  var routes = getRoutesForDiv(div);
  document.getElementById('divInfo').textContent = div + ' — ' + cfg.label + ' — ' + routes.length + ' routes with recipes';
  document.getElementById('btnRun').textContent = 'Run ' + div + ' Lookups';
}

async function testAPI() {
  document.getElementById('apiStatus').textContent = 'Testing...';
  var deps = await getDepartures('YRK', '2026-05-03', '08:00');
  if (deps.error) {
    document.getElementById('apiStatus').innerHTML = '<span style="color:#c0392b">Error: ' + deps.error + '</span>';
  } else {
    document.getElementById('apiStatus').innerHTML = '<span style="color:#1e7e34">OK — ' + deps.length + ' departures found ✓</span>';
  }
}

async function runCurrentDiv() {
  await runDiv(currentDiv);
  renderResults();
  updateExport();
}

async function runAllDivs() {
  await runDiv('National');
  await runDiv('North');
  await runDiv('South');
  renderResults();
  updateExport();
}

async function runDiv(div) {
  var routes = getRoutesForDiv(div);
  var cfg = DIVISION_CONFIG[div];
  logMsg('═══ ' + div.toUpperCase() + ' (' + cfg.label + ') — ' + routes.length + ' routes ═══', 'info');

  for (var ri = 0; ri < routes.length; ri++) {
    var route = routes[ri];
    updateProgress(ri, routes.length, div + ': ' + route.away + ' → ' + route.host);
    logMsg('Route: ' + route.away + ' → ' + route.host, 'info');

    var recipes = RECIPES[route.key] || [];
    var bestJourneys = {};

    // Try each recipe at each start time
    for (var si = 0; si < START_TIMES.length; si++) {
      var startTime = START_TIMES[si];
      for (var rci = 0; rci < recipes.length; rci++) {
        logMsg(' Trying recipe ' + (rci+1) + ' departing ~' + startTime, 'dim');
        var journey = await findJourneyForRecipe(recipes[rci], route.date, startTime);
        if (journey) {
          var jKey = journey.legs[0].depart; // key by actual departure time
          if (!bestJourneys[jKey] || journey.totalMins < bestJourneys[jKey].totalMins) {
            bestJourneys[jKey] = journey;
          }
          break; // Don't try other recipes if this one worked
        }
      }
    }

    // Now do return journeys (host → away)
    var returnKey = getRouteKey(route.host, route.away);
    var returnRecipes = RECIPES[returnKey] || [];
    var returnJourneys = {};
    var returnTimes = ['15:30','16:30','17:30','18:30','19:30','20:00'];

    if (returnRecipes.length > 0) {
      logMsg('Return: ' + route.host + ' → ' + route.away, 'info');
      for (var rti = 0; rti < returnTimes.length; rti++) {
        for (var rrci = 0; rrci < returnRecipes.length; rrci++) {
          var retJ = await findJourneyForRecipe(returnRecipes[rrci], route.date, returnTimes[rti]);
          if (retJ) {
            var rjKey = retJ.legs[0].depart;
            if (!returnJourneys[rjKey] || retJ.totalMins < returnJourneys[rjKey].totalMins) {
              returnJourneys[rjKey] = retJ;
            }
            break;
          }
        }
      }
    }

    ALL_RESULTS[route.key] = {
      division: div, away: route.away, host: route.host, date: route.date,
      outbound: Object.values(bestJourneys).sort(function(a,b) { return timeToMins(a.legs[0].depart) - timeToMins(b.legs[0].depart); }),
      returns: Object.values(returnJourneys).sort(function(a,b) { return timeToMins(a.legs[0].depart) - timeToMins(b.legs[0].depart); })
    };
  }

  updateProgress(routes.length, routes.length, div + ' complete');
  logMsg('═══ ' + div.toUpperCase() + ' COMPLETE ═══', 'ok');
}

function renderResults() {
  var html = '';
  Object.keys(ALL_RESULTS).forEach(function(key) {
    var r = ALL_RESULTS[key];
    html += '<div class="route-card">';
    html += '<div class="route-header"><span class="route-title">' + esc(r.away) + ' → ' + esc(r.host) + '</span><span class="route-meta">' + esc(r.division) + ' · ' + esc(r.date) + '</span></div>';

    // Outbound
    if (r.outbound.length === 0) {
      html += '<div class="journey-row"><span class="err">No outbound journeys found</span></div>';
    } else {
      html += '<div style="padding:6px 14px;font-size:10px;font-weight:800;color:#223b7c;text-transform:uppercase;background:#f8f9fb;border-bottom:1px solid #eef1f6">Outbound</div>';
      r.outbound.forEach(function(j) {
        html += journeyRowHtml(j);
      });
    }

    // Returns
    if (r.returns.length === 0) {
      html += '<div class="journey-row"><span class="warn">No return journeys found</span></div>';
    } else {
      html += '<div style="padding:6px 14px;font-size:10px;font-weight:800;color:#223b7c;text-transform:uppercase;background:#f8f9fb;border-bottom:1px solid #eef1f6">Return</div>';
      r.returns.forEach(function(j) {
        html += journeyRowHtml(j);
      });
    }

    html += '</div>';
  });

  document.getElementById('resultsArea').innerHTML = html || 'No results yet.';
}

function journeyRowHtml(j) {
  var departTime = j.legs[0].depart;
  var arriveTime = j.legs[j.legs.length-1].arrive;
  var hrs = Math.floor(j.totalMins/60);
  var mins = j.totalMins % 60;

  var legsHtml = j.legs.map(function(l) {
    return '<span class="leg"><span class="leg-op">' + esc(l.operator) + '</span> ' + esc(l.fromName) + ' ' + esc(l.depart) + ' <span class="leg-arrow">→</span> ' + esc(l.toName) + ' ' + esc(l.arrive) + '</span>';
  }).join(' ');

  return '<div class="journey-row">'
    + '<span class="j-time">' + esc(departTime) + ' → ' + esc(arriveTime) + '</span>'
    + '<span class="j-detail">' + legsHtml + '</span>'
    + '<span class="j-duration">' + hrs + 'h' + String(mins).padStart(2,'0') + ' · ' + j.changes + 'chg</span>'
    + '</div>';
}

function updateExport() {
  document.getElementById('exportJSON').value = JSON.stringify(ALL_RESULTS, null, 2);
}

function copyJSON() {
  var ta = document.getElementById('exportJSON');
  ta.select();
  document.execCommand('copy');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
switchDiv('National', document.querySelector('.tab.active'));
</script>
