<script>
var API_BASE='https://transportapi.com/v3/uk/train';
var currentDiv='National';
var running=false,shouldStop=false;
var totalAPICalls=0,totalSkipped=0,totalFound=0,totalFailed=0;

/* ─────────────────────────────────────────────
   VIRTUAL WALK CONNECTIONS
   If arriving at station A, you can walk to station B in N minutes.
   The engine will automatically chain these.
   ───────────────────────────────────────────── */
var WALKS = {
  'STP→KGX': 8,   // St Pancras ↔ Kings Cross (same building practically)
  'KGX→STP': 8,
  'STP→EUS': 6,   // St Pancras → Euston (5-6 min walk)
  'EUS→STP': 6,
  'EUS→KGX': 10,  // Euston → Kings Cross
  'KGX→EUS': 10,
  'FST→KGX': 15,  // Fenchurch St → Kings Cross (tube Circle/Met)
  'KGX→FST': 15,
  'FST→EUS': 18,  // Fenchurch St → Euston (tube)
  'EUS→FST': 18,
  'PAD→EUS': 15,  // Paddington → Euston (tube)
  'EUS→PAD': 15,
  'PAD→KGX': 18,  // Paddington → Kings Cross (tube)
  'KGX→PAD': 18,
  'MAN→MCV': 10,  // Manchester Piccadilly → Victoria (walk/tram)
  'MCV→MAN': 10,
};

/* ─────────────────────────────────────────────
   RECIPES — "Away Team → Host Team"
   Each recipe = array of legs.
   Leg types:
     {type:'train', from:CRS, seekStops:[CRS...], to:CRS}
     {type:'walk', from:CRS, to:CRS}  — uses WALKS table
   ───────────────────────────────────────────── */
var R={};
function add(away,host,legs){var k=away+'→'+host;if(!R[k])R[k]=[];R[k].push(legs);}

// ═══ NATIONAL (Sun 03/05) ═══
// Hosts: YRK, RCD, CAR, ELS
// Aways: CAR, ELS, SCU, STD, SOC

// -- To York (YRK) --

  {type:'train',from:'CAR',seekStops:['LDS'],to:'LDS'},
  {type:'train',from:'LDS',seekStops:['YRK'],to:'YRK'}
]);
add('Boreham Wood','York City',[
  {type:'train',from:'ELS',seekStops:['STP'],to:'STP'},
  {type:'walk',from:'STP',to:'KGX'},
  {type:'train',from:'KGX',seekStops:['YRK'],to:'YRK'}

/* ─────────────────────────────────────────────
   DESTINATION PRE-FILTER
   Maps station codes to "useful direction" keywords.
   If a departure's destination_name contains none of these, skip it.
   ───────────────────────────────────────────── */
var DIR_HINTS = {
  'LDS': ['Leeds','Carlisle','Skipton','Bradford','Sheffield','Nottingham'],
  'YRK': ['York','Edinburgh','Newcastle','Scarborough','Aberdeen','Darlington'],
  'DON': ['Doncaster','Sheffield','London','Cleethorpes','Manchester','Leeds','Hull'],
  'KGX': ['London','Kings Cross'],
  'STP': ['London','St Pancras','Luton','Bedford','Brighton','Elstree','Gatwick'],
  'EUS': ['London','Euston','Milton Keynes','Birmingham','Manchester','Liverpool','Glasgow','Carlisle','Preston','Crewe','Wolverhampton'],
  'FST': ['London','Fenchurch','Southend','Basildon','Tilbury'],
  'PAD': ['London','Paddington','Reading','Swindon','Bristol','Cardiff','Oxford','Cheltenham','Gloucester'],
  'ELS': ['Elstree','Borehamwood','Luton','Bedford','Brighton','St Albans','Sutton'],
  'CAR': ['Carlisle','Glasgow','Edinburgh','Lancaster','Penrith','Whitehaven','Leeds','Newcastle','Preston','Lockerbie'],
  'PRE': ['Preston','Lancaster','Blackpool','Carlisle','Glasgow','Edinburgh','Barrow'],
  'BHM': ['Birmingham','Wolverhampton','London','Manchester','Glasgow','Edinburgh','Bristol','Cardiff','Carlisle','Newcastle','York'],
  'MAN': ['Manchester','Stockport','Sheffield','London','Birmingham','Stoke'],
  'MCV': ['Manchester','Rochdale','Leeds','Bradford','Halifax','Huddersfield','Blackpool','Wigan','Southport','Liverpool'],
  'SHF': ['Sheffield','Manchester','Leeds','Doncaster','London','Nottingham','Liverpool'],
  'RCD': ['Rochdale','Manchester','Leeds','Bradford','Halifax'],
  'SCU': ['Scunthorpe','Doncaster','Cleethorpes','Manchester','Sheffield','Grimsby','Barnetby'],
  'SOC': ['Southend','Fenchurch','London','Basildon','Grays','Tilbury'],
  'STD': ['Stroud','Swindon','Gloucester','Cheltenham','London','Paddington','Bristol'],
  'NCL': ['Newcastle','Edinburgh','York','Darlington','Sunderland','Carlisle','Durham'],
  'CRE': ['Crewe','Manchester','Chester','London','Birmingham','Stoke','Stafford'],
};

function matchesDirection(depDestName, targetCRS) {
  var hints = DIR_HINTS[targetCRS];
  if (!hints) return true; // No filter = allow all
  var dn = (depDestName||'').toLowerCase();
  for (var i=0; i<hints.length; i++) {
    if (dn.indexOf(hints[i].toLowerCase()) >= 0) return true;
  }
  return false;
}

/* ─────────────────────────────────────────────
   API + ENGINE
   ───────────────────────────────────────────── */
function creds(){return{id:document.getElementById('appId').value.trim(),key:document.getElementById('appKey').value.trim()}}
function apiUrl(p){var c=creds();var s=p.indexOf('?')>=0?'&':'?';return API_BASE+p+s+'app_id='+c.id+'&app_key='+c.key}
function ms(){return parseInt(document.getElementById('delay').value)||200}

async function apiFetch(p){
  totalAPICalls++;updStat();
  try{var r=await fetch(apiUrl(p));if(!r.ok)return{_error:r.status};return await r.json()}catch(e){return{_error:e.message}}
}

function sleep(n){return new Promise(function(r){setTimeout(r,n)})}

async function getDeps(crs,date,time){
  var d=await apiFetch('/station/'+crs+'/'+date+'/'+time+'/timetable.json?train_status=passenger');
  if(d._error||!d.departures||!d.departures.all)return[];
  return d.departures.all.filter(function(x){return x.mode==='train'});
}

async function getStops(uid,date){
  var d=await apiFetch('/service_timetables/'+uid+':'+date+'.json');
  if(d._error||!d.stops)return null;
  return d.stops;
}

function findStop(stops,targets,afterTime){
  var aft=tm(afterTime);
  for(var i=0;i<stops.length;i++){
    var s=stops[i];
    if(targets.indexOf(s.station_code)>=0){
      var t=s.aimed_arrival_time||s.aimed_departure_time;
      if(t&&tm(t)>=aft)return s;
    }
  }
  return null;
}

function sName(stops,crs){for(var i=0;i<stops.length;i++)if(stops[i].station_code===crs)return stops[i].station_name;return crs}
function tm(t){if(!t)return-1;var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1])}
function ft(m){if(m<0)return'??:??';return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}

async function findJourney(recipe,date,startTime){
  var curTime=startTime;
  var legs=[];
  var d=ms();

  for(var li=0;li<recipe.length;li++){
    var leg=recipe[li];

    // WALK LEG — just add time
    if(leg.type==='walk'){
      var walkKey=leg.from+'→'+leg.to;
      var walkMins=WALKS[walkKey];
      if(!walkMins){log('  ✗ No walk data for '+walkKey,'err');return null}
      var newTime=tm(curTime)+walkMins;
      var walkArr=ft(newTime);
      legs.push({from:leg.from,to:leg.to,fromName:leg.from,toName:leg.to,depart:curTime,arrive:walkArr,operator:'Walk',uid:'walk',isWalk:true});
      curTime=walkArr;
      log('  🚶 Walk '+leg.from+' → '+leg.to+' ('+walkMins+'min) arr '+walkArr,'dim');
      continue;
    }

    // TRAIN LEG
    var minConn=li>0&&!legs[legs.length-1].isWalk?8:0;
    var searchFrom=minConn>0?ft(tm(curTime)+minConn):curTime;

    log('  Leg '+(li+1)+': '+leg.from+' after '+searchFrom,'dim');

    var deps=await getDeps(leg.from,date,searchFrom);
    await sleep(d);
    if(deps.length===0){log('  No departures from '+leg.from+' after '+searchFrom,'err');return null}

    var found=false,checked=0;
    var allTargets=leg.seekStops.concat([leg.to]);

    for(var di=0;di<Math.min(deps.length,20)&&!found;di++){
      var dep=deps[di];
      if(tm(dep.aimed_departure_time)<tm(searchFrom))continue;

      // PRE-FILTER: check destination name matches our direction
      if(!matchesDirection(dep.destination_name,leg.to)){
        totalSkipped++;updStat();
        continue;
      }

      var stops=await getStops(dep.train_uid,date);
      await sleep(d);
      checked++;
      if(!stops)continue;

      var dest=findStop(stops,[leg.to],dep.aimed_departure_time);
      if(dest){
        var arr=dest.aimed_arrival_time||dest.aimed_departure_time;
        legs.push({from:leg.from,to:leg.to,fromName:sName(stops,leg.from)||leg.from,toName:dest.station_name||leg.to,depart:dep.aimed_departure_time,arrive:arr,operator:dep.operator_name,uid:dep.train_uid,isWalk:false});
        curTime=arr;
        found=true;
        log('  ✓ '+leg.from+' '+dep.aimed_departure_time+' → '+leg.to+' '+arr+' ('+dep.operator_name+')','ok');
      }
      if(shouldStop)return null;
    }

    if(!found){log('  ✗ No train '+leg.from+' → '+leg.to+' (checked '+checked+', skipped '+(Math.min(deps.length,20)-checked)+')','warn');return null}
  }

  var total=tm(legs[legs.length-1].arrive)-tm(legs[0].depart);
  if(total<0)total+=1440;
  totalFound++;updStat();
  return{legs:legs,totalMins:total,changes:legs.filter(function(l){return!l.isWalk}).length-1};
}

/* ─────────────────────────────────────────────
   DIVISION CONFIG
   ───────────────────────────────────────────── */
var CFG={
  National:{date:'2026-05-03',label:'Sun 03/05/2026',
    hosts:['York City','Rochdale','Carlisle United','Boreham Wood'],
    aways:['Carlisle United','Boreham Wood','Scunthorpe United','Forest Green Rovers','Southend United']},
  North:{date:'2026-05-02',label:'Sat 02/05/2026',
    hosts:['South Shields','AFC Fylde','Kidderminster Harriers','Macclesfield'],
    aways:['Kidderminster Harriers','Macclesfield','Merthyr Town','Scarborough Athletic','Chester','Darlington','Buxton','AFC Telford United','Spennymoor Town']},
  South:{date:'2026-05-02',label:'Sat 02/05/2026',
    hosts:['Worthing','Dorking Wanderers','Torquay United','Hornchurch','Weston-super-Mare','Hemel Hempstead Town','Ebbsfleet United','Maidenhead United','Maidstone United','Chesham United','Chelmsford City'],
    aways:['Worthing','Dorking Wanderers','Torquay United','Hornchurch','Weston-super-Mare','Hemel Hempstead Town','Ebbsfleet United','Maidenhead United','Maidstone United','Chesham United','Chelmsford City']}
};

var OUT_STARTS=['06:00','07:00','07:30','08:00','08:30','09:00','09:30','10:00','10:30','11:00'];
var RET_STARTS=['15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30'];

function routesFor(div){
  var c=CFG[div];var out=[];
  c.hosts.forEach(function(h){c.aways.forEach(function(a){
    if(h===a)return;var k=a+'→'+h;
    if(R[k])out.push({away:a,host:h,key:k,date:c.date});
  })});
  return out;
}

var ALL={};

async function runDiv(div){
  var routes=routesFor(div);var c=CFG[div];
  log('═══ '+div.toUpperCase()+' ('+c.label+') — '+routes.length+' routes ═══','head');

  for(var ri=0;ri<routes.length;ri++){
    if(shouldStop)break;
    var r=routes[ri];
    updProg(ri,routes.length,div+': '+r.away+' → '+r.host);
    log('Route: '+r.away+' → '+r.host,'info');

    var outbound={};var recipes=R[r.key]||[];
    for(var si=0;si<OUT_STARTS.length&&!shouldStop;si++){
      for(var rci=0;rci<recipes.length;rci++){
        log(' Recipe '+(rci+1)+' dep ~'+OUT_STARTS[si],'dim');
        var j=await findJourney(recipes[rci],r.date,OUT_STARTS[si]);
        if(j){var jk=j.legs[0].depart;if(!outbound[jk]||j.totalMins<outbound[jk].totalMins)outbound[jk]=j;break;}
      }
    }

    // Returns
    var retKey=r.host+'→'+r.away;var retR=R[retKey]||[];var returns={};
    if(retR.length>0){
      log('Return: '+r.host+' → '+r.away,'info');
      for(var rti=0;rti<RET_STARTS.length&&!shouldStop;rti++){
        for(var rrci=0;rrci<retR.length;rrci++){
          var rj=await findJourney(retR[rrci],r.date,RET_STARTS[rti]);
          if(rj){var rjk=rj.legs[0].depart;if(!returns[rjk]||rj.totalMins<returns[rjk].totalMins)returns[rjk]=rj;break;}
        }
      }
    } else log('No return recipes for '+retKey,'warn');

    if(Object.keys(outbound).length===0){totalFailed++;updStat()}
    ALL[r.key]={division:div,away:r.away,host:r.host,date:r.date,
      outbound:Object.values(outbound).sort(function(a,b){return tm(a.legs[0].depart)-tm(b.legs[0].depart)}),
      returns:Object.values(returns).sort(function(a,b){return tm(a.legs[0].depart)-tm(b.legs[0].depart)})
    };
  }
  updProg(routes.length,routes.length,div+' done');
  log('═══ '+div.toUpperCase()+' COMPLETE ═══','ok');
}

/* ─────────────────────────────────────────────
   UI
   ───────────────────────────────────────────── */
function log(msg,cls){var el=document.getElementById('log');var d=document.createElement('div');d.className=cls||'info';d.textContent=msg;el.appendChild(d);el.scrollTop=el.scrollHeight}
function updProg(done,total,txt){document.getElementById('pFill').style.width=(total>0?(done/total*100):0)+'%';document.getElementById('pText').textContent=txt||(done+'/'+total)}
function updStat(){document.getElementById('statCalls').textContent=totalAPICalls;document.getElementById('statSkipped').textContent=totalSkipped;document.getElementById('statFound').textContent=totalFound;document.getElementById('statFailed').textContent=totalFailed}

function switchDiv(div,btn){
  currentDiv=div;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});btn.classList.add('active');
  var c=CFG[div];var routes=routesFor(div);
  document.getElementById('divInfo').textContent=div+' — '+c.label+' — '+routes.length+' routes with recipes';
  document.getElementById('btnRun').textContent='Run '+div;
}

async function testAPI(){
  document.getElementById('apiStatus').textContent='Testing...';
  var deps=await getDeps('YRK','2026-05-03','08:00');
  document.getElementById('apiStatus').innerHTML=deps.length>0?'<span style="color:#1e7e34">OK ✓ '+deps.length+' train deps</span>':'<span style="color:#c0392b">Failed</span>';
}

async function runCurrentDiv(){running=true;shouldStop=false;await runDiv(currentDiv);renderResults();updateExport();running=false}
async function runAllDivs(){running=true;shouldStop=false;for(var d of['National','North','South'])await runDiv(d);renderResults();updateExport();running=false}
function stopRun(){shouldStop=true;log('STOPPED','err')}

function renderResults(){
  var html='';
  Object.keys(ALL).forEach(function(key){
    var r=ALL[key];
    html+='<div class="route-card"><div class="route-header"><span class="route-title">'+esc(r.away)+' → '+esc(r.host)+'</span><span class="route-meta">'+esc(r.division)+' · '+esc(r.date)+'</span></div>';
    if(r.outbound.length){
      html+='<div class="section-label">Outbound (away fans to ground)</div>';
      r.outbound.forEach(function(j){html+=jRow(j)});
    } else html+='<div class="journey-row" style="color:#c0392b">No outbound found</div>';
    if(r.returns.length){
      html+='<div class="section-label">Return (away fans home)</div>';
      r.returns.forEach(function(j){html+=jRow(j)});
    } else html+='<div class="journey-row" style="color:#e67e22">No return found</div>';
    html+='</div>';
  });
  document.getElementById('resultsArea').innerHTML=html||'No results.';
}

function jRow(j){
  var dep=j.legs[0].depart;var arr=j.legs[j.legs.length-1].arrive;
  var h=Math.floor(j.totalMins/60);var m=j.totalMins%60;
  var lhtml=j.legs.map(function(l){
    if(l.isWalk)return'<span class="leg leg-walk">🚶 '+esc(l.from)+' → '+esc(l.to)+'</span>';
    return'<span class="leg"><span class="leg-op">'+esc(l.operator)+'</span> '+esc(l.fromName)+' '+esc(l.depart)+' <span class="leg-arrow">→</span> '+esc(l.toName)+' '+esc(l.arrive)+'</span>';
  }).join(' ');
  return'<div class="journey-row"><span class="j-time">'+esc(dep)+' → '+esc(arr)+'</span><span class="j-detail">'+lhtml+'</span><span class="j-duration">'+h+'h'+String(m).padStart(2,'0')+' · '+j.changes+'chg</span></div>';
}

function updateExport(){document.getElementById('exportJSON').value=JSON.stringify(ALL,null,2)}
function copyJSON(){var t=document.getElementById('exportJSON');t.select();document.execCommand('copy')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

switchDiv('National',document.querySelector('.tab.active'));
