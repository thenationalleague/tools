<!-- nl-tools root password gate v1.0 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NL Tools</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; }
    .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card { width: min(520px, 100%); border: 1px solid rgba(127,127,127,.35); border-radius: 14px; padding: 22px; }
    h1 { margin: 0 0 8px; font-size: 20px; }
    p { margin: 0 0 14px; opacity: .85; line-height: 1.35; }
    .row { display: flex; gap: 10px; }
    input[type="password"] { flex: 1; padding: 12px 12px; border-radius: 10px; border: 1px solid rgba(127,127,127,.45); font-size: 16px; }
    button { padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(127,127,127,.45); cursor: pointer; font-size: 16px; }
    .msg { margin-top: 10px; min-height: 20px; font-size: 14px; }
    .bad { color: #b00020; }
    .small { margin-top: 10px; font-size: 12px; opacity: .75; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Password required</h1>
      <p>Enter your password to continue.</p>

      <form id="gate" autocomplete="off">
        <div class="row">
          <input id="pw" type="password" placeholder="Password" aria-label="Password" required />
          <button type="submit">Continue</button>
        </div>
        <div id="msg" class="msg"></div>
        <div class="small">Client-side gate (speed bump, not real auth).</div>
      </form>
    </div>
  </div>

  <script>
    // nl-tools root password gate v1.0
    const STORAGE_KEY = "nltools_gate_hash_v1";
    const msgEl = document.getElementById("msg");
    const pwEl = document.getElementById("pw");
    const form = document.getElementById("gate");

    function setMsg(text, isBad=false) {
      msgEl.textContent = text || "";
      msgEl.className = "msg" + (isBad ? " bad" : "");
    }

    async function sha1Hex(text) {
      const enc = new TextEncoder().encode(text);
      const buf = await crypto.subtle.digest("SHA-1", enc);
      const arr = Array.from(new Uint8Array(buf));
      return arr.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function exists(url) {
      try {
        let r = await fetch(url, { method: "HEAD", cache: "no-store" });
        if (r.ok) return true;
        r = await fetch(url, { method: "GET", cache: "no-store" });
        return r.ok;
      } catch {
        return false;
      }
    }

    async function go(hash) {
      const targetIndex = `${hash}/index.html`;
      const ok = await exists(targetIndex);
      if (ok) {
        localStorage.setItem(STORAGE_KEY, hash);
        window.location.href = `${hash}/`;
        return true;
      }
      return false;
    }

    (async () => {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) await go(saved);
    })();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setMsg("");
      const pw = pwEl.value || "";
      if (!pw.trim()) return;

      const hash = await sha1Hex(pw);
      const ok = await go(hash);

      if (!ok) {
        setMsg("Incorrect password. Please try again.", true);
        pwEl.select();
      }
    });
  </script>
</body>
</html>
