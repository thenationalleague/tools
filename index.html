<!--
  NL Tools — Login Page
  Version: v1.3
  Date: 30/03/2026
  Location: /tools/index.html

  Changelog:
  v1.3 (30/03/2026) — On successful password set, writes real UID-keyed user
                       record to RTDB (preserving name from pending record) and
                       deletes pending_ record in a single atomic update.
                       Added firebase-database-compat CDN script.
  v1.2 (30/03/2026) — First sign-in via invite link now shows set-password
                       screen with strength indicator before portal access.
  v1.1 (30/03/2026) — Email link sign-in completion + forgot password.
  v1.0 (30/03/2026) — Initial build.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NL Tools — Sign In</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:     #9e0000;
      --primary-dim: #7a0000;
      --navy:        #223b7c;
      --red:         #c0392b;
      --red-light:   #fdf0ef;
      --green:       #1e7e34;
      --green-light: #edf7ee;
      --white:       #ffffff;
      --off-white:   #f4f6f9;
      --text:        #1a2a44;
      --text-muted:  #5a6a82;
      --border:      #dde3ed;
      --radius:      6px;
      --font:        'carbona-variable','carbona',sans-serif;
    }

    @font-face {
      font-family: "carbona-variable";
      src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
           url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
      font-display: swap; font-style: normal; font-weight: 200 900; font-stretch: normal;
    }

    body {
      font-family: var(--font); font-size: 17px; line-height: 1.5;
      font-variation-settings: 'wght' 400; color: var(--text);
      background: var(--primary); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Auth overlay ── */
    .auth-checking {
      position: fixed; inset: 0; background: var(--primary);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.3); border-top-color: var(--white);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Login card ── */
    .login-box {
      background: var(--white); border-radius: 12px; padding: 52px;
      width: 100%; max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4); text-align: center;
    }
    .login-box img { width: 90px; margin-bottom: 24px; }
    .login-box h1 {
      font-size: 28px; font-weight: 900; font-variation-settings: 'wght' 900;
      text-transform: uppercase; letter-spacing: -0.01em; margin-bottom: 5px;
    }
    .login-box h1 .word-primary   { color: var(--primary); }
    .login-box h1 .word-secondary { color: var(--navy); }
    .login-box p.subtitle {
      font-size: 12px; color: var(--text-muted); margin-bottom: 32px;
      text-transform: uppercase; letter-spacing: 0.12em;
      font-weight: 700; font-variation-settings: 'wght' 700;
    }

    /* ── Fields ── */
    .field { margin-bottom: 16px; text-align: left; }
    .field label {
      display: block; font-size: 11px; font-weight: 800;
      font-variation-settings: 'wght' 800; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 11px 14px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-family: var(--font); font-size: 15px;
      font-variation-settings: 'wght' 400; color: var(--text);
      background: var(--white); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(158,0,0,0.10);
    }

    /* ── Hint text under field ── */
    .field-hint {
      font-size: 11px; color: var(--text-muted); margin-top: 5px;
      font-variation-settings: 'wght' 400; text-align: left;
    }

    /* ── Buttons ── */
    .btn-submit {
      width: 100%; margin-top: 8px; padding: 13px 20px;
      background: var(--primary); color: var(--white); border: none;
      border-radius: var(--radius); font-family: var(--font);
      font-size: 13px; font-weight: 900; font-variation-settings: 'wght' 900;
      text-transform: uppercase; letter-spacing: 0.1em;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-submit:hover:not(:disabled) { background: var(--primary-dim); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .forgot-link {
      display: inline-block; margin-top: 16px; font-size: 12px;
      color: var(--text-muted); cursor: pointer;
      font-weight: 600; font-variation-settings: 'wght' 600;
      transition: color 0.15s; background: none; border: none;
      font-family: var(--font); width: 100%; text-align: center;
    }
    .forgot-link:hover { color: var(--primary); }

    /* ── Status messages ── */
    .status-msg {
      display: none; margin-top: 16px; padding: 10px 14px;
      border-radius: var(--radius); font-size: 13px;
      font-weight: 600; font-variation-settings: 'wght' 600; text-align: left;
    }
    .status-msg.show    { display: block; }
    .status-msg.error   { background: var(--red-light);   border: 1px solid #f5c6c2; color: var(--red); }
    .status-msg.success { background: var(--green-light); border: 1px solid #b8dfc0; color: var(--green); }

    /* ── Screens — only one visible at a time ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Password strength indicator ── */
    .strength-bar {
      height: 3px; border-radius: 2px; margin-top: 6px;
      background: var(--border); overflow: hidden;
    }
    .strength-bar__fill {
      height: 100%; width: 0; border-radius: 2px;
      transition: width 0.2s, background 0.2s;
    }

    @media (max-width: 480px) {
      .login-box { padding: 36px 24px; margin: 16px; }
    }
  </style>
</head>
<body>

  <div class="auth-checking" id="authChecking">
    <div class="spinner"></div>
  </div>

  <div class="login-box" id="loginBox" style="display:none;">
    <img
      src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20logo%20white.png"
      alt="National League"
      onerror="this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
    <h1>
      <span class="word-primary">NL</span>
      <span class="word-secondary">Tools</span>
    </h1>
    <p class="subtitle" id="cardSubtitle">Internal Staff Portal</p>

    <!-- ── Screen 1: Standard sign-in ── -->
    <div class="screen active" id="screenSignIn">
      <div class="field">
        <label for="emailInput">Email address</label>
        <input type="email" id="emailInput"
          placeholder="you@thenationalleague.org.uk" autocomplete="email">
      </div>
      <div class="field">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput"
          placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-submit" id="signInBtn" onclick="doSignIn()">Sign in</button>
      <button class="forgot-link" onclick="doForgotPassword()">Forgot your password?</button>
      <div class="status-msg" id="signInStatus"></div>
    </div>

    <!-- ── Screen 2: Confirm email (different-device invite link) ── -->
    <div class="screen" id="screenConfirmEmail">
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;text-align:left;">
        Please confirm your email address to complete sign-in.
      </p>
      <div class="field">
        <label for="confirmEmailInput">Your email address</label>
        <input type="email" id="confirmEmailInput"
          placeholder="you@thenationalleague.org.uk">
      </div>
      <button class="btn-submit" onclick="completeEmailLink()">Continue</button>
      <div class="status-msg" id="confirmEmailStatus"></div>
    </div>

    <!-- ── Screen 3: Set password (first sign-in via invite link) ── -->
    <div class="screen" id="screenSetPassword">
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;text-align:left;">
        Welcome. Please set a password for your account — you'll use this to sign in from now on.
      </p>
      <div class="field">
        <label for="newPasswordInput">Choose a password</label>
        <input type="password" id="newPasswordInput"
          placeholder="At least 8 characters"
          oninput="updateStrength(this.value)">
        <div class="strength-bar">
          <div class="strength-bar__fill" id="strengthFill"></div>
        </div>
        <div class="field-hint" id="strengthLabel"></div>
      </div>
      <div class="field">
        <label for="confirmPasswordInput">Confirm password</label>
        <input type="password" id="confirmPasswordInput" placeholder="••••••••">
      </div>
      <button class="btn-submit" id="setPasswordBtn" onclick="doSetPassword()">Set password &amp; continue</button>
      <div class="status-msg" id="setPasswordStatus"></div>
    </div>

  </div>

  <script>
    var firebaseConfig = {
      apiKey:            "AIzaSyC3az3OMnU7TdqlaWp8yrO_EjgZ36l-mXU",
      authDomain:        "nl-tools.firebaseapp.com",
      databaseURL:       "https://nl-tools-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "nl-tools",
      storageBucket:     "nl-tools.firebasestorage.app",
      messagingSenderId: "801354670005",
      appId:             "1:801354670005:web:05d8ebad3e7e63610d03fc"
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    var db   = firebase.database();

    // pendingEmail is captured at link-completion time so doSetPassword
    // can use it to find and delete the pending RTDB record.
    var pendingEmail = null;

    // ── On load ──────────────────────────────────────────────────────────────
    if (auth.isSignInWithEmailLink(window.location.href)) {
      handleEmailLink();
    } else {
      auth.onAuthStateChanged(function(user) {
        if (user) {
          window.location.replace('/tools/portal/');
        } else {
          showBox();
          showScreen('screenSignIn');
          document.getElementById('emailInput').focus();
        }
      });
    }

    // ── Email link handling ──────────────────────────────────────────────────
    function handleEmailLink() {
      var email = localStorage.getItem('nlToolsInviteEmail');
      if (email) {
        completeSignInWithLink(email);
      } else {
        // Different device — ask for email confirmation first
        showBox();
        showScreen('screenConfirmEmail');
        document.getElementById('confirmEmailInput').focus();
      }
    }

    // Called either automatically (email from localStorage) or after manual
    // confirmation on a different device.
    function completeSignInWithLink(email) {
      auth.signInWithEmailLink(email, window.location.href)
        .then(function(result) {
          localStorage.removeItem('nlToolsInviteEmail');
          window.history.replaceState(null, '', '/tools/');
          pendingEmail = email; // store for pending record cleanup

          // Detect first-time sign-in by comparing creation and last sign-in times.
          // If they match to within a second, this is the very first sign-in.
          var meta     = result.user.metadata;
          var created  = new Date(meta.creationTime).getTime();
          var lastIn   = new Date(meta.lastSignInTime).getTime();
          var isFirst  = Math.abs(created - lastIn) < 2000;

          if (isFirst) {
            // First sign-in — prompt for password before portal access
            showBox();
            document.getElementById('cardSubtitle').textContent = 'Welcome to NL Tools';
            showScreen('screenSetPassword');
            document.getElementById('newPasswordInput').focus();
          } else {
            window.location.replace('/tools/portal/');
          }
        })
        .catch(function(err) {
          showBox();
          showScreen('screenSignIn');
          var msg = 'This invite link has expired or already been used. Contact your administrator.';
          if (err.code === 'auth/invalid-action-code') msg = 'This link has expired or already been used.';
          showStatus('signInStatus', msg, 'error');
        });
    }

    // Triggered from screen 2 (different-device confirm)
    function completeEmailLink() {
      var email = document.getElementById('confirmEmailInput').value.trim();
      if (!email) {
        showStatus('confirmEmailStatus', 'Please enter your email address.', 'error');
        return;
      }
      completeSignInWithLink(email);
    }

    // ── Set password (screen 3) ──────────────────────────────────────────────
    function doSetPassword() {
      var pw1 = document.getElementById('newPasswordInput').value;
      var pw2 = document.getElementById('confirmPasswordInput').value;
      var btn = document.getElementById('setPasswordBtn');

      if (pw1.length < 8) {
        showStatus('setPasswordStatus', 'Password must be at least 8 characters.', 'error');
        return;
      }
      if (pw1 !== pw2) {
        showStatus('setPasswordStatus', 'Passwords don\'t match.', 'error');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Saving…';

      var user = auth.currentUser;
      if (!user) {
        showStatus('setPasswordStatus', 'Session expired. Please use your invite link again.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Set password & continue';
        return;
      }

      user.updatePassword(pw1)
        .then(function() {
          // Write the real UID-keyed user record to RTDB, copying name/email
          // from the pending record, then delete the pending record.
          // If pendingEmail isn't set (e.g. page was refreshed), we write a
          // minimal record using the Auth account's email.
          var email      = pendingEmail || user.email;
          var pendingKey = 'pending_' + email.replace(/\./g, ',').replace(/@/g, '_at_');

          // Read pending record first to preserve name if available
          return db.ref('users/' + pendingKey).once('value')
            .then(function(snap) {
              var pending = snap.val() || {};
              var writes  = {};
              // Write real user record under their UID
              writes['users/' + user.uid] = {
                name:  pending.name  || '',
                email: email,
                tools: pending.tools || {}
              };
              // Delete the pending record
              writes['users/' + pendingKey] = null;
              return db.ref().update(writes);
            });
        })
        .then(function() {
          window.location.replace('/tools/portal/');
        })
        .catch(function(err) {
          btn.disabled    = false;
          btn.textContent = 'Set password & continue';
          var msg = 'Failed to set password. Try again.';
          if (err.code === 'auth/weak-password') msg = 'Password too weak — please choose something stronger.';
          if (err.code === 'auth/requires-recent-login') msg = 'Session expired. Please use your invite link again.';
          showStatus('setPasswordStatus', msg, 'error');
        });
    }

    // ── Password strength indicator ──────────────────────────────────────────
    function updateStrength(pw) {
      var fill  = document.getElementById('strengthFill');
      var label = document.getElementById('strengthLabel');
      var score = 0;
      if (pw.length >= 8)                        score++;
      if (pw.length >= 12)                       score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw))                      score++;
      if (/[^A-Za-z0-9]/.test(pw))               score++;

      var levels = [
        { pct: '0%',   colour: 'var(--border)',   text: '' },
        { pct: '25%',  colour: 'var(--red)',       text: 'Weak' },
        { pct: '50%',  colour: 'var(--amber)',     text: 'Fair' },
        { pct: '75%',  colour: 'var(--amber)',     text: 'Good' },
        { pct: '90%',  colour: 'var(--green)',     text: 'Strong' },
        { pct: '100%', colour: 'var(--green)',     text: 'Very strong' },
      ];
      var l = levels[Math.min(score, 5)];
      fill.style.width      = pw.length ? l.pct    : '0%';
      fill.style.background = pw.length ? l.colour : 'var(--border)';
      label.textContent     = pw.length ? l.text   : '';
    }

    // ── Standard sign-in ─────────────────────────────────────────────────────
    function doSignIn() {
      var email    = document.getElementById('emailInput').value.trim();
      var password = document.getElementById('passwordInput').value;
      var btn      = document.getElementById('signInBtn');

      if (!email || !password) {
        showStatus('signInStatus', 'Please enter your email and password.', 'error');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      clearStatus('signInStatus');

      auth.signInWithEmailAndPassword(email, password)
        .then(function() { /* onAuthStateChanged handles redirect */ })
        .catch(function(err) {
          btn.disabled    = false;
          btn.textContent = 'Sign in';
          var msg = 'Sign-in failed. Please try again.';
          if (err.code === 'auth/user-not-found'
           || err.code === 'auth/wrong-password'
           || err.code === 'auth/invalid-credential') {
            msg = 'Incorrect email or password.';
          } else if (err.code === 'auth/invalid-email') {
            msg = 'Please enter a valid email address.';
          } else if (err.code === 'auth/too-many-requests') {
            msg = 'Too many failed attempts. Please wait a moment and try again.';
          } else if (err.code === 'auth/user-disabled') {
            msg = 'This account has been disabled. Contact your administrator.';
          }
          showStatus('signInStatus', msg, 'error');
        });
    }

    // ── Forgot password ───────────────────────────────────────────────────────
    function doForgotPassword() {
      var email = document.getElementById('emailInput').value.trim();
      if (!email) {
        showStatus('signInStatus', 'Enter your email address above first.', 'error');
        return;
      }
      clearStatus('signInStatus');
      auth.sendPasswordResetEmail(email)
        .then(function() {
          showStatus('signInStatus', 'If that email has an account, a reset link has been sent.', 'success');
        })
        .catch(function(err) {
          var msg = 'Could not send reset email. Try again.';
          if (err.code === 'auth/invalid-email') msg = 'Please enter a valid email address.';
          showStatus('signInStatus', msg, 'error');
        });
    }

    // ── Enter key ────────────────────────────────────────────────────────────
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      var active = document.querySelector('.screen.active');
      if (!active) return;
      if (active.id === 'screenSignIn')        doSignIn();
      if (active.id === 'screenConfirmEmail')  completeEmailLink();
      if (active.id === 'screenSetPassword')   doSetPassword();
    });

    // ── UI helpers ────────────────────────────────────────────────────────────
    function showBox() {
      document.getElementById('authChecking').style.display = 'none';
      document.getElementById('loginBox').style.display     = 'block';
    }
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }
    function showStatus(elId, msg, type) {
      var el = document.getElementById(elId);
      el.textContent = msg;
      el.className   = 'status-msg show ' + (type || 'error');
    }
    function clearStatus(elId) {
      var el = document.getElementById(elId);
      el.className = 'status-msg'; el.textContent = '';
    }
  </script>
</body>
</html>
