<!-- nl-tools root password gate v1.1 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NL Tools</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      background: #f6f7f9;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 600;
    }

    p {
      margin: 0 0 18px;
      opacity: .75;
      font-size: 15px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input[type="password"] {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #d4d7dc;
      font-size: 16px;
      width: 100%;
    }

    button {
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      background: #9e0000;
      color: white;
      font-weight: 600;
    }

    button:hover { opacity: .92; }

    .msg {
      min-height: 20px;
      font-size: 14px;
      margin-top: 6px;
    }

    .bad { color: #b00020; }

    .small {
      margin-top: 10px;
      font-size: 12px;
      opacity: .6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>NL Tools</h1>
      <p>Enter password to continue</p>

      <form id="gate" autocomplete="off">
        <input id="pw" type="password" placeholder="Password" required />
        <button type="submit">Continue</button>
        <div id="msg" class="msg"></div>
      </form>

      <div class="small">Client-side gate</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "nltools_gate_hash_v1";
    const msgEl = document.getElementById("msg");
    const pwEl = document.getElementById("pw");
    const form = document.getElementById("gate");

    function setMsg(text, bad=false) {
      msgEl.textContent = text || "";
      msgEl.className = "msg" + (bad ? " bad" : "");
    }

    async function sha1Hex(text) {
      const enc = new TextEncoder().encode(text);
      const buf = await crypto.subtle.digest("SHA-1", enc);
      const arr = Array.from(new Uint8Array(buf));
      return arr.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function exists(url) {
      try {
        let r = await fetch(url, { method: "HEAD", cache: "no-store" });
        if (r.ok) return true;
        r = await fetch(url, { method: "GET", cache: "no-store" });
        return r.ok;
      } catch {
        return false;
      }
    }

    async function go(hash) {
      const ok = await exists(`${hash}/index.html`);
      if (ok) {
        localStorage.setItem(STORAGE_KEY, hash);
        window.location.href = `${hash}/`;
        return true;
      }
      return false;
    }

    (async () => {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) await go(saved);
    })();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setMsg("");

      const pw = pwEl.value.trim();
      if (!pw) return;

      const hash = await sha1Hex(pw);
      const ok = await go(hash);

      if (!ok) {
        setMsg("Incorrect password", true);
        pwEl.select();
      }
    });
  </script>
</body>
</html>
