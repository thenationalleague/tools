<!--
  NL Tools — Login Page
  Version: v1.0
  Date: 30/03/2026
  Location: /tools/index.html

  Changelog:
  v1.0 (30/03/2026) — Initial build. Firebase Auth email/password login,
                       NL brand design system, redirects to /tools/portal/
                       on successful authentication. Shows spinner while
                       Firebase resolves existing session (avoids login
                       flash for users who are already signed in).
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NL Tools — Sign In</title>

  <!-- Firebase compat CDN — globally scoped, no ES modules needed -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── NL Brand tokens ── */
    :root {
      --primary:     #9e0000;
      --primary-dim: #7a0000;
      --navy:        #223b7c;
      --red:         #c0392b;
      --red-light:   #fdf0ef;
      --white:       #ffffff;
      --off-white:   #f4f6f9;
      --text:        #1a2a44;
      --text-muted:  #5a6a82;
      --border:      #dde3ed;
      --radius:      6px;
      --font:        'carbona-variable','carbona',sans-serif;
    }

    /* ── Carbona font ── */
    @font-face {
      font-family: "carbona-variable";
      src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
           url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
      font-display: swap; font-style: normal; font-weight: 200 900; font-stretch: normal;
    }

    /* ── Body ── */
    body {
      font-family: var(--font);
      font-size: 17px;
      line-height: 1.5;
      font-variation-settings: 'wght' 400;
      color: var(--text);
      background: var(--primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Auth-checking overlay ──
       Covers the page while Firebase resolves whether a session already
       exists. Prevents the login form flashing briefly for signed-in users. */
    .auth-checking {
      position: fixed;
      inset: 0;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Login card ── */
    .login-box {
      background: var(--white);
      border-radius: 12px;
      padding: 52px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      text-align: center;
    }
    .login-box img {
      width: 90px;
      margin-bottom: 24px;
    }
    .login-box h1 {
      font-size: 28px;
      font-weight: 900;
      font-variation-settings: 'wght' 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin-bottom: 5px;
    }
    .login-box h1 .word-primary   { color: var(--primary); }
    .login-box h1 .word-secondary { color: var(--navy); }
    .login-box p.subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 32px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      font-variation-settings: 'wght' 700;
    }

    /* ── Form fields ── */
    .field { margin-bottom: 16px; text-align: left; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      font-variation-settings: 'wght' 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 15px;
      font-variation-settings: 'wght' 400;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(158,0,0,0.10);
    }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      margin-top: 8px;
      padding: 13px 20px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 900;
      font-variation-settings: 'wght' 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-submit:hover:not(:disabled) { background: var(--primary-dim); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Error message ── */
    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 10px 14px;
      background: var(--red-light);
      border: 1px solid #f5c6c2;
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--red);
      font-weight: 600;
      font-variation-settings: 'wght' 600;
      text-align: left;
    }
    .error-msg.show { display: block; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-box { padding: 36px 24px; margin: 16px; }
    }
  </style>
</head>
<body>

  <!-- Shown while Firebase resolves existing session state -->
  <div class="auth-checking" id="authChecking">
    <div class="spinner"></div>
  </div>

  <!-- Login form — hidden until auth check confirms no active session -->
  <div class="login-box" id="loginBox" style="display:none;">
    <img
      src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20logo%20white.png"
      alt="National League"
      onerror="this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">

    <h1>
      <span class="word-primary">NL</span>
      <span class="word-secondary">Tools</span>
    </h1>
    <p class="subtitle">Internal Staff Portal</p>

    <div class="field">
      <label for="emailInput">Email address</label>
      <input type="email" id="emailInput"
        placeholder="you@thenationalleague.org.uk"
        autocomplete="email">
    </div>

    <div class="field">
      <label for="passwordInput">Password</label>
      <input type="password" id="passwordInput"
        placeholder="••••••••"
        autocomplete="current-password">
    </div>

    <button class="btn-submit" id="signInBtn" onclick="doSignIn()">Sign in</button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    // ── Firebase init ────────────────────────────────────────────────────────
    var firebaseConfig = {
      apiKey:            "AIzaSyC3az3OMnU7TdqlaWp8yrO_EjgZ36l-mXU",
      authDomain:        "nl-tools.firebaseapp.com",
      databaseURL:       "https://nl-tools-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "nl-tools",
      storageBucket:     "nl-tools.firebasestorage.app",
      messagingSenderId: "801354670005",
      appId:             "1:801354670005:web:05d8ebad3e7e63610d03fc"
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();

    // ── Session check on load ────────────────────────────────────────────────
    // onAuthStateChanged fires once immediately with the current user or null.
    // We use this to skip the login page entirely for users with a live session,
    // and to hide the spinner and show the form for users who aren't signed in.
    auth.onAuthStateChanged(function(user) {
      if (user) {
        window.location.replace('/tools/portal/');
      } else {
        document.getElementById('authChecking').style.display = 'none';
        document.getElementById('loginBox').style.display = 'block';
        document.getElementById('emailInput').focus();
      }
    });

    // ── Enter key submits form ───────────────────────────────────────────────
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSignIn();
    });

    // ── Sign-in ──────────────────────────────────────────────────────────────
    function doSignIn() {
      var email    = document.getElementById('emailInput').value.trim();
      var password = document.getElementById('passwordInput').value;
      var btn      = document.getElementById('signInBtn');
      var errEl    = document.getElementById('errorMsg');

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      errEl.classList.remove('show');

      auth.signInWithEmailAndPassword(email, password)
        .then(function() {
          // onAuthStateChanged handles the redirect — nothing needed here
        })
        .catch(function(err) {
          btn.disabled    = false;
          btn.textContent = 'Sign in';
          // Friendly error messages — don't expose Firebase internals
          var msg = 'Sign-in failed. Please try again.';
          if (err.code === 'auth/user-not-found'
           || err.code === 'auth/wrong-password'
           || err.code === 'auth/invalid-credential') {
            msg = 'Incorrect email or password.';
          } else if (err.code === 'auth/invalid-email') {
            msg = 'Please enter a valid email address.';
          } else if (err.code === 'auth/too-many-requests') {
            msg = 'Too many failed attempts. Please wait a moment and try again.';
          } else if (err.code === 'auth/user-disabled') {
            msg = 'This account has been disabled. Contact your administrator.';
          }
          showError(msg);
        });
    }

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
