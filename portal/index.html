function loadRequests() {
  db.ref('requests').orderByChild('status').equalTo('pending').once('value')
    .then(function(snap) {
      var container = document.getElementById('requestsList');
      container.innerHTML = '';

      if (!snap.exists()) {
        var empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '';
        var icon = document.createElement('div');
        icon.className = 'empty-state__icon';
        icon.textContent = '📭';
        var text = document.createElement('div');
        text.className = 'empty-state__text';
        text.textContent = 'No pending requests.';
        empty.appendChild(icon);
        empty.appendChild(text);
        container.appendChild(empty);
        return;
      }

      snap.forEach(function(child) {
        var r = child.val();
        r._key = child.key;
        container.appendChild(buildRequestCard(r));
      });
    });
}

function buildRequestCard(r) {
  var card = document.createElement('div');
  card.className = 'request-card';

  var header = document.createElement('div');
  header.className = 'request-card__header';

  var info = document.createElement('div');
  info.className = 'request-card__info';

  var name = document.createElement('div');
  name.className = 'request-card__name';
  name.textContent = r.name || '(no name)';

  var meta = document.createElement('div');
  meta.className = 'request-card__meta';
  meta.textContent = (r.email || '') + (r.club ? '  —  ' + r.club : '') + (r.clubRole ? '  (' + r.clubRole + ')' : '');

  info.appendChild(name);
  info.appendChild(meta);
  header.appendChild(info);
  card.appendChild(header);

  if (r.tools && r.tools.length) {
    var tools = document.createElement('div');
    tools.className = 'request-card__tools';
    var toolNames = Array.isArray(r.tools)
      ? r.tools.join(', ')
      : String(r.tools);
    tools.textContent = 'Requested tools: ' + toolNames;
    card.appendChild(tools);
  }

  var actions = document.createElement('div');
  actions.className = 'request-card__actions';

  var approveBtn = document.createElement('button');
  approveBtn.className = 'btn btn--navy btn--sm';
  approveBtn.textContent = 'Approve & invite';
  approveBtn.addEventListener('click', function() {
    approveRequest(r, approveBtn);
  });

  var rejectBtn = document.createElement('button');
  rejectBtn.className = 'btn btn--ghost btn--sm';
  rejectBtn.textContent = 'Decline';
  rejectBtn.addEventListener('click', function() {
    rejectRequest(r._key, rejectBtn);
  });

  actions.appendChild(approveBtn);
  actions.appendChild(rejectBtn);
  card.appendChild(actions);

  return card;
}

function approveRequest(r, btn) {
  btn.disabled = true;
  btn.textContent = 'Approving…';

  /* Pre-fill the invite form and switch to Invite tab */
  document.getElementById('inviteEmail').value    = r.email || '';
  document.getElementById('inviteName').value     = r.name  || '';
  document.getElementById('inviteRole').value     = 'club';
  document.getElementById('inviteClub').value     = r.club  || '';
  document.getElementById('inviteClubRole').value = r.clubRole || '';
  document.getElementById('inviteClubField').style.display     = 'block';
  document.getElementById('inviteClubRoleField').style.display = 'block';
  if (r.club) selectInvClub(r.club);

  /* Switch to invite tab */
  document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.admin-pane').forEach(function(p) { p.classList.remove('active'); });
  document.querySelector('[data-pane="invite"]').classList.add('active');
  document.getElementById('pane-invite').classList.add('active');

  /* Mark request as approved in RTDB */
  writeAudit('request_approved', 'Approved request from ' + (r.name || r.email || '') +
    (r.club ? ' (' + r.club + ')' : ''));
  db.ref('requests/' + r._key + '/status').set('approved')
    .then(function() { loadRequests(); })
    .catch(function() {});
}

function rejectRequest(key, btn) {
  btn.disabled = true;
  btn.textContent = 'Declining…';
  writeAudit('request_declined', 'Declined request ' + key);
  db.ref('requests/' + key + '/status').set('rejected')
    .then(function() {
      showToast('Request declined', 'success');
      loadRequests();
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = 'Decline';
      showToast('Failed to update request', 'error');
    });
}

/* ---- Users table --------------------------------------------------------- */
var _activeClubFilter = null;

function loadUsers() {
  db.ref('users').once('value').then(function(snap) {
    STATE.allUsers = snap.val() || {};
    renderClubFilterPills();
    renderUsers(STATE.allUsers);
  });

  document.getElementById('reloadUsersBtn').addEventListener('click', function() { loadUsers(); });

  document.getElementById('userSearch').addEventListener('input', function() {
    applyUserFilters();
  });
}

function applyUserFilters() {
  var q    = document.getElementById('userSearch').value.toLowerCase().trim();
  var club = _activeClubFilter;
  var filtered = {};
  Object.keys(STATE.allUsers).forEach(function(uid) {
    var u = STATE.allUsers[uid];
    var matchesText = !q ||
      (u.name  || '').toLowerCase().indexOf(q) !== -1 ||
      (u.email || '').toLowerCase().indexOf(q) !== -1;
    var matchesFilter = true;
    if (club) {
      if (club.startsWith('__org__')) {
        var orgVal = club.replace('__org__', '');
        matchesFilter = (u.org || '') === orgVal;
      } else if (club.startsWith('__club__')) {
        var clubVal = club.replace('__club__', '');
        matchesFilter = (u.club || '') === clubVal;
      } else {
        matchesFilter = (u.club || '') === club;
      }
    }
    if (matchesText && matchesFilter) filtered[uid] = u;
  });
  renderUsers(filtered);
}

function renderClubFilterPills() {
  var wrap   = document.getElementById('clubFilterWrap');
  var select = document.getElementById('clubFilterSelect');
  if (!wrap || !select) return;

  /* Collect NL orgs and clubs separately */
  var nlOrgs = {};
  var clubs  = {};
  Object.keys(STATE.allUsers).forEach(function(uid) {
    var u = STATE.allUsers[uid];
    if (u.role === 'club' && u.club) {
      clubs[u.club] = true;
    } else if (u.org) {
      nlOrgs[u.org] = true;
    }
  });

  var nlOrgList  = Object.keys(nlOrgs).sort();
  var clubList   = Object.keys(clubs).sort();

  if (nlOrgList.length === 0 && clubList.length === 0) {
    wrap.style.display = 'none';
    return;
  }

  wrap.style.display = 'block';

  /* Rebuild options */
  select.innerHTML = '<option value="">All users<\/option>';

  if (nlOrgList.length) {
    var nlGroup = document.createElement('optgroup');
    nlGroup.label = 'Organisations';
    nlOrgList.forEach(function(org) {
      var opt = document.createElement('option');
      opt.value = '__org__' + org;
      opt.textContent = org;
      nlGroup.appendChild(opt);
    });
    select.appendChild(nlGroup);
  }

  if (clubList.length) {
    var clubGroup = document.createElement('optgroup');
    clubGroup.label = 'Clubs';
    clubList.forEach(function(club) {
      var opt = document.createElement('option');
      opt.value = '__club__' + club;
      opt.textContent = club;
      clubGroup.appendChild(opt);
    });
    select.appendChild(clubGroup);
  }

  select.onchange = function() {
    var val = select.value;
    if (!val) {
      _activeClubFilter = null;
    } else if (val.startsWith('__org__')) {
      _activeClubFilter = val; /* stored with prefix, matched in applyUserFilters */
    } else if (val.startsWith('__club__')) {
      _activeClubFilter = val;
    }
    applyUserFilters();
  };
}

function renderUsers(users) {
  renderUsersAccordion(users);
}

/* ---- Accordion ----------------------------------------------------------- */
var _openAccUid = null;

function renderUsersAccordion(users) {
  var container = document.getElementById('usersAccordion');
  container.innerHTML = '';
  _openAccUid = null;

  var uids = Object.keys(users || {});
  if (uids.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'empty-state';
    var icon = document.createElement('div');
    icon.className = 'empty-state__icon';
    icon.textContent = '\uD83D\uDC65';
    var text = document.createElement('div');
    text.className = 'empty-state__text';
    text.textContent = 'No users found.';
    empty.appendChild(icon);
    empty.appendChild(text);
    container.appendChild(empty);
    return;
  }

  /* Build dept/tool structure -- all tools including placeholders, except welcome */
  var tools   = STATE.toolsList.filter(function(t) { return t._key !== 'welcome'; });
  var deptMap = {};
  tools.forEach(function(t) {
    var d = t.department || 'General';
    if (!deptMap[d]) deptMap[d] = [];
    deptMap[d].push(t);
  });
  var depts = sortDepts(Object.keys(deptMap));

  uids.forEach(function(uid) {
    var u = users[uid];
    container.appendChild(buildAccordionItem(uid, u, depts, deptMap));
  });
}

function buildAccordionItem(uid, u, depts, deptMap) {
  var item = document.createElement('div');
  item.className = 'uacc-item';
  item.dataset.uid = uid;

  /* Header */
  var header = document.createElement('div');
  header.className = 'uacc-header';

  /* Org crest -- club users get their club crest, everyone else gets NL rose */
  var isClubUser = u.role === 'club';
  var crestImg = document.createElement('img');
  crestImg.className = 'uacc-crest';
  if (isClubUser && u.club) {
    crestImg.src = CREST_BASE + encodeURIComponent(u.club) + '.png';
    crestImg.alt = u.club;
    crestImg.onerror = function() { this.onerror = null; this.src = FALLBACK_CREST; };
  } else {
    crestImg.src = FALLBACK_CREST;
    crestImg.alt = 'National League';
  }
  header.appendChild(crestImg);

  /* Name + email */
  var nameWrap = document.createElement('div');
  nameWrap.className = 'uacc-name';
  var primary = document.createElement('div');
  primary.className = 'uacc-name__primary';
  primary.textContent = u.name || '(no name)';
  var secondary = document.createElement('div');
  secondary.className = 'uacc-name__secondary';
  secondary.textContent = u.email || '';
  nameWrap.appendChild(primary);
  nameWrap.appendChild(secondary);
  header.appendChild(nameWrap);

  /* Org name col -- desktop only via CSS */
  var orgEl = document.createElement('div');
  orgEl.className = 'uacc-org';
  if (isClubUser && u.club) {
    orgEl.textContent = u.club + (u.clubRole ? '  ·  ' + u.clubRole : '');
  } else {
    orgEl.textContent = 'National League';
  }
  header.appendChild(orgEl);

  /* Role pill */
  var rolePill = document.createElement('span');
  rolePill.className = 'user-role-pill role-' + (u.pending ? 'pending' : (u.role || 'staff'));
  rolePill.textContent = u.pending ? 'Pending' : (u.role || 'staff');
  rolePill.style.flexShrink = '0';
  header.appendChild(rolePill);

  var chevron = document.createElement('span');
  chevron.className = 'uacc-chevron';
  chevron.textContent = '\u25BC';
  header.appendChild(chevron);

  /* Determine superuser status once at item level -- used in dept loop */
  var isSuperUser = u.role === 'superadmin' || (uid === STATE.uid && STATE.isSuperAdmin);

  /* Body */
  var body = document.createElement('div');
  body.className = 'uacc-body';

  /* Tool toggles grouped by dept */
  depts.forEach(function(dept) {
    var deptTools = deptMap[dept];
    if (!deptTools || !deptTools.length) return;

    /* Hide Staff dept for club users -- not relevant to them */
    if (u.role === 'club' && dept === 'staff') return;

    var deptHeader = document.createElement('div');
    deptHeader.className = 'uacc-dept-header';

    var deptLabel = document.createElement('div');
    deptLabel.className = 'uacc-dept-label';
    deptLabel.textContent = getDeptLabel(dept);
    deptHeader.appendChild(deptLabel);

    if (!isSuperUser) {
      var setAll = document.createElement('div');
      setAll.className = 'uacc-set-all';
      ['hidden','off','access','admin'].forEach(function(lvl) {
        var btn = document.createElement('button');
        btn.className = 'uacc-set-all__btn';
        btn.textContent = lvl === 'hidden' ? 'H' : lvl === 'off' ? 'O' : lvl === 'access' ? 'A' : 'Adm';
        btn.title = 'Set all ' + getDeptLabel(dept) + ' to ' + lvl;
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          setAllInDept(uid, u, deptMap[dept], lvl, deptWrap);
        });
        setAll.appendChild(btn);
      });
      deptHeader.appendChild(setAll);
    }

    /* Wrap dept rows so set-all can scope to just this dept */
    var deptWrap = document.createElement('div');
    deptWrap.className = 'uacc-dept-wrap';
    body.appendChild(deptHeader);
    body.appendChild(deptWrap);

    deptTools.forEach(function(t) {
      var currentLevel  = getAccessLevel(uid, t._key);
      var defaultLevel  = getDefaultLevel(t._key, u);
      /* isSuperUser declared at item level above */
      var isClubUser    = u.role === 'club';
      var isClubLocked  = isClubUser; /* Club users cannot have admin on any tool */

      /* If club user is somehow set to admin, cap display at access */
      if (isClubUser && currentLevel === 'admin') currentLevel = 'access';

      var row = document.createElement('div');
      row.className = 'uacc-tool-row';

      var toolName = document.createElement('div');
      toolName.className = 'uacc-tool-name';
      var iconSpan = document.createElement('span');
      iconSpan.className = 'uacc-tool-name__icon';
      iconSpan.textContent = t.icon || '';
      toolName.appendChild(iconSpan);
      toolName.appendChild(document.createTextNode(t.label || t._key));

      var sliderEl = buildAccSlider(uid, t._key, currentLevel, defaultLevel, isSuperUser, isClubLocked);

      row.appendChild(toolName);
      row.appendChild(sliderEl);
      deptWrap.appendChild(row);
    });
  });

  /* Footer — role selector + resend */
  var footer = document.createElement('div');
  footer.className = 'uacc-footer';

  if (u.role === 'superadmin') {
    var lock = document.createElement('span');
    lock.style.cssText = 'font-size:11px;color:var(--text-muted);font-style:italic;';
    lock.textContent = 'Superadmin — role locked';
    footer.appendChild(lock);

  } else if (u.pending) {
    /* Pending user -- resend, cancel, no role change */
    var resendBtn = document.createElement('button');
    resendBtn.className = 'resend-pill';
    resendBtn.textContent = 'Resend invite';
    resendBtn.addEventListener('click', function() { resendInvite(u.email, resendBtn); });
    footer.appendChild(resendBtn);

    var cancelBtn = document.createElement('button');
    cancelBtn.className = 'cancel-invite-btn';
    cancelBtn.textContent = 'Cancel invite';
    var confirmed = false;
    cancelBtn.addEventListener('click', function() {
      if (!confirmed) {
        confirmed = true;
        cancelBtn.classList.add('confirm');
        cancelBtn.textContent = 'Confirm cancel?';
        setTimeout(function() {
          if (confirmed) {
            confirmed = false;
            cancelBtn.classList.remove('confirm');
            cancelBtn.textContent = 'Cancel invite';
          }
        }, 3000);
      } else {
        /* Delete the user record */
        db.ref('users/' + uid).remove()
          .then(function() {
            showToast('Invite cancelled', 'success');
            writeAudit('invite_cancelled', (u.name || u.email || '') + ' invite removed');
            loadUsers();
          })
          .catch(function() { showToast('Failed to cancel invite', 'error'); });
      }
    });
    footer.appendChild(cancelBtn);

  } else {
    /* Active user -- change role button + inline role picker */
    var changeRoleBtn = document.createElement('button');
    changeRoleBtn.className = 'change-role-btn';
    changeRoleBtn.textContent = 'Change role';

    var rolePicker = document.createElement('div');
    rolePicker.className = 'inline-role-picker';

    /* Org row */
    var orgRow = document.createElement('div');
    orgRow.className = 'inline-role-picker__row';
    var orgLbl = document.createElement('span');
    orgLbl.className = 'inline-role-picker__label';
    orgLbl.textContent = 'Org';
    orgRow.appendChild(orgLbl);

    var selectedOrg    = u.org    || 'National League';
    var selectedOrgKey = u.orgKey || 'nl';
    var selectedRole   = u.role   || 'staff';

    var orgs = [
      { label: 'National League', key: 'nl' },
      { label: 'NL Trust',        key: 'trust' },
      { label: 'U19 Alliance',    key: 'u19' },
      { label: 'Club',            key: 'club' }
    ];

    orgs.forEach(function(org) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'invite-org-btn' + (org.key === selectedOrgKey || (org.key === 'club' && u.role === 'club') ? ' active' : '');
      btn.textContent = org.label;
      btn.addEventListener('click', function() {
        orgRow.querySelectorAll('.invite-org-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        selectedOrgKey = org.key;
        selectedOrg    = org.label;
        roleRow.style.display = org.key === 'club' ? 'none' : 'flex';
        clubPickerRow.style.display = org.key === 'club' ? 'flex' : 'none';
        if (org.key !== 'club') selectedRole = 'staff';
      });
      orgRow.appendChild(btn);
    });
    rolePicker.appendChild(orgRow);

    /* Role row */
    var roleRow = document.createElement('div');
    roleRow.className = 'inline-role-picker__row';
    roleRow.style.display = u.role === 'club' ? 'none' : 'flex';
    var roleLbl = document.createElement('span');
    roleLbl.className = 'inline-role-picker__label';
    roleLbl.textContent = 'Role';
    roleRow.appendChild(roleLbl);
    ['staff', 'admin'].forEach(function(r) {
      var rbtn = document.createElement('button');
      rbtn.type = 'button';
      rbtn.className = 'invite-role-btn' + (selectedRole === r ? ' active' : '');
      rbtn.textContent = r.charAt(0).toUpperCase() + r.slice(1);
      rbtn.addEventListener('click', function() {
        roleRow.querySelectorAll('.invite-role-btn').forEach(function(b) { b.classList.remove('active'); });
        rbtn.classList.add('active');
        selectedRole = r;
      });
      roleRow.appendChild(rbtn);
    });
    rolePicker.appendChild(roleRow);

    /* Club picker row */
    var clubPickerRow = document.createElement('div');
    clubPickerRow.className = 'inline-role-picker__row';
    clubPickerRow.style.display = u.role === 'club' ? 'flex' : 'none';
    var clubLbl = document.createElement('span');
    clubLbl.className = 'inline-role-picker__label';
    clubLbl.textContent = 'Club';
    var clubInput = document.createElement('input');
    clubInput.type = 'text';
    clubInput.value = u.club || '';
    clubInput.placeholder = 'Club name';
    clubInput.style.cssText = 'flex:1;font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);';
    clubPickerRow.appendChild(clubLbl);
    clubPickerRow.appendChild(clubInput);
    rolePicker.appendChild(clubPickerRow);

    /* Apply + cancel buttons */
    var applyRow = document.createElement('div');
    applyRow.className = 'inline-role-picker__row';
    var applyBtn = document.createElement('button');
    applyBtn.type = 'button';
    applyBtn.className = 'btn btn--navy btn--sm';
    applyBtn.textContent = 'Apply';
    applyBtn.addEventListener('click', function() {
      var newRole   = selectedOrgKey === 'club' ? 'club' : selectedRole;
      var newOrg    = selectedOrgKey === 'club' ? '' : selectedOrg;
      var newOrgKey = selectedOrgKey === 'club' ? '' : selectedOrgKey;
      var newClub   = selectedOrgKey === 'club' ? clubInput.value.trim() : '';
      var updates = {};
      updates['users/' + uid + '/role']   = newRole;
      updates['users/' + uid + '/org']    = newOrg;
      updates['users/' + uid + '/orgKey'] = newOrgKey;
      updates['users/' + uid + '/club']   = newClub;
      var targetUser2 = STATE.allUsers[uid] || {};
      writeAuditFor(uid, targetUser2.name || '', targetUser2.email || '',
        'role_changed', (u.role || '?') + ' -> ' + newRole + (newOrg ? ' (' + newOrg + ')' : '') + (newClub ? ' at ' + newClub : ''));
      db.ref().update(updates)
        .then(function() {
          showToast('Role updated', 'success');
          rolePicker.classList.remove('open');
          loadUsers();
        })
        .catch(function() { showToast('Failed to update role', 'error'); });
    });
    var cancelRoleBtn = document.createElement('button');
    cancelRoleBtn.type = 'button';
    cancelRoleBtn.className = 'btn btn--ghost btn--sm';
    cancelRoleBtn.textContent = 'Cancel';
    cancelRoleBtn.addEventListener('click', function() { rolePicker.classList.remove('open'); });
    applyRow.appendChild(applyBtn);
    applyRow.appendChild(cancelRoleBtn);
    rolePicker.appendChild(applyRow);

    changeRoleBtn.addEventListener('click', function() {
      rolePicker.classList.toggle('open');
    });

    footer.appendChild(changeRoleBtn);
    footer.appendChild(rolePicker);
  }

  body.appendChild(footer);
  item.appendChild(header);
  item.appendChild(body);

  /* Toggle on header click */
  header.addEventListener('click', function() {
    var isOpen = body.classList.contains('open');

    /* Close any other open item */
    if (_openAccUid && _openAccUid !== uid) {
      var prev = document.querySelector('.uacc-item[data-uid="' + _openAccUid + '"]');
      if (prev) {
        prev.querySelector('.uacc-header').classList.remove('open');
        prev.querySelector('.uacc-body').classList.remove('open');
      }
    }

    if (isOpen) {
      header.classList.remove('open');
      body.classList.remove('open');
      _openAccUid = null;
    } else {
      header.classList.add('open');
      body.classList.add('open');
      _openAccUid = uid;
    }
  });

  return item;
}

/* ---- Access slider ------------------------------------------------------- */
var ACC_LEVELS = ['hidden', 'off', 'access', 'admin'];
var ACC_LABELS = { hidden: 'Hidden', off: 'Off', access: 'Access', admin: 'Admin' };

function buildAccSlider(uid, toolKey, currentLevel, defaultLevel, locked, clubLocked) {
  var wrap = document.createElement('div');
  wrap.className = 'acc-slider' + (locked ? ' acc-slider--locked' : '');
  var currentIdx = ACC_LEVELS.indexOf(currentLevel);
  if (currentIdx === -1) currentIdx = 0;
  var defaultIdx = ACC_LEVELS.indexOf(defaultLevel);

  var track = document.createElement('div');
  track.className = 'acc-slider__track';
  var fill = document.createElement('div');
  fill.className = 'acc-slider__track-fill';
  track.appendChild(fill);
  wrap.appendChild(track);

  function updateFill(idx) {
    var pct = idx <= 0 ? 0 : (idx / (ACC_LEVELS.length - 1)) * 100;
    fill.style.width = pct + '%';
  }
  updateFill(currentIdx);

  ACC_LEVELS.forEach(function(level, idx) {
    var isPadlocked = clubLocked && level === 'admin';

    var stop = document.createElement('div');
    stop.className = 'acc-slider__stop';
    if (isPadlocked) {
      stop.classList.add('acc-slider__stop--padlocked');
    } else {
      if (idx < currentIdx)  stop.classList.add('acc-slider__stop--filled');
      if (idx === currentIdx) stop.classList.add('acc-slider__stop--active');
    }

    var node = document.createElement('div');
    node.className = 'acc-slider__node';
    if (isPadlocked) {
      node.textContent = '\uD83D\uDD12'; /* padlock emoji */
      node.style.cssText = 'font-size:8px;background:var(--off-white);border-color:var(--border);display:flex;align-items:center;justify-content:center;';
    }

    /* Default badge */
    var dfltBadge = null;
    if (idx === defaultIdx && !locked && !isPadlocked) {
      dfltBadge = document.createElement('div');
      dfltBadge.className = 'acc-slider__default-badge';
      dfltBadge.textContent = 'default';
    }

    var label = document.createElement('div');
    label.className = 'acc-slider__label';
    label.textContent = ACC_LABELS[level];
    if (isPadlocked) label.style.color = 'var(--border)';

    stop.appendChild(node);
    stop.appendChild(label);
    if (dfltBadge) stop.appendChild(dfltBadge);

    if (!locked && !isPadlocked) {
      stop.addEventListener('click', function(e) {
        e.stopPropagation();
        if (uid === STATE.uid && STATE.isSuperAdmin && level !== 'admin') {
          showToast('You cannot reduce your own access', 'error');
          return;
        }
        var prevLevel = currentLevel;
        currentLevel  = level;
        currentIdx    = idx;
        wrap.querySelectorAll('.acc-slider__stop').forEach(function(s, si) {
          s.classList.remove('acc-slider__stop--active', 'acc-slider__stop--filled');
          if (si < idx)  s.classList.add('acc-slider__stop--filled');
          if (si === idx) s.classList.add('acc-slider__stop--active');
        });
        updateFill(idx);
        var targetUser = STATE.allUsers[uid] || {};
        writeAuditFor(uid, targetUser.name || '', targetUser.email || '',
          'access_changed', toolKey + ': ' + prevLevel + ' -> ' + level);
        db.ref('users/' + uid + '/tools/' + toolKey).set(level)
          .catch(function() { showToast('Failed to update', 'error'); });
      });
    }
    wrap.appendChild(stop);
  });
  return wrap;
}

function setAllInDept(uid, u, deptTools, level, bodyEl) {
  if (!deptTools || !deptTools.length) return;
  var updates = {};
  deptTools.forEach(function(t) {
    updates['users/' + uid + '/tools/' + t._key] = level;
  });
  var idx = ACC_LEVELS.indexOf(level);
  var rows = bodyEl.querySelectorAll('.uacc-tool-row');
  rows.forEach(function(row) {
    var slider = row.querySelector('.acc-slider');
    if (!slider) return;
    slider.querySelectorAll('.acc-slider__stop').forEach(function(s, si) {
      s.classList.remove('acc-slider__stop--active', 'acc-slider__stop--filled');
      if (si < idx)  s.classList.add('acc-slider__stop--filled');
      if (si === idx) s.classList.add('acc-slider__stop--active');
    });
    var trackFill = slider.querySelector('.acc-slider__track-fill');
    if (trackFill) {
      var pct = idx <= 0 ? 0 : (idx / (ACC_LEVELS.length - 1)) * 100;
      trackFill.style.width = pct + '%';
    }
  });
  var targetUser = STATE.allUsers[uid] || {};
  writeAuditFor(uid, targetUser.name || '', targetUser.email || '',
    'access_changed', 'Set all in ' + getDeptLabel(dept || '') + ' to ' + level);
  db.ref().update(updates)
    .then(function() { showToast('All set to ' + level, 'success'); })
    .catch(function() { showToast('Failed to update', 'error'); });
}

/* ---- Invite club picker -------------------------------------------------- */
var INV_CLUBS_DATA = [];

function loadInvClubs() {
  if (INV_CLUBS_DATA.length) return Promise.resolve();
  var url = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/data/clubs-meta.json';
  return fetch(url + '?cb=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) { INV_CLUBS_DATA = data.clubs || []; })
    .catch(function() { INV_CLUBS_DATA = []; });
}

function renderInvClubList(filter) {
  var dd = document.getElementById('invClubDropdown');
  var q  = (filter || '').toLowerCase().trim();
  var matches = q
    ? INV_CLUBS_DATA.filter(function(c) {
        return c.name.toLowerCase().indexOf(q) !== -1 ||
               (c.short && c.short.toLowerCase().indexOf(q) !== -1);
      }).slice(0, 12)
    : INV_CLUBS_DATA.slice(0, 12);

  dd.innerHTML = '';
  if (matches.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'padding:8px 12px;font-size:13px;color:var(--text-muted);';
    empty.textContent = 'No clubs found';
    dd.appendChild(empty);
    dd.classList.add('open');
    return;
  }
  matches.forEach(function(c) {
    var item = document.createElement('div');
    item.className = 'inv-club-picker__option';
    var img = document.createElement('img');
    img.src = CREST_BASE + encodeURIComponent(c.name) + '.png';
    img.onerror = function() { this.onerror = null; this.src = FALLBACK_CREST; };
    var nameSpan = document.createElement('span');
    nameSpan.className = 'inv-club-picker__option-name';
    nameSpan.textContent = c.name;
    var divSpan = document.createElement('span');
    divSpan.className = 'inv-club-picker__option-div';
    divSpan.textContent = c.division || '';
    item.appendChild(img);
    item.appendChild(nameSpan);
    item.appendChild(divSpan);
    item.addEventListener('click', function() { selectInvClub(c.name); });
    dd.appendChild(item);
  });
  dd.classList.add('open');
}

function selectInvClub(name) {
  document.getElementById('invClubInput').value = name;
  document.getElementById('inviteClub').value   = name;
  var img = document.getElementById('invClubCrest');
  img.onerror = function() { this.onerror = null; this.src = FALLBACK_CREST; };
  img.src = CREST_BASE + encodeURIComponent(name) + '.png';
  document.getElementById('invClubDropdown').classList.remove('open');
}

function initInvClubPicker() {
  var input = document.getElementById('invClubInput');
  var dd    = document.getElementById('invClubDropdown');
  if (!input) return;
  input.addEventListener('input', function() {
    document.getElementById('inviteClub').value = '';
    var val = input.value.trim();
    if (!val) { dd.classList.remove('open'); return; }
    loadInvClubs().then(function() { renderInvClubList(val); });
  });
  input.addEventListener('focus', function() {
    if (input.value.trim() && INV_CLUBS_DATA.length) renderInvClubList(input.value);
  });
  document.addEventListener('click', function(e) {
    var picker = document.querySelector('.inv-club-picker');
    if (picker && !picker.contains(e.target)) dd.classList.remove('open');
  });
}
function initInviteForm() {
  initInvClubPicker();

  document.querySelectorAll('.invite-org-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.invite-org-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var orgKey = btn.dataset.orgkey;
      var org    = btn.dataset.org;
      document.getElementById('inviteOrg').value    = org;
      document.getElementById('inviteOrgKey').value = orgKey;
      var isClub = orgKey === 'club';
      document.getElementById('inviteRoleRow').style.display    = isClub ? 'none' : 'flex';
      document.getElementById('inviteClubField').style.display    = isClub ? 'block' : 'none';
      document.getElementById('inviteClubRoleField').style.display = isClub ? 'block' : 'none';
      if (isClub) {
        document.getElementById('inviteRole').value = 'club';
        loadInvClubs();
      } else {
        var activeRole = document.querySelector('.invite-role-btn.active');
        document.getElementById('inviteRole').value = activeRole ? activeRole.dataset.role : 'staff';
      }
      renderInviteToolSliders();
    });
  });

  document.querySelectorAll('.invite-role-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.invite-role-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('inviteRole').value = btn.dataset.role;
      renderInviteToolSliders();
    });
  });

  renderInviteToolSliders();

  document.getElementById('inviteBtn').addEventListener('click', function() {
    var email    = document.getElementById('inviteEmail').value.trim();
    var name     = document.getElementById('inviteName').value.trim();
    var role     = document.getElementById('inviteRole').value;
    var org      = document.getElementById('inviteOrg').value;
    var orgKey   = document.getElementById('inviteOrgKey').value;
    var club     = document.getElementById('inviteClub').value.trim();
    var clubRole = document.getElementById('inviteClubRole').value.trim();

    if (!email || !name) { showMsg('inviteMsg', 'Email and name are required.', 'error'); return; }
    if (role === 'club' && !club) { showMsg('inviteMsg', 'Please select a club.', 'error'); return; }

    setBtnLoading('inviteBtn', true);

    var toolAccess = {};
    document.querySelectorAll('#inviteToolSliders .acc-slider').forEach(function(slider) {
      var toolKey = slider.dataset.toolkey;
      if (!toolKey) return;
      var stops = slider.querySelectorAll('.acc-slider__stop');
      var idx = 0;
      stops.forEach(function(s, i) {
        if (s.classList.contains('acc-slider__stop--active')) idx = i;
      });
      toolAccess[toolKey] = ACC_LEVELS[idx] || 'hidden';
    });

    /* Show sending state */
    var inviteBtn = document.getElementById('inviteBtn');
    inviteBtn.disabled = true;
    inviteBtn.innerHTML = '<span class="btn-spinner"><\/span> Sending…';

    /* Send invite via GAS -- GAS stores token in RTDB invites/{token}
       with full user payload. Login page creates user record after auth. */
    fetch(INVITE_GAS_URL + '?cb=' + Date.now(), {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify({
        action:   'sendInvite',
        email:    email,
        name:     name,
        role:     role,
        org:      org      || '',
        orgKey:   orgKey   || '',
        club:     club     || '',
        clubRole: clubRole || '',
        tools:    toolAccess
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      setBtnLoading('inviteBtn', false, 'Send invite');
      if (result && result.ok === false) {
        showMsg('inviteMsg', 'Email failed: ' + (result.error || 'unknown error'), 'error');
      } else {
        var auditDetail = role === 'club'
          ? 'Invited ' + name + ' as ' + club + (clubRole ? ' (' + clubRole + ')' : '') + ' [Club]'
          : 'Invited ' + name + ' as ' + org + ' (' + role.charAt(0).toUpperCase() + role.slice(1) + ')';
        writeAudit('invite_sent', auditDetail);
        showToast('Invite sent to ' + email, 'success');
        document.getElementById('inviteEmail').value    = '';
        document.getElementById('inviteName').value     = '';
        document.getElementById('inviteClub').value     = '';
        document.getElementById('inviteClubRole').value = '';
        if (document.getElementById('invClubInput'))
          document.getElementById('invClubInput').value = '';
        loadUsers();
      }
    })
    .catch(function(err) {
      setBtnLoading('inviteBtn', false, 'Send invite');
      showMsg('inviteMsg', 'Failed: ' + err.message, 'error');
    });
  });
}

function renderInviteToolSliders() {
  var container = document.getElementById('inviteToolSliders');
  if (!container) return;
  container.innerHTML = '';
  var orgKey   = document.getElementById('inviteOrgKey').value || 'nl';
  var role     = document.getElementById('inviteRole').value    || 'staff';
  var groupKey = role === 'club' ? 'club' : orgKey + '-' + role;
  var isClubOrg = role === 'club';
  var tools    = STATE.toolsList.filter(function(t) { return t._key !== 'welcome'; });
  var deptMap  = {};
  tools.forEach(function(t) {
    var d = t.department || 'General';
    if (!deptMap[d]) deptMap[d] = [];
    deptMap[d].push(t);
  });
  sortDepts(Object.keys(deptMap)).forEach(function(dept) {
    /* Hide Staff dept for club invites */
    if (isClubOrg && dept === 'staff') return;
    var deptLabel = document.createElement('div');
    deptLabel.className = 'invite-dept-label';
    deptLabel.textContent = getDeptLabel(dept);
    container.appendChild(deptLabel);
    deptMap[dept].forEach(function(t) {
      var defaultLevel = (t.defaults && t.defaults[groupKey]) || 'hidden';
      /* Cap club users at access */
      if (isClubOrg && defaultLevel === 'admin') defaultLevel = 'access';
      var row = document.createElement('div');
      row.className = 'invite-tool-row';
      var nameEl = document.createElement('div');
      nameEl.className = 'invite-tool-name';
      nameEl.textContent = (t.icon ? t.icon + '  ' : '') + (t.label || t._key);
      var slider = buildInviteSlider(t._key, defaultLevel, isClubOrg);
      row.appendChild(nameEl);
      row.appendChild(slider);
      container.appendChild(row);
    });
  });
}


function buildInviteSlider(toolKey, currentLevel, clubLocked) {
  var wrap = document.createElement('div');
  wrap.className = 'acc-slider';
  wrap.dataset.toolkey = toolKey;
  /* Cap club users at access */
  if (clubLocked && currentLevel === 'admin') currentLevel = 'access';
  var currentIdx = ACC_LEVELS.indexOf(currentLevel);
  if (currentIdx === -1) currentIdx = 0;
  var track = document.createElement('div');
  track.className = 'acc-slider__track';
  var fill = document.createElement('div');
  fill.className = 'acc-slider__track-fill';
  track.appendChild(fill);
  wrap.appendChild(track);
  function updateFill(idx) {
    var pct = idx <= 0 ? 0 : (idx / (ACC_LEVELS.length - 1)) * 100;
    fill.style.width = pct + '%';
  }
  updateFill(currentIdx);
  ACC_LEVELS.forEach(function(level, idx) {
    var isPadlocked = clubLocked && level === 'admin';
    var stop = document.createElement('div');
    stop.className = 'acc-slider__stop';
    if (isPadlocked) {
      stop.classList.add('acc-slider__stop--padlocked');
    } else {
      if (idx < currentIdx)  stop.classList.add('acc-slider__stop--filled');
      if (idx === currentIdx) stop.classList.add('acc-slider__stop--active');
    }
    var node = document.createElement('div');
    node.className = 'acc-slider__node';
    if (isPadlocked) {
      node.textContent = '\uD83D\uDD12';
      node.style.cssText = 'font-size:8px;background:var(--off-white);border-color:var(--border);display:flex;align-items:center;justify-content:center;';
    }
    var label = document.createElement('div');
    label.className = 'acc-slider__label';
    label.textContent = ACC_LABELS[level];
    if (isPadlocked) label.style.color = 'var(--border)';
    stop.appendChild(node);
    stop.appendChild(label);
    if (!isPadlocked) stop.addEventListener('click', function(e) {
      e.stopPropagation();
      currentIdx = idx;
      wrap.querySelectorAll('.acc-slider__stop').forEach(function(s, si) {
        s.classList.remove('acc-slider__stop--active', 'acc-slider__stop--filled');
        if (si < idx)  s.classList.add('acc-slider__stop--filled');
        if (si === idx) s.classList.add('acc-slider__stop--active');
      });
      updateFill(idx);
    });
    wrap.appendChild(stop);
  });
  return wrap;
}

function resendInvite(email, btn) {
  if (!email) return;
  btn.textContent = 'Sending...';
  btn.disabled = true;
  fetch(INVITE_GAS_URL + '?cb=' + Date.now(), {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain' },
    body:    JSON.stringify({ action: 'sendInvite', email: email, name: '', role: '', org: '', club: '', clubRole: '' })
  })
  .then(function(r) { return r.json(); })
  .then(function(result) {
    if (result && result.ok === false) {
      showToast('Failed to resend: ' + (result.error || 'unknown'), 'error');
      btn.disabled    = false;
      btn.textContent = 'Resend invite';
    } else {
      showToast('Invite resent to ' + email, 'success');
      btn.textContent = 'Sent';
    }
  })
  .catch(function() {
    showToast('Failed to resend invite', 'error');
    btn.disabled    = false;
    btn.textContent = 'Resend invite';
  });
}

function initWelcomeEditor() {
  STATE.wmQuill = new Quill('#wmQuillEditor', {
    theme:   'snow',
    modules: { toolbar: [
      ['bold', 'italic', 'underline'],
      [{ list: 'ordered' }, { list: 'bullet' }],
      ['link'],
      ['clean']
    ]}
  });

  loadWmList();

  document.getElementById('wmAddBtn').addEventListener('click', function() {
    clearWmEditor();
    document.getElementById('wmInlineEditor').style.display = 'block';
    document.getElementById('wmTitle').focus();
  });

  document.getElementById('wmCancelBtn').addEventListener('click', function() {
    clearWmEditor();
    document.getElementById('wmInlineEditor').style.display = 'none';
  });

  document.getElementById('wmSaveBtn').addEventListener('click', function() {
    saveWmMessage();
  });
}

function loadWmList() {
  if (!STATE.isAdmin) return;
  db.ref('welcome-messages').once('value').then(function(snap) {
    var list = document.getElementById('wmList');
    list.innerHTML = '';
    var val = snap.val();
    if (!val || typeof val !== 'object') {
      list.style.display = 'none';
      return;
    }
    var keys = Object.keys(val);
    if (keys.length === 0) { list.style.display = 'none'; return; }
    list.style.display = 'block';
    /* Header row */
    var hdr = document.createElement('div');
    hdr.style.cssText = "font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);padding:12px 24px 6px;";
    hdr.textContent = 'Existing messages';
    list.appendChild(hdr);
    keys.forEach(function(k) {
      var m = val[k];
      list.appendChild(buildWmItem(k, m));
    });
  });
}

function buildWmItem(key, m) {
  var item = document.createElement('div');
  item.className = 'wm-item';

  var body = document.createElement('div');
  body.className = 'wm-item__body';

  var title = document.createElement('div');
  title.className = 'wm-item__title';
  title.textContent = m.title || '(no title)';

  var meta = document.createElement('div');
  meta.className = 'wm-item__meta';
  meta.textContent = 'By ' + (m.author || 'unknown') +
    (m.createdAt ? '  —  ' + new Date(m.createdAt).toLocaleDateString('en-GB') : '');

  body.appendChild(title);
  body.appendChild(meta);

  var actions = document.createElement('div');
  actions.className = 'wm-item__actions';

  var editBtn = document.createElement('button');
  editBtn.className = 'btn btn--ghost btn--sm';
  editBtn.textContent = 'Edit';
  editBtn.addEventListener('click', function() { loadWmIntoEditor(key, m); });

  var delBtn = document.createElement('button');
  delBtn.className = 'btn btn--danger btn--sm';
  delBtn.textContent = 'Delete';
  delBtn.addEventListener('click', function() { deleteWmMessage(key, delBtn); });

  actions.appendChild(editBtn);
  actions.appendChild(delBtn);
  item.appendChild(body);
  item.appendChild(actions);
  return item;
}

function loadWmIntoEditor(key, m) {
  document.getElementById('wmTitle').value     = m.title || '';
  document.getElementById('wmEditingKey').value = key;
  document.getElementById('wmEditorHead').textContent = 'Editing message';
  STATE.wmQuill.root.innerHTML = m.content || '';
}

function clearWmEditor() {
  document.getElementById('wmTitle').value      = '';
  document.getElementById('wmEditingKey').value = '';
  document.getElementById('wmEditorHead').textContent = 'New message';
  STATE.wmQuill.setContents([]);
}

function saveWmMessage() {
  var title   = document.getElementById('wmTitle').value.trim();
  var content = STATE.wmQuill.root.innerHTML;
  var key     = document.getElementById('wmEditingKey').value;

  if (!title) { showToast('Please enter a title', 'error'); return; }

  setBtnLoading('wmSaveBtn', true);

  var payload = {
    title:     title,
    content:   content,
    author:    STATE.userData.name || STATE.user.email || '',
    updatedAt: Date.now()
  };

  var ref = key
    ? db.ref('welcome-messages/' + key)
    : db.ref('welcome-messages').push();

  if (!key) payload.createdAt = Date.now();

  var promise = key ? ref.update(payload) : ref.set(payload);

  promise.then(function() {
    setBtnLoading('wmSaveBtn', false, 'Save message');
    clearWmEditor();
    document.getElementById('wmInlineEditor').style.display = 'none';
    writeAudit(key ? 'message_edited' : 'message_created', title);
    showToast('Message saved', 'success');
    loadWmList();
    loadWelcomeMessages(); /* Refresh carousel */
  }).catch(function() {
    setBtnLoading('wmSaveBtn', false, 'Save message');
    showToast('Failed to save message', 'error');
  });
}

function deleteWmMessage(key, btn) {
  btn.textContent = 'Confirm?';
  btn.style.background = 'var(--red)';
  btn.style.color = '#fff';
  var confirmed = false;

  btn.addEventListener('click', function handler() {
    if (!confirmed) {
      confirmed = true;
      db.ref('welcome-messages/' + key).remove()
        .then(function() {
          showToast('Message deleted', 'success');
          loadWmList();
          loadWelcomeMessages();
        })
        .catch(function() { showToast('Failed to delete', 'error'); });
      btn.removeEventListener('click', handler);
    }
  });

  setTimeout(function() {
    if (!confirmed) {
      btn.textContent = 'Delete';
      btn.style.background = '';
      btn.style.color = '';
    }
  }, 3000);
}
</script>
</body>
</html>
