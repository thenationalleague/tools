<!DOCTYPE html>
<!--
  NL Tools -- Portal Dashboard
  Version: v3.10 (conversation turn 42)
  Date: 31/03/2026
  File: /tools/portal/index.html

  Changelog:
  v2.0 -- Audit log tab: paginated 20-at-a-time chronological feed with
         cursor-based Load More. Search by name/email/action reads full
         per-user history from audit-by-user/{uid}. All meaningful actions
         write to both audit/{ts} and audit-by-user/{uid}/{ts}.
  v1.9 -- Four-state access model (hidden/off/access/admin) throughout.
         Tool tiles: red top border for admin, navy for access.
         Superadmin bypass: all tools shown as admin, toggles greyed out.
         New access string format replaces boolean tools object.
         getAccessLevel() helper centralises all access reads.
  v1.8 -- Accordion header redesigned: single row on desktop (crest, name,
         email, org, role pill, chevron). Stacked on mobile (crest+role on one
         line, name+email on next, no org text). NL rose used as org crest for
         staff/admin/superadmin. Club crest for club users.
  v1.7 -- Invite club picker JS functions restored (were lost in v1.5 regex cleanup).
  v1.6 -- Invite form CSS restored (was accidentally removed in v1.5 cleanup).
         Accordion full-width on all sizes (removed two-col grid on desktop).
         Accordion header shows role pill, name, email, club crest where relevant.
  v1.5 -- Users table replaced entirely with accordion on all screen sizes.
         Desktop table CSS and HTML removed. Accordion now shows all tools
         including placeholders so admins can grant access to any catalogue entry.
  v1.4 -- Welcome messages removed from tool catalogue tile grid.
         Carousel always open, no collapse toggle, always visible to all.
         Message editor moved inline into carousel (admin/superadmin only).
         Messages tab removed from admin panel.
  v1.3 -- Mobile users table replaced with accordion (tap user to expand,
         shows Access/Admin toggles per tool grouped by department).
         Desktop wide table unchanged.
         Club filter added to users search (filters to show one club's users).
         Body overflow-x hidden now enforced via html element too, preventing
         min-width table from breaking out of viewport.
  v1.2 -- Invite form club field replaced with club picker (dropdown + crests).
         Superadmin cannot downgrade their own role or remove own tool access.
         Mobile horizontal scroll fixed: body overflow-x hidden, topbar width 100%.
  v1.1 -- Superadmin/admin now see all tools including placeholders (placeholder
         filter was blocking the full catalogue view for admins).
         v1 boolean tool grants (tools/{key}: true) now treated as access:true
         so existing user records work without a data migration.
  v1.0 -- Initial v2 build. Rebuilt from scratch.
         Sections: topbar (with club crest for club users), welcome carousel
         (collapsible, admin-editable via Quill), tool tile grid (flat, no dept
         labels), available tools section (tools in tier not yet granted),
         admin panel (requests, users table with two-toggle access+admin columns,
         invite, welcome message editor, audit log placeholder).
         Reads v2 RTDB structure: users/{uid}/tools/{key}/access + /admin.
         Superadmin and admin roles unlock admin panel.
         guard= query param shows contextual banner (denied/pending/error).
         No GAS dependency -- notifications deferred to v2 GAS build.
         Firebase compat CDN only. No ES modules. No build tools.
         All HTML built via DOM methods -- no innerHTML with closing tags.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NL Tools</title>

<!-- Firebase compat CDN -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<!-- Quill (welcome message editor) -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>

<style>
/* -- Font ------------------------------------------------------------------ */
@font-face {
  font-family: "carbona-variable";
  src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
       url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
  font-display: swap; font-style: normal; font-weight: 200 900; font-stretch: normal;
}

/* -- Reset & variables ----------------------------------------------------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }

:root {
  --primary:     #9e0000;
  --primary-dim: #7a0000;
  --navy:        #223b7c;
  --navy-mid:    #1a2f63;
  --navy-light:  #2a4a8c;
  --red:         #c0392b;
  --red-light:   #fdf0ef;
  --green:       #1e7e34;
  --green-light: #edf7ee;
  --amber:       #e67e22;
  --amber-light: #fef6ec;
  --white:       #ffffff;
  --off-white:   #f4f6f9;
  --text:        #1a2a44;
  --text-muted:  #5a6a82;
  --border:      #dde3ed;
  --radius:      6px;
  --shadow:      0 2px 12px rgba(10,22,40,0.10);
  --font:        'carbona-variable','carbona',sans-serif;
}

body {
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.5;
  font-variation-settings: 'wght' 400;
  color: var(--text);
  background: var(--off-white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* -- Topbar ---------------------------------------------------------------- */
.topbar {
  background: var(--primary);
  color: var(--white);
  padding: 0 28px;
  height: 72px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  border-bottom: 7px solid var(--navy);
  width: 100%;
  box-sizing: border-box;
}
.topbar__logo { height: 42px; flex-shrink: 0; }
.topbar__title {
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  font-size: 20px;
  flex: 1;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--white);
}
.topbar__title .word-secondary { color: rgba(255,255,255,0.55); }
.topbar__user {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: rgba(255,255,255,0.8);
}
.topbar__club-crest {
  height: 36px;
  width: 36px;
  object-fit: contain;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  padding: 2px;
  flex-shrink: 0;
}
.topbar__name {
  font-size: 13px;
  color: rgba(255,255,255,0.9);
  font-weight: 600;
  font-variation-settings: 'wght' 600;
  white-space: nowrap;
}
.topbar__version {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.1em;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
}
.topbar__btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: var(--white);
  padding: 7px 16px;
  border-radius: var(--radius);
  font-size: 11px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
  white-space: nowrap;
}
.topbar__btn:hover { background: rgba(255,255,255,0.12); }

/* -- Page body ------------------------------------------------------------- */
.page-body {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* -- Auth loading overlay -------------------------------------------------- */
@keyframes nlSpin { to { transform: rotate(360deg); } }
.auth-overlay {
  position: fixed;
  inset: 0;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.auth-overlay__spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: nlSpin 0.7s linear infinite;
}

/* -- Banner ---------------------------------------------------------------- */
.banner {
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 24px;
  font-size: 14px;
  font-weight: 600;
  font-variation-settings: 'wght' 600;
  display: flex;
  align-items: center;
  gap: 12px;
}
.banner--error  { background: var(--red-light);   color: var(--red);   border: 1px solid #f5c6c2; }
.banner--amber  { background: var(--amber-light);  color: var(--amber); border: 1px solid #f0cfa0; }
.banner--info   { background: #eef2ff; color: var(--navy); border: 1px solid #c7d2f8; }

/* -- Section header -------------------------------------------------------- */
.section-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.section-head__title {
  font-size: 11px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  flex: 1;
}
.section-head__action {
  font-size: 11px;
  color: var(--primary);
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  text-decoration: underline;
  padding: 0;
}

/* -- Welcome carousel ------------------------------------------------------ */
.welcome-wrap {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 32px;
  overflow: hidden;
}
.welcome-header {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.welcome-header.open { border-bottom-color: var(--border); }
.welcome-header__icon { font-size: 18px; margin-right: 12px; }
.welcome-header__title {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  color: var(--text);
}
.welcome-header__count {
  font-size: 11px;
  color: var(--text-muted);
  margin-right: 10px;
}

.welcome-body { display: none; padding: 0; }
.welcome-body.open { display: block; }

.welcome-slides { position: relative; }
.welcome-slide {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: none;
}
.welcome-slide.active { display: block; }
.welcome-slide__title {
  font-size: 16px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  color: var(--text);
  margin-bottom: 8px;
}
.welcome-slide__content { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
.welcome-slide__content p { margin-bottom: 8px; }
.welcome-slide__content p:last-child { margin-bottom: 0; }

.welcome-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px;
}
.welcome-nav__btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  cursor: pointer;
  font-family: var(--font);
  color: var(--text-muted);
  transition: all 0.15s;
}
.welcome-nav__btn:hover { border-color: var(--navy); color: var(--navy); }
.welcome-nav__btn:disabled { opacity: 0.35; cursor: default; }
.welcome-nav__dots { display: flex; gap: 5px; flex: 1; justify-content: center; }
.welcome-nav__dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border);
  border: none;
  cursor: pointer;
  padding: 0;
  transition: background 0.15s;
}
.welcome-nav__dot.active { background: var(--primary); }
.welcome-empty {
  padding: 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
}

/* -- Tool tile grid -------------------------------------------------------- */
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 36px;
}
.tool-tile {
  background: var(--white);
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 18px 18px;
  cursor: pointer;
  text-decoration: none;
  color: var(--text);
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: box-shadow 0.15s, border-color 0.15s, transform 0.1s;
  box-shadow: var(--shadow);
  position: relative;
}
.tool-tile--admin  { border-top-color: var(--primary); }
.tool-tile--access { border-top-color: var(--navy); }
.tool-tile--off    { border-top-color: var(--border); opacity: 0.6; }
.tool-tile:hover {
  border-color: var(--navy);
  box-shadow: 0 4px 20px rgba(10,22,40,0.12);
  transform: translateY(-1px);
}
.tool-tile--placeholder {
  opacity: 0.55;
  cursor: default;
}
.tool-tile--placeholder:hover {
  border-color: var(--border);
  box-shadow: var(--shadow);
  transform: none;
}
.tool-tile__icon { font-size: 28px; line-height: 1; }
.tool-tile__name {
  font-size: 13px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  color: var(--text);
  line-height: 1.2;
}
.tool-tile__desc {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
  flex: 1;
}
.tool-tile__badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: var(--primary);
  color: var(--white);
  border-radius: 10px;
  font-size: 9px;
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  padding: 2px 6px;
  min-width: 18px;
  text-align: center;
}
.tool-tile__soon {
  font-size: 9px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2px 6px;
  align-self: flex-start;
}

/* -- Available tools ------------------------------------------------------- */
.available-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  margin-bottom: 36px;
}
.available-tile {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow);
}
.available-tile__icon { font-size: 22px; flex-shrink: 0; }
.available-tile__info { flex: 1; min-width: 0; }
.available-tile__name {
  font-size: 13px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.available-tile__dept {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
}
.available-tile__req {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 10px;
  font-size: 10px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  cursor: pointer;
  font-family: var(--font);
  color: var(--text-muted);
  transition: all 0.15s;
  white-space: nowrap;
}
.available-tile__req:hover { border-color: var(--navy); color: var(--navy); }
.available-tile__req:disabled { opacity: 0.5; cursor: default; }

/* -- Buttons --------------------------------------------------------------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: var(--radius);
  font-size: 11px;
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  border: none;
  font-family: var(--font);
  transition: background 0.15s;
  white-space: nowrap;
}
.btn--primary { background: var(--primary); color: var(--white); }
.btn--primary:hover:not(:disabled) { background: var(--primary-dim); }
.btn--navy    { background: var(--navy);    color: var(--white); }
.btn--navy:hover:not(:disabled) { background: var(--navy-mid); }
.btn--ghost   { background: none; border: 1px solid var(--border); color: var(--text-muted); }
.btn--ghost:hover:not(:disabled) { background: var(--off-white); color: var(--text); }
.btn--danger  { background: var(--red-light); color: var(--red); border: 1px solid #f5c6c2; }
.btn--danger:hover:not(:disabled) { background: #fae0de; }
.btn--sm { padding: 6px 12px; font-size: 10px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* -- Admin panel ----------------------------------------------------------- */
.admin-panel {
  margin-top: 40px;
  border-top: 2px solid var(--border);
  padding-top: 32px;
}
.admin-panel__title {
  font-size: 13px;
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.admin-panel__title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Admin tabs */
.admin-tabs {
  display: flex;
  gap: 4px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 3px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.admin-tab {
  flex: 1;
  min-width: 80px;
  text-align: center;
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  cursor: pointer;
  color: var(--text-muted);
  border: none;
  background: none;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-family: var(--font);
}
.admin-tab.active { background: var(--primary); color: var(--white); }

.admin-pane { display: none; }
.admin-pane.active { display: block; }

/* -- Requests tab ---------------------------------------------------------- */
.request-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.request-card__header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
.request-card__info { flex: 1; }
.request-card__name {
  font-size: 15px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  color: var(--text);
}
.request-card__meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}
.request-card__tools {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 14px;
  line-height: 1.5;
}
.request-card__actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* -- Users table ----------------------------------------------------------- */
.users-controls {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.users-controls input[type="text"] {
  flex: 1;
  min-width: 160px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}
.users-controls input[type="text"]:focus { border-color: var(--primary); }





/* -- Invite club picker ---------------------------------------------------- */
.inv-club-picker { position: relative; }
.inv-club-picker__wrap {
  display: flex; align-items: center; gap: 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 7px 12px; background: var(--white);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.inv-club-picker__wrap:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(158,0,0,0.08);
}
.inv-club-picker__crest { width: 28px; height: 28px; object-fit: contain; flex-shrink: 0; }
.inv-club-picker__input {
  flex: 1; border: none !important; padding: 0 !important;
  font-size: 14px; outline: none; background: transparent;
  font-family: var(--font); font-variation-settings: 'wght' 400; color: var(--text);
}
.inv-club-picker__input::placeholder { color: #aab4c4; }
.inv-club-picker__dropdown {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  max-height: 200px; overflow-y: auto; display: none; margin-top: 3px;
}
.inv-club-picker__dropdown.open { display: block; }
.inv-club-picker__option {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; cursor: pointer; font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.inv-club-picker__option:last-child { border-bottom: none; }
.inv-club-picker__option:hover { background: var(--off-white); }
.inv-club-picker__option img { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; }
.inv-club-picker__option-name { flex: 1; font-weight: 600; font-variation-settings: 'wght' 600; }
.inv-club-picker__option-div { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }

/* -- Users accordion (all screen sizes) ----------------------------------- */

.users-accordion { margin-top: 4px; }


.uacc-item {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

/* Header — single row desktop layout */
.uacc-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}
.uacc-header:hover { background: var(--off-white); }
.uacc-header.open { border-bottom: 1px solid var(--border); }

/* Org crest */
.uacc-crest {
  width: 36px; height: 36px;
  object-fit: contain;
  border-radius: 50%;
  background: var(--off-white);
  padding: 3px;
  flex-shrink: 0;
}

/* Name col — grows */
.uacc-name {
  flex: 2;
  min-width: 0;
}
.uacc-name__primary {
  font-size: 14px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.uacc-name__secondary {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Org name col — desktop only */
.uacc-org {
  flex: 1;
  min-width: 0;
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  font-variation-settings: 'wght' 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.uacc-chevron {
  font-size: 11px;
  color: var(--text-muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.uacc-header.open .uacc-chevron { transform: rotate(180deg); }

/* Mobile: hide org name, stack name/email differently */
@media (max-width: 600px) {
  .uacc-org { display: none; }
  .uacc-crest { width: 30px; height: 30px; }
  .uacc-header { padding: 10px 12px; gap: 10px; }
  .uacc-name__primary { font-size: 13px; }
}

.uacc-body { display: none; padding: 0 0 8px; }
.uacc-body.open { display: block; }

.uacc-dept-label {
  font-size: 9px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  padding: 10px 14px 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.uacc-dept-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.uacc-tool-row {
  display: flex;
  align-items: center;
  padding: 7px 14px;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.uacc-tool-row:last-child { border-bottom: none; }
.uacc-default-badge {
  font-size: 8px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 5px;
  border-radius: 3px;
  background: var(--primary);
  color: var(--white);
  flex-shrink: 0;
}

.uacc-tool-name {
  flex: 1;
  font-size: 13px;
  color: var(--text);
  font-weight: 600;
  font-variation-settings: 'wght' 600;
}
.uacc-tool-name__icon { margin-right: 6px; }


.uacc-toggle input:checked + .uacc-toggle__sw::after { left: 16px; }
.uacc-toggle--warn input:checked + .uacc-toggle__sw { background: var(--amber); }
.uacc-toggle__label {
  font-size: 8px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
}

.uacc-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px 4px;
  flex-wrap: wrap;
}
.uacc-role-select {
  font-size: 12px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font);
  background: var(--white);
  color: var(--text);
  cursor: pointer;
}

/* Club filter pill */
.club-filter-wrap {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.club-filter-pill {
  font-size: 10px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--white);
  cursor: pointer;
  font-family: var(--font);
  color: var(--text-muted);
  transition: all 0.15s;
}
.club-filter-pill.active {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--white);
}

/* -- Invite form ----------------------------------------------------------- */
.invite-form {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  max-width: 520px;
}
.invite-form .field { margin-bottom: 16px; }
.invite-form .field label {
  display: block;
  font-size: 10px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.invite-form input,
.invite-form select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 12px;
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
  color: var(--text);
  background: var(--white);
}
.invite-form input:focus,
.invite-form select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(158,0,0,0.08); }

/* -- Audit log ------------------------------------------------------------- */
.audit-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.audit-controls input {
  flex: 1;
  min-width: 200px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}
.audit-controls input:focus { border-color: var(--primary); }

.audit-notice {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--amber-light);
  border: 1px solid #f0cfa0;
  border-radius: var(--radius);
  padding: 8px 12px;
  margin-bottom: 12px;
  font-weight: 600;
  font-variation-settings: 'wght' 600;
}

.audit-entry {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.audit-entry:last-child { border-bottom: none; }

.audit-entry__icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--off-white);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 2px;
}
.audit-entry__body { flex: 1; min-width: 0; }
.audit-entry__action {
  font-size: 13px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  color: var(--text);
  margin-bottom: 2px;
}
.audit-entry__detail {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.4;
}
.audit-entry__time {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 3px;
}
.audit-empty {
  text-align: center;
  padding: 32px 0;
  color: var(--text-muted);
  font-size: 13px;
}
.audit-loading {
  text-align: center;
  padding: 24px 0;
  color: var(--text-muted);
  font-size: 13px;
}

/* -- Role pills ------------------------------------------------------------ */
.user-role-pill {
  display: inline-block;
  font-size: 9px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 10px;
  white-space: nowrap;
}
.role-superadmin { background: #f0e6ff; color: #6b21a8; }
.role-admin      { background: #eef2ff; color: var(--navy); }
.role-staff      { background: var(--green-light); color: var(--green); }
.role-club       { background: var(--amber-light); color: var(--amber); }
.role-pending    { background: var(--off-white); color: var(--text-muted); border: 1px solid var(--border); }

/* -- Four-position access slider ------------------------------------------ */
.acc-slider {
  display: inline-flex;
  align-items: flex-start;
  position: relative;
  flex-shrink: 0;
}

/* The connecting track -- sits behind the node row */
.acc-slider__track {
  position: absolute;
  top: 7px; /* vertically centred on 14px node */
  left: 27px; /* starts at centre of first node */
  right: 27px; /* ends at centre of last node */
  height: 2px;
  background: var(--border);
  z-index: 0;
  border-radius: 1px;
}
.acc-slider__track-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  background: var(--primary);
  border-radius: 1px;
  transition: width 0.2s ease;
}

/* Each stop */
.acc-slider__stop {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  position: relative;
  z-index: 1;
  cursor: pointer;
  padding: 0 10px 0;
  border-radius: 4px;
  transition: background 0.1s;
  min-width: 54px;
}
.acc-slider__stop:hover:not(.acc-slider__stop--locked) { background: rgba(0,0,0,0.03); }

.acc-slider__node {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--white);
  transition: all 0.15s;
  position: relative;
  flex-shrink: 0;
}

/* Active node */
.acc-slider__stop--active .acc-slider__node {
  background: var(--primary);
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(158,0,0,0.15);
  transform: scale(1.15);
}

/* Nodes to the left of active */
.acc-slider__stop--filled .acc-slider__node {
  background: var(--primary);
  border-color: var(--primary);
}

.acc-slider__label {
  font-size: 8px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  transition: color 0.15s;
  white-space: nowrap;
  line-height: 1;
}
.acc-slider__stop--active .acc-slider__label { color: var(--primary); }
.acc-slider__stop--filled .acc-slider__label { color: var(--primary); }

/* Default indicator -- bold navy badge below the label at the default stop */
.acc-slider__default-badge {
  font-size: 7px;
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--white);
  background: var(--navy);
  border-radius: 3px;
  padding: 1px 4px;
  margin-top: 2px;
  white-space: nowrap;
}

/* Locked (superadmin) */
.acc-slider--locked .acc-slider__stop { cursor: default; pointer-events: none; }
.acc-slider--locked .acc-slider__node { opacity: 0.35; }
.acc-slider--locked .acc-slider__stop--active .acc-slider__node {
  background: var(--border); border-color: var(--border); box-shadow: none;
}
.acc-slider--locked .acc-slider__stop--filled .acc-slider__node {
  background: var(--border); border-color: var(--border);
}
.acc-slider--locked .acc-slider__stop--active .acc-slider__label { color: var(--border); }
.acc-slider--locked .acc-slider__stop--filled .acc-slider__label { color: var(--border); }
.acc-slider--locked .acc-slider__track-fill { background: var(--border); }

/* Dept header set-all buttons */
.uacc-dept-header {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  gap: 10px;
  background: var(--navy);
  margin: 8px 0 0;
}
.uacc-dept-header:first-child { margin-top: 0; }
.uacc-dept-label {
  font-size: 10px;
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--white);
  flex: 1;
}
.uacc-set-all {
  display: flex;
  gap: 3px;
  flex-shrink: 0;
}
.uacc-set-all__btn {
  font-size: 8px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 3px 7px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.35);
  background: transparent;
  color: rgba(255,255,255,0.75);
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.12s;
}
.uacc-set-all__btn:hover {
  border-color: var(--white);
  color: var(--white);
  background: rgba(255,255,255,0.12);
}

/* -- Invite org/role picker ------------------------------------------------ */
.invite-org-btn,
.invite-role-btn {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 6px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
}
.invite-org-btn:hover,
.invite-role-btn:hover {
  border-color: var(--navy);
  color: var(--navy);
}
.invite-org-btn.active,
.invite-role-btn.active {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--white);
}

/* Invite tool slider rows */
.invite-tool-row {
  display: flex;
  align-items: center;
  padding: 6px 0;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.invite-tool-row:last-child { border-bottom: none; }
.invite-tool-name {
  flex: 1;
  font-size: 12px;
  color: var(--text);
  font-weight: 600;
  font-variation-settings: 'wght' 600;
}
.invite-dept-label {
  font-size: 9px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  padding: 10px 0 3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.invite-dept-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* -- Cancel invite / change role ------------------------------------------- */
.cancel-invite-btn {
  background: none;
  border: 1px solid var(--red-light);
  color: var(--red);
  font-size: 11px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  padding: 4px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: all 0.15s;
}
.cancel-invite-btn:hover { background: var(--red-light); }
.cancel-invite-btn.confirm { background: var(--red); color: var(--white); border-color: var(--red); }

.resend-pill {
  background: var(--off-white);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  padding: 4px 12px;
  border-radius: 12px;
  cursor: pointer;
  font-family: var(--font);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: all 0.15s;
}
.resend-pill:hover { border-color: var(--navy); color: var(--navy); }

/* Change role button */
.change-role-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  padding: 4px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: all 0.15s;
}
.change-role-btn:hover { border-color: var(--navy); color: var(--navy); }

/* Inline role picker (shown inside accordion footer) */
.inline-role-picker {
  display: none;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
  background: var(--off-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 8px;
  width: 100%;
}
.inline-role-picker.open { display: flex; }
.inline-role-picker__row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.inline-role-picker__label {
  font-size: 9px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  min-width: 40px;
}

/* -- Toast notifications --------------------------------------------------- */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  transform: translateY(8px);
  background: var(--navy);
  color: var(--white);
  font-size: 13px;
  font-weight: 700;
  font-variation-settings: 'wght' 700;
  padding: 12px 20px;
  border-radius: var(--radius);
  box-shadow: 0 4px 20px rgba(10,22,40,0.20);
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s ease;
  z-index: 9999;
  white-space: nowrap;
  max-width: calc(100vw - 48px);
}
.toast.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.toast.success { background: #1e7e34; }
.toast.error   { background: var(--primary); }
.toast.info    { background: var(--navy); }

/* -- Padlock stop (admin locked for club users) ---------------------------- */
.acc-slider__stop--padlocked {
  cursor: default;
  pointer-events: none;
}
.acc-slider__stop--padlocked .acc-slider__node {
  background: var(--off-white);
  border-color: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  line-height: 1;
}
.acc-slider__stop--padlocked .acc-slider__label {
  color: var(--border);
}
</style>
</head>
<body>

<!-- Auth loading overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-overlay__spinner"></div>
</div>

<!-- Main page (hidden until auth ready) -->
<div id="pageWrap" style="display:none">

  <!-- Topbar -->
  <div class="topbar">
    <img class="topbar__logo"
      src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png"

      NL <span class="word-secondary">Tools</span>
    </span>
    <span class="topbar__version" id="portalVersion">v3.9</span>

      <img class="topbar__club-crest" id="topbarCrest" src="" alt="" style="display:none"

        <div id="wmAdminBtn" style="display:none">
          <button class="btn btn--ghost btn--sm" id="wmAddBtn">+ Add message</button>
        </div>
      </div>
      <div class="welcome-body open" id="welcomeBody">

        <div id="wmInlineEditor" style="display:none;border-bottom:1px solid var(--border);padding:20px 24px;background:var(--off-white);">
          <div style="font-size:12px;font-weight:800;font-variation-settings:'wght' 800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:12px;" id="wmEditorHead">New message</div>
          <div style="margin-bottom:12px;">

          </div>

          <button class="welcome-nav__btn" id="wNavNext">Next &#8594;</button>

      <span class="section-head__title">My Tools</span>

    </div>

      <div id="availableGrid" class="available-grid" style="display:none"></div>

<script>
/* ---- Firebase init ------------------------------------------------------- */
var firebaseConfig = {
  apiKey:            'AIzaSyC3az3OMnU7TdqlaWp8yrO_EjgZ36l-mXU',
  authDomain:        'nl-tools.firebaseapp.com',
  databaseURL:       'https://nl-tools-default-rtdb.europe-west1.firebasedatabase.app',
  projectId:         'nl-tools',
  storageBucket:     'nl-tools.firebasestorage.app',
  messagingSenderId: '801354670005',
  appId:             '1:801354670005:web:05d8ebad3e7e63610d03fc'
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db   = firebase.database();

/* ---- Constants ----------------------------------------------------------- */
var INVITE_GAS_URL = 'https://script.google.com/macros/s/AKfycbw9PcyI4Gl53H3hDagt-M_r9bBXUfNsPxuGTBFKxf0AIEpEx8aMuSN65i482Ke0gMb4Cg/exec';
var CREST_BASE     = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/';
var FALLBACK_CREST = CREST_BASE + 'National%20League%20rose.png';
var LOGIN_URL      = '/tools/';

/* ---- State --------------------------------------------------------------- */

/* ---- Department display map and sort order ------------------------------- */
var DEPT_MAP = {
  'staff':      { label: 'Staff',                      order: 1 },
  'ops':        { label: 'Administration & Operations', order: 2 },
  'media':      { label: 'Media & Marketing',           order: 3 },
  'commercial': { label: 'Commercial',                  order: 4 },
  'trust':      { label: 'NL Trust',                    order: 5 },
  'alliance':   { label: 'U19 Alliance',                order: 6 }
};

function getDeptLabel(code) {
  return (DEPT_MAP[code] && DEPT_MAP[code].label) || code;
}

function sortDepts(depts) {
  return depts.sort(function(a, b) {
    var ao = (DEPT_MAP[a] && DEPT_MAP[a].order) || 99;
    var bo = (DEPT_MAP[b] && DEPT_MAP[b].order) || 99;
    return ao - bo;
  });
}

var STATE = {
  uid:      null,
  user:     null,      /* Firebase Auth user */
  userData: null,      /* RTDB user record */
  role:     '',
  tools:    {},        /* tools catalogue from RTDB */
  toolsList: [],
  isAdmin:      false,
  isSuperAdmin: false,
  wmQuill:  null,
  wmSlide:  0,
  wmSlides: [],
  allUsers: {}
};

/* ---- Helpers ------------------------------------------------------------- */
function esc(s) {
  s = String(s || '');
  s = s.replace(/&/g, '&amp;');
  s = s.replace(/\x3c/g, '&lt;');
  s = s.replace(/>/g, '&gt;');
  s = s.replace(/"/g, '&quot;');
  return s;
}

/* ---- Access level helpers ------------------------------------------------ */
function getAccessLevel(uid, toolKey) {
  if (STATE.isSuperAdmin && uid === STATE.uid) return 'admin';
  var ud = (uid === STATE.uid) ? STATE.userData : (STATE.allUsers[uid] || {});
  if (!ud) return 'hidden';
  if (ud.role === 'superadmin') return 'admin';
  var entry = ud.tools && ud.tools[toolKey];
  if (typeof entry === 'string') return entry;
  if (entry === true) return 'access';
  var tool = STATE.tools[toolKey];
  if (!tool || !tool.defaults) return 'hidden';
  return tool.defaults[getGroupKey(ud)] || 'hidden';
}

function getGroupKey(ud) {
  if (ud.role === 'superadmin') return 'nl-admin';
  if (ud.role === 'admin' || ud.role === 'staff') {
    var orgKey = ud.orgKey || 'nl';
    var role   = ud.role === 'admin' ? 'admin' : 'staff';
    return orgKey + '-' + role;
  }
  return 'club';
}

function getDefaultLevel(toolKey, ud) {
  var tool = STATE.tools[toolKey];
  if (!tool || !tool.defaults) return 'hidden';
  return tool.defaults[getGroupKey(ud)] || 'hidden';
}


function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success') + ' show';
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}

function showMsg(id, text, type) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'msg msg--' + (type || 'error') + ' show';
}

function hideMsg(id) {
  var el = document.getElementById(id);
  if (el) el.className = 'msg';
}

function setBtnLoading(id, loading, label) {
  var btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = loading;
  if (loading) {
    btn.dataset.label = btn.textContent;
    var sp = document.createElement('span');
    sp.className = 'btn-spinner';
    btn.innerHTML = '';
    btn.appendChild(sp);
  } else {
    btn.textContent = label || btn.dataset.label || btn.textContent;
  }
}

function removeOverlay() {
  var ov = document.getElementById('authOverlay');
  if (ov) ov.parentNode.removeChild(ov);
}

/* ---- Guard banner -------------------------------------------------------- */
function showGuardBanner() {
  var params = new URLSearchParams(window.location.search);
  var guard  = params.get('guard');
  if (!guard) return;

  /* Clean the URL */
  var clean = window.location.pathname;
  window.history.replaceState({}, '', clean);

  var container = document.getElementById('guardBanner');
  var div = document.createElement('div');

  if (guard === 'denied') {
    div.className = 'banner banner--error';
    div.textContent = 'You do not have access to that tool. Contact an administrator to request access.';
  } else if (guard === 'pending') {
    div.className = 'banner banner--amber';
    div.textContent = 'Your account is pending approval. You will receive an email once access has been granted.';
  } else if (guard === 'error') {
    div.className = 'banner banner--error';
    div.textContent = 'There was a problem checking your access. Please try signing out and back in.';
  }

  container.appendChild(div);
}

/* ---- Auth ---------------------------------------------------------------- */
auth.onAuthStateChanged(function(user) {
  if (!user) {
    window.location.replace(LOGIN_URL);
    return;
  }
  STATE.user = user;
  STATE.uid  = user.uid;

  db.ref('users/' + user.uid).once('value')
    .then(function(snap) {
      if (!snap.exists()) {
        window.location.replace(LOGIN_URL);
        return;
      }
      STATE.userData = snap.val();
      STATE.role       = STATE.userData.role || '';
      STATE.isSuperAdmin = STATE.role === 'superadmin';
      STATE.isAdmin      = STATE.role === 'admin' || STATE.isSuperAdmin;

      /* pending flag cleared by login page after account creation */

      loadTools().then(function() {
        initPortal();
        writeAudit('signed_in', 'Portal loaded');
      });
    })
    .catch(function() {
      window.location.replace(LOGIN_URL);
    });
});

/* ---- Load tools catalogue ------------------------------------------------ */
function loadTools() {
  return db.ref('tools').once('value').then(function(snap) {
    if (snap.exists()) {
      STATE.tools = snap.val();
      STATE.toolsList = Object.keys(STATE.tools).map(function(k) {
        var t = STATE.tools[k];
        t._key = k;
        return t;
      });
    }
  }).catch(function() {});
}

/* ---- Init portal --------------------------------------------------------- */
function initPortal() {
  removeOverlay();
  document.getElementById('pageWrap').style.display = 'block';

  showGuardBanner();
  renderTopbar();
  loadWelcomeMessages();
  renderToolGrid();
  renderAvailableTools();

  if (STATE.isAdmin) {
    document.getElementById('adminPanel').style.display = 'block';
    initAdminTabs();
    loadRequests();
    loadUsers();
    initInviteForm();
    initWelcomeEditor();
    /* Show admin controls in carousel header */
    document.getElementById('wmAdminBtn').style.display = 'block';
  }

  document.getElementById('signOutBtn').addEventListener('click', function() {
    writeAudit('signed_out', 'Signed out');
    auth.signOut().then(function() {
      window.location.replace(LOGIN_URL);
    });
  });
}

/* ---- Topbar -------------------------------------------------------------- */
function renderTopbar() {
  var ud = STATE.userData;
  document.getElementById('topbarName').textContent = ud.name || STATE.user.email || '';
  /* Set version from changelog */
  var verEl = document.getElementById('portalVersion');
  if (verEl) {
    var match = (document.documentElement.innerHTML || '').match(/Version: (v[\d.]+)/);
    if (match) verEl.textContent = match[1];
  }

  if (STATE.role === 'club' && ud.club) {
    var img = document.getElementById('topbarCrest');
    img.src = CREST_BASE + encodeURIComponent(ud.club) + '.png';
    img.alt = ud.club;
    img.style.display = 'block';
    img.onerror = function() { this.onerror = null; this.style.display = 'none'; };
  }
}

/* ---- Welcome carousel ---------------------------------------------------- */
function loadWelcomeMessages() {
  db.ref('welcome-messages').once('value').then(function(snap) {
    var val = snap.val();
    /* Firebase returns "" for an empty node created in console */
    if (!val || typeof val !== 'object') {
      renderWelcomeEmpty();
      return;
    }
    var msgs = Object.keys(val).map(function(k) {
      var m = val[k]; m._key = k; return m;
    }).sort(function(a, b) {
      return (b.createdAt || 0) - (a.createdAt || 0);
    });
    STATE.wmSlides = msgs;
    STATE.wmSlide  = 0;
    renderWelcomeSlides();
  }).catch(function() { renderWelcomeEmpty(); });
}

function renderWelcomeEmpty() {
  var body = document.getElementById('welcomeBody');
  var div  = document.createElement('div');
  div.className = 'welcome-empty';
  div.textContent = 'No announcements at the moment.';
  body.appendChild(div);

}

function renderWelcomeSlides() {
  var msgs    = STATE.wmSlides;
  var slides  = document.getElementById('welcomeSlides');
  var nav     = document.getElementById('welcomeNav');
  var dots    = document.getElementById('wNavDots');
  var count   = document.getElementById('welcomeCount');

  slides.innerHTML = '';
  dots.innerHTML   = '';

  if (msgs.length === 0) { renderWelcomeEmpty(); return; }

  count.textContent = msgs.length + (msgs.length === 1 ? ' message' : ' messages');

  msgs.forEach(function(m, i) {
    var slide = document.createElement('div');
    slide.className = 'welcome-slide' + (i === 0 ? ' active' : '');
    slide.dataset.idx = i;

    var title = document.createElement('div');
    title.className = 'welcome-slide__title';
    title.textContent = m.title || '';

    var content = document.createElement('div');
    content.className = 'welcome-slide__content';
    /* content is stored as HTML from Quill — safe to set as innerHTML
       since only admins can write it */
    content.innerHTML = m.content || '';

    slide.appendChild(title);
    slide.appendChild(content);
    slides.appendChild(slide);

    var dot = document.createElement('button');
    dot.className = 'welcome-nav__dot' + (i === 0 ? ' active' : '');
    dot.dataset.idx = i;
    dot.addEventListener('click', function() { goWelcomeSlide(parseInt(dot.dataset.idx)); });
    dots.appendChild(dot);
  });

  if (msgs.length > 1) nav.style.display = 'flex';

  document.getElementById('wNavPrev').addEventListener('click', function() {
    goWelcomeSlide(STATE.wmSlide - 1);
  });
  document.getElementById('wNavNext').addEventListener('click', function() {
    goWelcomeSlide(STATE.wmSlide + 1);
  });

  updateWelcomeNav();

  /* Always open */
}


function goWelcomeSlide(idx) {
  var msgs = STATE.wmSlides;
  idx = Math.max(0, Math.min(msgs.length - 1, idx));
  STATE.wmSlide = idx;

  document.querySelectorAll('.welcome-slide').forEach(function(s, i) {
    s.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.welcome-nav__dot').forEach(function(d, i) {
    d.classList.toggle('active', i === idx);
  });
  updateWelcomeNav();
}

function updateWelcomeNav() {
  var prev = document.getElementById('wNavPrev');
  var next = document.getElementById('wNavNext');
  if (prev) prev.disabled = STATE.wmSlide === 0;
  if (next) next.disabled = STATE.wmSlide === STATE.wmSlides.length - 1;
}

/* ---- Tool tile grid ------------------------------------------------------ */
function renderToolGrid() {
  var grid   = document.getElementById('toolGrid');
  var ud     = STATE.userData;
  var tools  = STATE.toolsList;
  var myKeys = [];

  /* Collect tools to show as tiles.
     'welcome' is always-on infrastructure, never a tile.
     Superadmin/admin see everything. Others see access/admin only.
     off = shown in available section. hidden = not shown at all. */
  tools.forEach(function(t) {
    if (t._key === 'welcome') return;
    var level = getAccessLevel(STATE.uid, t._key);
    if (level === 'hidden') return;
    if (level === 'off' && !STATE.isAdmin) return;
    myKeys.push(t._key);
  });

  grid.innerHTML = '';

  if (myKeys.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.style.gridColumn = '1 / -1';
    var icon = document.createElement('div');
    icon.className = 'empty-state__icon';
    icon.textContent = '🔒';
    var text = document.createElement('div');
    text.className = 'empty-state__text';
    text.textContent = 'No tools have been granted yet. Contact an administrator.';
    empty.appendChild(icon);
    empty.appendChild(text);
    grid.appendChild(empty);
    return;
  }

  myKeys.forEach(function(key) {
    var t = STATE.tools[key];
    if (!t) return;
    var level = getAccessLevel(STATE.uid, key);
    var tile  = buildToolTile(key, t, level);
    grid.appendChild(tile);
  });
}

function buildToolTile(key, t, level) {
  level = level || 'access';
  var tile = document.createElement('a');
  var levelClass = level === 'admin' ? ' tool-tile--admin'
                 : level === 'access' ? ' tool-tile--access'
                 : ' tool-tile--off';
  tile.className = 'tool-tile' + (t.placeholder ? ' tool-tile--placeholder' : '') + levelClass;

  if (t.placeholder || !t.url || t.url === '#') {
    tile.href = '#';
    tile.addEventListener('click', function(e) {
      e.preventDefault();
      if (t.placeholder) showToast(t.label + ' is coming soon', 'success');
    });
  } else {
    tile.href = t.url;
  }

  var icon = document.createElement('div');
  icon.className = 'tool-tile__icon';
  icon.textContent = t.icon || '🔧';

  var name = document.createElement('div');
  name.className = 'tool-tile__name';
  name.textContent = t.label || key;

  var desc = document.createElement('div');
  desc.className = 'tool-tile__desc';
  desc.textContent = t.description || '';

  tile.appendChild(icon);
  tile.appendChild(name);
  tile.appendChild(desc);

  if (t.placeholder) {
    var soon = document.createElement('span');
    soon.className = 'tool-tile__soon';
    soon.textContent = 'Coming soon';
    tile.appendChild(soon);
  }

  return tile;
}

/* ---- Available tools ----------------------------------------------------- */
function renderAvailableTools() {
  var ud     = STATE.userData;
  var tools  = STATE.toolsList;
  var tier   = STATE.role;
  var available = [];

  tools.forEach(function(t) {
    if (t._key === 'welcome') return;
    if (STATE.isSuperAdmin) return;
    var level = getAccessLevel(STATE.uid, t._key);
    /* Only show 'off' tools -- these are visible but not yet granted */
    if (level !== 'off') return;
    available.push(t);
  });

  if (available.length === 0) return;

  document.getElementById('availableSection').style.display = 'block';
  var grid = document.getElementById('availableGrid');

  available.forEach(function(t) {
    var tile = document.createElement('div');
    tile.className = 'available-tile';

    var icon = document.createElement('div');
    icon.className = 'available-tile__icon';
    icon.textContent = t.icon || '🔧';

    var info = document.createElement('div');
    info.className = 'available-tile__info';

    var name = document.createElement('div');
    name.className = 'available-tile__name';
    name.textContent = t.label || t._key;

    var dept = document.createElement('div');
    dept.className = 'available-tile__dept';
    dept.textContent = getDeptLabel(t.department || '');

    info.appendChild(name);
    info.appendChild(dept);

    var reqBtn = document.createElement('button');
    reqBtn.className = 'available-tile__req';
    reqBtn.textContent = 'Request';
    reqBtn.addEventListener('click', function() {
      requestToolAccess(t._key, t.label, reqBtn);
    });

    tile.appendChild(icon);
    tile.appendChild(info);
    tile.appendChild(reqBtn);
    grid.appendChild(tile);
  });

  /* Toggle show/hide */
  document.getElementById('availableToggle').addEventListener('click', function() {
    var g   = document.getElementById('availableGrid');
    var btn = document.getElementById('availableToggle');
    var vis = g.style.display !== 'none';
    g.style.display = vis ? 'none' : 'grid';
    btn.textContent = vis ? 'Show' : 'Hide';
  });
}

function requestToolAccess(key, label, btn) {
  /* Write to tool-requests/ node */
  btn.disabled = true;
  btn.textContent = 'Requested';
  db.ref('tool-requests').push({
    uid:       STATE.uid,
    name:      STATE.userData.name || '',
    email:     STATE.userData.email || '',
    tool:      key,
    toolLabel: label,
    status:    'pending',
    createdAt: Date.now()
  }).then(function() {
    showToast('Access requested for ' + label, 'success');
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = 'Request';
    showToast('Could not send request', 'error');
  });
}

/* ---- Audit log ----------------------------------------------------------- */

var AUDIT_ACTION_ICONS = {
  'signed_in':           '🔑',
  'signed_out':          '🚪',
  'invite_sent':         '✉️',
  'request_approved':    '✅',
  'request_declined':    '❌',

  'message_created':     '📝',
  'message_edited':      '✏️',
  'message_deleted':     '🗑️',
  'invite_cancelled':    '🚫'
};

var AUDIT_STATE = {
  mode:        'feed',    /* 'feed' or 'search' */
  cursor:      null,      /* oldest timestamp seen, used for pagination */
  searchUid:   null,
  searchCursor: null,
  exhausted:   false      /* no more entries to load */
};

/*
 * writeAudit(action, detail)
 * Writes to both audit/{ts} and audit-by-user/{actorUid}/{ts}.
 * Never throws -- audit failures are silent.
 */
function writeAudit(action, detail) {
  if (!STATE.uid) return;
  var ts      = Date.now();
  var entry   = {
    action:    action,
    detail:    detail  || '',
    uid:       STATE.uid,
    name:      (STATE.userData && STATE.userData.name)  || '',
    email:     (STATE.userData && STATE.userData.email) || '',
    at:        new Date(ts).toISOString()
  };
  var updates = {};
  updates['audit/' + ts]                          = entry;
  updates['audit-by-user/' + STATE.uid + '/' + ts] = entry;
  db.ref().update(updates).catch(function() {});
}

/*
 * writeAuditFor(targetUid, targetName, targetEmail, action, detail)
 * Used when an admin acts ON another user -- logs under both the
 * actor (STATE.uid) and the target user's index.
 */
function writeAuditFor(targetUid, targetName, targetEmail, action, detail) {
  if (!STATE.uid) return;
  var ts    = Date.now();
  var entry = {
    action:      action,
    detail:      detail || '',
    uid:         STATE.uid,
    name:        (STATE.userData && STATE.userData.name)  || '',
    email:       (STATE.userData && STATE.userData.email) || '',
    targetUid:   targetUid   || '',
    targetName:  targetName  || '',
    targetEmail: targetEmail || '',
    at:          new Date(ts).toISOString()
  };
  var updates = {};
  updates['audit/' + ts]                               = entry;
  updates['audit-by-user/' + STATE.uid + '/' + ts]     = entry;
  if (targetUid && targetUid !== STATE.uid) {
    updates['audit-by-user/' + targetUid + '/' + ts]   = entry;
  }
  db.ref().update(updates).catch(function() {});
}

/* ---- Audit display ------------------------------------------------------- */

function initAuditPane() {
  document.getElementById('auditSearchBtn').addEventListener('click', function() {
    runAuditSearch();
  });
  document.getElementById('auditSearch').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') runAuditSearch();
  });
  document.getElementById('auditClearBtn').addEventListener('click', function() {
    document.getElementById('auditSearch').value = '';
    document.getElementById('auditSearchNotice').style.display = 'none';
    AUDIT_STATE.mode        = 'feed';
    AUDIT_STATE.cursor      = null;
    AUDIT_STATE.searchUid   = null;
    AUDIT_STATE.searchCursor = null;
    AUDIT_STATE.exhausted   = false;
    document.getElementById('auditList').innerHTML = '';
    loadAuditFeed(true);
  });
  document.getElementById('auditLoadMoreBtn').addEventListener('click', function() {
    if (AUDIT_STATE.mode === 'search') {
      loadAuditForUser(AUDIT_STATE.searchUid, false);
    } else {
      loadAuditFeed(false);
    }
  });
}

function loadAuditFeed(fresh) {
  if (fresh) {
    AUDIT_STATE.cursor    = null;
    AUDIT_STATE.exhausted = false;
    document.getElementById('auditList').innerHTML =
      '<div class="audit-loading">Loading...<\/div>';
  }

  var query = db.ref('audit').orderByKey().limitToLast(21);
  if (AUDIT_STATE.cursor) {
    query = db.ref('audit').orderByKey().endBefore(String(AUDIT_STATE.cursor)).limitToLast(21);
  }

  query.once('value').then(function(snap) {
    var entries = [];
    snap.forEach(function(child) {
      var e = child.val();
      e._ts = child.key;
      entries.push(e);
    });

    /* 21 fetched -- if we got 21 there are more; show 20, keep 21st as cursor signal */
    var hasMore = entries.length === 21;
    if (hasMore) entries = entries.slice(0, 20);

    /* Reverse so newest first */
    entries.reverse();

    if (fresh) document.getElementById('auditList').innerHTML = '';

    if (fresh && entries.length === 0) {
      document.getElementById('auditList').innerHTML =
        '<div class="audit-empty">No audit entries yet.<\/div>';
      document.getElementById('auditLoadMore').style.display = 'none';
      return;
    }

    appendAuditEntries(entries);

    /* Cursor = oldest entry shown */
    if (entries.length > 0) {
      AUDIT_STATE.cursor = entries[entries.length - 1]._ts;
    }

    AUDIT_STATE.exhausted = !hasMore;
    document.getElementById('auditLoadMore').style.display =
      hasMore ? 'block' : 'none';
  }).catch(function() {
    document.getElementById('auditList').innerHTML =
      '<div class="audit-empty">Could not load audit log.<\/div>';
  });
}

function runAuditSearch() {
  var q = document.getElementById('auditSearch').value.trim().toLowerCase();
  if (!q) return;

  /* Find matching user(s) in loaded users */
  var matchedUids = Object.keys(STATE.allUsers).filter(function(uid) {
    var u = STATE.allUsers[uid];
    return (u.name  || '').toLowerCase().indexOf(q) !== -1 ||
           (u.email || '').toLowerCase().indexOf(q) !== -1;
  });

  /* Also match the current superadmin themselves */
  if (STATE.userData) {
    var selfMatch =
      (STATE.userData.name  || '').toLowerCase().indexOf(q) !== -1 ||
      (STATE.userData.email || '').toLowerCase().indexOf(q) !== -1;
    if (selfMatch && matchedUids.indexOf(STATE.uid) === -1) {
      matchedUids.push(STATE.uid);
    }
  }

  if (matchedUids.length === 0) {
    /* No user match -- search action/detail in feed */
    AUDIT_STATE.mode      = 'action-search';
    AUDIT_STATE.cursor    = null;
    AUDIT_STATE.exhausted = false;
    document.getElementById('auditList').innerHTML =
      '<div class="audit-loading">Searching...<\/div>';
    loadAuditActionSearch(q, true);
    return;
  }

  /* For now use first match -- could extend to multi-user results */
  var uid      = matchedUids[0];
  var userData = STATE.allUsers[uid] || STATE.userData;
  var notice   = document.getElementById('auditSearchNotice');
  notice.textContent = 'Showing full history for ' +
    (userData.name || userData.email || uid) +
    '. This reads their complete audit trail.';
  notice.style.display = 'block';

  AUDIT_STATE.mode         = 'search';
  AUDIT_STATE.searchUid    = uid;
  AUDIT_STATE.searchCursor = null;
  AUDIT_STATE.exhausted    = false;
  document.getElementById('auditList').innerHTML =
    '<div class="audit-loading">Loading history...<\/div>';
  loadAuditForUser(uid, true);
}

function loadAuditForUser(uid, fresh) {
  if (fresh) {
    AUDIT_STATE.searchCursor = null;
    AUDIT_STATE.exhausted    = false;
  }

  var query = db.ref('audit-by-user/' + uid).orderByKey().limitToLast(21);
  if (AUDIT_STATE.searchCursor) {
    query = db.ref('audit-by-user/' + uid)
      .orderByKey()
      .endBefore(String(AUDIT_STATE.searchCursor))
      .limitToLast(21);
  }

  query.once('value').then(function(snap) {
    var entries = [];
    snap.forEach(function(child) {
      var e = child.val();
      e._ts = child.key;
      entries.push(e);
    });

    var hasMore = entries.length === 21;
    if (hasMore) entries = entries.slice(0, 20);
    entries.reverse();

    if (fresh) document.getElementById('auditList').innerHTML = '';

    if (fresh && entries.length === 0) {
      document.getElementById('auditList').innerHTML =
        '<div class="audit-empty">No audit history for this user.<\/div>';
      document.getElementById('auditLoadMore').style.display = 'none';
      return;
    }

    appendAuditEntries(entries);

    if (entries.length > 0) {
      AUDIT_STATE.searchCursor = entries[entries.length - 1]._ts;
    }

    AUDIT_STATE.exhausted = !hasMore;
    document.getElementById('auditLoadMore').style.display =
      hasMore ? 'block' : 'none';
  }).catch(function() {
    document.getElementById('auditList').innerHTML =
      '<div class="audit-empty">Could not load user history.<\/div>';
  });
}

function loadAuditActionSearch(q, fresh) {
  /* Read last 500 entries and filter by action/detail client-side */
  db.ref('audit').orderByKey().limitToLast(500).once('value').then(function(snap) {
    var entries = [];
    snap.forEach(function(child) {
      var e = child.val();
      e._ts = child.key;
      var searchable = [e.action, e.detail, e.name, e.email,
                        e.targetName, e.targetEmail].join(' ').toLowerCase();
      if (searchable.indexOf(q) !== -1) entries.push(e);
    });
    entries.reverse();

    document.getElementById('auditList').innerHTML = '';
    if (entries.length === 0) {
      document.getElementById('auditList').innerHTML =
        '<div class="audit-empty">No entries matching "' + esc(q) + '".<\/div>';
      document.getElementById('auditLoadMore').style.display = 'none';
      return;
    }

    appendAuditEntries(entries);
    document.getElementById('auditLoadMore').style.display = 'none';
    var notice = document.getElementById('auditSearchNotice');
    notice.textContent = entries.length + ' entries matching "' + q +
      '" in last 500 actions.';
    notice.style.display = 'block';
  });
}

function appendAuditEntries(entries) {
  var list = document.getElementById('auditList');
  /* Remove loading placeholder if present */
  var loading = list.querySelector('.audit-loading');
  if (loading) list.removeChild(loading);

  entries.forEach(function(e) {
    var row = document.createElement('div');
    row.className = 'audit-entry';

    var icon = document.createElement('div');
    icon.className = 'audit-entry__icon';
    icon.textContent = AUDIT_ACTION_ICONS[e.action] || '📋';

    var body = document.createElement('div');
    body.className = 'audit-entry__body';

    var action = document.createElement('div');
    action.className = 'audit-entry__action';
    action.textContent = formatAuditAction(e);

    var detail = document.createElement('div');
    detail.className = 'audit-entry__detail';
    var detailParts = [];
    if (e.name || e.email) detailParts.push(e.name || e.email);
    if (e.targetName || e.targetEmail) {
      detailParts.push('→ ' + (e.targetName || e.targetEmail));
    }
    if (e.detail) detailParts.push(e.detail);
    detail.textContent = detailParts.join('  —  ');

    body.appendChild(action);
    body.appendChild(detail);

    var time = document.createElement('div');
    time.className = 'audit-entry__time';
    time.textContent = formatAuditTime(e.at || e._ts);
    time.title = e.at || '';

    row.appendChild(icon);
    row.appendChild(body);
    row.appendChild(time);
    list.appendChild(row);
  });
}

function formatAuditAction(e) {
  var labels = {
    'signed_in':        'Signed in',
    'signed_out':       'Signed out',
    'invite_sent':      'Invite sent',
    'request_approved': 'Request approved',
    'request_declined': 'Request declined',
    'access_changed':   'Access changed',
    'role_changed':     'Role changed',
    'message_created':  'Message created',
    'message_edited':   'Message edited',
    'message_deleted':  'Message deleted'
  };
  return labels[e.action] || e.action || 'Unknown action';
}

function formatAuditTime(val) {
  if (!val) return '';
  var d = isNaN(val) ? new Date(val) : new Date(parseInt(val));
  if (isNaN(d.getTime())) return val;
  var now  = new Date();
  var diff = now - d;
  if (diff < 60000)    return 'Just now';
  if (diff < 3600000)  return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) +
    ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

function initAdminTabs() {
  document.querySelectorAll('.admin-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.admin-pane').forEach(function(p) { p.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('pane-' + tab.dataset.pane).classList.add('active');
      /* Lazy load audit feed on first open */

        tab.dataset.loaded = '1';
        loadAuditFeed(true);
      }
    });
  });
}
