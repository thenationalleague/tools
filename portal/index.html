function initAuditPane() {
  document.getElementById('auditSearchBtn').addEventListener('click', function() {
    runAuditSearch();
  });
  document.getElementById('auditSearch').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') runAuditSearch();
  });
  document.getElementById('auditClearBtn').addEventListener('click', function() {
    document.getElementById('auditSearch').value = '';
    document.getElementById('auditSearchNotice').style.display = 'none';
    AUDIT_STATE.mode        = 'feed';
    AUDIT_STATE.cursor      = null;
    AUDIT_STATE.searchUid   = null;
    AUDIT_STATE.searchCursor = null;
    AUDIT_STATE.exhausted   = false;
    document.getElementById('auditList').innerHTML = '';
    loadAuditFeed(true);
  });
  document.getElementById('auditLoadMoreBtn').addEventListener('click', function() {
    if (AUDIT_STATE.mode === 'search') {
      loadAuditForUser(AUDIT_STATE.searchUid, false);
    } else {
      loadAuditFeed(false);
    }
  });
}

function loadAuditFeed(fresh) {
  if (fresh) {
    AUDIT_STATE.cursor    = null;
    AUDIT_STATE.exhausted = false;
    document.getElementById('auditList').innerHTML =
      '<div class="audit-loading">Loading...<\/div>';
  }

  var query = db.ref('audit').orderByKey().limitToLast(21);
  if (AUDIT_STATE.cursor) {
    query = db.ref('audit').orderByKey().endBefore(String(AUDIT_STATE.cursor)).limitToLast(21);
  }

  query.once('value').then(function(snap) {
    var entries = [];
    snap.forEach(function(child) {
      var e = child.val();
      e._ts = child.key;
      entries.push(e);
    });

    /* 21 fetched -- if we got 21 there are more; show 20, keep 21st as cursor signal */
    var hasMore = entries.length === 21;
    if (hasMore) entries = entries.slice(0, 20);

    /* Reverse so newest first */
    entries.reverse();

    if (fresh) document.getElementById('auditList').innerHTML = '';

    if (fresh && entries.length === 0) {
      document.getElementById('auditList').innerHTML =
        '<div class="audit-empty">No audit entries yet.<\/div>';
      document.getElementById('auditLoadMore').style.display = 'none';
      return;
    }

    appendAuditEntries(entries);

    /* Cursor = oldest entry shown */
    if (entries.length > 0) {
      AUDIT_STATE.cursor = entries[entries.length - 1]._ts;
    }

    AUDIT_STATE.exhausted = !hasMore;
    document.getElementById('auditLoadMore').style.display =
      hasMore ? 'block' : 'none';
  }).catch(function() {
    document.getElementById('auditList').innerHTML =
      '<div class="audit-empty">Could not load audit log.<\/div>';
  });
}

function runAuditSearch() {
  var q = document.getElementById('auditSearch').value.trim().toLowerCase();
  if (!q) return;

  /* Find matching user(s) in loaded users */
  var matchedUids = Object.keys(STATE.allUsers).filter(function(uid) {
    var u = STATE.allUsers[uid];
    return (u.name  || '').toLowerCase().indexOf(q) !== -1 ||
           (u.email || '').toLowerCase().indexOf(q) !== -1;
  });

  /* Also match the current superadmin themselves */
  if (STATE.userData) {
    var selfMatch =
      (STATE.userData.name  || '').toLowerCase().indexOf(q) !== -1 ||
      (STATE.userData.email || '').toLowerCase().indexOf(q) !== -1;
    if (selfMatch && matchedUids.indexOf(STATE.uid) === -1) {
      matchedUids.push(STATE.uid);
    }
  }

  if (matchedUids.length === 0) {
    /* No user match -- search action/detail in feed */
    AUDIT_STATE.mode      = 'action-search';
    AUDIT_STATE.cursor    = null;
    AUDIT_STATE.exhausted = false;
    document.getElementById('auditList').innerHTML =
      '<div class="audit-loading">Searching...<\/div>';
    loadAuditActionSearch(q, true);
    return;
  }

  /* For now use first match -- could extend to multi-user results */
  var uid      = matchedUids[0];
  var userData = STATE.allUsers[uid] || STATE.userData;
  var notice   = document.getElementById('auditSearchNotice');
  notice.textContent = 'Showing full history for ' +
    (userData.name || userData.email || uid) +
    '. This reads their complete audit trail.';
  notice.style.display = 'block';

  AUDIT_STATE.mode         = 'search';
  AUDIT_STATE.searchUid    = uid;
  AUDIT_STATE.searchCursor = null;
  AUDIT_STATE.exhausted    = false;
  document.getElementById('auditList').innerHTML =
    '<div class="audit-loading">Loading history...<\/div>';
  loadAuditForUser(uid, true);
}

function loadAuditForUser(uid, fresh) {
  if (fresh) {
    AUDIT_STATE.searchCursor = null;
    AUDIT_STATE.exhausted    = false;
  }

  var query = db.ref('audit-by-user/' + uid).orderByKey().limitToLast(21);
  if (AUDIT_STATE.searchCursor) {
    query = db.ref('audit-by-user/' + uid)
      .orderByKey()
      .endBefore(String(AUDIT_STATE.searchCursor))
      .limitToLast(21);
  }

  query.once('value').then(function(snap) {
    var entries = [];
    snap.forEach(function(child) {
      var e = child.val();
      e._ts = child.key;
      entries.push(e);
    });

    var hasMore = entries.length === 21;
    if (hasMore) entries = entries.slice(0, 20);
    entries.reverse();

    if (fresh) document.getElementById('auditList').innerHTML = '';

    if (fresh && entries.length === 0) {
      document.getElementById('auditList').innerHTML =
        '<div class="audit-empty">No audit history for this user.<\/div>';
      document.getElementById('auditLoadMore').style.display = 'none';
      return;
    }

    appendAuditEntries(entries);

    if (entries.length > 0) {
      AUDIT_STATE.searchCursor = entries[entries.length - 1]._ts;
    }

    AUDIT_STATE.exhausted = !hasMore;
    document.getElementById('auditLoadMore').style.display =
      hasMore ? 'block' : 'none';
  }).catch(function() {
    document.getElementById('auditList').innerHTML =
      '<div class="audit-empty">Could not load user history.<\/div>';
  });
}

function loadAuditActionSearch(q, fresh) {
  /* Read last 500 entries and filter by action/detail client-side */
  db.ref('audit').orderByKey().limitToLast(500).once('value').then(function(snap) {
    var entries = [];
    snap.forEach(function(child) {
      var e = child.val();
      e._ts = child.key;
      var searchable = [e.action, e.detail, e.name, e.email,
                        e.targetName, e.targetEmail].join(' ').toLowerCase();
      if (searchable.indexOf(q) !== -1) entries.push(e);
    });
    entries.reverse();

    document.getElementById('auditList').innerHTML = '';
    if (entries.length === 0) {
      document.getElementById('auditList').innerHTML =
        '<div class="audit-empty">No entries matching "' + esc(q) + '".<\/div>';
      document.getElementById('auditLoadMore').style.display = 'none';
      return;
    }

    appendAuditEntries(entries);
    document.getElementById('auditLoadMore').style.display = 'none';
    var notice = document.getElementById('auditSearchNotice');
    notice.textContent = entries.length + ' entries matching "' + q +
      '" in last 500 actions.';
    notice.style.display = 'block';
  });
}

function appendAuditEntries(entries) {
  var list = document.getElementById('auditList');
  /* Remove loading placeholder if present */
  var loading = list.querySelector('.audit-loading');
  if (loading) list.removeChild(loading);

  entries.forEach(function(e) {
    var row = document.createElement('div');
    row.className = 'audit-entry';

    var icon = document.createElement('div');
    icon.className = 'audit-entry__icon';
    icon.textContent = AUDIT_ACTION_ICONS[e.action] || '📋';

    var body = document.createElement('div');
    body.className = 'audit-entry__body';

    var action = document.createElement('div');
    action.className = 'audit-entry__action';
    action.textContent = formatAuditAction(e);

    var detail = document.createElement('div');
    detail.className = 'audit-entry__detail';
    var detailParts = [];
    if (e.name || e.email) detailParts.push(e.name || e.email);
    if (e.targetName || e.targetEmail) {
      detailParts.push('→ ' + (e.targetName || e.targetEmail));
    }
    if (e.detail) detailParts.push(e.detail);
    detail.textContent = detailParts.join('  —  ');

    body.appendChild(action);
    body.appendChild(detail);

    var time = document.createElement('div');
    time.className = 'audit-entry__time';
    time.textContent = formatAuditTime(e.at || e._ts);
    time.title = e.at || '';

    row.appendChild(icon);
    row.appendChild(body);
    row.appendChild(time);
    list.appendChild(row);
  });
}

function formatAuditAction(e) {
  var labels = {
    'signed_in':        'Signed in',
    'signed_out':       'Signed out',
    'invite_sent':      'Invite sent',
    'request_approved': 'Request approved',
    'request_declined': 'Request declined',
    'access_changed':   'Access changed',
    'role_changed':     'Role changed',
    'message_created':  'Message created',
    'message_edited':   'Message edited',
    'message_deleted':  'Message deleted',
    'user_removed':     'User removed'
  };
  return labels[e.action] || e.action || 'Unknown action';
}

function formatAuditTime(val) {
  if (!val) return '';
  var d = isNaN(val) ? new Date(val) : new Date(parseInt(val));
  if (isNaN(d.getTime())) return val;
  var now  = new Date();
  var diff = now - d;
  if (diff < 60000)    return 'Just now';
  if (diff < 3600000)  return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) +
    ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

function initAdminTabs() {
  document.querySelectorAll('.admin-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.admin-pane').forEach(function(p) { p.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('pane-' + tab.dataset.pane).classList.add('active');
      if (tab.dataset.pane === 'audit' && !tab.dataset.loaded) {

        loadAuditFeed(true);
      }
      if (tab.dataset.pane === 'pending-invites') {
        loadPendingInvites();
      }
    });
  });

  /* Auto-open tab from ?tab= URL param (e.g. from admin notification email) */
  var tabParam = new URLSearchParams(window.location.search).get('tab');
  if (tabParam) {
    var target = document.querySelector('.admin-tab[data-pane="' + tabParam + '"]');
    if (target) {
      window.history.replaceState({}, '', window.location.pathname);
      target.click();
    }
  }
}

/*
 * loadRequests() reads requests/ node and shows pending entries.
 * Approve: removes pending flag from users/{uid}, fires sendApproval GAS.
 * Reject:  sets rejected:true on users/{uid}, fires sendRejection GAS.
 * Both update the request record status for audit trail.
 * Handles both new requests (with uid) and legacy requests (without uid).
 */
function loadRequests() {
  var container = document.getElementById('requestsList');
  container.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">Loading…</div>';

  db.ref('requests').once('value').then(function(snap) {
    container.innerHTML = '';
    if (!snap.exists()) {
      var e = document.createElement('div');
      e.style.cssText = 'font-size:13px;color:var(--text-muted);padding:8px 0;';
      e.textContent = 'No requests yet.';
      container.appendChild(e);
      return;
    }

    var pending = [], handled = [];
    snap.forEach(function(child) {
      var r = child.val(); r._key = child.key;
      if (r.status === 'pending') pending.push(r);
      else handled.push(r);
    });
    handled.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
    handled = handled.slice(0, 20);

    if (pending.length) {
      var ph = document.createElement('div');
      ph.style.cssText = 'font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:12px;';
      ph.textContent = 'Pending (' + pending.length + ')';
      container.appendChild(ph);
      pending.forEach(function(r) { container.appendChild(buildRequestCard(r)); });
    } else {
      var np = document.createElement('div');
      np.style.cssText = 'font-size:13px;color:var(--text-muted);padding:8px 0 20px;';
      np.textContent = 'No pending requests.';
      container.appendChild(np);
    }

    if (handled.length) {
      var hh = document.createElement('div');
      hh.style.cssText = 'font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin:20px 0 12px;border-top:1px solid var(--border);padding-top:16px;';
      hh.textContent = 'Recently handled';
      container.appendChild(hh);
      handled.forEach(function(r) {
        var card = document.createElement('div');
        card.style.cssText = 'background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;opacity:0.75;';
        var dot = document.createElement('span');
        dot.style.cssText = 'width:8px;height:8px;border-radius:50%;flex-shrink:0;background:' +
          (r.status === 'approved' ? 'var(--green)' : 'var(--red)') + ';';
        var inf = document.createElement('div'); inf.style.cssText = 'flex:1;min-width:0;';
        var nm = document.createElement('div'); nm.style.cssText = 'font-size:13px;font-weight:700;';
        nm.textContent = (r.name || '(no name)') + (r.club ? '  —  ' + r.club : '');
        var em = document.createElement('div'); em.style.cssText = 'font-size:11px;color:var(--text-muted);';
        em.textContent = r.email || '';
        inf.appendChild(nm); inf.appendChild(em);
        var pill = document.createElement('span');
        pill.style.cssText = 'font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;padding:3px 8px;border-radius:10px;white-space:nowrap;' +
          (r.status === 'approved' ? 'background:var(--green-light);color:var(--green);' : 'background:var(--red-light);color:var(--red);');
        pill.textContent = r.status;
        card.appendChild(dot); card.appendChild(inf); card.appendChild(pill);
        container.appendChild(card);
      });
    }
  }).catch(function() {
    container.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">Could not load requests.</div>';
  });
}

function buildRequestCard(r) {
  var card = document.createElement('div');
  card.className = 'request-card';

  /* Header: name, email, club, role, timestamp */
  var header = document.createElement('div');
  header.className = 'request-card__header';
  var info = document.createElement('div');
  info.className = 'request-card__info';
  var nameEl = document.createElement('div');
  nameEl.className = 'request-card__name';
  nameEl.textContent = r.name || '(no name)';
  var meta = document.createElement('div');
  meta.className = 'request-card__meta';
  var metaParts = [r.email || ''];
  if (r.club)     metaParts.push(r.club);
  if (r.clubRole) metaParts.push(r.clubRole);
  if (r.createdAt) {
    var d = new Date(r.createdAt);
    metaParts.push(d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) +
      ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }));
  }
  meta.textContent = metaParts.join('  —  ');
  info.appendChild(nameEl);
  info.appendChild(meta);

  /* Warning if no uid — legacy request, can only reject */
  var hasUid = !!r.uid;
  if (!hasUid) {
    var warn = document.createElement('div');
    warn.style.cssText = 'font-size:11px;color:var(--amber);font-weight:700;margin-top:4px;';
    warn.textContent = '⚠ Legacy request — no linked account. Reject to archive.';
    info.appendChild(warn);
  }

  header.appendChild(info);
  card.appendChild(header);

  /* Tool access sliders -- only if uid exists */
  if (hasUid) {
    var ss = document.createElement('div');
    ss.style.cssText = 'border-top:1px solid var(--border);padding:14px 20px 4px;';
    var sh = document.createElement('div');
    sh.style.cssText = 'font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:10px;';
    sh.textContent = 'Access to grant — adjust before approving';
    ss.appendChild(sh);

    /* Build sliders from the tools they requested + defaults */
    var tools  = STATE.toolsList.filter(function(t) { return t._key !== 'welcome'; });
    var dm     = {};
    var reqTools = (r.tools && typeof r.tools === 'object' && !Array.isArray(r.tools))
      ? r.tools
      : {};

    tools.forEach(function(t) { var d = t.department || 'General'; if (!dm[d]) dm[d] = []; dm[d].push(t); });
    sortDepts(Object.keys(dm)).forEach(function(dept) {
      if (dept === 'staff') return; /* never show staff tools on request cards */
      var dl = document.createElement('div');
      dl.style.cssText = 'font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);padding:8px 0 4px;border-top:1px solid var(--border);';
      dl.textContent = getDeptLabel(dept);
      ss.appendChild(dl);
      dm[dept].forEach(function(t) {
        var defaultLevel = (t.defaults && t.defaults['club']) || 'hidden';
        /* If they requested this tool and default is hidden/off, bump to access */
        var reqLevel = reqTools[t._key];
        if (reqLevel === 'access' && (defaultLevel === 'hidden' || defaultLevel === 'off')) defaultLevel = 'access';
        if (defaultLevel === 'admin') defaultLevel = 'access'; /* cap club at access */
        var row = document.createElement('div');
        row.className = 'invite-tool-row';
        var nm = document.createElement('div');
        nm.className = 'invite-tool-name';
        nm.textContent = (t.icon ? t.icon + ' ' : '') + (t.label || t._key);
        if (reqLevel === 'access') {
          var b = document.createElement('span');
          b.style.cssText = 'margin-left:6px;font-size:9px;background:var(--navy);color:#fff;padding:1px 6px;border-radius:8px;font-weight:800;text-transform:uppercase;';
          b.textContent = 'Requested';
          nm.appendChild(b);
        }
        row.appendChild(nm);
        row.appendChild(buildInviteSlider(t._key, defaultLevel, true /* club, cap admin */));
        ss.appendChild(row);
      });
    });
    card.appendChild(ss);
  }

  /* Actions */
  var actions = document.createElement('div');
  actions.className = 'request-card__actions';
  actions.style.cssText = 'padding:14px 20px;border-top:1px solid var(--border);';

  if (hasUid) {
    var approveBtn = document.createElement('button');
    approveBtn.className = 'btn btn--navy btn--sm';
    approveBtn.textContent = 'Approve';
    approveBtn.addEventListener('click', function() { approveRequest(r, approveBtn, ss); });

    var rejectBtn = document.createElement('button');
    rejectBtn.className = 'btn btn--ghost btn--sm';
    rejectBtn.textContent = 'Reject';
    rejectBtn.addEventListener('click', function() { rejectRequest(r, rejectBtn); });

    actions.appendChild(approveBtn);
    actions.appendChild(rejectBtn);
  } else {
    /* Legacy: reject only */
    var archiveBtn = document.createElement('button');
    archiveBtn.className = 'btn btn--ghost btn--sm';
    archiveBtn.textContent = 'Archive';
    archiveBtn.addEventListener('click', function() {
      db.ref('requests/' + r._key + '/status').set('archived')
        .then(function() { showToast('Request archived', 'success'); loadRequests(); });
    });
    actions.appendChild(archiveBtn);
  }

  card.appendChild(actions);
  return card;
}

/* Approve: remove pending flag, write tool access, fire sendApproval email */
function approveRequest(r, btn, ss) {
  btn.disabled = true;
  btn.textContent = 'Approving…';

  if (!r.uid) {
    showToast('No linked account — cannot approve', 'error');
    btn.disabled = false;
    btn.textContent = 'Approve';
    return;
  }

  /* Read tool levels from sliders */
  var toolAccess = {};
  if (ss) {
    ss.querySelectorAll('.acc-slider').forEach(function(slider) {
      var key = slider.dataset.toolkey;
      if (!key) return;
      var idx = 0;
      slider.querySelectorAll('.acc-slider__stop').forEach(function(s, i) {
        if (s.classList.contains('acc-slider__stop--active')) idx = i;
      });
      toolAccess[key] = ACC_LEVELS[idx] || 'hidden';
    });
  }

  var updates = {};
  updates['users/' + r.uid + '/pending']  = false;
  updates['users/' + r.uid + '/rejected'] = false;
  /* Write adjusted tool access */
  Object.keys(toolAccess).forEach(function(k) {
    updates['users/' + r.uid + '/tools/' + k] = toolAccess[k];
  });
  updates['requests/' + r._key + '/status'] = 'approved';

  writeAuditFor(r.uid, r.name || '', r.email || '',
    'request_approved', (r.name || r.email || '') + (r.club ? ' (' + r.club + ')' : ''));

  db.ref().update(updates)
    .then(function() {
      /* Fire approval email -- fire and forget */
      fetch(NL_GAS_URL + '?cb=' + Date.now(), {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify({ action: 'sendApproval', name: r.name || '', email: r.email || '', club: r.club || '' })
      }).catch(function() {});
      showToast('Approved — ' + (r.name || r.email || ''), 'success');
      loadRequests();
      loadUsers();
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = 'Approve';
      showToast('Failed: ' + err.message, 'error');
    });
}

/* Reject: set rejected:true, fire sendRejection email */
function rejectRequest(r, btn) {
  btn.disabled = true;
  btn.textContent = 'Rejecting…';

  if (!r.uid) {
    /* Legacy request with no uid -- just mark rejected in requests node */
    db.ref('requests/' + r._key + '/status').set('rejected')
      .then(function() { showToast('Request rejected', 'success'); loadRequests(); })
      .catch(function() { btn.disabled = false; btn.textContent = 'Reject'; });
    return;
  }

  var updates = {};
  updates['users/' + r.uid + '/pending']  = false;
  updates['users/' + r.uid + '/rejected'] = true;
  updates['requests/' + r._key + '/status'] = 'rejected';

  writeAuditFor(r.uid, r.name || '', r.email || '',
    'request_declined', (r.name || r.email || '') + (r.club ? ' (' + r.club + ')' : ''));

  db.ref().update(updates)
    .then(function() {
      /* Fire rejection email -- fire and forget */
      fetch(NL_GAS_URL + '?cb=' + Date.now(), {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain' },
        body:    JSON.stringify({ action: 'sendRejection', name: r.name || '', email: r.email || '' })
      }).catch(function() {});
      showToast('Request rejected', 'success');
      loadRequests();
      loadUsers();
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = 'Reject';
      showToast('Failed: ' + err.message, 'error');
    });
}

/* ---- Users table --------------------------------------------------------- */
var _activeClubFilter = null;

/* ---- Pending Invites tab ------------------------------------------------- */
/*
 * Shows users with pending:true who came via admin invite (not requests flow).
 * A user is a pending invite if: pending===true AND no matching requests/ entry
 * with their uid. Simpler heuristic: pending===true AND role !== pending request
 * pattern. Since all pending users are pending:true, we distinguish by checking
 * if there is a requests/ entry with status=pending for that uid.
 * For simplicity: show ALL pending:true users here (both invite and request paths)
 * UNLESS they have a matching pending request record. That way request-flow users
 * appear in Requests tab AND Pending Invites tab is invite-only.
 *
 * Actually cleanest: mark invite-flow pending users with source:'invite' in RTDB.
 * But we haven't done that yet. For now: pending invite = pending:true user who
 * does NOT appear in requests/ as a pending entry.
 */
function loadPendingInvites() {
  var container = document.getElementById('pendingInvitesList');
  if (!container) return;

  /* Ensure auth is ready before attempting read */
  if (!auth.currentUser) {
    container.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">Not authenticated.</div>';
    return;
  }

  container.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">Loading…</div>';

  db.ref('invites-pending').once('value').then(function(snap) {
    var items = [];
    if (snap.exists()) {
      snap.forEach(function(child) {
        var inv = child.val();
        inv._key = child.key;
        items.push(inv);
      });
    }

    /* Sort newest first */
    items.sort(function(a, b) { return (b.sentAt || 0) - (a.sentAt || 0); });

    /* Update tab badge */
    var badge = document.getElementById('pendingInviteCount');
    if (badge) {
      badge.textContent = items.length ? '(' + items.length + ')' : '';
      badge.style.cssText = items.length
        ? 'background:var(--primary);color:#fff;border-radius:8px;padding:1px 6px;font-size:9px;margin-left:4px;'
        : '';
    }

    container.innerHTML = '';

    if (!items.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'font-size:13px;color:var(--text-muted);padding:8px 0;';
      empty.textContent = 'No pending invites.';
      container.appendChild(empty);
      return;
    }

    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:12px;';
    hdr.textContent = items.length + ' pending invite' + (items.length === 1 ? '' : 's');
    container.appendChild(hdr);

    items.forEach(function(inv) {
      try {
        container.appendChild(buildPendingInviteCard(inv));
      } catch(cardErr) {
        console.error('buildPendingInviteCard failed for', inv, cardErr);
        var errRow = document.createElement('div');
        errRow.style.cssText = 'font-size:11px;color:var(--red);padding:4px 0;';
        errRow.textContent = 'Error rendering card for ' + (inv.email || inv.name || inv._key) + ': ' + cardErr.message;
        container.appendChild(errRow);
      }
    });
  }).catch(function(err) {
    console.error('loadPendingInvites failed:', err);
    container.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">Could not load pending invites: ' + (err && err.message ? err.message : String(err)) + '</div>';
  });
}

function buildPendingInviteCard(inv) {
  var card = document.createElement('div');
  card.className = 'request-card';

  /* Header */
  var header = document.createElement('div');
  header.className = 'request-card__header';
  var info = document.createElement('div');
  info.className = 'request-card__info';

  var nameEl = document.createElement('div');
  nameEl.className = 'request-card__name';
  nameEl.textContent = inv.name || '(no name)';

  var meta = document.createElement('div');
  meta.className = 'request-card__meta';
  var metaParts = [inv.email || ''];
  if (inv.role === 'club' && inv.club) metaParts.push(inv.club + (inv.clubRole ? ' · ' + inv.clubRole : ''));
  else if (inv.org) metaParts.push(inv.org + (inv.role ? ' — ' + capitalise(inv.role) : '') + ((inv.jobTitle || inv.clubRole) ? '  ·  ' + (inv.jobTitle || inv.clubRole) : ''));
  if (inv.sentAt) {
    var d = new Date(inv.sentAt);
    metaParts.push('Sent ' + d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) +
      ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) +
      (inv.sentBy ? ' by ' + inv.sentBy : ''));
  }
  meta.textContent = metaParts.join('  —  ');

  info.appendChild(nameEl);
  info.appendChild(meta);
  header.appendChild(info);

  var pill = document.createElement('span');
  pill.className = 'user-role-pill role-pending';
  pill.textContent = 'Awaiting acceptance';
  header.appendChild(pill);

  card.appendChild(header);

  /* Actions */
  var actions = document.createElement('div');
  actions.className = 'request-card__actions';
  actions.style.cssText = 'padding:12px 20px;border-top:1px solid var(--border);';

  /* Resend -- generates new token via GAS, updates sentAt */
  var resendBtn = document.createElement('button');
  resendBtn.className = 'btn btn--ghost btn--sm';
  resendBtn.textContent = 'Resend invite';
  resendBtn.addEventListener('click', function() {
    resendBtn.disabled = true;
    resendBtn.textContent = 'Sending…';
    fetch(NL_GAS_URL + '?cb=' + Date.now(), {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify({
        action:   'sendInvite',
        email:    inv.email    || '',
        name:     inv.name     || '',
        role:     inv.role     || 'staff',
        org:      inv.org      || '',
        orgKey:   inv.orgKey   || '',
        club:     inv.club     || '',
        clubRole: inv.clubRole || '',
        jobTitle: inv.jobTitle || inv.clubRole || '',
        tools:    inv.tools    || {}
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result && result.ok === false) {
        showToast('Resend failed: ' + (result.error || 'unknown'), 'error');
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend invite';
      } else {
        /* Update sentAt on the pending record */
        db.ref('invites-pending/' + inv._key + '/sentAt').set(Date.now()).catch(function() {});
        showToast('Invite resent to ' + inv.email, 'success');
        writeAudit('invite_sent', 'Resent invite to ' + (inv.name || inv.email || ''));
        resendBtn.textContent = 'Sent ✓';
        setTimeout(function() { loadPendingInvites(); }, 1000);
      }
    })
    .catch(function() {
      showToast('Failed to resend', 'error');
      resendBtn.disabled = false;
      resendBtn.textContent = 'Resend invite';
    });
  });

  /* Revoke -- deletes invites-pending entry + invalidates RTDB invite tokens */
  var revokeBtn = document.createElement('button');
  revokeBtn.className = 'btn btn--ghost btn--sm';
  revokeBtn.style.cssText = 'color:var(--red);border-color:#f5c6c2;';
  revokeBtn.textContent = 'Revoke';
  revokeBtn.addEventListener('click', function() {
    if (revokeBtn.dataset.confirmed !== '1') {
      revokeBtn.dataset.confirmed = '1';
      revokeBtn.textContent = 'Confirm revoke?';
      revokeBtn.style.cssText = 'background:var(--red);color:#fff;border-color:var(--red);';
      setTimeout(function() {
        if (revokeBtn.dataset.confirmed === '1') {
          revokeBtn.dataset.confirmed = '0';
          revokeBtn.textContent = 'Revoke';
          revokeBtn.style.cssText = 'color:var(--red);border-color:#f5c6c2;';
        }
      }, 3000);
      return;
    }
    revokeBtn.disabled = true;
    revokeBtn.textContent = 'Revoking…';

    /* Delete the invites-pending record -- tokens expire naturally after 24hrs */
    db.ref('invites-pending/' + inv._key).remove()
      .then(function() {
        writeAudit('invite_cancelled', (inv.name || inv.email || '') + ' invite revoked');
        showToast('Invite revoked for ' + (inv.name || inv.email || ''), 'success');
        loadPendingInvites();
      })
      .catch(function(err) {
        revokeBtn.disabled = false;
        revokeBtn.textContent = 'Revoke';
        revokeBtn.dataset.confirmed = '0';
        showToast('Failed to revoke: ' + err.message, 'error');
      });
  });

  actions.appendChild(resendBtn);
  actions.appendChild(revokeBtn);
  card.appendChild(actions);
  return card;
}

function loadUsers() {
  db.ref('users').once('value').then(function(snap) {
    STATE.allUsers = snap.val() || {};
    renderClubFilterPills();
    renderUsers(STATE.allUsers);
  });

  document.getElementById('reloadUsersBtn').addEventListener('click', function() { loadUsers(); });

  document.getElementById('userSearch').addEventListener('input', function() {
    applyUserFilters();
  });
}

function applyUserFilters() {
  var q    = document.getElementById('userSearch').value.toLowerCase().trim();
  var club = _activeClubFilter;
  var filtered = {};
  Object.keys(STATE.allUsers).forEach(function(uid) {
    var u = STATE.allUsers[uid];
    var matchesText = !q ||
      (u.name  || '').toLowerCase().indexOf(q) !== -1 ||
      (u.email || '').toLowerCase().indexOf(q) !== -1;
    var matchesFilter = true;
    if (club) {
      if (club.startsWith('__org__')) {
        var orgVal = club.replace('__org__', '');
        matchesFilter = (u.org || '') === orgVal;
      } else if (club.startsWith('__club__')) {
        var clubVal = club.replace('__club__', '');
        matchesFilter = (u.club || '') === clubVal;
      } else {
        matchesFilter = (u.club || '') === club;
      }
    }
    if (matchesText && matchesFilter) filtered[uid] = u;
  });
  renderUsers(filtered);
}

function renderClubFilterPills() {
  var wrap   = document.getElementById('clubFilterWrap');
  var select = document.getElementById('clubFilterSelect');
  if (!wrap || !select) return;

  /* Collect NL orgs and clubs separately */
  var nlOrgs = {};
  var clubs  = {};
  Object.keys(STATE.allUsers).forEach(function(uid) {
    var u = STATE.allUsers[uid];
    if (u.role === 'club' && u.club) {
      clubs[u.club] = true;
    } else if (u.org) {
      nlOrgs[u.org] = true;
    }
  });

  var nlOrgList  = Object.keys(nlOrgs).sort();
  var clubList   = Object.keys(clubs).sort();

  if (nlOrgList.length === 0 && clubList.length === 0) {
    wrap.style.display = 'none';
    return;
  }

  wrap.style.display = 'block';

  /* Rebuild options */
  select.innerHTML = '<option value="">All users<\/option>';

  if (nlOrgList.length) {
    var nlGroup = document.createElement('optgroup');
    nlGroup.label = 'Organisations';
    nlOrgList.forEach(function(org) {
      var opt = document.createElement('option');
      opt.value = '__org__' + org;
      opt.textContent = org;
      nlGroup.appendChild(opt);
    });
    select.appendChild(nlGroup);
  }

  if (clubList.length) {
    var clubGroup = document.createElement('optgroup');
    clubGroup.label = 'Clubs';
    clubList.forEach(function(club) {
      var opt = document.createElement('option');
      opt.value = '__club__' + club;
      opt.textContent = club;
      clubGroup.appendChild(opt);
    });
    select.appendChild(clubGroup);
  }

  select.onchange = function() {
    var val = select.value;
    if (!val) {
      _activeClubFilter = null;
    } else if (val.startsWith('__org__')) {
      _activeClubFilter = val; /* stored with prefix, matched in applyUserFilters */
    } else if (val.startsWith('__club__')) {
      _activeClubFilter = val;
    }
    applyUserFilters();
  };
}

function renderUsers(users) {
  renderUsersAccordion(users);
}
