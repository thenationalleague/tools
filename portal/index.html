                       headers. Available tiles show department pill. Staff
                       dashboard stays flat.
  v2.0 (31/03/2026) — Removed diagnostic console logging from init.
  v1.9 (31/03/2026) — Fixed logo filename to 'rose white'.

  v1.7 (31/03/2026) — Diagnostic logging, welcome-messages empty string fix.
  v1.6 (31/03/2026) — Fixed welcome card hover flicker. Users table admin fix.
  v1.5 (31/03/2026) — Role pill, white logo, available filter, welcome carousel.
  v1.4 (30/03/2026) — Full role hierarchy rebuild.
  v1.3 (30/03/2026) — Role-aware invite, requests queue.
  v1.2 (30/03/2026) — visibleToAll tile support.

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NL Tools — Portal</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <!-- Quill rich text editor — only used in admin welcome message panel -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #9e0000;
      --primary-dim:    #7a0000;
      --navy:           #223b7c;
      --navy-mid:       #1a2f63;
      --navy-light:     #2a4a8c;
      --navy-faint:     #edf0f8;
      --red:            #c0392b;
      --red-light:      #fdf0ef;
      --green:          #1e7e34;
      --green-light:    #edf7ee;
      --amber:          #e67e22;
      --amber-light:    #fef6ec;
      --amber-faint:    #fef9f2;
      --white:          #ffffff;
      --off-white:      #f4f6f9;
      --text:           #1a2a44;
      --text-muted:     #5a6a82;
      --border:         #dde3ed;
      --radius:         6px;
      --shadow:         0 2px 12px rgba(10,22,40,0.10);
      --font:           'carbona-variable','carbona',sans-serif;
    }

    @font-face {
      font-family: "carbona-variable";
      src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
           url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
      font-display: swap; font-style: normal; font-weight: 200 900; font-stretch: normal;
    }

    body { font-family: var(--font); font-size: 17px; line-height: 1.5; font-variation-settings: 'wght' 400; color: var(--text); background: var(--off-white); min-height: 100vh; }

    /* ── Auth overlay ── */
    .auth-checking { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.3); border-top-color: var(--white); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Topbar ── */
    .topbar { background: var(--primary); color: var(--white); padding: 0 28px; height: 72px; display: flex; align-items: center; gap: 18px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); border-bottom: 7px solid var(--navy); }
    .topbar img { height: 42px; }
    .topbar__title { font-weight: 900; font-variation-settings: 'wght' 900; font-size: 20px; flex: 1; text-transform: uppercase; letter-spacing: 0.04em; }
    .topbar__title .word-primary   { color: var(--white); }
    .topbar__title .word-secondary { color: rgba(255,255,255,0.55); }
    .topbar__user { font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 600; font-variation-settings: 'wght' 600; letter-spacing: 0.04em; display: flex; align-items: center; gap: 8px; }
    .topbar__role-pill { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 10px; background: rgba(255,255,255,0.18); color: var(--white); border: 1px solid rgba(255,255,255,0.25); }
    .topbar__btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: var(--white); padding: 8px 18px; border-radius: var(--radius); font-size: 12px; font-weight: 700; font-variation-settings: 'wght' 700; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; font-family: var(--font); }
    .topbar__btn:hover { background: rgba(255,255,255,0.12); }

    /* ── Page ── */
    .page { max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Section heading ── */
    .section-head { font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 16px; }

    /* ── Welcome carousel ── */
    .welcome-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 32px; overflow: hidden; }
    .welcome-card__head { padding: 14px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); }
    .welcome-card__head:hover { background: var(--off-white); }
    .welcome-card__head:hover .welcome-card__nav-btn { border-color: var(--border); }
    .welcome-card__head-title { font-size: 12px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); flex: 1; }
    .welcome-card__nav { display: flex; align-items: center; gap: 10px; }
    .welcome-card__counter { font-size: 11px; font-weight: 700; color: var(--text-muted); }
    .welcome-card__nav-btn { background: none; border: 1px solid var(--border); border-radius: 4px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; color: var(--text-muted); transition: all 0.15s; }
    .welcome-card__nav-btn:hover:not(:disabled) { border-color: var(--navy); color: var(--navy); }
    .welcome-card__nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .welcome-card__chevron { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; margin-left: 4px; }
    .welcome-card__head.collapsed .welcome-card__chevron { transform: rotate(-90deg); }
    .welcome-card__body { padding: 24px 28px; }
    .welcome-card__body.collapsed { display: none; }
    .welcome-card__content { font-size: 15px; line-height: 1.6; color: var(--text); }
    .welcome-card__content h1, .welcome-card__content h2 { margin-bottom: 10px; }
    .welcome-card__content p  { margin-bottom: 10px; }
    .welcome-card__content ul, .welcome-card__content ol { margin: 0 0 10px 20px; }
    .welcome-card__content a  { color: var(--navy); }
    .welcome-card__empty { padding: 24px 28px; color: var(--text-muted); font-size: 14px; font-style: italic; }

    /* ── Active tiles ── */
    .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .tile { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; box-shadow: var(--shadow); text-decoration: none; color: var(--text); display: flex; flex-direction: column; gap: 10px; transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s; }
    .tile:hover { box-shadow: 0 6px 24px rgba(10,22,40,0.15); transform: translateY(-2px); border-color: var(--primary); }
    .tile__icon  { font-size: 32px; line-height: 1; }
    .tile__label { font-size: 16px; font-weight: 800; font-variation-settings: 'wght' 800; }
    .tile__desc  { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
    .tile__arrow { margin-top: auto; padding-top: 8px; font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--primary); }
    .tile__placeholder { margin-top: auto; padding-top: 8px; font-size: 10px; font-weight: 700; font-variation-settings: 'wght' 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
    .tile__children { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
    .tile__child { font-size: 12px; padding: 4px 0; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; text-decoration: none; color: var(--text); transition: color 0.15s; }
    .tile__child:hover { color: var(--primary); }
    .tile__child::before { content: '→'; font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
    .tile__children-collapsed { display: none; }
    .tile__expand-btn { margin-top: 8px; font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--primary); background: none; border: none; cursor: pointer; font-family: var(--font); padding: 0; text-align: left; }

    /* ── Available tools ── */
    .available-section { margin-bottom: 40px; }
    .available-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 12px 16px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); user-select: none; transition: border-color 0.15s; }
    .available-toggle:hover { border-color: var(--navy); }
    .available-toggle__label { font-size: 12px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); flex: 1; }
    .available-toggle__count { font-size: 11px; font-weight: 700; background: var(--off-white); border: 1px solid var(--border); color: var(--text-muted); padding: 2px 8px; border-radius: 10px; }
    .available-toggle__chevron { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
    .available-toggle.open .available-toggle__chevron { transform: rotate(180deg); }
    .available-tiles { display: none; padding-top: 12px; }
    .available-tiles.open { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .tile--available { background: var(--white); border: 1px dashed var(--border); border-radius: var(--radius); padding: 16px; opacity: 0.7; cursor: pointer; transition: opacity 0.15s, border-color 0.15s; display: flex; flex-direction: column; gap: 6px; }
    .tile--available:hover { opacity: 1; border-color: var(--navy); }
    .tile--available .tile__icon  { font-size: 22px; }
    .tile--available .tile__label { font-size: 13px; font-weight: 700; font-variation-settings: 'wght' 700; color: var(--text-muted); }
    .tile--available .tile__dept  { font-size: 10px; font-weight: 700; font-variation-settings: 'wght' 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); background: var(--off-white); border: 1px solid var(--border); padding: 2px 6px; border-radius: 8px; display: inline-block; }
    .tile--available .tile__req   { font-size: 10px; font-weight: 700; font-variation-settings: 'wght' 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--navy); margin-top: auto; }

    /* ── Department header row in users table ── */
    .data-table th.th-dept-head { background: var(--text); color: var(--white); font-size: 10px; font-weight: 900; font-variation-settings: 'wght' 900; text-transform: uppercase; letter-spacing: 0.12em; text-align: center; border-left: 2px solid var(--white); }
    .data-table th.th-dept-head:first-of-type { border-left: none; }

    .no-tools { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .no-tools strong { display: block; font-size: 16px; color: var(--text); margin-bottom: 6px; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 10px; width: 100%; max-width: 520px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); overflow: hidden; }
    .modal--wide { max-width: 700px; }
    .modal__head { background: var(--navy); color: var(--white); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .modal__head h3 { font-size: 14px; font-weight: 900; font-variation-settings: 'wght' 900; text-transform: uppercase; letter-spacing: 0.08em; flex: 1; }
    .modal__close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 20px; cursor: pointer; line-height: 1; padding: 0; }
    .modal__close:hover { color: var(--white); }
    .modal__body { padding: 24px; }
    .modal__body p { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
    .modal__warning { background: var(--amber-light); border: 1px solid #f5d78c; border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: var(--amber); font-weight: 600; font-variation-settings: 'wght' 600; margin-bottom: 16px; }
    .modal__footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
    .modal__field { margin-bottom: 16px; }
    .modal__field label { display: block; font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 6px; }
    .modal__field input[type="text"] { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 14px; color: var(--text); outline: none; }
    .modal__field input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(34,59,124,0.1); }

    /* ── Quill overrides ── */
    .ql-container { font-family: var(--font); font-size: 15px; border-radius: 0 0 var(--radius) var(--radius); }
    .ql-toolbar { border-radius: var(--radius) var(--radius) 0 0; font-family: var(--font); border-color: var(--border); }
    .ql-container.ql-snow { border-color: var(--border); min-height: 160px; }
    .ql-editor { min-height: 160px; }

    /* ── Admin panel ── */
    .admin-panel { background: var(--white); border: 2px solid var(--navy); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 24px; }
    .admin-panel__head { background: var(--navy); color: var(--white); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .admin-panel__head h2 { font-size: 13px; font-weight: 900; font-variation-settings: 'wght' 900; text-transform: uppercase; letter-spacing: 0.1em; flex: 1; }
    .admin-tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--white); }
    .admin-tab { padding: 12px 20px; font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; color: var(--text-muted); border: none; background: none; font-family: var(--font); border-bottom: 3px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .admin-tab:hover { color: var(--text); }
    .admin-tab.active { color: var(--navy); border-bottom-color: var(--navy); }
    .admin-tab .tab-count { display: inline-block; background: var(--primary); color: var(--white); font-size: 9px; font-weight: 900; padding: 1px 5px; border-radius: 8px; margin-left: 5px; vertical-align: middle; }
    .admin-tab-content { display: none; }
    .admin-tab-content.active { display: block; }

    /* ── Invite form ── */
    .invite-form { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .invite-form .field { margin: 0; flex: 1; min-width: 160px; }
    .invite-form .field label { display: block; font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 5px; }
    .invite-form .field input,
    .invite-form .field select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 14px; font-variation-settings: 'wght' 400; color: var(--text); outline: none; transition: border-color 0.15s; background: var(--white); }
    .invite-form .field input:focus,
    .invite-form .field select:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(34,59,124,0.10); }
    .form-status { width: 100%; font-size: 12px; padding: 8px 12px; border-radius: var(--radius); display: none; font-weight: 600; font-variation-settings: 'wght' 600; }
    .form-status.show    { display: block; }
    .form-status.success { background: var(--green-light); color: var(--green); border: 1px solid #b8dfc0; }
    .form-status.error   { background: var(--red-light);   color: var(--red);   border: 1px solid #f5c6c2; }

    /* ── Welcome messages admin ── */
    .welcome-msg-list { padding: 0; }
    .welcome-msg-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .welcome-msg-item:last-child { border-bottom: none; }
    .welcome-msg-item__title { flex: 1; font-size: 14px; font-weight: 600; font-variation-settings: 'wght' 600; }
    .welcome-msg-item__meta  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .welcome-msg-item__actions { display: flex; gap: 6px; flex-shrink: 0; }
    .welcome-messages-toolbar { padding: 16px 20px; border-bottom: 1px solid var(--border); }

    /* ── Buttons ── */
    .btn { padding: 9px 18px; border-radius: var(--radius); font-family: var(--font); font-size: 11px; font-weight: 900; font-variation-settings: 'wght' 900; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; border: none; transition: background 0.15s; white-space: nowrap; }
    .btn--navy    { background: var(--navy);       color: var(--white); }
    .btn--navy:hover:not(:disabled)    { background: var(--navy-mid); }
    .btn--primary { background: var(--primary);    color: var(--white); }
    .btn--primary:hover:not(:disabled) { background: var(--primary-dim); }
    .btn--green   { background: var(--green-light); color: var(--green); border: 1px solid #b8dfc0; }
    .btn--green:hover:not(:disabled)   { background: #d4edda; }
    .btn--danger  { background: var(--red-light);  color: var(--red); border: 1px solid #f5c6c2; }
    .btn--danger:hover:not(:disabled)  { background: #fae0de; }
    .btn--ghost   { background: none; border: 1px solid var(--border); color: var(--text-muted); }
    .btn--ghost:hover:not(:disabled)   { background: var(--off-white); }
    .btn--sm { padding: 5px 12px; font-size: 10px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Tables ── */
    .table-wrap { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .data-table th { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .data-table th.th-user  { background: var(--off-white); color: var(--text-muted); }
    .data-table th.th-staff { background: var(--navy-faint); color: var(--navy); }
    .data-table th.th-club  { background: var(--amber-faint); color: var(--amber); }
    .data-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--off-white); }
    .user-email { font-weight: 600; font-variation-settings: 'wght' 600; }
    .user-sub   { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Toggles ── */
    .toggle-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.06em; border: none; font-family: var(--font); transition: opacity 0.15s; }
    .toggle-pill.on   { background: var(--green-light); color: var(--green); }
    .toggle-pill.off  { background: var(--off-white); color: var(--text-muted); border: 1px solid var(--border); }
    .toggle-pill.warn { background: var(--amber-light); color: var(--amber); border: 1px solid #f5d78c; }
    .toggle-pill:hover:not(:disabled) { opacity: 0.75; }
    .toggle-pill:disabled { opacity: 0.35; cursor: not-allowed; }
    .toggle-pill .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .toggle-pill.on   .dot { background: var(--green); }
    .toggle-pill.off  .dot { background: var(--text-muted); }
    .toggle-pill.warn .dot { background: var(--amber); }

    /* ── Badges ── */
    .badge { display: inline-block; font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 8px; border-radius: 10px; }
    .badge--superadmin { background: var(--primary);    color: var(--white); }
    .badge--admin      { background: var(--navy);        color: var(--white); }
    .badge--staff      { background: #e8ecf7;            color: var(--navy); }
    .badge--club       { background: var(--amber-light); color: var(--amber); }
    .badge--pending    { background: var(--amber-light); color: var(--amber); }
    .badge--approved   { background: var(--green-light); color: var(--green); }
    .badge--declined   { background: var(--off-white);   color: var(--text-muted); border: 1px solid var(--border); }

    .req-tools   { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .req-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .audit-entry { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .audit-entry:last-child { border-bottom: none; }
    .audit-entry__action { font-weight: 700; font-variation-settings: 'wght' 700; }
    .audit-entry__meta   { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .empty-state { padding: 28px 24px; color: var(--text-muted); font-size: 14px; text-align: center; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: var(--white); padding: 12px 18px; border-radius: var(--radius); font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.25s ease; max-width: 300px; pointer-events: none; }
    .toast.show    { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid var(--green); }
    .toast.error   { border-left: 4px solid var(--red); }

    @media (max-width: 600px) {
      .topbar { padding: 0 16px; gap: 10px; }
      .topbar__user { display: none; }
      .page { padding: 24px 16px 60px; }
      .invite-form { flex-direction: column; }
      .available-tiles.open { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

  <div class="auth-checking" id="authChecking"><div class="spinner"></div></div>

  <div id="pageWrap" style="display:none;">

    <div class="topbar">
      <img
        src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png"
        alt="National League"
        onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
      <span class="topbar__title">
        <span class="word-primary">NL</span>
        <span class="word-secondary">Tools</span>
      </span>
      <span class="topbar__user">
        <span id="topbarEmail"></span>
        <span class="topbar__role-pill" id="topbarRolePill"></span>
      </span>
      <button class="topbar__btn" onclick="doSignOut()">Sign out</button>
    </div>

    <div class="page">
      <!-- Welcome carousel -->
      <div class="welcome-card" id="welcomeCard" style="display:none;">
        <div class="welcome-card__head" id="welcomeCardHead" onclick="toggleWelcome()">
          <span class="welcome-card__head-title">👋 Welcome</span>
          <div class="welcome-card__nav" onclick="event.stopPropagation()">
            <button class="welcome-card__nav-btn" id="welcomePrev" onclick="welcomeNav(-1)">‹</button>
            <span class="welcome-card__counter" id="welcomeCounter"></span>
            <button class="welcome-card__nav-btn" id="welcomeNext" onclick="welcomeNav(1)">›</button>
          </div>
          <span class="welcome-card__chevron" id="welcomeChevron">▼</span>
        </div>
        <div class="welcome-card__body" id="welcomeBody">
          <div class="welcome-card__content" id="welcomeContent"></div>
        </div>
      </div>

      <div class="section-head">Your tools</div>
      <div id="tilesGrid"></div>
      <div class="available-section" id="availableSection" style="display:none;">
        <div class="available-toggle" id="availableToggle" onclick="toggleAvailable()">
          <span class="available-toggle__label">More tools available</span>
          <span class="available-toggle__count" id="availableCount"></span>
          <span class="available-toggle__chevron">▼</span>
        </div>
        <div class="available-tiles" id="availableTiles"></div>
      </div>
      <div id="adminSection"></div>
    </div>
  </div>

  <!-- Tool request modal -->
  <div class="modal-overlay" id="toolRequestModal">
    <div class="modal">
      <div class="modal__head">
        <h3 id="modalToolLabel">Request Access</h3>
        <button class="modal__close" onclick="closeModal('toolRequestModal')">×</button>
      </div>
      <div class="modal__body">
        <div class="modal__warning">⚠ Please only request access if you genuinely need this tool for your role. Unnecessary requests create extra work for administrators.</div>
        <p id="modalToolDesc"></p>
        <p style="font-size:13px;color:var(--text-muted);">Your request will be reviewed by an administrator.</p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" onclick="closeModal('toolRequestModal')">Cancel</button>
        <button class="btn btn--primary" id="modalRequestBtn" onclick="submitToolRequest()">Request access</button>
      </div>
    </div>
  </div>

  <!-- Welcome message compose/edit modal -->
  <div class="modal-overlay" id="welcomeEditModal">
    <div class="modal modal--wide">
      <div class="modal__head">
        <h3 id="welcomeEditTitle">New Message</h3>
        <button class="modal__close" onclick="closeModal('welcomeEditModal')">×</button>
      </div>
      <div class="modal__body">
        <div class="modal__field">
          <label>Title</label>
          <input type="text" id="welcomeMsgTitle" placeholder="e.g. Welcome to NL Tools">
        </div>
        <div class="modal__field">
          <label>Content</label>
          <div id="quillEditor"></div>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" onclick="closeModal('welcomeEditModal')">Cancel</button>
        <button class="btn btn--navy" id="welcomeSaveBtn" onclick="saveWelcomeMessage()">Save message</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var firebaseConfig = {
      apiKey:            "AIzaSyC3az3OMnU7TdqlaWp8yrO_EjgZ36l-mXU",
      authDomain:        "nl-tools.firebaseapp.com",
      databaseURL:       "https://nl-tools-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "nl-tools",
      storageBucket:     "nl-tools.firebasestorage.app",
      messagingSenderId: "801354670005",
      appId:             "1:801354670005:web:05d8ebad3e7e63610d03fc"
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    var db   = firebase.database();

    // ── State ────────────────────────────────────────────────────────────────
    var STATE = {
      user:            null,
      role:            null,
      toolsCat:        {},
      userTools:       {},
      allUsers:        {},
      requests:        {},
      toolRequests:    {},
      auditLog:        {},
      welcomeMessages: {},  // keyed by RTDB push key
      welcomeKeys:     [],  // ordered array of keys
      welcomeIndex:    0,   // current slide index
      welcomeCollapsed:false,
      pendingToolKey:  null,
      editingMsgKey:   null, // null = new, string = editing existing
      quill:           null,
      perms: {
        isAdmin:      false,
        isSuperAdmin: false,
        canInvite:    false,
        canSeeAudit:  false
      }
    };

    function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escJ(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

    // ── Auth ─────────────────────────────────────────────────────────────────
    auth.onAuthStateChanged(function(user) {
      if (!user) { window.location.replace('/tools/'); return; }
      STATE.user = user;
      init();
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    function init() {
      var uid = STATE.user.uid;
      Promise.all([
        db.ref('tools').once('value'),
        db.ref('users/' + uid).once('value'),
        db.ref('welcome-messages').once('value')
      ])
      .then(function(results) {
        STATE.toolsCat       = results[0].val() || {};
        var userData         = results[1].val() || {};
        STATE.role           = userData.role || 'staff';
        STATE.userTools      = userData.tools || {};

        // welcome-messages may be stored as "" if created empty in Firebase console
        var rawMsgsVal = results[2].val();
        var rawMsgs    = (rawMsgsVal && typeof rawMsgsVal === 'object') ? rawMsgsVal : {};

        STATE.welcomeMessages = rawMsgs;
        STATE.welcomeKeys = Object.keys(rawMsgs).sort(function(a,b) {
          return (rawMsgs[a].createdAt||'').localeCompare(rawMsgs[b].createdAt||'');
        });
        STATE.welcomeIndex = 0;

        STATE.perms.isSuperAdmin = STATE.role === 'superadmin';
        STATE.perms.isAdmin      = STATE.role === 'admin' || STATE.role === 'superadmin';
        STATE.perms.canInvite    = STATE.perms.isAdmin;
        STATE.perms.canSeeAudit  = STATE.perms.isAdmin;

        document.getElementById('topbarEmail').textContent    = STATE.user.email;
        document.getElementById('topbarRolePill').textContent = STATE.role;

        renderWelcomeCard();
        renderTiles();

        if (STATE.perms.isAdmin) return loadAdminData();
        return Promise.resolve();
      })
      .then(function() {
        document.getElementById('authChecking').style.display = 'none';
        document.getElementById('pageWrap').style.display     = 'block';
        var params = new URLSearchParams(window.location.search);
        var guard  = params.get('guard');
        if (guard === 'denied') showToast('You don\'t have access to that tool.', 'error');
        if (guard === 'tier')   showToast('That tool isn\'t available for your account type.', 'error');
        if (guard === 'error')  showToast('Access check failed. Try again.', 'error');
        if (guard) window.history.replaceState(null, '', '/tools/portal/');
        if (STATE.perms.isAdmin) renderAdminPanel();
      })
      .catch(function(err) {
        console.error('[NL Portal] Init error:', err);
        document.getElementById('authChecking').style.display = 'none';
        document.getElementById('pageWrap').style.display     = 'block';
        showToast('Failed to load portal data. Try refreshing.', 'error');
      });
    }

    function loadAdminData() {
      return Promise.all([
        db.ref('users').once('value').then(function(s)        { STATE.allUsers     = s.val() || {}; }),
        db.ref('requests').once('value').then(function(s)     { STATE.requests     = s.val() || {}; }),
        db.ref('tool-requests').once('value').then(function(s){ STATE.toolRequests = s.val() || {}; }),
        db.ref('audit').once('value').then(function(s)        { STATE.auditLog     = s.val() || {}; })
      ]);
    }

    // ════════════════════════════════════════════════════════════════════════
    // WELCOME CAROUSEL
    // ════════════════════════════════════════════════════════════════════════

    function renderWelcomeCard() {
      var card = document.getElementById('welcomeCard');
      if (!STATE.welcomeKeys.length) { card.style.display = 'none'; return; }
      card.style.display = 'block';
      renderWelcomeSlide();
    }

    function renderWelcomeSlide() {
      var keys    = STATE.welcomeKeys;
      var idx     = STATE.welcomeIndex;
      var msg     = STATE.welcomeMessages[keys[idx]] || {};
      var counter = document.getElementById('welcomeCounter');
      var content = document.getElementById('welcomeContent');
      var prev    = document.getElementById('welcomePrev');
      var next    = document.getElementById('welcomeNext');

      counter.textContent  = (idx + 1) + ' of ' + keys.length;
      content.innerHTML    = msg.content || '';
      prev.disabled        = idx === 0;
      next.disabled        = idx === keys.length - 1;
    }

    function welcomeNav(dir) {
      var newIdx = STATE.welcomeIndex + dir;
      if (newIdx < 0 || newIdx >= STATE.welcomeKeys.length) return;
      STATE.welcomeIndex = newIdx;
      renderWelcomeSlide();
    }

    function toggleWelcome() {
      STATE.welcomeCollapsed = !STATE.welcomeCollapsed;
      var body    = document.getElementById('welcomeBody');
      var head    = document.getElementById('welcomeCardHead');
      var chevron = document.getElementById('welcomeChevron');
      body.classList.toggle('collapsed', STATE.welcomeCollapsed);
      head.classList.toggle('collapsed', STATE.welcomeCollapsed);
      chevron.textContent = STATE.welcomeCollapsed ? '▶' : '▼';
    }

    // ════════════════════════════════════════════════════════════════════════
    // TILES
    // ════════════════════════════════════════════════════════════════════════

    function renderTiles() {
      var grid     = document.getElementById('tilesGrid');
      // For staff/admin/superadmin the tier is 'staff'; for club it is 'club'
      var userTier = STATE.role === 'club' ? 'club' : 'staff';

      var universal = Object.keys(STATE.toolsCat).filter(function(k) {
        return STATE.toolsCat[k].visibleToAll === true;
      });

      var granted = Object.keys(STATE.userTools).filter(function(k) {
        return STATE.userTools[k] === true
          && STATE.toolsCat[k]
          && universal.indexOf(k) === -1;
      });

      var activeTiles = universal.concat(granted);

      grid.innerHTML = activeTiles.length
        ? activeTiles.map(buildActiveTile).join('')
        : '<div class="no-tools"><strong>No tools yet</strong>You haven\'t been granted access to any tools.</div>';

      // ── Available: only show tools matching the user's own tier ──
      // Superadmins are staff-tier. Club tools never appear in available for
      // staff/admin/superadmin — they are a separate pool entirely.
      var available = Object.keys(STATE.toolsCat).filter(function(k) {
        var t = STATE.toolsCat[k];
        if (t.visibleToAll) return false;
        if (STATE.userTools[k] === true) return false;
        if (universal.indexOf(k) !== -1) return false;
        // Only show tools matching the user's own tier
        return t.tier === userTier;
      });

      renderAvailableTiles(available);
    }

    function buildActiveTile(k) {
      var t = STATE.toolsCat[k];
      if (!t) return '';
      var hasChildren   = t.children && t.children.length;
      var isPlaceholder = t.placeholder === true;
      var url           = t.url || '#';
      var tag           = (url === '#' || isPlaceholder) ? 'div' : 'a';
      var href          = tag === 'a' ? ' href="' + esc(url) + '"' : '';
      var cursor        = isPlaceholder ? ' style="cursor:default;"' : '';

      var childrenHtml = '';
      if (hasChildren) {
        childrenHtml = '<div class="tile__children tile__children-collapsed" id="children-' + esc(k) + '">'
          + t.children.map(function(c) {
              var cUrl = c.url || '#'; var cTag = cUrl === '#' ? 'span' : 'a';
              return '<' + cTag + (cTag==='a'?' href="'+esc(cUrl)+'"':'') + ' class="tile__child">' + esc(c.label) + '</' + cTag + '>';
            }).join('')
          + '</div>'
          + '<button class="tile__expand-btn" onclick="toggleChildren(\'' + escJ(k) + '\',event)">Show tools ▾</button>';
      }

      return '<' + tag + href + ' class="tile"' + cursor + '>'
        + '<div class="tile__icon">'  + esc(t.icon || '🔧') + '</div>'
        + '<div class="tile__label">' + esc(t.label) + '</div>'
        + '<div class="tile__desc">'  + esc(t.description || '') + '</div>'
        + childrenHtml
        + (isPlaceholder ? '<div class="tile__placeholder">Coming soon</div>'
            : (!hasChildren ? '<div class="tile__arrow">Open →</div>' : ''))
        + '</' + tag + '>';
    }

    function toggleChildren(key, e) {
      e.preventDefault(); e.stopPropagation();
      var el = document.getElementById('children-' + key);
      if (!el) return;
      var isOpen = !el.classList.contains('tile__children-collapsed');
      el.classList.toggle('tile__children-collapsed', isOpen);
      e.target.textContent = isOpen ? 'Show tools ▾' : 'Hide tools ▴';
    }

    function renderAvailableTiles(keys) {
      var section = document.getElementById('availableSection');
      var countEl = document.getElementById('availableCount');
      if (!keys.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      countEl.textContent   = keys.length;
      section.innerHTML = '<div class="available-toggle" id="availableToggle" onclick="toggleAvailable()">'
        + '<span class="available-toggle__label">More tools available</span>'
        + '<span class="available-toggle__count" id="availableCount">' + keys.length + '</span>'
        + '<span class="available-toggle__chevron">▼</span>'
        + '</div>'
        + '<div class="available-tiles" id="availableTiles">'
        + keys.map(function(k) {
            var t    = STATE.toolsCat[k];
            var dept = t.department || '';
            return '<div class="tile--available" onclick="openToolRequest(\'' + escJ(k) + '\')">'
              + '<div class="tile__icon">' + esc(t.icon || '🔧') + '</div>'
              + '<div class="tile__label">' + esc(t.label) + '</div>'
              + (dept ? '<div><span class="tile__dept">' + esc(dept) + '</span></div>' : '')
              + '<div class="tile__req">Request access →</div>'
              + '</div>';
          }).join('')
        + '</div>';
    }

    function toggleAvailable() {
      var toggle = document.getElementById('availableToggle');
      var tiles  = document.getElementById('availableTiles');
      if (toggle) toggle.classList.toggle('open');
      if (tiles)  tiles.classList.toggle('open');
    }

    // ── Tool request modal ────────────────────────────────────────────────────
    function openToolRequest(toolKey) {
      var t = STATE.toolsCat[toolKey]; if (!t) return;
      STATE.pendingToolKey = toolKey;
      document.getElementById('modalToolLabel').textContent  = t.label;
      document.getElementById('modalToolDesc').textContent   = t.description || '';
      document.getElementById('modalRequestBtn').disabled    = false;
      document.getElementById('modalRequestBtn').textContent = 'Request access';
      document.getElementById('toolRequestModal').classList.add('open');
    }

    function submitToolRequest() {
      var toolKey = STATE.pendingToolKey; if (!toolKey) return;
      var t   = STATE.toolsCat[toolKey] || {};
      var btn = document.getElementById('modalRequestBtn');
      btn.disabled = true; btn.textContent = 'Sending…';

      db.ref('tool-requests/treq_' + Date.now()).set({
        uid: STATE.user.uid, name: STATE.user.displayName || '',
        email: STATE.user.email, toolKey: toolKey, toolLabel: t.label || toolKey,
        status: 'pending', createdAt: new Date().toISOString()
      })
      .then(function() { closeModal('toolRequestModal'); showToast('Request submitted. An administrator will review it.', 'success'); })
      .catch(function() { btn.disabled = false; btn.textContent = 'Request access'; showToast('Failed. Try again.', 'error'); });
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
      if (id === 'toolRequestModal') STATE.pendingToolKey = null;
    }

    // ════════════════════════════════════════════════════════════════════════
    // ADMIN PANEL
    // ════════════════════════════════════════════════════════════════════════

    function renderAdminPanel() {
      var signupPending  = Object.keys(STATE.requests).filter(function(k)     { return STATE.requests[k].status === 'pending'; }).length;
      var toolReqPending = Object.keys(STATE.toolRequests).filter(function(k) { return STATE.toolRequests[k].status === 'pending'; }).length;
      var totalPending   = signupPending + toolReqPending;

      document.getElementById('adminSection').innerHTML =
        '<div class="section-head" style="margin-top:0;">Administration</div>'
        + '<div class="admin-panel">'
        + '<div class="admin-panel__head"><h2>Admin Panel</h2>'
        +   '<span class="badge badge--' + esc(STATE.role) + '">' + esc(STATE.role) + '</span>'
        + '</div>'
        + '<div class="admin-tabs">'
        +   '<button class="admin-tab active" onclick="switchTab(\'requests\',this)">Requests'
        +     (totalPending ? '<span class="tab-count">' + totalPending + '</span>' : '')
        +   '</button>'
        +   '<button class="admin-tab" onclick="switchTab(\'users\',this)">Users</button>'
        +   '<button class="admin-tab" onclick="switchTab(\'invite\',this)">Invite</button>'
        +   '<button class="admin-tab" onclick="switchTab(\'welcome\',this)">Welcome messages</button>'
        +   '<button class="admin-tab" onclick="switchTab(\'audit\',this)">Audit log</button>'
        + '</div>'
        + '<div class="admin-tab-content active" id="tab-requests">'  + buildRequestsTab()    + '</div>'
        + '<div class="admin-tab-content"        id="tab-users">'     + '<div class="table-wrap">' + buildUsersTable() + '</div>' + '</div>'
        + '<div class="admin-tab-content"        id="tab-invite">'    + buildInviteForm()     + '</div>'
        + '<div class="admin-tab-content"        id="tab-welcome">'   + buildWelcomeAdmin()   + '</div>'
        + '<div class="admin-tab-content"        id="tab-audit">'     + buildAuditLog()       + '</div>'
        + '</div>';
    }

    function switchTab(tabId, btn) {
      document.querySelectorAll('.admin-tab').forEach(function(t)        { t.classList.remove('active'); });
      document.querySelectorAll('.admin-tab-content').forEach(function(t){ t.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
    }

    // ── Requests tab ─────────────────────────────────────────────────────────
    function buildRequestsTab() {
      return '<div style="padding:16px 24px;border-bottom:1px solid var(--border);">'
        + '<p style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:12px;">New account requests</p>'
        + buildSignupRequestsTable() + '</div>'
        + '<div style="padding:16px 24px;">'
        + '<p style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:12px;">Tool access requests</p>'
        + buildToolRequestsTable() + '</div>';
    }

    function buildSignupRequestsTable() {
      var keys = Object.keys(STATE.requests);
      if (!keys.length) return '<div class="empty-state">No account requests.</div>';
      keys.sort(function(a,b){ return (STATE.requests[b].createdAt||'').localeCompare(STATE.requests[a].createdAt||''); });
      var rows = keys.map(function(k) {
        var r = STATE.requests[k]; var status = r.status || 'pending';
        var tools = Array.isArray(r.tools) ? r.tools.map(function(t){ return STATE.toolsCat[t] ? STATE.toolsCat[t].label : t; }).join(', ') : '';
        var date  = r.createdAt ? new Date(r.createdAt).toLocaleDateString('en-GB') : '';
        var actions = status === 'pending'
          ? '<div class="req-actions"><button class="btn btn--green" onclick="approveSignupRequest(\'' + escJ(k) + '\')">Approve + invite</button>'
          + '<button class="btn btn--ghost" onclick="declineRequest(\'' + escJ(k) + '\')">Decline</button></div>' : '';
        return '<tr><td><div class="user-email">' + esc(r.name||'') + '</div>'
          + '<div class="user-sub">' + esc(r.email||'') + (r.club?' · '+esc(r.club):'') + '</div>'
          + (tools?'<div class="req-tools">Requesting: '+esc(tools)+'</div>':'')
          + '</td><td>'+esc(date)+'</td><td><span class="badge badge--'+esc(status)+'">'+esc(status)+'</span></td><td>'+actions+'</td></tr>';
      }).join('');
      return '<table class="data-table"><thead><tr><th class="th-user">Applicant</th><th class="th-user">Date</th><th class="th-user">Status</th><th class="th-user"></th></tr></thead><tbody>'+rows+'</tbody></table>';
    }

    function buildToolRequestsTable() {
      var keys = Object.keys(STATE.toolRequests);
      if (!keys.length) return '<div class="empty-state">No tool access requests.</div>';
      keys.sort(function(a,b){ return (STATE.toolRequests[b].createdAt||'').localeCompare(STATE.toolRequests[a].createdAt||''); });
      var rows = keys.map(function(k) {
        var r = STATE.toolRequests[k]; var status = r.status || 'pending';
        var date = r.createdAt ? new Date(r.createdAt).toLocaleDateString('en-GB') : '';
        var actions = status === 'pending'
          ? '<div class="req-actions"><button class="btn btn--green" onclick="approveToolRequest(\''+escJ(k)+'\')">Grant access</button>'
          + '<button class="btn btn--ghost" onclick="declineToolRequest(\''+escJ(k)+'\')">Decline</button></div>' : '';
        return '<tr><td><div class="user-email">'+esc(r.name||r.email||'')+'</div>'
          + '<div class="user-sub">'+esc(r.email||'')+'</div></td>'
          + '<td>'+esc(r.toolLabel||r.toolKey||'')+'</td><td>'+esc(date)+'</td>'
          + '<td><span class="badge badge--'+esc(status)+'">'+esc(status)+'</span></td><td>'+actions+'</td></tr>';
      }).join('');
      return '<table class="data-table"><thead><tr><th class="th-user">User</th><th class="th-user">Tool</th><th class="th-user">Date</th><th class="th-user">Status</th><th class="th-user"></th></tr></thead><tbody>'+rows+'</tbody></table>';
    }

    // ── Users table ───────────────────────────────────────────────────────────
    function buildUsersTable() {
      var uids      = Object.keys(STATE.allUsers);
      var realUsers = uids.filter(function(u){ return !u.startsWith('pending_'); });
      var pending   = uids.filter(function(u){ return  u.startsWith('pending_'); });
      var allRows   = realUsers.concat(pending);
      if (!allRows.length) return '<div class="empty-state">No users yet.</div>';

      var staffTools = Object.keys(STATE.toolsCat).filter(function(k){ return STATE.toolsCat[k].tier==='staff' && !STATE.toolsCat[k].visibleToAll; });
      var clubTools  = Object.keys(STATE.toolsCat).filter(function(k){ return STATE.toolsCat[k].tier==='club'  && !STATE.toolsCat[k].visibleToAll; });

      // Group tools by department for header rows
      function groupByDept(tools) {
        var depts = {};
        tools.forEach(function(k) {
          var dept = STATE.toolsCat[k].department || 'General';
          if (!depts[dept]) depts[dept] = [];
          depts[dept].push(k);
        });
        return depts;
      }
      var staffDepts = groupByDept(staffTools);
      var clubDepts  = groupByDept(clubTools);

      // Build two header rows: dept spanning headers + tool name headers
      function buildDeptHeaders(depts, thClass) {
        return Object.keys(depts).map(function(dept) {
          var count = depts[dept].length;
          return '<th class="th-dept-head" colspan="' + count + '">' + esc(dept) + '</th>';
        }).join('');
      }
      function buildToolHeaders(depts, thClass) {
        var allKeys = [];
        Object.keys(depts).forEach(function(d){ allKeys = allKeys.concat(depts[d]); });
        return allKeys.map(function(k){ return '<th class="' + thClass + '">' + esc(STATE.toolsCat[k].label) + '</th>'; }).join('');
      }

      var staffDeptHeaders = buildDeptHeaders(staffDepts, 'th-staff');
      var clubDeptHeaders  = buildDeptHeaders(clubDepts,  'th-club');
      var staffToolHeaders = buildToolHeaders(staffDepts, 'th-staff');
      var clubToolHeaders  = buildToolHeaders(clubDepts,  'th-club');

      // Ordered tool keys following dept grouping
      var staffOrdered = [];
      Object.keys(staffDepts).forEach(function(d){ staffOrdered = staffOrdered.concat(staffDepts[d]); });
      var clubOrdered = [];
      Object.keys(clubDepts).forEach(function(d){ clubOrdered = clubOrdered.concat(clubDepts[d]); });

      var rows = allRows.map(function(uid) {
        var u           = STATE.allUsers[uid];
        var isPending   = uid.startsWith('pending_');
        var userRole    = u.role || 'staff';
        var isMe        = uid === STATE.user.uid;
        var userTier    = userRole === 'club' ? 'club' : 'staff';
        var isProtected = (userRole === 'admin' || userRole === 'superadmin') && !STATE.perms.isSuperAdmin;
        var viewerIsAdmin = STATE.perms.isAdmin;

        function buildToggle(toolKey) {
          var t        = STATE.toolsCat[toolKey];
          var on       = (u.tools||{})[toolKey] === true;
          var toolTier = t ? t.tier : 'staff';
          var isCross  = toolTier !== userTier && toolTier !== 'all';
          var disabled = isPending || isProtected || (isCross && !STATE.perms.isSuperAdmin);
          var pillCls  = on ? (isCross ? 'warn' : 'on') : 'off';
          var title    = isCross && on ? ' title="⚠ Cross-tier — granted by super admin"' : '';
          return '<td><button class="toggle-pill ' + pillCls + '"'
            + (disabled ? ' disabled' : ' onclick="toggleTool(\'' + escJ(uid) + '\',\'' + escJ(toolKey) + '\',' + on + ',' + isCross + ')"')
            + title + '><span class="dot"></span>' + (on?'On':'Off') + '</button></td>';
        }

        var staffCells = staffOrdered.map(function(k){
          return (viewerIsAdmin || userTier === 'staff') ? buildToggle(k) : '<td></td>';
        }).join('');
        var clubCells = clubOrdered.map(function(k){
          return (viewerIsAdmin || userTier === 'club') ? buildToggle(k) : '<td></td>';
        }).join('');

        var badges = isMe ? ' <span class="badge badge--'+esc(userRole)+'">'+esc(userRole)+' (you)</span>'
                          : ' <span class="badge badge--'+esc(userRole)+'">'+esc(userRole)+'</span>';
        if (isPending) badges += ' <span class="badge badge--pending">Invite sent</span>';

        return '<tr><td><div class="user-email">'+esc(u.email||'')+badges+'</div>'
          + '<div class="user-sub">'+esc(u.name||'')+'</div></td>'
          + staffCells + clubCells + '</tr>';
      }).join('');

      return '<table class="data-table">'
        + '<thead>'
        + '<tr><th class="th-user" rowspan="2">User</th>'
        + (staffDeptHeaders ? '<th class="th-dept-head" colspan="' + staffOrdered.length + '" style="background:var(--navy-faint);color:var(--navy);">Staff</th>' : '')
        + (clubDeptHeaders  ? '<th class="th-dept-head" colspan="' + clubOrdered.length  + '" style="background:var(--amber-faint);color:var(--amber);">Club</th>'  : '')
        + '</tr>'
        + '<tr>'
        + staffDeptHeaders + clubDeptHeaders
        + '</tr>'
        + '<tr>'
        + staffToolHeaders + clubToolHeaders
        + '</tr>'
        + '</thead>'
        + '<tbody>' + rows + '</tbody></table>';
    }

    // ── Invite form ───────────────────────────────────────────────────────────
    function buildInviteForm() {
      var roleOpts = '<option value="staff">Staff</option><option value="club">Club</option><option value="admin">Admin</option>'
        + (STATE.perms.isSuperAdmin ? '<option value="superadmin">Super Admin</option>' : '');
      return '<div class="invite-form">'
        + '<div class="field"><label>Full name</label><input type="text" id="newName" placeholder="Jane Smith"></div>'
        + '<div class="field"><label>Email</label><input type="email" id="newEmail" placeholder="jane@thenationalleague.org.uk"></div>'
        + '<div class="field" style="min-width:120px;max-width:140px;"><label>Role</label><select id="newRole">' + roleOpts + '</select></div>'
        + '<button class="btn btn--navy" id="inviteBtn" onclick="sendInvite()">Send invite</button>'
        + '<div class="form-status" id="inviteStatus"></div>'
        + '</div>';
    }

    // ── Welcome messages admin ────────────────────────────────────────────────
    function buildWelcomeAdmin() {
      var keys = STATE.welcomeKeys;
      var list = keys.length
        ? '<div class="welcome-msg-list">' + keys.map(function(k) {
            var m = STATE.welcomeMessages[k];
            var date = m.createdAt ? new Date(m.createdAt).toLocaleDateString('en-GB') : '';
            return '<div class="welcome-msg-item">'
              + '<div><div class="welcome-msg-item__title">' + esc(m.title||'Untitled') + '</div>'
              +      '<div class="welcome-msg-item__meta">' + esc(date) + (m.author?' · '+esc(m.author):'') + '</div></div>'
              + '<div class="welcome-msg-item__actions">'
              +   '<button class="btn btn--ghost btn--sm" onclick="editWelcomeMessage(\'' + escJ(k) + '\')">Edit</button>'
              +   '<button class="btn btn--danger btn--sm" onclick="deleteWelcomeMessage(\'' + escJ(k) + '\')">Delete</button>'
              + '</div></div>';
          }).join('') + '</div>'
        : '<div class="empty-state">No welcome messages yet. Add one below.</div>';

      return '<div class="welcome-messages-toolbar">'
        + '<button class="btn btn--navy" onclick="newWelcomeMessage()">+ Add message</button>'
        + '</div>' + list;
    }

    function newWelcomeMessage() {
      STATE.editingMsgKey = null;
      document.getElementById('welcomeEditTitle').textContent = 'New message';
      document.getElementById('welcomeMsgTitle').value = '';
      openWelcomeEditor('');
    }

    function editWelcomeMessage(key) {
      STATE.editingMsgKey = key;
      var m = STATE.welcomeMessages[key] || {};
      document.getElementById('welcomeEditTitle').textContent = 'Edit message';
      document.getElementById('welcomeMsgTitle').value = m.title || '';
      openWelcomeEditor(m.content || '');
    }

    function openWelcomeEditor(html) {
      document.getElementById('welcomeEditModal').classList.add('open');
      // Initialise Quill once, re-use after that
      if (!STATE.quill) {
        STATE.quill = new Quill('#quillEditor', {
          theme: 'snow',
          modules: { toolbar: [
            [{ header: [1, 2, false] }],
            ['bold', 'italic', 'underline'],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['link'], ['clean']
          ]}
        });
      }
      STATE.quill.root.innerHTML = html;
    }

    function saveWelcomeMessage() {
      var title   = document.getElementById('welcomeMsgTitle').value.trim();
      var content = STATE.quill ? STATE.quill.root.innerHTML : '';
      var btn     = document.getElementById('welcomeSaveBtn');

      if (!title) { showToast('Please enter a title.', 'error'); return; }

      btn.disabled = true; btn.textContent = 'Saving…';

      var data = {
        title:     title,
        content:   content,
        author:    STATE.user.email,
        createdAt: STATE.editingMsgKey
          ? (STATE.welcomeMessages[STATE.editingMsgKey].createdAt || new Date().toISOString())
          : new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      var ref = STATE.editingMsgKey
        ? db.ref('welcome-messages/' + STATE.editingMsgKey)
        : db.ref('welcome-messages').push();

      ref.set(data)
        .then(function() {
          return db.ref('welcome-messages').once('value');
        })
        .then(function(snap) {
          var rawMsgs = snap.val() || {};
          STATE.welcomeMessages = rawMsgs;
          STATE.welcomeKeys = Object.keys(rawMsgs).sort(function(a,b){
            return (rawMsgs[a].createdAt||'').localeCompare(rawMsgs[b].createdAt||'');
          });
          STATE.welcomeIndex = 0;
          renderWelcomeCard();
          renderAdminPanel();
          closeModal('welcomeEditModal');
          showToast('Message saved.', 'success');
          btn.disabled = false; btn.textContent = 'Save message';
          writeAudit('portal', STATE.editingMsgKey ? 'edited_welcome_message' : 'added_welcome_message', title, STATE.user.email);
        })
        .catch(function() { btn.disabled = false; btn.textContent = 'Save message'; showToast('Failed to save. Try again.', 'error'); });
    }

    function deleteWelcomeMessage(key) {
      if (!confirm('Delete this welcome message?')) return;
      db.ref('welcome-messages/' + key).remove()
        .then(function() {
          delete STATE.welcomeMessages[key];
          STATE.welcomeKeys = STATE.welcomeKeys.filter(function(k){ return k !== key; });
          STATE.welcomeIndex = 0;
          renderWelcomeCard();
          renderAdminPanel();
          showToast('Message deleted.', 'success');
          writeAudit('portal', 'deleted_welcome_message', key, STATE.user.email);
        })
        .catch(function(){ showToast('Failed to delete. Try again.', 'error'); });
    }

    // ── Audit log ─────────────────────────────────────────────────────────────
    function buildAuditLog() {
      var all = [];
      Object.keys(STATE.auditLog).forEach(function(toolKey) {
        Object.keys(STATE.auditLog[toolKey]).forEach(function(k) {
          var e = STATE.auditLog[toolKey][k]; e._toolKey = toolKey; all.push(e);
        });
      });
      if (!all.length) return '<div class="empty-state">No audit entries yet.</div>';
      all.sort(function(a,b){ return (b.at||'').localeCompare(a.at||''); });
      return '<div>' + all.slice(0,100).map(function(e) {
        var label = (STATE.toolsCat[e._toolKey] && STATE.toolsCat[e._toolKey].label) || e._toolKey;
        var date  = e.at ? new Date(e.at).toLocaleString('en-GB') : '';
        return '<div class="audit-entry"><div class="audit-entry__action">'
          + esc(e.action||'') + ' — ' + esc(label) + '</div>'
          + '<div class="audit-entry__meta">' + esc(e.name||e.uid||'')
          + (e.detail?' · '+esc(e.detail):'') + ' · ' + esc(date) + '</div></div>';
      }).join('') + '</div>';
    }

    // ── Approve signup ────────────────────────────────────────────────────────
    function approveSignupRequest(reqKey) {
      var r = STATE.requests[reqKey]; if (!r) return;
      var toolsToGrant = {};
      (Array.isArray(r.tools) ? r.tools : []).forEach(function(k){ toolsToGrant[k] = true; });
      auth.sendSignInLinkToEmail(r.email, { url: 'https://thenationalleague.github.io/tools/index.html', handleCodeInApp: true })
        .then(function() {
          var pKey = 'pending_' + r.email.replace(/\./g,',').replace(/@/g,'_at_');
          var w = {}; w['users/'+pKey] = { name:r.name, email:r.email, role:r.role||'club', pending:true, tools:toolsToGrant };
          w['requests/'+reqKey+'/status'] = 'approved';
          return db.ref().update(w);
        })
        .then(function(){ STATE.requests[reqKey].status='approved'; return db.ref('users').once('value'); })
        .then(function(s){ STATE.allUsers=s.val()||{}; renderAdminPanel(); showToast('Invite sent to '+r.email,'success'); writeAudit('portal','approved_signup',reqKey,r.name+' ('+r.email+')'); })
        .catch(function(e){ showToast('Failed: '+(e.code||e.message),'error'); });
    }

    function declineRequest(reqKey) {
      db.ref('requests/'+reqKey+'/status').set('declined')
        .then(function(){ STATE.requests[reqKey].status='declined'; renderAdminPanel(); showToast('Request declined.','success'); writeAudit('portal','declined_signup',reqKey,STATE.requests[reqKey].email||''); })
        .catch(function(){ showToast('Failed. Try again.','error'); });
    }

    function approveToolRequest(reqKey) {
      var r = STATE.toolRequests[reqKey]; if (!r||!r.uid||!r.toolKey) return;
      var w = {}; w['users/'+r.uid+'/tools/'+r.toolKey]=true; w['tool-requests/'+reqKey+'/status']='approved';
      db.ref().update(w)
        .then(function(){
          STATE.toolRequests[reqKey].status='approved';
          if (STATE.allUsers[r.uid]){ if(!STATE.allUsers[r.uid].tools) STATE.allUsers[r.uid].tools={}; STATE.allUsers[r.uid].tools[r.toolKey]=true; }
          renderAdminPanel(); showToast('Access granted to '+(r.name||r.email),'success');
          writeAudit(r.toolKey,'granted_tool_request',reqKey,r.email+' — '+r.toolLabel);
        })
        .catch(function(){ showToast('Failed. Try again.','error'); });
    }

    function declineToolRequest(reqKey) {
      db.ref('tool-requests/'+reqKey+'/status').set('declined')
        .then(function(){ STATE.toolRequests[reqKey].status='declined'; renderAdminPanel(); showToast('Request declined.','success'); })
        .catch(function(){ showToast('Failed. Try again.','error'); });
    }

    function toggleTool(uid, toolKey, current, isCross) {
      if (isCross && !STATE.perms.isSuperAdmin) return;
      var newVal = !current;
      db.ref('users/'+uid+'/tools/'+toolKey).set(newVal)
        .then(function(){
          if (!STATE.allUsers[uid].tools) STATE.allUsers[uid].tools={};
          STATE.allUsers[uid].tools[toolKey]=newVal;
          document.querySelector('#tab-users .table-wrap').innerHTML = buildUsersTable();
          showToast(newVal?'Access granted':'Access revoked','success');
          writeAudit(toolKey,newVal?'granted_access':'revoked_access',uid,STATE.allUsers[uid].email||uid);
        })
        .catch(function(){ showToast('Failed. Try again.','error'); });
    }

    function sendInvite() {
      var name=document.getElementById('newName').value.trim(), email=document.getElementById('newEmail').value.trim(), role=document.getElementById('newRole').value, btn=document.getElementById('inviteBtn');
      if (!name||!email){ showFormStatus('inviteStatus','Please enter name and email.','error'); return; }
      if (role==='superadmin'&&!STATE.perms.isSuperAdmin){ showFormStatus('inviteStatus','Only super admins can invite super admins.','error'); return; }
      btn.disabled=true; btn.textContent='Sending…';
      auth.sendSignInLinkToEmail(email,{url:'https://thenationalleague.github.io/tools/index.html',handleCodeInApp:true})
        .then(function(){
          var pKey='pending_'+email.replace(/\./g,',').replace(/@/g,'_at_');
          return db.ref('users/'+pKey).set({name:name,email:email,role:role,pending:true,tools:{}});
        })
        .then(function(){ localStorage.setItem('nlToolsInviteEmail',email); return db.ref('users').once('value'); })
        .then(function(s){ STATE.allUsers=s.val()||{}; renderAdminPanel(); showFormStatus('inviteStatus','Invite sent to '+email,'success'); btn.disabled=false; btn.textContent='Send invite'; writeAudit('portal','invited_user',email,name+' as '+role); })
        .catch(function(e){ btn.disabled=false; btn.textContent='Send invite'; showFormStatus('inviteStatus','Failed. ('+(e.code||'unknown')+')','error'); });
    }

    function writeAudit(toolKey,action,ref,detail) {
      db.ref('audit/'+toolKey+'/'+Date.now()).set({ uid:STATE.user.uid, name:STATE.user.email, action:action, ref:String(ref||''), detail:String(detail||''), at:new Date().toISOString() })
        .catch(function(e){ console.warn('[NL Audit]',e.message); });
    }

    function doSignOut() { auth.signOut().then(function(){ window.location.replace('/tools/'); }); }

    function showFormStatus(elId,msg,type){ var el=document.getElementById(elId); if(!el)return; el.textContent=msg; el.className='form-status show '+type; }
    function showToast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+(type||'success')+' show'; setTimeout(function(){ t.classList.remove('show'); },3500); }
  </script>
</body>
</html>
