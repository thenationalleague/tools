<style>
@font-face {
  font-family: "carbona-variable";
  src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),

  font-display: swap;
  font-style: normal;
  font-weight: 200 900;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary:     #9e0000;
  --primary-dim: #7a0000;
  --navy:        #223b7c;
  --navy-light:  #2a4a8c;
  --white:       #ffffff;
  --off-white:   #f4f6f9;
  --text:        #1a2a44;
  --text-muted:  #5a6a82;
  --border:      #dde3ed;
  --red-light:   #fdf0ef;
  --radius:      8px;
  --shadow:      0 2px 16px rgba(10,22,40,0.10);
  --font:        'carbona-variable', 'carbona', sans-serif;
}

html, body {
  height: 100%;
}

body {
  font-family: var(--font);
  font-size: 14px;
  font-variation-settings: 'wght' 400;
  color: var(--text);
  background: var(--off-white);
  min-height: 100vh;
}

/* ── Header ── */
.nl-header {
  background: var(--primary);
  border-bottom: 5px solid var(--navy);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nl-header img {
  height: 38px;
  width: auto;
}

.nl-header__title {
  font-size: 16px;
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--white);
}

.nl-header__title span {
  color: rgba(255,255,255,0.55);
  font-weight: 400;
  font-variation-settings: 'wght' 400;
}

/* ── Page ── */
.page {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 20px 48px;
}

/* ── App Layout ── */
.app {
  display: grid;
  grid-template-columns: minmax(480px, 900px) minmax(340px, 1fr);
  gap: 20px;
  align-items: start;
}

@media (max-width: 980px) {
  .app { grid-template-columns: 1fr; }
}

/* ── Preview ── */
.preview-wrap {
  position: sticky;
  top: 80px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 12px;
  overflow: hidden;
}

.preview-wrap canvas {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 4px;
  background: #000;
}

/* ── Panel ── */
.panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}

/* ── Cards ── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.card__head {
  background: var(--navy);
  padding: 10px 16px;
  border-bottom: 3px solid var(--primary);
}

.card__head h2 {
  font-size: 10px;
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--white);
}

.card__body {
  padding: 14px 16px;
}

/* ── Controls ── */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.controls select,
.controls input[type="date"] {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  font: inherit;
  font-variation-settings: 'wght' 400;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s;
  outline: none;
}

.controls select:focus,
.controls input[type="date"]:focus {
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(34,59,124,0.08);
}

.controls label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
}

.controls label input[type="checkbox"] {
  accent-color: var(--navy);
  width: 14px;
  height: 14px;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: var(--radius);
  font: inherit;
  font-size: 11px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn--primary {
  background: var(--primary);
  color: var(--white);
}
.btn--primary:hover { background: var(--primary-dim); }

.btn--navy {
  background: var(--navy);
  color: var(--white);
}
.btn--navy:hover { background: var(--navy-light); }

.btn--ghost {
  background: var(--white);
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.btn--ghost:hover { border-color: var(--navy); color: var(--navy); }

.btn--danger {
  background: var(--white);
  color: var(--primary);
  border: 1px solid var(--border);
}
.btn--danger:hover { background: var(--red-light); border-color: var(--primary); }

/* ── Lineup grid ── */
.lineup {
  display: grid;
  grid-template-columns: 52px minmax(160px, 220px) minmax(130px, 1fr) minmax(200px, 2fr);
  gap: 5px 8px;
  align-items: center;
}

.lineup .pos {
  font-size: 11px;
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  text-align: center;
  background: var(--off-white);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 4px;
}

.lineup select,
.lineup input {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font: inherit;
  font-variation-settings: 'wght' 400;
  font-size: 13px;
  color: var(--text);
  background: var(--white);
  transition: border-color 0.15s;
  outline: none;
}

.lineup select:focus,
.lineup input:focus {
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(34,59,124,0.08);
}

.lineup input.perf {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-muted);
  font-size: 12px;
}

@media (max-width: 720px) {
  .lineup { grid-template-columns: 48px 1fr; }
}

/* ── Textarea sections ── */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-size: 10px;
  font-weight: 800;
  font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}

textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font: inherit;
  font-variation-settings: 'wght' 400;
  font-size: 13px;
  color: var(--text);
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}

textarea:focus {
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(34,59,124,0.08);
}

/* ── Status bar ── */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: var(--off-white);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  font-variation-settings: 'wght' 600;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 10px 0;
}
</style>
</head>

    "ALD","ALT","BHW","BOS","BRK","BRA","CAR","EAS","HAL","FGR","GAT","HAR","MOR","ROC","SCU","SOL","SOU","SUT","TAM","TRU","WEA","WOK","YEO","YOR",
    "FYL","TEL","ALF","BED","BUX","CHE","CHO","CUR","DAR","HER","KID","KLT","LEA","MAC","MAR","MER","OXC","PBS","RAD","SCA","SSH","SPT","SPE","WRK",
    "TOT","BAT","CHC","CHU","CHI","DAG","DOR","DOV","EAB","EBB","ENF","FAB","HRB","HHT","HOR","HRS","MHU","MSU","SAL","SLO","TON","TOR","WSM","WOR"
  ];

  const TEAMS = TEAM_NAMES.map((name) => ({ name }));

  /* ================= ELEMENTS ================= */

  const canvas          = document.getElementById("preview");
  const ctx             = canvas.getContext("2d");
  const formationSel    = document.getElementById("formation");
  const divisionSel     = document.getElementById("division");
  const dateEl          = document.getElementById("date");
  const manualMoveEl    = document.getElementById("manualMove");
  const zoomResetBtn    = document.getElementById("zoomReset");
  const resetPositionsBtn = document.getElementById("resetPositions");
  const downloadBtn     = document.getElementById("download");
  const lineupEl        = document.getElementById("lineup");
  const scoresEl        = document.getElementById("scores");
  const exportOutEl     = document.getElementById("exportOut");
  const excelOutEl      = document.getElementById("excelOut");
  const copyExportBtn   = document.getElementById("copyExport");
  const copyExcelBtn    = document.getElementById("copyExcel");
  const resetAllBtn     = document.getElementById("resetAll");
  const statusEl        = document.getElementById("status");
  const fontStatusEl    = document.getElementById("fontStatus");

  /* ================= STATE ================= */

  const stateByPos = {};
  const offsetsByFormation = {};
  let lineupTabOrder = [];
  let lineupTabIndexMap = new Map();
  let viewScale = 1;
  let viewPanX = 0;
  let viewPanY = 0;
  let isDragging = false;
  let dragMode = "pan";
  let dragStart = {x:0,y:0};
  let dragStartPan = {x:0,y:0};
  let dragPosKey = null;
  let dragStartOffset = {dx:0,dy:0};
  let lastPinchDist = 0;
  const imgCache = new Map();

  /* ================= HELPERS ================= */

  function setStatus(msg){
    statusEl.textContent = msg;
    window.clearTimeout(setStatus._t);
    setStatus._t = window.setTimeout(()=> statusEl.textContent = "Ready", 900);
  }

  function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }
  function pad2(n){ return String(n).padStart(2,"0"); }

  function formatDMMMyy(dateStr){
    if(!dateStr) return "";
    const [y,m,d] = dateStr.split("-").map(Number);
    if(!y || !m || !d) return "";
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${d}${months[m-1] || ""}${String(y).slice(-2)}`;
  }

  function formatDDMMYYYY(dateStr){
    if(!dateStr) return "";
    const [y,m,d] = dateStr.split("-").map(Number);
    if(!y || !m || !d) return "";
    return `${String(d).padStart(2,"0")}/${String(m).padStart(2,"0")}/${y}`;
  }

  function getTeamShort(teamName){
    const idx = TEAM_NAMES.indexOf(teamName);
    return (idx >= 0 && idx < TEAM_SHORTNAMES.length) ? TEAM_SHORTNAMES[idx] : "";
  }

  function buildFilename(){
    const div = divisionSel.value || "National";
    const d = formatDMMMyy(dateEl.value) || "";
    return `TOTW ${div}${d ? " " + d : ""}.png`;
  }

  function getTeamCrestUrl(teamName){
    const chosen = TEAM_NAMES.includes(teamName) ? teamName : (TEAMS[0] ? TEAMS[0].name : "");
    return chosen ? crestUrlForTeam(chosen) : "";
  }

  function buildTeamSelect(current){
    const s = document.createElement("select");
    for(const t of TEAMS){
      const o = document.createElement("option");
      o.value = t.name;
      o.textContent = t.name;
      s.appendChild(o);
    }
    if(current) s.value = current;
    return s;
  }

  function getFormationPositions(formation){ return FORMATIONS[formation] || []; }

  function getOffset(formation, posKey){
    if(!offsetsByFormation[formation]) offsetsByFormation[formation] = {};
    return offsetsByFormation[formation][posKey] || {dx:0,dy:0};
  }

  function setOffset(formation, posKey, dx, dy){
    if(!offsetsByFormation[formation]) offsetsByFormation[formation] = {};
    offsetsByFormation[formation][posKey] = {dx,dy};
  }

  function resetOffsetsForFormation(formation){ offsetsByFormation[formation] = {}; }

  function screenToCanvas(e){
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x: cx * (canvas.width / rect.width), y: cy * (canvas.height / rect.height) };
  }

  function canvasToWorld(pt){ return { x: (pt.x - viewPanX) / viewScale, y: (pt.y - viewPanY) / viewScale }; }
  function worldToCanvas(pt){ return { x: pt.x * viewScale + viewPanX, y: pt.y * viewScale + viewPanY }; }

  function pinchDistance(t0,t1){
    return Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
  }

  function loadImage(url){
    if(imgCache.has(url)) return imgCache.get(url);
    const p = new Promise((resolve,reject)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = ()=> resolve(img);
      img.onerror = ()=> reject(new Error("Failed to load: " + url));
      img.src = url;
    });
    imgCache.set(url, p);
    return p;
  }

  async function ensureNameFontLoaded(){
    try{
      if(document.fonts && document.fonts.load){
        const specs = NAME_FONT_CANDIDATES.map(f => `${NAME_FONT_WEIGHT} ${NAME_FONT_SIZE}px "${f}"`);
        await Promise.all(specs.map(spec => document.fonts.load(spec).catch(()=>[])));
        if(document.fonts.ready) await document.fonts.ready;
      }
      let picked = "";
      for(const fam of NAME_FONT_CANDIDATES){
        const ok = (document.fonts && document.fonts.check)
          ? document.fonts.check(`${NAME_FONT_WEIGHT} ${NAME_FONT_SIZE}px "${fam}"`, "DINWARMUP")
          : true;
        const stack = `"${fam}",${NAME_FONT_FALLBACK_STACK}`;
        if(ok && isFontActiveForCanvas(stack)){ picked = fam; break; }
      }
      nameFontFamily = picked;
      applyWarmupFont();
      await new Promise(r => requestAnimationFrame(r));
      await new Promise(r => setTimeout(r, 50));
    }catch{
      nameFontFamily = "";
      applyWarmupFont();
    }
  }

  function drawContainedImage(c, img, centerX, centerY, maxW, maxH){
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if(!iw || !ih) return;
    const s = Math.min(maxW / iw, maxH / ih);
    const dw = iw * s, dh = ih * s;
    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(img, centerX - dw/2, centerY - dh/2, dw, dh);
  }

  function drawName(c, text, centerX, crestCenterY){
    const name = (text || "").trim();
    if(!name) return;
    c.font = `${NAME_FONT_WEIGHT} ${NAME_FONT_SIZE}px ${getNameFontStack()}`;
    c.fillStyle = NAME_COLOR;
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.fillText(name, centerX, crestCenterY + NAME_OFFSET);
  }

  function safeText(s){ return (s || "").replace(/\s+/g," ").trim(); }

  function refreshFontStatus(){
    if(!fontStatusEl) return;
    const active = isFontActiveForCanvas(getNameFontStack());
    fontStatusEl.textContent = "Font: " + (nameFontFamily || "UNKNOWN") + " • " + (active ? "ACTIVE" : "FALLBACK");
  }

  /* ================= RENDER ================= */

  function clampViewport(){
    const scaled = EXPORT_SIZE * viewScale;
    viewPanX = clamp(viewPanX, EXPORT_SIZE - scaled, 0);
    viewPanY = clamp(viewPanY, EXPORT_SIZE - scaled, 0);
  }

  function clampPlayerOffset(formation, posKey, dx, dy){
    const slots = getFormationPositions(formation);
    const base = slots.find(s => s.pos === posKey);
    if(!base) return { dx, dy };
    const half = CREST_MAX / 2;
    return {
      dx: clamp(base.x + dx, half, EXPORT_SIZE - half) - base.x,
      dy: clamp(base.y + dy, half, EXPORT_SIZE - half) - base.y
    };
  }

  let bgImg = null;
  let divBadgeImg = null;

  async function ensureBaseImages(){
    if(!bgImg) bgImg = await loadImage(BG_URL);
    const divUrl = DIV_BADGE[divisionSel.value] || DIV_BADGE.National;
    divBadgeImg = await loadImage(divUrl);
  }

  async function renderTo(c, useViewport){
    await ensureBaseImages();
    c.setTransform(1,0,0,1,0,0);
    c.clearRect(0,0,EXPORT_SIZE,EXPORT_SIZE);
    if(useViewport){
      c.setTransform(viewScale,0,0,viewScale,viewPanX,viewPanY);
    }else{
      c.setTransform(1,0,0,1,0,0);
    }
    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(bgImg, 0, 0, EXPORT_SIZE, EXPORT_SIZE);

    const formation = formationSel.value;
    const slots = getFormationPositions(formation);

    for(const slot of slots){
      const posKey = slot.pos;
      const s = stateByPos[posKey] || {};
      const team = s.team || TEAMS[0].name;
      const crestUrl = getTeamCrestUrl(team);
      let crestImg = null;
      try{ crestImg = await loadImage(crestUrl); }catch{ crestImg = null; }
      const off = getOffset(formation, posKey);
      const x = slot.x + (off.dx || 0);
      const y = slot.y + (off.dy || 0);
      if(crestImg){ drawContainedImage(c, crestImg, x, y, CREST_MAX, CREST_MAX); }
      drawName(c, s.name, x, y);
    }

    if(divBadgeImg){
      const iw = divBadgeImg.naturalWidth || divBadgeImg.width;
      const ih = divBadgeImg.naturalHeight || divBadgeImg.height;
      const dw = iw * DIV_BADGE_POS.scale;
      const dh = ih * DIV_BADGE_POS.scale;
      c.drawImage(divBadgeImg, DIV_BADGE_POS.x - dw/2, DIV_BADGE_POS.y - dh/2, dw, dh);
    }

    refreshFontStatus();
  }

  let outputsQueued = false;
  function scheduleOutputs(){
    if(outputsQueued) return;
    outputsQueued = true;
    window.clearTimeout(scheduleOutputs._t);
    scheduleOutputs._t = window.setTimeout(()=>{
      outputsQueued = false;
      buildExportText({ silent:true });
      buildExcelTSV({ silent:true });
    }, 120);
  }

  let renderQueued = false;
  function scheduleRender(){
    if(renderQueued) return;
    renderQueued = true;
    requestAnimationFrame(async ()=>{
      renderQueued = false;
      try{ await renderTo(ctx, true); }
      catch(e){ console.error(e); setStatus("Render error (check image CORS)"); }
    });
  }

  /* ================= LINEUP UI ================= */

  function rebuildLineup(){
    lineupEl.innerHTML = "";
    const teamEls = [], nameEls = [], perfEls = [];
    const formation = formationSel.value;
    const slots = getFormationPositions(formation);

    for(const slot of slots){
      const posKey = slot.pos;
      const saved = stateByPos[posKey] || { team: TEAMS[0].name, name:"", perf:"" };

      const posCell = document.createElement("div");
      posCell.className = "pos";
      posCell.textContent = posKey;

      const teamSel = buildTeamSelect(saved.team);

      const nameInp = document.createElement("input");
      nameInp.type = "text";
      nameInp.placeholder = "Player name";
      nameInp.value = saved.name || "";

      const perfInp = document.createElement("input");
      perfInp.type = "text";
      perfInp.className = "perf";
      perfInp.placeholder = "Performance details";
      perfInp.value = saved.perf || "";

      teamSel.addEventListener("input", ()=>{
        stateByPos[posKey] = stateByPos[posKey] || {};
        stateByPos[posKey].team = teamSel.value;
        autosave(); scheduleRender(); scheduleOutputs();
      });
      nameInp.addEventListener("input", ()=>{
        stateByPos[posKey] = stateByPos[posKey] || {};
        stateByPos[posKey].name = nameInp.value;
        autosave(); scheduleRender(); scheduleOutputs();
      });
      perfInp.addEventListener("input", ()=>{
        stateByPos[posKey] = stateByPos[posKey] || {};
        stateByPos[posKey].perf = perfInp.value;
        autosave(); scheduleOutputs();
      });

      lineupEl.appendChild(posCell);
      lineupEl.appendChild(teamSel);
      lineupEl.appendChild(nameInp);
      lineupEl.appendChild(perfInp);

      teamEls.push(teamSel);
      nameEls.push(nameInp);
      perfEls.push(perfInp);
    }

    lineupTabOrder = [...teamEls, ...nameEls, ...perfEls];
    lineupTabIndexMap = new Map();
    lineupTabOrder.forEach((el, idx)=> lineupTabIndexMap.set(el, idx));
  }

  /* ================= EXPORT ================= */

  function buildExportText(opts){
    const silent = !!(opts && opts.silent);
    const scores = (scoresEl.value || "").trim();
    const formation = formationSel.value;
    const slots = getFormationPositions(formation);
    const lines = [];
    if(scores) lines.push(scores, "");
    for(const slot of slots){
      const s = stateByPos[slot.pos] || {};
      const line = [slot.pos, safeText(s.team), safeText(s.name), safeText(s.perf)].filter(Boolean).join(" ");
      if(line) lines.push(line);
    }
    exportOutEl.value = lines.join("\n");
    if(!silent) setStatus("Export built");
    autosave();
  }

  async function copyExportText(){
    try{ await navigator.clipboard.writeText(exportOutEl.value || ""); setStatus("Copied"); }
    catch{ setStatus("Clipboard blocked"); }
  }

  function buildExcelTSV(opts){
    const silent = !!(opts && opts.silent);
    const formation = formationSel.value;
    const slots = getFormationPositions(formation);
    const dateOut = formatDDMMYYYY(dateEl.value);
    const rows = [];
    for(const slot of slots){
      const s = stateByPos[slot.pos] || {};
      const player = safeText(s.name);
      if(!player) continue;
      rows.push([dateOut, player, getTeamShort(safeText(s.team)) || ""].join("\t"));
    }
    excelOutEl.value = rows.join("\n");
    autosave();
    if(!silent) setStatus("Excel built");
  }

  async function copyExcelTSV(){
    buildExcelTSV();
    try{ await navigator.clipboard.writeText(excelOutEl.value || ""); setStatus("Copied (Excel)"); }
    catch{ setStatus("Clipboard blocked"); }
  }

  /* ================= DOWNLOAD ================= */

  async function downloadPNG(){
    const out = document.createElement("canvas");
    out.width = EXPORT_SIZE;
    out.height = EXPORT_SIZE;
    const outCtx = out.getContext("2d");
    try{ await renderTo(outCtx, false); }
    catch(e){ console.error(e); setStatus("Export error (check image CORS)"); return; }
    const blob = await new Promise(res => out.toBlob(res, "image/png"));
    if(!blob){ setStatus("Export failed"); return; }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = buildFilename();
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
    setStatus("Downloaded");
  }

  /* ================= STORAGE ================= */

  function getStoredPayload(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return {};
      const d = JSON.parse(raw);
      return (d && typeof d === "object") ? d : {};
    }catch{ return {}; }
  }

  function setStoredPayload(obj){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); }catch{}
  }

  function deepClone(obj){
    try{ return JSON.parse(JSON.stringify(obj)); }catch{ return {}; }
  }

  function getCurrentDivisionSnapshot(){
    return {
      formation: formationSel.value,
      date: dateEl.value,
      scores: scoresEl.value,
      exportOut: exportOutEl.value,
      excelOut: excelOutEl.value,
      stateByPos: deepClone(stateByPos),
      offsetsByFormation: deepClone(offsetsByFormation),
      viewport: { viewScale, viewPanX, viewPanY }
    };
  }

  function applyDivisionSnapshot(snap){
    const s = (snap && typeof snap === "object") ? snap : {};
    if(s.formation && FORMATIONS[s.formation]) formationSel.value = s.formation;
    if(typeof s.date === "string") dateEl.value = s.date;
    if(typeof s.scores === "string") scoresEl.value = s.scores;
    if(typeof s.exportOut === "string") exportOutEl.value = s.exportOut;
    if(typeof s.excelOut === "string") excelOutEl.value = s.excelOut;
    for(const k of Object.keys(stateByPos)) delete stateByPos[k];
    if(s.stateByPos && typeof s.stateByPos === "object"){
      for(const k of Object.keys(s.stateByPos)) stateByPos[k] = s.stateByPos[k];
    }
    for(const f of Object.keys(offsetsByFormation)) delete offsetsByFormation[f];
    if(s.offsetsByFormation && typeof s.offsetsByFormation === "object"){
      for(const f of Object.keys(s.offsetsByFormation)) offsetsByFormation[f] = s.offsetsByFormation[f];
    }
    if(s.viewport && typeof s.viewport === "object"){
      if(typeof s.viewport.viewScale === "number") viewScale = clamp(s.viewport.viewScale, 1.0, 4.0);
      if(typeof s.viewport.viewPanX === "number") viewPanX = s.viewport.viewPanX;
      if(typeof s.viewport.viewPanY === "number") viewPanY = s.viewport.viewPanY;
    }else{
      viewScale = 1; viewPanX = 0; viewPanY = 0;
    }
    clampViewport();
  }

  function saveDivisionSnapshot(div){
    const payload = getStoredPayload();
    payload.v = VERSION;
    payload.lastDivision = div;
    if(!payload.divisions) payload.divisions = {};
    payload.divisions[div] = getCurrentDivisionSnapshot();
    setStoredPayload(payload);
  }

  function loadDivisionSnapshotOrBlank(div){
    const payload = getStoredPayload();
    const snap = payload.divisions && payload.divisions[div];
    applyDivisionSnapshot(snap || {});
  }

  function autosave(){
    const div = divisionSel.value;
    saveDivisionSnapshot(div);
  }

  function autoload(){
    const payload = getStoredPayload();
    const lastDiv = payload.lastDivision || "National";
    if(lastDiv && ["National","North","South"].includes(lastDiv)){
      divisionSel.value = lastDiv;
    }
    loadDivisionSnapshotOrBlank(divisionSel.value);
  }

  /* ================= RESET ================= */

  function resetAll(){
    formationSel.value = "4-3-3";
    divisionSel.value  = "National";
    dateEl.value       = "";
    scoresEl.value     = "";
    exportOutEl.value  = "";
    excelOutEl.value   = "";
    for(const k of Object.keys(stateByPos)) delete stateByPos[k];
    for(const f of Object.keys(offsetsByFormation)) delete offsetsByFormation[f];
    viewScale = 1; viewPanX = 0; viewPanY = 0;
    divBadgeImg = null;
    rebuildLineup();
    autosave();
    scheduleRender();
    scheduleOutputs();
    setStatus("Reset all");
  }

  function resetViewport(){
    viewScale = 1; viewPanX = 0; viewPanY = 0;
    clampViewport(); autosave(); scheduleRender();
  }

  /* ================= DRAG / PAN ================= */

  function hitTestPlayer(worldPt){
    const formation = formationSel.value;
    const slots = getFormationPositions(formation);
    for(let i = slots.length - 1; i >= 0; i--){
      const slot = slots[i];
      const off = getOffset(formation, slot.pos);
      const cx = slot.x + (off.dx||0);
      const cy = slot.y + (off.dy||0);
      const half = CREST_MAX/2 + 6;
      if(worldPt.x >= cx-half && worldPt.x <= cx+half && worldPt.y >= cy-half && worldPt.y <= cy+half){
        return slot.pos;
      }
    }
    return null;
  }

  function onPointerDown(e){
    const pt = screenToCanvas(e);
    const world = canvasToWorld(pt);
    isDragging = true;
    dragStart = { x: world.x, y: world.y };
    dragStartPan = { x: viewPanX, y: viewPanY };
    if(manualMoveEl.checked){
      const hit = hitTestPlayer(world);
      if(hit){
        dragMode = "player"; dragPosKey = hit;
        const off = getOffset(formationSel.value, hit);
        dragStartOffset = { dx: off.dx || 0, dy: off.dy || 0 };
      }else{
        dragMode = "pan"; dragPosKey = null;
      }
    }else{
      dragMode = "pan"; dragPosKey = null;
    }
    e.preventDefault();
  }

  function onPointerMove(e){
    if(!isDragging) return;
    const pt = screenToCanvas(e);
    const world = canvasToWorld(pt);
    const dx = world.x - dragStart.x;
    const dy = world.y - dragStart.y;
    if(dragMode === "pan"){
      viewPanX = dragStartPan.x + dx * viewScale;
      viewPanY = dragStartPan.y + dy * viewScale;
      clampViewport(); autosave(); scheduleRender();
    }else if(dragMode === "player" && dragPosKey){
      const next = clampPlayerOffset(formationSel.value, dragPosKey, dragStartOffset.dx + dx, dragStartOffset.dy + dy);
      setOffset(formationSel.value, dragPosKey, next.dx, next.dy);
      autosave(); scheduleRender();
    }
    e.preventDefault();
  }

  function onPointerUp(){ isDragging = false; dragMode = "pan"; dragPosKey = null; }

  function onWheel(e){
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const cy = (e.clientY - rect.top) * (canvas.height / rect.height);
    const worldBefore = canvasToWorld({x:cx, y:cy});
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    viewScale = clamp(viewScale * factor, 1.0, 4.0);
    const canvasAfter = worldToCanvas(worldBefore);
    viewPanX += (cx - canvasAfter.x);
    viewPanY += (cy - canvasAfter.y);
    clampViewport(); autosave(); scheduleRender();
  }

  function onTouchStart(e){
    if(e.touches && e.touches.length === 2){
      lastPinchDist = pinchDistance(e.touches[0], e.touches[1]);
    }else{ onPointerDown(e); }
  }

  function onTouchMove(e){
    if(e.touches && e.touches.length === 2){
      e.preventDefault();
      const d = pinchDistance(e.touches[0], e.touches[1]);
      if(lastPinchDist){
        const rect = canvas.getBoundingClientRect();
        const midClientX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midClientY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        const cx = (midClientX - rect.left) * (canvas.width / rect.width);
        const cy = (midClientY - rect.top) * (canvas.height / rect.height);
        const worldBefore = canvasToWorld({x:cx, y:cy});
        viewScale = clamp(viewScale * (d / lastPinchDist), 1.0, 4.0);
        const canvasAfter = worldToCanvas(worldBefore);
        viewPanX += (cx - canvasAfter.x);
        viewPanY += (cy - canvasAfter.y);
        clampViewport(); autosave(); scheduleRender();
      }
      lastPinchDist = d;
    }else{ onPointerMove(e); }
  }

  function onTouchEnd(){ lastPinchDist = 0; onPointerUp(); }

  /* ================= INIT ================= */

  function setDefaultDateIfBlank(){
    if(dateEl.value) return;
    const now = new Date();
    dateEl.value = `${now.getFullYear()}-${pad2(now.getMonth()+1)}-${pad2(now.getDate())}`;
  }

  function bindUI(){
    formationSel.addEventListener("change", ()=>{ rebuildLineup(); autosave(); scheduleRender(); scheduleOutputs(); });

    divisionSel.addEventListener("change", async ()=>{
      const prev = divisionSel._prevDivision || "National";
      saveDivisionSnapshot(prev);
      loadDivisionSnapshotOrBlank(divisionSel.value);
      divBadgeImg = null;
      divisionSel._prevDivision = divisionSel.value;
      rebuildLineup(); autosave(); scheduleRender(); scheduleOutputs();
    });

    dateEl.addEventListener("input", ()=>{ autosave(); scheduleOutputs(); });
    scoresEl.addEventListener("input", ()=>{ autosave(); scheduleOutputs(); });
    zoomResetBtn.addEventListener("click", resetViewport);
    resetPositionsBtn.addEventListener("click", ()=>{ resetOffsetsForFormation(formationSel.value); autosave(); scheduleRender(); setStatus("Positions reset"); });
    downloadBtn.addEventListener("click", downloadPNG);
    copyExportBtn.addEventListener("click", copyExportText);
    copyExcelBtn.addEventListener("click", copyExcelTSV);
    resetAllBtn.addEventListener("click", resetAll);

    canvas.addEventListener("wheel", onWheel, {passive:false});
    canvas.addEventListener("mousedown", onPointerDown);
    window.addEventListener("mousemove", onPointerMove);
    window.addEventListener("mouseup", onPointerUp);
    canvas.addEventListener("touchstart", onTouchStart, {passive:false});
    canvas.addEventListener("touchmove", onTouchMove, {passive:false});
    window.addEventListener("touchend", onTouchEnd, {passive:true});

    lineupEl.addEventListener("keydown", (e)=>{
      if(e.key !== "Tab") return;
      const active = document.activeElement;
      if(!lineupTabIndexMap.has(active)) return;
      e.preventDefault();
      const idx = lineupTabIndexMap.get(active);
      const nextIdx = idx + (e.shiftKey ? -1 : 1);
      if(nextIdx < 0 || nextIdx >= lineupTabOrder.length){
        (e.shiftKey ? dateEl : scoresEl).focus();
        return;
      }
      lineupTabOrder[nextIdx].focus();
    });
  }

  async function start(){
    setDefaultDateIfBlank();
    autoload();
    divisionSel._prevDivision = divisionSel.value;
    rebuildLineup();
    bindUI();
    scheduleOutputs();
    try{
      await ensureNameFontLoaded();
      await ensureBaseImages();
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      await new Promise(r => setTimeout(r, 120));
      ctx.save();
      ctx.font = `${NAME_FONT_WEIGHT} ${NAME_FONT_SIZE}px ${getNameFontStack()}`;
      ctx.measureText("DIN-WARMUP");
      ctx.restore();
      refreshFontStatus();
      await renderTo(ctx, true);
      await renderTo(ctx, true);
      setStatus("Loaded");
    }catch(e){
      console.error(e);
      setStatus("Image load error (CORS?)");
    }
  }

  start();

})();
</script>

</body>
</html>
