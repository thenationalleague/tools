<!--
  club-directory / index.html
  v0.5 — Restraint pass: subtle section headers, neutral joined-row styling,
         Role-first consistency fix.

  Changelog:
  v0.5 — - Dense-table section headers: navy uppercase text + short red underline.
           No background fill, no column-spanning bar. Whitespace above each
           section does the separation work. Reads as typography, not UI chrome.
         - Joined rows (Directors / Co-Chairs) no longer tinted or red — same
           visual weight as every other row.
         - Role-first: joined-row names now bold (font-weight: 700) to match
           every other name.
  v0.4 — Removed Clean Cards (club page) and Table (listing).
         Directors/Co-Chairs render as one joined-names entry per section.
         Data model stays identical for every role type.
  v0.3 — Same-section multi-role collapse, Editorial style removed,
         orange main-role dot removed.
  v0.2 — Roles model rewrite: person.roles[] replaces primaryRole + secondaryRoles[].
  v0.1 — Initial static demo, 4 club-page styles, 2 listing styles

  Notes for future work:
  - Replace window.CLUBS inline data with RTDB read
  - Add auth-guard.js wiring once auth is decided
  - Person-level business-card view: use the role with main=true as the headline
  - Role catalogue: sections and role lists should live in RTDB once schema is nailed
-->
<style>
  @font-face {
    font-family: "carbona-variable";
    src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
         url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
    font-display: swap; font-style: normal; font-weight: 200 900; font-stretch: normal;
  }
  :root {
    --primary:     #9e0000;
    --primary-dim: #7a0000;
    --navy:        #223b7c;
    --navy-mid:    #1a2f63;
    --navy-light:  #2a4a8c;
    --red:         #c0392b;
    --red-light:   #fdf0ef;
    --green:       #1e7e34;
    --amber:       #c47600;
    --white:       #ffffff;
    --off-white:   #f4f6f9;
    --text:        #1a2a44;
    --text-muted:  #5a6a82;
    --border:      #dde3ed;
    --radius:      6px;
    --shadow:      0 2px 12px rgba(10,22,40,0.10);
    --font:        'carbona-variable','carbona',sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    font-variation-settings: 'wght' 400;
    color: var(--text);
    background: var(--off-white);
  }
  a { color: var(--navy); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    background: var(--primary);
    color: var(--white);
    padding: 0 20px;
    height: 72px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    border-bottom: 7px solid var(--navy);
    width: 100%;
  }
  .topbar__logo { height: 42px; flex-shrink: 0; }
  .topbar__title-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; line-height: 1; gap: 3px; }
  .topbar__title { font-weight: 900; font-variation-settings: 'wght' 900; font-size: 20px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar__kicker { font-size: 9px; font-weight: 700; font-variation-settings: 'wght' 700; text-transform: uppercase; letter-spacing: 0.18em; color: rgba(255,255,255,0.6); white-space: nowrap; }
  .topbar__btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: var(--white); padding: 7px 14px; border-radius: var(--radius); font-size: 11px; font-weight: 700; font-variation-settings: 'wght' 700; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; font-family: var(--font); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0; }
  .topbar__btn:hover { background: rgba(255,255,255,0.12); }
  @media (max-width: 700px) {
    .topbar { padding: 0 14px; gap: 10px; }
    .topbar__btn-text-portal { display: none; }
    .topbar__title { font-size: 17px; }
  }

  .demo-bar {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    position: sticky; top: 72px; z-index: 50;
  }
  .demo-bar__group { display: flex; gap: 2px; align-items: center; background: var(--off-white); padding: 4px; border-radius: 6px; }
  .demo-bar__label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 800; font-variation-settings: 'wght' 800; color: var(--text-muted); padding: 0 8px 0 4px; }
  .demo-bar__btn { background: none; border: none; padding: 6px 12px; font-family: var(--font); font-size: 12px; font-weight: 600; font-variation-settings: 'wght' 600; color: var(--text); border-radius: 4px; cursor: pointer; transition: all 0.12s; }
  .demo-bar__btn:hover { background: rgba(0,0,0,0.04); }
  .demo-bar__btn[aria-pressed="true"] { background: var(--navy); color: var(--white); }
  .demo-bar__search { flex: 1; min-width: 200px; max-width: 360px; margin-left: auto; font-family: var(--font); font-size: 14px; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; background: var(--white); color: var(--text); }
  .demo-bar__search:focus { outline: none; border-color: var(--navy); }

  .page { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; font-variation-settings: 'wght' 600; color: var(--navy); cursor: pointer; margin-bottom: 16px; padding: 6px 0; }
  .back-link:hover { text-decoration: underline; }
  .scene { display: none; }
  .scene--active { display: block; }

  /* ================================================================
     STYLE 2 — Dense Table
     Sections = navy uppercase text with a short red underline, generous
     whitespace. Joined rows (Directors / Co-Chairs) render like any other
     row — no tint, no colour signalling.
     ================================================================ */
  .s2-club { background: var(--white); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .s2-header { padding: 24px 28px 22px; background: var(--navy); color: var(--white); display: flex; gap: 20px; align-items: flex-start; }
  .s2-crest { width: 56px; height: 56px; flex-shrink: 0; background: var(--white); border-radius: 4px; padding: 4px; }
  .s2-header h2 { margin: 0; font-size: 22px; display: flex; align-items: center; gap: 12px; font-weight: 900; font-variation-settings: 'wght' 900; }
  .s2-div { font-size: 10px; padding: 3px 10px; border-radius: 2px; background: rgba(255,255,255,0.2); font-weight: 700; font-variation-settings: 'wght' 700; letter-spacing: 0.1em; }
  .s2-addr { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 6px; }
  .s2-addr a { color: rgba(255,255,255,0.95); }
  .s2-table { width: 100%; border-collapse: collapse; font-size: 13px; }

  /* Column header strip — kept but made very quiet */
  .s2-table thead th {
    text-align: left; padding: 10px 20px 8px;
    background: transparent;
    font-weight: 700; font-variation-settings: 'wght' 700;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em;
    color: #8592a6;
    border-bottom: 1px solid var(--border);
  }

  /* Regular data rows */
  .s2-table td { padding: 10px 20px; border-bottom: 1px solid #eef1f5; vertical-align: top; }
  .s2-role { font-weight: 600; font-variation-settings: 'wght' 600; color: var(--text); width: 28%; }
  .s2-name { width: 22%; font-weight: 600; font-variation-settings: 'wght' 600; }
  .s2-phone { width: 18%; color: var(--text-muted); font-size: 12px; }
  .s2-email { width: 32%; font-size: 12px; }
  .s2-table tbody tr:not(.s2-sec-row):hover td { background: #fbfcfd; }

  /* Section header row — typographic only. The td has no borders, no fill;
     the inner wrapper carries the navy text and the short red underline. */
  .s2-sec-row td {
    padding: 28px 20px 4px !important;
    border-bottom: none !important;
    background: transparent !important;
  }
  .s2-sec-row:first-child td { padding-top: 16px !important; }
  .s2-sec-hd {
    display: inline-block;
    font-weight: 700;
    font-variation-settings: 'wght' 700;
    font-size: 11px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--primary);
    /* border-bottom acts as the short red underline — only as wide as the text */
  }

  /* Joined rows (Directors/Co-Chairs) — identical to regular rows, no special colour */
  .s2-joined-row td { /* no overrides — use regular row styling */ }

  /* ================================================================
     STYLE 4 — Role-First
     ================================================================ */
  .s4-club { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 28px 32px; }
  .s4-header { display: flex; align-items: center; gap: 20px; margin-bottom: 12px; }
  .s4-crest { width: 56px; height: 56px; flex-shrink: 0; }
  .s4-header h2 { margin: 0; font-size: 26px; font-weight: 900; font-variation-settings: 'wght' 900; letter-spacing: -0.01em; }
  .s4-div { font-size: 10px; padding: 3px 9px; border-radius: 2px; color: var(--white); font-weight: 800; font-variation-settings: 'wght' 800; letter-spacing: 0.12em; }
  .s4-div--national { background: var(--navy); }
  .s4-div--north { background: var(--amber); }
  .s4-div--south { background: var(--green); }
  .s4-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; margin-left: 76px; }
  .s4-meta a { color: var(--navy); }
  .s4-section { margin-top: 28px; }

  /* Same subtle typographic treatment as Dense table */
  .s4-sec-bar {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    font-variation-settings: 'wght' 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--navy);
    padding-bottom: 6px;
    margin-bottom: 14px;
    border-bottom: 2px solid var(--primary);
  }

  .s4-row { display: grid; grid-template-columns: 260px 1fr; gap: 16px; padding: 10px 0; border-bottom: 1px solid #f0f2f5; align-items: start; }
  .s4-row:last-child { border-bottom: none; }
  .s4-role-pill { font-size: 12px; font-weight: 700; font-variation-settings: 'wght' 700; color: var(--navy); background: #eef2f8; padding: 7px 12px; border-radius: 3px; border-left: 3px solid var(--navy); }
  .s4-name { font-weight: 700; font-variation-settings: 'wght' 700; font-size: 14px; }
  .s4-contact { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
  .s4-contact a { color: var(--navy); }
  .s4-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .s4-dir-chip { font-size: 12px; padding: 5px 11px; background: var(--off-white); border: 1px solid var(--border); border-radius: 14px; color: var(--text); }

  /* Joined rows match every other row — same pill, same name weight */
  .s4-joined-names {
    font-size: 14px;
    font-weight: 700;
    font-variation-settings: 'wght' 700;
    line-height: 1.7;
    color: var(--text);
  }

  /* ================================================================
     LISTING 1 — Card Grid
     ================================================================ */
  .l1-division { margin-bottom: 32px; }
  .l1-div-hd { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 800; font-variation-settings: 'wght' 800; padding: 8px 14px; display: inline-flex; align-items: baseline; gap: 10px; color: var(--white); margin: 0 0 14px 0; border-radius: 3px; }
  .l1-div-hd span { font-size: 10px; opacity: 0.75; letter-spacing: 0.1em; font-weight: 600; font-variation-settings: 'wght' 600; }
  .l1-div-hd--national { background: var(--navy); }
  .l1-div-hd--north { background: var(--amber); }
  .l1-div-hd--south { background: var(--green); }
  .l1-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .l1-card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; display: flex; gap: 12px; align-items: flex-start; }
  .l1-card:hover { border-color: var(--navy); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(10,22,40,0.08); }
  .l1-crest { width: 40px; height: 40px; flex-shrink: 0; }
  .l1-card-body { flex: 1; min-width: 0; }
  .l1-card h3 { margin: 0; font-size: 15px; font-weight: 700; font-variation-settings: 'wght' 700; letter-spacing: -0.01em; }
  .l1-addr { font-size: 12px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .l1-key { margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f2f5; }
  .l1-key-role { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); font-weight: 700; font-variation-settings: 'wght' 700; }
  .l1-key-name { font-size: 13px; font-weight: 600; font-variation-settings: 'wght' 600; margin-top: 1px; }
  .l1-stats { margin-top: 6px; font-size: 11px; color: var(--text-muted); }

  @media (max-width: 700px) {
    .page { padding: 16px 12px 60px; }
    .s2-club, .s4-club { padding: 20px 18px; }
    .s4-row { grid-template-columns: 1fr; gap: 4px; }
    .s4-role-pill { justify-self: start; }
    .s4-meta { margin-left: 0; }
    .s4-header, .s2-header { flex-direction: column; gap: 10px; }
    .s2-table { font-size: 12px; }
    .s2-table td { padding: 8px 10px; }
    .l1-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 500px) {
    .s2-phone { display: none; }
  }
</style>
</head>

var SECTION_ORDER = ["Leadership","Directors","Executive","Club secretary","Finance","Commercial",
                     "Media & marketing","Matchday & safety","Medical","Community",
                     "Safeguarding & welfare","Liaison officers"];

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
  });
}
function crestUrl(name) {
  return 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/' +
    encodeURIComponent(name) + '.png';
}
function fallbackCrest() {
  return 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png';
}

/* Expand a club's people[] into a list of (person, roleTitles[]) groups per section.
   If a person has >1 role in the same section they collapse into ONE entry with
   roleTitles joined by " / " at render time. */
function peopleBySection(club) {
  var out = {};
  for (var i = 0; i < club.people.length; i++) {
    var p = club.people[i];
    // bucket this person's roles by section
    var bucket = {};
    for (var j = 0; j < p.roles.length; j++) {
      var r = p.roles[j];
      if (!bucket[r.section]) bucket[r.section] = [];
      bucket[r.section].push(r.title);
    }
    for (var section in bucket) {
      if (!out[section]) out[section] = [];
      out[section].push({ person: p, roleTitles: bucket[section] });
    }
  }
  return out;
}

function joinRoles(titles) {
  return titles.join(' / ');
}

function townFromAddr(addr) {
  if (!addr) return '';
  var parts = addr.split(',').map(function(s){ return s.trim(); });
  if (parts.length >= 2) return parts[parts.length - 2];
  return parts[0] || '';
}

function mainRole(p) {
  for (var i = 0; i < p.roles.length; i++) if (p.roles[i].main) return p.roles[i];
  return p.roles[0];
}

function contactBits(p) {
  var bits = [];
  if (p.phone) bits.push('<span>' + esc(p.phone) + '</span>');
  if (p.email) bits.push('<a href="mailto:' + esc(p.email) + '">' + esc(p.email) + '</a>');
  return bits;
}

/* ================= STYLE 2 — Dense table =================
   Section headers: full-width navy bar with red section label + pluralised noun.
   Directors and Co-Chairs render as a single joined-names row.
   Other roles render one row per person. */

// Roles that are "names-joined" — one row per section, title pluralised, names comma-separated
var NAMES_JOINED_ROLES = { 'Director': 'Directors', 'Co-Chair': 'Co-Chairs' };

function renderClubStyle2(club) {
  var bySec = peopleBySection(club);
  var rows = '';
  SECTION_ORDER.forEach(function(s) {
    if (!bySec[s]) return;
    var entries = bySec[s];

    // Full-width section header row (inner span carries the underline so it only
    // underlines the text, not the whole table width)
    rows += '<tr class="s2-sec-row"><td colspan="4"><span class="s2-sec-hd">' + esc(s) + '</span></td></tr>';

    // Split entries into (a) names-joined and (b) regular
    // For each names-joined role title, collapse matching entries into one row.
    // Everyone else renders as a normal row.
    var joinedByTitle = {};   // e.g. "Director" -> [person, person, ...]
    var regularEntries = [];

    entries.forEach(function(e) {
      // Find the first (and likely only) role in this entry's roleTitles that's a joined-role type
      var joinedTitle = null;
      for (var i = 0; i < e.roleTitles.length; i++) {
        if (NAMES_JOINED_ROLES[e.roleTitles[i]]) {
          joinedTitle = e.roleTitles[i];
          break;
        }
      }
      // If this entry's ONLY role in this section is a names-joined type, collapse it
      if (joinedTitle && e.roleTitles.length === 1) {
        if (!joinedByTitle[joinedTitle]) joinedByTitle[joinedTitle] = [];
        joinedByTitle[joinedTitle].push(e.person);
      } else {
        regularEntries.push(e);
      }
    });

    // Render joined rows first (Directors/Co-Chairs sit at the top of their section)
    Object.keys(joinedByTitle).forEach(function(title) {
      var people = joinedByTitle[title];
      var names = people.map(function(p) { return esc(p.name); }).join(', ');
      var pluralTitle = NAMES_JOINED_ROLES[title];
      rows += '<tr class="s2-joined-row">' +
        '<td class="s2-role">' + esc(pluralTitle) + '</td>' +
        '<td class="s2-name" colspan="3">' + names + '</td>' +
      '</tr>';
    });

    // Render individual rows
    regularEntries.forEach(function(e) {
      var p = e.person;
      var roleLabel = joinRoles(e.roleTitles);
      var email = p.email ? '<a href="mailto:' + esc(p.email) + '">' + esc(p.email) + '</a>' : '';
      rows += '<tr>' +
        '<td class="s2-role">' + esc(roleLabel) + '</td>' +
        '<td class="s2-name">' + esc(p.name) + '</td>' +
        '<td class="s2-phone">' + esc(p.phone||'') + '</td>' +
        '<td class="s2-email">' + email + '</td>' +
      '</tr>';
    });
  });
  return '<div class="s2-club">' +
    '<div class="s2-header">' +
      '<img class="s2-crest" src="' + crestUrl(club.name) + '" alt="" onerror="this.onerror=null;this.src=\'' + fallbackCrest() + '\'">' +
      '<div>' +
        '<h2>' + esc(club.name) + '<span class="s2-div">' + esc(club.division) + '</span></h2>' +
        '<div class="s2-addr">' + esc(club.address_raw) +
          (club.phone ? ' · ☎ ' + esc(club.phone) : '') +
          (club.email ? ' · <a href="mailto:' + esc(club.email) + '">' + esc(club.email) + '</a>' : '') +
          (club.website ? ' · <a href="https://' + esc(club.website) + '">' + esc(club.website) + '</a>' : '') +
        '</div>' +
      '</div>' +
    '</div>' +
    '<table class="s2-table">' +
      '<thead><tr><th>Role</th><th>Name</th><th>Phone</th><th>Email</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>' +
  '</div>';
}

/* ================= STYLE 4 — Role-first =================
   Same consistency rule: Directors / Co-Chairs collapse into one row each. */
function renderClubStyle4(club) {
  var bySec = peopleBySection(club);
  var sections = '';
  SECTION_ORDER.forEach(function(s) {
    if (!bySec[s]) return;
    var entries = bySec[s];

    // Collect names-joined roles and regular entries separately
    var joinedByTitle = {};
    var regularEntries = [];
    entries.forEach(function(e) {
      var joinedTitle = null;
      for (var i = 0; i < e.roleTitles.length; i++) {
        if (NAMES_JOINED_ROLES[e.roleTitles[i]]) { joinedTitle = e.roleTitles[i]; break; }
      }
      if (joinedTitle && e.roleTitles.length === 1) {
        if (!joinedByTitle[joinedTitle]) joinedByTitle[joinedTitle] = [];
        joinedByTitle[joinedTitle].push(e.person);
      } else {
        regularEntries.push(e);
      }
    });

    var items = '';

    // Joined rows first
    Object.keys(joinedByTitle).forEach(function(title) {
      var people = joinedByTitle[title];
      var pluralTitle = NAMES_JOINED_ROLES[title];
      var names = people.map(function(p) { return esc(p.name); }).join(', ');
      items += '<div class="s4-row s4-row--joined">' +
        '<div class="s4-role-pill">' + esc(pluralTitle) + '</div>' +
        '<div class="s4-joined-names">' + names + '</div>' +
      '</div>';
    });

    // Regular rows
    regularEntries.forEach(function(e) {
      var p = e.person;
      var roleLabel = joinRoles(e.roleTitles);
      var bits = [];
      if (p.phone) bits.push('<span>📞 ' + esc(p.phone) + '</span>');
      if (p.email) bits.push('<a href="mailto:' + esc(p.email) + '">✉ ' + esc(p.email) + '</a>');
      items += '<div class="s4-row">' +
        '<div class="s4-role-pill">' + esc(roleLabel) + '</div>' +
        '<div>' +
          '<div class="s4-name">' + esc(p.name) + '</div>' +
          (bits.length ? '<div class="s4-contact">' + bits.join(' ') + '</div>' : '') +
        '</div>' +
      '</div>';
    });

    sections += '<div class="s4-section">' +
      '<div class="s4-sec-bar">' + esc(s) + '</div>' +
      items +
    '</div>';
  });
  return '<div class="s4-club">' +
    '<div class="s4-header">' +
      '<img class="s4-crest" src="' + crestUrl(club.name) + '" alt="" onerror="this.onerror=null;this.src=\'' + fallbackCrest() + '\'">' +
      '<h2>' + esc(club.name) + '</h2>' +
      '<div class="s4-div s4-div--' + club.division.toLowerCase() + '">' + esc(club.division) + '</div>' +
    '</div>' +
    '<div class="s4-meta">' + esc(club.address_raw) + '</div>' +
    '<div class="s4-meta">' +
      (club.phone ? '☎ ' + esc(club.phone) : '') +
      (club.email ? ' · <a href="mailto:' + esc(club.email) + '">' + esc(club.email) + '</a>' : '') +
      (club.website ? ' · <a href="https://' + esc(club.website) + '">' + esc(club.website) + '</a>' : '') +
    '</div>' +
    sections +
  '</div>';
}

var CLUB_STYLE_RENDERERS = {
  '2': renderClubStyle2, '4': renderClubStyle4
};

/* ================= LISTING ================= */
function firstPersonWithMainRole(club, roleTitle) {
  for (var i = 0; i < club.people.length; i++) {
    var p = club.people[i];
    for (var j = 0; j < p.roles.length; j++) {
      if (p.roles[j].main && p.roles[j].title === roleTitle) return p;
    }
  }
  return null;
}
function firstPersonInSection(club, section) {
  for (var i = 0; i < club.people.length; i++) {
    var p = club.people[i];
    for (var j = 0; j < p.roles.length; j++) {
      if (p.roles[j].section === section) return p;
    }
  }
  return null;
}

        '<div class="l1-card-body">' +
          '<h3>' + esc(c.name) + '</h3>' +
          '<div class="l1-addr">' + esc(townFromAddr(c.address_raw)) + '</div>' +
          keyHtml +
          '<div class="l1-stats">' + c.people.length + ' people</div>' +
        '</div>' +
      '</div>';
    }).join('');
    html += '<div class="l1-division">' +
      '<div class="l1-div-hd l1-div-hd--' + d.toLowerCase() + '">' + esc(d) + ' <span>' + byDiv[d].length + ' clubs</span></div>' +
      '<div class="l1-grid">' + cards + '</div>' +
    '</div>';
  });
  return html;
}

/* ================= STATE ================= */
var state = { clubStyle: '2', searchQuery: '', viewing: null };

function filteredClubs() {
  var q = state.searchQuery.trim().toLowerCase();
  if (!q) return window.CLUBS;
  return window.CLUBS.filter(function(c) {
    if (c.name.toLowerCase().indexOf(q) !== -1) return true;
    if ((c.address_raw||'').toLowerCase().indexOf(q) !== -1) return true;
    return c.people.some(function(p) {
      if ((p.name||'').toLowerCase().indexOf(q) !== -1) return true;
      return p.roles.some(function(r) { return r.title.toLowerCase().indexOf(q) !== -1; });
    });
  });
}

function renderListing() {
  var clubs = filteredClubs();
  var root = document.getElementById('listing-root');
  if (!clubs.length) {
    root.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">No clubs match "' + esc(state.searchQuery) + '"</div>';
    return;
  }
  root.innerHTML = renderListStyle1(clubs);
  var cards = root.querySelectorAll('[data-club]');
  cards.forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      state.viewing = el.getAttribute('data-club');
      showScene();
    });
  });
}

function renderClub() {
  var club = window.CLUBS.filter(function(c){return c.name===state.viewing;})[0];
  var root = document.getElementById('club-root');
  if (!club) { root.innerHTML = '<div>Club not found</div>'; return; }
  root.innerHTML = CLUB_STYLE_RENDERERS[state.clubStyle](club);
}

function showScene() {
  var listing = document.getElementById('scene-listing');
  var club = document.getElementById('scene-club');
  if (state.viewing) {
    listing.classList.remove('scene--active');
    club.classList.add('scene--active');
    renderClub();
    window.scrollTo(0, 0);
  } else {
    club.classList.remove('scene--active');
    listing.classList.add('scene--active');
    renderListing();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  var clubGroup = document.getElementById('clubStyleGroup');
  clubGroup.addEventListener('click', function(e) {
    var b = e.target.closest('[data-club-style]');
    if (!b) return;
    state.clubStyle = b.getAttribute('data-club-style');
    clubGroup.querySelectorAll('[data-club-style]').forEach(function(x) {
      x.setAttribute('aria-pressed', x === b ? 'true' : 'false');
    });
    if (state.viewing) renderClub();
  });
  var search = document.getElementById('searchBox');
  var searchTimer;
  search.addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      state.searchQuery = search.value;
      if (!state.viewing) renderListing();
    }, 150);
  });
  document.getElementById('backLink').addEventListener('click', function(e) {
    e.preventDefault();
    state.viewing = null;
    showScene();
  });
  showScene();
});
</script>
