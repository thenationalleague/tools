<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Club Directory — NL Tools</title>
<!--
  club-directory / index.html
  v0.15 — Design polish round. Button + pill language unified, content clarity pass.

  Changelog:
  v0.15 — Complete UI consistency overhaul based on v0.14 feedback. No feature
          changes; all visual/structural cleanup.

          NEW COMPONENT LANGUAGE
          Five button variants defined at the top of the CSS:
          - .btn.btn--primary   — navy fill, main affirmative (Save, Copy, etc)
          - .btn.btn--secondary — outline, contextual (Cancel, Edit, Back)
          - .btn.btn--danger    — red fill, destructive (Delete)
          - .btn.btn--link      — text-only, low emphasis (all/none controls)
          - .btn.btn--toggle    — tab/state (Directory, People tab, heads mode)
          Plus .btn--toggle-dark (persona bar), .btn--sm / .btn--lg size mods,
          .btn-icon (round 26px structural), .btn-add (dashed-border creation).

          Four pill variants:
          - .pill.pill--count       — neutral metadata, goes coloured only when .is-active
          - .pill.pill--status[-good|-warn|-error] — meaning = colour
          - .pill.pill--marker      — meaningful flag (dept head badge)
          - .pill.pill--identifier  — neutral label (division, role key)

          MIGRATED CLASSES (old → new)
          .mc-save-btn, .mc-primary-btn, .lb-copybtn, .mc-add-person-btn → btn btn--primary
          .mc-cancel-btn, .mc-dept-edit-btn, .mc-person-card-btn → btn btn--secondary
          .mc-danger-btn, .mc-person-panel__danger → btn btn--danger
          .lb-linkbtn → btn btn--link
          .demo-bar__btn, .lb-mode-btn, .mc-picker-pill → btn btn--toggle
          .persona-btn → btn btn--toggle-dark
          .mc-dept-add-btn → btn-add
          .mc-assignment-remove, .mc-person-panel__close, .lb-omit-btn → btn-icon
          .mc-tab-count → pill pill--count (gains .is-active when tab is current)
          .mc-status-pill + modifiers → pill pill--status*
          .mc-person-panel__dept-head-pill, .mc-assignment-headpill → pill pill--marker
          .mc-checklist-roleKey → pill pill--identifier
          .mc-div-pill (division colour coding) → pill pill--identifier (neutral)
          .mc-dept-warning → pill pill--status pill--status-warn

          Old CSS rules for migrated classes are still in the file but unused —
          flagged for cleanup in a later pass.

          CONTENT CHANGES
          - Decorative ⚡ (List builder) and ✏ (Manage) symbols stripped from
            button labels — they rendered inconsistently across OSes and added
            nothing. Labels are now plain text.
          - View-switcher bar hides entirely when persona has only Directory
            access (viewer, club-editor). No single-button "switcher" pollution.
          - Club-editor persona sees a prominent "Your club" hero card at the
            top of the directory listing — gradient navy background, big
            crest, direct "Manage my club" button. Their regular card still
            appears in the division grid below.
          - Division headers renamed to full league titles:
            'National League', 'National League North', 'National League South'.
            Colour coding (navy/amber/green) removed. New styling: navy
            uppercase with red underline — matches section-header language
            elsewhere in the tool.
          - Club listing cards stripped back: crest, name, stadium only.
            Club Secretary line removed (weird summary field). Town-only
            sub-line and "N people" redundant count removed. Cards now have
            consistent 72px min-height.
          - "← back to directory" changed from inline link to proper
            secondary button — rest of the tool's button language applied.
          - .lb-div-badge coloured square dropped from list builder division
            rows; full division name shown instead.
          - Tab count pills neutral grey by default, navy-highlighted only
            when the tab is active.

          Stadium name derived from first comma-token of the raw address.
          Good coverage (~85%), with a fallback that suppresses false matches
          like 'Hartlepool United FC'.
  v0.14 — Polish round: switcher removed, crest aspect, banner dedup, panel wrap, etc.
  v0.13 — Primary role, duplicate-dept soft warn, Programme Editor flag.
  v0.12 — Section metadata + checklist type.
  v0.11 — (skipped).
  v0.10 — Liaison split (superseded).
  v0.9 — Two-surface Manage Contacts editor.
  v0.8 — Manage Contacts v1 (superseded).
  v0.7 — Dept heads + list builder rework.
  v0.6 — List builder first cut.
  v0.5 — Restraint pass on section headers.
  v0.4 — Directors/Co-Chairs joined-names rendering.
  v0.3 — Same-section multi-role collapse.
  v0.2 — Roles model rewrite.
  v0.1 — Initial static demo.

  Notes for future work:
  - Replace window.CLUBS inline data with RTDB read
  - Add auth-guard.js wiring once auth is decided
  - Person-level business-card view: use the role with main=true as the headline
  - Role catalogue: sections and role lists should live in RTDB once schema is nailed
-->
<style>
  @font-face {
    font-family: "carbona-variable";
    src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
         url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
    font-display: swap; font-style: normal; font-weight: 200 900; font-stretch: normal;
  }
  :root {
    --primary:     #9e0000;
    --primary-dim: #7a0000;
    --navy:        #223b7c;
    --navy-mid:    #1a2f63;
    --navy-light:  #2a4a8c;
    --red:         #c0392b;
    --red-light:   #fdf0ef;
    --green:       #1e7e34;
    --amber:       #c47600;
    --white:       #ffffff;
    --off-white:   #f4f6f9;
    --text:        #1a2a44;
    --text-muted:  #5a6a82;
    --border:      #dde3ed;
    --radius:      6px;
    --shadow:      0 2px 12px rgba(10,22,40,0.10);
    --font:        'carbona-variable','carbona',sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    font-variation-settings: 'wght' 400;
    color: var(--text);
    background: var(--off-white);
  }
  a { color: var(--navy); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    background: var(--primary);
    color: var(--white);
    padding: 0 20px;
    height: 72px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    border-bottom: 7px solid var(--navy);
    width: 100%;
  }
  .topbar__logo { height: 42px; flex-shrink: 0; }
  .topbar__title-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; line-height: 1; gap: 3px; }
  .topbar__title { font-weight: 900; font-variation-settings: 'wght' 900; font-size: 20px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar__kicker { font-size: 9px; font-weight: 700; font-variation-settings: 'wght' 700; text-transform: uppercase; letter-spacing: 0.18em; color: rgba(255,255,255,0.6); white-space: nowrap; }
  .topbar__btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: var(--white); padding: 7px 14px; border-radius: var(--radius); font-size: 11px; font-weight: 700; font-variation-settings: 'wght' 700; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; font-family: var(--font); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0; }
  .topbar__btn:hover { background: rgba(255,255,255,0.12); }
  @media (max-width: 700px) {
    .topbar { padding: 0 14px; gap: 10px; }
    .topbar__btn-text-portal { display: none; }
    .topbar__title { font-size: 17px; }
  }

  /* ====================================================
     v0.15 BUTTON SYSTEM
     5 semantic variants: primary, secondary, danger, link, toggle
     Plus toggle-dark (persona bar), size modifiers, icon helpers, add helper.
     Existing component-specific button classes (.mc-save-btn, .lb-copybtn
     etc) are migrated to use this system in v0.15.
     ==================================================== */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font); font-size: 12px;
    font-weight: 700; font-variation-settings: 'wght' 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 16px; border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }

  .btn--primary { background: var(--navy); color: var(--white); }
  .btn--primary:hover:not(:disabled) { background: var(--navy-mid); }

  .btn--secondary {
    background: var(--white); color: var(--text);
    border-color: var(--border);
  }
  .btn--secondary:hover:not(:disabled) { border-color: var(--navy); color: var(--navy); }

  .btn--danger { background: var(--red); color: var(--white); }
  .btn--danger:hover:not(:disabled) { background: #a23225; }

  .btn--link {
    background: none; border: none; padding: 4px 6px;
    font-size: 12px; font-weight: 600; font-variation-settings: 'wght' 600;
    text-transform: none; letter-spacing: normal;
    color: var(--navy); text-decoration: underline;
  }
  .btn--link:hover:not(:disabled) { color: var(--primary); }

  .btn--toggle {
    background: none; color: var(--text);
    border-color: transparent;
    font-weight: 600; font-variation-settings: 'wght' 600;
  }
  .btn--toggle:hover:not([aria-pressed="true"]) { background: var(--off-white); }
  .btn--toggle[aria-pressed="true"] { background: var(--navy); color: var(--white); }

  .btn--toggle-dark {
    background: none; color: rgba(255,255,255,0.75);
    border: 1px solid rgba(255,255,255,0.18);
    font-weight: 600; font-variation-settings: 'wght' 600;
    padding: 3px 10px; font-size: 11px;
  }
  .btn--toggle-dark:hover:not([aria-pressed="true"]) { border-color: rgba(255,255,255,0.4); color: #fff; }
  .btn--toggle-dark[aria-pressed="true"] { background: var(--primary); border-color: var(--primary); color: #fff; }

  .btn--sm { padding: 5px 11px; font-size: 11px; letter-spacing: 0.06em; }
  .btn--lg { padding: 11px 22px; font-size: 13px; }

  /* Icon button — round, no text, structural */
  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px; line-height: 1;
    color: var(--text-muted);
    padding: 0;
    transition: all 0.12s;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font);
  }
  .btn-icon:hover { border-color: var(--navy); color: var(--navy); }
  .btn-icon--danger:hover { border-color: var(--red); color: var(--red); }
  .btn-icon[aria-pressed="true"] {
    background: var(--red); border-color: var(--red); color: var(--white);
  }

  /* Add button — dashed border creation affordance */
  .btn-add {
    background: var(--white); border: 1px dashed var(--border);
    padding: 8px 14px; border-radius: var(--radius);
    font-family: var(--font); font-size: 12px;
    font-weight: 600; font-variation-settings: 'wght' 600;
    color: var(--navy);
    cursor: pointer; transition: all 0.12s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-add:hover { border-color: var(--navy); background: var(--off-white); }

  /* ====================================================
     v0.15 PILL SYSTEM
     4 variants: count, status, marker, identifier.
     ==================================================== */
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 2px 9px; border-radius: 3px;
    font-weight: 700; font-variation-settings: 'wght' 700;
    letter-spacing: 0.05em; line-height: 1.5;
  }

  .pill--count {
    background: var(--off-white); color: var(--text-muted);
    font-weight: 600; font-variation-settings: 'wght' 600;
    font-size: 10px;
    padding: 1px 8px; border-radius: 10px;
  }
  .pill--count.is-active { background: var(--navy); color: var(--white); }

  .pill--status { background: var(--off-white); color: var(--text-muted); }
  .pill--status-good  { background: #edf7ee; color: var(--green); }
  .pill--status-warn  { background: var(--amber-light, #fef6ec); color: #8a5a00; }
  .pill--status-error { background: var(--red-light); color: var(--red); }

  .pill--marker {
    background: var(--amber); color: var(--white);
    font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.1em; padding: 2px 7px;
  }
  .pill--marker-primary { background: var(--primary); color: var(--white); }

  .pill--identifier {
    background: var(--white); color: var(--text);
    border: 1px solid var(--border);
    font-size: 11px; font-weight: 700; font-variation-settings: 'wght' 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 9px;
  }

  /* Amber token for light amber background (used in pill--status-warn) */
  :root { --amber-light: #fef6ec; }

  .demo-bar {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    position: sticky; top: 72px; z-index: 50;
  }
  .demo-bar__group { display: flex; gap: 2px; align-items: center; background: var(--off-white); padding: 4px; border-radius: 6px; }
  .demo-bar__label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 800; font-variation-settings: 'wght' 800; color: var(--text-muted); padding: 0 8px 0 4px; }
  .demo-bar__btn { background: none; border: none; padding: 6px 12px; font-family: var(--font); font-size: 12px; font-weight: 600; font-variation-settings: 'wght' 600; color: var(--text); border-radius: 4px; cursor: pointer; transition: all 0.12s; }
  .demo-bar__btn:hover { background: rgba(0,0,0,0.04); }
  .demo-bar__btn[aria-pressed="true"] { background: var(--navy); color: var(--white); }
  .demo-bar__search { flex: 1; min-width: 200px; max-width: 360px; margin-left: auto; font-family: var(--font); font-size: 14px; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; background: var(--white); color: var(--text); }
  .demo-bar__search:focus { outline: none; border-color: var(--navy); }

  .page { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; }
  /* .back-link superseded by .btn.btn--secondary.btn--sm in v0.15 */

  .scene { display: none; }
  .scene--active { display: block; }

  /* ================================================================
     STYLE 2 — Dense Table
     Sections = navy uppercase text with a short red underline, generous
     whitespace. Joined rows (Directors / Co-Chairs) render like any other
     row — no tint, no colour signalling.
     ================================================================ */
  .s2-club { background: var(--white); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .s2-header { padding: 24px 28px 22px; background: var(--navy); color: var(--white); display: flex; gap: 20px; align-items: flex-start; }
  .s2-crest { width: 56px; height: 56px; flex-shrink: 0; background: var(--white); border-radius: 4px; padding: 4px; object-fit: contain; }
  .s2-header h2 { margin: 0; font-size: 22px; display: flex; align-items: center; gap: 12px; font-weight: 900; font-variation-settings: 'wght' 900; }
  .s2-div { font-size: 10px; padding: 3px 10px; border-radius: 2px; background: rgba(255,255,255,0.2); font-weight: 700; font-variation-settings: 'wght' 700; letter-spacing: 0.1em; }
  .s2-addr { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 6px; }
  .s2-addr a { color: rgba(255,255,255,0.95); }
  .s2-table { width: 100%; border-collapse: collapse; font-size: 13px; }

  /* Column header strip — kept but made very quiet */
  .s2-table thead th {
    text-align: left; padding: 10px 20px 8px;
    background: transparent;
    font-weight: 700; font-variation-settings: 'wght' 700;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em;
    color: #8592a6;
    border-bottom: 1px solid var(--border);
  }

  /* Regular data rows */
  .s2-table td { padding: 10px 20px; border-bottom: 1px solid #eef1f5; vertical-align: top; }
  .s2-role { font-weight: 600; font-variation-settings: 'wght' 600; color: var(--text); width: 28%; }
  .s2-name { width: 22%; font-weight: 600; font-variation-settings: 'wght' 600; }
  .s2-phone { width: 18%; color: var(--text-muted); font-size: 12px; }
  .s2-email { width: 32%; font-size: 12px; }
  .s2-table tbody tr:not(.s2-sec-row):hover td { background: #fbfcfd; }

  /* Section header row — typographic only. The td has no borders, no fill;
     the inner wrapper carries the navy text and the short red underline. */
  .s2-sec-row td {
    padding: 28px 20px 4px !important;
    border-bottom: none !important;
    background: transparent !important;
  }
  .s2-sec-row:first-child td { padding-top: 24px !important; }
  .s2-sec-hd {
    display: inline-block;
    font-weight: 700;
    font-variation-settings: 'wght' 700;
    font-size: 11px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--primary);
    /* border-bottom acts as the short red underline — only as wide as the text */
  }

  /* Joined rows (Directors/Co-Chairs) — identical to regular rows, no special colour */
  .s2-joined-row td { /* no overrides — use regular row styling */ }

  /* ================================================================
     STYLE 4 — Role-First
     ================================================================ */
  .s4-club { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 28px 32px; }
  .s4-header { display: flex; align-items: center; gap: 20px; margin-bottom: 12px; }
  .s4-crest { width: 56px; height: 56px; flex-shrink: 0; object-fit: contain; }
  .s4-header h2 { margin: 0; font-size: 26px; font-weight: 900; font-variation-settings: 'wght' 900; letter-spacing: -0.01em; }
  .s4-div { font-size: 10px; padding: 3px 9px; border-radius: 2px; color: var(--white); font-weight: 800; font-variation-settings: 'wght' 800; letter-spacing: 0.12em; }
  .s4-div--national { background: var(--navy); }
  .s4-div--north { background: var(--amber); }
  .s4-div--south { background: var(--green); }
  .s4-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; margin-left: 76px; }
  .s4-meta a { color: var(--navy); }
  .s4-section { margin-top: 28px; }

  /* Same subtle typographic treatment as Dense table */
  .s4-sec-bar {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    font-variation-settings: 'wght' 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--navy);
    padding-bottom: 6px;
    margin-bottom: 14px;
    border-bottom: 2px solid var(--primary);
  }

  .s4-row { display: grid; grid-template-columns: 260px 1fr; gap: 16px; padding: 10px 0; border-bottom: 1px solid #f0f2f5; align-items: start; }
  .s4-row:last-child { border-bottom: none; }
  .s4-role-pill { font-size: 12px; font-weight: 700; font-variation-settings: 'wght' 700; color: var(--navy); background: #eef2f8; padding: 7px 12px; border-radius: 3px; border-left: 3px solid var(--navy); }
  .s4-name { font-weight: 700; font-variation-settings: 'wght' 700; font-size: 14px; }
  .s4-contact { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
  .s4-contact a { color: var(--navy); }
  .s4-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .s4-dir-chip { font-size: 12px; padding: 5px 11px; background: var(--off-white); border: 1px solid var(--border); border-radius: 14px; color: var(--text); }

  /* Joined rows match every other row — same pill, same name weight */
  .s4-joined-names {
    font-size: 14px;
    font-weight: 700;
    font-variation-settings: 'wght' 700;
    line-height: 1.7;
    color: var(--text);
  }

  /* ================================================================
     LISTING 1 — Card Grid
     ================================================================ */
  .l1-division { margin-bottom: 32px; }
  /* Division headers — navy uppercase with red underline, matches section-header language elsewhere */
  .l1-div-hd {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 800;
    font-variation-settings: 'wght' 800;
    padding: 0 0 6px 0;
    display: inline-flex;
    align-items: baseline;
    gap: 10px;
    color: var(--navy);
    margin: 0 0 18px 0;
    border-bottom: 2px solid var(--primary);
  }
  .l1-div-hd .pill { vertical-align: baseline; }
  /* Club-editor "your club" hero — big full-width card on directory landing */
  .l1-hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    color: var(--white);
    padding: 24px 28px;
    border-radius: 8px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 18px;
    align-items: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .l1-hero:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(10,22,40,0.2); }
  .l1-hero__crest {
    width: 64px; height: 64px; background: var(--white);
    border-radius: 6px; padding: 6px;
    object-fit: contain;
  }
  .l1-hero__kicker {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.22em; opacity: 0.7;
    font-weight: 700; font-variation-settings: 'wght' 700;
  }
  .l1-hero__name {
    font-size: 22px;
    font-weight: 800; font-variation-settings: 'wght' 800;
    margin-top: 2px;
    letter-spacing: -0.01em;
  }
  .l1-hero__meta {
    font-size: 13px; opacity: 0.8; margin-top: 2px;
  }
  .l1-hero .btn--primary {
    background: var(--primary);
  }
  .l1-hero .btn--primary:hover { background: var(--primary-dim); }
  @media (max-width: 700px) {
    .l1-hero {
      grid-template-columns: 56px 1fr;
      padding: 18px;
    }
    .l1-hero__crest { width: 56px; height: 56px; }
    .l1-hero .btn--primary {

  .lb-intro { margin-bottom: 20px; }

  /* Divisions */

  /* Club crests in results */
  .lb-club-cell {

    align-items: center;
    gap: 8px;
  }
  .lb-club-cell img { width: 22px; height: 22px; flex-shrink: 0; object-fit: contain; }

  /* Omit button + omitted row */
  .lb-col-omit { width: 36px; text-align: center; padding-right: 10px !important; }
  .lb-omit-btn {
    background: none;
    border: 1px solid var(--border);
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    color: var(--text-muted);
    padding: 0;
    transition: all 0.12s;
  }
  .lb-omit-btn:hover { border-color: #c0392b; color: #c0392b; }
  .lb-omit-btn[aria-pressed="true"] {
    background: #c0392b;
    border-color: #c0392b;
    color: var(--white);
  }
  .lb-row-omitted td {

  }

  .lb-row-omitted td a { color: #b2b8c2 !important; pointer-events: none; }

  .lb-results-hd {
    display: flex; align-items: center; justify-content: space-between;

     MANAGE CONTACTS (v0.9 — two-surface model)
     ================================================================ */

  /* Club picker table (admin-only landing) */
  .mc-picker-intro { margin-bottom: 20px; }

  .mc-picker-intro p { margin: 4px 0 0 0; font-size: 14px; color: var(--text-muted); }

  .mc-picker-filter {

    text-align: left; padding: 10px 14px; background: var(--off-white);

  .mc-div-pill--north { background: var(--amber); }

    gap: 16px;
    padding: 12px 16px;
    border-bottom: 1px solid #eef1f5;
    align-items: center;
    cursor: pointer;
    transition: background 0.1s;
  }
  .mc-person-card:last-child { border-bottom: none; }
  .mc-person-card:hover { background: #fafbfc; }
  .mc-person-card.is-selected {
    background: #eef2f8;
    border-left: 3px solid var(--navy);
    padding-left: 13px;
  }
  .mc-person-card-main { min-width: 0; }
  .mc-person-card-name {
    font-weight: 700; font-variation-settings: 'wght' 700;
    font-size: 14px;
    color: var(--text);
  }
  .mc-person-card-contact {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .mc-person-card-contact a { color: var(--navy); }
  .mc-person-card-depts {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    font-style: italic;
  }
  .mc-person-card-depts b {
    font-style: normal;
    font-weight: 600;
    font-variation-settings: 'wght' 600;
    color: var(--text);
  }
  .mc-person-card-actions {
    display: flex;
    gap: 6px;
  }
  .mc-person-card-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 5px 11px;
    font-family: var(--font); font-size: 11px;
    font-weight: 600; font-variation-settings: 'wght' 600;
    color: var(--text);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .mc-person-card-btn:hover { border-color: var(--navy); color: var(--navy); }
  .mc-person-card-btn--danger:hover { border-color: #c0392b; color: #c0392b; }

  /* Right-side slide-out panel for editing a person */
  .mc-person-panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 150;
    animation: fadein 0.15s;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slidein { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .mc-person-panel {
    position: fixed;
    top: 0; right: 0;
    height: 100vh;
    width: 420px;
    max-width: 94vw;
    background: var(--white);
    box-shadow: -8px 0 40px rgba(0,0,0,0.15);
    z-index: 160;
    display: flex;
    flex-direction: column;
    animation: slidein 0.22s;
  }
  .mc-person-panel__hd {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .mc-person-panel__hd h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 900; font-variation-settings: 'wght' 900;
  }
  .mc-person-panel__hd-sub {
    font-size: 11px; color: var(--text-muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    font-variation-settings: 'wght' 700;
  }
  .mc-person-panel__close {
    background: none; border: none;
    font-size: 20px; line-height: 1;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0 6px;
  }
  .mc-person-panel__close:hover { color: var(--text); }

  .mc-person-panel__body {
    flex: 1;
    padding: 22px;
    overflow-y: auto;
  }
  .mc-person-panel__field { margin-bottom: 14px; }
  .mc-person-panel__field label {
    display: block;
    font-size: 11px;
    font-weight: 700; font-variation-settings: 'wght' 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .mc-person-panel__field input {
    width: 100%;
    font-family: var(--font); font-size: 14px;
    padding: 8px 11px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .mc-person-panel__field input:focus { outline: none; border-color: var(--navy); }

  .mc-person-panel__depts-section {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .mc-person-panel__depts-section h4 {
    margin: 0 0 10px 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--navy);
    font-weight: 700; font-variation-settings: 'wght' 700;
  }
  .mc-person-panel__dept {
    font-size: 13px;
    color: var(--text);
    padding: 8px 12px;
    background: var(--off-white);
    border-radius: 4px;
    margin-bottom: 5px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .mc-person-panel__dept-info {
    flex: 1;
    min-width: 0;
    line-height: 1.4;
  }
  .mc-person-panel__dept b {
    color: var(--navy);
    font-weight: 700; font-variation-settings: 'wght' 700;
  }
  .mc-person-panel__dept-head-pill {
    font-size: 9px;
    background: var(--amber);
    color: var(--white);
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 700; font-variation-settings: 'wght' 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .mc-person-panel__depts-empty {
    font-size: 12px; color: var(--text-muted);
    font-style: italic;
    padding: 10px 0;
  }
  .mc-person-panel__help {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  .mc-person-panel__ftr {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    background: var(--off-white);
  }
  .mc-person-panel__danger {
    background: none; border: none;
    color: #c0392b;
    font-family: var(--font); font-size: 12px;
    font-weight: 600; font-variation-settings: 'wght' 600;
    cursor: pointer;
    padding: 6px 8px;
    text-decoration: underline;
  }
  .mc-person-panel__danger:hover { color: #a23225; }

  /* ========== SURFACE 2: Department assignments ========== */
  .mc-dept-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 22px;
    margin-bottom: 10px;
  }
  .mc-dept-card.is-editing {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(34,59,124,0.08);
  }
  .mc-dept-card.mc-dept-card--missing {
    border-left: 3px solid var(--amber);
  }
  .mc-dept-hd {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--primary);
    margin-bottom: 12px;
  }
  .mc-dept-hd h3 {
    margin: 0;
    font-size: 11px;
    font-weight: 700; font-variation-settings: 'wght' 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--navy);
  }
  .mc-dept-warning {
    font-size: 11px;
    color: #8a5a00;
    font-weight: 600;
    font-variation-settings: 'wght' 600;
    background: #fef6ec;
    padding: 3px 9px;
    border-radius: 3px;
    margin-left: 10px;
  }

  /* Section subtitle (small help text under the dept header in editor) */
  .mc-dept-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin: -8px 0 12px 0;
    line-height: 1.5;
  }

  /* Primary-role radio in the person side-panel */
  .mc-person-panel__primary-radio {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-right: 10px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .mc-person-panel__primary-radio input {
    margin: 0;
    cursor: pointer;
  }
  .mc-person-panel__primary-mark {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 700;
    font-variation-settings: 'wght' 700;
  }
  .mc-person-panel__primary-radio input:checked + .mc-person-panel__primary-mark {
    color: var(--primary);
  }

  /* Flag row inside a dept-edit assignment row (e.g. Media -> Programme editor) */
  .mc-flag-row {
    grid-column: 1 / -1;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--border);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 12px;
  }
  .mc-flag-row .mc-assignment-edit-headcheck {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--text);
  }
  .mc-flag-row .mc-assignment-edit-headcheck:hover {
    border-color: var(--navy);
  }

  /* Checklist slot rows — render with a fixed-width role key badge on the left */
  .mc-checklist-slot {
    border-left: 3px solid transparent;
    padding-left: 10px;
  }
  .mc-checklist-slot--missing {
    border-left-color: #e0a952;
    background: #fef9f0;
  }
  .mc-checklist-slot--optional {
    border-left-color: var(--border);
    opacity: 0.75;
  }
  .mc-checklist-roleKey {
    display: inline-block;
    font-size: 10px;
    font-weight: 800;
    font-variation-settings: 'wght' 800;
    letter-spacing: 0.08em;
    background: var(--navy);
    color: var(--white);
    padding: 2px 7px;
    border-radius: 3px;
    margin-right: 8px;
    vertical-align: 1px;
    min-width: 38px;
    text-align: center;
  }
  .mc-checklist-extras-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    font-weight: 700;
    font-variation-settings: 'wght' 700;
    margin: 16px 0 8px 0;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
  }

  .mc-assignment-row {
    display: grid;
    grid-template-columns: 1.2fr 1fr auto auto;
    gap: 12px;
    padding: 9px 10px;
    align-items: center;
    border-radius: 5px;
    margin-bottom: 4px;
  }
  .mc-assignment-row:hover { background: #fafbfc; }
  .mc-assignment-row.is-head {
    background: #fcf3e6;
  }
  .mc-assignment-name {
    font-weight: 700; font-variation-settings: 'wght' 700;
    font-size: 14px;
  }
  .mc-assignment-role {
    font-size: 13px;
    color: var(--text-muted);
  }
  .mc-assignment-headpill {
    font-size: 9px;
    background: var(--amber);
    color: var(--white);
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 700; font-variation-settings: 'wght' 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    justify-self: start;
  }

  /* edit mode: assignment becomes a row of inputs */
  .mc-assignment-edit-row {
    display: grid;
    grid-template-columns: 1.3fr 1.3fr auto auto;
    gap: 8px;
    padding: 10px;
    background: var(--off-white);
    border-radius: 4px;
    margin-bottom: 4px;
    align-items: center;
  }
  .mc-assignment-edit-row select,
  .mc-assignment-edit-row input[type="text"] {
    font-family: var(--font); font-size: 13px;
    padding: 6px 9px;
    border: 1px solid var(--border);
    border-radius: 3px;
    width: 100%;
    background: var(--white);
  }
  .mc-assignment-edit-row select:focus,
  .mc-assignment-edit-row input[type="text"]:focus {
    outline: none; border-color: var(--navy);
  }
  .mc-assignment-edit-headcheck {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px;
    white-space: nowrap;
  }
  .mc-assignment-edit-headcheck input { margin: 0; }

  .mc-assignment-remove {
    background: none;
    border: 1px solid var(--border);
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    color: var(--text-muted);
    padding: 0;
    transition: all 0.12s;
  }
  .mc-assignment-remove:hover { border-color: #c0392b; color: #c0392b; }

  .mc-dept-empty {
    font-size: 13px; color: var(--text-muted);
    font-style: italic;
    padding: 8px 0;
  }

  .mc-dept-add-btn {
    background: var(--white);
    border: 1px dashed var(--border);
    padding: 8px 14px;
    font-family: var(--font); font-size: 12px;
    font-weight: 600; font-variation-settings: 'wght' 600;
    color: var(--navy);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.12s;
    margin-top: 6px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .mc-dept-add-btn:hover { border-color: var(--navy); background: var(--off-white); }

  .mc-dept-edit-btn {
    background: none; border: 1px solid var(--border);
    padding: 5px 12px;
    font-family: var(--font); font-size: 11px;
    font-weight: 700; font-variation-settings: 'wght' 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--navy); cursor: pointer;
    border-radius: 3px;
    transition: all 0.12s;
  }
  .mc-dept-edit-btn:hover { border-color: var(--navy); background: var(--off-white); }

  .mc-dept-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .mc-dept-footer .mc-save-btn,
  .mc-dept-footer .mc-cancel-btn,
  .mc-person-panel__ftr .mc-save-btn,
  .mc-person-panel__ftr .mc-cancel-btn {
    font-family: var(--font); font-size: 12px;
    font-weight: 700; font-variation-settings: 'wght' 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 7px 16px; border-radius: 4px;
    cursor: pointer;
  }
  .mc-save-btn {
    background: var(--navy); color: var(--white); border: none;
  }
  .mc-save-btn:hover { background: var(--navy-mid); }
  .mc-cancel-btn {
    background: none; color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .mc-cancel-btn:hover { border-color: var(--text-muted); color: var(--text); }

  /* Club details card (admin only) */
  .mc-details {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .mc-field-row {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 16px;
    padding: 6px 0;
    align-items: baseline;
  }
  .mc-field-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); font-weight: 700; font-variation-settings: 'wght' 700;
  }
  .mc-field-value { font-size: 14px; }
  .mc-field-value--muted { color: var(--text-muted); font-style: italic; }
  .mc-field-input {
    width: 100%; font-family: var(--font); font-size: 14px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .mc-field-input:focus { outline: none; border-color: var(--navy); }

  /* Confirm dialog (shared) */
  .mc-confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .mc-confirm-box {
    background: var(--white);
    border-radius: 8px;
    padding: 24px 28px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 12px 48px rgba(0,0,0,0.25);
  }
  .mc-confirm-box h4 {
    margin: 0 0 10px 0;
    font-size: 16px;
    font-weight: 900; font-variation-settings: 'wght' 900;
  }
  .mc-confirm-box p {
    margin: 0 0 14px 0;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }
  .mc-confirm-box p.mc-confirm-sub {
    color: var(--text-muted);
    font-size: 13px;
  }
  .mc-confirm-box-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 16px;
  }
  .mc-confirm-box button {
    padding: 7px 16px; border-radius: 4px;
    font-family: var(--font); font-size: 12px;
    font-weight: 700; font-variation-settings: 'wght' 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    cursor: pointer;
    border: none;
  }
  .mc-confirm-box .mc-cancel-btn {
    background: none; color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .mc-confirm-box .mc-danger-btn {
    background: #c0392b; color: var(--white);
  }
  .mc-confirm-box .mc-danger-btn:hover { background: #a23225; }
  .mc-confirm-box .mc-primary-btn {
    background: var(--navy); color: var(--white);
  }
  .mc-confirm-box .mc-primary-btn:hover { background: var(--navy-mid); }

  @media (max-width: 700px) {
    .page { padding: 16px 12px 60px; }
    .s2-club, .s4-club { padding: 20px 18px; }
    .s4-row { grid-template-columns: 1fr; gap: 4px; }
    .s4-role-pill { justify-self: start; }
    .s4-meta { margin-left: 0; }
    .s4-header, .s2-header { flex-direction: column; gap: 10px; }
    .s2-table { font-size: 12px; }
    .s2-table td { padding: 8px 10px; }
    .l1-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 500px) {
    .s2-phone { display: none; }
  }
</style>

<body>

<header class="topbar">
  <img class="topbar__logo"
    src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png"
    alt="National League"
    onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
  <div class="topbar__title-wrap">
    <span class="topbar__title">Club Directory</span>
    <span class="topbar__kicker">NL Tools</span>
  </div>
  <a href="/tools/portal/" class="topbar__btn" aria-label="Back to portal">
    <span>←</span><span class="topbar__btn-text-portal">Portal</span>
  </a>
</header>

<!-- Demo persona bar — in production this is determined by the logged-in user -->
<div class="persona-bar" id="personaBar">
  <span class="persona-bar__label">Demo persona:</span>
  <button class="btn btn--toggle-dark" data-persona="viewer" aria-pressed="false">Viewer</button>
  <button class="btn btn--toggle-dark" data-persona="staff" aria-pressed="false">NL staff</button>
  <button class="btn btn--toggle-dark" data-persona="admin" aria-pressed="true">NL admin</button>
  <button class="btn btn--toggle-dark" data-persona="club-editor" aria-pressed="false">Club editor <span id="personaClubName">(Tonbridge Angels)</span></button>
</div>

<div class="demo-bar">
  <div class="demo-bar__group" id="clubStyleGroup">
    <button class="btn btn--toggle btn--sm" data-view-mode="directory" aria-pressed="true">Directory</button>
    <button class="btn btn--toggle btn--sm persona-gated" data-view-mode="builder" data-requires="listBuilder">List builder</button>
    <button class="btn btn--toggle btn--sm persona-gated" data-view-mode="manage" data-requires="manageContacts">Manage contacts</button>
  </div>
  <input type="search" class="demo-bar__search" id="searchBox" placeholder="Search clubs, people, roles…">
</div>

<div class="page">
  <div class="scene scene--active" id="scene-listing">
    <div id="listing-root"></div>
  </div>
  <div class="scene" id="scene-club">
    <div class="club-topbar">
      <button class="btn btn--secondary btn--sm" id="backLink">← back to directory</button>
      <button class="btn btn--primary persona-gated" id="manageMyClubBtn" data-requires="manageOwnClub" style="display:none;">Manage my club</button>
    </div>
    <div id="club-root"></div>
  </div>
  <div class="scene" id="scene-builder">
    <div class="lb-intro">
      <h2>List builder</h2>
      <p>Pick departments and clubs. Export contact list with copy-to-clipboard.</p>
    </div>

    <div class="lb-modebar">
      <div class="lb-modebar__group" id="lbModeGroup">
        <button class="btn btn--toggle btn--sm" data-lb-mode="heads" aria-pressed="true">Dept heads only</button>
        <button class="btn btn--toggle btn--sm" data-lb-mode="whole">Whole department</button>
      </div>
    </div>

    <div class="lb-grid">
      <section class="lb-panel">
        <div class="lb-panel-hd">
          <h3>Departments</h3>
          <div class="lb-panel-actions">
            <button class="btn btn--link" id="lbDeptsAll">all</button>
            <button class="btn btn--link" id="lbDeptsNone">none</button>
          </div>
        </div>
        <div id="lbDepts"></div>
      </section>

      <section class="lb-panel">
        <div class="lb-panel-hd">
          <h3>Divisions &amp; clubs</h3>
          <div class="lb-panel-actions">
            <button class="btn btn--link" id="lbClubsAll">all</button>
            <button class="btn btn--link" id="lbClubsNone">none</button>
          </div>
        </div>
        <div id="lbDivisions"></div>
      </section>
    </div>

    <div id="lbWarnings"></div>

    <section class="lb-results">
      <div class="lb-results-hd">
        <div class="lb-results-stats">
          <span class="lb-count" id="lbCount">0</span>
          <span class="lb-count-sub" id="lbCountSub">people match</span>
        </div>
        <div class="lb-results-actions">
          <button class="btn btn--primary" data-copy-fmt="named">Copy named emails</button>
          <button class="btn btn--primary" data-copy-fmt="plain">Copy plain emails</button>
          <button class="btn btn--primary" data-copy-fmt="csv">Copy as CSV</button>

// Derived lookups (don't hand-edit these — they derive from SECTIONS above)
var SECTION_ORDER = SECTIONS.map(function(s){ return s.key; });
var SECTIONS_BY_KEY = (function(){ var m = {}; SECTIONS.forEach(function(s){ m[s.key] = s; }); return m; })();

// Sections where a dept head is REQUIRED (warning if zero heads).
// Only applies to 'hierarchical' sections — other types don't have a head concept.
var OPTIONAL_HEAD_SECTIONS = {};  // e.g. { 'Other': true } — none currently optional
var HEAD_SECTIONS = SECTIONS
  .filter(function(s){ return s.type === 'hierarchical'; })
  .map(function(s){ return s.key; })
  .filter(function(k){ return k !== 'Other'; });  // Other is catch-all, no head
var REQUIRED_HEAD_SECTIONS = HEAD_SECTIONS.filter(function(k){ return !OPTIONAL_HEAD_SECTIONS[k]; });

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
  });
}
function crestUrl(name) {
  return 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/' +
    encodeURIComponent(name) + '.png';
}
function fallbackCrest() {
  return 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png';
}

/* Expand a club's people[] into a list of (person, roleTitles[]) groups per section.
   If a person has >1 role in the same section they collapse into ONE entry with
   roleTitles joined by " / " at render time. */
function peopleBySection(club) {
  var out = {};
  for (var i = 0; i < club.people.length; i++) {
    var p = club.people[i];
    // bucket this person's roles by section
    var bucket = {};
    for (var j = 0; j < p.roles.length; j++) {
      var r = p.roles[j];
      if (!bucket[r.section]) bucket[r.section] = [];
      bucket[r.section].push(r.title);
    }
    for (var section in bucket) {
      if (!out[section]) out[section] = [];
      out[section].push({ person: p, roleTitles: bucket[section] });
    }
  }
  return out;
}

function joinRoles(titles) {
  return titles.join(' / ');
}

function townFromAddr(addr) {
  if (!addr) return '';
  var parts = addr.split(',').map(function(s){ return s.trim(); });
  if (parts.length >= 2) return parts[parts.length - 2];
  return parts[0] || '';
}

// Best-effort extraction of stadium name from the raw address string.
// First comma-separated token is usually the stadium. Filters out tokens
// that are clearly not stadium names (clubs that start their address with
// the club name itself, like "Hartlepool United FC"). Returns empty string
// if nothing usable.
function stadiumFromAddr(addr) {
  if (!addr) return '';
  var first = addr.split(',')[0].trim();
  if (!first) return '';
  // If the first chunk is clearly the whole address (no comma anywhere),
  // it's not a stadium — bail.
  if (addr.indexOf(',') === -1) return '';
  // Reject tokens that are just "<name> FC" or "<name> Football Club".
  // These clubs didn't list a stadium name at the start.
  var lower = first.toLowerCase();
  if (/\b(fc|football club|afc)\s*$/i.test(first)) return '';
  if (lower === '' || first.length > 60) return '';
  return first;
}

function mainRole(p) {
  for (var i = 0; i < p.roles.length; i++) if (p.roles[i].main) return p.roles[i];
  return p.roles[0];
}

function contactBits(p) {
  var bits = [];
  if (p.phone) bits.push('<span>' + esc(p.phone) + '</span>');
  if (p.email) bits.push('<a href="mailto:' + esc(p.email) + '">' + esc(p.email) + '</a>');
  return bits;
}

/* ================= STYLE 2 — Dense table =================
   Section headers: full-width navy bar with red section label + pluralised noun.
   Directors and Co-Chairs render as a single joined-names row.
   Other roles render one row per person. */

// Roles that are "names-joined" — one row per section, title pluralised, names comma-separated
var NAMES_JOINED_ROLES = { 'Director': 'Directors', 'Co-Chair': 'Co-Chairs' };

function renderClubStyle2(club) {
  var bySec = peopleBySection(club);
  var rows = '';
  SECTION_ORDER.forEach(function(s) {
    if (!bySec[s]) return;
    var entries = bySec[s];

    // Full-width section header row (inner span carries the underline so it only
    // underlines the text, not the whole table width)
    rows += '<tr class="s2-sec-row"><td colspan="4"><span class="s2-sec-hd">' + esc(s) + '</span></td></tr>';

    // Split entries into (a) names-joined and (b) regular
    // For each names-joined role title, collapse matching entries into one row.
    // Everyone else renders as a normal row.
    var joinedByTitle = {};   // e.g. "Director" -> [person, person, ...]
    var regularEntries = [];

    entries.forEach(function(e) {
      // Find the first (and likely only) role in this entry's roleTitles that's a joined-role type
      var joinedTitle = null;
      for (var i = 0; i < e.roleTitles.length; i++) {
        if (NAMES_JOINED_ROLES[e.roleTitles[i]]) {
          joinedTitle = e.roleTitles[i];
          break;
        }
      }
      // If this entry's ONLY role in this section is a names-joined type, collapse it
      if (joinedTitle && e.roleTitles.length === 1) {
        if (!joinedByTitle[joinedTitle]) joinedByTitle[joinedTitle] = [];
        joinedByTitle[joinedTitle].push(e.person);
      } else {
        regularEntries.push(e);
      }
    });

    // Render joined rows first (Directors/Co-Chairs sit at the top of their section)
    Object.keys(joinedByTitle).forEach(function(title) {
      var people = joinedByTitle[title];
      var names = people.map(function(p) { return esc(p.name); }).join(', ');
      var pluralTitle = NAMES_JOINED_ROLES[title];
      rows += '<tr class="s2-joined-row">' +
        '<td class="s2-role">' + esc(pluralTitle) + '</td>' +
        '<td class="s2-name" colspan="3">' + names + '</td>' +
      '</tr>';
    });

    // Render individual rows
    regularEntries.forEach(function(e) {
      var p = e.person;
      var roleLabel = joinRoles(e.roleTitles);
      var email = p.email ? '<a href="mailto:' + esc(p.email) + '">' + esc(p.email) + '</a>' : '';
      rows += '<tr>' +
        '<td class="s2-role">' + esc(roleLabel) + '</td>' +
        '<td class="s2-name">' + esc(p.name) + '</td>' +
        '<td class="s2-phone">' + esc(p.phone||'') + '</td>' +
        '<td class="s2-email">' + email + '</td>' +
      '</tr>';
    });
  });
  return '<div class="s2-club">' +
    '<div class="s2-header">' +
      '<img class="s2-crest" src="' + crestUrl(club.name) + '" alt="" onerror="this.onerror=null;this.src=\'' + fallbackCrest() + '\'">' +
      '<div>' +
        '<h2>' + esc(club.name) + '<span class="s2-div">' + esc(club.division) + '</span></h2>' +
        '<div class="s2-addr">' + esc(club.address_raw) +
          (club.phone ? ' · ☎ ' + esc(club.phone) : '') +
          (club.email ? ' · <a href="mailto:' + esc(club.email) + '">' + esc(club.email) + '</a>' : '') +
          (club.website ? ' · <a href="https://' + esc(club.website) + '">' + esc(club.website) + '</a>' : '') +
        '</div>' +
      '</div>' +
    '</div>' +
    '<table class="s2-table">' +
      '<thead><tr><th>Role</th><th>Name</th><th>Phone</th><th>Email</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>' +
  '</div>';
}

/* ================= STYLE 4 — Role-first =================

function renderClubStyle4(club) {

      }
      if (joinedTitle && e.roleTitles.length === 1) {

        joinedByTitle[joinedTitle].push(e.person);

}

function firstPersonWithMainRole(club, roleTitle) {
  for (var i = 0; i < club.people.length; i++) {
    var p = club.people[i];
    for (var j = 0; j < p.roles.length; j++) {
      if (p.roles[j].main && p.roles[j].title === roleTitle) return p;
    }
  }
  return null;
}
function firstPersonInSection(club, section) {
  for (var i = 0; i < club.people.length; i++) {
    var p = club.people[i];
    for (var j = 0; j < p.roles.length; j++) {
      if (p.roles[j].section === section) return p;
    }
  }
  return null;
}

function personaCan(capability) {
  var p = state.persona;
  switch (capability) {
    case 'listBuilder':    return p === 'staff' || p === 'admin';
    case 'manageContacts': return p === 'admin';
    case 'manageOwnClub':  return p === 'club-editor' || p === 'admin';
    case 'editClubDetails': return p === 'admin';

function filteredClubs() {
  var q = state.searchQuery.trim().toLowerCase();
  if (!q) return window.CLUBS;
  return window.CLUBS.filter(function(c) {
    if (c.name.toLowerCase().indexOf(q) !== -1) return true;
    if ((c.address_raw||'').toLowerCase().indexOf(q) !== -1) return true;
    return c.people.some(function(p) {
      if ((p.name||'').toLowerCase().indexOf(q) !== -1) return true;
      return p.roles.some(function(r) { return r.title.toLowerCase().indexOf(q) !== -1; });
    });
  });
}

function showScene() {

/* Results calculation.
   For each selected club × selected department:
     - if mode === 'heads', include only people where some role in that section has deptHead=true
     - if mode === 'whole', include everyone who has any role in that section
   Returns rows with a stable `key` for per-row omit tracking. */
function lbResults() {
  var depts = state.lb.selectedDepts;
  var clubs = state.lb.selectedClubs;
  var anyDept = Object.keys(depts).length > 0;
  var anyClub = Object.keys(clubs).length > 0;
  if (!anyDept || !anyClub) return [];

  var out = [];
  window.CLUBS.forEach(function(c) {
    if (!clubs[c.name]) return;
    c.people.forEach(function(p) {
      var matched = {}; // section -> [role titles]
      p.roles.forEach(function(r) {
        if (!depts[r.section]) return;
        var sectionMeta = SECTIONS_BY_KEY[r.section];
        if (!sectionMeta) return;

        if (sectionMeta.type === 'checklist') {
          // For checklist sections, filter by the sub-role tickboxes instead of deptHead.
          // If user hasn't set a filter, default to showing all required+optional roles
          // and skip free-text extras in 'heads' mode.
          var subFilter = state.lb.checklistRoleFilter[r.section];
          var roleKey = r.roleKey || null;
          if (subFilter) {
            // Explicit tickboxes rule
            if (!roleKey) {
              // free-text extras only included if explicitly selected via '__other' key
              if (!subFilter.__other) return;
            } else {
              if (!subFilter[roleKey]) return;
            }
          } else {
            // Default: include DLO/PLO/CSLO (required), optional roles (SLO) and free-text
            // except in 'heads' mode we skip free-text extras (cleaner lists)
            if (!roleKey && state.lb.mode === 'heads') return;
          }
        } else if (sectionMeta.type === 'joined-names') {
          // Directors section — always include whoever has a role here
          // (no dept-head concept for joined-names)
        } else {
          // Hierarchical section — apply heads-only mode as before
          if (state.lb.mode === 'heads' && !r.deptHead) return;
          // Apply flag filter if any flags are ticked for this section
          var flagF = state.lb.flagFilter[r.section];
          if (flagF && Object.keys(flagF).length) {
            var roleFlags = r.flags || {};
            var matchesAnyFlag = Object.keys(flagF).some(function(fk){ return roleFlags[fk]; });
            if (!matchesAnyFlag) return;
          }
        }

        if (!matched[r.section]) matched[r.section] = [];
        matched[r.section].push(r.title);
      });
      Object.keys(matched).forEach(function(section) {
        var key = c.name + '|' + (p.name||'') + '|' + section;
        out.push({
          key: key,
          club: c.name,
          division: c.division,
          section: section,
          person: p,
          roleTitles: matched[section],
          omitted: !!state.lb.omittedKeys[key]
        });
      });
    });
  });

  out.sort(function(a, b) {
    var sa = SECTION_ORDER.indexOf(a.section);
    var sb = SECTION_ORDER.indexOf(b.section);
    if (sa !== sb) return sa - sb;
    if (a.club !== b.club) return a.club.localeCompare(b.club);
    return (a.person.name||'').localeCompare(b.person.name||'');
  });
  return out;
}

/* For warnings: find clubs missing a dept head in a given section.
   Returns [{ section, missingClubs: [...] }] for each selected section.
   Only runs in heads mode. */
function lbMissingHeads() {
  // Two kinds of warning:
  // 1. Hierarchical section, mode=heads: clubs missing a dept head
  // 2. Checklist section: clubs missing a required role (regardless of mode)
  var depts = Object.keys(state.lb.selectedDepts);
  if (!depts.length) return [];
  var selectedClubs = Object.keys(state.lb.selectedClubs);
  if (!selectedClubs.length) return [];

  var results = [];
  depts.forEach(function(section) {
    var meta = SECTIONS_BY_KEY[section];
    if (!meta) return;

    if (meta.type === 'checklist') {
      // For each required role in the checklist, find clubs missing that role
      meta.requiredRoles.forEach(function(roleKey) {
        // Only warn for required roles the user has included in their sub-filter (or all if not filtered)
        var subFilter = state.lb.checklistRoleFilter[section];
        if (subFilter && !subFilter[roleKey]) return;
        var missing = [];
        selectedClubs.forEach(function(clubName) {
          var club = window.CLUBS.filter(function(c){ return c.name === clubName; })[0];
          if (!club) return;
          var has = club.people.some(function(p) {
            return p.roles.some(function(r){ return r.section === section && r.roleKey === roleKey; });
          });
          if (!has) missing.push(club);
        });
        if (missing.length) {
          var label = (meta.roleLabels && meta.roleLabels[roleKey]) || roleKey;
          results.push({ section: section, roleKey: roleKey, label: label + ' (' + roleKey + ')', missingClubs: missing });
        }
      });
      return;
    }

    // Hierarchical section — warn only in heads-only mode + only for required heads
    if (state.lb.mode !== 'heads') return;
    if (REQUIRED_HEAD_SECTIONS.indexOf(section) === -1) return;
    var missingH = [];
    selectedClubs.forEach(function(clubName) {
      var club = window.CLUBS.filter(function(c){ return c.name === clubName; })[0];
      if (!club) return;
      var hasHead = club.people.some(function(p) {
        return p.roles.some(function(r){ return r.section === section && r.deptHead; });
      });
      if (!hasHead) missingH.push(club);
    });
    if (missingH.length) results.push({ section: section, label: section + ' dept head', missingClubs: missingH });
  });
  return results;
}

function renderBuilderDepts() {
  var root = document.getElementById('lbDepts');
  var html = SECTION_ORDER.map(function(section) {

    var checked = state.lb.selectedDepts[section] ? 'checked' : '';
    var selected = !!state.lb.selectedDepts[section];

    var typeNote = '';

      else if (HEAD_SECTIONS.indexOf(section) === -1) typeNote = ' <span class="lb-section-count">(no head)</span>';
    }

    // If this is a checklist section AND it's selected, expose sub-role tickboxes
    var subFilters = '';
    if (meta && meta.type === 'checklist' && selected) {
      var filter = state.lb.checklistRoleFilter[section] || {};
      // Default behaviour: all required + optional ticked, free-text NOT ticked
      var filterIsEmpty = Object.keys(filter).length === 0;

      var roles = (meta.requiredRoles || []).concat(meta.optionalRoles || []);
      var subRows = roles.map(function(rk) {
        var isOptional = (meta.optionalRoles || []).indexOf(rk) !== -1;
        var label = (meta.roleLabels && meta.roleLabels[rk]) || rk;
        var chkId = 'lb-subrole-' + rk;
        var isChecked = filterIsEmpty ? true : !!filter[rk];
        return '<div class="lb-role-row">' +
          '<input type="checkbox" id="' + chkId + '" data-checklist-section="' + esc(section) + '" data-checklist-role="' + esc(rk) + '"' + (isChecked?' checked':'') + '>' +
          '<label for="' + chkId + '">' + esc(rk) + ' — ' + esc(label) + (isOptional ? ' <span class="lb-section-count">(optional)</span>' : '') + '</label>' +
        '</div>';
      }).join('');

      // Free-text extras tickbox
      var otherChecked = filterIsEmpty ? false : !!filter.__other;
      subRows += '<div class="lb-role-row">' +
        '<input type="checkbox" id="lb-subrole-other" data-checklist-section="' + esc(section) + '" data-checklist-role="__other"' + (otherChecked?' checked':'') + '>' +
        '<label for="lb-subrole-other">Other liaison roles <span class="lb-section-count">(free-text extras)</span></label>' +
      '</div>';

      subFilters = '<div class="lb-roles-in-section">' + subRows + '</div>';
    }

    // If this is a section with flag keys (e.g. Media -> programmeEditor), expose them too
    var flagFiltersHtml = '';
    if (meta && meta.flagKeys && meta.flagKeys.length && selected) {
      var ff = state.lb.flagFilter[section] || {};
      var flagRows = meta.flagKeys.map(function(fk) {
        var chkId = 'lb-flag-' + section.replace(/[^a-z0-9]+/gi,'-') + '-' + fk.key;
        var isChecked = !!ff[fk.key];
        return '<div class="lb-role-row">' +
          '<input type="checkbox" id="' + chkId + '" data-flag-section="' + esc(section) + '" data-flag-key="' + esc(fk.key) + '"' + (isChecked ? ' checked' : '') + '>' +
          '<label for="' + chkId + '">Also: <b>' + esc(fk.label) + '</b> <span class="lb-section-count">(narrow to roles with this flag)</span></label>' +
        '</div>';
      }).join('');
      flagFiltersHtml = '<div class="lb-roles-in-section">' + flagRows + '</div>';
    }

    return '<div class="lb-section-group">' +
      '<div class="lb-section-row">' +
        '<input type="checkbox" id="' + id + '" data-dept="' + esc(section) + '" ' + checked + '>' +
        '<label for="' + id + '">' + esc(section) + '</label>' +
        typeNote +
      '</div>' +
      subFilters +
      flagFiltersHtml +
    '</div>';
  }).join('');
  root.innerHTML = html;
}

function formatForCopy(format) {
  var results = lbResults().filter(function(r){ return !r.omitted; });
  var withEmail = results.filter(function(r){ return r.person.email; });

  if (format === 'named') {
    return withEmail.map(function(r) {
      return '"' + (r.person.name||'').replace(/"/g,'') + '" <' + r.person.email + '>';
    }).join('; ');
  }
  if (format === 'plain') {
    return withEmail.map(function(r) { return r.person.email; }).join('; ');
  }
  if (format === 'csv') {
    var header = 'Department,Role,Name,Club,Division,Email,Phone';
    var lines = results.map(function(r) {
      function q(s){ s = s == null ? '' : String(s); return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s; }
      return [q(r.section), q(r.roleTitles.join(' / ')), q(r.person.name),
              q(r.club), q(r.division),
              q(r.person.email || ''), q(r.person.phone || '')].join(',');
    });
    return [header].concat(lines).join('\n');
  }
  return '';
}

function copyToClipboard(text, btn) {
  function flashCopied() {
    var original = btn.textContent;
    btn.classList.add('is-copied');
    btn.textContent = '✓ Copied';
    setTimeout(function() {
      btn.classList.remove('is-copied');
      btn.textContent = original;
    }, 1600);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(flashCopied, function(err) {
      console.warn('clipboard write failed:', err);
      alert('Copy failed. Please copy manually from the list below.');
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); flashCopied(); }
    catch(err) { alert('Copy not supported in this browser.'); }
    document.body.removeChild(ta);
  }
}

/* Stable IDs on people for referencing in edit state. */

/* ---------- Club picker (unchanged from v0.8) ---------- */
function renderClubPicker(root) {
  var q = (state.manage.pickerSearch || '').toLowerCase();

  var rows = clubs.map(function(c) {

    });

      ? '<span class="pill pill--status pill--status-good">✓ all heads set</span>'

      '<b>Demo mode:</b> changes are in-memory only and reset on page reload.' +
    '</div>' +
    '<div class="mc-picker-filter">' +
      '<input type="search" placeholder="Search clubs..." id="mcPickerSearch" value="' + esc(state.manage.pickerSearch||'') + '">' +
      '<button class="btn btn--toggle btn--sm" data-div-filter=""' + (!divFilter ? ' aria-pressed="true"' : '') + '>All</button>' +
      '<button class="btn btn--toggle btn--sm" data-div-filter="National"' + (divFilter==='National' ? ' aria-pressed="true"' : '') + '>National</button>' +
      '<button class="btn btn--toggle btn--sm" data-div-filter="North"' + (divFilter==='North' ? ' aria-pressed="true"' : '') + '>North</button>' +
      '<button class="btn btn--toggle btn--sm" data-div-filter="South"' + (divFilter==='South' ? ' aria-pressed="true"' : '') + '>South</button>' +
    '</div>' +
    '<div class="mc-clubs-table">' +
      '<table>' +
        '<thead><tr>' +
          '<th>Club</th><th>Division</th><th>People</th><th>Status</th><th></th>' +
        '</tr></thead>' +
        '<tbody>' + (rows || '<tr><td colspan="5" style="padding:40px;text-align:center;color:var(--text-muted);">No clubs match</td></tr>') + '</tbody>' +

/* ---------- Editor (two surfaces) ---------- */

  var backBar = state.persona === 'admin'

    '</button>' +

  var deptsHtml = '<div class="mc-surface' + (state.manage.surface === 'departments' ? ' is-active' : '') + '" id="mcSurfaceDepts">' + renderDeptSurface(club) + '</div>';

    ? '<div class="mc-surface' + (state.manage.surface === 'details' ? ' is-active' : '') + '" id="mcSurfaceDetails">' + renderClubDetails(club) + '</div>'

/* ---------- Surface 1: People ---------- */
function renderPeopleSurface(club) {
  var q = (state.manage.peopleSearch || '').toLowerCase().trim();
  var people = club.people.slice().sort(function(a, b) {
    return (a.name||'').localeCompare(b.name||'');
  });

  // Build the HTML for each person row
  var rowsHtml = people.map(function(p) {
    var nameLower = (p.name||'').toLowerCase();
    var emailLower = (p.email||'').toLowerCase();
    if (q && nameLower.indexOf(q) === -1 && emailLower.indexOf(q) === -1) return '';

    var contactParts = [];
    if (p.email) contactParts.push('<a href="mailto:' + esc(p.email) + '" onclick="event.stopPropagation();">' + esc(p.email) + '</a>');
    if (p.phone) contactParts.push(esc(p.phone));

    // Summarise departments
    var deptMap = {};
    p.roles.forEach(function(r) {
      if (!deptMap[r.section]) deptMap[r.section] = [];
      deptMap[r.section].push(r.title);
    });
    var deptParts = Object.keys(deptMap).map(function(section) {
      var roles = deptMap[section].join(' / ');
      return '<b>' + esc(section) + '</b>: ' + esc(roles);
    });

    var selectedClass = (state.manage.editingPersonId === p._id) ? ' is-selected' : '';

    return '<div class="mc-person-card' + selectedClass + '" data-person-id="' + esc(p._id) + '">' +
      '<div class="mc-person-card-main">' +
        '<div class="mc-person-card-name">' + esc(p.name||'(unnamed)') + '</div>' +
        (contactParts.length ? '<div class="mc-person-card-contact">' + contactParts.join(' · ') + '</div>' : '') +
        (deptParts.length ? '<div class="mc-person-card-depts">' + deptParts.join(' · ') + '</div>' : '<div class="mc-person-card-depts"><i>No department assignments</i></div>') +
      '</div>' +
      '<div class="mc-person-card-actions">' +
        '<button class="btn btn--secondary btn--sm" data-edit-person="' + esc(p._id) + '">Edit</button>' +
      '</div>' +
    '</div>';
  }).filter(Boolean).join('');

  if (!rowsHtml) {
    rowsHtml = '<div style="padding:40px;text-align:center;color:var(--text-muted);font-size:13px;">' +
      (q ? 'No people match "' + esc(q) + '"' : 'No people yet. Click Add Person to add the first.') +
    '</div>';
  }

  return '<div class="mc-people-actions">' +
    '<input type="search" class="mc-people-search" placeholder="Search people by name or email..." id="mcPeopleSearch" value="' + esc(state.manage.peopleSearch||'') + '">' +
    '<button class="btn btn--primary" id="mcAddPersonBtn">+ Add person</button>' +
  '</div>' +
  '<div class="mc-people-list">' + rowsHtml + '</div>';
}

/* ---------- Person side-panel ---------- */
function renderPersonPanel(club) {
  var isNew = state.manage.editingPersonId === 'new';

  if (!isNew && !person) return '';

  var draft = state.manage.personDraft || (person ? {
    name: person.name || '',
    email: person.email || '',
    phone: person.phone || '',
    primaryRoleIdx: (function(){
      if (!person) return null;
      var idx = person.roles.findIndex(function(r){ return r.main; });
      return idx === -1 ? (person.roles.length ? 0 : null) : idx;
    })(),
  } : { name: '', email: '', phone: '', primaryRoleIdx: null });

  // Seed draft.primaryRoleIdx if missing (first mount after state only had name/email/phone)
  if (!isNew && person && typeof draft.primaryRoleIdx === 'undefined') {
    var idx = person.roles.findIndex(function(r){ return r.main; });
    draft.primaryRoleIdx = idx === -1 ? (person.roles.length ? 0 : null) : idx;

    }).join('');
  } else if (!isNew) {

  }

  return '<div class="mc-person-panel-overlay" id="mcPanelOverlay"></div>' +
    '<div class="mc-person-panel" id="mcPersonPanel">' +
      '<div class="mc-person-panel__hd">' +
        '<div>' +
          '<h3>' + (isNew ? 'Add new person' : 'Edit person') + '</h3>' +
          '<div class="mc-person-panel__hd-sub">' + esc(club.name) + '</div>' +
        '</div>' +
        '<button class="btn-icon" id="mcPanelClose">×</button>' +
      '</div>' +
      '<div class="mc-person-panel__body">' +
        '<div class="mc-person-panel__field">' +
          '<label>Full name</label>' +
          '<input type="text" id="mcPanelName" value="' + esc(draft.name) + '" placeholder="e.g. Jane Smith">' +
        '</div>' +
        '<div class="mc-person-panel__field">' +
          '<label>Email</label>' +
          '<input type="email" id="mcPanelEmail" value="' + esc(draft.email) + '" placeholder="jane@club.co.uk">' +
        '</div>' +
        '<div class="mc-person-panel__field">' +
          '<label>Phone</label>' +
          '<input type="tel" id="mcPanelPhone" value="' + esc(draft.phone) + '" placeholder="01234 567890">' +
        '</div>' +
        (!isNew ? '<div class="mc-person-panel__depts-section">' +
          '<h4>Department assignments — pick primary</h4>' +
          deptsHtml +
          '<div class="mc-person-panel__help">The <b>primary</b> role is the one that represents them on business cards and in exports. Name, email and phone edits apply wherever this person appears. Add or remove roles in the <b>Department assignments</b> tab.</div>' +
        '</div>' : '<div class="mc-person-panel__help">After saving, assign this person to a department in the <b>Department assignments</b> tab. Their first role becomes their primary automatically.</div>') +
      '</div>' +
      '<div class="mc-person-panel__ftr">' +
        (isNew ? '<span></span>' : '<button class="btn btn--danger" id="mcPanelDelete">Delete person entirely</button>') +
        '<div style="display:flex;gap:8px;">' +
          '<button class="btn btn--secondary" id="mcPanelCancel">Cancel</button>' +
          '<button class="btn btn--primary" id="mcPanelSave">Save</button>' +
        '</div>' +
      '</div>' +
