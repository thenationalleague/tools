<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Club Directory — NL Tools</title>
<!--
  club-directory / index.html
  v0.1 — Static demo, all 6 layouts toggleable, no Firebase yet

  Changelog:
  v0.1 — Initial static demo: 72 clubs inline, 4 club-page styles, 2 listing styles

  Notes for future work:
  - Replace window.CLUBS inline data with RTDB read
  - Add auth-guard.js wiring once auth is decided
  - The `data-view` attribute on <body> controls which layouts render
-->
<style>
  /* ============== Font ============== */
  @font-face {
    font-family: "carbona-variable";
    src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
         url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
    font-display: swap; font-style: normal; font-weight: 200 900; font-stretch: normal;
  }

  /* ============== Tokens ============== */
  :root {
    --primary:     #9e0000;
    --primary-dim: #7a0000;
    --navy:        #223b7c;
    --navy-mid:    #1a2f63;
    --navy-light:  #2a4a8c;
    --red:         #c0392b;
    --red-light:   #fdf0ef;
    --green:       #1e7e34;
    --green-light: #edf7ee;
    --amber:       #e67e22;
    --amber-light: #fef6ec;
    --white:       #ffffff;
    --off-white:   #f4f6f9;
    --text:        #1a2a44;
    --text-muted:  #5a6a82;
    --border:      #dde3ed;
    --radius:      6px;
    --shadow:      0 2px 12px rgba(10,22,40,0.10);
    --font:        'carbona-variable','carbona',sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    font-variation-settings: 'wght' 400;
    color: var(--text);
    background: var(--off-white);
  }
  a { color: var(--navy); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ============== Topbar ============== */
  .topbar {
    background: var(--primary);
    color: var(--white);
    padding: 0 20px;
    height: 72px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    border-bottom: 7px solid var(--navy);
    width: 100%;
  }
  .topbar__logo { height: 42px; flex-shrink: 0; }
  .topbar__title-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; line-height: 1; gap: 3px; }
  .topbar__title {
    font-weight: 900; font-variation-settings: 'wght' 900;
    font-size: 20px; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar__kicker {
    font-size: 9px; font-weight: 700; font-variation-settings: 'wght' 700;
    text-transform: uppercase; letter-spacing: 0.18em; color: rgba(255,255,255,0.6); white-space: nowrap;
  }
  .topbar__btn {
    background: none; border: 1px solid rgba(255,255,255,0.3); color: var(--white);
    padding: 7px 14px; border-radius: var(--radius); font-size: 11px;
    font-weight: 700; font-variation-settings: 'wght' 700; text-transform: uppercase;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s;
    font-family: var(--font); text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0;
  }
  .topbar__btn:hover { background: rgba(255,255,255,0.12); }
  @media (max-width: 700px) {
    .topbar { padding: 0 14px; gap: 10px; }
    .topbar__btn-text-portal { display: none; }
    .topbar__title { font-size: 17px; }
  }

  /* ============== Demo toolbar ============== */
  .demo-bar {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    position: sticky; top: 72px; z-index: 50;
  }
  .demo-bar__group { display: flex; gap: 2px; align-items: center; background: var(--off-white); padding: 4px; border-radius: 6px; }
  .demo-bar__label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    font-weight: 800; font-variation-settings: 'wght' 800;
    color: var(--text-muted); padding: 0 8px 0 4px;
  }
  .demo-bar__btn {
    background: none; border: none; padding: 6px 12px;
    font-family: var(--font); font-size: 12px; font-weight: 600;
    font-variation-settings: 'wght' 600; color: var(--text);
    border-radius: 4px; cursor: pointer; transition: all 0.12s;
  }
  .demo-bar__btn:hover { background: rgba(0,0,0,0.04); }
  .demo-bar__btn[aria-pressed="true"] { background: var(--navy); color: var(--white); }
  .demo-bar__search {
    flex: 1; min-width: 200px; max-width: 360px; margin-left: auto;
    font-family: var(--font); font-size: 14px;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; background: var(--white); color: var(--text);
  }
  .demo-bar__search:focus { outline: none; border-color: var(--navy); }

  /* ============== Page layout ============== */
  .page { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; font-variation-settings: 'wght' 600;
    color: var(--navy); cursor: pointer; margin-bottom: 16px;
    padding: 6px 0;
  }
  .back-link:hover { text-decoration: underline; }

  /* Show one scene at a time */
  .scene { display: none; }
  .scene--active { display: block; }

  /* ================================================================
     CLUB PAGE STYLE 1 — Clean Cards
     ================================================================ */
  .s1-club { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 28px 32px; }
  .s1-header { border-bottom: 3px solid var(--navy); padding-bottom: 18px; margin-bottom: 4px; display: flex; gap: 20px; align-items: flex-start; }
  .s1-crest { width: 64px; height: 64px; flex-shrink: 0; object-fit: contain; }
  .s1-header h2 { margin: 0 0 6px 0; font-size: 26px; font-weight: 900; font-variation-settings: 'wght' 900; letter-spacing: -0.01em; color: var(--text); }
  .s1-meta { font-size: 13px; color: var(--text-muted); margin-top: 3px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .s1-meta a { color: var(--navy); }
  .s1-div { font-size: 10px; padding: 3px 9px; border-radius: 2px; color: var(--white); font-weight: 800; font-variation-settings: 'wght' 800; letter-spacing: 0.12em; }
  .s1-div--national { background: var(--navy); }
  .s1-div--north { background: #c47600; }
  .s1-div--south { background: #0a6342; }
  .s1-section { margin-top: 28px; }
  .s1-sec-label { font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; color: var(--primary); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 12px; }
  .s1-dir-list { font-size: 14px; color: var(--text); padding: 12px 16px; background: var(--off-white); border-left: 3px solid var(--navy); border-radius: 0 4px 4px 0; line-height: 1.7; }
  .s1-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .s1-person { padding: 12px 14px; border: 1px solid var(--border); border-radius: 4px; background: var(--white); transition: border-color 0.15s; }
  .s1-person:hover { border-color: var(--navy); }
  .s1-name { font-weight: 700; font-variation-settings: 'wght' 700; font-size: 15px; }
  .s1-role { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
  .s1-also { color: var(--text-muted); font-style: italic; margin-left: 4px; font-size: 12px; opacity: 0.8; }
  .s1-note { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 3px; }
  .s1-contact { font-size: 12px; color: var(--text-muted); margin-top: 6px; padding-top: 6px; border-top: 1px solid #f0f2f5; display: flex; flex-wrap: wrap; gap: 8px; }
  .s1-contact a { color: var(--navy); }

  /* ================================================================
     CLUB PAGE STYLE 2 — Dense Table
     ================================================================ */
  .s2-club { background: var(--white); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .s2-header { padding: 24px 28px 22px; background: var(--navy); color: var(--white); display: flex; gap: 20px; align-items: flex-start; }
  .s2-crest { width: 56px; height: 56px; flex-shrink: 0; background: var(--white); border-radius: 4px; padding: 4px; }
  .s2-header h2 { margin: 0; font-size: 22px; display: flex; align-items: center; gap: 12px; font-weight: 900; font-variation-settings: 'wght' 900; }
  .s2-div { font-size: 10px; padding: 3px 10px; border-radius: 2px; background: rgba(255,255,255,0.2); font-weight: 700; font-variation-settings: 'wght' 700; letter-spacing: 0.1em; }
  .s2-addr { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 6px; }
  .s2-addr a { color: rgba(255,255,255,0.95); }
  .s2-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .s2-table th { text-align: left; padding: 10px 16px; background: #f0f2f5; font-weight: 800; font-variation-settings: 'wght' 800; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  .s2-table td { padding: 9px 16px; border-bottom: 1px solid #f0f2f5; vertical-align: top; }
  .s2-sec-hd { background: #fafbfc !important; font-weight: 800 !important; font-variation-settings: 'wght' 800 !important; font-size: 10px !important; text-transform: uppercase; letter-spacing: 0.14em; color: var(--primary) !important; padding: 10px 16px !important; }
  .s2-dir-list { font-size: 13px; color: var(--text); background: #fafbfc; font-style: italic; line-height: 1.7; }
  .s2-role { font-weight: 600; font-variation-settings: 'wght' 600; color: var(--text); width: 28%; }
  .s2-name { width: 22%; font-weight: 600; font-variation-settings: 'wght' 600; }
  .s2-phone { width: 18%; color: var(--text-muted); font-size: 12px; }
  .s2-email { width: 32%; font-size: 12px; }
  .s2-also { font-size: 10px; background: var(--primary); color: var(--white); padding: 1px 5px; border-radius: 2px; margin-left: 6px; font-weight: 700; font-variation-settings: 'wght' 700; vertical-align: 1px; }

  /* ================================================================
     CLUB PAGE STYLE 3 — Editorial
     ================================================================ */
  .s3-club { padding: 56px 56px; background: var(--white); border-radius: 8px; max-width: 820px; margin: 0 auto; border: 1px solid var(--border); }
  .s3-kicker { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--primary); font-weight: 800; font-variation-settings: 'wght' 800; margin-bottom: 14px; }
  .s3-top { display: flex; gap: 28px; align-items: flex-start; }
  .s3-crest { width: 88px; height: 88px; flex-shrink: 0; }
  .s3-name-lg { margin: 0; font-size: 56px; font-weight: 200; font-variation-settings: 'wght' 200; letter-spacing: -0.02em; line-height: 0.95; color: var(--text); }
  .s3-addr { margin-top: 16px; font-size: 15px; color: var(--text-muted); font-style: italic; }
  .s3-club-meta { margin-top: 6px; font-size: 13px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .s3-club-meta a { color: var(--navy); }
  .s3-section { margin-top: 44px; padding-top: 22px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 60px 1fr; gap: 28px; }
  .s3-sec-num { font-weight: 200; font-variation-settings: 'wght' 200; font-size: 44px; color: var(--primary); line-height: 1; letter-spacing: -0.03em; }
  .s3-sec-title { font-weight: 800; font-variation-settings: 'wght' 800; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text); padding-top: 14px; }
  .s3-dir-list { grid-column: 2; font-size: 16px; line-height: 1.9; color: var(--text); margin-top: 10px; }
  .s3-person { grid-column: 2; margin-top: 22px; }
  .s3-person:first-of-type { margin-top: 8px; }
  .s3-role { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--primary); }
  .s3-also { color: var(--text-muted); font-weight: 400; font-variation-settings: 'wght' 400; text-transform: none; letter-spacing: 0; font-style: italic; font-size: 11px; }
  .s3-name-person { font-size: 22px; font-weight: 500; font-variation-settings: 'wght' 500; margin-top: 3px; letter-spacing: -0.01em; }
  .s3-note { font-size: 13px; color: var(--text-muted); font-style: italic; }
  .s3-contact { font-size: 13px; color: var(--text-muted); margin-top: 5px; }
  .s3-contact a { color: var(--navy); border-bottom: 1px solid var(--border); }
  .s3-contact a:hover { text-decoration: none; border-bottom-color: var(--navy); }

  /* ================================================================
     CLUB PAGE STYLE 4 — Role-First
     ================================================================ */
  .s4-club { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 28px 32px; }
  .s4-header { display: flex; align-items: center; gap: 20px; margin-bottom: 12px; }
  .s4-crest { width: 56px; height: 56px; flex-shrink: 0; }
  .s4-header h2 { margin: 0; font-size: 26px; font-weight: 900; font-variation-settings: 'wght' 900; letter-spacing: -0.01em; }
  .s4-div { font-size: 10px; padding: 3px 9px; border-radius: 2px; color: var(--white); font-weight: 800; font-variation-settings: 'wght' 800; letter-spacing: 0.12em; }
  .s4-div--national { background: var(--navy); }
  .s4-div--north { background: #c47600; }
  .s4-div--south { background: #0a6342; }
  .s4-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; margin-left: 76px; }
  .s4-meta a { color: var(--navy); }
  .s4-section { margin-top: 26px; }
  .s4-sec-bar {
    font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--white);
    background: var(--navy); display: inline-block; padding: 5px 12px;
    border-radius: 2px; margin-bottom: 12px;
  }
  .s4-row { display: grid; grid-template-columns: 260px 1fr; gap: 16px; padding: 10px 0; border-bottom: 1px solid #f0f2f5; align-items: start; }
  .s4-row:last-child { border-bottom: none; }
  .s4-role-pill { font-size: 12px; font-weight: 700; font-variation-settings: 'wght' 700; color: var(--navy); background: #eef2f8; padding: 7px 12px; border-radius: 3px; border-left: 3px solid var(--navy); }
  .s4-name { font-weight: 700; font-variation-settings: 'wght' 700; font-size: 14px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .s4-sec-role { font-size: 10px; background: #f5e8e8; color: var(--primary); padding: 2px 7px; border-radius: 2px; font-weight: 700; font-variation-settings: 'wght' 700; }
  .s4-contact { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
  .s4-contact a { color: var(--navy); }
  .s4-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .s4-dir-chip { font-size: 12px; padding: 5px 11px; background: var(--off-white); border: 1px solid var(--border); border-radius: 14px; color: var(--text); }

  /* ================================================================
     LISTING 1 — Card Grid
     ================================================================ */
  .l1-division { margin-bottom: 32px; }
  .l1-div-hd {
    font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 800; font-variation-settings: 'wght' 800;
    padding: 8px 14px; display: inline-flex; align-items: baseline; gap: 10px;
    color: var(--white); margin: 0 0 14px 0; border-radius: 3px;
  }
  .l1-div-hd span { font-size: 10px; opacity: 0.75; letter-spacing: 0.1em; font-weight: 600; font-variation-settings: 'wght' 600; }
  .l1-div-hd--national { background: var(--navy); }
  .l1-div-hd--north { background: #c47600; }
  .l1-div-hd--south { background: #0a6342; }
  .l1-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .l1-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 16px; cursor: pointer; transition: all 0.15s;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .l1-card:hover { border-color: var(--navy); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(10,22,40,0.08); }
  .l1-crest { width: 40px; height: 40px; flex-shrink: 0; }
  .l1-card-body { flex: 1; min-width: 0; }
  .l1-card h3 { margin: 0; font-size: 15px; font-weight: 700; font-variation-settings: 'wght' 700; letter-spacing: -0.01em; }
  .l1-addr { font-size: 12px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .l1-key { margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f2f5; }
  .l1-key-role { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); font-weight: 700; font-variation-settings: 'wght' 700; }
  .l1-key-name { font-size: 13px; font-weight: 600; font-variation-settings: 'wght' 600; margin-top: 1px; }
  .l1-stats { margin-top: 6px; font-size: 11px; color: var(--text-muted); }

  /* ================================================================
     LISTING 2 — Compact Table
     ================================================================ */
  .l2-division { margin-bottom: 30px; }
  .l2-div-hd {
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 800; font-variation-settings: 'wght' 800;
    padding: 8px 14px; color: var(--white); margin: 0; display: flex; align-items: baseline; gap: 10px;
    border-radius: 3px 3px 0 0;
  }
  .l2-div-hd span { font-size: 10px; opacity: 0.75; letter-spacing: 0.1em; font-weight: 600; font-variation-settings: 'wght' 600; }
  .l2-div-hd--national { background: var(--navy); }
  .l2-div-hd--north { background: #c47600; }
  .l2-div-hd--south { background: #0a6342; }
  .l2-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--white); border: 1px solid var(--border); border-top: none; }
  .l2-table th {
    text-align: left; padding: 9px 14px; background: #fafbfc;
    font-weight: 800; font-variation-settings: 'wght' 800;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); border-bottom: 1px solid var(--border);
  }
  .l2-table td { padding: 8px 14px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
  .l2-table tr { cursor: pointer; transition: background 0.1s; }
  .l2-table tbody tr:hover { background: var(--off-white); }
  .l2-name-cell { display: flex; align-items: center; gap: 10px; }
  .l2-crest { width: 22px; height: 22px; flex-shrink: 0; }
  .l2-name { font-weight: 700; font-variation-settings: 'wght' 700; }
  .l2-sec { color: var(--text); }
  .l2-email { font-size: 12px; }
  .l2-email a { color: var(--navy); }
  .l2-ppl { text-align: center; font-size: 12px; color: var(--text-muted); font-weight: 600; font-variation-settings: 'wght' 600; width: 60px; }
  .l2-action { width: 60px; text-align: right; }
  .l2-action a { font-size: 12px; color: var(--primary); font-weight: 700; font-variation-settings: 'wght' 700; }

  /* ============== Mobile tweaks ============== */
  @media (max-width: 700px) {
    .page { padding: 16px 12px 60px; }
    .s1-club, .s2-club, .s4-club { padding: 20px 18px; }
    .s3-club { padding: 32px 24px; }
    .s3-top { flex-direction: column; gap: 16px; }
    .s3-crest { width: 64px; height: 64px; }
    .s3-name-lg { font-size: 40px; }
    .s3-section { grid-template-columns: 40px 1fr; gap: 16px; }
    .s3-sec-num { font-size: 30px; }
    .s4-row { grid-template-columns: 1fr; gap: 4px; }
    .s4-role-pill { justify-self: start; }
    .s4-meta { margin-left: 0; }
    .s1-header, .s4-header, .s2-header { flex-direction: column; gap: 10px; }
    .s2-table, .l2-table { font-size: 12px; }
    .s2-table td, .l2-table td { padding: 8px 10px; }
    .l1-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 500px) {
    .s2-phone, .l2-email { display: none; }
  }
</style>
</head>
<body>

<!-- ============== Topbar ============== -->
<header class="topbar">
  <img class="topbar__logo"
    src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png"
    alt="National League"
    onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
  <div class="topbar__title-wrap">
    <span class="topbar__title">Club Directory</span>
    <span class="topbar__kicker">NL Tools</span>
  </div>
  <a href="/tools/portal/" class="topbar__btn" aria-label="Back to portal">
    <span>←</span><span class="topbar__btn-text-portal">Portal</span>
  </a>

// ---------- small helpers ----------
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
  });
}
function slug(name) {
  return (name || '').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}
function crestUrl(name) {
  return 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/' +
    encodeURIComponent(name) + '.png';
}
function fallbackCrest() {
  return 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png';
}
function groupPeople(club) {
  var g = {};
  for (var i=0; i<club.people.length; i++) {
    var p = club.people[i];
    if (!g[p.section]) g[p.section] = [];
    g[p.section].push(p);
  }
  return g;
}
function townFromAddr(addr) {
  if (!addr) return '';
  var parts = addr.split(',').map(function(s){ return s.trim(); });
  // try second-to-last (before postcode)
  if (parts.length >= 2) return parts[parts.length - 2];
  return parts[0] || '';
}
function contactBits(p) {
  var bits = [];
  if (p.phone) bits.push('<span>' + esc(p.phone) + '</span>');
  if (p.email) bits.push('<a href="mailto:' + esc(p.email) + '">' + esc(p.email) + '</a>');
  return bits;
}

function renderClubStyle1(club) {
  var groups = groupPeople(club);
  var sections = '';

    if (!groups[s]) return;
    if (s === 'Directors') {
      var names = groups[s].filter(function(p){return p.name;}).map(function(p){return esc(p.name);}).join(', ');
      sections += '<div class="s1-section">' +
        '<div class="s1-sec-label">Directors</div>' +
        '<div class="s1-dir-list">' + names + '</div>' +
      '</div>';
      return;
    }
    var items = groups[s].map(function(p) {
      var sec = p.secondaryRoles && p.secondaryRoles.length
        ? '<span class="s1-also">also: ' + p.secondaryRoles.map(esc).join(', ') + '</span>' : '';
      var note = p.note ? '<div class="s1-note">' + esc(p.note) + '</div>' : '';
      var bits = contactBits(p);
      var contact = bits.length ? '<div class="s1-contact">' + bits.join(' · ') + '</div>' : '';
      return '<div class="s1-person">' +
        '<div class="s1-name">' + esc(p.name) + '</div>' +
        '<div class="s1-role">' + esc(p.primaryRole) + sec + '</div>' +
        note + contact +
      '</div>';
    }).join('');
    sections += '<div class="s1-section">' +
      '<div class="s1-sec-label">' + esc(s) + '</div>' +
      '<div class="s1-grid">' + items + '</div>' +
    '</div>';
  });
  return '<div class="s1-club">' +
    '<div class="s1-header">' +
      '<img class="s1-crest" src="' + crestUrl(club.name) + '" alt="" onerror="this.onerror=null;this.src=\'' + fallbackCrest() + '\'">' +

    if (c.name.toLowerCase().indexOf(q) !== -1) return true;
    if ((c.address_raw||'').toLowerCase().indexOf(q) !== -1) return true;
    return c.people.some(function(p) {
      return (p.name||'').toLowerCase().indexOf(q) !== -1 ||
             (p.primaryRole||'').toLowerCase().indexOf(q) !== -1 ||
             (p.secondaryRoles||[]).some(function(r){ return r.toLowerCase().indexOf(q) !== -1; });
    });
  });
}

function renderListing() {
  var clubs = filteredClubs();
  var root = document.getElementById('listing-root');
  if (!clubs.length) {
    root.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">No clubs match "' + esc(state.searchQuery) + '"</div>';
    return;
  }
  root.innerHTML = LIST_STYLE_RENDERERS[state.listStyle](clubs);

  // Attach click handlers
  var cards = root.querySelectorAll('[data-club]');
  cards.forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      state.viewing = el.getAttribute('data-club');
      showScene();
    });
  });
}

function renderClub() {
  var club = window.CLUBS.filter(function(c){return c.name===state.viewing;})[0];
  var root = document.getElementById('club-root');
  if (!club) { root.innerHTML = '<div>Club not found</div>'; return; }
  root.innerHTML = CLUB_STYLE_RENDERERS[state.clubStyle](club);
}

function showScene() {
  var listing = document.getElementById('scene-listing');
  var club = document.getElementById('scene-club');
  if (state.viewing) {
    listing.classList.remove('scene--active');
    club.classList.add('scene--active');
    renderClub();
    window.scrollTo(0, 0);
  } else {
    club.classList.remove('scene--active');
    listing.classList.add('scene--active');
    renderListing();
  }
}

// ============================================================
// WIRING
// ============================================================
document.addEventListener('DOMContentLoaded', function() {

  // Club style toggle
  var clubGroup = document.getElementById('clubStyleGroup');
  clubGroup.addEventListener('click', function(e) {
    var b = e.target.closest('[data-club-style]');
    if (!b) return;
    state.clubStyle = b.getAttribute('data-club-style');
    clubGroup.querySelectorAll('[data-club-style]').forEach(function(x) {
      x.setAttribute('aria-pressed', x === b ? 'true' : 'false');
    });
    if (state.viewing) renderClub();
  });

  // List style toggle
  var listGroup = document.getElementById('listStyleGroup');
  listGroup.addEventListener('click', function(e) {
    var b = e.target.closest('[data-list-style]');
    if (!b) return;
    state.listStyle = b.getAttribute('data-list-style');
    listGroup.querySelectorAll('[data-list-style]').forEach(function(x) {
      x.setAttribute('aria-pressed', x === b ? 'true' : 'false');
    });
    if (!state.viewing) renderListing();
  });

  // Search
  var search = document.getElementById('searchBox');
  var searchTimer;
  search.addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      state.searchQuery = search.value;
      if (!state.viewing) renderListing();
    }, 150);
  });

  // Back link
  document.getElementById('backLink').addEventListener('click', function(e) {
    e.preventDefault();
    state.viewing = null;
    showScene();
  });

  // Initial render
  showScene();
});
</script>
</body>
</html>
