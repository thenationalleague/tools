}

/* ---------- Surface 2: Department assignments ---------- */
function renderDeptSurface(club) {
  var html = '';
  SECTION_ORDER.forEach(function(section) {
    html += renderDeptCard(club, section);
  });
  return html;
}

function renderDeptCard(club, section) {
  var meta = SECTIONS_BY_KEY[section];
  if (!meta) return '';

  // Collect (person, role) entries for this section
  var entries = [];
  club.people.forEach(function(p) {
    p.roles.forEach(function(r) {
      if (r.section === section) entries.push({ person: p, role: r });
    });
  });

  var isEditing = state.manage.editingDeptSection === section;
  var hasData = entries.length > 0;
  var isChecklist = meta.type === 'checklist';
  var isHeadSection = HEAD_SECTIONS.indexOf(section) !== -1;
  var isRequiredHead = REQUIRED_HEAD_SECTIONS.indexOf(section) !== -1;

  // Warning logic differs by section type
  var warning = '';
  var hasMissingRequired = false;
  if (isChecklist) {
    var missingKeys = (meta.requiredRoles || []).filter(function(rk) {
      return !entries.some(function(e){ return e.role.roleKey === rk; });
    });
    if (missingKeys.length) {
      hasMissingRequired = true;
      warning = '<span class="pill pill--status pill--status-warn">⚠ Missing: ' + missingKeys.join(', ') + '</span>';
    }
  } else if (isRequiredHead) {
    var missingHead = hasData && !entries.some(function(e){ return e.role.deptHead; });
    var multipleHeads = entries.filter(function(e){ return e.role.deptHead; }).length > 1;
    if (missingHead) { warning = '<span class="pill pill--status pill--status-warn">⚠ No dept head</span>'; hasMissingRequired = true; }
    else if (multipleHeads) warning = '<span class="pill pill--status pill--status-warn">⚠ Multiple heads</span>';
  }

  // Skip empty hierarchical sections that don't have a head concept (Directors with no directors etc)
  // Skip empty hierarchical sections that don't have a head concept, UNLESS
  // the section is explicitly alwaysShow (e.g. 'Other')
  if (!hasData && !isHeadSection && !isChecklist && !meta.alwaysShow) return '';

  var headerActions = '';
  if (!isEditing) {
    headerActions = '<button class="btn btn--secondary btn--sm" data-edit-dept-section="' + esc(section) + '">Edit</button>';
  }

  // Body — route by section type and edit state
  var body;
  if (isChecklist) {
    body = isEditing
      ? renderChecklistEditBody(club, section, meta, entries)
      : renderChecklistViewBody(section, meta, entries);
  } else {
    body = isEditing
      ? renderDeptEditBody(club, section, entries)
      : renderDeptViewBody(section, entries);
  }

  var subtitleHtml = meta.subtitle
    ? '<div class="mc-dept-subtitle">' + esc(meta.subtitle) + '</div>'
    : '';

  return '<div class="mc-dept-card' + (isEditing ? ' is-editing' : '') + (hasMissingRequired ? ' mc-dept-card--missing' : '') + '" data-section="' + esc(section) + '">' +
    '<div class="mc-dept-hd">' +
      '<div><h3 style="display:inline-block;">' + esc(section) + '</h3>' + warning + '</div>' +
      headerActions +
    '</div>' +
    subtitleHtml +
    body +
  '</div>';
}

/* ---- Checklist section body (view mode) ---- */
function renderChecklistViewBody(section, meta, entries) {
  // Render one row per required + optional slot, filled or empty
  var allSlots = (meta.requiredRoles || []).concat(meta.optionalRoles || []);
  var slotsHtml = allSlots.map(function(rk) {
    var isOpt = (meta.optionalRoles || []).indexOf(rk) !== -1;
    var label = (meta.roleLabels && meta.roleLabels[rk]) || rk;
    var filled = entries.filter(function(e){ return e.role.roleKey === rk; });

    if (!filled.length) {
      return '<div class="mc-assignment-row mc-checklist-slot' + (isOpt ? ' mc-checklist-slot--optional' : ' mc-checklist-slot--missing') + '">' +
        '<div class="mc-assignment-name"><span class="pill pill--identifier">' + esc(rk) + '</span> ' + esc(label) + '</div>' +
        '<div class="mc-assignment-role"><i style="color:var(--text-muted);">— not assigned' + (isOpt ? ' (optional)' : '') + ' —</i></div>' +
        '<div></div><div></div>' +
      '</div>';
    }

    return filled.map(function(e) {
      var p = e.person, r = e.role;
      return '<div class="mc-assignment-row mc-checklist-slot">' +
        '<div class="mc-assignment-name"><span class="pill pill--identifier">' + esc(rk) + '</span> ' + esc(p.name) + '</div>' +
        '<div class="mc-assignment-role">' + esc(r.title) + '</div>' +
        '<div></div><div></div>' +
      '</div>';
    }).join('');
  }).join('');

  // Plus any free-text extras (roleKey not set)
  var extras = entries.filter(function(e){ return !e.role.roleKey; });
  var extrasHtml = '';
  if (extras.length) {
    extrasHtml = '<div class="mc-checklist-extras-label">Other liaison roles</div>' +
      extras.map(function(e) {
        return '<div class="mc-assignment-row">' +
          '<div class="mc-assignment-name">' + esc(e.person.name) + '</div>' +
          '<div class="mc-assignment-role">' + esc(e.role.title) + '</div>' +
          '<div></div><div></div>' +
        '</div>';
      }).join('');
  }

  return slotsHtml + extrasHtml;
}

/* ---- Checklist section body (edit mode) ---- */
function renderChecklistEditBody(club, section, meta, entries) {
  var drafts = state.manage.checklistDrafts || {};

  // Build person options (alphabetical)
  var peopleSorted = club.people.slice().sort(function(a,b){return (a.name||'').localeCompare(b.name||'');});
  function personOptions(selectedId) {
    return '<option value="">— Pick a person —</option>' +
      peopleSorted.map(function(x) {
        return '<option value="' + esc(x._id) + '"' + (x._id === selectedId ? ' selected' : '') + '>' + esc(x.name) + '</option>';
      }).join('');
  }

  // One row per required + optional slot
  var allSlots = (meta.requiredRoles || []).concat(meta.optionalRoles || []);
  var slotRows = allSlots.map(function(rk) {
    var isOpt = (meta.optionalRoles || []).indexOf(rk) !== -1;
    var label = (meta.roleLabels && meta.roleLabels[rk]) || rk;
    var existing = entries.filter(function(e){ return e.role.roleKey === rk; })[0];
    var draftKey = 'slot|' + rk;
    if (!drafts[draftKey]) {
      drafts[draftKey] = {
        roleKey: rk,
        personId: existing ? existing.person._id : '',
        _originalPersonId: existing ? existing.person._id : null,
      };
    }
    var d = drafts[draftKey];
    var removeBtn = existing
      ? '<button class="btn-icon btn-icon--danger" data-clear-slot="' + esc(draftKey) + '" title="Clear">×</button>'
      : '<span></span>';
    return '<div class="mc-assignment-edit-row" data-draft-key="' + esc(draftKey) + '">' +
      '<div><span class="pill pill--identifier">' + esc(rk) + '</span> ' + esc(label) + (isOpt ? ' <span style="color:var(--text-muted);font-size:11px;">(optional)</span>' : '') + '</div>' +
      '<select data-checklist-draft-key="' + esc(draftKey) + '">' + personOptions(d.personId) + '</select>' +
      '<span></span>' +
      removeBtn +
    '</div>';
  }).join('');

  // Free-text extras (existing, editable) + optional add-new
  var extras = entries.filter(function(e){ return !e.role.roleKey; });
  var extrasRows = extras.map(function(e) {
    var p = e.person, r = e.role;
    var extraKey = 'extra|' + p._id + '|' + r.title;
    if (!drafts[extraKey]) {
      drafts[extraKey] = {
        isExtra: true,
        personId: p._id,
        roleTitle: r.title,
        _originalPersonId: p._id,
        _originalTitle: r.title,
      };
    }
    var d = drafts[extraKey];
    return '<div class="mc-assignment-edit-row" data-draft-key="' + esc(extraKey) + '">' +
      '<select data-checklist-draft-key="' + esc(extraKey) + '" data-draft-field="personId">' + personOptions(d.personId) + '</select>' +
      '<input type="text" data-checklist-draft-key="' + esc(extraKey) + '" data-draft-field="roleTitle" value="' + esc(d.roleTitle) + '" placeholder="Role title">' +
      '<span></span>' +
      '<button class="btn-icon btn-icon--danger" data-remove-extra="' + esc(extraKey) + '" title="Remove">×</button>' +
    '</div>';
  }).join('');

  // Add-new-extra row
  var addExtraHtml = '';
  if (state.manage.checklistAddDraft && state.manage.checklistAddDraft.section === section) {
    var nd = state.manage.checklistAddDraft;
    addExtraHtml = '<div class="mc-assignment-edit-row" style="border:1px dashed var(--primary);">' +
      '<select id="mcChecklistAddPerson">' + personOptions(nd.personId) + '</select>' +
      '<input type="text" id="mcChecklistAddTitle" value="' + esc(nd.roleTitle||'') + '" placeholder="Role title (e.g. Deputy DLO)">' +
      '<span></span>' +
      '<button class="btn-icon btn-icon--danger" id="mcChecklistAddCancel">×</button>' +
    '</div>';
  }

  state.manage.checklistDrafts = drafts;

  var addBtn = state.manage.checklistAddDraft
    ? ''
    : '<button class="btn-add" data-add-checklist-extra="' + esc(section) + '">+ Add other liaison role</button>';

  var extrasLabel = (extras.length || state.manage.checklistAddDraft) ? '<div class="mc-checklist-extras-label">Other liaison roles</div>' : '';

  var footer = '<div class="mc-dept-footer">' +
    '<button class="btn btn--secondary" data-cancel-dept="' + esc(section) + '">Cancel</button>' +
    '<button class="btn btn--primary" data-save-checklist="' + esc(section) + '">Save changes</button>' +
  '</div>';

  return slotRows + extrasLabel + extrasRows + addExtraHtml + addBtn + footer;
}

function renderDeptViewBody(section, entries) {
  if (!entries.length) {
    return '<div class="mc-dept-empty">No assignments yet.</div>';
  }
  var rows = entries.map(function(e) {
    var p = e.person, r = e.role;
    return '<div class="mc-assignment-row' + (r.deptHead ? ' is-head' : '') + '">' +
      '<div class="mc-assignment-name">' + esc(p.name) + '</div>' +
      '<div class="mc-assignment-role">' + esc(r.title) + '</div>' +
      (r.deptHead ? '<div class="pill pill--marker">Head</div>' : '<div></div>') +
      '<div></div>' +
    '</div>';
  }).join('');
  return rows;
}

/* ---------- Actions: People surface ---------- */

function openPersonPanel(personId) {
  state.manage.editingPersonId = personId;
  if (personId === 'new') {
    state.manage.personDraft = { name: '', email: '', phone: '' };
  } else {
    var club = window.CLUBS.filter(function(c){ return c.name === state.manage.editingClub; })[0];
    var p = club ? club.people.filter(function(x){ return x._id === personId; })[0] : null;
    state.manage.personDraft = p ? {
      name: p.name || '',
      email: p.email || '',
      phone: p.phone || '',
    } : { name: '', email: '', phone: '' };
  }
  renderEditor(document.getElementById('mc-root'));
}

function closePersonPanel() {
  state.manage.editingPersonId = null;
  state.manage.personDraft = null;
  renderEditor(document.getElementById('mc-root'));
}

function normaliseName(s) {
  return (s || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function savePersonPanel() {
  var club = window.CLUBS.filter(function(c){ return c.name === state.manage.editingClub; })[0];
  if (!club) return;
  var draft = state.manage.personDraft || {};
  var name = (draft.name || '').trim();
  if (!name) {
    alert('Please enter a name.');
    return;
  }

  var isNew = state.manage.editingPersonId === 'new';
  var normNew = normaliseName(name);

  // Look for collision (different person, same normalised name) at this club
  var collision = club.people.filter(function(p) {
    if (!isNew && p._id === state.manage.editingPersonId) return false;
    return normaliseName(p.name) === normNew;
  })[0];

  if (collision) {
    // Prompt for merge-or-keep-separate
    state.manage.confirmDialog = {
      title: 'Duplicate name detected',
      message: 'A person named <b>' + esc(collision.name) + '</b> already exists at this club. Do you want to <b>merge</b> the two records, or keep them as separate people?',
      sub: isNew
        ? 'Merging will discard this new record and keep the existing one.'
        : 'Merging will consolidate all department assignments onto one record and delete the other.',
      confirmText: 'Keep separate',
      cancelText: 'Merge with existing',
      variant: 'primary',
      onConfirm: function() {
        // User chose keep separate — proceed with save as-is
        state.manage.confirmDialog = null;
        commitPersonPanelSave(club, isNew, draft);
      },
      onCancel: function() {
        // User chose merge
        state.manage.confirmDialog = null;
        mergeIntoPerson(club, collision, isNew, draft);
      }
    };
    renderEditor(document.getElementById('mc-root'));
    return;
  }

  commitPersonPanelSave(club, isNew, draft);
}

function commitPersonPanelSave(club, isNew, draft) {
  var name = (draft.name || '').trim();
  var email = (draft.email || '').trim() || null;
  var phone = (draft.phone || '').trim() || null;

  if (isNew) {
    var newPerson = {
      _id: 'p' + (_nextPersonId++),
      name: name,
      email: email,
      phone: phone,
      note: null,
      roles: [],
    };
    club.people.push(newPerson);
  } else {
    var person = club.people.filter(function(p){ return p._id === state.manage.editingPersonId; })[0];
    if (person) {
      person.name = name;
      person.email = email;
      person.phone = phone;
      // Apply primary role flag
      if (person.roles.length && typeof draft.primaryRoleIdx === 'number') {
        person.roles.forEach(function(r, i) {
          r.main = (i === draft.primaryRoleIdx);
        });
      }
    }
  }
  state.manage.editingPersonId = null;
  state.manage.personDraft = null;
  renderEditor(document.getElementById('mc-root'));
}

function mergeIntoPerson(club, existingPerson, isNew, draft) {
  // Merge: keep existingPerson. If not isNew, also consolidate the other person's
  // roles onto existingPerson and delete the other.
  if (isNew) {
    // No new record was created; just apply draft email/phone to existing if not set
    if (!existingPerson.email && (draft.email||'').trim()) existingPerson.email = draft.email.trim();
    if (!existingPerson.phone && (draft.phone||'').trim()) existingPerson.phone = draft.phone.trim();
  } else {
    var duplicatePerson = club.people.filter(function(p){ return p._id === state.manage.editingPersonId; })[0];
    if (duplicatePerson && duplicatePerson !== existingPerson) {
      // Move roles across (skip any that would duplicate an existing role)
      duplicatePerson.roles.forEach(function(r) {
        var already = existingPerson.roles.some(function(er) {
          return er.section === r.section && er.title === r.title;
        });
        if (!already) existingPerson.roles.push(r);
      });
      // Fill in missing contact fields from dup if existing is blank
      if (!existingPerson.email && duplicatePerson.email) existingPerson.email = duplicatePerson.email;
      if (!existingPerson.phone && duplicatePerson.phone) existingPerson.phone = duplicatePerson.phone;
      // Remove duplicate
      club.people = club.people.filter(function(p){ return p !== duplicatePerson; });
      // Make sure the surviving person still has exactly one primary
      ensurePrimaryRole(existingPerson);
    }
  }
  state.manage.editingPersonId = null;
  state.manage.personDraft = null;
  renderEditor(document.getElementById('mc-root'));
}

function deletePersonWithConfirm() {
  var club = window.CLUBS.filter(function(c){ return c.name === state.manage.editingClub; })[0];
  if (!club) return;
  var person = club.people.filter(function(p){ return p._id === state.manage.editingPersonId; })[0];
  if (!person) return;

  var roleDesc = person.roles.length === 0
    ? 'They have no department assignments.'
    : 'This will also remove their ' + person.roles.length + ' department ' +
      (person.roles.length === 1 ? 'assignment' : 'assignments') + ': ' +
      person.roles.map(function(r){ return r.title + ' (' + r.section + ')'; }).join(', ') + '.';

  state.manage.confirmDialog = {
    title: 'Delete person?',
    message: 'Delete <b>' + esc(person.name) + '</b> from the directory entirely.',
    sub: roleDesc + ' This cannot be undone.',
    confirmText: 'Delete person',
    variant: 'danger',
    onConfirm: function() {
      club.people = club.people.filter(function(p){ return p._id !== person._id; });
      state.manage.editingPersonId = null;
      state.manage.personDraft = null;
      state.manage.confirmDialog = null;
      renderEditor(document.getElementById('mc-root'));
    }
  };
  renderEditor(document.getElementById('mc-root'));
}

/* Save checklist edits for a section.
   Walks the drafts: slot-draft-keys are 'slot|ROLEKEY' and point to a personId
   (possibly blank for unassigned); extra-draft-keys are 'extra|personId|title'
   for free-text extras. */
function saveChecklistEdit(section) {
  var club = window.CLUBS.filter(function(c){ return c.name === state.manage.editingClub; })[0];
  if (!club) return;
  var drafts = state.manage.checklistDrafts || {};

  Object.keys(drafts).forEach(function(key) {
    var d = drafts[key];
    if (d.isExtra) {
      // Extra (free-text) role — may have been moved to a different person or retitled
      var original = club.people.filter(function(p){ return p._id === d._originalPersonId; })[0];
      if (!original) return;
      var roleIdx = original.roles.findIndex(function(r){
        return r.section === section && !r.roleKey && r.title === d._originalTitle;
      });
      if (roleIdx === -1) return;
      if (d.personId && d.personId !== d._originalPersonId) {
        var target = club.people.filter(function(p){ return p._id === d.personId; })[0];
        if (target) {
          target.roles.push({
            title: (d.roleTitle||'').trim() || d._originalTitle,
            section: section,
            deptHead: false,
          });
        }
        original.roles.splice(roleIdx, 1);
      } else {
        original.roles[roleIdx].title = (d.roleTitle||'').trim() || original.roles[roleIdx].title;
      }
      return;
    }

    // Slot draft — roleKey: rk, personId: string
    var rk = d.roleKey;
    var meta = SECTIONS_BY_KEY[section];
    var label = (meta && meta.roleLabels && meta.roleLabels[rk]) || rk;

    // Find existing assignment for this slot (if any)
    var existing = null;
    var existingOwner = null;
    club.people.some(function(p) {
      return p.roles.some(function(r, i) {
        if (r.section === section && r.roleKey === rk) {
          existing = { role: r, index: i };
          existingOwner = p;
          return true;
        }
        return false;
      });
    });

    // Case 1: slot cleared
    if (!d.personId) {
      if (existing) existingOwner.roles.splice(existing.index, 1);
      return;
    }
    // Case 2: slot newly filled (no existing)
    if (!existing) {
      var newOwner = club.people.filter(function(p){ return p._id === d.personId; })[0];
      if (newOwner) {
        newOwner.roles.push({
          title: label,
          section: section,
          roleKey: rk,
          deptHead: false,
        });
      }
      return;
    }
    // Case 3: slot moved from existing owner to another person
    if (existingOwner._id !== d.personId) {
      var target = club.people.filter(function(p){ return p._id === d.personId; })[0];
      if (target) {
        target.roles.push({
          title: label,
          section: section,
          roleKey: rk,
          deptHead: false,
        });
      }
      existingOwner.roles.splice(existing.index, 1);
    }
    // Case 4: same owner, nothing to do
  });

  // Apply add-extra draft if present
  var add = state.manage.checklistAddDraft;
  if (add && add.section === section && add.personId && (add.roleTitle||'').trim()) {
    var target = club.people.filter(function(p){ return p._id === add.personId; })[0];
    if (target) {
      target.roles.push({
        title: add.roleTitle.trim(),
        section: section,
        deptHead: false,
      });
    }
  }

  // Ensure every person has exactly one primary role after mutations
  club.people.forEach(function(p){ ensurePrimaryRole(p); });

  state.manage.editingDeptSection = null;
  state.manage.checklistDrafts = null;
  state.manage.checklistAddDraft = null;
  renderEditor(document.getElementById('mc-root'));
}

function saveDeptEdit(section) {
  var club = window.CLUBS.filter(function(c){ return c.name === state.manage.editingClub; })[0];
  if (!club) return;

  // Pre-flight check on the add-draft: if the person being added already has
  // a role in this section, show a soft warning. User can confirm to continue
  // or cancel to amend. Does NOT apply to existing-row edits (those already
  // exist, so no duplication is being created).
  var add = state.manage.deptAddDraft;
  if (add && add.section === section && add.personId) {
    var target = club.people.filter(function(p){ return p._id === add.personId; })[0];
    if (target) {
      var existing = target.roles.filter(function(r){ return r.section === section; });
      if (existing.length && !state.manage._duplicateWarnAccepted) {
        var titles = existing.map(function(r){ return r.title; }).join(', ');
        state.manage.confirmDialog = {
          title: 'Already in this department?',
          message: '<b>' + esc(target.name) + '</b> already holds <b>' + esc(titles) + '</b> in <b>' + esc(section) + '</b>. Adding a second role here is uncommon — most roles can be captured in the title of the existing role.',
          sub: 'Continue anyway, or cancel to amend?',
          confirmText: 'Add second role anyway',
          variant: 'primary',
          onConfirm: function() {
            state.manage.confirmDialog = null;
            state.manage._duplicateWarnAccepted = true;
            saveDeptEdit(section);
            state.manage._duplicateWarnAccepted = false;
          },
          onCancel: function() {
            state.manage.confirmDialog = null;
            renderEditor(document.getElementById('mc-root'));
          }
        };
        renderEditor(document.getElementById('mc-root'));
        return;
      }
    }
  }

  var drafts = state.manage.deptDrafts || {};

  // Walk each draft; find the existing role entry and update it.
  Object.keys(drafts).forEach(function(key) {
    var d = drafts[key];
    var originalPersonId = key.split('|')[0];
    var originalTitle = d._originalTitle;

    var originalPerson = club.people.filter(function(p){ return p._id === originalPersonId; })[0];
    if (!originalPerson) return;

    var roleIdx = originalPerson.roles.findIndex(function(r) {
      return r.section === section && r.title === originalTitle;
    });
    if (roleIdx === -1) return;

    // If person changed: move role to new person with updated title/head/flags
    if (d.personId !== originalPersonId) {
      var newPerson = club.people.filter(function(p){ return p._id === d.personId; })[0];
      if (newPerson) {
        var newRole = {
          title: d.roleTitle.trim() || originalTitle,
          section: section,
          deptHead: !!d.deptHead,
        };
        if (d.flags && Object.keys(d.flags).some(function(k){ return d.flags[k]; })) {
          newRole.flags = {};
          Object.keys(d.flags).forEach(function(k){ if (d.flags[k]) newRole.flags[k] = true; });
        }
        newPerson.roles.push(newRole);
      }
      originalPerson.roles.splice(roleIdx, 1);
    } else {
      // Just update title / deptHead / flags
      originalPerson.roles[roleIdx].title = (d.roleTitle || '').trim() || originalTitle;
      originalPerson.roles[roleIdx].deptHead = !!d.deptHead;
      if (d.flags) {
        var activeFlags = {};
        var any = false;
        Object.keys(d.flags).forEach(function(k){
          if (d.flags[k]) { activeFlags[k] = true; any = true; }
        });
        if (any) originalPerson.roles[roleIdx].flags = activeFlags;
        else delete originalPerson.roles[roleIdx].flags;
      }
    }
  });

  // Apply add-draft now (warning has been accepted or wasn't needed)
  if (add && add.section === section && add.personId) {
    var addTarget = club.people.filter(function(p){ return p._id === add.personId; })[0];
    if (addTarget) {
      var addRole = {
        title: (add.roleTitle || '').trim() || 'Unspecified',
        section: section,
        deptHead: !!add.deptHead,
      };
      if (add.flags && Object.keys(add.flags).some(function(k){ return add.flags[k]; })) {
        addRole.flags = {};
        Object.keys(add.flags).forEach(function(k){ if (add.flags[k]) addRole.flags[k] = true; });
      }
      addTarget.roles.push(addRole);
    }
  }

  // Ensure every person has exactly one primary role (in case changes broke it)
  club.people.forEach(function(p){ ensurePrimaryRole(p); });

  state.manage.editingDeptSection = null;
  state.manage.deptDrafts = null;
  state.manage.deptAddDraft = null;
  renderEditor(document.getElementById('mc-root'));
}

/* Ensure exactly one role has main=true (primary) per person.
   If none, promote the first role. If multiple, keep the first flagged. */
function ensurePrimaryRole(person) {
  if (!person.roles || !person.roles.length) return;
  var mainIdx = person.roles.findIndex(function(r){ return r.main; });
  if (mainIdx === -1) {
    person.roles[0].main = true;
    for (var i = 1; i < person.roles.length; i++) person.roles[i].main = false;
  } else {
    person.roles.forEach(function(r, i){ r.main = (i === mainIdx); });
  }
}

function removeDeptDraft(key) {
  // Removing an assignment from the edit list.
  // Check if this would leave the person with 0 roles → warn about implicit deletion.
  var club = window.CLUBS.filter(function(c){ return c.name === state.manage.editingClub; })[0];
  if (!club) return;
  var d = state.manage.deptDrafts[key];
  if (!d) return;
  var originalPersonId = key.split('|')[0];
  var person = club.people.filter(function(p){ return p._id === originalPersonId; })[0];
  if (!person) return;

  // Count roles they still have in OTHER sections (not being removed here)
  var otherRoles = person.roles.filter(function(r, i) {
    return !(r.section === state.manage.editingDeptSection && r.title === d._originalTitle);
  });

  if (otherRoles.length === 0) {
    state.manage.confirmDialog = {
      title: 'Last assignment?',
      message: 'This is <b>' + esc(person.name) + '</b>\'s only department assignment. Removing it will leave them in the People list with no departments assigned. They will NOT be automatically deleted — you can remove them from the People tab if you want to.',
      sub: 'If you just want to move them to a different role or department, that\'s fine — they\'ll stay in the People list.',
      confirmText: 'Remove assignment',
      variant: 'danger',
      onConfirm: function() {
        // Actually remove the role from the person now, and drop draft
        var roleIdx = person.roles.findIndex(function(r) {
          return r.section === state.manage.editingDeptSection && r.title === d._originalTitle;
        });
        if (roleIdx !== -1) person.roles.splice(roleIdx, 1);
        delete state.manage.deptDrafts[key];
        state.manage.confirmDialog = null;
        renderEditor(document.getElementById('mc-root'));
      }
    };
    renderEditor(document.getElementById('mc-root'));
    return;
  }

  // Straightforward removal — just drop the role and the draft
  var remaining = otherRoles.map(function(r){ return r.title + ' (' + r.section + ')'; }).join(', ');
  state.manage.confirmDialog = {
    title: 'Remove assignment?',
    message: 'Remove <b>' + esc(person.name) + '</b> from this department. They will remain in the directory with: <b>' + esc(remaining) + '</b>.',
    confirmText: 'Remove',
    variant: 'danger',
    onConfirm: function() {
      var roleIdx = person.roles.findIndex(function(r) {
        return r.section === state.manage.editingDeptSection && r.title === d._originalTitle;
      });
      if (roleIdx !== -1) person.roles.splice(roleIdx, 1);
      delete state.manage.deptDrafts[key];
      state.manage.confirmDialog = null;
      renderEditor(document.getElementById('mc-root'));
    }
  };
  renderEditor(document.getElementById('mc-root'));
}

document.addEventListener('DOMContentLoaded', function() {
  // --- Persona switcher (demo only) ---
  var personaBar = document.getElementById('personaBar');
  personaBar.addEventListener('click', function(e) {
    var b = e.target.closest('[data-persona]');
    if (!b) return;
    state.persona = b.getAttribute('data-persona');
    personaBar.querySelectorAll('[data-persona]').forEach(function(x) {
      x.setAttribute('aria-pressed', x === b ? 'true' : 'false');
    });
    // If user switches away from a view they can no longer access, bounce them
    if (state.viewMode === 'builder' && !personaCan('listBuilder')) {
      state.viewMode = 'directory';
    }
    if (state.viewMode === 'manage' && !personaCan('manageContacts') && !personaCan('manageOwnClub')) {
      state.viewMode = 'directory';
    }
    showScene();
  });

  // --- View toggle (Directory / List builder / Manage) ---
  var clubGroup = document.getElementById('clubStyleGroup');
  clubGroup.addEventListener('click', function(e) {
    var b = e.target.closest('[data-view-mode]');
    if (!b) return;
    var viewMode = b.getAttribute('data-view-mode') || 'directory';
    var cap = b.getAttribute('data-requires');
    if (cap && !personaCan(cap)) return; // safety net — shouldn't be clickable anyway
    state.viewMode = viewMode;
    state.viewing = null;
    // Reset manage sub-state when entering
    if (viewMode === 'manage') {
      state.manage.editingClub = null;
    }
    clubGroup.querySelectorAll('button').forEach(function(x) {
      x.setAttribute('aria-pressed', x === b ? 'true' : 'false');
    });
    showScene();
  });

  // --- Search box (only affects directory listing) ---
  var search = document.getElementById('searchBox');
  var searchTimer;
  search.addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      state.searchQuery = search.value;
      if (state.viewMode === 'directory' && !state.viewing) renderListing();
    }, 150);
  });

  // --- Back link ---
  document.getElementById('backLink').addEventListener('click', function(e) {
    e.preventDefault();
    state.viewing = null;
    showScene();
  });

  // --- "Manage my club" button on club page ---
  document.getElementById('manageMyClubBtn').addEventListener('click', function(e) {
    e.preventDefault();
    state.manage.editingClub = state.viewing;
    state.viewMode = 'manage';
    state.viewing = null;
    // deselect the dense/role-first buttons so no view toggle shows pressed
    clubGroup.querySelectorAll('button').forEach(function(x) { x.setAttribute('aria-pressed', 'false'); });
    showScene();
  });

  // --- List Builder interactions ---
  var builderScene = document.getElementById('scene-builder');
  builderScene.addEventListener('click', function(e) {
    var t = e.target;
    var modeBtn = t.closest('.lb-mode-btn');
    if (modeBtn) {
      state.lb.mode = modeBtn.getAttribute('data-lb-mode');
      document.querySelectorAll('.lb-mode-btn').forEach(function(b){
        b.setAttribute('aria-pressed', b === modeBtn ? 'true' : 'false');
      });
      state.lb.omittedKeys = {};
      renderBuilderWarnings();
      renderBuilderResults();
      return;
    }
    if (t.closest('[data-division-toggle]')) {
      var div = t.closest('[data-division-toggle]').getAttribute('data-division-toggle');
      state.lb.collapsedDivisions[div] = !state.lb.collapsedDivisions[div];
      renderBuilderDivisions();
      return;
    }
    var omitBtn = t.closest('[data-omit-key]');
    if (omitBtn) {
      var key = omitBtn.getAttribute('data-omit-key');
      if (state.lb.omittedKeys[key]) delete state.lb.omittedKeys[key];
      else state.lb.omittedKeys[key] = true;
      renderBuilderResults();
      return;
    }
    var copyBtn = t.closest('.lb-copybtn');
    if (copyBtn) {
      var fmt = copyBtn.getAttribute('data-copy-fmt');
      var text = formatForCopy(fmt);
      if (text) copyToClipboard(text, copyBtn);
      return;
    }
    if (t.id === 'lbDeptsAll') {
      SECTION_ORDER.forEach(function(s){ state.lb.selectedDepts[s] = true; });
      renderBuilderDepts(); renderBuilderWarnings(); renderBuilderResults(); return;
    }
    if (t.id === 'lbDeptsNone') {
      state.lb.selectedDepts = {};
      state.lb.checklistRoleFilter = {};
      state.lb.flagFilter = {};
      renderBuilderDepts(); renderBuilderWarnings(); renderBuilderResults(); return;
    }
    if (t.id === 'lbClubsAll') {
      window.CLUBS.forEach(function(c){ state.lb.selectedClubs[c.name] = true; });
      renderBuilderDivisions(); renderBuilderWarnings(); renderBuilderResults(); return;
    }
    if (t.id === 'lbClubsNone') {
      state.lb.selectedClubs = {};
      renderBuilderDivisions(); renderBuilderWarnings(); renderBuilderResults(); return;
    }
  });
  builderScene.addEventListener('change', function(e) {
    var t = e.target;
    if (t.hasAttribute('data-dept')) {
      var dept = t.getAttribute('data-dept');
      if (t.checked) state.lb.selectedDepts[dept] = true;
      else {
        delete state.lb.selectedDepts[dept];
        // Also clear any sub-filter so re-ticking later starts fresh (defaults)
        delete state.lb.checklistRoleFilter[dept];
        delete state.lb.flagFilter[dept];
      }
      renderBuilderDepts();   // re-render so sub-filters appear/disappear
      renderBuilderWarnings(); renderBuilderResults();
      return;
    }
    if (t.hasAttribute('data-checklist-section')) {
      var section = t.getAttribute('data-checklist-section');
      var roleKey = t.getAttribute('data-checklist-role');
      // First interaction seeds the filter with the current defaults, then applies the toggle
      var meta = SECTIONS_BY_KEY[section];
      if (!meta) return;
      if (!state.lb.checklistRoleFilter[section]) {
        // Seed from defaults: required + optional on, __other off
        var seed = {};
        (meta.requiredRoles||[]).forEach(function(k){ seed[k] = true; });
        (meta.optionalRoles||[]).forEach(function(k){ seed[k] = true; });
        seed.__other = false;
        state.lb.checklistRoleFilter[section] = seed;
      }
      state.lb.checklistRoleFilter[section][roleKey] = t.checked;
      renderBuilderWarnings(); renderBuilderResults();
      return;
    }
    if (t.hasAttribute('data-flag-section')) {
      var fsec = t.getAttribute('data-flag-section');
      var fkey = t.getAttribute('data-flag-key');
      if (!state.lb.flagFilter[fsec]) state.lb.flagFilter[fsec] = {};
      if (t.checked) state.lb.flagFilter[fsec][fkey] = true;
      else delete state.lb.flagFilter[fsec][fkey];
      renderBuilderResults();
      return;
    }
    if (t.classList.contains('lb-division-check')) {
      var divName = t.getAttribute('data-division');
      var divClubs = window.CLUBS.filter(function(c){ return c.division === divName; });
      if (t.checked) divClubs.forEach(function(c){ state.lb.selectedClubs[c.name] = true; });
      else           divClubs.forEach(function(c){ delete state.lb.selectedClubs[c.name]; });
      renderBuilderDivisions(); renderBuilderWarnings(); renderBuilderResults();
      return;
    }
    if (t.hasAttribute('data-club')) {
      var clubName = t.getAttribute('data-club');
      if (t.checked) state.lb.selectedClubs[clubName] = true;
      else           delete state.lb.selectedClubs[clubName];
      renderBuilderDivisions(); renderBuilderWarnings(); renderBuilderResults();
      return;
    }
  });
  builderScene.addEventListener('input', function(e) {
    var t = e.target;
    if (t.hasAttribute('data-division-search')) {
      var div = t.getAttribute('data-division-search');
      state.lb.clubSearch[div] = t.value;
      var q = t.value.toLowerCase();
      var group = builderScene.querySelector('.lb-division-group[data-division="' + div + '"]');
      if (!group) return;
      group.querySelectorAll('.lb-club-row').forEach(function(row) {
        var label = row.querySelector('label');
        var name = label ? label.textContent.toLowerCase() : '';
        if (!q || name.indexOf(q) !== -1) row.classList.remove('is-hidden');
        else row.classList.add('is-hidden');
      });
    }
  });

  // --- MANAGE CONTACTS interactions (v0.9) ---
  var manageScene = document.getElementById('scene-manage');

  manageScene.addEventListener('click', function(e) {
    var t = e.target;

    /* --- Club picker --- */
    var clubRow = t.closest('[data-club]');
    if (clubRow && clubRow.tagName === 'TR') {
      state.manage.editingClub = clubRow.getAttribute('data-club');
      state.manage.surface = 'people';
      renderManage();
      return;
    }
    var filterPill = t.closest('[data-div-filter]');
    if (filterPill) {
      var f = filterPill.getAttribute('data-div-filter');
      state.manage.pickerDivFilter = f || null;
      renderManage();
      return;
    }

    /* --- Navigation --- */
    if (t.id === 'mcBackToPicker') {
      e.preventDefault();
      state.manage.editingClub = null;
      state.manage.surface = 'people';
      state.manage.editingPersonId = null;
      state.manage.personDraft = null;
      state.manage.editingDeptSection = null;
      state.manage.deptDrafts = null;
      state.manage.deptAddDraft = null;
      state.manage.editingDetails = null;
      renderManage();
      return;
    }
    if (t.id === 'mcBackToDirectory') {
      e.preventDefault();
      state.viewMode = 'directory';
      state.viewing = DEMO_EDITOR_CLUB;
      showScene();
      return;
    }

    /* --- Surface tabs --- */
    var surfaceTab = t.closest('[data-surface]');
    if (surfaceTab) {
      state.manage.surface = surfaceTab.getAttribute('data-surface');
      // Leaving a surface with an open edit state is fine — drafts hold intact.
      // But close the person panel if moving away.
      if (state.manage.surface !== 'people') {
        state.manage.editingPersonId = null;
        state.manage.personDraft = null;
      }
      renderEditor(document.getElementById('mc-root'));
      return;
    }

    /* --- People surface --- */
    // Row click or edit button opens panel
    var editPersonBtn = t.closest('[data-edit-person]');
    if (editPersonBtn) {
      openPersonPanel(editPersonBtn.getAttribute('data-edit-person'));
      return;
    }
    var personCard = t.closest('[data-person-id]');
    if (personCard && !editPersonBtn) {
      openPersonPanel(personCard.getAttribute('data-person-id'));
      return;
    }
    if (t.id === 'mcAddPersonBtn') {
      openPersonPanel('new');
      return;
    }

    /* --- Person side-panel --- */
    if (t.id === 'mcPanelClose' || t.id === 'mcPanelOverlay' || t.id === 'mcPanelCancel') {
      closePersonPanel();
      return;
    }
    if (t.id === 'mcPanelSave') {
      savePersonPanel();
      return;
    }
    if (t.id === 'mcPanelDelete') {
      deletePersonWithConfirm();
      return;
    }

    /* --- Departments surface --- */
    var editDeptBtn = t.closest('[data-edit-dept-section]');
    if (editDeptBtn) {
      enterDeptEdit(editDeptBtn.getAttribute('data-edit-dept-section'));
      return;
    }
    var cancelDeptBtn = t.closest('[data-cancel-dept]');
    if (cancelDeptBtn) {
      cancelDeptEdit();
      return;
    }
    var saveDeptBtn = t.closest('[data-save-dept]');
    if (saveDeptBtn) {
      saveDeptEdit(saveDeptBtn.getAttribute('data-save-dept'));
      return;
    }
    var addToDeptBtn = t.closest('[data-add-to-dept]');
    if (addToDeptBtn) {
      startDeptAdd(addToDeptBtn.getAttribute('data-add-to-dept'));
      return;
    }
    if (t.id === 'mcAddDraftCancel') {
      cancelDeptAdd();
      return;
    }
    var removeDraftBtn = t.closest('[data-remove-draft-key]');
    if (removeDraftBtn) {
      removeDeptDraft(removeDraftBtn.getAttribute('data-remove-draft-key'));
      return;
    }

    /* --- Checklist dept handlers (Liaison officers) --- */
    var saveChecklistBtn = t.closest('[data-save-checklist]');
    if (saveChecklistBtn) {
      saveChecklistEdit(saveChecklistBtn.getAttribute('data-save-checklist'));
      return;
    }
    var addChecklistExtra = t.closest('[data-add-checklist-extra]');
    if (addChecklistExtra) {
      state.manage.checklistAddDraft = {
        section: addChecklistExtra.getAttribute('data-add-checklist-extra'),
        personId: '',
        roleTitle: '',
      };
      renderEditor(document.getElementById('mc-root'));
      return;
    }
    if (t.id === 'mcChecklistAddCancel') {
      state.manage.checklistAddDraft = null;
      renderEditor(document.getElementById('mc-root'));
      return;
    }
    var clearSlotBtn = t.closest('[data-clear-slot]');
    if (clearSlotBtn) {
      var slotKey = clearSlotBtn.getAttribute('data-clear-slot');
      if (state.manage.checklistDrafts && state.manage.checklistDrafts[slotKey]) {
        state.manage.checklistDrafts[slotKey].personId = '';
      }
      renderEditor(document.getElementById('mc-root'));
      return;
    }
    var removeExtraBtn = t.closest('[data-remove-extra]');
    if (removeExtraBtn) {
      var extraKey = removeExtraBtn.getAttribute('data-remove-extra');
      // Delete the draft AND mark the underlying role for removal by setting personId to ''
      // Since extras don't have a meaningful "slot" they just get removed at save time.
      // For simplicity: actually remove from the club right away, drop the draft.
      var d = state.manage.checklistDrafts[extraKey];
      if (d) {
        var club = window.CLUBS.filter(function(c){ return c.name === state.manage.editingClub; })[0];
        var original = club ? club.people.filter(function(p){ return p._id === d._originalPersonId; })[0] : null;
        if (original) {
          var idx = original.roles.findIndex(function(r){
            return r.section === state.manage.editingDeptSection && !r.roleKey && r.title === d._originalTitle;
          });
          if (idx !== -1) original.roles.splice(idx, 1);
        }
        delete state.manage.checklistDrafts[extraKey];
      }
      renderEditor(document.getElementById('mc-root'));
      return;
    }

    /* --- Club details (admin only) --- */
    if (t.id === 'mcDetailsEdit') {
      var club = window.CLUBS.filter(function(c){ return c.name === state.manage.editingClub; })[0];
      state.manage.editingDetails = {
        address_raw: club.address_raw || '',
        phone: club.phone || '',
        email: club.email || '',
        website: club.website || '',
        fa: club.fa || '',
      };
      renderEditor(document.getElementById('mc-root'));
      return;
    }
    if (t.id === 'mcDetailsCancel') {
      state.manage.editingDetails = null;
      renderEditor(document.getElementById('mc-root'));
      return;
    }
    if (t.id === 'mcDetailsSave') {
      var c = window.CLUBS.filter(function(x){ return x.name === state.manage.editingClub; })[0];
      var d = state.manage.editingDetails;
      if (c && d) {
        c.address_raw = d.address_raw;
        c.phone = d.phone;
        c.email = d.email;
        c.website = d.website;
        c.fa = d.fa;
      }
      state.manage.editingDetails = null;
      renderEditor(document.getElementById('mc-root'));
      return;
    }

    /* --- Confirm dialog --- */
    if (t.id === 'mcConfirmCancel') {
      var dlg = state.manage.confirmDialog;
      if (dlg && dlg.onCancel) dlg.onCancel();
      else { state.manage.confirmDialog = null; renderEditor(document.getElementById('mc-root')); }
      return;
    }
    if (t.id === 'mcConfirmOk') {
      var dlg2 = state.manage.confirmDialog;
      if (dlg2 && dlg2.onConfirm) dlg2.onConfirm();
      return;
    }
  });

  manageScene.addEventListener('input', function(e) {
    var t = e.target;

    // Club picker search
    if (t.id === 'mcPickerSearch') {
      state.manage.pickerSearch = t.value;
      var q = t.value.toLowerCase();
      var divFilter = state.manage.pickerDivFilter;
      var rows = manageScene.querySelectorAll('.mc-clubs-table tbody tr');
      rows.forEach(function(tr) {
        var name = (tr.getAttribute('data-club') || '').toLowerCase();
        var club = window.CLUBS.filter(function(c){ return c.name === tr.getAttribute('data-club'); })[0];
        var matches = (!q || name.indexOf(q) !== -1) &&
                      (!divFilter || (club && club.division === divFilter));
        tr.style.display = matches ? '' : 'none';
      });
      return;
    }

    // People surface search — filter rows in place to preserve input focus
    if (t.id === 'mcPeopleSearch') {
      state.manage.peopleSearch = t.value;
      var q2 = t.value.toLowerCase().trim();
      var cards = manageScene.querySelectorAll('.mc-person-card');
      cards.forEach(function(card) {
        var name = (card.querySelector('.mc-person-card-name')||{}).textContent || '';
        var contactEl = card.querySelector('.mc-person-card-contact');
        var contact = contactEl ? contactEl.textContent : '';
        var match = !q2 || name.toLowerCase().indexOf(q2) !== -1 || contact.toLowerCase().indexOf(q2) !== -1;
        card.style.display = match ? '' : 'none';
      });
      return;
    }

    // Person side-panel fields
    if (t.id === 'mcPanelName')  { if (!state.manage.personDraft) state.manage.personDraft = {}; state.manage.personDraft.name  = t.value; return; }
    if (t.id === 'mcPanelEmail') { if (!state.manage.personDraft) state.manage.personDraft = {}; state.manage.personDraft.email = t.value; return; }
    if (t.id === 'mcPanelPhone') { if (!state.manage.personDraft) state.manage.personDraft = {}; state.manage.personDraft.phone = t.value; return; }

    // Dept edit drafts
    if (t.hasAttribute('data-draft-key')) {
      var key = t.getAttribute('data-draft-key');
      var field = t.getAttribute('data-draft-field');
      if (!state.manage.deptDrafts || !state.manage.deptDrafts[key]) return;
      if (field === 'deptHead') state.manage.deptDrafts[key].deptHead = t.checked;
      else state.manage.deptDrafts[key][field] = t.value;
      return;
    }

    // Dept add-new draft
    if (t.id === 'mcAddDraftPerson') {
      if (!state.manage.deptAddDraft) return;
      state.manage.deptAddDraft.personId = t.value;
      return;
    }
    if (t.id === 'mcAddDraftTitle') {
      if (!state.manage.deptAddDraft) return;
      state.manage.deptAddDraft.roleTitle = t.value;
      return;
    }

    // Checklist drafts (Liaison officers section)
    if (t.hasAttribute('data-checklist-draft-key')) {
      var ckey = t.getAttribute('data-checklist-draft-key');
      var cfield = t.getAttribute('data-draft-field') || 'personId';
      if (!state.manage.checklistDrafts || !state.manage.checklistDrafts[ckey]) return;
      state.manage.checklistDrafts[ckey][cfield] = t.value;
      return;
    }

    // Checklist add-extra draft
    if (t.id === 'mcChecklistAddPerson') {
      if (!state.manage.checklistAddDraft) return;
      state.manage.checklistAddDraft.personId = t.value;
      return;
    }
    if (t.id === 'mcChecklistAddTitle') {
      if (!state.manage.checklistAddDraft) return;
      state.manage.checklistAddDraft.roleTitle = t.value;
      return;
    }

    // Club details drafts
    if (t.hasAttribute('data-details-field')) {
      var df = t.getAttribute('data-details-field');
      if (!state.manage.editingDetails) state.manage.editingDetails = {};
      state.manage.editingDetails[df] = t.value;
      return;
    }
  });

  manageScene.addEventListener('change', function(e) {
    var t = e.target;
    // Primary role radio
    if (t.name === 'mcPanelPrimary' && t.hasAttribute('data-primary-idx')) {
      if (!state.manage.personDraft) state.manage.personDraft = {};
      state.manage.personDraft.primaryRoleIdx = parseInt(t.getAttribute('data-primary-idx'), 10);
      return;
    }
    // Flag tickbox on existing role draft (e.g. Media -> Programme editor)
    if (t.hasAttribute('data-draft-flag-key')) {
      var fkey = t.getAttribute('data-draft-flag-key');
      var flagName = t.getAttribute('data-flag-name');
      if (state.manage.deptDrafts && state.manage.deptDrafts[fkey]) {
        if (!state.manage.deptDrafts[fkey].flags) state.manage.deptDrafts[fkey].flags = {};
        state.manage.deptDrafts[fkey].flags[flagName] = t.checked;
      }
      return;
    }
    // Flag tickbox on add-new draft
    if (t.hasAttribute('data-add-flag')) {
      var addFlag = t.getAttribute('data-add-flag');
      if (state.manage.deptAddDraft) {
        if (!state.manage.deptAddDraft.flags) state.manage.deptAddDraft.flags = {};
        state.manage.deptAddDraft.flags[addFlag] = t.checked;
      }
      return;
    }
    if (t.hasAttribute('data-draft-key') && t.getAttribute('data-draft-field') === 'deptHead') {
      var key = t.getAttribute('data-draft-key');
      if (state.manage.deptDrafts && state.manage.deptDrafts[key]) {
        state.manage.deptDrafts[key].deptHead = t.checked;
      }
    }
    // Checklist selects (person picker for slots and extras)
    if (t.hasAttribute('data-checklist-draft-key')) {
      var ckey = t.getAttribute('data-checklist-draft-key');
      var cfield = t.getAttribute('data-draft-field') || 'personId';
      if (state.manage.checklistDrafts && state.manage.checklistDrafts[ckey]) {
        state.manage.checklistDrafts[ckey][cfield] = t.value;
      }
    }
    if (t.id === 'mcChecklistAddPerson') {
      if (state.manage.checklistAddDraft) state.manage.checklistAddDraft.personId = t.value;
    }
    if (t.id === 'mcAddDraftHead') {
      if (state.manage.deptAddDraft) state.manage.deptAddDraft.deptHead = t.checked;
    }
    if (t.id === 'mcAddDraftPerson') {
      if (state.manage.deptAddDraft) state.manage.deptAddDraft.personId = t.value;
    }
  });

  showScene();
});
</script>
</body>
</html>
