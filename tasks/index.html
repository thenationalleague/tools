<style>
@font-face {
  font-family: "carbona-variable";
  src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),

  font-display: swap; font-style: normal; font-weight: 200 900;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }

:root {
  --primary:     #9e0000;
  --primary-dim: #7a0000;
  --navy:        #223b7c;
  --navy-mid:    #1a2f63;
  --red:         #c0392b;
  --red-light:   #fdf0ef;
  --green:       #1e7e34;
  --green-light: #edf7ee;
  --amber:       #e67e22;
  --amber-light: #fef6ec;
  --white:       #ffffff;
  --off-white:   #f4f6f9;
  --text:        #1a2a44;
  --text-muted:  #5a6a82;
  --border:      #dde3ed;
  --radius:      6px;
  --shadow:      0 2px 12px rgba(10,22,40,0.10);
  --font:        'carbona-variable','carbona',sans-serif;
}

body {
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  font-variation-settings: 'wght' 400;
  color: var(--text);
  background: var(--off-white);
  min-height: 100vh;
}

.topbar {
  background: var(--primary); color: var(--white);
  padding: 0 24px; height: 72px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  border-bottom: 7px solid var(--navy); width: 100%;
}
.topbar img { height: 40px; flex-shrink: 0; }
.topbar__title {
  font-weight: 900; font-variation-settings: 'wght' 900;
  font-size: 18px; flex: 1; text-transform: uppercase;
  letter-spacing: 0.04em; color: var(--white);
}
.topbar__title span { color: rgba(255,255,255,0.55); }
.topbar__btn {
  background: var(--navy); border: none; color: var(--white);
  padding: 8px 16px; border-radius: var(--radius);
  font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  cursor: pointer; font-family: var(--font); transition: background 0.15s; white-space: nowrap;
}
.topbar__btn:hover { background: var(--navy-mid); }

.main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }

.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.view-toggle { display: flex; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; flex-shrink: 0; }
.view-btn { padding: 7px 14px; font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.07em; cursor: pointer; border: none; background: none; font-family: var(--font); color: var(--text-muted); transition: all 0.15s; }
.view-btn.active { background: var(--navy); color: var(--white); }
.filter-row { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
.filter-select, .filter-input { padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; background: var(--white); color: var(--text); }
.filter-input { flex: 1; min-width: 120px; }

.section-lbl { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin: 24px 0 10px; display: flex; align-items: center; gap: 8px; }
.section-lbl::after { content:''; flex:1; height:1px; background: var(--border); }
.section-lbl__count { background: var(--border); color: var(--text-muted); font-size: 9px; padding: 1px 6px; border-radius: 10px; }

.task-list { display: flex; flex-direction: column; gap: 8px; }
.task-card { background: var(--white); border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow); display: flex; align-items: flex-start; gap: 12px; }
.task-card:hover { border-color: var(--navy); box-shadow: 0 4px 16px rgba(34,59,124,0.12); }
.task-card--high   { border-left-color: var(--red); }
.task-card--medium { border-left-color: var(--amber); }
.task-card--done   { opacity: 0.6; }
.task-card--done .task-card__title { text-decoration: line-through; }
.task-card__body { flex: 1; min-width: 0; }
.task-card__title { font-size: 14px; font-weight: 700; font-variation-settings: 'wght' 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-card__meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; font-size: 11px; color: var(--text-muted); }
.task-card__tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.task-card__right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

.kanban { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
@media (max-width: 680px) { .kanban { grid-template-columns: 1fr; } }
.kanban-col { background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.kanban-col__head { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.kanban-col__cards { display: flex; flex-direction: column; gap: 8px; }
.kanban-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; transition: border-color 0.15s; box-shadow: var(--shadow); }
.kanban-card:hover { border-color: var(--navy); }
.kanban-card__title { font-size: 13px; font-weight: 700; font-variation-settings: 'wght' 700; margin-bottom: 6px; }
.kanban-card__meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 6px; flex-wrap: wrap; }

.pill { display: inline-block; font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 20px; }
.pill-todo    { background: var(--off-white); color: var(--text-muted); border: 1px solid var(--border); }
.pill-inprog  { background: var(--amber-light); color: var(--amber); }
.pill-done    { background: var(--green-light); color: var(--green); }
.pill-high    { background: var(--red-light); color: var(--red); }
.pill-medium  { background: var(--amber-light); color: var(--amber); }
.pill-low     { background: #f0f4ff; color: var(--navy); }
.pill-project { background: #ede9ff; color: #5b21b6; }
.pill-task    { background: #e0f2fe; color: #0369a1; }

.tag { background: var(--off-white); border: 1px solid var(--border); color: var(--text-muted); font-size: 10px; font-weight: 700; font-variation-settings: 'wght' 700; padding: 1px 6px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em; }

.progress { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; width: 70px; }
.progress__fill { height: 100%; background: var(--green); border-radius: 4px; }

.panel-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.45); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s; }

.panel { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 540px; background: var(--white); z-index: 301; transform: translateX(100%); transition: transform 0.25s ease; display: flex; flex-direction: column; overflow: hidden; box-shadow: -4px 0 24px rgba(10,22,40,0.15); }
.panel.open { transform: translateX(0); }

.panel__close { background: none; border: none; color: var(--white); font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px; font-family: var(--font); opacity: 0.8; }
.panel__close:hover { opacity: 1; }
.panel__body { flex: 1; overflow-y: auto; padding: 20px; }
.panel__foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; background: var(--white); }

.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-muted); margin-bottom: 5px; }
.fg input, .fg textarea, .fg select { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 14px; color: var(--text); font-variation-settings: 'wght' 400; background: var(--white); transition: border-color 0.15s; }
.fg input:focus, .fg textarea:focus, .fg select:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(34,59,124,0.09); }
.fg textarea { resize: vertical; min-height: 72px; }
.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.tags-wrap { border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 8px; background: var(--white); display: flex; flex-wrap: wrap; gap: 5px; cursor: text; min-height: 40px; align-items: center; transition: border-color 0.15s; }
.tags-wrap:focus-within { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(34,59,124,0.09); }
.tag-chip { background: var(--off-white); border: 1px solid var(--border); border-radius: 20px; padding: 2px 6px 2px 8px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
.tag-chip__x { cursor: pointer; color: var(--text-muted); font-size: 14px; line-height: 1; border: none; background: none; padding: 0; font-family: var(--font); }
.tag-chip__x:hover { color: var(--red); }
.tag-text-input { border: none; outline: none; font-family: var(--font); font-size: 13px; font-variation-settings: 'wght' 400; min-width: 90px; flex: 1; background: transparent; color: var(--text); }

.member-search { position: relative; }
.member-results { position: absolute; top: 100%; left: 0; right: 0; z-index: 50; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); max-height: 200px; overflow-y: auto; display: none; margin-top: 2px; }
.member-results.open { display: block; }
.member-opt { padding: 9px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }

.member-opt:hover { background: var(--off-white); }
.avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--navy); color: var(--white); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; flex-shrink: 0; }
.members-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.member-chip { display: flex; align-items: center; gap: 5px; background: var(--off-white); border: 1px solid var(--border); border-radius: 20px; padding: 3px 8px 3px 5px; font-size: 12px; }
.member-chip__x { cursor: pointer; color: var(--text-muted); border: none; background: none; font-size: 14px; line-height: 1; padding: 0; font-family: var(--font); }
.member-chip__x:hover { color: var(--red); }

.btn { padding: 9px 18px; border-radius: var(--radius); border: none; font-family: var(--font); font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-primary { background: var(--navy); color: var(--white); }
.btn-primary:hover:not(:disabled) { background: var(--navy-mid); }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
.btn-ghost:hover:not(:disabled) { border-color: var(--navy); color: var(--navy); }
.btn-danger { background: var(--red-light); color: var(--red); border: 1px solid #f5c6c2; }
.btn-danger:hover:not(:disabled) { background: #fae0de; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.notes-thread { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
.note { background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
.note__head { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 11px; }
.note__author { font-weight: 700; font-variation-settings: 'wght' 700; color: var(--navy); }
.note__time { color: var(--text-muted); }
.note__text { font-size: 13px; line-height: 1.5; }
.note-row { display: flex; gap: 8px; align-items: flex-end; }

.subtask-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px; }
.subtask-item__head { display: flex; align-items: center; gap: 8px; }
.subtask-item__title { flex: 1; font-size: 13px; font-weight: 600; font-variation-settings: 'wght' 600; }
.subtask-item__meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

.detail-sec { margin-bottom: 20px; }
.detail-sec__lbl { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.meta-item label { display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
.meta-item span { font-size: 13px; }

.danger-zone { border: 1px solid var(--red-light); border-radius: var(--radius); padding: 12px 14px; margin-top: 20px; }
.danger-zone__lbl { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--red); margin-bottom: 8px; }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: var(--white); padding: 11px 16px; border-radius: var(--radius); font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; box-shadow: 0 4px 20px rgba(0,0,0,0.25); z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.25s ease; max-width: 280px; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--amber); }

.divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

@media (max-width: 580px) {
  .fg-row { grid-template-columns: 1fr; }
  .meta-grid { grid-template-columns: 1fr; }
  .panel { max-width: 100%; }
}
</style>

<script>
var db      = firebase.database();
var SESSION = null;

var STATE = {
  view: 'list',
  tasks: {}, projects: {}, users: {},
  createType: 'task', createTags: [], createMembers: [],
  detailType: null, detailId: null
};

/* ── Helpers ──────────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'success') + ' show';
  setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

function ensureAuth() {
  return new Promise(function(resolve, reject) {
    var unsub = firebase.auth().onAuthStateChanged(function(u) {
      unsub();
      if (u) resolve(u); else reject(new Error('Not authenticated — please reload.'));
    });
  });
}

function fmtDate(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
}

function isOverdue(deadline, status) {
  return !!(deadline && status !== 'done' && new Date(deadline) < new Date());
}

function initials(name) {
  if (!name) return '?';
  var p = String(name).trim().split(' ');
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}

function statusLabel(s) {
  return s === 'to-do' ? 'To Do' : s === 'in-progress' ? 'In Progress' : s === 'done' ? 'Done' : '—';
}

function pillStatus(s) {
  var c = s === 'done' ? 'done' : s === 'in-progress' ? 'inprog' : 'todo';
  return '<span class="pill pill-' + c + '">' + statusLabel(s) + '</span>';
}

function pillPriority(p) {
  return '<span class="pill pill-' + esc(p||'low') + '">' + esc(p||'low') + '</span>';
}

function stProgress(proj) {
  var keys = Object.keys(proj.subtasks || {});
  var done = keys.filter(function(k){ return (proj.subtasks[k].status||'') === 'done'; }).length;
  return { done: done, total: keys.length };
}

/* ── Auth ready ───────────────────────────────────────────────────────────── */
window.nlAuthReady = function(session) {
  SESSION = session;
  loadUsers();
  listenData();
  bindUI();
};

/* ── Data ─────────────────────────────────────────────────────────────────── */
function loadUsers() {
  db.ref('users').once('value', function(snap) {
    var all = snap.val() || {};
    Object.keys(all).forEach(function(uid) {
      var u = all[uid];
      if (u.role !== 'club') {
        STATE.users[uid] = { name: u.name || u.email || uid, email: u.email || '' };
      }
    });
  });
}

function listenData() {
  ensureAuth().then(function() {
    db.ref('tasks').on('value', function(snap) {
      STATE.tasks = {};
      var all = snap.val() || {};
      Object.keys(all).forEach(function(id) {
        var t = all[id];
        if (!t.archived && t.members && t.members[SESSION.uid]) {
          STATE.tasks[id] = t;
          STATE.tasks[id]._id = id;
          STATE.tasks[id]._type = 'task';
        }
      });
      renderAll();
    });
    db.ref('projects').on('value', function(snap) {
      STATE.projects = {};
      var all = snap.val() || {};
      Object.keys(all).forEach(function(id) {
        var p = all[id];
        if (!p.archived && p.members && p.members[SESSION.uid]) {
          STATE.projects[id] = p;
          STATE.projects[id]._id = id;
          STATE.projects[id]._type = 'project';
        }
      });
      renderAll();
    });
  }).catch(function(e) { showToast('Load error: ' + e.message, 'error'); });
}

function allItems() {
  var items = [];
  Object.keys(STATE.tasks).forEach(function(id){ items.push(STATE.tasks[id]); });
  Object.keys(STATE.projects).forEach(function(id){ items.push(STATE.projects[id]); });
  return items;
}

/* ── Filters ──────────────────────────────────────────────────────────────── */
function getFilters() {
  return {
    status:   document.getElementById('fStatus').value,
    priority: document.getElementById('fPriority').value,
    tag:      document.getElementById('fTag').value.toLowerCase().trim()
  };
}

function matchFilters(item, f) {
  if (f.status   && item.status   !== f.status)   return false;
  if (f.priority && item.priority !== f.priority) return false;
  if (f.tag) {
    var tags = item.tags || [];
    if (!tags.some(function(t){ return String(t).toLowerCase().indexOf(f.tag) !== -1; })) return false;
  }
  return true;
}

/* ── Render ───────────────────────────────────────────────────────────────── */
function renderAll() {
  if (STATE.view === 'list') renderList(); else renderKanban();
}

function setView(v) {
  STATE.view = v;
  document.getElementById('viewList').style.display   = v === 'list'   ? '' : 'none';
  document.getElementById('viewKanban').style.display = v === 'kanban' ? '' : 'none';
  document.getElementById('btnList').classList.toggle('active',   v === 'list');
  document.getElementById('btnKanban').classList.toggle('active', v === 'kanban');
  renderAll();
}

function renderList() {
  var f = getFilters();
  var items = allItems().filter(function(i){ return matchFilters(i, f); });
  renderListSection('listOverdue', 'Overdue',
    items.filter(function(i){ return isOverdue(i.deadline, i.status); }));
  renderListSection('listActive', 'Active',
    items.filter(function(i){ return !isOverdue(i.deadline, i.status) && i.status !== 'done'; }));
  renderListSection('listDone', 'Done',
    items.filter(function(i){ return i.status === 'done'; }));
}

function renderListSection(elId, label, items) {
  var el = document.getElementById(elId);
  if (!items.length) { el.innerHTML = ''; return; }
  var wrap = document.createElement('div');
  var lbl = document.createElement('div');
  lbl.className = 'section-lbl';
  lbl.textContent = label;
  var cnt = document.createElement('span');
  cnt.className = 'section-lbl__count';
  cnt.textContent = items.length;
  lbl.appendChild(cnt);
  wrap.appendChild(lbl);
  var list = document.createElement('div');
  list.className = 'task-list';
  items.forEach(function(item) {
    list.appendChild(buildListCard(item));
  });
  wrap.appendChild(list);
  el.innerHTML = '';
  el.appendChild(wrap);
}

function buildListCard(item) {
  var card = document.createElement('div');
  card.className = 'task-card task-card--' + (item.priority||'low') + (item.status === 'done' ? ' task-card--done' : '');
  var body = document.createElement('div');
  body.className = 'task-card__body';
  var title = document.createElement('div');
  title.className = 'task-card__title';
  title.textContent = item.title;
  var meta = document.createElement('div');
  meta.className = 'task-card__meta';
  meta.innerHTML = (item._type === 'project'
    ? '<span class="pill pill-project">Project</span>'
    : '<span class="pill pill-task">Task</span>')
    + pillStatus(item.status) + pillPriority(item.priority)
    + (item.deadline ? '<span>&#128197; ' + fmtDate(item.deadline) + '</span>' : '');
  body.appendChild(title);
  body.appendChild(meta);
  if (item.tags && item.tags.length) {
    var tagsEl = document.createElement('div');
    tagsEl.className = 'task-card__tags';
    item.tags.forEach(function(t) {
      var tg = document.createElement('span');
      tg.className = 'tag';
      tg.textContent = t;
      tagsEl.appendChild(tg);
    });
    body.appendChild(tagsEl);
  }
  card.appendChild(body);
  if (item._type === 'project') {
    var p = stProgress(item);
    var right = document.createElement('div');
    right.className = 'task-card__right';
    var prog = document.createElement('div');
    prog.className = 'progress';
    var fill = document.createElement('div');
    fill.className = 'progress__fill';
    fill.style.width = (p.total ? Math.round(p.done/p.total*100) : 0) + '%';
    prog.appendChild(fill);
    var progLbl = document.createElement('span');
    progLbl.style.cssText = 'font-size:10px;color:var(--text-muted)';
    progLbl.textContent = p.done + '/' + p.total;
    right.appendChild(prog);
    right.appendChild(progLbl);
    card.appendChild(right);
  }
  card.addEventListener('click', function(){ openDetail(item._id, item._type); });
  return card;
}

function renderKanban() {
  var f = getFilters();
  var items = allItems().filter(function(i){ return matchFilters(i, f); });
  var statuses = ['to-do', 'in-progress', 'done'];
  statuses.forEach(function(status, ci) {
    var col = items.filter(function(i){ return (i.status||'to-do') === status; });
    document.getElementById('kc' + ci).textContent = col.length;
    var el = document.getElementById('kk' + ci);
    el.innerHTML = '';
    if (!col.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'font-size:12px;color:var(--text-muted);text-align:center;padding:14px';
      empty.textContent = 'None';
      el.appendChild(empty);
      return;
    }
    col.forEach(function(item) {
      var card = document.createElement('div');
      card.className = 'kanban-card';
      var t = document.createElement('div');
      t.className = 'kanban-card__title';
      t.textContent = item.title;
      var m = document.createElement('div');
      m.className = 'kanban-card__meta';
      m.innerHTML = (item._type === 'project'
        ? '<span class="pill pill-project" style="font-size:9px">Project</span>'
        : '<span class="pill pill-task" style="font-size:9px">Task</span>')
        + pillPriority(item.priority)
        + (item.deadline ? '<span>&#128197; ' + fmtDate(item.deadline) + '</span>' : '');
      card.appendChild(t);
      card.appendChild(m);
      card.addEventListener('click', function(){ openDetail(item._id, item._type); });
      el.appendChild(card);
    });
  });
}

/* ── Create panel ─────────────────────────────────────────────────────────── */
function openCreate(type) {
  STATE.createType    = type;
  STATE.createTags    = [];
  STATE.createMembers = [];
  document.getElementById('createTitle').textContent = type === 'project' ? 'New Project' : 'New Task';
  buildCreateForm();
  document.getElementById('createOv').classList.add('open');
  document.getElementById('createPanel').classList.add('open');
}

function closeCreate() {
  document.getElementById('createOv').classList.remove('open');
  document.getElementById('createPanel').classList.remove('open');
}

function buildCreateForm() {
  var body = document.getElementById('createBody');
  body.innerHTML = '';

  /* Title */
  body.appendChild(makeFg('Title *', makeInput('cTitle', 'text', 'What needs doing?')));

  /* Description */
  body.appendChild(makeFg('Description', makeTextarea('cDesc', 'Optional detail\u2026')));

  /* Status + Priority */
  var row = document.createElement('div');
  row.className = 'fg-row';
  row.appendChild(makeFg('Status', makeSelect('cStatus', [
    {v:'to-do',l:'To Do'},{v:'in-progress',l:'In Progress'},{v:'done',l:'Done'}])));
  row.appendChild(makeFg('Priority', makeSelect('cPriority', [
    {v:'medium',l:'Medium'},{v:'high',l:'High'},{v:'low',l:'Low'}])));
  body.appendChild(row);

  /* Deadline */
  body.appendChild(makeFg('Deadline', makeInput('cDeadline', 'date', '')));

  /* Tags */
  var tagFg = document.createElement('div');
  tagFg.className = 'fg';
  var tagLbl = document.createElement('label');
  tagLbl.textContent = 'Tags';
  var tagsWrap = document.createElement('div');
  tagsWrap.className = 'tags-wrap';
  tagsWrap.id = 'tagsWrap';
  var tagInput = document.createElement('input');
  tagInput.className = 'tag-text-input';
  tagInput.id = 'tagInput';
  tagInput.placeholder = 'Type tag, press Enter\u2026';
  tagInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      var val = tagInput.value.replace(/,/g,'').trim();
      if (val && STATE.createTags.indexOf(val) === -1) {
        STATE.createTags.push(val);
        renderTagChips();
      }
      tagInput.value = '';
    }
  });
  tagsWrap.appendChild(tagInput);
  tagFg.appendChild(tagLbl);
  tagFg.appendChild(tagsWrap);
  body.appendChild(tagFg);

  /* Members */
  var memFg = document.createElement('div');
  memFg.className = 'fg';
  var memLbl = document.createElement('label');
  memLbl.textContent = 'Add Members';
  var memSearch = document.createElement('div');
  memSearch.className = 'member-search';
  var memInput = document.createElement('input');
  memInput.id = 'memberInput';
  memInput.style.cssText = 'width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:14px;color:var(--text);background:var(--white);';
  memInput.placeholder = 'Search staff by name\u2026';
  memInput.setAttribute('autocomplete','off');
  var memResults = document.createElement('div');
  memResults.className = 'member-results';
  memResults.id = 'memberResults';
  memInput.addEventListener('input', function(){ searchMembers(memInput.value); });
  memSearch.appendChild(memInput);
  memSearch.appendChild(memResults);
  var memChips = document.createElement('div');
  memChips.className = 'members-list';
  memChips.id = 'memberChips';
  memFg.appendChild(memLbl);
  memFg.appendChild(memSearch);
  memFg.appendChild(memChips);
  body.appendChild(memFg);
}

function makeFg(labelText, inputEl) {
  var fg = document.createElement('div');
  fg.className = 'fg';
  var lbl = document.createElement('label');
  lbl.textContent = labelText;
  fg.appendChild(lbl);
  fg.appendChild(inputEl);
  return fg;
}

function makeInput(id, type, placeholder) {
  var el = document.createElement('input');
  el.id = id; el.type = type || 'text'; el.placeholder = placeholder || '';
  return el;
}

function makeTextarea(id, placeholder) {
  var el = document.createElement('textarea');
  el.id = id; el.placeholder = placeholder || '';
  return el;
}

function makeSelect(id, options) {
  var el = document.createElement('select');
  el.id = id;
  options.forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o.v; opt.textContent = o.l;
    el.appendChild(opt);
  });
  return el;
}

function renderTagChips() {
  var wrap  = document.getElementById('tagsWrap');
  var input = document.getElementById('tagInput');
  if (!wrap || !input) return;
  wrap.querySelectorAll('.tag-chip').forEach(function(c){ c.remove(); });
  STATE.createTags.forEach(function(tag, i) {
    var chip = document.createElement('span');
    chip.className = 'tag-chip';
    var txt = document.createTextNode(tag);
    chip.appendChild(txt);
    var x = document.createElement('button');
    x.className = 'tag-chip__x';
    x.textContent = '\u00d7';
    x.setAttribute('type','button');
    (function(idx) {
      x.addEventListener('click', function(e) {
        e.stopPropagation();
        STATE.createTags.splice(idx, 1);
        renderTagChips();
      });
    })(i);
    chip.appendChild(x);
    wrap.insertBefore(chip, input);
  });
}

function searchMembers(val) {
  var res = document.getElementById('memberResults');
  if (!res) return;
  if (!val.trim()) { res.classList.remove('open'); return; }
  var lower = val.toLowerCase();
  var matches = Object.keys(STATE.users).filter(function(uid) {
    if (uid === SESSION.uid) return false;
    if (STATE.createMembers.some(function(m){ return m.uid === uid; })) return false;
    return STATE.users[uid].name.toLowerCase().indexOf(lower) !== -1;
  }).slice(0,8);
  res.innerHTML = '';
  if (!matches.length) { res.classList.remove('open'); return; }
  matches.forEach(function(uid) {
    var u = STATE.users[uid];
    var opt = document.createElement('div');
    opt.className = 'member-opt';
    var av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = initials(u.name);
    var nm = document.createElement('span');
    nm.textContent = u.name;
    opt.appendChild(av);
    opt.appendChild(nm);
    opt.addEventListener('mousedown', function(e) {
      e.preventDefault();
      STATE.createMembers.push({ uid: uid, name: u.name });
      renderMemberChips();
      document.getElementById('memberInput').value = '';
      res.classList.remove('open');
    });
    res.appendChild(opt);
  });
  res.classList.add('open');
}

function renderMemberChips() {
  var wrap = document.getElementById('memberChips');
  if (!wrap) return;
  wrap.innerHTML = '';
  STATE.createMembers.forEach(function(m, i) {
    var chip = document.createElement('div');
    chip.className = 'member-chip';
    var av = document.createElement('div');
    av.className = 'avatar';
    av.style.cssText = 'width:20px;height:20px;font-size:9px';
    av.textContent = initials(m.name);
    var nm = document.createElement('span');
    nm.style.cssText = 'font-size:12px';
    nm.textContent = m.name;
    var x = document.createElement('button');
    x.className = 'member-chip__x';
    x.textContent = '\u00d7';
    x.setAttribute('type','button');
    (function(idx) {
      x.addEventListener('click', function() {
        STATE.createMembers.splice(idx, 1);
        renderMemberChips();
      });
    })(i);
    chip.appendChild(av);
    chip.appendChild(nm);
    chip.appendChild(x);
    wrap.appendChild(chip);
  });
}

function saveCreate() {
  var titleEl = document.getElementById('cTitle');
  if (!titleEl) return;
  var title = titleEl.value.trim();
  if (!title) { showToast('Please enter a title', 'error'); return; }

  var deadline = document.getElementById('cDeadline').value;
  var members  = {};
  members[SESSION.uid] = true;
  STATE.createMembers.forEach(function(m){ members[m.uid] = true; });

  var data = {
    title:       title,
    description: (document.getElementById('cDesc').value || '').trim(),
    status:      document.getElementById('cStatus').value,
    priority:    document.getElementById('cPriority').value,
    deadline:    deadline ? new Date(deadline).getTime() : null,
    tags:        STATE.createTags.slice(),
    members:     members,
    createdBy:   SESSION.uid,
    createdAt:   Date.now(),
    archived:    false,
    files:       {}
  };

  var btn = document.getElementById('createSave');
  btn.disabled = true;
  btn.textContent = 'Saving\u2026';

  var node = STATE.createType === 'project' ? 'projects' : 'tasks';
  ensureAuth().then(function() {
    return db.ref(node).push(data);
  }).then(function() {
    showToast((STATE.createType === 'project' ? 'Project' : 'Task') + ' created', 'success');
    closeCreate();
  }).catch(function(e) {
    showToast('Error: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Save';
  });
}

/* ── Detail panel ─────────────────────────────────────────────────────────── */
function openDetail(id, type) {
  STATE.detailType = type;
  STATE.detailId   = id;
  var item = type === 'task' ? STATE.tasks[id] : STATE.projects[id];
  if (!item) return;
  document.getElementById('detailTitle').textContent = type === 'project' ? 'Project' : 'Task';
  renderDetail(item);
  document.getElementById('detailOv').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOv').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
}

function renderDetail(item) {
  var body      = document.getElementById('detailBody');
  var isCreator = item.createdBy === SESSION.uid || SESSION.role === 'superadmin';
  body.innerHTML = '';

  /* Title block */
  var hd = document.createElement('div');
  hd.style.cssText = 'margin-bottom:16px';
  var badges = document.createElement('div');
  badges.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px';
  badges.innerHTML = (item._type === 'project'
    ? '<span class="pill pill-project">Project</span>'
    : '<span class="pill pill-task">Task</span>')
    + pillStatus(item.status) + pillPriority(item.priority);
  var titleEl = document.createElement('div');
  titleEl.style.cssText = 'font-size:19px;font-weight:900;font-variation-settings:\'wght\' 900;line-height:1.2';
  titleEl.textContent = item.title;
  hd.appendChild(badges);
  hd.appendChild(titleEl);
  body.appendChild(hd);

  /* Description */
  if (item.description) {
    var ds = makeSec('Description');
    var dt = document.createElement('div');
    dt.style.cssText = 'font-size:14px;line-height:1.6';
    dt.textContent = item.description;
    ds.appendChild(dt);
    body.appendChild(ds);
  }

  /* Meta */
  var ms = makeSec('Details');
  var mg = document.createElement('div');
  mg.className = 'meta-grid';
  var creatorName = item.createdBy === SESSION.uid ? 'You'
    : (STATE.users[item.createdBy] ? STATE.users[item.createdBy].name : '—');
  mg.innerHTML = metaItem('Deadline', fmtDate(item.deadline))
    + metaItem('Created by', creatorName)
    + metaItem('Created', fmtDate(item.createdAt));
  ms.appendChild(mg);
  body.appendChild(ms);

  /* Tags */
  if (item.tags && item.tags.length) {
    var ts = makeSec('Tags');
    var tw = document.createElement('div');
    tw.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap';
    item.tags.forEach(function(t) {
      var tg = document.createElement('span');
      tg.className = 'tag';
      tg.textContent = t;
      tw.appendChild(tg);
    });
    ts.appendChild(tw);
    body.appendChild(ts);
  }

  /* Members */
  var memberUids = Object.keys(item.members || {});
  if (memberUids.length) {
    var memS = makeSec('Members');
    var memW = document.createElement('div');
    memW.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap';
    memberUids.forEach(function(uid) {
      var name = uid === SESSION.uid ? 'You' : (STATE.users[uid] ? STATE.users[uid].name : uid);
      var mw = document.createElement('div');
      mw.style.cssText = 'display:flex;align-items:center;gap:5px;font-size:13px';
      var av = document.createElement('div');
      av.className = 'avatar';
      av.textContent = initials(name);
      mw.appendChild(av);
      mw.appendChild(document.createTextNode(name));
      memW.appendChild(mw);
    });
    memS.appendChild(memW);
    body.appendChild(memS);
  }

  /* Status update */
  var stS = makeSec('Update Status');
  var stSel = makeSelect('detailStatus', [
    {v:'to-do',l:'To Do'},{v:'in-progress',l:'In Progress'},{v:'done',l:'Done'}]);
  stSel.style.cssText = 'padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:13px;background:var(--white);cursor:pointer';
  for (var oi = 0; oi < stSel.options.length; oi++) {
    if (stSel.options[oi].value === item.status) stSel.selectedIndex = oi;
  }
  stSel.addEventListener('change', function() {
    var node = STATE.detailType === 'task' ? 'tasks' : 'projects';
    ensureAuth().then(function() {
      return db.ref(node + '/' + STATE.detailId + '/status').set(stSel.value);
    }).then(function(){ showToast('Status updated', 'success'); })
      .catch(function(e){ showToast('Error: ' + e.message, 'error'); });
  });
  stS.appendChild(stSel);
  body.appendChild(stS);

  /* Subtasks (projects only) */
  if (item._type === 'project') {
    var sts = makeSec('Subtasks');
    if (isCreator) {
      var addBtn = document.createElement('button');
      addBtn.className = 'btn btn-ghost';
      addBtn.style.cssText = 'padding:3px 10px;font-size:10px';
      addBtn.textContent = '+ Add';
      addBtn.setAttribute('type','button');
      sts.querySelector('.detail-sec__lbl').appendChild(addBtn);

      var stForm = document.createElement('div');
      stForm.id = 'addStForm';
      stForm.style.cssText = 'display:none;background:var(--off-white);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px';
      var stTitleInput = makeInput('stTitle', 'text', 'Subtask title *');
      stTitleInput.style.cssText = 'width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:13px;margin-bottom:8px';
      var stRow = document.createElement('div');
      stRow.className = 'fg-row';
      var stAssigneeSel = makeSelect('stAssignee',
        [{v:'',l:'\u2014 select \u2014'}].concat(memberUids.map(function(uid){
          var n = uid === SESSION.uid ? 'You' : (STATE.users[uid] ? STATE.users[uid].name : uid);
          return {v:uid, l:n};
        })));
      stAssigneeSel.style.cssText = 'width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:13px';
      var stDeadlineInput = makeInput('stDeadline', 'date', '');
      stDeadlineInput.style.cssText = 'width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:13px';
      stRow.appendChild(stAssigneeSel);
      stRow.appendChild(stDeadlineInput);
      var stBtns = document.createElement('div');
      stBtns.style.cssText = 'display:flex;gap:6px;margin-top:8px';
      var stSaveBtn = document.createElement('button');
      stSaveBtn.className = 'btn btn-primary';
      stSaveBtn.style.cssText = 'padding:7px 14px';
      stSaveBtn.textContent = 'Save subtask';
      stSaveBtn.setAttribute('type','button');
      stSaveBtn.addEventListener('click', saveSubtask);
      var stCancelBtn = document.createElement('button');
      stCancelBtn.className = 'btn btn-ghost';
      stCancelBtn.style.cssText = 'padding:7px 14px';
      stCancelBtn.textContent = 'Cancel';
      stCancelBtn.setAttribute('type','button');
      stCancelBtn.addEventListener('click', function(){ stForm.style.display = 'none'; });
      stBtns.appendChild(stSaveBtn);
      stBtns.appendChild(stCancelBtn);
      stForm.appendChild(stTitleInput);
      stForm.appendChild(stRow);
      stForm.appendChild(stBtns);
      sts.appendChild(stForm);
      addBtn.addEventListener('click', function() {
        stForm.style.display = stForm.style.display === 'none' ? '' : 'none';
      });
    }

    var subtasks = item.subtasks || {};
    var stKeys   = Object.keys(subtasks);
    if (stKeys.length) {
      stKeys.forEach(function(stId) {
        var st   = subtasks[stId];
        var aName = st.assignedTo === SESSION.uid ? 'You'
          : (STATE.users[st.assignedTo] ? STATE.users[st.assignedTo].name : '—');
        var stEl = document.createElement('div');
        stEl.className = 'subtask-item';
        var stHead = document.createElement('div');
        stHead.className = 'subtask-item__head';
        var stTitle = document.createElement('div');
        stTitle.className = 'subtask-item__title';
        stTitle.textContent = st.title;
        stHead.appendChild(stTitle);
        stHead.innerHTML += pillStatus(st.status) + pillPriority(st.priority||'medium');
        var stMeta = document.createElement('div');
        stMeta.className = 'subtask-item__meta';
        stMeta.textContent = '\ud83d\udc64 ' + aName + (st.deadline ? ' \u00b7 \ud83d\udcc5 ' + fmtDate(st.deadline) : '');
        stEl.appendChild(stHead);
        stEl.appendChild(stMeta);
        if (st.assignedTo === SESSION.uid || isCreator) {
          var stSS = makeSelect('stStatus_' + stId, [
            {v:'to-do',l:'To Do'},{v:'in-progress',l:'In Progress'},{v:'done',l:'Done'}]);
          stSS.style.cssText = 'margin-top:6px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:12px;background:var(--white)';
          for (var si = 0; si < stSS.options.length; si++) {
            if (stSS.options[si].value === (st.status||'to-do')) stSS.selectedIndex = si;
          }
          (function(sid) {
            stSS.addEventListener('change', function(e) {
              e.stopPropagation();
              ensureAuth().then(function() {
                return db.ref('projects/' + STATE.detailId + '/subtasks/' + sid + '/status').set(stSS.value);
              }).then(function(){ showToast('Subtask updated', 'success'); })
                .catch(function(err){ showToast('Error: ' + err.message, 'error'); });
            });
          })(stId);
          stEl.appendChild(stSS);
        }
        sts.appendChild(stEl);
      });
    } else {
      var noSt = document.createElement('div');
      noSt.style.cssText = 'font-size:13px;color:var(--text-muted);padding:4px 0';
      noSt.textContent = 'No subtasks yet.';
      sts.appendChild(noSt);
    }
    body.appendChild(sts);
  }

  /* Notes */
  var notesSec = makeSec('Notes');
  var notes    = item.notes || {};
  var noteKeys = Object.keys(notes).sort();
  if (noteKeys.length) {
    var thread = document.createElement('div');
    thread.className = 'notes-thread';
    noteKeys.forEach(function(nId) {
      var n  = notes[nId];
      var nd = document.createElement('div');
      nd.className = 'note';
      var nh = document.createElement('div');
      nh.className = 'note__head';
      var na = document.createElement('span');
      na.className = 'note__author';
      na.textContent = n.name || '—';
      var nt = document.createElement('span');
      nt.className = 'note__time';
      nt.textContent = fmtDate(n.timestamp);
      nh.appendChild(na);
      nh.appendChild(nt);
      var nb = document.createElement('div');
      nb.className = 'note__text';
      nb.textContent = n.text || '';
      nd.appendChild(nh);
      nd.appendChild(nb);
      thread.appendChild(nd);
    });
    notesSec.appendChild(thread);
  }
  var noteRow = document.createElement('div');
  noteRow.className = 'note-row';
  var noteInput = document.createElement('textarea');
  noteInput.id = 'noteInput';
  noteInput.placeholder = 'Add a note\u2026';
  noteInput.style.cssText = 'flex:1;min-height:56px;resize:vertical;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:13px;color:var(--text)';
  var noteBtn = document.createElement('button');
  noteBtn.className = 'btn btn-primary';
  noteBtn.style.cssText = 'align-self:flex-end';
  noteBtn.textContent = 'Post';
  noteBtn.setAttribute('type','button');
  noteBtn.addEventListener('click', saveNote);
  noteRow.appendChild(noteInput);
  noteRow.appendChild(noteBtn);
  notesSec.appendChild(noteRow);
  body.appendChild(notesSec);

  /* Actions */
  if (isCreator) {
    var hz = document.createElement('hr');
    hz.className = 'divider';
    body.appendChild(hz);
    var dz = document.createElement('div');
    dz.className = 'danger-zone';
    var dzl = document.createElement('div');
    dzl.className = 'danger-zone__lbl';
    dzl.textContent = 'Actions';
    var archBtn = document.createElement('button');
    archBtn.className = 'btn btn-ghost';
    archBtn.style.marginRight = '8px';
    archBtn.textContent = 'Archive';
    archBtn.setAttribute('type','button');
    archBtn.addEventListener('click', archiveItem);
    var delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = 'Delete';
    delBtn.setAttribute('type','button');
    delBtn.addEventListener('click', function() {
      if (delBtn.dataset.confirmed !== '1') {
        delBtn.dataset.confirmed = '1';
        delBtn.textContent = 'Confirm delete?';
        delBtn.style.background = 'var(--red)';
        delBtn.style.color = '#fff';
        delBtn.style.borderColor = 'var(--red)';
        setTimeout(function() {
          if (delBtn.dataset.confirmed === '1') {
            delBtn.dataset.confirmed = '0';
            delBtn.textContent = 'Delete';
            delBtn.style.background = '';
            delBtn.style.color = '';
            delBtn.style.borderColor = '';
          }
        }, 3000);
        return;
      }
      deleteItem();
    });
    dz.appendChild(dzl);
    dz.appendChild(archBtn);
    dz.appendChild(delBtn);
    body.appendChild(dz);
  }
}

function makeSec(labelText) {
  var sec = document.createElement('div');
  sec.className = 'detail-sec';
  var lbl = document.createElement('div');
  lbl.className = 'detail-sec__lbl';
  lbl.textContent = labelText;
  sec.appendChild(lbl);
  return sec;
}

function metaItem(label, value) {
  return '<div class="meta-item"><label>' + esc(label) + '</label><span>' + esc(value) + '</span></div>';
}

function saveSubtask() {
  var titleEl = document.getElementById('stTitle');
  if (!titleEl) return;
  var title = titleEl.value.trim();
  if (!title) { showToast('Subtask needs a title', 'error'); return; }
  var deadline = document.getElementById('stDeadline').value;
  var data = {
    title:      title,
    assignedTo: document.getElementById('stAssignee').value || null,
    deadline:   deadline ? new Date(deadline).getTime() : null,
    status:     'to-do',
    priority:   'medium',
    notes:      {}, files: {}
  };
  var btn = document.getElementById('stSaveBtn') || document.querySelector('#addStForm .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving\u2026'; }
  ensureAuth().then(function() {
    return db.ref('projects/' + STATE.detailId + '/subtasks').push(data);
  }).then(function() {
    showToast('Subtask added', 'success');
    openDetail(STATE.detailId, 'project');
  }).catch(function(e) {
    showToast('Error: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Save subtask'; }
  });
}

function saveNote() {
  var input = document.getElementById('noteInput');
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;
  var node = STATE.detailType === 'task' ? 'tasks' : 'projects';
  var note = { uid: SESSION.uid, name: SESSION.name || '', text: text, timestamp: Date.now() };
  ensureAuth().then(function() {
    return db.ref(node + '/' + STATE.detailId + '/notes').push(note);
  }).then(function() {
    showToast('Note posted', 'success');
    input.value = '';
    openDetail(STATE.detailId, STATE.detailType);
  }).catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

function archiveItem() {
  var node = STATE.detailType === 'task' ? 'tasks' : 'projects';
  ensureAuth().then(function() {
    return db.ref(node + '/' + STATE.detailId + '/archived').set(true);
  }).then(function() {
    showToast('Archived', 'info');
    closeDetail();
  }).catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

function deleteItem() {
  var node = STATE.detailType === 'task' ? 'tasks' : 'projects';
  ensureAuth().then(function() {
    return db.ref(node + '/' + STATE.detailId).remove();
  }).then(function() {
    showToast('Deleted', 'success');
    closeDetail();
  }).catch(function(e) { showToast('Error: ' + e.message, 'error'); });
}

/* ── UI bindings ──────────────────────────────────────────────────────────── */
function bindUI() {
  document.getElementById('btnNewTask').addEventListener('click',    function(){ openCreate('task'); });
  document.getElementById('btnNewProject').addEventListener('click', function(){ openCreate('project'); });
  document.getElementById('createClose').addEventListener('click',   closeCreate);
  document.getElementById('createCancel').addEventListener('click',  closeCreate);
  document.getElementById('createOv').addEventListener('click',      closeCreate);
  document.getElementById('createSave').addEventListener('click',    saveCreate);
  document.getElementById('detailClose').addEventListener('click',   closeDetail);
  document.getElementById('detailOv').addEventListener('click',      closeDetail);
  document.getElementById('btnList').addEventListener('click',    function(){ setView('list'); });
  document.getElementById('btnKanban').addEventListener('click',  function(){ setView('kanban'); });
  document.getElementById('fStatus').addEventListener('change',   renderAll);
  document.getElementById('fPriority').addEventListener('change', renderAll);
  document.getElementById('fTag').addEventListener('input',       renderAll);
}
</script>
</body>
</html>
