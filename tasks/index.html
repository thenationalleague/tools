<!DOCTYPE html>
<!--
  NL Tasks — NL Tools
  Version: 5.4
  Date: 15/04/2026

  CHANGELOG
  v5.0 (15/04/2026)
    - Sidebar simplified: My Day / All Tasks / Projects only
    - Task create panel slimmed down: title, due, priority, assign, tags
      Extra fields (followers, deps, description) moved to detail panel
    - FIXED tags: unique IDs per context, no DOM collision
    - FIXED people picker: loadUsers() returns Promise, form waits
      before rendering — no more empty search on fast open
    - FIXED people picker: results dropdown correctly positioned
    - Projects: colour picker (8 colours)
    - Projects: full tab set — Board / Gantt / Members / Settings / Activity
    - Projects: Members tab — add/remove members
    - Projects: Settings tab — rename, archive, delete
    - Projects: Activity feed — auto-logged on task create/status change/note
    - Project cards show chosen colour as top border
    - Mobile: bottom nav My Day / All / Projects / More
    - More drawer: accessible views + project list
  v5.1 (15/04/2026)
    - Styled filter dropdowns (custom, not native select)
    - Task title editable inline in detail panel (saves on blur)
    - Task rename working
    - Dependencies restored to create and detail panels
    - Start date restored to create and detail panels
    - "Start when dependency ends" checkbox in detail panel
    - Task deadline inherits project deadline if not set (silent)
    - "Remove date / revert to project date" link on deadline field
    - Gantt: ⚠ flag on bar when start < dependency end
    - Gantt: uses effectiveDeadline = task.deadline || project.deadline
    - Gantt: dashed bar style for inherited (project) deadline
    - Board view: drag-drop on desktop (HTML5 drag API)
    - Board view: tap-to-change-status on mobile (long-press menu)
    - Colour swatches larger (36px)
-->

<style>
@font-face {
  font-family: "carbona-variable";
  src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
       url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
  font-display: swap; font-style: normal; font-weight: 200 900;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

:root {
  --primary: #9e0000; --primary-dim: #7a0000;
  --navy: #223b7c; --navy-mid: #1a2f63;
  --red: #c0392b; --red-light: #fdf0ef;
  --green: #1e7e34; --green-light: #edf7ee;
  --amber: #e67e22; --amber-light: #fef6ec;
  --purple: #5b21b6; --purple-light: #ede9ff;
  --white: #ffffff; --off-white: #f4f6f9;
  --text: #1a2a44; --text-muted: #5a6a82;
  --border: #dde3ed; --radius: 8px;
  --shadow: 0 2px 12px rgba(10,22,40,0.10);
  --font: 'carbona-variable','carbona',sans-serif;
  --sidebar-w: 220px;
  --topbar-h: 64px;
  --bottombar-h: 60px;
}

body { font-family: var(--font); font-size: 15px; line-height: 1.5; font-variation-settings: 'wght' 400; color: var(--text); background: var(--off-white); overflow: hidden; }

/* APP SHELL */
.app { display: flex; flex-direction: column; height: 100vh; }
.body-wrap { display: flex; flex: 1; overflow: hidden; }

/* TOPBAR */
.topbar { background: var(--primary); color: var(--white); height: var(--topbar-h); padding: 0 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.2); border-bottom: 5px solid var(--navy); }
.topbar img { height: 36px; flex-shrink: 0; }
.topbar__title { font-weight: 900; font-variation-settings: 'wght' 900; font-size: 17px; flex: 1; text-transform: uppercase; letter-spacing: 0.04em; }
.topbar__title span { color: rgba(255,255,255,0.5); }
.topbar__badge { background: var(--red); color: #fff; border-radius: 20px; font-size: 10px; font-weight: 900; padding: 2px 8px; display: none; }
.topbar__badge.show { display: inline-block; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--navy); display: flex; flex-direction: column; overflow-y: auto; padding: 16px 0 80px; }
.sidebar__lbl { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(255,255,255,0.35); padding: 16px 18px 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 600; font-variation-settings: 'wght' 600; color: rgba(255,255,255,0.7); border: none; background: none; font-family: var(--font); width: 100%; text-align: left; transition: all 0.12s; position: relative; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: var(--white); }
.nav-item.active { background: rgba(255,255,255,0.14); color: var(--white); font-weight: 800; font-variation-settings: 'wght' 800; }
.nav-item.active::before { content:''; position:absolute; left:0; top:4px; bottom:4px; width:3px; background:var(--primary); border-radius:0 2px 2px 0; }
.nav-item__icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-item__badge { background: var(--primary); color: #fff; border-radius: 20px; font-size: 9px; font-weight: 900; padding: 1px 6px; margin-left: auto; display: none; }
.nav-item__badge.show { display: inline-block; }
.nav-item--proj { padding-left: 30px; font-size: 12px; }
.sidebar__add-proj { display: flex; align-items: center; gap: 8px; padding: 7px 18px 7px 30px; cursor: pointer; font-size: 12px; color: rgba(255,255,255,0.35); border: none; background: none; font-family: var(--font); width: 100%; text-align: left; transition: color 0.12s; }
.sidebar__add-proj:hover { color: rgba(255,255,255,0.75); }
.sidebar__proj-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 2px; }

/* MAIN */
.main-content { flex: 1; overflow-y: auto; padding: 24px 28px 100px; -webkit-overflow-scrolling: touch; }
@media (max-width: 768px) { .main-content { padding: 16px 14px 90px; } }

/* VIEW HEADER */
.view-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.view-header__left { flex: 1; }
.view-header h1 { font-size: 22px; font-weight: 900; font-variation-settings: 'wght' 900; line-height: 1.2; }
.view-header__sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.view-header__actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

/* CUSTOM FILTER DROPDOWN */
.flt-wrap { position: relative; display: inline-block; }
.flt-btn { display: flex; align-items: center; gap: 6px; padding: 7px 12px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; color: var(--text); cursor: pointer; white-space: nowrap; transition: border-color 0.15s; user-select: none; }
.flt-btn:hover { border-color: var(--navy); }
.flt-btn.active { border-color: var(--navy); background: #f0f4ff; color: var(--navy); font-weight: 700; }
.flt-btn__caret { font-size: 9px; color: var(--text-muted); transition: transform 0.15s; }
.flt-btn.open .flt-btn__caret { transform: rotate(180deg); }
.flt-dropdown { position: absolute; top: calc(100% + 4px); left: 0; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 4px 20px rgba(10,22,40,0.12); min-width: 160px; z-index: 100; display: none; overflow: hidden; }
.flt-dropdown.open { display: block; }
.flt-option { padding: 9px 14px; font-size: 13px; cursor: pointer; transition: background 0.1s; display: flex; align-items: center; gap: 8px; }
.flt-option:hover { background: var(--off-white); }
.flt-option.selected { color: var(--navy); font-weight: 700; }
.flt-option.selected::before { content: '✓'; font-size: 11px; color: var(--navy); }
.flt-option:not(.selected)::before { content: ''; display: inline-block; width: 11px; }

/* DRAG DROP */
.kanban-card.dragging { opacity: 0.4; }
.kanban-col.drag-over { background: #e8edf8; border-color: var(--navy); }
.kanban-card--mobile-menu { position: relative; }

/* GANTT INHERITED BAR */
.g-bar--inherited { opacity: 0.6; border: 2px dashed rgba(255,255,255,0.5); }
.g-bar--conflict-icon { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); font-size: 11px; }

/* COLOUR SWATCH LARGER */
.colour-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; flex-shrink: 0; }
.colour-swatch.selected { border-color: var(--text); transform: scale(1.15); box-shadow: 0 0 0 2px var(--white), 0 0 0 4px var(--text); }

/* INLINE TITLE EDIT */
.detail-title-input { font-size: 20px; font-weight: 900; font-variation-settings: 'wght' 900; line-height: 1.25; width: 100%; border: none; border-bottom: 2px solid transparent; padding: 0 0 4px; font-family: var(--font); color: var(--text); background: transparent; transition: border-color 0.15s; }
.detail-title-input:focus { outline: none; border-bottom-color: var(--navy); }

/* DATE ROW WITH RESET LINK */
.date-row { display: flex; align-items: center; gap: 8px; }
.date-row input { flex: 1; }
.date-reset { font-size: 11px; color: var(--text-muted); cursor: pointer; white-space: nowrap; text-decoration: underline; background: none; border: none; font-family: var(--font); padding: 0; }
.date-reset:hover { color: var(--primary); }

/* DEP CHECKBOX ROW */
.dep-snap-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 13px; color: var(--text-muted); }
.dep-snap-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--navy); }

/* FILTER BAR */
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-select { padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; background: var(--white); color: var(--text); cursor: pointer; }
.filter-input { flex: 1; min-width: 140px; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; background: var(--white); color: var(--text); }
.filter-input:focus, .filter-select:focus { outline: none; border-color: var(--navy); }

/* DATE GROUPS */
.date-group { margin-bottom: 20px; }
.date-group__lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.date-group__lbl::after { content:''; flex:1; height:1px; background:var(--border); }
.date-group__lbl--overdue { color: var(--red); }
.date-group__lbl--today { color: var(--primary); }

/* TASK ROW */
.task-row { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; margin-bottom: 6px; box-shadow: var(--shadow); }
.task-row:hover { border-color: var(--navy); box-shadow: 0 4px 16px rgba(34,59,124,0.1); }
.task-row--done { opacity: 0.55; }
.task-row--overdue { border-left: 3px solid var(--red); }
.task-row--today { border-left: 3px solid var(--primary); }
.task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; cursor: pointer; }
.task-check:hover { border-color: var(--navy); }
.task-check--done { border-color: var(--green); background: var(--green); }
.task-check--done::after { content:'✓'; color:#fff; font-size:12px; font-weight:900; }
.task-check--urgent, .task-check--high { border-color: var(--red); }
.task-check--medium { border-color: var(--amber); }
.task-row__body { flex: 1; min-width: 0; }
.task-row__title { font-size: 14px; font-weight: 600; font-variation-settings: 'wght' 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.task-row--done .task-row__title { text-decoration: line-through; color: var(--text-muted); }
.task-row__meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-size: 11px; color: var(--text-muted); }
.task-row__meta--overdue { color: var(--red); font-weight: 700; }
.task-row__tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.task-row__right { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
.task-row__avs { display: flex; }
.av { width: 24px; height: 24px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 2px solid var(--white); margin-left: -6px; flex-shrink: 0; }
.av:first-child { margin-left: 0; }
.av--sm { width: 20px; height: 20px; font-size: 8px; }
.star-btn { background: none; border: none; font-size: 15px; cursor: pointer; opacity: 0.25; padding: 2px; transition: opacity 0.15s; }
.star-btn:hover, .star-btn--on { opacity: 1; }

/* TAGS */
.tag { background: var(--purple-light); color: var(--purple); font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px; }

/* PROJECT CARDS */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 14px; }
.proj-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); border-top: 4px solid var(--navy); padding: 18px; cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow); }
.proj-card:hover { box-shadow: 0 6px 20px rgba(34,59,124,0.12); transform: translateY(-1px); }
.proj-card--done { opacity: 0.65; }
.proj-card__title { font-size: 15px; font-weight: 800; font-variation-settings: 'wght' 800; margin-bottom: 6px; }
.proj-card__desc { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proj-card__meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.proj-card__progress { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
.proj-card__progress-fill { height: 100%; border-radius: 4px; background: var(--green); }
.proj-card__footer { display: flex; align-items: center; justify-content: space-between; }

/* PROJECT DETAIL */
.proj-header { padding: 20px 0 0; margin-bottom: 0; }
.proj-header__top { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
.proj-header__colour { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
.proj-header__title { font-size: 24px; font-weight: 900; font-variation-settings: 'wght' 900; flex: 1; line-height: 1.2; }
.proj-header__meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
.proj-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; gap: 0; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
.proj-tabs::-webkit-scrollbar { display: none; }
.proj-tab { padding: 9px 18px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; border: none; background: none; font-family: var(--font); color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
.proj-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* KANBAN */
.kanban { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; }
.kanban-col { flex-shrink: 0; width: 270px; background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.kanban-col__head { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.kanban-col__cards { display: flex; flex-direction: column; gap: 8px; }
.kanban-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; transition: border-color 0.15s; box-shadow: var(--shadow); }
.kanban-card:hover { border-color: var(--navy); }
.kanban-card__title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.kanban-card__meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

/* GANTT */
.gantt-wrap { overflow-x: auto; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); }
.gantt-table { border-collapse: collapse; min-width: 600px; width: 100%; }
.gantt-table th { background: var(--navy); color: var(--white); font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 4px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); white-space: nowrap; min-width: 50px; }
.gantt-table th.g-lbl { text-align: left; padding-left: 12px; min-width: 160px; width: 160px; border-right: 2px solid rgba(255,255,255,0.2); }
.gantt-table td { border-bottom: 1px solid var(--border); height: 34px; padding: 0; vertical-align: middle; }
.gantt-table td.g-lbl { padding: 0 12px; border-right: 2px solid var(--border); min-width: 160px; width: 160px; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.g-cell { position: relative; }
.g-bar { position: absolute; top: 6px; height: 22px; border-radius: 4px; display: flex; align-items: center; padding: 0 6px; font-size: 10px; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; cursor: pointer; }
.g-bar--todo { background: var(--navy); }
.g-bar--inprog { background: var(--amber); }
.g-bar--done { background: var(--green); }
.g-bar--conflict { outline: 2px solid var(--red); }
.g-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--primary); opacity: 0.7; pointer-events: none; z-index: 2; }
.conflict-banner { background: var(--red-light); border: 1px solid #f5c6c2; border-radius: var(--radius); padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--red); display: none; }
.conflict-banner.show { display: block; }

/* MEMBERS TAB */
.member-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.member-row:last-child { border-bottom: none; }
.member-row__av { width: 36px; height: 36px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.member-row__info { flex: 1; }
.member-row__name { font-size: 14px; font-weight: 700; }
.member-row__email { font-size: 12px; color: var(--text-muted); }
.member-row__owner { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--primary); }
.member-row__remove { background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-size: 11px; cursor: pointer; padding: 4px 10px; font-family: var(--font); transition: all 0.15s; }
.member-row__remove:hover { border-color: var(--red); color: var(--red); }

/* ACTIVITY FEED */
.activity-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.activity-item:last-child { border-bottom: none; }
.activity-item__icon { width: 28px; height: 28px; border-radius: 50%; background: var(--off-white); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px; }
.activity-item__body { flex: 1; }
.activity-item__text { font-size: 13px; line-height: 1.4; }
.activity-item__text strong { font-weight: 700; }
.activity-item__time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* SETTINGS TAB */
.settings-section { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.settings-section__title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 14px; }

/* COLOUR PICKER */
.colour-picker { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
.colour-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; flex-shrink: 0; }
.colour-swatch.selected { border-color: var(--text); transform: scale(1.15); }
.colour-swatch:hover { transform: scale(1.1); }

/* PILLS */
.pill { display: inline-block; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 20px; }
.pill-todo   { background: var(--off-white); color: var(--text-muted); border: 1px solid var(--border); }
.pill-inprog { background: var(--amber-light); color: var(--amber); }
.pill-done   { background: var(--green-light); color: var(--green); }
.pill-high   { background: var(--red-light); color: var(--red); }
.pill-medium { background: var(--amber-light); color: var(--amber); }
.pill-low    { background: #f0f4ff; color: var(--navy); }
.pill-urgent { background: var(--red); color: #fff; }

/* PANEL */
.panel-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.5); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.panel-overlay.open { opacity: 1; pointer-events: all; }
.panel { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 500px; background: var(--white); z-index: 301; transform: translateX(100%); transition: transform 0.25s ease; display: flex; flex-direction: column; overflow: hidden; box-shadow: -6px 0 30px rgba(10,22,40,0.15); }
.panel.open { transform: translateX(0); }
.panel__head { background: var(--navy); color: var(--white); padding: 16px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.panel__title { flex: 1; font-weight: 900; font-variation-settings: 'wght' 900; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
.panel__close { background: none; border: none; color: var(--white); font-size: 22px; cursor: pointer; line-height: 1; padding: 2px 6px; font-family: var(--font); opacity: 0.7; }
.panel__close:hover { opacity: 1; }
.panel__body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
.panel__foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--white); flex-shrink: 0; }

/* PROJECT CREATE MODAL (full-screen feel) */
.modal-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.6); z-index: 400; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--white); width: 100%; max-width: 680px; max-height: 92vh; border-radius: 16px 16px 0 0; display: flex; flex-direction: column; overflow: hidden; transform: translateY(60px); transition: transform 0.3s ease; }
.modal-overlay.open .modal { transform: translateY(0); }
@media (min-width: 769px) {
  .modal-overlay { align-items: center; }
  .modal { border-radius: var(--radius); max-height: 88vh; }
}
.modal__head { background: var(--navy); color: var(--white); padding: 20px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.modal__title { flex: 1; font-weight: 900; font-size: 16px; text-transform: uppercase; letter-spacing: 0.06em; }
.modal__close { background: none; border: none; color: var(--white); font-size: 24px; cursor: pointer; line-height: 1; font-family: var(--font); opacity: 0.7; padding: 0 4px; }
.modal__close:hover { opacity: 1; }
.modal__body { flex: 1; overflow-y: auto; padding: 24px; }
.modal__foot { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--white); flex-shrink: 0; }
.modal__section { margin-bottom: 24px; }
.modal__section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

/* FORMS */
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-muted); margin-bottom: 5px; }
.fg input, .fg textarea, .fg select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 14px; color: var(--text); background: var(--white); transition: border-color 0.15s; -webkit-appearance: none; }
.fg input:focus, .fg textarea:focus, .fg select:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(34,59,124,0.09); }
.fg textarea { resize: vertical; min-height: 80px; }
.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fg-title input { font-size: 18px; font-weight: 700; padding: 12px; }

/* TAGS INPUT */
.tags-wrap { border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; background: var(--white); display: flex; flex-wrap: wrap; gap: 5px; cursor: text; min-height: 44px; align-items: center; transition: border-color 0.15s; }
.tags-wrap:focus-within { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(34,59,124,0.09); }
.tag-chip { background: var(--purple-light); color: var(--purple); border-radius: 20px; padding: 3px 6px 3px 9px; font-size: 12px; display: flex; align-items: center; gap: 4px; font-weight: 600; }
.tag-chip__x { cursor: pointer; color: var(--purple); font-size: 14px; line-height: 1; border: none; background: none; padding: 0; font-family: var(--font); opacity: 0.6; }
.tag-chip__x:hover { opacity: 1; }
.tag-text-input { border: none; outline: none; font-family: var(--font); font-size: 14px; min-width: 100px; flex: 1; background: transparent; color: var(--text); padding: 2px 0; }

/* PEOPLE PICKER */
.people-outer { position: relative; }
.people-wrap { border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; background: var(--white); min-height: 44px; transition: border-color 0.15s; }
.people-wrap:focus-within { border-color: var(--navy); }
.people-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
.person-chip { display: flex; align-items: center; gap: 5px; background: var(--off-white); border: 1px solid var(--border); border-radius: 20px; padding: 3px 8px 3px 5px; font-size: 12px; }
.person-chip__av { width: 20px; height: 20px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.person-chip__x { cursor: pointer; color: var(--text-muted); border: none; background: none; font-size: 14px; line-height: 1; padding: 0; font-family: var(--font); }
.person-chip__x:hover { color: var(--red); }
.people-input { border: none; outline: none; font-family: var(--font); font-size: 14px; width: 100%; background: transparent; color: var(--text); padding: 2px 0; }
.people-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); max-height: 200px; overflow-y: auto; display: none; margin-top: 3px; z-index: 10; }
.people-results.open { display: block; }
.person-opt { padding: 10px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.person-opt:last-child { border-bottom: none; }
.person-opt:hover { background: var(--off-white); }
.person-opt__av { width: 30px; height: 30px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* STEPS */
.steps-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.step-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); }
.step-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.step-check:hover { border-color: var(--navy); }
.step-check--done { background: var(--green); border-color: var(--green); }
.step-check--done::after { content:'✓'; color:#fff; font-size:11px; font-weight:900; }
.step-title { flex: 1; font-size: 13px; }
.step-title--done { text-decoration: line-through; color: var(--text-muted); }
.step-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; opacity: 0.4; padding: 0 3px; }
.step-del:hover { opacity: 1; color: var(--red); }
.step-add-row { display: flex; gap: 8px; }
.step-add-row input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; }
.step-add-row input:focus { outline: none; border-color: var(--navy); }

/* NOTES */
.notes-thread { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.note { background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
.note__head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.note__author { font-size: 11px; font-weight: 700; color: var(--navy); flex: 1; }
.note__time { font-size: 11px; color: var(--text-muted); }
.note__act { background: none; border: none; font-size: 11px; color: var(--text-muted); cursor: pointer; padding: 0 3px; font-family: var(--font); }
.note__act:hover { color: var(--navy); }
.note__act--del:hover { color: var(--red); }
.note__text { font-size: 13px; line-height: 1.5; }
.note-row { display: flex; gap: 8px; align-items: flex-end; }
.note-row textarea { flex: 1; min-height: 60px; padding: 9px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; resize: vertical; }
.note-row textarea:focus { outline: none; border-color: var(--navy); }

/* DETAIL SECTIONS */
.det-sec { margin-bottom: 18px; }
.det-sec__lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.meta-item label { display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
.meta-item span { font-size: 13px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.danger-zone { border: 1px solid var(--red-light); border-radius: var(--radius); padding: 12px 14px; margin-top: 16px; }
.danger-zone__lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--red); margin-bottom: 8px; }

/* BUTTONS */
.btn { padding: 10px 18px; border-radius: var(--radius); border: none; font-family: var(--font); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-primary { background: var(--navy); color: var(--white); }
.btn-primary:hover:not(:disabled) { background: var(--navy-mid); }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
.btn-ghost:hover:not(:disabled) { border-color: var(--navy); color: var(--navy); }
.btn-danger { background: var(--red-light); color: var(--red); border: 1px solid #f5c6c2; }
.btn-danger:hover:not(:disabled) { background: #fae0de; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sm { padding: 6px 12px; font-size: 10px; }

/* EMPTY */
.empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty__icon { font-size: 40px; margin-bottom: 12px; }
.empty__text { font-size: 14px; }

/* FAB */
.fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: var(--white); border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(158,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 150; transition: all 0.2s; font-family: var(--font); line-height: 1; }
.fab:hover { background: var(--primary-dim); transform: scale(1.08); }
.fab:active { transform: scale(0.96); }

/* TOAST */
.toast { position: fixed; bottom: 88px; right: 24px; background: var(--navy); color: var(--white); padding: 11px 16px; border-radius: var(--radius); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; box-shadow: 0 4px 20px rgba(0,0,0,0.25); z-index: 999; transform: translateY(20px); opacity: 0; transition: all 0.25s ease; max-width: 280px; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--amber); }

/* BOTTOM NAV */
.bottom-nav { display: none; height: var(--bottombar-h); background: var(--navy); border-top: 3px solid var(--primary); flex-shrink: 0; }
.bottom-nav__items { display: flex; height: 100%; }
.bottom-nav__item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; border: none; background: none; color: rgba(255,255,255,0.55); font-family: var(--font); font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.15s; position: relative; }
.bottom-nav__item.active { color: var(--white); }
.bottom-nav__item.active::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:28px; height:2px; background:var(--primary); border-radius:0 0 2px 2px; }
.bottom-nav__icon { font-size: 20px; line-height: 1; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .bottom-nav { display: flex; }
  .fab { bottom: 74px; right: 16px; width: 50px; height: 50px; font-size: 24px; }
  .toast { bottom: 130px; right: 14px; }
  .panel { max-width: 100%; top: auto; height: 92vh; transform: translateY(100%); border-radius: 16px 16px 0 0; }
  .panel.open { transform: translateY(0); }
  .fg-row { grid-template-columns: 1fr; }
  .meta-grid { grid-template-columns: 1fr; }
  .projects-grid { grid-template-columns: 1fr; }
  .kanban { flex-direction: column; }
  .kanban-col { width: 100%; }
}
@media (min-width: 769px) { .bottom-nav { display: none; } }
</style>

<script>
/* ─── CONSTANTS ─────────────────────────────────────────── */
var PROJ_COLOURS = ['#223b7c','#9e0000','#1e7e34','#e67e22','#5b21b6','#0369a1','#1a2f63','#374151'];
var PROJ_COLOUR_NAMES = ['Navy','Red','Green','Amber','Purple','Blue','Dark Navy','Slate'];

/* ─── GLOBALS ────────────────────────────────────────────── */
var db = firebase.database();
var SESSION = null;
var usersReady = false;

var S = {
  view: 'myday',
  tasks: {}, projects: {}, users: {},
  detailId: null,
  projView: 'board', activeProjId: null,
  /* create task state */
  cTags: [], cAssignees: [],
  /* create project state */
  pTags: [], pMembers: [], pColour: PROJ_COLOURS[0]
};

/* ─── HELPERS ────────────────────────────────────────────── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg,type){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+(type||'success')+' show'; setTimeout(function(){ t.classList.remove('show'); },3500); }
function ensureAuth(){ return new Promise(function(resolve,reject){ var u=firebase.auth().onAuthStateChanged(function(user){ u(); if(user) resolve(user); else reject(new Error('Not authenticated')); }); }); }
function pad(n){ return n<10?'0'+n:String(n); }
function fmtDT(ts){ if(!ts) return '—'; var d=new Date(ts); return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes()); }
function fmtDate(ts){ if(!ts) return '—'; var d=new Date(ts); return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }
function fmtRelative(ts){ if(!ts) return ''; var d=new Date(ts),now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()),td=new Date(d.getFullYear(),d.getMonth(),d.getDate()),diff=(td-today)/86400000; if(diff<0) return 'Overdue'; if(diff===0) return 'Due today'; if(diff===1) return 'Due tomorrow'; if(diff<7) return 'Due '+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; return fmtDate(ts); }
function fmtAgo(ts){ if(!ts) return ''; var d=new Date(ts),diff=Date.now()-d; if(diff<60000) return 'Just now'; if(diff<3600000) return Math.floor(diff/60000)+'m ago'; if(diff<86400000) return Math.floor(diff/3600000)+'h ago'; return fmtDate(ts); }
function isOverdue(ts,status){ return !!(ts&&status!=='done'&&new Date(ts)<new Date()); }
function isToday(ts){ if(!ts) return false; var d=new Date(ts),n=new Date(); return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }
function initials(name){ if(!name||name==='Unknown') return '?'; var p=String(name).trim().split(' '); if(!p[0]) return '?'; return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase(); }
function uname(uid){ if(uid===SESSION.uid) return 'You'; return S.users[uid]?S.users[uid].name:'Unknown'; }
function statusLabel(s){ return s==='to-do'?'To Do':s==='in-progress'?'In Progress':s==='done'?'Done':'—'; }
function pillStatus(s){ var c=s==='done'?'done':s==='in-progress'?'inprog':'todo'; return '<span class="pill pill-'+c+'">'+statusLabel(s)+'</span>'; }
function pillPri(p){ return '<span class="pill pill-'+esc(p||'low')+'">'+esc(p||'low')+'</span>'; }
function projColour(p){ return (p&&p.colour)||PROJ_COLOURS[0]; }

/* ─── AUTH ───────────────────────────────────────────────── */
window.nlAuthReady = function(session){
  SESSION = session;
  loadUsers().then(function(){ usersReady=true; });
  listenData();
  bindUI();
};

/* ─── DATA ───────────────────────────────────────────────── */
function loadUsers(){
  return new Promise(function(resolve){
    db.ref('users').once('value', function(snap){
      var all = snap.val()||{};
      Object.keys(all).forEach(function(uid){
        var u = all[uid];
        if(u.role!=='club') S.users[uid]={name:u.name||u.email||uid,email:u.email||''};
      });
      resolve();
    });
  });
}

function listenData(){
  ensureAuth().then(function(){
    db.ref('tasks').on('value',function(snap){
      S.tasks={};
      var all=snap.val()||{};
      Object.keys(all).forEach(function(id){
        var t=all[id]; if(t.archived) return;
        var mine=t.createdBy===SESSION.uid||(t.assignees&&t.assignees[SESSION.uid])||(t.followers&&t.followers[SESSION.uid]);
        if(mine){ S.tasks[id]=t; S.tasks[id]._id=id; }
      });
      updateBadges(); renderView();
    });
    db.ref('projects').on('value',function(snap){
      S.projects={};
      var all=snap.val()||{};
      Object.keys(all).forEach(function(id){
        var p=all[id]; if(p.archived) return;
        if(p.createdBy===SESSION.uid||(p.members&&p.members[SESSION.uid])){ S.projects[id]=p; S.projects[id]._id=id; }
      });
      renderSidebarProjects();
      if(S.view==='projects'||S.view.startsWith('proj:')) renderView();
    });

function effectiveDeadline(t, proj) {
  return t.deadline || (proj && proj.deadline) || null;
}

/* ─── TASK RENDERING ─────────────────────────────────────── */
function tasksByDate(tasks){
  var n=new Date(),ts=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  var g={overdue:[],today:[],tomorrow:[],week:[],later:[],nodate:[]};
  tasks.forEach(function(t){
    if(!t.deadline){ g.nodate.push(t); return; }
    var d=new Date(t.deadline),ds=new Date(d.getFullYear(),d.getMonth(),d.getDate()),diff=(ds-ts)/86400000;
    if(diff<0) g.overdue.push(t);
    else if(diff===0) g.today.push(t);
    else if(diff===1) g.tomorrow.push(t);
    else if(diff<7) g.week.push(t);
    else g.later.push(t);
  });
  return g;
}

function renderGroup(container,label,tasks,cls){
  if(!tasks.length) return;
  var grp=document.createElement('div'); grp.className='date-group';
  var lbl=document.createElement('div'); lbl.className='date-group__lbl'+(cls?' '+cls:''); lbl.textContent=label;
  grp.appendChild(lbl);
  tasks.forEach(function(t){ grp.appendChild(buildTaskRow(t)); });
  container.appendChild(grp);
}

function buildTaskRow(t){
  var over=isOverdue(t.deadline,t.status), tod=isToday(t.deadline);
  var row=document.createElement('div');
  row.className='task-row'+(t.status==='done'?' task-row--done':'')+(over?' task-row--overdue':tod?' task-row--today':'');

  /* Check */
  var chk=document.createElement('div');
  chk.className='task-check task-check--'+(t.status==='done'?'done':(t.priority||'low'));
  chk.addEventListener('click',function(e){
    e.stopPropagation();
    var ns=t.status==='done'?'to-do':'done';
    ensureAuth().then(function(){ return db.ref('tasks/'+t._id+'/status').set(ns); })
      .then(function(){ if(t.projectId) logActivity(t.projectId,'✅',SESSION.name+' marked "'+t.title+'" as '+statusLabel(ns)); })
      .catch(function(e){ showToast(e.message,'error'); });
  });

  /* Body */
  var body=document.createElement('div'); body.className='task-row__body';
  var title=document.createElement('div'); title.className='task-row__title'; title.textContent=t.title;
  body.appendChild(title);
  var meta=document.createElement('div'); meta.className='task-row__meta';
  if(t.deadline){
    var rel=fmtRelative(t.deadline);
    var mi=document.createElement('span'); mi.className=over?'task-row__meta--overdue':''; mi.textContent='📅 '+rel; meta.appendChild(mi);
  }
  if(t.projectId&&S.projects[t.projectId]){ var pi=document.createElement('span'); pi.textContent='📁 '+S.projects[t.projectId].title; meta.appendChild(pi); }
  var stKeys=Object.keys(t.steps||{});
  if(stKeys.length){ var done=stKeys.filter(function(k){ return t.steps[k].done; }).length; var si=document.createElement('span'); si.textContent='☑ '+done+'/'+stKeys.length; meta.appendChild(si); }
  body.appendChild(meta);
  if(t.tags&&t.tags.length){
    var tw=document.createElement('div'); tw.className='task-row__tags';
    t.tags.forEach(function(tag){ var tg=document.createElement('span'); tg.className='tag'; tg.textContent=tag; tw.appendChild(tg); });
    body.appendChild(tw);
  }

  /* Right */
  var right=document.createElement('div'); right.className='task-row__right';
  var auids=Object.keys(t.assignees||{});
  if(auids.length){
    var avs=document.createElement('div'); avs.className='task-row__avs';
    auids.slice(0,3).forEach(function(uid){ var a=document.createElement('div'); a.className='av'; a.textContent=initials(uname(uid)); a.title=uname(uid); avs.appendChild(a); });
    if(auids.length>3){ var m=document.createElement('div'); m.className='av'; m.textContent='+'+( auids.length-3); avs.appendChild(m); }
    right.appendChild(avs);
  }
  var star=document.createElement('button'); star.className='star-btn'+(t.myDay&&t.myDay[SESSION.uid]?' star-btn--on':'');
  star.textContent='⭐'; star.title=t.myDay&&t.myDay[SESSION.uid]?'Remove from My Day':'Add to My Day';
  star.addEventListener('click',function(e){
    e.stopPropagation();
    var inMD=!!(t.myDay&&t.myDay[SESSION.uid]);
    var u={}; u['tasks/'+t._id+'/myDay/'+SESSION.uid]=inMD?null:true;
    ensureAuth().then(function(){ return db.ref().update(u); }).then(function(){ showToast(inMD?'Removed from My Day':'Added to My Day','success'); }).catch(function(e){ showToast(e.message,'error'); });
  });
  right.appendChild(star);

  row.appendChild(chk); row.appendChild(body); row.appendChild(right);
  row.addEventListener('click',function(){ openDetail(t._id); });
  return row;
}

function renderProjBoard(el,tasks,projId){
  var isMobile = window.innerWidth <= 768;
  var kanban=document.createElement('div'); kanban.className='kanban';
  var statuses=['to-do','in-progress','done'];

  function moveTask(taskId, newStatus) {
    ensureAuth().then(function(){ return db.ref('tasks/'+taskId+'/status').set(newStatus); })
      .then(function(){
        var t=S.tasks[taskId];
        logActivity(projId,'✅',(SESSION.name||'Someone')+' moved "'+(t?t.title:taskId)+'" to '+statusLabel(newStatus));
      })
      .catch(function(e){ showToast(e.message,'error'); });
  }

  statuses.forEach(function(status){
    var col=document.createElement('div'); col.className='kanban-col';
    var head=document.createElement('div'); head.className='kanban-col__head';
    var colTasks=tasks.filter(function(t){ return (t.status||'to-do')===status; });
    head.textContent=statusLabel(status);
    var cnt=document.createElement('span'); cnt.style.cssText='background:rgba(0,0,0,0.08);font-size:9px;padding:1px 6px;border-radius:10px;'; cnt.textContent=colTasks.length;
    head.appendChild(cnt);
    var cards=document.createElement('div'); cards.className='kanban-col__cards';

    /* Desktop: drag-drop target on column */
    col.addEventListener('dragover',function(e){ e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave',function(){ col.classList.remove('drag-over'); });
    col.addEventListener('drop',function(e){
      e.preventDefault(); col.classList.remove('drag-over');
      var taskId=e.dataTransfer.getData('text/plain');
      if(taskId) moveTask(taskId, status);
    });

    colTasks.forEach(function(t){
      var proj2=S.projects[projId];
      var effDL=effectiveDeadline(t,proj2);
      var card=document.createElement('div'); card.className='kanban-card';

      /* Desktop drag */
      card.draggable=true;
      card.addEventListener('dragstart',function(e){ e.dataTransfer.setData('text/plain',t._id); card.classList.add('dragging'); });
      card.addEventListener('dragend',function(){ card.classList.remove('dragging'); });

      var tt=document.createElement('div'); tt.className='kanban-card__title'; tt.textContent=t.title;
      var m=document.createElement('div'); m.className='kanban-card__meta';
      m.innerHTML=pillPri(t.priority)+(effDL?'<span>📅 '+fmtDate(effDL)+'</span>':'');
      var auids=Object.keys(t.assignees||{});
      if(auids.length){
        var avs=document.createElement('div'); avs.className='task-row__avs';
        auids.slice(0,3).forEach(function(uid){ var a=document.createElement('div'); a.className='av av--sm'; a.textContent=initials(uname(uid)); avs.appendChild(a); });
        m.appendChild(avs);
      }
      card.appendChild(tt); card.appendChild(m);

      /* Mobile: tap card opens detail; long-press shows status menu */
      if(isMobile){
        var pressTimer=null;
        card.addEventListener('touchstart',function(){ pressTimer=setTimeout(function(){
          /* Show inline status picker */
          var existing=card.querySelector('.mobile-status-menu'); if(existing){ existing.remove(); return; }
          var menu=document.createElement('div'); menu.className='mobile-status-menu';
          menu.style.cssText='position:absolute;right:8px;top:100%;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:50;overflow:hidden;';
          statuses.forEach(function(s){
            var opt=document.createElement('div'); opt.style.cssText='padding:9px 16px;font-size:13px;cursor:pointer;'+(s===status?'font-weight:700;color:var(--navy);':'');
            opt.textContent=statusLabel(s);
            opt.addEventListener('click',function(e){ e.stopPropagation(); moveTask(t._id,s); menu.remove(); });
            menu.appendChild(opt);
          });
          card.style.position='relative'; card.appendChild(menu);
          setTimeout(function(){ document.addEventListener('click',function rm(){ menu.remove(); document.removeEventListener('click',rm); },{once:true}); },10);
        },500); },false);
        card.addEventListener('touchend',function(){ clearTimeout(pressTimer); },false);
        card.addEventListener('click',function(){ openDetail(t._id); });
      } else {
        card.addEventListener('click',function(){ openDetail(t._id); });
      }

      cards.appendChild(card);
    });
    if(!colTasks.length){ var e=document.createElement('div'); e.style.cssText='font-size:12px;color:var(--text-muted);text-align:center;padding:14px'; e.textContent='None'; cards.appendChild(e); }
    col.appendChild(head); col.appendChild(cards); kanban.appendChild(col);
  });
  el.appendChild(kanban);
}

/* ─── GANTT ──────────────────────────────────────────────── */
function renderGantt(el,tasks,proj){
  var banner=document.createElement('div'); banner.className='conflict-banner'; el.appendChild(banner);
  var dated=tasks.filter(function(t){ return t.startDate||t.deadline||proj.startDate; });
  if(!dated.length){ el.appendChild(mkEmpty('📊','Add dates to tasks to see the Gantt.')); return; }
  var minTs=Infinity,maxTs=-Infinity;
  dated.forEach(function(t){
    var s=t.startDate||proj.startDate||t.createdAt,e=t.deadline||proj.deadline||t.createdAt;
    if(s<minTs) minTs=s; if(e>maxTs) maxTs=e;
  });
  minTs-=86400000*2; maxTs+=86400000*2; var totalMs=maxTs-minTs;
  var days=totalMs/86400000;
  var unitMs,unitFmt,unitStep;
  if(days<=21){ unitMs=86400000; unitFmt=function(d){ return ['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()]+' '+d.getDate(); }; unitStep=function(d){ d.setDate(d.getDate()+1); }; }
  else if(days<=90){ unitMs=86400000*7; unitFmt=function(d){ return pad(d.getDate())+'/'+pad(d.getMonth()+1); }; unitStep=function(d){ d.setDate(d.getDate()+7); }; }
  else{ unitMs=86400000*30; unitFmt=function(d){ return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]; }; unitStep=function(d){ d.setMonth(d.getMonth()+1); }; }
  var cols=[],cur=new Date(minTs); cur.setHours(0,0,0,0);
  while(cur.getTime()<maxTs){ cols.push(new Date(cur)); unitStep(cur); }
  var conflicts={};
  dated.forEach(function(t){ (t.dependsOn||[]).forEach(function(depId){ var dep=S.tasks[depId]; if(!dep) return; if(dep.deadline&&t.startDate&&t.startDate<dep.deadline) conflicts[t._id]=true; }); });
  if(Object.keys(conflicts).length){ banner.textContent='⚠ '+Object.keys(conflicts).length+' scheduling conflict'+(Object.keys(conflicts).length!==1?'s':'')+' detected.'; banner.classList.add('show'); }
  function pct(ts){ return Math.max(0,Math.min(100,(ts-minTs)/totalMs*100)); }
  var wrap=document.createElement('div'); wrap.className='gantt-wrap';
  var table=document.createElement('table'); table.className='gantt-table';
  var thead=document.createElement('thead'),hrow=document.createElement('tr');
  var lth=document.createElement('th'); lth.className='g-lbl'; lth.textContent='Task'; hrow.appendChild(lth);
  var now=Date.now();
  cols.forEach(function(col){ var th=document.createElement('th'); th.textContent=unitFmt(col); if(now>=col.getTime()&&now<col.getTime()+unitMs) th.style.background='var(--primary)'; hrow.appendChild(th); });
  thead.appendChild(hrow); table.appendChild(thead);
  var tbody=document.createElement('tbody');
  dated.forEach(function(t){
    var s=t.startDate||proj.startDate||t.createdAt;
    var eOwn=t.deadline; var eEff=eOwn||proj.deadline||t.createdAt;
    var inherited=!eOwn&&!!proj.deadline;
    var tr=document.createElement('tr');
    var ltd=document.createElement('td'); ltd.className='g-lbl'; ltd.textContent=t.title; ltd.title=t.title; tr.appendChild(ltd);
    var btd=document.createElement('td'); btd.colSpan=cols.length; btd.className='g-cell'; btd.style.position='relative';
    var bar=document.createElement('div');
    bar.className='g-bar g-bar--'+(t.status==='done'?'done':t.status==='in-progress'?'inprog':'todo')+(conflicts[t._id]?' g-bar--conflict':'')+(inherited?' g-bar--inherited':'');
    var left=pct(s),width=Math.max(1,pct(eEff)-left);
    bar.style.left=left+'%'; bar.style.width=width+'%';
    bar.textContent=width>8?t.title:'';
    bar.title=t.title+' '+fmtDate(s)+' → '+fmtDate(eEff)+(inherited?' (project date)':'')+(conflicts[t._id]?' ⚠ Conflict':'');
    bar.addEventListener('click',function(){ openDetail(t._id); });
    if(conflicts[t._id]){
      var wi=document.createElement('span'); wi.className='g-bar--conflict-icon'; wi.textContent='⚠'; bar.style.paddingRight='20px'; bar.appendChild(wi);
    }
    btd.appendChild(bar);
    if(now>=minTs&&now<=maxTs){ var tl=document.createElement('div'); tl.className='g-today'; tl.style.left=pct(now)+'%'; btd.appendChild(tl); }
    tr.appendChild(btd); tbody.appendChild(tr);
  });
  table.appendChild(tbody); wrap.appendChild(table); el.appendChild(wrap);
}

function buildStepsSec(t,canEdit){
  var sec=mkSec('Steps');
  var list=document.createElement('div'); list.className='steps-list';
  Object.keys(t.steps||{}).forEach(function(sid){ list.appendChild(buildStepEl(sid,t.steps[sid],canEdit)); });
  sec.appendChild(list);
  if(canEdit){
    var row=document.createElement('div'); row.className='step-add-row';
    var inp=document.createElement('input'); inp.placeholder='Add a step\u2026';
    var addBtn=document.createElement('button'); addBtn.className='btn btn-ghost btn-sm'; addBtn.textContent='Add'; addBtn.setAttribute('type','button');
    function doAdd(){ var v=inp.value.trim(); if(!v) return; ensureAuth().then(function(){ return db.ref('tasks/'+S.detailId+'/steps').push({title:v,done:false}); }).then(function(){ inp.value=''; openDetail(S.detailId); }).catch(function(e){ showToast(e.message,'error'); }); }
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); doAdd(); } });
    addBtn.addEventListener('click',doAdd);
    row.appendChild(inp); row.appendChild(addBtn); sec.appendChild(row);
  }
  return sec;
}
function buildStepEl(sid,step,canEdit){
  var el=document.createElement('div'); el.className='step-item';
  var chk=document.createElement('div'); chk.className='step-check'+(step.done?' step-check--done':'');
  if(canEdit){ chk.addEventListener('click',function(e){ e.stopPropagation(); ensureAuth().then(function(){ return db.ref('tasks/'+S.detailId+'/steps/'+sid+'/done').set(!step.done); }).then(function(){ openDetail(S.detailId); }).catch(function(e){ showToast(e.message,'error'); }); }); }
  var title=document.createElement('span'); title.className='step-title'+(step.done?' step-title--done':''); title.textContent=step.title;
  el.appendChild(chk); el.appendChild(title);
  if(canEdit){ var del=document.createElement('button'); del.className='step-del'; del.textContent='×'; del.setAttribute('type','button'); del.addEventListener('click',function(e){ e.stopPropagation(); ensureAuth().then(function(){ return db.ref('tasks/'+S.detailId+'/steps/'+sid).remove(); }).then(function(){ openDetail(S.detailId); }).catch(function(e){ showToast(e.message,'error'); }); }); el.appendChild(del); }
  return el;
}

function buildNotesSec(t,isCreator){

  noteBtn.addEventListener('click',function(){
    var text=noteIn.value.trim(); if(!text) return;
    var note={uid:SESSION.uid,name:SESSION.name||'',text:text,timestamp:Date.now()};

      .then(function(){ showToast('Posted','success'); noteIn.value=''; openDetail(S.detailId); if(t.projectId) logActivity(t.projectId,'💬',SESSION.name+' commented on "'+t.title+'"'); })
      .catch(function(e){ showToast(e.message,'error'); });

function buildNoteEl(nId,n,isCreator){
  var canEdit=n.uid===SESSION.uid||isCreator;
  var nd=document.createElement('div'); nd.className='note';
  var nh=document.createElement('div'); nh.className='note__head';

  var nt=document.createElement('span'); nt.className='note__time'; nt.textContent=fmtAgo(n.timestamp);
  nh.appendChild(na); nh.appendChild(nt);
  if(canEdit){
    var ea=document.createElement('button'); ea.className='note__act'; ea.textContent='Edit'; ea.setAttribute('type','button');
    var da=document.createElement('button'); da.className='note__act note__act--del'; da.textContent='Delete'; da.setAttribute('type','button');
    ea.addEventListener('click',function(){
      var existing=nd.querySelector('.note-edit-ta'); if(existing){ existing.remove(); var sv2=nd.querySelector('.note-save-btn'); if(sv2) sv2.remove(); ea.textContent='Edit'; return; }
      var inp=document.createElement('textarea'); inp.className='note-edit-ta'; inp.value=nd.querySelector('.note__text').textContent; inp.style.cssText='width:100%;margin-top:6px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:13px;resize:vertical;min-height:56px';
      var sv=document.createElement('button'); sv.className='btn btn-primary btn-sm note-save-btn'; sv.textContent='Save'; sv.setAttribute('type','button'); sv.style.marginTop='6px';
      sv.addEventListener('click',function(){ var txt=inp.value.trim(); if(!txt) return; ensureAuth().then(function(){ return db.ref('tasks/'+S.detailId+'/notes/'+nId+'/text').set(txt); }).then(function(){ showToast('Updated','success'); openDetail(S.detailId); }).catch(function(e){ showToast(e.message,'error'); }); });
      nd.appendChild(inp); nd.appendChild(sv); ea.textContent='Cancel';
    });
    da.addEventListener('click',function(){
      if(da.dataset.c!=='1'){ da.dataset.c='1'; da.textContent='Sure?'; setTimeout(function(){ if(da.dataset.c==='1'){ da.dataset.c='0'; da.textContent='Delete'; } },3000); return; }
      ensureAuth().then(function(){ return db.ref('tasks/'+S.detailId+'/notes/'+nId).remove(); }).then(function(){ showToast('Deleted','success'); openDetail(S.detailId); }).catch(function(e){ showToast(e.message,'error'); });
    });
    nh.appendChild(ea); nh.appendChild(da);
  }
  nd.appendChild(nh);
  var nb=document.createElement('div'); nb.className='note__text'; nb.textContent=n.text||''; nd.appendChild(nb);
  return nd;
}

/* ─── PEOPLE PICKER ─────────────────────────────────────── */
function buildPeoplePicker(prefix, arr){
  var outer=document.createElement('div'); outer.className='people-outer';
  var wrap=document.createElement('div'); wrap.className='people-wrap';
  var chips=document.createElement('div'); chips.className='people-chips'; chips.id=prefix+'Chips';
  var inp=document.createElement('input'); inp.className='people-input'; inp.id=prefix+'Input'; inp.placeholder='Search staff…'; inp.setAttribute('autocomplete','off');
  wrap.appendChild(chips); wrap.appendChild(inp);
  var results=document.createElement('div'); results.className='people-results'; results.id=prefix+'Results';
  outer.appendChild(wrap); outer.appendChild(results);

  inp.addEventListener('input',function(){ searchPeople(prefix,inp.value,arr,results,chips); });
  /* Close on outside click */
  document.addEventListener('click',function handler(e){
    if(!outer.contains(e.target)){ results.classList.remove('open'); }
  });
  return outer;
}

function searchPeople(prefix,val,arr,resultsEl,chipsEl){
  if(!val.trim()){ resultsEl.classList.remove('open'); return; }
  var lower=val.toLowerCase();
  var matches=Object.keys(S.users).filter(function(uid){
    return uid!==SESSION.uid && !arr.some(function(m){ return m.uid===uid; }) && S.users[uid].name.toLowerCase().indexOf(lower)!==-1;
  }).slice(0,8);
  resultsEl.innerHTML='';
  if(!matches.length){ resultsEl.classList.remove('open'); return; }
  matches.forEach(function(uid){
    var u=S.users[uid];
    var opt=document.createElement('div'); opt.className='person-opt';
    var av=document.createElement('div'); av.className='person-opt__av'; av.textContent=initials(u.name);
    var nm=document.createElement('span'); nm.textContent=u.name;
    opt.appendChild(av); opt.appendChild(nm);
    opt.addEventListener('mousedown',function(e){
      e.preventDefault();
      arr.push({uid:uid,name:u.name});
      renderChips(prefix,arr,chipsEl);
      document.getElementById(prefix+'Input').value='';
      resultsEl.classList.remove('open');
    });
    resultsEl.appendChild(opt);
  });
  resultsEl.classList.add('open');
}

function renderChips(prefix,arr,chipsEl){
  if(!chipsEl) chipsEl=document.getElementById(prefix+'Chips'); if(!chipsEl) return;
  chipsEl.innerHTML='';
  arr.forEach(function(m,i){
    var chip=document.createElement('div'); chip.className='person-chip'; chip.dataset.uid=m.uid;
    var av=document.createElement('div'); av.className='person-chip__av'; av.textContent=initials(m.name);
    var nm=document.createElement('span'); nm.style.fontSize='12px'; nm.textContent=m.name;
    var x=document.createElement('button'); x.className='person-chip__x'; x.textContent='×'; x.setAttribute('type','button');
    (function(idx){ x.addEventListener('click',function(){ arr.splice(idx,1); renderChips(prefix,arr,chipsEl); }); })(i);
    chip.appendChild(av); chip.appendChild(nm); chip.appendChild(x); chipsEl.appendChild(chip);
  });
}

/* ─── TAGS INPUT ─────────────────────────────────────────── */
function buildTagsInput(prefix,arr){
  prefix=prefix||'task'; arr=arr||[];
  var wId=prefix+'TagsWrap',iId=prefix+'TagInput';
  var wrap=document.createElement('div'); wrap.className='tags-wrap'; wrap.id=wId;
  var inp=document.createElement('input'); inp.className='tag-text-input'; inp.id=iId; inp.placeholder='Type tag, press Enter…';
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'||e.key===','){
      e.preventDefault(); e.stopPropagation();
      var val=inp.value.replace(/,/g,'').trim();
      if(val&&arr.indexOf(val)===-1){ arr.push(val); renderTagsFor(wId,iId,arr); }
      inp.value='';
    }
  });
  wrap.appendChild(inp);
  return wrap;
}

function renderTagsFor(wId,iId,arr){
  var wrap=document.getElementById(wId),inp=document.getElementById(iId); if(!wrap||!inp) return;
  wrap.querySelectorAll('.tag-chip').forEach(function(c){ c.remove(); });
  arr.forEach(function(tag,i){
    var chip=document.createElement('span'); chip.className='tag-chip';
    chip.appendChild(document.createTextNode(tag));
    var x=document.createElement('button'); x.className='tag-chip__x'; x.textContent='×'; x.setAttribute('type','button');
    (function(idx,wid,iid,a){ x.addEventListener('click',function(e){ e.stopPropagation(); a.splice(idx,1); renderTagsFor(wid,iid,a); }); })(i,wId,iId,arr);
    chip.appendChild(x); wrap.insertBefore(chip,inp);
  });
}


/* ─── CUSTOM FILTER DROPDOWN ─────────────────────────────── */
function buildFltDropdown(id, opts, onChange) {
  var wrap = document.createElement('div'); wrap.className = 'flt-wrap';
  var btn  = document.createElement('button'); btn.className = 'flt-btn'; btn.setAttribute('type','button');
  var lbl  = document.createElement('span'); lbl.textContent = opts[0].l;
  var caret= document.createElement('span'); caret.className = 'flt-btn__caret'; caret.textContent = '▾';
  btn.appendChild(lbl); btn.appendChild(caret);
  var dd   = document.createElement('div'); dd.className = 'flt-dropdown';
  var current = opts[0].v;

  opts.forEach(function(o) {
    var opt = document.createElement('div'); opt.className = 'flt-option'+(o.v===current?' selected':'');
    opt.textContent = o.l; opt.dataset.val = o.v;
    opt.addEventListener('mousedown', function(e) {
      e.preventDefault();
      current = o.v; lbl.textContent = o.l;
      btn.classList.toggle('active', o.v !== opts[0].v);
      dd.querySelectorAll('.flt-option').forEach(function(x){ x.classList.toggle('selected', x.dataset.val===o.v); });
      dd.classList.remove('open'); btn.classList.remove('open');
      if(onChange) onChange(o.v);
    });
    dd.appendChild(opt);
  });

  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    var open = dd.classList.contains('open');
    /* close all other dropdowns */
    document.querySelectorAll('.flt-dropdown.open').forEach(function(x){ x.classList.remove('open'); });
    document.querySelectorAll('.flt-btn.open').forEach(function(x){ x.classList.remove('open'); });
    if(!open){ dd.classList.add('open'); btn.classList.add('open'); }
  });
  document.addEventListener('click', function(){ dd.classList.remove('open'); btn.classList.remove('open'); });

  wrap.appendChild(btn); wrap.appendChild(dd);
  wrap.getValue = function(){ return current; };
  return wrap;
}

/* ─── DOM HELPERS ────────────────────────────────────────── */
function mkHeader(title,sub){
  var w=document.createElement('div'); w.className='view-header';
  var l=document.createElement('div'); l.className='view-header__left';
  var h=document.createElement('h1'); h.textContent=title; l.appendChild(h);
  if(sub){ var s=document.createElement('div'); s.className='view-header__sub'; s.textContent=sub; l.appendChild(s); }
  var acts=document.createElement('div'); acts.className='view-header__actions';
  w.appendChild(l); w.appendChild(acts); return w;
}
function mkEmpty(icon,text){ var el=document.createElement('div'); el.className='empty'; var ic=document.createElement('div'); ic.className='empty__icon'; ic.textContent=icon; var tx=document.createElement('div'); tx.className='empty__text'; tx.textContent=text; el.appendChild(ic); el.appendChild(tx); return el; }
function mkSec(lbl){ var s=document.createElement('div'); s.className='det-sec'; var l=document.createElement('div'); l.className='det-sec__lbl'; l.textContent=lbl; s.appendChild(l); return s; }
function miHtml(label,value){ return '<div class="meta-item"><label>'+esc(label)+'</label><span>'+esc(value)+'</span></div>'; }
function mkFg(lbl,inputEl){ var fg=document.createElement('div'); fg.className='fg'; var l=document.createElement('label'); l.textContent=lbl; fg.appendChild(l); if(inputEl&&typeof inputEl==='object'&&inputEl.nodeType) fg.appendChild(inputEl); return fg; }
function mkEl(tag,id,type,placeholder){ var el=document.createElement(tag); el.id=id; if(type) el.type=type; if(placeholder) el.placeholder=placeholder; return el; }
function mkSel(id,opts){ var el=document.createElement('select'); if(id) el.id=id; opts.forEach(function(o){ var op=document.createElement('option'); op.value=o.v; op.textContent=o.l; el.appendChild(op); }); return el; }

/* ─── BIND UI ────────────────────────────────────────────── */
function bindUI(){
  /* Sidebar nav */
  document.querySelectorAll('.nav-item[data-view]').forEach(function(el){ el.addEventListener('click',function(){ setView(el.dataset.view); }); });
  /* Bottom nav */
  document.querySelectorAll('.bottom-nav__item[data-view]').forEach(function(el){ el.addEventListener('click',function(){ setView(el.dataset.view); }); });
  /* FAB */
  document.getElementById('fab').addEventListener('click',function(){ openCreate(null); });
  /* Task create */
  document.getElementById('createClose').addEventListener('click',  closeCreate);
  document.getElementById('createCancel').addEventListener('click', closeCreate);
  document.getElementById('createOv').addEventListener('click',     closeCreate);
  document.getElementById('createSave').addEventListener('click',   saveCreate);
  /* Task detail */
  document.getElementById('detailClose').addEventListener('click',  closeDetail);
  document.getElementById('detailOv').addEventListener('click',     closeDetail);
  /* Project modal */
  document.getElementById('sidebarAddProj').addEventListener('click', openProjModal);
  document.getElementById('projModalClose').addEventListener('click',  closeProjModal);
  document.getElementById('projModalCancel').addEventListener('click', closeProjModal);
  document.getElementById('projModalOv').addEventListener('click', function(e){ if(e.target===document.getElementById('projModalOv')) closeProjModal(); });
  document.getElementById('projModalSave').addEventListener('click',   saveProjModal);
  /* Initial view */
  setView('myday');
}
</script>
