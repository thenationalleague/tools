<style>
@font-face {
  font-family: "carbona-variable";
  src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
       url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
  font-display: swap; font-style: normal; font-weight: 200 900;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }
:root {
  --primary: #9e0000; --primary-dim: #7a0000;
  --navy: #223b7c; --navy-mid: #1a2f63;
  --red: #c0392b; --red-light: #fdf0ef;
  --green: #1e7e34; --green-light: #edf7ee;
  --amber: #e67e22; --amber-light: #fef6ec;
  --white: #ffffff; --off-white: #f4f6f9;
  --text: #1a2a44; --text-muted: #5a6a82;
  --border: #dde3ed; --radius: 6px;
  --shadow: 0 2px 12px rgba(10,22,40,0.10);
  --font: 'carbona-variable','carbona',sans-serif;
}
body { font-family: var(--font); font-size: 15px; line-height: 1.5; font-variation-settings: 'wght' 400; color: var(--text); background: var(--off-white); min-height: 100vh; }

/* TOPBAR */
.topbar { background: var(--primary); color: var(--white); padding: 0 24px; height: 72px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 12px rgba(0,0,0,0.3); border-bottom: 7px solid var(--navy); width: 100%; }
.topbar img { height: 40px; flex-shrink: 0; }
.topbar__title { font-weight: 900; font-variation-settings: 'wght' 900; font-size: 18px; flex: 1; text-transform: uppercase; letter-spacing: 0.04em; color: var(--white); }
.topbar__title span { color: rgba(255,255,255,0.55); }
.topbar__btn { background: var(--navy); border: none; color: var(--white); padding: 8px 16px; border-radius: var(--radius); font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; font-family: var(--font); transition: background 0.15s; white-space: nowrap; }
.topbar__btn:hover { background: var(--navy-mid); }

/* MAIN TABS */
.main { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; }
.main-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 24px; padding-top: 20px; }
.main-tab { padding: 10px 20px; font-size: 13px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; border: none; background: none; font-family: var(--font); color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.main-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.main-tab:hover:not(.active) { color: var(--text); }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.view-toggle { display: flex; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; flex-shrink: 0; }
.view-btn { padding: 7px 14px; font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.07em; cursor: pointer; border: none; background: none; font-family: var(--font); color: var(--text-muted); transition: all 0.15s; }
.view-btn.active { background: var(--navy); color: var(--white); }
.filter-row { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
.filter-select, .filter-input { padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; background: var(--white); color: var(--text); }
.filter-input { flex: 1; min-width: 120px; }

/* SECTION LABEL */
.section-lbl { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin: 24px 0 10px; display: flex; align-items: center; gap: 8px; }
.section-lbl::after { content:''; flex:1; height:1px; background: var(--border); }
.section-lbl__count { background: var(--border); color: var(--text-muted); font-size: 9px; padding: 1px 6px; border-radius: 10px; }

/* CARDS */
.item-list { display: flex; flex-direction: column; gap: 8px; }
.item-card { background: var(--white); border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow); display: flex; align-items: flex-start; gap: 12px; }
.item-card:hover { border-color: var(--navy); box-shadow: 0 4px 16px rgba(34,59,124,0.12); }
.item-card--high { border-left-color: var(--red); }
.item-card--medium { border-left-color: var(--amber); }
.item-card--done { opacity: 0.6; }
.item-card--done .item-card__title { text-decoration: line-through; }
.item-card__body { flex: 1; min-width: 0; }
.item-card__title { font-size: 14px; font-weight: 700; font-variation-settings: 'wght' 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-card__meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; font-size: 11px; color: var(--text-muted); }
.item-card__tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.item-card__right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

/* KANBAN */
.kanban { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
@media (max-width: 680px) { .kanban { grid-template-columns: 1fr; } }
.kanban-col { background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.kanban-col__head { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.kanban-col__cards { display: flex; flex-direction: column; gap: 8px; }
.kanban-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; transition: border-color 0.15s; box-shadow: var(--shadow); }
.kanban-card:hover { border-color: var(--navy); }
.kanban-card__title { font-size: 13px; font-weight: 700; font-variation-settings: 'wght' 700; margin-bottom: 6px; }
.kanban-card__meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 6px; flex-wrap: wrap; }

/* PILLS */
.pill { display: inline-block; font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 20px; }
.pill-todo   { background: var(--off-white); color: var(--text-muted); border: 1px solid var(--border); }
.pill-inprog { background: var(--amber-light); color: var(--amber); }
.pill-done   { background: var(--green-light); color: var(--green); }
.pill-high   { background: var(--red-light); color: var(--red); }
.pill-medium { background: var(--amber-light); color: var(--amber); }
.pill-low    { background: #f0f4ff; color: var(--navy); }
.tag { background: var(--off-white); border: 1px solid var(--border); color: var(--text-muted); font-size: 10px; font-weight: 700; font-variation-settings: 'wght' 700; padding: 1px 6px; border-radius: 20px; }

/* PROGRESS */
.progress { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; width: 70px; }
.progress__fill { height: 100%; background: var(--green); border-radius: 4px; }

/* GANTT */
.gantt-wrap { overflow-x: auto; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
.gantt-table { border-collapse: collapse; width: 100%; min-width: 700px; }
.gantt-table th { background: var(--navy); color: var(--white); font-size: 9px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 6px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }
.gantt-table th.gantt-label-th { text-align: left; padding-left: 14px; min-width: 200px; max-width: 200px; width: 200px; border-right: 2px solid rgba(255,255,255,0.2); }
.gantt-table td { border-bottom: 1px solid var(--border); border-right: 1px solid #f0f3f8; padding: 0; height: 36px; vertical-align: middle; }
.gantt-table td.gantt-label-td { padding: 0 14px; border-right: 2px solid var(--border); min-width: 200px; max-width: 200px; width: 200px; }
.gantt-proj-label { font-size: 13px; font-weight: 800; font-variation-settings: 'wght' 800; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.gantt-proj-label:hover { color: var(--primary); }
.gantt-sub-label { font-size: 12px; font-weight: 500; color: var(--text-muted); padding-left: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-sub-label::before { content: '↳ '; color: var(--border); }
.gantt-cell { position: relative; }
.gantt-bar { position: absolute; top: 6px; height: 22px; border-radius: 4px; display: flex; align-items: center; padding: 0 7px; font-size: 10px; font-weight: 700; font-variation-settings: 'wght' 700; color: var(--white); white-space: nowrap; overflow: hidden; cursor: pointer; transition: filter 0.15s; }
.gantt-bar:hover { filter: brightness(0.9); }
.gantt-bar--todo   { background: var(--navy); }
.gantt-bar--inprog { background: var(--amber); }
.gantt-bar--done   { background: var(--green); }
.gantt-bar--proj   { opacity: 0.35; border-radius: 4px; }
.gantt-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--primary); opacity: 0.6; pointer-events: none; z-index: 2; }
.gantt-today-head { background: var(--primary) !important; }
.gantt-empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
.gantt-chevron { font-size: 10px; transition: transform 0.2s; display: inline-block; }
.gantt-chevron.open { transform: rotate(90deg); }
.gantt-sub-row { display: none; }
.gantt-sub-row.open { display: table-row; }

/* PANEL */
.panel-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.45); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.panel-overlay.open { opacity: 1; pointer-events: all; }
.panel { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 540px; background: var(--white); z-index: 301; transform: translateX(100%); transition: transform 0.25s ease; display: flex; flex-direction: column; overflow: hidden; box-shadow: -4px 0 24px rgba(10,22,40,0.15); }
.panel.open { transform: translateX(0); }
.panel__head { background: var(--navy); color: var(--white); padding: 16px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.panel__title { flex: 1; font-weight: 900; font-variation-settings: 'wght' 900; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
.panel__close { background: none; border: none; color: var(--white); font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px; font-family: var(--font); opacity: 0.8; }
.panel__close:hover { opacity: 1; }
.panel__body { flex: 1; overflow-y: auto; padding: 20px; }
.panel__foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; background: var(--white); }

/* FORM */
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-muted); margin-bottom: 5px; }
.fg input, .fg textarea, .fg select { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 14px; color: var(--text); font-variation-settings: 'wght' 400; background: var(--white); transition: border-color 0.15s; }
.fg input:focus, .fg textarea:focus, .fg select:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(34,59,124,0.09); }
.fg textarea { resize: vertical; min-height: 72px; }
.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* TAGS */
.tags-wrap { border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 8px; background: var(--white); display: flex; flex-wrap: wrap; gap: 5px; cursor: text; min-height: 40px; align-items: center; transition: border-color 0.15s; }
.tags-wrap:focus-within { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(34,59,124,0.09); }
.tag-chip { background: var(--off-white); border: 1px solid var(--border); border-radius: 20px; padding: 2px 6px 2px 8px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
.tag-chip__x { cursor: pointer; color: var(--text-muted); font-size: 14px; line-height: 1; border: none; background: none; padding: 0; font-family: var(--font); }
.tag-chip__x:hover { color: var(--red); }
.tag-text-input { border: none; outline: none; font-family: var(--font); font-size: 13px; min-width: 90px; flex: 1; background: transparent; color: var(--text); }

/* MEMBERS */
.member-search { position: relative; }
.member-results { position: absolute; top: 100%; left: 0; right: 0; z-index: 50; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); max-height: 200px; overflow-y: auto; display: none; margin-top: 2px; }
.member-results.open { display: block; }
.member-opt { padding: 9px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.member-opt:last-child { border-bottom: none; }
.member-opt:hover { background: var(--off-white); }
.avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--navy); color: var(--white); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; flex-shrink: 0; }
.members-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.member-chip { display: flex; align-items: center; gap: 5px; background: var(--off-white); border: 1px solid var(--border); border-radius: 20px; padding: 3px 8px 3px 5px; font-size: 12px; }
.member-chip__x { cursor: pointer; color: var(--text-muted); border: none; background: none; font-size: 14px; line-height: 1; padding: 0; font-family: var(--font); }

/* BUTTONS */
.btn { padding: 9px 18px; border-radius: var(--radius); border: none; font-family: var(--font); font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-primary { background: var(--navy); color: var(--white); }
.btn-primary:hover:not(:disabled) { background: var(--navy-mid); }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
.btn-ghost:hover:not(:disabled) { border-color: var(--navy); color: var(--navy); }
.btn-danger { background: var(--red-light); color: var(--red); border: 1px solid #f5c6c2; }
.btn-danger:hover:not(:disabled) { background: #fae0de; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sm { padding: 5px 12px; font-size: 10px; }

/* NOTES */
.notes-thread { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
.note { background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
.note__head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.note__author { font-size: 11px; font-weight: 700; font-variation-settings: 'wght' 700; color: var(--navy); }
.note__time { font-size: 11px; color: var(--text-muted); }
.note__actions { display: flex; gap: 6px; margin-left: 8px; }
.note__action { background: none; border: none; font-size: 11px; cursor: pointer; color: var(--text-muted); font-family: var(--font); padding: 0 3px; }
.note__action:hover { color: var(--navy); }
.note__action--del:hover { color: var(--red); }
.note__text { font-size: 13px; line-height: 1.5; }
.note__edit-input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; resize: vertical; min-height: 56px; margin-top: 6px; }
.note-row { display: flex; gap: 8px; align-items: flex-end; }
.note-row textarea { flex: 1; min-height: 56px; resize: vertical; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; color: var(--text); }
.note-row textarea:focus { outline: none; border-color: var(--navy); }

/* SUBTASK */
.subtask-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px; }
.subtask-item__head { display: flex; align-items: center; gap: 8px; }
.subtask-item__title { flex: 1; font-size: 13px; font-weight: 600; font-variation-settings: 'wght' 600; }
.subtask-item__meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

/* DETAIL */
.detail-sec { margin-bottom: 20px; }
.detail-sec__lbl { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.meta-item label { display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
.meta-item span { font-size: 13px; }
.danger-zone { border: 1px solid var(--red-light); border-radius: var(--radius); padding: 12px 14px; margin-top: 20px; }
.danger-zone__lbl { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--red); margin-bottom: 8px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: var(--white); padding: 11px 16px; border-radius: var(--radius); font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; box-shadow: 0 4px 20px rgba(0,0,0,0.25); z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.25s ease; max-width: 280px; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--amber); }

@media (max-width: 580px) { .fg-row { grid-template-columns: 1fr; } .meta-grid { grid-template-columns: 1fr; } .panel { max-width: 100%; } }
</style>
</head>

<div id="pageWrap" style="display:none;">

<!-- TOPBAR -->
<div class="topbar">
  <img src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png" alt="NL" onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
  <div class="topbar__title">NL <span>Tasks</span></div>
  <button class="topbar__btn" id="btnNew">+ New</button>
</div>

<div class="main">
  <!-- MAIN TABS -->
  <div class="main-tabs">
    <button class="main-tab active" id="tabTasks">Tasks</button>
    <button class="main-tab" id="tabProjects">Projects</button>
  </div>

  <!-- TASKS SECTION -->
  <div id="sectionTasks">
    <div class="toolbar">
      <div class="view-toggle">
        <button class="view-btn active" id="tBtnList">&#9776; List</button>
        <button class="view-btn" id="tBtnBoard">&#8853; Board</button>
      </div>
      <div class="filter-row">
        <select class="filter-select" id="tFStatus"><option value="">All statuses</option><option value="to-do">To do</option><option value="in-progress">In progress</option><option value="done">Done</option></select>
        <select class="filter-select" id="tFPriority"><option value="">All priorities</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
        <input class="filter-input" id="tFTag" placeholder="Filter by tag&hellip;">
      </div>
    </div>
    <div id="taskListView">
      <div id="tOverdue"></div><div id="tActive"></div><div id="tDone"></div>
    </div>
    <div id="taskBoardView" style="display:none;">
      <div class="kanban">
        <div class="kanban-col"><div class="kanban-col__head">To Do <span id="tkc0">0</span></div><div class="kanban-col__cards" id="tkk0"></div></div>
        <div class="kanban-col"><div class="kanban-col__head">In Progress <span id="tkc1">0</span></div><div class="kanban-col__cards" id="tkk1"></div></div>
        <div class="kanban-col"><div class="kanban-col__head">Done <span id="tkc2">0</span></div><div class="kanban-col__cards" id="tkk2"></div></div>
      </div>
    </div>
  </div>

  <!-- PROJECTS SECTION -->
  <div id="sectionProjects" style="display:none;">
    <div class="toolbar">
      <div class="view-toggle">
        <button class="view-btn active" id="pBtnList">&#9776; List</button>
        <button class="view-btn" id="pBtnBoard">&#8853; Board</button>
        <button class="view-btn" id="pBtnGantt">&#9644; Gantt</button>
      </div>
      <div class="filter-row">
        <select class="filter-select" id="pFStatus"><option value="">All statuses</option><option value="to-do">To do</option><option value="in-progress">In progress</option><option value="done">Done</option></select>
        <select class="filter-select" id="pFPriority"><option value="">All priorities</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
        <input class="filter-input" id="pFTag" placeholder="Filter by tag&hellip;">
      </div>
    </div>
    <div id="projListView">
      <div id="pOverdue"></div><div id="pActive"></div><div id="pDone"></div>
    </div>
    <div id="projBoardView" style="display:none;">
      <div class="kanban">
        <div class="kanban-col"><div class="kanban-col__head">To Do <span id="pkc0">0</span></div><div class="kanban-col__cards" id="pkk0"></div></div>
        <div class="kanban-col"><div class="kanban-col__head">In Progress <span id="pkc1">0</span></div><div class="kanban-col__cards" id="pkk1"></div></div>
        <div class="kanban-col"><div class="kanban-col__head">Done <span id="pkc2">0</span></div><div class="kanban-col__cards" id="pkk2"></div></div>
      </div>
    </div>
    <div id="projGanttView" style="display:none;">
      <div id="ganttContainer"></div>
    </div>
  </div>
</div>

<!-- CREATE PANEL -->
<div class="panel-overlay" id="createOv"></div>
<div class="panel" id="createPanel">
  <div class="panel__head"><div class="panel__title" id="createTitle">New Task</div><button class="panel__close" id="createClose">&times;</button></div>
  <div class="panel__body" id="createBody"></div>
  <div class="panel__foot"><button class="btn btn-primary" id="createSave">Save</button><button class="btn btn-ghost" id="createCancel">Cancel</button></div>
</div>

<!-- DETAIL PANEL -->
<div class="panel-overlay" id="detailOv"></div>
<div class="panel" id="detailPanel">
  <div class="panel__head"><div class="panel__title" id="detailTitle">Task</div><button class="panel__close" id="detailClose">&times;</button></div>
  <div class="panel__body" id="detailBody"></div>
</div>

<div class="toast" id="toast"></div>
</div>

<script>
var db = firebase.database();
var SESSION = null;
var STATE = {
  taskView: 'list', projView: 'list', mainTab: 'tasks',
  tasks: {}, projects: {}, users: {},
  createType: 'task', createTags: [], createMembers: [],
  detailType: null, detailId: null,
  ganttExpanded: {}
};

/* ── Helpers ── */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, type) { var t=document.getElementById('toast'); t.textContent=msg; t.className='toast '+(type||'success')+' show'; setTimeout(function(){ t.classList.remove('show'); },3500); }
function ensureAuth() {
  return new Promise(function(resolve, reject) {
    var unsub = firebase.auth().onAuthStateChanged(function(u) { unsub(); if(u) resolve(u); else reject(new Error('Not authenticated')); });
  });
}
function fmtDT(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  var pad = function(n){ return n < 10 ? '0'+n : n; };
  return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function fmtDate(ts) { if (!ts) return '—'; var d=new Date(ts); return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear(); }
function isOverdue(deadline, status) { return !!(deadline && status!=='done' && new Date(deadline)<new Date()); }
function initials(name) { if(!name) return '?'; var p=String(name).trim().split(' '); return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase(); }
function statusLabel(s) { return s==='to-do'?'To Do':s==='in-progress'?'In Progress':s==='done'?'Done':'—'; }
function pillStatus(s) { var c=s==='done'?'done':s==='in-progress'?'inprog':'todo'; return '<span class="pill pill-'+c+'">'+statusLabel(s)+'</span>'; }
function pillPri(p) { return '<span class="pill pill-'+esc(p||'low')+'">'+esc(p||'low')+'</span>'; }
function stProgress(proj) { var k=Object.keys(proj.subtasks||{}); var d=k.filter(function(id){ return (proj.subtasks[id].status||'')==='done'; }).length; return {done:d,total:k.length}; }

/* ── Auth ── */
window.nlAuthReady = function(session) {
  SESSION = session;
  loadUsers();
  listenData();
  bindUI();
};

/* ── Data ── */
function loadUsers() {
  db.ref('users').once('value', function(snap) {
    var all = snap.val()||{};
    Object.keys(all).forEach(function(uid) {
      var u = all[uid];
      if (u.role !== 'club') STATE.users[uid] = { name: u.name||u.email||uid, email: u.email||'' };
    });
  });
}

function listenData() {
  ensureAuth().then(function() {
    db.ref('tasks').on('value', function(snap) {
      STATE.tasks = {};
      var all = snap.val()||{};
      Object.keys(all).forEach(function(id) {
        var t = all[id];
        if (!t.archived && t.members && t.members[SESSION.uid]) { STATE.tasks[id]=t; STATE.tasks[id]._id=id; STATE.tasks[id]._type='task'; }
      });
      if (STATE.mainTab === 'tasks') renderTasks();
    });
    db.ref('projects').on('value', function(snap) {
      STATE.projects = {};
      var all = snap.val()||{};
      Object.keys(all).forEach(function(id) {
        var p = all[id];
        if (!p.archived && p.members && p.members[SESSION.uid]) { STATE.projects[id]=p; STATE.projects[id]._id=id; STATE.projects[id]._type='project'; }
      });
      if (STATE.mainTab === 'projects') renderProjects();
    });
  }).catch(function(e){ showToast('Load error: '+e.message,'error'); });
}

/* ── Filters ── */
function getF(prefix) {
  return {
    status:   document.getElementById(prefix+'FStatus').value,
    priority: document.getElementById(prefix+'FPriority').value,
    tag:      document.getElementById(prefix+'FTag').value.toLowerCase().trim()
  };
}
function matchF(item, f) {
  if (f.status   && item.status   !== f.status)   return false;
  if (f.priority && item.priority !== f.priority) return false;
  if (f.tag && !(item.tags||[]).some(function(t){ return String(t).toLowerCase().indexOf(f.tag)!==-1; })) return false;
  return true;
}

/* ── Main tabs ── */
function setMainTab(tab) {
  STATE.mainTab = tab;
  document.getElementById('sectionTasks').style.display    = tab==='tasks'    ? '' : 'none';
  document.getElementById('sectionProjects').style.display = tab==='projects' ? '' : 'none';
  document.getElementById('tabTasks').classList.toggle('active',    tab==='tasks');
  document.getElementById('tabProjects').classList.toggle('active', tab==='projects');
  document.getElementById('btnNew').textContent = tab==='tasks' ? '+ Task' : '+ Project';
  if (tab==='tasks')    renderTasks();
  if (tab==='projects') renderProjects();
}

/* ── Task views ── */
function setTaskView(v) {
  STATE.taskView = v;
  document.getElementById('taskListView').style.display  = v==='list'  ? '' : 'none';
  document.getElementById('taskBoardView').style.display = v==='board' ? '' : 'none';
  document.getElementById('tBtnList').classList.toggle('active',  v==='list');
  document.getElementById('tBtnBoard').classList.toggle('active', v==='board');
  renderTasks();
}

function renderTasks() {
  var f = getF('t');
  var items = Object.values(STATE.tasks).filter(function(i){ return matchF(i,f); });
  if (STATE.taskView === 'list') {
    renderSection('tOverdue','Overdue', items.filter(function(i){ return isOverdue(i.deadline,i.status); }));
    renderSection('tActive','Active',   items.filter(function(i){ return !isOverdue(i.deadline,i.status) && i.status!=='done'; }));
    renderSection('tDone','Done',       items.filter(function(i){ return i.status==='done'; }));
  } else {
    renderBoard(items, 'tkc', 'tkk');
  }
}

/* ── Project views ── */
function setProjView(v) {
  STATE.projView = v;
  document.getElementById('projListView').style.display  = v==='list'  ? '' : 'none';
  document.getElementById('projBoardView').style.display = v==='board' ? '' : 'none';
  document.getElementById('projGanttView').style.display = v==='gantt' ? '' : 'none';
  document.getElementById('pBtnList').classList.toggle('active',  v==='list');
  document.getElementById('pBtnBoard').classList.toggle('active', v==='board');
  document.getElementById('pBtnGantt').classList.toggle('active', v==='gantt');
  renderProjects();
}

function renderProjects() {
  var f = getF('p');
  var items = Object.values(STATE.projects).filter(function(i){ return matchF(i,f); });
  if (STATE.projView === 'list') {
    renderSection('pOverdue','Overdue', items.filter(function(i){ return isOverdue(i.deadline,i.status); }));
    renderSection('pActive','Active',   items.filter(function(i){ return !isOverdue(i.deadline,i.status) && i.status!=='done'; }));
    renderSection('pDone','Done',       items.filter(function(i){ return i.status==='done'; }));
  } else if (STATE.projView === 'board') {
    renderBoard(items, 'pkc', 'pkk');
  } else {
    renderGantt(items);
  }
}

/* ── List section ── */
function renderSection(elId, label, items) {
  var el = document.getElementById(elId);
  el.innerHTML = '';
  if (!items.length) return;
  var wrap = document.createElement('div');
  var lbl = document.createElement('div');
  lbl.className = 'section-lbl';
  lbl.textContent = label;
  var cnt = document.createElement('span');
  cnt.className = 'section-lbl__count';
  cnt.textContent = items.length;
  lbl.appendChild(cnt);
  wrap.appendChild(lbl);
  var list = document.createElement('div');
  list.className = 'item-list';
  items.forEach(function(item){ list.appendChild(buildCard(item)); });
  wrap.appendChild(list);
  el.appendChild(wrap);
}

function buildCard(item) {
  var card = document.createElement('div');
  card.className = 'item-card item-card--'+(item.priority||'low')+(item.status==='done'?' item-card--done':'');
  var body = document.createElement('div');
  body.className = 'item-card__body';
  var title = document.createElement('div');
  title.className = 'item-card__title';
  title.textContent = item.title;
  var meta = document.createElement('div');
  meta.className = 'item-card__meta';
  meta.innerHTML = pillStatus(item.status)+pillPri(item.priority)
    +(item.deadline ? '<span>&#128197; '+fmtDT(item.deadline)+'</span>' : '');
  body.appendChild(title);
  body.appendChild(meta);
  if (item.tags && item.tags.length) {
    var tw = document.createElement('div');
    tw.className = 'item-card__tags';
    item.tags.forEach(function(t){ var tg=document.createElement('span'); tg.className='tag'; tg.textContent=t; tw.appendChild(tg); });
    body.appendChild(tw);
  }
  card.appendChild(body);
  if (item._type === 'project') {
    var p = stProgress(item);
    var right = document.createElement('div');
    right.className = 'item-card__right';
    var prog = document.createElement('div');
    prog.className = 'progress';
    var fill = document.createElement('div');
    fill.className = 'progress__fill';
    fill.style.width = (p.total ? Math.round(p.done/p.total*100) : 0)+'%';
    prog.appendChild(fill);
    var pl = document.createElement('span');
    pl.style.cssText = 'font-size:10px;color:var(--text-muted)';
    pl.textContent = p.done+'/'+p.total;
    right.appendChild(prog);
    right.appendChild(pl);
    card.appendChild(right);
  }
  card.addEventListener('click', function(){ openDetail(item._id, item._type); });
  return card;
}

/* ── Board ── */
function renderBoard(items, cPrefix, kPrefix) {
  ['to-do','in-progress','done'].forEach(function(status, ci) {
    var col = items.filter(function(i){ return (i.status||'to-do')===status; });
    document.getElementById(cPrefix+ci).textContent = col.length;
    var el = document.getElementById(kPrefix+ci);
    el.innerHTML = '';
    if (!col.length) { var e=document.createElement('div'); e.style.cssText='font-size:12px;color:var(--text-muted);text-align:center;padding:14px'; e.textContent='None'; el.appendChild(e); return; }
    col.forEach(function(item) {
      var card = document.createElement('div');
      card.className = 'kanban-card';
      var t = document.createElement('div'); t.className='kanban-card__title'; t.textContent=item.title;
      var m = document.createElement('div'); m.className='kanban-card__meta';
      m.innerHTML = pillPri(item.priority)+(item.deadline?'<span>&#128197; '+fmtDT(item.deadline)+'</span>':'');
      card.appendChild(t); card.appendChild(m);
      card.addEventListener('click', function(){ openDetail(item._id, item._type); });
      el.appendChild(card);
    });
  });
}

/* ── Gantt ── */
function renderGantt(projects) {
  var container = document.getElementById('ganttContainer');
  container.innerHTML = '';
  var active = projects.filter(function(p){ return p.startDate || p.createdAt; });
  if (!active.length) {
    var empty = document.createElement('div');
    empty.className = 'gantt-empty';
    empty.textContent = 'No projects with dates to display. Add start and due dates to your projects.';
    container.appendChild(empty);
    return;
  }

  /* Determine date range across all projects + subtasks */
  var minTs = Infinity, maxTs = -Infinity;
  active.forEach(function(p) {
    var s = p.startDate || p.createdAt;
    var e = p.deadline || p.createdAt;
    if (s < minTs) minTs = s;
    if (e > maxTs) maxTs = e;
    Object.values(p.subtasks||{}).forEach(function(st) {
      var ss = st.startDate || s;
      var se = st.deadline  || e;
      if (ss < minTs) minTs = ss;
      if (se > maxTs) maxTs = se;
    });
  });

  /* Pad edges */
  var pad = 86400000 * 2;
  minTs -= pad; maxTs += pad;
  var totalMs = maxTs - minTs;

  /* Auto zoom: choose scale unit */
  var days = totalMs / 86400000;
  var unit, unitMs, unitFmt;
  if (days <= 21) {
    unit = 'day'; unitMs = 86400000;
    unitFmt = function(d){ return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]+' '+d.getDate(); };
  } else if (days <= 90) {
    unit = 'week'; unitMs = 86400000 * 7;
    unitFmt = function(d){ return 'W/C '+d.getDate()+'/'+(d.getMonth()+1); };
  } else {
    unit = 'month'; unitMs = 86400000 * 30;
    unitFmt = function(d){ return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getFullYear(); };
  }

  /* Build column headers */
  var cols = [];
  var cursor = new Date(minTs);
  /* Align to unit start */
  if (unit === 'week') { cursor.setDate(cursor.getDate() - cursor.getDay()); }
  if (unit === 'month') { cursor.setDate(1); }
  cursor.setHours(0,0,0,0);
  while (cursor.getTime() < maxTs) {
    cols.push(new Date(cursor));
    if (unit === 'day')   cursor.setDate(cursor.getDate()+1);
    if (unit === 'week')  cursor.setDate(cursor.getDate()+7);
    if (unit === 'month') cursor.setMonth(cursor.getMonth()+1);
  }

  /* Build table */
  var wrap = document.createElement('div');
  wrap.className = 'gantt-wrap';
  var table = document.createElement('table');
  table.className = 'gantt-table';

  /* Header row */
  var thead = document.createElement('thead');
  var hrow  = document.createElement('tr');
  var lth   = document.createElement('th');
  lth.className = 'gantt-label-th';
  lth.textContent = 'Project / Task';
  hrow.appendChild(lth);
  var todayCol = -1;
  var now = Date.now();
  cols.forEach(function(col, ci) {
    var th = document.createElement('th');
    th.textContent = unitFmt(col);
    var colEnd = col.getTime() + unitMs;
    if (now >= col.getTime() && now < colEnd) { th.classList.add('gantt-today-head'); todayCol = ci; }
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  /* Body */
  var tbody = document.createElement('tbody');

  function pct(ts) { return Math.max(0, Math.min(100, (ts - minTs) / totalMs * 100)); }

  function makeBarCell(startTs, endTs, status, label, isProj) {
    var td = document.createElement('td');
    td.colSpan = cols.length;
    td.className = 'gantt-cell';
    td.style.position = 'relative';
    if (!startTs || !endTs) return td;
    var bar = document.createElement('div');
    var cls = 'gantt-bar gantt-bar--'+(status==='done'?'done':status==='in-progress'?'inprog':'todo');
    if (isProj) cls += ' gantt-bar--proj';
    bar.className = cls;
    var left = pct(startTs);
    var width = Math.max(1, pct(endTs) - left);
    bar.style.left  = left+'%';
    bar.style.width = width+'%';
    bar.textContent = width > 5 ? label : '';
    bar.title = label + ' — ' + fmtDate(startTs) + ' → ' + fmtDate(endTs);
    td.appendChild(bar);
    /* Today marker */
    if (now >= minTs && now <= maxTs) {
      var marker = document.createElement('div');
      marker.className = 'gantt-today';
      marker.style.left = pct(now)+'%';
      td.appendChild(marker);
    }
    return td;
  }

  active.forEach(function(proj) {
    var projStart = proj.startDate || proj.createdAt;
    var projEnd   = proj.deadline  || proj.createdAt;
    var subtasks  = Object.entries(proj.subtasks||{});
    var isExpanded = !!STATE.ganttExpanded[proj._id];

    /* Project row */
    var prow = document.createElement('tr');
    var plabelTd = document.createElement('td');
    plabelTd.className = 'gantt-label-td';
    var plabel = document.createElement('div');
    plabel.className = 'gantt-proj-label';
    if (subtasks.length) {
      var chev = document.createElement('span');
      chev.className = 'gantt-chevron'+(isExpanded?' open':'');
      chev.textContent = '▶';
      plabel.appendChild(chev);
    }
    var pname = document.createTextNode(proj.title);
    plabel.appendChild(pname);
    plabel.addEventListener('click', function() {
      if (!subtasks.length) { openDetail(proj._id,'project'); return; }
      STATE.ganttExpanded[proj._id] = !STATE.ganttExpanded[proj._id];
      renderGantt(active);
    });
    plabelTd.appendChild(plabel);
    prow.appendChild(plabelTd);
    prow.appendChild(makeBarCell(projStart, projEnd, proj.status, proj.title, true));
    tbody.appendChild(prow);

    /* Subtask rows */
    subtasks.forEach(function(entry) {
      var stId = entry[0], st = entry[1];
      var stRow = document.createElement('tr');
      stRow.className = 'gantt-sub-row'+(isExpanded?' open':'');
      var stLabelTd = document.createElement('td');
      stLabelTd.className = 'gantt-label-td';
      var stLabel = document.createElement('div');
      stLabel.className = 'gantt-sub-label';
      stLabel.textContent = st.title;
      stLabelTd.appendChild(stLabel);
      stRow.appendChild(stLabelTd);
      var stStart = st.startDate || projStart;
      var stEnd   = st.deadline  || projEnd;
      stRow.appendChild(makeBarCell(stStart, stEnd, st.status||'to-do', st.title, false));
      tbody.appendChild(stRow);
    });
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
  container.appendChild(wrap);

  /* Legend */
  var legend = document.createElement('div');
  legend.style.cssText = 'display:flex;gap:16px;padding:10px 0;font-size:11px;color:var(--text-muted)';
  [['gantt-bar--todo','To Do'],['gantt-bar--inprog','In Progress'],['gantt-bar--done','Done']].forEach(function(l) {
    var item = document.createElement('div');
    item.style.cssText = 'display:flex;align-items:center;gap:5px';
    var dot = document.createElement('div');
    dot.className = 'gantt-bar '+l[0];
    dot.style.cssText = 'position:relative;width:20px;height:10px;border-radius:3px;flex-shrink:0';
    var lbl = document.createElement('span');
    lbl.textContent = l[1];
    item.appendChild(dot);
    item.appendChild(lbl);
    legend.appendChild(item);
  });
  var todayLegend = document.createElement('div');
  todayLegend.style.cssText = 'display:flex;align-items:center;gap:5px';
  var todayDot = document.createElement('div');
  todayDot.style.cssText = 'width:2px;height:14px;background:var(--primary);flex-shrink:0';
  var todayLbl = document.createElement('span');
  todayLbl.textContent = 'Today';
  todayLegend.appendChild(todayDot);
  todayLegend.appendChild(todayLbl);
  legend.appendChild(todayLegend);
  container.appendChild(legend);
}

/* ── Create panel ── */
function openCreate(type) {
  STATE.createType = type; STATE.createTags = []; STATE.createMembers = [];
  document.getElementById('createTitle').textContent = type==='project' ? 'New Project' : 'New Task';
  buildCreateForm(type);
  document.getElementById('createOv').classList.add('open');
  document.getElementById('createPanel').classList.add('open');
}
function closeCreate() { document.getElementById('createOv').classList.remove('open'); document.getElementById('createPanel').classList.remove('open'); }

function buildCreateForm(type) {
  var body = document.getElementById('createBody');
  body.innerHTML = '';
  body.appendChild(makeFg('Title *', makeEl('input','cTitle','text','What needs doing?')));
  body.appendChild(makeFg('Description', makeEl('textarea','cDesc','','Optional detail\u2026')));
  var row1 = document.createElement('div'); row1.className='fg-row';
  row1.appendChild(makeFg('Status', makeSel('cStatus',[{v:'to-do',l:'To Do'},{v:'in-progress',l:'In Progress'},{v:'done',l:'Done'}])));
  row1.appendChild(makeFg('Priority', makeSel('cPriority',[{v:'medium',l:'Medium'},{v:'high',l:'High'},{v:'low',l:'Low'}])));
  body.appendChild(row1);
  if (type === 'project') {
    var row2 = document.createElement('div'); row2.className='fg-row';
    row2.appendChild(makeFg('Start Date & Time', makeEl('input','cStartDate','datetime-local','')));
    row2.appendChild(makeFg('Due Date & Time', makeEl('input','cDeadline','datetime-local','')));

function makeFg(lbl, inputEl) { var fg=document.createElement('div'); fg.className='fg'; var l=document.createElement('label'); l.textContent=lbl; fg.appendChild(l); fg.appendChild(inputEl); return fg; }
function makeEl(tag, id, type, placeholder) { var el=document.createElement(tag); el.id=id; if(type) el.type=type; if(placeholder) el.placeholder=placeholder; return el; }
function makeSel(id, opts) { var el=document.createElement('select'); el.id=id; opts.forEach(function(o){ var op=document.createElement('option'); op.value=o.v; op.textContent=o.l; el.appendChild(op); }); return el; }

function renderTagChips() {
  var wrap=document.getElementById('tagsWrap'); var input=document.getElementById('tagInput');
  if(!wrap||!input) return;
  wrap.querySelectorAll('.tag-chip').forEach(function(c){ c.remove(); });
  STATE.createTags.forEach(function(tag,i) {
    var chip=document.createElement('span'); chip.className='tag-chip';
    chip.appendChild(document.createTextNode(tag));
    var x=document.createElement('button'); x.className='tag-chip__x'; x.textContent='\u00d7'; x.setAttribute('type','button');
    (function(idx){ x.addEventListener('click', function(e){ e.stopPropagation(); STATE.createTags.splice(idx,1); renderTagChips(); }); })(i);
    chip.appendChild(x);
    wrap.insertBefore(chip, input);
  });
}

function searchMembers(val) {
  var res=document.getElementById('memberResults'); if(!res) return;
  if(!val.trim()) { res.classList.remove('open'); return; }
  var lower=val.toLowerCase();
  var matches=Object.keys(STATE.users).filter(function(uid){ return uid!==SESSION.uid && !STATE.createMembers.some(function(m){ return m.uid===uid; }) && STATE.users[uid].name.toLowerCase().indexOf(lower)!==-1; }).slice(0,8);
  res.innerHTML='';
  if(!matches.length) { res.classList.remove('open'); return; }
  matches.forEach(function(uid) {
    var u=STATE.users[uid];
    var opt=document.createElement('div'); opt.className='member-opt';
    var av=document.createElement('div'); av.className='avatar'; av.textContent=initials(u.name);
    var nm=document.createElement('span'); nm.textContent=u.name;
    opt.appendChild(av); opt.appendChild(nm);
    opt.addEventListener('mousedown', function(e) {
      e.preventDefault();
      STATE.createMembers.push({uid:uid,name:u.name});
      renderMemberChips();
      document.getElementById('memberInput').value='';
      res.classList.remove('open');
    });
    res.appendChild(opt);
  });
  res.classList.add('open');
}

function renderMemberChips() {
  var wrap=document.getElementById('memberChips'); if(!wrap) return;
  wrap.innerHTML='';
  STATE.createMembers.forEach(function(m,i) {
    var chip=document.createElement('div'); chip.className='member-chip';
    var av=document.createElement('div'); av.className='avatar'; av.style.cssText='width:20px;height:20px;font-size:9px'; av.textContent=initials(m.name);

}

function buildNoteEl(nId, n, item, isCreator) {
  var canEdit=n.uid===SESSION.uid||isCreator;
  var nd=document.createElement('div'); nd.className='note'; nd.dataset.nid=nId;
  var nh=document.createElement('div'); nh.className='note__head';
  var na=document.createElement('span'); na.className='note__author'; na.textContent=n.name||'—';
  var nt=document.createElement('span'); nt.className='note__time'; nt.textContent=fmtDT(n.timestamp);
  nh.appendChild(na); nh.appendChild(nt);
  if(canEdit){
    var actions=document.createElement('div'); actions.className='note__actions';
    var editBtn=document.createElement('button'); editBtn.className='note__action'; editBtn.textContent='Edit'; editBtn.setAttribute('type','button');
    var delBtn=document.createElement('button'); delBtn.className='note__action note__action--del'; delBtn.textContent='Delete'; delBtn.setAttribute('type','button');
    actions.appendChild(editBtn); actions.appendChild(delBtn);
    nh.appendChild(actions);
    /* Edit */
    editBtn.addEventListener('click', function(){
      var body=nd.querySelector('.note__text');
      var existing=nd.querySelector('.note__edit-input');
      if(existing){ existing.remove(); editBtn.textContent='Edit'; return; }
      var inp=document.createElement('textarea'); inp.className='note__edit-input'; inp.value=body.textContent;
      inp.style.display='block';
      var saveEdit=document.createElement('button'); saveEdit.className='btn btn-primary btn-sm'; saveEdit.textContent='Save'; saveEdit.setAttribute('type','button');
      saveEdit.style.cssText='margin-top:6px;padding:5px 12px';
      saveEdit.addEventListener('click', function(){
        var newText=inp.value.trim(); if(!newText) return;
        var node=STATE.detailType==='task'?'tasks':'projects';
        ensureAuth().then(function(){ return db.ref(node+'/'+STATE.detailId+'/notes/'+nId+'/text').set(newText); })
          .then(function(){ showToast('Note updated','success'); openDetail(STATE.detailId,STATE.detailType); })
          .catch(function(e){ showToast('Error: '+e.message,'error'); });
      });
      nd.appendChild(inp); nd.appendChild(saveEdit);
      editBtn.textContent='Cancel';
    });
    /* Delete */
    delBtn.addEventListener('click', function(){
      if(delBtn.dataset.confirmed!=='1'){ delBtn.dataset.confirmed='1'; delBtn.textContent='Confirm?'; setTimeout(function(){ if(delBtn.dataset.confirmed==='1'){ delBtn.dataset.confirmed='0'; delBtn.textContent='Delete'; } },3000); return; }
      var node=STATE.detailType==='task'?'tasks':'projects';
      ensureAuth().then(function(){ return db.ref(node+'/'+STATE.detailId+'/notes/'+nId).remove(); })
        .then(function(){ showToast('Note deleted','success'); openDetail(STATE.detailId,STATE.detailType); })
        .catch(function(e){ showToast('Error: '+e.message,'error'); });
    });
  }
  nd.appendChild(nh);
  var nb=document.createElement('div'); nb.className='note__text'; nb.textContent=n.text||''; nd.appendChild(nb);
  return nd;
}
