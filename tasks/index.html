<!DOCTYPE html>
<!--
  NL Tasks — NL Tools
  Version: 4.1
  Date: 14/04/2026

  CHANGELOG
  v4.0 (14/04/2026)
    - Complete redesign from scratch based on MS To Do model
    - Single task object type — projectId makes it a project task
    - Navigation: My Day / Upcoming / All Tasks / Assigned to Me /
      I've Assigned / Projects
    - FAB (floating action button) replaces header + button
    - Bottom tab bar on mobile, left sidebar on desktop
    - Co-assignees model (multiple people equally responsible)
    - Followers (view + comment, not responsible)
    - Steps (personal checklist inside a task)
    - Dependencies — flag conflicts, no auto-reschedule
    - Tags and assignees guaranteed working (built first, tested)
    - Panels slide up from bottom on mobile
    - Gantt per project with dependency arrows and conflict flags
    - My Day pin — add any task to today's focus view
  v4.1 (14/04/2026)
    - FIXED: Tags — unique IDs per panel (task vs project) prevent
      ID collision when both panels exist in DOM
    - FIXED: Tags — S.projTags separate from S.createTags
    - FIXED: People picker results now positioned inside relative
      parent wrapper, renders correctly on all screen sizes
    - FIXED: People picker — users loaded async, search works once
      S.users is populated
    - FIXED: Mobile nav — "More" drawer replaces missing views
      (Assigned to Me, I've Assigned, project list all accessible)
    - Mobile bottom nav reduced to 4 main tabs + More button
-->

<style>
@font-face {
  font-family: "carbona-variable";
  src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
       url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
  font-display: swap; font-style: normal; font-weight: 200 900;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

:root {
  --primary: #9e0000; --primary-dim: #7a0000;
  --navy: #223b7c; --navy-mid: #1a2f63;
  --red: #c0392b; --red-light: #fdf0ef;
  --green: #1e7e34; --green-light: #edf7ee;
  --amber: #e67e22; --amber-light: #fef6ec;
  --purple: #5b21b6; --purple-light: #ede9ff;
  --white: #ffffff; --off-white: #f4f6f9;
  --text: #1a2a44; --text-muted: #5a6a82;
  --border: #dde3ed; --radius: 8px;
  --shadow: 0 2px 12px rgba(10,22,40,0.10);
  --font: 'carbona-variable','carbona',sans-serif;
  --sidebar-w: 220px;
  --topbar-h: 64px;
  --bottombar-h: 60px;
}

body {
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  font-variation-settings: 'wght' 400;
  color: var(--text);
  background: var(--off-white);
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; height: 100vh; }

.topbar {
  background: var(--primary); color: var(--white);
  height: var(--topbar-h); padding: 0 20px;
  display: flex; align-items: center; gap: 14px;
  flex-shrink: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  border-bottom: 5px solid var(--navy);
}
.topbar img { height: 36px; flex-shrink: 0; }
.topbar__title { font-weight: 900; font-variation-settings: 'wght' 900; font-size: 17px; flex: 1; text-transform: uppercase; letter-spacing: 0.04em; }
.topbar__title span { color: rgba(255,255,255,0.5); }
.topbar__badge { background: var(--red); color: #fff; border-radius: 20px; font-size: 10px; font-weight: 900; padding: 2px 8px; min-width: 22px; text-align: center; display: none; }
.topbar__badge.show { display: inline-block; }

.body-wrap { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR (desktop) ── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--navy); color: var(--white);
  display: flex; flex-direction: column;
  overflow-y: auto; padding: 16px 0 24px;
}
.sidebar__section-lbl {
  font-size: 9px; font-weight: 900; font-variation-settings: 'wght' 900;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: rgba(255,255,255,0.4); padding: 14px 18px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px; cursor: pointer;
  font-size: 13px; font-weight: 600; font-variation-settings: 'wght' 600;
  color: rgba(255,255,255,0.75); border: none; background: none;
  font-family: var(--font); width: 100%; text-align: left;
  transition: all 0.12s; border-radius: 0;
  position: relative;
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: var(--white); }
.nav-item.active { background: rgba(255,255,255,0.15); color: var(--white); font-weight: 800; font-variation-settings: 'wght' 800; }
.nav-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--primary); border-radius:0 2px 2px 0; }
.nav-item__icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
.nav-item__badge { background: var(--primary); color: #fff; border-radius: 20px; font-size: 9px; font-weight: 900; padding: 1px 6px; margin-left: auto; display: none; }
.nav-item__badge.show { display: inline-block; }
.nav-item--proj { padding-left: 32px; font-size: 12px; }
.nav-item--proj .nav-item__icon { font-size: 13px; }
.sidebar__add-proj { display: flex; align-items: center; gap: 8px; padding: 8px 18px 8px 32px; cursor: pointer; font-size: 12px; color: rgba(255,255,255,0.4); border: none; background: none; font-family: var(--font); width: 100%; text-align: left; transition: color 0.12s; }
.sidebar__add-proj:hover { color: rgba(255,255,255,0.8); }

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1; overflow-y: auto; padding: 24px 24px 100px;
  position: relative;
}

.view-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
}
.view-header h1 {
  font-size: 22px; font-weight: 900; font-variation-settings: 'wght' 900;
  flex: 1;
}
.view-header__sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* ── FILTER BAR ── */
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-select, .filter-input {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  font-family: var(--font); font-size: 13px; background: var(--white); color: var(--text);
}
.filter-input { flex: 1; min-width: 140px; }

/* ── DATE GROUP LABEL ── */
.date-group { margin-bottom: 20px; }
.date-group__lbl {
  font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.date-group__lbl::after { content:''; flex:1; height:1px; background:var(--border); }
.date-group__lbl--overdue { color: var(--red); }
.date-group__lbl--today { color: var(--primary); }

/* ── TASK ROW (MS To Do style) ── */
.task-row {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all 0.15s; margin-bottom: 6px;
  box-shadow: var(--shadow);
}
.task-row:hover { border-color: var(--navy); box-shadow: 0 4px 16px rgba(34,59,124,0.1); }
.task-row--done { opacity: 0.55; }
.task-row--overdue { border-left: 3px solid var(--red); }
.task-row--today  { border-left: 3px solid var(--primary); }

.task-row__check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; cursor: pointer;
}
.task-row__check:hover { border-color: var(--navy); background: var(--off-white); }
.task-row__check--done { border-color: var(--green); background: var(--green); }
.task-row__check--done::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 900; }
.task-row__check--high   { border-color: var(--red); }
.task-row__check--medium { border-color: var(--amber); }

.task-row__body { flex: 1; min-width: 0; }
.task-row__title {
  font-size: 14px; font-weight: 600; font-variation-settings: 'wght' 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.task-row--done .task-row__title { text-decoration: line-through; color: var(--text-muted); }
.task-row__meta {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  font-size: 11px; color: var(--text-muted); margin-top: 3px;
}
.task-row__meta-item { display: flex; align-items: center; gap: 3px; }
.task-row__meta-item--overdue { color: var(--red); font-weight: 700; }

.task-row__tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.tag { background: var(--purple-light); color: var(--purple); font-size: 10px; font-weight: 700; font-variation-settings: 'wght' 700; padding: 1px 7px; border-radius: 20px; }

.task-row__right { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
.task-row__star { background: none; border: none; font-size: 16px; cursor: pointer; opacity: 0.3; padding: 2px; transition: opacity 0.15s; }
.task-row__star:hover, .task-row__star--on { opacity: 1; }
.task-row__assignees { display: flex; }
.task-row__av { width: 22px; height: 22px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 9px; font-weight: 800; font-variation-settings: 'wght' 800; display: flex; align-items: center; justify-content: center; border: 2px solid var(--white); margin-left: -6px; flex-shrink: 0; }
.task-row__av:first-child { margin-left: 0; }

/* ── ASSIGNEE GROUP (I've Assigned view) ── */
.assignee-group { margin-bottom: 28px; }
.assignee-group__head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.assignee-group__av { width: 32px; height: 32px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.assignee-group__name { font-size: 14px; font-weight: 800; font-variation-settings: 'wght' 800; }
.assignee-group__count { font-size: 11px; color: var(--text-muted); }

/* ── PROJECTS GRID ── */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.project-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; cursor: pointer;
  transition: all 0.15s; box-shadow: var(--shadow);
  border-top: 4px solid var(--navy);
}
.project-card:hover { box-shadow: 0 6px 20px rgba(34,59,124,0.12); transform: translateY(-1px); }
.project-card--high   { border-top-color: var(--red); }
.project-card--medium { border-top-color: var(--amber); }
.project-card--done   { opacity: 0.65; }
.project-card__title { font-size: 15px; font-weight: 800; font-variation-settings: 'wght' 800; margin-bottom: 8px; }
.project-card__meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.project-card__progress { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.project-card__progress-fill { height: 100%; background: var(--green); border-radius: 4px; }
.project-card__footer { display: flex; align-items: center; justify-content: space-between; }
.project-card__members { display: flex; }

/* ── PROJECT DETAIL ── */
.proj-detail-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; gap: 0; }
.proj-detail-tab { padding: 9px 18px; font-size: 12px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.07em; cursor: pointer; border: none; background: none; font-family: var(--font); color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.proj-detail-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ── KANBAN ── */
.kanban { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; }
.kanban-col { flex-shrink: 0; width: 280px; background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.kanban-col__head { font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.kanban-col__cards { display: flex; flex-direction: column; gap: 8px; }
.kanban-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; transition: border-color 0.15s; box-shadow: var(--shadow); }
.kanban-card:hover { border-color: var(--navy); }
.kanban-card__title { font-size: 13px; font-weight: 700; font-variation-settings: 'wght' 700; margin-bottom: 6px; }
.kanban-card__meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

/* ── GANTT ── */
.gantt-wrap { overflow-x: auto; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); }
.gantt-table { border-collapse: collapse; min-width: 600px; }
.gantt-table th { background: var(--navy); color: var(--white); font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 6px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); white-space: nowrap; min-width: 60px; }
.gantt-table th.g-lbl { text-align: left; padding-left: 14px; min-width: 180px; width: 180px; border-right: 2px solid rgba(255,255,255,0.2); }
.gantt-table td { border-bottom: 1px solid var(--border); height: 36px; padding: 0; vertical-align: middle; }
.gantt-table td.g-lbl { padding: 0 12px; border-right: 2px solid var(--border); min-width: 180px; width: 180px; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-table td.g-lbl--sub { padding-left: 28px; font-size: 12px; font-weight: 400; color: var(--text-muted); }
.g-cell { position: relative; }
.g-bar { position: absolute; top: 7px; height: 22px; border-radius: 4px; display: flex; align-items: center; padding: 0 6px; font-size: 10px; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; cursor: pointer; }
.g-bar--todo   { background: var(--navy); }
.g-bar--inprog { background: var(--amber); }
.g-bar--done   { background: var(--green); }
.g-bar--conflict { outline: 2px solid var(--red); }
.g-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--primary); opacity: 0.7; pointer-events: none; z-index: 2; }
.g-dep-line { position: absolute; pointer-events: none; z-index: 3; }
.gantt-conflict-banner { background: var(--red-light); border: 1px solid #f5c6c2; border-radius: var(--radius); padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--red); display: none; }
.gantt-conflict-banner.show { display: block; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 24px; right: 24px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--primary); color: var(--white);
  border: none; font-size: 28px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(158,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 150; transition: all 0.2s; font-family: var(--font);
  line-height: 1;
}
.fab:hover { background: var(--primary-dim); transform: scale(1.08); }
.fab:active { transform: scale(0.96); }

/* ── PANELS ── */
.panel-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.5); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.panel-overlay.open { opacity: 1; pointer-events: all; }

/* Desktop: slide from right */
.panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 100%; max-width: 520px;
  background: var(--white); z-index: 301;
  transform: translateX(100%); transition: transform 0.25s ease;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: -6px 0 30px rgba(10,22,40,0.15);
}
.panel.open { transform: translateX(0); }

.panel__head { background: var(--navy); color: var(--white); padding: 16px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.panel__title { flex: 1; font-weight: 900; font-variation-settings: 'wght' 900; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
.panel__close { background: none; border: none; color: var(--white); font-size: 22px; cursor: pointer; line-height: 1; padding: 2px 6px; font-family: var(--font); opacity: 0.7; }
.panel__close:hover { opacity: 1; }
.panel__body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
.panel__foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--white); flex-shrink: 0; }

/* ── FORMS ── */
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-muted); margin-bottom: 5px; }
.fg input, .fg textarea, .fg select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 14px; color: var(--text); background: var(--white); transition: border-color 0.15s; -webkit-appearance: none; }
.fg input:focus, .fg textarea:focus, .fg select:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(34,59,124,0.09); }
.fg textarea { resize: vertical; min-height: 80px; }
.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* TAGS INPUT */
.tags-wrap { border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; background: var(--white); display: flex; flex-wrap: wrap; gap: 5px; cursor: text; min-height: 44px; align-items: center; transition: border-color 0.15s; }
.tags-wrap:focus-within { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(34,59,124,0.09); }
.tag-chip { background: var(--purple-light); color: var(--purple); border-radius: 20px; padding: 3px 6px 3px 9px; font-size: 12px; display: flex; align-items: center; gap: 4px; font-weight: 600; }
.tag-chip__x { cursor: pointer; color: var(--purple); font-size: 14px; line-height: 1; border: none; background: none; padding: 0; font-family: var(--font); opacity: 0.6; }
.tag-chip__x:hover { opacity: 1; }
.tag-text-input { border: none; outline: none; font-family: var(--font); font-size: 14px; min-width: 100px; flex: 1; background: transparent; color: var(--text); padding: 2px 0; }

/* PEOPLE PICKER */
.people-wrap { border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; background: var(--white); min-height: 44px; transition: border-color 0.15s; }
.people-wrap:focus-within { border-color: var(--navy); }
.people-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
.person-chip { display: flex; align-items: center; gap: 5px; background: var(--off-white); border: 1px solid var(--border); border-radius: 20px; padding: 3px 8px 3px 5px; font-size: 12px; }
.person-chip__av { width: 20px; height: 20px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.person-chip__x { cursor: pointer; color: var(--text-muted); border: none; background: none; font-size: 14px; line-height: 1; padding: 0; font-family: var(--font); }
.person-chip__x:hover { color: var(--red); }
.people-input { border: none; outline: none; font-family: var(--font); font-size: 14px; width: 100%; background: transparent; color: var(--text); padding: 2px 0; }
.people-results { border: 1px solid var(--border); border-radius: var(--radius); background: var(--white); max-height: 180px; overflow-y: auto; display: none; margin-top: 4px; box-shadow: var(--shadow); }
.people-results.open { display: block; }
.person-opt { padding: 9px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.person-opt:last-child { border-bottom: none; }
.person-opt:hover { background: var(--off-white); }
.person-opt__av { width: 28px; height: 28px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* STEPS */
.steps-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.step-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); }
.step-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.step-check:hover { border-color: var(--navy); }
.step-check--done { background: var(--green); border-color: var(--green); }
.step-check--done::after { content:'✓'; color:#fff; font-size:11px; font-weight:900; }
.step-title { flex: 1; font-size: 13px; }
.step-title--done { text-decoration: line-through; color: var(--text-muted); }
.step-del { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 0 3px; opacity: 0.5; }
.step-del:hover { opacity: 1; color: var(--red); }
.step-add-row { display: flex; gap: 8px; }
.step-add-row input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; }
.step-add-row input:focus { outline: none; border-color: var(--navy); }

/* NOTES */
.notes-thread { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.note { background: var(--off-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
.note__head { display: flex; align-items: center; margin-bottom: 4px; gap: 6px; }
.note__author { font-size: 11px; font-weight: 700; color: var(--navy); flex: 1; }
.note__time { font-size: 11px; color: var(--text-muted); }
.note__act { background: none; border: none; font-size: 11px; color: var(--text-muted); cursor: pointer; padding: 0 3px; font-family: var(--font); }
.note__act:hover { color: var(--navy); }
.note__act--del:hover { color: var(--red); }
.note__text { font-size: 13px; line-height: 1.5; }
.note-row { display: flex; gap: 8px; align-items: flex-end; }
.note-row textarea { flex: 1; min-height: 60px; padding: 9px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 13px; resize: vertical; }
.note-row textarea:focus { outline: none; border-color: var(--navy); }

/* DEPS */
.dep-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.dep-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 6px 10px; background: var(--off-white); border-radius: var(--radius); border: 1px solid var(--border); }
.dep-item--conflict { border-color: var(--red); background: var(--red-light); color: var(--red); }
.dep-item__x { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 0; margin-left: auto; font-family: var(--font); }

/* PILLS */
.pill { display: inline-block; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 20px; }
.pill-todo   { background: var(--off-white); color: var(--text-muted); border: 1px solid var(--border); }
.pill-inprog { background: var(--amber-light); color: var(--amber); }
.pill-done   { background: var(--green-light); color: var(--green); }
.pill-high   { background: var(--red-light); color: var(--red); }
.pill-medium { background: var(--amber-light); color: var(--amber); }
.pill-low    { background: #f0f4ff; color: var(--navy); }
.pill-urgent { background: var(--red); color: #fff; }

/* BUTTONS */
.btn { padding: 10px 18px; border-radius: var(--radius); border: none; font-family: var(--font); font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-primary { background: var(--navy); color: var(--white); }
.btn-primary:hover:not(:disabled) { background: var(--navy-mid); }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
.btn-ghost:hover:not(:disabled) { border-color: var(--navy); color: var(--navy); }
.btn-danger { background: var(--red-light); color: var(--red); border: 1px solid #f5c6c2; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sm { padding: 6px 12px; font-size: 10px; }

/* EMPTY */
.empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty__icon { font-size: 40px; margin-bottom: 12px; }
.empty__text { font-size: 14px; }

/* TOAST */
.toast { position: fixed; bottom: 88px; right: 24px; background: var(--navy); color: var(--white); padding: 11px 16px; border-radius: var(--radius); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; box-shadow: 0 4px 20px rgba(0,0,0,0.25); z-index: 999; transform: translateY(20px); opacity: 0; transition: all 0.25s ease; max-width: 280px; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--amber); }

/* DETAIL SECTIONS */
.det-sec { margin-bottom: 20px; }
.det-sec__lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.meta-item label { display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
.meta-item span { font-size: 13px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
.danger-zone { border: 1px solid var(--red-light); border-radius: var(--radius); padding: 12px 14px; margin-top: 20px; }
.danger-zone__lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--red); margin-bottom: 8px; }

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav { display: none; height: var(--bottombar-h); background: var(--navy); border-top: 3px solid var(--primary); flex-shrink: 0; }
.bottom-nav__items { display: flex; height: 100%; }
.bottom-nav__item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: none; color: rgba(255,255,255,0.6); font-family: var(--font); font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.15s; position: relative; }
.bottom-nav__item.active { color: var(--white); }
.bottom-nav__item.active::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:32px; height:3px; background:var(--primary); border-radius:0 0 3px 3px; }
.bottom-nav__icon { font-size: 20px; line-height: 1; }
.bottom-nav__badge { position: absolute; top: 6px; right: calc(50% - 18px); background: var(--primary); color: #fff; border-radius: 10px; font-size: 9px; font-weight: 900; padding: 1px 5px; display: none; }
.bottom-nav__badge.show { display: block; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .bottom-nav { display: flex; }
  .main-content { padding: 16px 14px 80px; }
  .fab { bottom: 76px; right: 16px; width: 52px; height: 52px; font-size: 26px; }
  .toast { bottom: 140px; right: 14px; }
  .panel { max-width: 100%; top: auto; height: 92vh; transform: translateY(100%); border-radius: 16px 16px 0 0; }
  .panel.open { transform: translateY(0); }
  .fg-row { grid-template-columns: 1fr; }
  .meta-grid { grid-template-columns: 1fr; }
  .projects-grid { grid-template-columns: 1fr; }
  .kanban { flex-direction: column; }
  .kanban-col { width: 100%; }
}
@media (min-width: 769px) {
  .bottom-nav { display: none; }
}
</style>
</head>

<script>
/* ══════════════════════════════════════════════════════════
   GLOBALS
══════════════════════════════════════════════════════════ */
var db = firebase.database();
var SESSION = null;

var S = {
  view: 'myday',
  tasks: {}, projects: {}, users: {},
  createTags: [], projTags: [], createAssignees: [], createFollowers: [],
  detailId: null,
  projView: 'board', activeProjId: null,
  ganttExpanded: {}
};

/* ══════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast '+(type||'success')+' show';
  setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

function ensureAuth() {
  return new Promise(function(resolve, reject) {
    var unsub = firebase.auth().onAuthStateChanged(function(u) {
      unsub();
      if (u) resolve(u); else reject(new Error('Not authenticated'));
    });
  });
}

function pad(n) { return n < 10 ? '0'+n : String(n); }
function fmtDT(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function fmtDate(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();
}
function fmtRelative(ts) {
  if (!ts) return '';
  var d = new Date(ts); var now = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var taskDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var diff = (taskDay - today) / 86400000;
  if (diff < 0) return 'Overdue';
  if (diff === 0) return 'Due today';
  if (diff === 1) return 'Due tomorrow';
  if (diff < 7) return 'Due '+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  return fmtDate(ts);
}
function isOverdue(ts, status) { return !!(ts && status !== 'done' && new Date(ts) < new Date()); }
function isToday(ts) { if (!ts) return false; var d=new Date(ts); var n=new Date(); return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }
function initials(name) { if(!name) return '?'; var p=String(name).trim().split(' '); return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase(); }
function userName(uid) { if(uid===SESSION.uid) return 'You'; return S.users[uid] ? S.users[uid].name : uid; }
function statusLabel(s) { return s==='to-do'?'To Do':s==='in-progress'?'In Progress':s==='done'?'Done':'—'; }
function pillStatus(s) { var c=s==='done'?'done':s==='in-progress'?'inprog':'todo'; return '<span class="pill pill-'+c+'">'+statusLabel(s)+'</span>'; }
function pillPri(p) { return '<span class="pill pill-'+esc(p||'low')+'">'+esc(p||'low')+'</span>'; }

/* ══════════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════════ */
window.nlAuthReady = function(session) {
  SESSION = session;
  loadUsers();
  listenData();
  bindUI();
};

/* ══════════════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════════════ */
function loadUsers() {
  db.ref('users').once('value', function(snap) {
    var all = snap.val()||{};
    Object.keys(all).forEach(function(uid) {
      var u = all[uid];
      if (u.role !== 'club') S.users[uid] = { name: u.name||u.email||uid, email: u.email||'' };
    });
  });
}

function listenData() {
  ensureAuth().then(function() {
    db.ref('tasks').on('value', function(snap) {
      S.tasks = {};
      var all = snap.val()||{};
      Object.keys(all).forEach(function(id) {
        var t = all[id];
        if (t.archived) return;
        var mine = t.createdBy===SESSION.uid ||
          (t.assignees && t.assignees[SESSION.uid]) ||
          (t.followers && t.followers[SESSION.uid]);
        if (mine) { S.tasks[id]=t; S.tasks[id]._id=id; }
      });
      updateBadges();
      renderView();
    });
    db.ref('projects').on('value', function(snap) {
      S.projects = {};
      var all = snap.val()||{};
      Object.keys(all).forEach(function(id) {
        var p = all[id];
        if (p.archived) return;
        if (p.createdBy===SESSION.uid || (p.members&&p.members[SESSION.uid])) {
          S.projects[id]=p; S.projects[id]._id=id;
        }
      });
      renderSidebarProjects();
      if (S.view==='projects' || S.view.startsWith('proj:')) renderView();
    });
  }).catch(function(e){ showToast('Load error: '+e.message,'error'); });
}

/* ══════════════════════════════════════════════════════════
   BADGES
══════════════════════════════════════════════════════════ */
function updateBadges() {
  var tasks = Object.values(S.tasks);
  var overdueOrToday = tasks.filter(function(t){ return t.status!=='done' && (isOverdue(t.deadline,t.status)||isToday(t.deadline)); }).length;
  var myDay = tasks.filter(function(t){ return t.myDay&&t.myDay[SESSION.uid] && t.status!=='done'; }).length;
  var assignedMe = tasks.filter(function(t){ return t.assignees&&t.assignees[SESSION.uid] && t.status!=='done'; }).length;

  setBadge('nb-myday', myDay);
  setBadge('bnb-myday', myDay);
  setBadge('nb-upcoming', overdueOrToday);
  setBadge('nb-assigned', assignedMe);
  setBadge('bnb-assigned', assignedMe);

  var totalAlert = overdueOrToday;
  var tb = document.getElementById('topbarBadge');
  if (tb) { tb.textContent = totalAlert; tb.classList.toggle('show', totalAlert > 0); }
}

function setBadge(id, count) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = count > 99 ? '99+' : count;
  el.classList.toggle('show', count > 0);
}

/* ══════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════ */
function setView(view) {
  S.view = view;
  /* Desktop nav */
  document.querySelectorAll('.nav-item').forEach(function(el){
    el.classList.toggle('active', el.dataset.view === view || (view.startsWith('proj:') && el.dataset.view === view));
  });
  /* Bottom nav — only toggle the 4 main items */
  var bnMap = {'myday':'bn-myday','upcoming':'bn-upcoming','all':'bn-all','projects':'bn-projects'};
  ['bn-myday','bn-upcoming','bn-all','bn-projects'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.classList.remove('active');
  });
  var activeKey = view.startsWith('proj:') ? 'projects' : view;
  if (bnMap[activeKey]) {
    var el = document.getElementById(bnMap[activeKey]);
    if (el) el.classList.add('active');
  }
  renderView();
}

function renderView() {
  var el = document.getElementById('viewContent');
  if (S.view === 'myday')           renderMyDay(el);
  else if (S.view === 'upcoming')   renderUpcoming(el);
  else if (S.view === 'all')        renderAll(el);
  else if (S.view === 'assigned-me')     renderAssignedMe(el);
  else if (S.view === 'assigned-others') renderAssignedOthers(el);
  else if (S.view === 'projects')        renderProjects(el);
  else if (S.view.startsWith('proj:'))   renderProjectDetail(el, S.view.replace('proj:',''));
}

/* ══════════════════════════════════════════════════════════
   TASK LIST RENDERING
══════════════════════════════════════════════════════════ */
function tasksByDate(tasks) {
  /* Returns groups: overdue, today, tomorrow, this week, later, no date */
  var now = new Date(); var todayStart = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var groups = { overdue:[], today:[], tomorrow:[], week:[], later:[], nodate:[] };
  tasks.forEach(function(t) {
    if (!t.deadline) { groups.nodate.push(t); return; }
    var d = new Date(t.deadline);
    var dayStart = new Date(d.getFullYear(),d.getMonth(),d.getDate());
    var diff = (dayStart-todayStart)/86400000;
    if (diff < 0) groups.overdue.push(t);
    else if (diff===0) groups.today.push(t);
    else if (diff===1) groups.tomorrow.push(t);
    else if (diff < 7) groups.week.push(t);
    else groups.later.push(t);
  });
  return groups;
}

function renderTaskGroup(container, label, tasks, labelClass) {
  if (!tasks.length) return;
  var grp = document.createElement('div'); grp.className = 'date-group';
  var lbl = document.createElement('div'); lbl.className = 'date-group__lbl'+(labelClass?' '+labelClass:'');
  lbl.textContent = label;
  grp.appendChild(lbl);
  tasks.forEach(function(t){ grp.appendChild(buildTaskRow(t)); });
  container.appendChild(grp);
}

function buildTaskRow(t) {
  var row = document.createElement('div');
  var overdue = isOverdue(t.deadline, t.status);
  var today   = isToday(t.deadline);
  row.className = 'task-row'+(t.status==='done'?' task-row--done':'')+(overdue?' task-row--overdue':today?' task-row--today':'');

  /* Check button */
  var check = document.createElement('div');
  check.className = 'task-row__check task-row__check--'+(t.status==='done'?'done':(t.priority||'low'));
  check.addEventListener('click', function(e) {
    e.stopPropagation();
    var newStatus = t.status==='done' ? 'to-do' : 'done';
    ensureAuth().then(function(){ return db.ref('tasks/'+t._id+'/status').set(newStatus); })
      .catch(function(e){ showToast('Error: '+e.message,'error'); });
  });

  /* Body */
  var body = document.createElement('div'); body.className = 'task-row__body';
  var title = document.createElement('div'); title.className = 'task-row__title'; title.textContent = t.title;
  body.appendChild(title);

  /* Meta */
  var meta = document.createElement('div'); meta.className = 'task-row__meta';
  if (t.deadline) {
    var rel = fmtRelative(t.deadline);
    var mi = document.createElement('span');
    mi.className = 'task-row__meta-item'+(overdue?' task-row__meta-item--overdue':'');
    mi.textContent = '📅 '+rel;
    meta.appendChild(mi);
  }
  if (t.projectId && S.projects[t.projectId]) {
    var pi = document.createElement('span'); pi.className = 'task-row__meta-item'; pi.textContent = '📁 '+S.projects[t.projectId].title; meta.appendChild(pi);
  }
  var stepKeys = Object.keys(t.steps||{});
  if (stepKeys.length) {
    var done = stepKeys.filter(function(k){ return t.steps[k].done; }).length;
    var si = document.createElement('span'); si.className = 'task-row__meta-item'; si.textContent = '☑ '+done+'/'+stepKeys.length; meta.appendChild(si);
  }
  body.appendChild(meta);

  /* Tags */
  if (t.tags && t.tags.length) {
    var tw = document.createElement('div'); tw.className = 'task-row__tags';
    t.tags.forEach(function(tag){ var tg=document.createElement('span'); tg.className='tag'; tg.textContent=tag; tw.appendChild(tg); });
    body.appendChild(tw);
  }

  /* Right side */
  var right = document.createElement('div'); right.className = 'task-row__right';

  /* Assignee avatars */
  var assignees = Object.keys(t.assignees||{});
  if (assignees.length) {
    var avs = document.createElement('div'); avs.className = 'task-row__assignees';
    assignees.slice(0,3).forEach(function(uid) {
      var av = document.createElement('div'); av.className = 'task-row__av';
      av.textContent = initials(userName(uid)); av.title = userName(uid);
      avs.appendChild(av);
    });
    if (assignees.length > 3) { var more=document.createElement('div'); more.className='task-row__av'; more.textContent='+'+( assignees.length-3); avs.appendChild(more); }
    right.appendChild(avs);
  }

  /* My Day star */
  var star = document.createElement('button'); star.className = 'task-row__star'+(t.myDay&&t.myDay[SESSION.uid]?' task-row__star--on':'');
  star.textContent = '⭐'; star.title = t.myDay&&t.myDay[SESSION.uid] ? 'Remove from My Day' : 'Add to My Day';
  star.addEventListener('click', function(e) {
    e.stopPropagation();
    var inMyDay = !!(t.myDay && t.myDay[SESSION.uid]);
    var update = {}; update['tasks/'+t._id+'/myDay/'+SESSION.uid] = inMyDay ? null : true;
    ensureAuth().then(function(){ return db.ref().update(update); })
      .then(function(){ showToast(inMyDay?'Removed from My Day':'Added to My Day','success'); })
      .catch(function(e){ showToast('Error: '+e.message,'error'); });
  });
  right.appendChild(star);

  row.appendChild(check);
  row.appendChild(body);
  row.appendChild(right);
  row.addEventListener('click', function(){ openDetail(t._id); });
  return row;
}

/* ══════════════════════════════════════════════════════════
   GANTT
══════════════════════════════════════════════════════════ */
function renderGantt(el, tasks, proj) {
  var banner = document.createElement('div'); banner.className = 'gantt-conflict-banner'; banner.id = 'ganttConflictBanner';
  el.appendChild(banner);

  var withDates = tasks.filter(function(t){ return t.startDate||t.deadline||proj.startDate; });
  if (!withDates.length) { el.appendChild(makeEmpty('📊','Add start/due dates to tasks to see the Gantt.')); return; }

  /* Date range */
  var minTs = Infinity, maxTs = -Infinity;
  withDates.forEach(function(t) {
    var s = t.startDate || proj.startDate || t.createdAt;
    var e = t.deadline  || proj.deadline  || t.createdAt;
    if (s < minTs) minTs = s;
    if (e > maxTs) maxTs = e;
  });
  var pad2 = 86400000 * 2;
  minTs -= pad2; maxTs += pad2;
  var totalMs = maxTs - minTs;
  var days = totalMs / 86400000;

  /* Scale */
  var unitMs, unitFmt, unitStep;
  if (days <= 21) {
    unitMs = 86400000;
    unitFmt = function(d){ return ['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()]+' '+d.getDate(); };
    unitStep = function(d){ d.setDate(d.getDate()+1); };
  } else if (days <= 90) {
    unitMs = 86400000*7;
    unitFmt = function(d){ return pad(d.getDate())+'/'+pad(d.getMonth()+1); };
    unitStep = function(d){ d.setDate(d.getDate()+7); };
  } else {
    unitMs = 86400000*30;
    unitFmt = function(d){ return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]; };
    unitStep = function(d){ d.setMonth(d.getMonth()+1); };
  }

  /* Build cols */
  var cols = [];
  var cur = new Date(minTs); cur.setHours(0,0,0,0);
  while (cur.getTime() < maxTs) { cols.push(new Date(cur)); unitStep(cur); }

  /* Check conflicts */
  var conflicts = {};
  tasks.forEach(function(t) {
    (t.dependsOn||[]).forEach(function(depId) {
      var dep = S.tasks[depId]; if (!dep) return;
      var depEnd   = dep.deadline  || dep.createdAt;
      var tStart   = t.startDate   || dep.deadline;
      if (tStart && depEnd && tStart < depEnd) conflicts[t._id] = true;
    });
  });
  if (Object.keys(conflicts).length) {
    banner.textContent = '⚠ Scheduling conflict: '+Object.keys(conflicts).length+' task'+(Object.keys(conflicts).length!==1?'s':'')+' scheduled before their dependencies end.';
    banner.classList.add('show');
  }

  function pct(ts) { return Math.max(0, Math.min(100, (ts-minTs)/totalMs*100)); }

  var wrap = document.createElement('div'); wrap.className = 'gantt-wrap';
  var table = document.createElement('table'); table.className = 'gantt-table';
  var thead = document.createElement('thead'); var hrow = document.createElement('tr');
  var lth = document.createElement('th'); lth.className = 'g-lbl'; lth.textContent = 'Task'; hrow.appendChild(lth);
  var now = Date.now();
  cols.forEach(function(col) {
    var th = document.createElement('th'); th.textContent = unitFmt(col);
    var colEnd = col.getTime()+unitMs;
    if (now >= col.getTime() && now < colEnd) th.style.background = 'var(--primary)';
    hrow.appendChild(th);
  });
  thead.appendChild(hrow); table.appendChild(thead);

  var tbody = document.createElement('tbody');
  withDates.forEach(function(t) {
    var tStart = t.startDate || proj.startDate || t.createdAt;
    var tEnd   = t.deadline  || proj.deadline  || t.createdAt;
    var tr = document.createElement('tr');
    var labelTd = document.createElement('td'); labelTd.className = 'g-lbl'; labelTd.textContent = t.title; labelTd.title = t.title;
    tr.appendChild(labelTd);
    var barTd = document.createElement('td'); barTd.colSpan = cols.length; barTd.className = 'g-cell'; barTd.style.position='relative';
    if (tStart && tEnd) {
      var bar = document.createElement('div');
      var barClass = 'g-bar g-bar--'+(t.status==='done'?'done':t.status==='in-progress'?'inprog':'todo');
      if (conflicts[t._id]) barClass += ' g-bar--conflict';
      bar.className = barClass;
      var left = pct(tStart); var width = Math.max(1, pct(tEnd)-left);
      bar.style.left = left+'%'; bar.style.width = width+'%';
      bar.textContent = width > 8 ? t.title : '';
      bar.title = t.title+' — '+fmtDate(tStart)+' → '+fmtDate(tEnd)+(conflicts[t._id]?' ⚠ Conflict':'');
      bar.addEventListener('click', function(){ openDetail(t._id); });
      barTd.appendChild(bar);
      if (now >= minTs && now <= maxTs) {
        var todayLine = document.createElement('div'); todayLine.className = 'g-today'; todayLine.style.left = pct(now)+'%'; barTd.appendChild(todayLine);
      }
    }
    tr.appendChild(barTd); tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table); el.appendChild(wrap);

  /* Legend */
  var legend = document.createElement('div'); legend.style.cssText='display:flex;gap:16px;padding:10px 2px;font-size:11px;color:var(--text-muted);flex-wrap:wrap';
  [['g-bar--todo','navy','To Do'],['g-bar--inprog','amber','In Progress'],['g-bar--done','green','Done'],['g-bar--conflict','red','Conflict']].forEach(function(l) {
    var li = document.createElement('div'); li.style.cssText='display:flex;align-items:center;gap:5px';
    var dot = document.createElement('div'); dot.style.cssText='width:16px;height:8px;border-radius:3px;background:var(--'+l[1]+');flex-shrink:0';
    if (l[0]==='g-bar--conflict') dot.style.cssText='width:16px;height:8px;border-radius:3px;background:var(--red-light);outline:2px solid var(--red)';
    var lbl = document.createElement('span'); lbl.textContent=l[2];
    li.appendChild(dot); li.appendChild(lbl); legend.appendChild(li);
  });
  el.appendChild(legend);
}

function buildPeoplePicker(type, arr) {
  var wrap = document.createElement('div');
  var chips = document.createElement('div'); chips.className = 'people-chips'; chips.id = type+'Chips';
  var input = document.createElement('input'); input.className = 'people-input'; input.id = type+'Input'; input.placeholder = 'Search staff\u2026'; input.setAttribute('autocomplete','off');
  var results = document.createElement('div'); results.className = 'people-results'; results.id = type+'Results';
  var pw = document.createElement('div'); pw.className = 'people-wrap'; pw.style.position='relative';
  pw.appendChild(chips); pw.appendChild(input); pw.appendChild(results);
  wrap.appendChild(pw);

  input.addEventListener('input', function(){ searchPeople(type, input.value, arr, results, chips); });
  return wrap;
}

function searchPeople(type, val, arr, resultsEl, chipsEl) {
  if (!val.trim()) { resultsEl.classList.remove('open'); return; }
  var lower = val.toLowerCase();
  var matches = Object.keys(S.users).filter(function(uid) {
    return uid !== SESSION.uid && !arr.some(function(m){ return m.uid===uid; }) && S.users[uid].name.toLowerCase().indexOf(lower) !== -1;
  }).slice(0,8);
  resultsEl.innerHTML = '';
  if (!matches.length) { resultsEl.classList.remove('open'); return; }
  matches.forEach(function(uid) {
    var u = S.users[uid];
    var opt = document.createElement('div'); opt.className = 'person-opt';
    var av = document.createElement('div'); av.className = 'person-opt__av'; av.textContent = initials(u.name);
    var nm = document.createElement('span'); nm.textContent = u.name;
    opt.appendChild(av); opt.appendChild(nm);
    opt.addEventListener('mousedown', function(e) {
      e.preventDefault();
      arr.push({uid:uid,name:u.name});
      renderPeopleChips(type, arr, chipsEl);
      document.getElementById(type+'Input').value = '';
      resultsEl.classList.remove('open');
    });
    resultsEl.appendChild(opt);
  });
  resultsEl.classList.add('open');
}

function renderPeopleChips(type, arr, chipsEl) {
  if (!chipsEl) chipsEl = document.getElementById(type+'Chips');
  if (!chipsEl) return;
  chipsEl.innerHTML = '';
  arr.forEach(function(m, i) {
    var chip = document.createElement('div'); chip.className = 'person-chip';
    var av = document.createElement('div'); av.className = 'person-chip__av'; av.textContent = initials(m.name);
    var nm = document.createElement('span'); nm.style.fontSize='12px'; nm.textContent = m.name;
    var x = document.createElement('button'); x.className = 'person-chip__x'; x.textContent = '×'; x.setAttribute('type','button');
    (function(idx){ x.addEventListener('click', function(){ arr.splice(idx,1); renderPeopleChips(type, arr, chipsEl); }); })(i);
    chip.appendChild(av); chip.appendChild(nm); chip.appendChild(x); chipsEl.appendChild(chip);
  });
}

function buildTagsInput(prefix) {
  prefix = prefix || 'task';
  var arr = prefix === 'proj' ? S.projTags : S.createTags;
  var wrapId = prefix + 'TagsWrap'; var inputId = prefix + 'TagInput';
  var wrap = document.createElement('div'); wrap.className = 'tags-wrap'; wrap.id = wrapId;
  var input = document.createElement('input'); input.className = 'tag-text-input'; input.id = inputId; input.placeholder = 'Type tag, press Enter\u2026';
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault(); e.stopPropagation();
      var val = input.value.replace(/,/g,'').trim();
      if (val && arr.indexOf(val) === -1) { arr.push(val); renderTagChipsFor(wrapId, inputId, arr); }
      input.value = '';
    }
  });
  wrap.appendChild(input);
  return wrap;
}

function renderTagChips() {
  var wrap = document.getElementById('tagsWrap'); var input = document.getElementById('tagInput');
  if (!wrap || !input) return;
  wrap.querySelectorAll('.tag-chip').forEach(function(c){ c.remove(); });
  S.createTags.forEach(function(tag, i) {
    var chip = document.createElement('span'); chip.className = 'tag-chip';
    chip.appendChild(document.createTextNode(tag));
    var x = document.createElement('button'); x.className = 'tag-chip__x'; x.textContent = '×'; x.setAttribute('type','button');
    (function(idx){ x.addEventListener('click', function(e){ e.stopPropagation(); S.createTags.splice(idx,1); renderTagChips(); }); })(i);
    chip.appendChild(x); wrap.insertBefore(chip, input);
  });
}

    createdAt:Date.now(),
    archived:false
  };
  var btn=document.getElementById('projCreateSave'); btn.disabled=true; btn.textContent='Creating\u2026';
  ensureAuth().then(function(){ return db.ref('projects').push(data); })
    .then(function(ref){
      showToast('Project created','success');
      closeProjCreate();
      setView('proj:'+ref.key);
    })
    .catch(function(e){ showToast('Error: '+e.message,'error'); btn.disabled=false; btn.textContent='Create Project'; });
}

/* ══════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
function makeViewHeader(title, sub) {
  var wrap=document.createElement('div'); wrap.className='view-header';
  var left=document.createElement('div'); left.style.flex='1';
  var h1=document.createElement('h1'); h1.textContent=title;
  left.appendChild(h1);
  if(sub){ var s=document.createElement('div'); s.className='view-header__sub'; s.textContent=sub; left.appendChild(s); }
  wrap.appendChild(left);
  return wrap;
}
function makeEmpty(icon, text) {
  var el=document.createElement('div'); el.className='empty';
  var ic=document.createElement('div'); ic.className='empty__icon'; ic.textContent=icon;
  var tx=document.createElement('div'); tx.className='empty__text'; tx.textContent=text;
  el.appendChild(ic); el.appendChild(tx); return el;
}
function makeSec(lbl) {
  var s=document.createElement('div'); s.className='det-sec';
  var l=document.createElement('div'); l.className='det-sec__lbl'; l.textContent=lbl;
  s.appendChild(l); return s;
}
function metaItem(label,value){ return '<div class="meta-item"><label>'+esc(label)+'</label><span>'+esc(value)+'</span></div>'; }
function makeFg(lbl, inputEl) { var fg=document.createElement('div'); fg.className='fg'; var l=document.createElement('label'); l.textContent=lbl; fg.appendChild(l); fg.appendChild(inputEl); return fg; }
function makeEl(tag,id,type,placeholder){ var el=document.createElement(tag); el.id=id; if(type) el.type=type; if(placeholder) el.placeholder=placeholder; return el; }
function makeSel(id,opts){ var el=document.createElement('select'); if(id) el.id=id; opts.forEach(function(o){ var op=document.createElement('option'); op.value=o.v; op.textContent=o.l; el.appendChild(op); }); return el; }


/* ══════════════════════════════════════════════════════════
   MORE DRAWER (mobile)
══════════════════════════════════════════════════════════ */
function toggleMoreDrawer() {
  var drawer = document.getElementById('moreDrawer');
  var overlay = document.getElementById('moreDrawerOverlay');
  if (!drawer) return;
  var open = drawer.style.display !== 'none';
  drawer.style.display = open ? 'none' : 'block';
  overlay.style.display = open ? 'none' : 'block';
  if (!open) renderMoreDrawerProjects();
}

function renderMoreDrawerProjects() {
  var el = document.getElementById('moreDrawerProjects'); if (!el) return;
  el.innerHTML = '';
  Object.values(S.projects).forEach(function(p) {
    var btn = document.createElement('button');
    btn.className = 'nav-item nav-item--proj';
    btn.innerHTML = '<span class="nav-item__icon">📁</span>' + esc(p.title);
    btn.addEventListener('click', function(){ setViewFromDrawer('proj:'+p._id); });
    el.appendChild(btn);
  });
}

function setViewFromDrawer(view) {
  toggleMoreDrawer();
  setView(view);
}

/* ══════════════════════════════════════════════════════════
   BIND UI
══════════════════════════════════════════════════════════ */
function bindUI() {
  /* Nav */
  document.querySelectorAll('[data-view]').forEach(function(el) {
    el.addEventListener('click', function(){ setView(el.dataset.view); });
  });
  /* FAB */
  document.getElementById('fab').addEventListener('click', function(){ openCreate(null); });
  /* Create panel */
  document.getElementById('createClose').addEventListener('click',  closeCreate);
  document.getElementById('createCancel').addEventListener('click', closeCreate);
  document.getElementById('createOv').addEventListener('click',     closeCreate);
  document.getElementById('createSave').addEventListener('click',   saveCreate);
  /* Detail panel */
  document.getElementById('detailClose').addEventListener('click',  closeDetail);
  document.getElementById('detailOv').addEventListener('click',     closeDetail);
  /* Project create */
  document.getElementById('sidebarAddProj').addEventListener('click', openProjCreate);
  document.getElementById('projCreateClose').addEventListener('click',  closeProjCreate);
  document.getElementById('projCreateCancel').addEventListener('click', closeProjCreate);
  document.getElementById('projCreateOv').addEventListener('click',     closeProjCreate);
  document.getElementById('projCreateSave').addEventListener('click',   saveProjCreate);
  /* Initial view */
  setView('myday');
}
</script>
