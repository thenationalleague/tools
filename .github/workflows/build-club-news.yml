name: Build Club News JSON (v1.27)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *" # every 20 minutes (UTC)

permissions:
  contents: write

concurrency:
  group: build-club-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for rebase)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with origin/main (avoid non-fast-forward + no local changes yet)
        run: |
          git fetch origin main
          git checkout main
          git rebase origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml feedparser

      - name: Build club-news.json + failures
        run: |
          python -u .github/workflows/build-club-news.py

      - name: Verify outputs exist
        run: |
          echo "---- LS assets/data ----"
          ls -la assets/data || true
          echo "---- File checks ----"
          test -f assets/data/club-news.json && echo "club-news.json exists" || (echo "club-news.json MISSING" && exit 1)
          test -f assets/data/club-news-failures.json && echo "club-news-failures.json exists" || (echo "club-news-failures.json MISSING" && exit 1)

      - name: Commit & push if changed (including untracked)
        run: |
          echo "---- git status (porcelain) ----"
          git status --porcelain

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f assets/data/club-news.json assets/data/club-news-failures.json
          git commit -m "Update club-news.json (v1.27)"
          git push origin HEAD:main
