name: Build club-news.json (v1.33)

on:
  workflow_dispatch:
  schedule:
    - cron: "15,45 * * * *"

permissions:
  contents: write

concurrency:
  group: club-news-json
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Sync with origin/main (clean tree)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main

      - name: Build club news
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -u .github/workflows/build-club-news.py

      - name: Commit & push if changed
        run: |
          echo "---- git status (porcelain) ----"
          git status --porcelain

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git add -f assets/data/club-news.json assets/data/club-news-failures.json
          git commit -m "Update club-news.json (v1.33)"

          # Another run may have pushed while we were building.
          # Rebase our commit on top of latest main, then push.
          git fetch origin main
          git pull --rebase origin main

          git push origin HEAD:main
