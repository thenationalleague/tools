name: Build Club News JSON (v1.23)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *" # every 20 minutes (UTC)

permissions:
  contents: write

concurrency:
  group: build-club-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml feedparser

      - name: Build assets/data/club-news.json
        run: |
          python -u .github/workflows/build-club-news.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/data/club-news.json
          git commit -m "Update club-news.json (v1.23)"
          git push
