name: Fetch GA metrics

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run GA metrics fetch
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
        run: node scripts/fetch-ga-metrics.js

      - name: Upload ga-metrics.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ga-metrics
          path: assets/data/ga-metrics.json
          retention-days: 7

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain assets/data/ga-metrics.json)" ]; then
            echo "No changes to ga-metrics.json, skipping commit"
            exit 0
          fi
          git add assets/data/ga-metrics.json
          git commit -m "chore: update GA metrics"
          git push