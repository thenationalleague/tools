name: Build Shots feed JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"
  push:
    paths:
      - "scripts/shots-feed-to-json.py"
      - ".github/workflows/shots-feed.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Build shots-feed.json
        run: |
          python scripts/shots-feed-to-json.py

      - name: Commit JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/shots-feed.json
          git diff --cached --quiet || git commit -m "Update shots-feed.json"
          git push
