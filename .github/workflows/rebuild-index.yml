# =======================================================================
# NL Archive Index — Scheduled Rebuild
# Runs every 6 hours to pull new articles and any edits from the NL CMS.
# Commits changes to articles-index.json if the master has been modified.
#
# Manual trigger: Actions tab → "Rebuild article index" → Run workflow.
# Tick "force full rebuild" when triggering manually to rebuild from scratch.
#
# CHANGELOG
# v1.2 (19/04/2026)
#   - Bumped job timeout to 3 hours to safely accommodate full rebuild
#     with body fetching (rebuild-index.js v2.0 fetches ~10,735 bodies
#     at 500ms each = ~90 mins worst case).
# v1.1 (19/04/2026)
#   - git status --porcelain for new-file commit detection
# v1.0 (19/04/2026) — Initial
# =======================================================================

name: Rebuild article index

on:
  schedule:
    # Every 6 hours, on the hour (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: 'Force full rebuild (ignore existing index)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run rebuild script
        env:
          FORCE_FULL_REBUILD: ${{ github.event.inputs.force_full_rebuild || 'false' }}
        run: node scripts/rebuild-index.js

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain assets/data/articles-index.json)" ]; then
            echo "No changes to articles-index.json — skipping commit"
            exit 0
          fi

          git add assets/data/articles-index.json
          git commit -m "chore: update article index

          Automated rebuild at $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
