name: Debug club news (v0.3)

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Club domain to debug (must match clubs-meta.json domain)"
        required: true
        default: "theshots.co.uk"

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run debug (single domain)
        env:
          PYTHONUNBUFFERED: "1"
          DEBUG_DOMAIN: ${{ inputs.domain }}
        run: |
          mkdir -p debug-out
          python -u .github/workflows/debug-club-news.py

      - name: Upload debug artefacts
        uses: actions/upload-artifact@v4
        with:
          name: club-news-debug-${{ inputs.domain }}
          path: debug-out/
          if-no-files-found: error
