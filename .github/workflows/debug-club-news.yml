name: Debug club news fetch (v0.1)

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Club domain to debug (e.g. theshots.co.uk)"
        required: true
        default: "theshots.co.uk"

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Debug single club
        env:
          PYTHONUNBUFFERED: "1"
          DEBUG_DOMAIN: ${{ inputs.domain }}
        run: |
          python -u .github/workflows/debug-club-news.py
