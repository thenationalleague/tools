<!--
  Team of the Week Builder — NL Tools
  Version: 7.4
  Date: 17/04/2026
  File: /tools/graphics/totw/index.html

  CHANGELOG
  v7.4 (17/04/2026) — Fix tablet overflow
    - Raised the two-col → single-col breakpoint from 960px to 1100px.
      Below 1100px the lineup's 4-column grid doesn't fit alongside
      even a minimum-width preview; performance input was getting
      clipped. Below 1100px the preview goes above, controls below.
    - Adjusted lineup grid minimums: team select narrows to 150px
      (from 180px) and name input to 120px (from 140px), so the
      controls column works at slightly narrower desktop sizes if
      the two-col layout is in play.
    - Preview clamp() range narrowed to (400px, 40vw, 620px) —
      slightly smaller upper bound so it doesn't crowd the controls
      at mid-desktop widths around 1200-1400px.

  v7.3 (17/04/2026) — Responsive preview sizing + UI polish
    - LAYOUT: preview width now scales with viewport using clamp()
      instead of fixed 500px. Range 380px → 680px, targeting ~42vw.
      Keeps the preview feeling like a proportional partner to the
      controls column at desktop widths (~1400px+), without crushing
      the controls at tablet widths (~1050px).
    - The sticky preview position adjusted to also vertically centre
      within viewport so if the left column is very tall, the preview
      stays visible rather than hanging at top.
    - REMOVED: "Font: DIN NEXT LT PRO CONDENSED • ACTIVE" debug label.
      The fontStatus element itself is kept in the DOM (engine still
      writes to it on font-load) but hidden via display:none.
    - Status/footer row now single-field, left-aligned, less cluttered.

  v7.2 (17/04/2026) — Layout + export textarea fixes
    - FIX: preview was still rendering on LEFT in v7.1 despite intent.
      CSS grid was right, but DOM order had .previewWrap first so at
      desktop sizes it won the layout. Added `order: 2` on .previewWrap
      and `order: 1` on .panel at all sizes (not just mobile) so controls
      always take the left column regardless of DOM order.
    - UX: roundup + Excel output textareas are now hidden (display:none)
      but remain in the DOM. The engine still writes to their .value on
      every change, and Copy Roundup / Copy for Excel still read from
      them to populate the clipboard. Users never see them — less
      visual clutter — but no functional regression.
    - Label "Scorelines" moved to stay visible above the textarea at
      the section layout change.

  v7.1 (17/04/2026) — UX rebuild + background path fix
    - FIX: BG_URL path was wrong in v7.0. The background file lives at
      /tools/assets/backgrounds/ (shared assets folder) not inside
      /tools/graphics/assets/. Now references the canonical
      raw.githubusercontent.com URL to match crests + divisions pattern
      — fully consistent with the rest of the tools ecosystem.
    - LAYOUT REBUILD (desktop):
      - Preview moved to right column, capped at ~500px square
        (preview is a preview — the exported PNG is still 1080x1080
        regardless of preview size)
      - Controls + lineup now get primary left column — wider, denser,
        easier to fill in quickly
      - Layout stacks to single column below 960px (was 1100px) so
        tablets get the 2-col view they can accommodate
      - Preview is sticky on desktop — stays visible while editing
    - LAYOUT REBUILD (mobile):
      - Preview above, controls below (natural scroll pattern)
      - Lineup row collapses to single column stack so position
        label sits above the team/name/perf fields. Thin divider
        between logical rows (CSS :nth-child trick — no DOM changes
        needed because the engine appends flat siblings)
      - Control buttons drop to full-width below the selects on mobile
        so they don't overflow
    - DENSER LINEUP:
      - Row padding tightened, font-size 12.5px
      - Team select narrower (180px), name input narrower (150px min)
      - Perf details gets the remaining space as before
    - PREVIEW FRAME:
      - Moved overflow to canvas container so preview frame matches
        canvas aspect exactly — no more grey dead space

  v7.0 (17/04/2026) — Portal integration rebuild
    Shell (rebuilt):
      - Removed standalone app-header with hardcoded NL logo
      - Added standard NL portal topbar (72px red/navy, rose logo with
        onerror fallback, "TEAM OF THE WEEK / NL TOOLS GRAPHICS" title)
      - Added auth-guard under NL_TOOL_KEY = 'graphics' (same key as
        parent menu — access to graphics unlocks all sub-tools)
      - Added Firebase compat SDKs + config + initializeApp in <head>
        before auth-guard (per nl-tools skill §4 prerequisite stack)
      - Back button → /tools/graphics/ menu, Sign out button
      - All content wrapped in <div id="pageWrap" style="display:none">
    Styling (rebuilt):
      - GitHub-style palette replaced with NL brand navy/red/radius 6px
      - Typekit CSS @import replaced with direct carbona-variable
        font-face (matches nl-brand skill, faster, no Typekit flash)
      - Control buttons restyled: navy primary, outlined secondary
      - Lineup inputs tightened; preview frame uses --off-white tint
      - Textarea backgrounds + borders aligned to brand
      - Responsive: layout stacks below 900px instead of 980px
    Engine (preserved intact from v6.9):
      - All canvas rendering, formation logic, coordinate maths, drag/
        pan/zoom, pinch support, font detection, export, localStorage
        state management, Excel export — ALL kept byte-identical except
        the three URL swaps below
      - STORAGE_KEY kept as 'totw-builder-v6.9' so existing user layouts
        survive the upgrade (must not rename without data migration)
    URL swaps (engine):
      - ASSET_BASE: rckd-nl.github.io → raw.githubusercontent.com/
        thenationalleague/tools/refs/heads/main/assets (crests/divisions)
      - BG_URL: images.gc.nationalleagueservices.co.uk CMS image →
        ../assets/backgrounds/totw-pitch.jpg (self-hosted in tool folder)
      - VERSION bumped 6.9 → 7.0 (for PNG filename export)

  ASSET DEPENDENCIES
    Hosted in thenationalleague/tools repo:
      /assets/crests/{TeamName}.png         (72 files, already in place)
      /assets/divisions/National.png        (already in place)
      /assets/divisions/North.png           (already in place)
      /assets/divisions/South.png           (already in place)
    Tool-specific, must live at:
      /tools/graphics/assets/backgrounds/totw-pitch.jpg
    Adobe Typekit DIN condensed — loaded via use.typekit.net/gff4ipy.css
      (same as every other NL tool; fonts loaded via gff4ipy kit)
-->

  <style>
    /* ── Topbar (portal standard) ── */
    @media (max-width: 700px) {
      }

    /* ── Page ── */
    .page {
      /* max-width: inherited from nl-brand.css universal container */ margin: 0 auto;
      padding: 20px 20px 40px;
    }

    /* ── App layout: controls LEFT, preview RIGHT ─────────────────
       DOM has .previewWrap first, then .panel. CSS grid column
       assignment flips visual order. Right column sizes to preview's
       actual (clamp-based) width via min-content. ─────────────────── */
    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) min-content;
      gap: 20px;
      align-items: start;
    }
    .panel        { grid-column: 1; grid-row: 1; min-width: 0; }
    .previewWrap  { grid-column: 2; grid-row: 1; }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .previewWrap { grid-column: 1; grid-row: 1; }
      .panel       { grid-column: 1; grid-row: 2; }
    }

    /* ── Preview (right column, sticky, responsive width) ──────────
       width: clamp() scales fluidly between 380px and 680px based on
       ~42% of viewport. Matches proportions to the left column
       naturally at most desktop sizes. ──────────────────────────── */
    .previewWrap {
      position: sticky;
      top: 88px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--off-white);
      padding: 8px;
      box-shadow: var(--shadow);
      width: clamp(400px, 40vw, 620px);
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
      aspect-ratio: 1 / 1;
    }
    @media (max-width: 1100px) {
      .previewWrap {
        position: static;
        width: 100%;
        max-width: 520px;
        justify-self: center;
        margin: 0 auto;
      }
    }

    /* ── Panel ── */
    .panel {
      display: flex; flex-direction: column; gap: 14px;
      min-width: 0;
    }
    .box {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    /* ── Control bar ── */
    .controls {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    @media (max-width: 520px) {
      .controls { gap: 6px; }
      .controls button,
      .controls select,
      .controls input[type="date"] { font-size: 12px; padding: 7px 10px; }
    }
    .controls select,
    .controls input[type="date"] {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      font: inherit;
      color: var(--text);
      font-weight: 600; font-variation-settings: 'wght' 600;
      transition: border-color 0.12s;
    }
    .controls select:hover,
    .controls input[type="date"]:hover { border-color: var(--navy); }
    .controls select:focus,
    .controls input[type="date"]:focus {
      outline: 2px solid rgba(34,59,124,0.15);
      border-color: var(--navy);
    }
    .controls label {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; font-variation-settings: 'wght' 600;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* ── Buttons ── */
    .btn {
      padding: 8px 14px;
      border: 1px solid var(--navy);
      border-radius: var(--radius);
      background: var(--navy);
      color: var(--white);
      font: inherit;
      font-weight: 800; font-variation-settings: 'wght' 800;
      font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.12s;
      font-family: var(--font);
    }
    .btn:hover { background: var(--navy-mid); border-color: var(--navy-mid); }
    .btn--secondary {
      background: var(--white); color: var(--navy); border-color: var(--border);
    }
    .btn--secondary:hover { border-color: var(--navy); background: var(--off-white); }
    .btn--primary {
      background: var(--primary); border-color: var(--primary);
    }
    .btn--primary:hover { background: var(--primary-dim); border-color: var(--primary-dim); }

    /* Apply .btn styling to all control+box buttons for consistency */
    .controls button,
    .box button {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--navy);
      font: inherit;
      font-weight: 800; font-variation-settings: 'wght' 800;
      font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.12s;
      font-family: var(--font);
    }
    .controls button:hover,
    .box button:hover {
      background: var(--off-white);
      border-color: var(--navy);
    }
    /* Download = primary action, highlight it */
    #download {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }
    #download:hover {
      background: var(--primary-dim);
      border-color: var(--primary-dim);
    }

    /* ── Lineup grid ── */
    .lineup {
      display: grid;
      grid-template-columns: 48px 150px minmax(120px, 1fr) minmax(180px, 1.6fr);
      gap: 5px 8px;
      align-items: center;
    }
    .lineup .pos {
      font-weight: 800; font-variation-settings: 'wght' 800;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .lineup input,
    .lineup select {
      width: 100%;
      padding: 6px 9px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font: inherit;
      font-size: 12.5px;
      background: var(--white);
      color: var(--text);
      transition: border-color 0.12s;
      line-height: 1.35;
    }
    .lineup input:hover,
    .lineup select:hover { border-color: var(--navy); }
    .lineup input:focus,
    .lineup select:focus {
      outline: 2px solid rgba(34,59,124,0.15);
      border-color: var(--navy);
    }
    .lineup input.perf,
    .lineup input:not(.perf) {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Mobile: single column stack. The engine appends 4 flat elements per
       row (pos, team, name, perf) as grid siblings — so on mobile we
       collapse the grid to one column and add subtle spacing between
       logical rows using :nth-child(4n+1) as the first-cell marker. */
    @media (max-width: 720px) {
      .lineup {
        grid-template-columns: 1fr;
        gap: 3px;
      }
      .lineup .pos {
        text-align: left;
        padding: 8px 2px 2px;
        font-size: 10px;
      }
      /* Add a top border between logical rows (every 4 children = 1 row).
         :nth-child(4n+1) targets every pos cell EXCEPT the first */
      .lineup > *:nth-child(4n+1):not(:first-child) {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
    }

    /* ── Section with label + textarea ── */
    .section {
      display: flex; flex-direction: column; gap: 8px;
    }
    .section label {
      font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-muted);
    }
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font: inherit;
      font-size: 13px;
      line-height: 1.5;
      background: var(--white);
      color: var(--text);
      resize: vertical;
      font-family: var(--font);
      transition: border-color 0.12s;
    }
    textarea:hover { border-color: var(--navy); }
    textarea:focus {
      outline: 2px solid rgba(34,59,124,0.15);
      border-color: var(--navy);
    }
    textarea[readonly] {
      background: var(--off-white);
      color: var(--text-muted);
    }

    /* Hide readonly output textareas — kept in DOM for engine .value
       reads/writes but not shown to user. Copy buttons still work.
       Same pattern for the fontStatus debug label. */
    #exportOut,
    #excelOut,
    #fontStatus {

    /* ── Footer status (single-field, left-aligned) ── */
    footer {

      font-size: 11px;
      font-weight: 700; font-variation-settings: 'wght' 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 4px;
    }
  </style>

<!-- ────────────────────────────────────────────────────────────────────────
     TOTW ENGINE — preserved from v6.9 with three URL swaps only
     See changelog at top of file for detail on what changed.
     ──────────────────────────────────────────────────────────────────────── -->
<script>
(function(){
  "use strict";

  /* ================= CONFIG ================= */

  const VERSION = "v7.0";
  const STORAGE_KEY = "totw-builder-v6.9"; // Keep v6.9 key to preserve existing user layouts
  
  // Absolute (works no matter where this HTML file sits)
  const ASSET_BASE = "https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets";

  function assetUrl(relPath){
    // relPath example: "divisions/National.png" or "crests/Eastleigh.png"
    return encodeURI(`${ASSET_BASE}/${relPath}`);
  }

  function crestUrlForTeam(teamName){
    // teamName MUST match the filename (case, spaces, &, dashes) in assets/crests exactly
    return `${ASSET_BASE}/crests/${encodeURIComponent(teamName)}.png`;
  }

  const EXPORT_SIZE = 1080;
  const CREST_MAX = 100;

  // Names locked at 54px below crest centre
  const NAME_OFFSET = 66;

  // ===== NAME FONT (AUTO-DETECT FROM ADOBE KIT) =====
  const NAME_FONT_SIZE = 25;
  const NAME_COLOR = "#ffffff";

  // ===== PLATFORM TWEAKS =====
  // Canvas text tends to render slightly heavier on macOS (especially Safari).
  // Keep non-Mac identical (700), but lighten macOS to visually match.
  const IS_MAC = (() => {
    const p = (navigator.platform || "").toLowerCase();
    const ua = (navigator.userAgent || "").toLowerCase();
    const isAppleDevice = p.includes("mac") || ua.includes("mac os x");
    const isIOS = ua.includes("iphone") || ua.includes("ipad") || ua.includes("ipod");
    return isAppleDevice && !isIOS;
  })();

  const NAME_FONT_WEIGHT = IS_MAC ? 600 : 700;
  
  // Many Adobe kits do NOT expose "din-next-lt-pro-condensed" as the family name.
  // We'll try a sensible candidate list and pick the first that actually exists.
  const NAME_FONT_CANDIDATES = [
    "din-next-lt-pro-condensed",
    "DIN Next LT Pro Condensed",
    "din-next-lt-pro",
    "DIN Next LT Pro",
    "din-2014",
    "din-2014-narrow",
    "din-2014-condensed",
    "din-condensed",
    "din",
    "din-alternate"
  ];

  const NAME_FONT_FALLBACK_STACK = `"Arial Narrow",Arial,sans-serif`;
  const CANVAS_FALLBACK_STACK = NAME_FONT_FALLBACK_STACK;

  let nameFontFamily = ""; // set at runtime

  function getNameFontStack(){
    // If we haven't detected anything, we still return a valid stack.
    const lead = nameFontFamily ? `"${nameFontFamily}",` : "";
    return `${lead}${NAME_FONT_FALLBACK_STACK}`;
  }

  // Background + division badges
  const BG_URL = "https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/backgrounds/totw-pitch.jpg";

  function isFontActiveForCanvas(fontStack){
    const t = document.createElement("canvas");
    const c = t.getContext("2d");

    const sample = "DIN-WARMUP-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";

    c.font = `${NAME_FONT_WEIGHT} ${NAME_FONT_SIZE}px ${CANVAS_FALLBACK_STACK}`;
    const wFallback = c.measureText(sample).width;

    c.font = `${NAME_FONT_WEIGHT} ${NAME_FONT_SIZE}px ${fontStack}`;
    const wTest = c.measureText(sample).width;
    return Math.abs(wFallback - wTest) >= 2;
  }

  function applyWarmupFont(){
    const warm = document.getElementById("fontWarmup");
    if(!warm) return;
    warm.style.fontFamily = getNameFontStack();
    void warm.offsetWidth; // force layout
  }

  const DIV_BADGE = {
    National: assetUrl("divisions/National.png"),
    North:    assetUrl("divisions/North.png"),

  function screenToCanvas(e){

    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: cx * scaleX, y: cy * scaleY };
  }

  function drawContainedImage(c, img, centerX, centerY, maxW, maxH){
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if(!iw || !ih) return;

    const s = Math.min(maxW / iw, maxH / ih);
    const dw = iw * s;
    const dh = ih * s;
    const x = centerX - dw/2;
    const y = centerY - dh/2;

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(img, x, y, dw, dh);

    function clampViewport(){

    const scaled = EXPORT_SIZE * viewScale;

    const minPanX = EXPORT_SIZE - scaled; // negative when scale > 1

    const minPanY = EXPORT_SIZE - scaled;
    const maxPanY = 0;

    viewPanY = clamp(viewPanY, minPanY, maxPanY);
  }

  function clampPlayerOffset(formation, posKey, dx, dy){
    // Keep crest centre inside the export canvas (prevents dragging players off the graphic)
    const slots = getFormationPositions(formation);
    const base = slots.find(s => s.pos === posKey);
    if(!base) return { dx, dy };

    const half = CREST_MAX / 2;

    const x = base.x + dx;
    const y = base.y + dy;

    const clampedX = clamp(x, half, EXPORT_SIZE - half);
    const clampedY = clamp(y, half, EXPORT_SIZE - half);

    return { dx: clampedX - base.x, dy: clampedY - base.y };
  }

    function buildExcelTSV(opts){

    autosave();

  async function downloadPNG(){
    const out = document.createElement("canvas");
    out.width = EXPORT_SIZE;
    out.height = EXPORT_SIZE;
    const outCtx = out.getContext("2d");

    try{
      await renderTo(outCtx, false);
    }catch(e){
      console.error(e);
      setStatus("Export error (check image CORS)");
      return;
    }

    const blob = await new Promise(res => out.toBlob(res, "image/png"));
    if(!blob){
      setStatus("Export failed");
      return;
    }

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = buildFilename();
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);

    setStatus("Downloaded");
  }

    function getStoredPayload(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return {};
      const d = JSON.parse(raw);
      return (d && typeof d === "object") ? d : {};
    }catch{
      return {};
    }
  }

  function setStoredPayload(obj){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
    }catch{}
  }

  function deepClone(obj){
    try{ return JSON.parse(JSON.stringify(obj)); }catch{ return {}; }
  }

  function getCurrentDivisionSnapshot(){
    return {
      formation: formationSel.value,
      date: dateEl.value,
      scores: scoresEl.value,
      exportOut: exportOutEl.value,
      excelOut: excelOutEl.value,
      stateByPos: deepClone(stateByPos),
      offsetsByFormation: deepClone(offsetsByFormation),
      viewport: { viewScale, viewPanX, viewPanY }
    };
  }

  function applyDivisionSnapshot(snap){
    const s = (snap && typeof snap === "object") ? snap : {};

    // Formation + basic fields
    if(s.formation && FORMATIONS[s.formation]) formationSel.value = s.formation;

    if(typeof s.date === "string") dateEl.value = s.date;
    if(typeof s.scores === "string") scoresEl.value = s.scores;
    if(typeof s.exportOut === "string") exportOutEl.value = s.exportOut;
    if(typeof s.excelOut === "string") excelOutEl.value = s.excelOut;

    // Clear + replace objects in-place
    for(const k of Object.keys(stateByPos)) delete stateByPos[k];
    if(s.stateByPos && typeof s.stateByPos === "object"){
      for(const k of Object.keys(s.stateByPos)){
        stateByPos[k] = s.stateByPos[k];
      }
    }

    for(const f of Object.keys(offsetsByFormation)) delete offsetsByFormation[f];
    if(s.offsetsByFormation && typeof s.offsetsByFormation === "object"){
      for(const f of Object.keys(s.offsetsByFormation)){
        offsetsByFormation[f] = s.offsetsByFormation[f];
      }
    }

    // Viewport
    if(s.viewport && typeof s.viewport === "object"){
      if(typeof s.viewport.viewScale === "number") viewScale = clamp(s.viewport.viewScale, 1.0, 4.0);
      if(typeof s.viewport.viewPanX === "number") viewPanX = s.viewport.viewPanX;
      if(typeof s.viewport.viewPanY === "number") viewPanY = s.viewport.viewPanY;
    }else{
      viewScale = 1;
      viewPanX = 0;
      viewPanY = 0;
    }

    clampViewport();
  }

  function saveDivisionSnapshot(div){
    const payload = getStoredPayload();
    payload.v = VERSION;
    payload.lastDivision = div;

    payload.byDivision = (payload.byDivision && typeof payload.byDivision === "object") ? payload.byDivision : {};
    payload.byDivision[div] = getCurrentDivisionSnapshot();

    setStoredPayload(payload);
  }

  function loadDivisionSnapshotOrBlank(div){
    const payload = getStoredPayload();
    const by = (payload.byDivision && typeof payload.byDivision === "object") ? payload.byDivision : {};
    const snap = by[div];

    if(snap && typeof snap === "object"){
      applyDivisionSnapshot(snap);
      return;
    }

    // Blank defaults for a division with no saved state yet
    formationSel.value = "4-3-3";
    scoresEl.value = "";
    exportOutEl.value = "";
    excelOutEl.value = "";

    for(const k of Object.keys(stateByPos)) delete stateByPos[k];
    for(const f of Object.keys(offsetsByFormation)) delete offsetsByFormation[f];

    viewScale = 1;
    viewPanX = 0;
    viewPanY = 0;

    clampViewport();
  }
  
  /* ================= AUTOSAVE ================= */

  function autosave(){
    // Always save into the currently selected division bucket
    saveDivisionSnapshot(divisionSel.value);
  }
  
  function autoload(){
    try{
      const d = getStoredPayload();
      if(!d || typeof d !== "object") return;

      // Restore last-used division if present
      const lastDiv = (typeof d.lastDivision === "string" && DIV_BADGE[d.lastDivision]) ? d.lastDivision : "";
      if(lastDiv) divisionSel.value = lastDiv;

      // Load the snapshot for the currently-selected division (or blank)
      loadDivisionSnapshotOrBlank(divisionSel.value);
    }catch{}
  }
  
  /* ================= INTERACTION ================= */

    function resetAll(){
    // Clear saved state
    try{ localStorage.removeItem(STORAGE_KEY); }catch{}

    // Reset top-level controls
    formationSel.value = "4-3-3";
    divisionSel.value = "National";

    // Reset date to today
    dateEl.value = "";
    setDefaultDateIfBlank();

    // Clear text areas
    scoresEl.value = "";
    exportOutEl.value = "";
    excelOutEl.value = "";

    // Clear lineup + manual offsets
    for(const k of Object.keys(stateByPos)) delete stateByPos[k];
    for(const f of Object.keys(offsetsByFormation)) delete offsetsByFormation[f];

    // Reset viewport
    viewScale = 1;
    viewPanX = 0;
    viewPanY = 0;

    // Division badge depends on division
    divBadgeImg = null;

    rebuildLineup();
    autosave();
    scheduleRender();
    scheduleOutputs();
    setStatus("Reset all");
  }

  function resetViewport(){
    viewScale = 1;
    viewPanX = 0;
    viewPanY = 0;
    clampViewport();
    autosave();
    scheduleRender();
  }

  function hitTestPlayer(worldPt){
    const formation = formationSel.value;
    const slots = getFormationPositions(formation);

    for(let i = slots.length - 1; i >= 0; i--){
      const slot = slots[i];
      const off = getOffset(formation, slot.pos);
      const cx = slot.x + (off.dx||0);
      const cy = slot.y + (off.dy||0);

      const half = CREST_MAX/2 + 6;
      if(worldPt.x >= cx - half && worldPt.x <= cx + half && worldPt.y >= cy - half && worldPt.y <= cy + half){
        return slot.pos;
      }
    }
    return null;
  }

  function onPointerDown(e){
    const pt = screenToCanvas(e);
    const world = canvasToWorld(pt);

    isDragging = true;
    dragStart = { x: world.x, y: world.y };
    dragStartPan = { x: viewPanX, y: viewPanY };

    if(manualMoveEl.checked){
      const hit = hitTestPlayer(world);
      if(hit){
        dragMode = "player";
        dragPosKey = hit;
        const off = getOffset(formationSel.value, hit);
        dragStartOffset = { dx: off.dx || 0, dy: off.dy || 0 };
      }else{
        dragMode = "pan";
        dragPosKey = null;
      }
    }else{
      dragMode = "pan";
      dragPosKey = null;
    }

    e.preventDefault();
  }

  function onPointerMove(e){
    if(!isDragging) return;
    const pt = screenToCanvas(e);
    const world = canvasToWorld(pt);

    const dx = world.x - dragStart.x;
    const dy = world.y - dragStart.y;

    if(dragMode === "pan"){
      viewPanX = dragStartPan.x + dx * viewScale;
      viewPanY = dragStartPan.y + dy * viewScale;
      clampViewport();
      autosave();
      scheduleRender();
    }else if(dragMode === "player" && dragPosKey){
      const formation = formationSel.value;
      const next = clampPlayerOffset(
        formation,
        dragPosKey,
        dragStartOffset.dx + dx,
        dragStartOffset.dy + dy
      );
      setOffset(formation, dragPosKey, next.dx, next.dy);
      autosave();
      scheduleRender();
    }

    e.preventDefault();
  }

  function onPointerUp(){
    isDragging = false;
    dragMode = "pan";
    dragPosKey = null;
  }

  function onWheel(e){
    e.preventDefault();

    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const cy = (e.clientY - rect.top) * (canvas.height / rect.height);

    const worldBefore = canvasToWorld({x:cx, y:cy});

    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    viewScale = clamp(viewScale * factor, 1.0, 4.0);
    
    const canvasAfter = worldToCanvas(worldBefore);
    viewPanX += (cx - canvasAfter.x);
    viewPanY += (cy - canvasAfter.y);

      clampViewport();
      autosave();
    scheduleRender();
  }

  function onTouchStart(e){
    if(e.touches && e.touches.length === 2){
      lastPinchDist = pinchDistance(e.touches[0], e.touches[1]);
    }else{
      onPointerDown(e);
    }
  }

  function onTouchMove(e){
    if(e.touches && e.touches.length === 2){
      e.preventDefault();

      const d = pinchDistance(e.touches[0], e.touches[1]);
      if(lastPinchDist){
        const rect = canvas.getBoundingClientRect();
        const midClientX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midClientY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

        const cx = (midClientX - rect.left) * (canvas.width / rect.width);
        const cy = (midClientY - rect.top) * (canvas.height / rect.height);

        const worldBefore = canvasToWorld({x:cx, y:cy});

        const factor = d / lastPinchDist;
        viewScale = clamp(viewScale * factor, 1.0, 4.0);
        const canvasAfter = worldToCanvas(worldBefore);
        viewPanX += (cx - canvasAfter.x);
        viewPanY += (cy - canvasAfter.y);

      clampViewport();
      autosave();
        scheduleRender();
      }
      lastPinchDist = d;
    }else{
      onPointerMove(e);
    }
  }

  function onTouchEnd(){
    lastPinchDist = 0;
    onPointerUp();
  }

  /* ================= INIT ================= */

  function setDefaultDateIfBlank(){
    if(dateEl.value) return;
    const now = new Date();
    const y = now.getFullYear();
    const m = pad2(now.getMonth()+1);
    const d = pad2(now.getDate());
    dateEl.value = `${y}-${m}-${d}`;
  }

  function bindUI(){
    formationSel.addEventListener("change", ()=>{
      rebuildLineup();
      autosave();
      scheduleRender();
      scheduleOutputs();
    });

    divisionSel.addEventListener("change", async ()=>{
      // Save what you were editing for the previous division
      const prev = divisionSel._prevDivision || "National";
      saveDivisionSnapshot(prev);

      // Load the newly-selected division snapshot (or blank)
      loadDivisionSnapshotOrBlank(divisionSel.value);

      // Badge depends on division
      divBadgeImg = null;

      // Track current for next switch
      divisionSel._prevDivision = divisionSel.value;

      rebuildLineup();
      autosave();
      scheduleRender();
      scheduleOutputs();
    });
    
    dateEl.addEventListener("input", ()=>{
      autosave();
      scheduleOutputs();
    });

    scoresEl.addEventListener("input", ()=>{
      autosave();
      scheduleOutputs();
    });

    zoomResetBtn.addEventListener("click", resetViewport);

    resetPositionsBtn.addEventListener("click", ()=>{
      resetOffsetsForFormation(formationSel.value);
      autosave();
      scheduleRender();
      setStatus("Positions reset");
    });

    downloadBtn.addEventListener("click", downloadPNG);
    copyExportBtn.addEventListener("click", copyExportText);
    copyExcelBtn.addEventListener("click", copyExcelTSV);
    resetAllBtn.addEventListener("click", resetAll);

    // Preview interactions
    canvas.addEventListener("wheel", onWheel, {passive:false});
    canvas.addEventListener("mousedown", onPointerDown);
    window.addEventListener("mousemove", onPointerMove);
    window.addEventListener("mouseup", onPointerUp);

    canvas.addEventListener("touchstart", onTouchStart, {passive:false});
    canvas.addEventListener("touchmove", onTouchMove, {passive:false});
    window.addEventListener("touchend", onTouchEnd, {passive:true});

    // Lineup: Tab goes down columns (team → name → performance)
    lineupEl.addEventListener("keydown", (e)=>{
      if(e.key !== "Tab") return;

      const active = document.activeElement;
      if(!lineupTabIndexMap.has(active)) return;

      e.preventDefault();

      const idx = lineupTabIndexMap.get(active);
      const dir = e.shiftKey ? -1 : 1;
      const nextIdx = idx + dir;

      if(nextIdx < 0 || nextIdx >= lineupTabOrder.length){
        if(!e.shiftKey){
          scoresEl.focus();
        }else{
          dateEl.focus();
        }
        return;
      }

      lineupTabOrder[nextIdx].focus();
    });
  }

  async function start(){
    setDefaultDateIfBlank();
    autoload();
    divisionSel._prevDivision = divisionSel.value;
    rebuildLineup();
    bindUI();
    scheduleOutputs();
    
    try{
      // Make sure the Adobe font is genuinely active before the very first canvas draw (mobile Safari fix)
      await ensureNameFontLoaded();

      await ensureBaseImages();

      // Prime canvas text engine AFTER we know which family we’re using
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      await new Promise(r => setTimeout(r, 120));

      ctx.save();
      ctx.font = `${NAME_FONT_WEIGHT} ${NAME_FONT_SIZE}px ${getNameFontStack()}`;
      ctx.measureText("DIN-WARMUP");
      ctx.restore();

      refreshFontStatus();

      await renderTo(ctx, true);
      await renderTo(ctx, true);

      setStatus("Loaded");
    }catch(e){
      console.error(e);
      setStatus("Image load error (CORS?)");
    }
  }

  start();

})();
</script>
