<!DOCTYPE html>
<html lang="en">
<!--
  Meetings Tool — NL Tools Portal
  Demo / mockup. No Firebase. All data in-memory.
  v1.0  23/04/2026  Initial demo
  v1.1  23/04/2026  Live modal
  v1.2  23/04/2026  Notes token, perspective switcher
  v1.3  23/04/2026  Clean rebuild attempt
  v1.4  23/04/2026  Simplified — agenda, scratchpad, general note, minutes only
-->
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meetings — NL Tools</title>
<style>
@font-face{font-family:"carbona-variable";src:url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");font-display:swap;font-style:normal;font-weight:200 900}
:root{
  --primary:#9e0000;--primary-dim:#7a0000;
  --navy:#223b7c;--navy-mid:#1a2f63;
  --green:#1e7e34;--green-light:#edf7ee;
  --amber:#e67e22;--amber-light:#fef6ec;
  --info:#3b82f6;--info-light:#eef2ff;
  --red:#c0392b;--red-light:#fdf0ef;
  --white:#fff;--off-white:#f4f6f9;
  --text:#1a2a44;--muted:#5a6a82;--border:#dde3ed;
  --radius:6px;--shadow:0 2px 12px rgba(10,22,40,.1);--shadow-lg:0 8px 32px rgba(10,22,40,.18);
  --font:'carbona-variable','carbona',sans-serif
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);font-size:clamp(14px,.7vw+11px,17px);line-height:1.5;font-variation-settings:'wght' 400;color:var(--text);background:var(--off-white);-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{height:54px;background:var(--primary);border-bottom:3px solid var(--navy);display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
.topbar img{height:30px}
.topbar__div{width:1px;height:24px;background:rgba(255,255,255,.3)}
.topbar__kicker{font-size:11px;font-variation-settings:'wght' 700;color:rgba(255,255,255,.7);letter-spacing:.06em;text-transform:uppercase}
.topbar__title{font-size:15px;font-variation-settings:'wght' 800;color:#fff}
.topbar__spacer{flex:1}
.topbar__av{width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-variation-settings:'wght' 700}

/* LIVE BANNER */
.live-banner{display:none;background:var(--navy);padding:0 20px;height:38px;align-items:center;gap:12px;position:sticky;top:54px;z-index:99;cursor:pointer}
.live-banner:hover{background:var(--navy-mid)}
.live-banner.on{display:flex}
.lb-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 1.4s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lb-text{font-size:13px;font-variation-settings:'wght' 700;color:#fff;flex:1}
.lb-cta{font-size:12px;font-variation-settings:'wght' 700;color:rgba(255,255,255,.8);padding:3px 12px;border:1px solid rgba(255,255,255,.3);border-radius:20px}

/* SHELL */
.shell{display:flex;height:calc(100vh - 54px);overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sb-label{font-size:10px;font-variation-settings:'wght' 800;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:14px 16px 5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-left:3px solid transparent;transition:background .1s}
.sb-item:hover{background:var(--off-white);color:var(--text)}
.sb-item.active{color:var(--text);background:var(--off-white);border-left-color:var(--primary);font-variation-settings:'wght' 600}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ph{background:var(--white);border-bottom:1px solid var(--border);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ph h1{font-size:17px;font-variation-settings:'wght' 800}
.pb{flex:1;overflow-y:auto;padding:18px 22px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-family:var(--font);font-size:13px;font-variation-settings:'wght' 700;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);color:var(--text);cursor:pointer;white-space:nowrap;transition:background .1s}
.btn:hover{background:var(--off-white)}
.btn-p{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-p:hover{background:var(--primary-dim);border-color:var(--primary-dim)}
.btn-n{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-n:hover{background:var(--navy-mid)}
.btn-g{background:transparent;border-color:transparent;color:var(--muted)}
.btn-g:hover{background:var(--off-white);color:var(--text)}
.btn-sm{padding:5px 11px;font-size:12px}

/* PILLS */
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-variation-settings:'wght' 700}
.p-upcoming{background:var(--info-light);color:var(--info)}
.p-live{background:#dcfce7;color:#166534}
.p-done{background:var(--green-light);color:var(--green)}
.p-owner{background:#f0e8e8;color:var(--primary)}
.p-part{background:var(--off-white);color:var(--muted)}
.p-open{background:var(--info-light);color:var(--info)}
.p-waiting{background:var(--amber-light);color:var(--amber)}

/* MEETING LIST */
.mcard{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.mcard:hover{border-color:#b0b8cc;box-shadow:var(--shadow)}
.mcard__dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.mcard__body{flex:1;min-width:0}
.mcard__title{font-size:14px;font-variation-settings:'wght' 700}
.mcard__meta{font-size:12px;color:var(--muted);margin-top:3px}
.mcard__right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}

/* DETAIL */
.detail-title{font-size:20px;font-variation-settings:'wght' 900;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.detail-meta{font-size:13px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.detail-acts{display:flex;gap:8px;align-items:center;margin-bottom:22px}

/* SECTION BLOCKS */
.section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.section__hdr{padding:11px 16px;background:var(--off-white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section__label{font-size:11px;font-variation-settings:'wght' 800;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
.section__body{padding:14px 16px}

/* AGENDA ITEMS */
.ag-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.ag-item:last-child{border-bottom:none}
.ag-num{width:22px;height:22px;border-radius:50%;background:var(--border);color:var(--muted);font-size:11px;font-variation-settings:'wght' 800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ag-title{flex:1;font-size:13px;font-variation-settings:'wght' 600;color:var(--text)}
.ag-time{font-size:12px;color:var(--muted)}

/* SCRATCHPAD */
.scratchpad{width:100%;font-family:'Courier New',Courier,monospace;font-size:13px;line-height:1.95;color:var(--text);background:#faf8f0;border:1px dashed #c8c4b0;border-radius:var(--radius);padding:12px 14px;resize:vertical;outline:none;min-height:160px;background-image:repeating-linear-gradient(transparent,transparent 28px,#e4e0d0 28px,#e4e0d0 29px);transition:border-color .12s}
.scratchpad:focus{border-color:#a0987a;background:#fffdf5}
.scratchpad::placeholder{color:#b0a880;font-style:italic}
.share-bar{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#fffbf0;border:1px solid #e0d8b0;border-top:none;border-radius:0 0 var(--radius) var(--radius);font-size:12px;color:var(--muted)}
.share-bar label{cursor:pointer;flex:1}
.share-note{font-size:11px;font-variation-settings:'wght' 700;color:var(--amber);opacity:0;transition:opacity .2s;white-space:nowrap}

/* GENERAL NOTE textarea */
.gen-note{width:100%;font-family:var(--font);font-size:13px;font-variation-settings:'wght' 400;line-height:1.7;color:var(--text);background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;resize:vertical;outline:none;min-height:80px}
.gen-note:focus{border-color:var(--navy)}
.gen-note::placeholder{color:var(--muted)}

/* MINUTES */
.minutes-body{font-size:14px;line-height:1.75;color:var(--text)}
.minutes-body p{margin-bottom:10px}
.minutes-body p:last-child{margin-bottom:0}

/* ACTION ROWS */
.arow{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.acheck{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--border);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:background .1s}
.acheck.done{background:var(--green);border-color:var(--green)}
.acheck.waiting{background:var(--amber);border-color:var(--amber)}
.arow__body{flex:1;min-width:0}
.arow__title{font-size:13px}
.arow__title.done{text-decoration:line-through;color:var(--muted)}
.arow__meta{font-size:11px;color:var(--muted);margin-top:3px}
.arow__right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* FILTER CHIPS */
.frow{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.chip{font-size:12px;font-variation-settings:'wght' 600;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:all .12s}
.chip:hover{border-color:#b0b8cc;color:var(--text)}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 15px}
.stat__n{font-size:26px;font-variation-settings:'wght' 900;line-height:1}
.stat__l{font-size:11px;font-variation-settings:'wght' 800;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}

/* CALENDAR */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-lbl{font-size:11px;font-variation-settings:'wght' 700;color:var(--muted);text-align:center;padding:4px 0}
.cal-cell{font-size:12px;text-align:center;padding:5px 2px;border-radius:4px;cursor:pointer;color:var(--muted);position:relative;min-height:30px}
.cal-cell:hover{background:var(--off-white)}
.cal-cell.today{font-variation-settings:'wght' 800;color:var(--text);background:var(--off-white)}
.cal-cell.has::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--primary)}

/* CONTACTS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.ccard{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:border-color .12s}
.ccard:hover{border-color:#b0b8cc}
.cav{width:36px;height:36px;border-radius:50%;background:var(--info-light);color:var(--info);font-size:12px;font-variation-settings:'wght' 800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cname{font-size:13px;font-variation-settings:'wght' 700}
.corg{font-size:12px;color:var(--muted)}
.cemail{font-size:11px;color:var(--muted);margin-top:2px;word-break:break-all}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:var(--radius);font-family:var(--font);font-size:13px;font-variation-settings:'wght' 600;color:#fff;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.info{background:var(--navy)}

/* LIVE MODAL */
.backdrop{display:none;position:fixed;inset:0;background:rgba(10,20,40,.6);z-index:200;align-items:stretch;justify-content:center}
.backdrop.open{display:flex}
.modal{display:flex;flex-direction:column;width:100%;max-width:1000px;margin:14px;background:var(--white);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-lg)}
.modal-hdr{background:var(--navy);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.modal-hdr__dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.modal-hdr__title{font-size:15px;font-variation-settings:'wght' 800;color:#fff;flex:1}
.modal-hdr__meta{font-size:12px;color:rgba(255,255,255,.6)}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border-radius:20px;padding:3px 10px;font-size:11px;font-variation-settings:'wght' 700;color:#fff}
.live-pill__dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 1.4s infinite}
.modal-body{display:flex;flex:1;overflow:hidden;min-height:0}

/* Modal left — agenda */
.modal-agenda{width:240px;min-width:240px;border-right:1px solid var(--border);background:var(--off-white);display:flex;flex-direction:column;overflow-y:auto}
.ma-label{font-size:10px;font-variation-settings:'wght' 800;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:13px 15px 5px}
.ma-item{display:flex;align-items:flex-start;gap:9px;padding:9px 15px;cursor:pointer;border-left:3px solid transparent;transition:background .1s}
.ma-item:hover{background:#eceef3}
.ma-item.active{background:var(--white);border-left-color:var(--primary)}
.ma-item__num{width:20px;height:20px;border-radius:50%;background:var(--border);color:var(--muted);font-size:10px;font-variation-settings:'wght' 800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ma-item.active .ma-item__num{background:var(--primary);color:#fff}
.ma-item__title{font-size:13px;font-variation-settings:'wght' 600;color:var(--text)}
.ma-item__time{font-size:11px;color:var(--muted);margin-top:2px}

/* Modal right — scratchpad */
.modal-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.modal-right__hdr{padding:13px 18px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-right__title{font-size:15px;font-variation-settings:'wght' 800;margin-bottom:3px}
.modal-right__meta{font-size:12px;color:var(--muted)}
.modal-right__body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.modal-right__footer{padding:11px 18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--white)}
.prog{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.prog-bar{width:90px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}

.sp-label{font-size:10px;font-variation-settings:'wght' 800;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
</style>
</head>
<body>

<div class="topbar">
  <img src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png" alt="NL" onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
  <div class="topbar__div"></div>
  <span class="topbar__kicker">NL Tools</span>
  <div class="topbar__div"></div>
  <span class="topbar__title">Meetings</span>
  <div class="topbar__spacer"></div>
  <div class="topbar__av">RB</div>
</div>

<div class="live-banner" id="liveBanner" onclick="reopenModal()">
  <div class="lb-dot"></div>
  <div class="lb-text" id="liveBannerText"></div>
  <div class="lb-cta">Return to meeting →</div>
</div>

<div class="shell">
  <nav class="sidebar">
    <div class="sb-label">Views</div>
    <div class="sb-item active" onclick="switchView('meetings',this)">☰&nbsp; All meetings</div>
    <div class="sb-item" onclick="switchView('actions',this)">◎&nbsp; My actions</div>
    <div class="sb-item" onclick="switchView('calendar',this)">▦&nbsp; Calendar</div>
    <div class="sb-item" onclick="switchView('contacts',this)">✉&nbsp; Contacts</div>
    <div class="sb-label">Projects</div>
    <div class="sb-item ap" onclick="filterProj('all',this)" style="color:var(--text)"><span class="pdot" style="background:#888"></span> All projects</div>
    <div class="sb-item" onclick="filterProj('Two Circles',this)"><span class="pdot" style="background:#185FA5"></span> Two Circles</div>
    <div class="sb-item" onclick="filterProj('EFL',this)"><span class="pdot" style="background:#3B6D11"></span> EFL</div>
    <div class="sb-item" onclick="filterProj('Board',this)"><span class="pdot" style="background:#9e0000"></span> Board</div>
    <div class="sb-item" onclick="filterProj('Internal Ops',this)"><span class="pdot" style="background:#854F0B"></span> Internal Ops</div>
  </nav>
  <div class="main">
    <div class="ph"><h1 id="pageTitle">All meetings</h1><button class="btn btn-p btn-sm" onclick="toast('New meeting form — coming in full build','info')">+ New meeting</button></div>
    <div class="pb" id="pb"></div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<!-- LIVE MODAL -->
<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-hdr__dot" id="mDot"></div>
      <div class="modal-hdr__title" id="mTitle"></div>
      <div class="modal-hdr__meta" id="mMeta"></div>
      <div class="live-pill"><div class="live-pill__dot"></div> Live</div>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.2);margin-left:8px" id="mEndBtn" onclick="endMeeting()">✕ End</button>
    </div>
    <div class="modal-body">
      <div class="modal-agenda">
        <div class="ma-label">Agenda</div>
        <div id="maList"></div>
      </div>
      <div class="modal-right">
        <div class="modal-right__hdr">
          <div class="modal-right__title" id="mRightTitle">Scratchpad</div>
          <div class="modal-right__meta" id="mRightMeta">Your private notes for this meeting</div>
        </div>
        <div class="modal-right__body" id="mRightBody"></div>
        <div class="modal-right__footer">
          <div class="prog">
            <span id="mProgTxt">Agenda</span>
            <div class="prog-bar"><div class="prog-fill" id="mProgFill" style="width:0%"></div></div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm btn-g" onclick="mPrev()">← Prev</button>
            <button class="btn btn-sm btn-n" onclick="mNext()">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var PROJ={'Two Circles':'#185FA5','EFL':'#3B6D11','Board':'#9e0000','Internal Ops':'#854F0B'};
var ME='rb';

var meetings=[
  {id:1,title:'Q2 Strategy Review',project:'Two Circles',date:'22/04/2026',owner:'rb',ownerName:'Richard Browning',attendees:['Sarah Holt','Mike Byrne'],phase:'after',
   generalNote:'Quarterly review with Two Circles. Standing agenda covers campaign performance, season planning, and commercial.',
   scratchpad:{rb:'Good meeting — Sarah seemed stretched on resource. Worth a separate call before the contract renewal.\n\nCTR numbers are solid but need to understand why club content isn\'t converting.'},
   sharedScratchpads:{},
   agenda:[{title:'Campaign performance review',time:'15 min'},{title:'Season 25/26 planning',time:'20 min'},{title:'Contract renewal discussion',time:'10 min'}]},
  {id:2,title:'Broadcast Rights Update',project:'EFL',date:'18/04/2026',owner:'rb',ownerName:'Richard Browning',attendees:['James Whitfield'],phase:'during',
   generalNote:'',scratchpad:{},sharedScratchpads:{},
   agenda:[{title:'Current rights position',time:'10 min'},{title:'Package 3 negotiations',time:'30 min'},{title:'NL exposure commitments',time:'15 min'}]},
  {id:3,title:'April Board Pack Review',project:'Board',date:'02/05/2026',owner:'ps',ownerName:'Phil Sherwood',attendees:['Richard Browning','Michaela Dean'],phase:'upcoming',
   generalNote:'Monthly board prep. Phil chairs. Richard presents digital section.',

function toast(msg,type){

  setTimeout(function(){t.classList.remove('show');},3000);

function updateBanner(){

}

function switchView(v,el){
  curView=v;curMeeting=null;
  var titles={meetings:'All meetings',actions:'My actions',calendar:'Calendar',contacts:'Contacts'};
  document.getElementById('pageTitle').textContent=titles[v];
  document.querySelectorAll('.sb-item[onclick*="switchView"]').forEach(function(n){n.classList.remove('active');});
  if(el)el.classList.add('active');
  var b=document.getElementById('pb');b.innerHTML='';
  if(v==='meetings')renderList(b);
  if(v==='actions')renderActions(b);
  if(v==='calendar')renderCalendar(b);
  if(v==='contacts')renderContacts(b);
}

function filterProj(p,el){
  curProj=p;curMeeting=null;
  document.querySelectorAll('.ap').forEach(function(n){n.classList.remove('ap');});
  if(el)el.classList.add('ap');
  document.getElementById('pageTitle').textContent=p==='all'?'All meetings':p;
  var b=document.getElementById('pb');b.innerHTML='';

}

/* ── MEETING LIST ── */
function renderList(c){
  var list=curProj==='all'?meetings:meetings.filter(function(m){return m.project===curProj;});
  if(!list.length){var e=document.createElement('div');e.className='empty';e.innerHTML='<div style="font-size:28px;margin-bottom:8px">📋</div><p>No meetings here yet.</p>';c.appendChild(e);return;}
  list.forEach(function(m){
    var isOwner=m.owner===ME;
    var isLive=liveMtg&&liveMtg.id===m.id;
    var card=document.createElement('div');card.className='mcard';
    var dot=document.createElement('div');dot.className='mcard__dot';dot.style.background=PROJ[m.project]||'#888';card.appendChild(dot);
    var body=document.createElement('div');body.className='mcard__body';
    var title=document.createElement('div');title.className='mcard__title';title.textContent=m.title;
    var meta=document.createElement('div');meta.className='mcard__meta';
    meta.textContent=m.date+' · '+m.project+' · '+(isOwner?'You (owner)':m.ownerName+' (owner)');
    body.appendChild(title);body.appendChild(meta);card.appendChild(body);
    var right=document.createElement('div');right.className='mcard__right';
    var pp=document.createElement('span');
    if(isLive){pp.className='pill p-live';pp.innerHTML='<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#166534;margin-right:4px;animation:pulse 1.4s infinite"></span>Live now';}
    else if(m.phase==='upcoming'){pp.className='pill p-upcoming';pp.textContent='Upcoming';}
    else if(m.phase==='during'){pp.className='pill p-upcoming';pp.textContent='In progress';}
    else{pp.className='pill p-done';pp.textContent='Complete';}
    var rp=document.createElement('span');rp.className='pill '+(isOwner?'p-owner':'p-part');rp.textContent=isOwner?'Owner':'Participant';
    right.appendChild(pp);right.appendChild(rp);card.appendChild(right);
    card.onclick=function(){openDetail(m);};

  });
}

/* ── MEETING DETAIL ── */
function openDetail(m){
  curMeeting=m;
  var isOwner=m.owner===ME;
  var isLive=liveMtg&&liveMtg.id===m.id;
  var canStart=m.phase!=='after';
  var pb=document.getElementById('pb');pb.innerHTML='';
  document.getElementById('pageTitle').textContent=m.title;

  var back=document.createElement('button');back.className='btn btn-g btn-sm';back.style.marginBottom='14px';back.textContent='← All meetings';
  back.onclick=function(){curMeeting=null;document.getElementById('pageTitle').textContent='All meetings';pb.innerHTML='';renderList(pb);};
  pb.appendChild(back);

  // Title + meta
  var tr=document.createElement('div');tr.className='detail-title';
  var tdot=document.createElement('span');tdot.className='pdot';tdot.style.cssText='width:12px;height:12px;background:'+(PROJ[m.project]||'#888');

  var meta=document.createElement('div');meta.className='detail-meta';
  meta.innerHTML='<span>📅 '+m.date+'</span><span>🏷 '+m.project+'</span><span>👥 '+(isOwner?'You & '+m.attendees.join(', '):m.ownerName+', '+m.attendees.join(', '))+'</span>';
  pb.appendChild(meta);

  // Action buttons
  var acts=document.createElement('div');acts.className='detail-acts';
  if(isLive){
    var rb=document.createElement('button');rb.className='btn btn-p btn-sm';rb.innerHTML='● Return to live meeting';rb.onclick=function(){openModal(m,false);};acts.appendChild(rb);
  } else if(canStart){
    var sb=document.createElement('button');sb.className='btn btn-p btn-sm';sb.innerHTML='▶ Start meeting';sb.onclick=function(){openModal(m,true);};acts.appendChild(sb);
  }
  pb.appendChild(acts);

  // ── SECTION 1: Agenda ──
  var agSec=document.createElement('div');agSec.className='section';
  var agHdr=document.createElement('div');agHdr.className='section__hdr';
  var agLbl=document.createElement('div');agLbl.className='section__label';agLbl.textContent='Agenda';
  agHdr.appendChild(agLbl);agSec.appendChild(agHdr);
  var agBody=document.createElement('div');agBody.className='section__body';

  // General note
  if(m.generalNote||isOwner){
    var gnWrap=document.createElement('div');gnWrap.style.marginBottom='14px';
    var gnLbl=document.createElement('div');gnLbl.style.cssText='font-size:10px;font-variation-settings:"wght" 800;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px';gnLbl.textContent='General note';
    gnWrap.appendChild(gnLbl);
    if(isOwner){
      var gnTa=document.createElement('textarea');gnTa.className='gen-note';gnTa.placeholder='Add context, standing notes, or an intro for this meeting…';gnTa.value=m.generalNote||'';gnTa.oninput=function(){m.generalNote=gnTa.value;};
      gnWrap.appendChild(gnTa);
    } else {
      var gnTxt=document.createElement('div');gnTxt.style.cssText='font-size:13px;color:var(--text);line-height:1.65;padding:8px 0';gnTxt.textContent=m.generalNote||'No general note.';gnWrap.appendChild(gnTxt);
    }
    agBody.appendChild(gnWrap);
    var divider=document.createElement('div');divider.style.cssText='border-top:1px solid var(--border);margin-bottom:12px';agBody.appendChild(divider);
  }

  // Agenda items
  m.agenda.forEach(function(a,i){
    var item=document.createElement('div');item.className='ag-item';
    var num=document.createElement('div');num.className='ag-num';num.textContent=i+1;
    var title=document.createElement('div');title.className='ag-title';title.textContent=a.title;
    var time=document.createElement('div');time.className='ag-time';time.textContent=a.time;
    item.appendChild(num);item.appendChild(title);item.appendChild(time);
    agBody.appendChild(item);
  });
  agSec.appendChild(agBody);
  pb.appendChild(agSec);

  // ── SECTION 2: Scratchpad (only if live or past) ──
  if(m.phase==='during'||m.phase==='after'||isLive){
    var spSec=document.createElement('div');spSec.className='section';
    var spHdr=document.createElement('div');spHdr.className='section__hdr';
    var spLbl=document.createElement('div');spLbl.className='section__label';spLbl.textContent='Scratchpad — private';
    spHdr.appendChild(spLbl);
    if(isLive){var spLivePill=document.createElement('span');spLivePill.className='pill p-live';spLivePill.style.fontSize='10px';spLivePill.textContent='Live';spHdr.appendChild(spLivePill);}
    spSec.appendChild(spHdr);
    var spBody=document.createElement('div');spBody.className='section__body';spBody.style.padding='0';

    if(isLive){
      var spNote=document.createElement('div');spNote.style.cssText='padding:10px 16px 0;font-size:12px;color:var(--muted)';spNote.textContent='Your scratchpad is open in the live meeting modal — notes auto-saved.';spBody.appendChild(spNote);
    }

    var spTa=document.createElement('textarea');spTa.className='scratchpad';
    spTa.style.cssText='border-radius:0;border-left:none;border-right:none;border-bottom:none'+(m.phase==='after'?';border-top:none':'');
    spTa.placeholder='Your private notes for this meeting — nobody else can see these unless you choose to share.';
    if(!m.scratchpad)m.scratchpad={};
    spTa.value=m.scratchpad[ME]||'';
    spTa.oninput=function(){m.scratchpad[ME]=spTa.value;};
    spBody.appendChild(spTa);

    // Share opt-in for participants
    if(!isOwner&&(m.phase==='during'||m.phase==='after')){
      var sb=document.createElement('div');sb.className='share-bar';
      var chk=document.createElement('input');chk.type='checkbox';chk.id='shareChk';chk.style.cursor='pointer';
      var lbl=document.createElement('label');lbl.htmlFor='shareChk';lbl.style.cssText='cursor:pointer;flex:1;font-size:12px;color:var(--muted)';
      lbl.textContent='Share my notes with '+m.ownerName+' to include in the AI-generated minutes';
      var sn=document.createElement('span');sn.className='share-note';sn.textContent='Owner will see these';
      chk.onchange=function(){sn.style.opacity=chk.checked?'1':'0';if(chk.checked)toast('Notes will be shared with '+m.ownerName,'info');};
      sb.appendChild(chk);sb.appendChild(lbl);sb.appendChild(sn);spBody.appendChild(sb);
    }
    spSec.appendChild(spBody);pb.appendChild(spSec);
  }

  // ── SECTION 3: Minutes (only if after) ──
  if(m.phase==='after'){
    var minSec=document.createElement('div');minSec.className='section';
    var minHdr=document.createElement('div');minHdr.className='section__hdr';
    var minLbl=document.createElement('div');minLbl.className='section__label';minLbl.textContent='Minutes';
    minHdr.appendChild(minLbl);
    if(isOwner){
      var pubBtn=document.createElement('button');pubBtn.className='btn btn-p btn-sm';pubBtn.textContent='Publish to attendees';pubBtn.onclick=function(){toast('Minutes published','success');};
      minHdr.appendChild(pubBtn);
    }
    minSec.appendChild(minHdr);
    var minBody=document.createElement('div');minBody.className='section__body';
    var minTxt=document.createElement('div');minTxt.className='minutes-body';
    minTxt.innerHTML='<p>The Q2 review confirmed strong performance in NL Premier coverage with CTR up 12%. Social impressions are healthy but conversion on club-level content remains weak — retargeting strategy to be revisited before the next cycle.</p>'+
      '<p>Season 25/26 planning moves to an end-of-May brief rather than July. Contract renewal discussions were positive; Two Circles flagged an additional digital resource request to factor into negotiations.</p>';
    minBody.appendChild(minTxt);

    var apHead=document.createElement('div');apHead.style.cssText='margin-top:18px;margin-bottom:10px;font-size:13px;font-variation-settings:"wght" 800;color:var(--text)';apHead.textContent='Action points';
    minBody.appendChild(apHead);
    [{title:'Draft scope doc for 25/26 season',status:'open'},{title:'Receive updated reach data from Sarah',status:'waiting'},{title:'Review conversion targeting on club content',status:'open'}].forEach(function(a){
      var row=document.createElement('div');row.className='arow';
      var chk=document.createElement('div');chk.className='acheck '+(a.status==='waiting'?'waiting':'');chk.textContent=a.status==='waiting'?'~':'';
      var b=document.createElement('div');b.className='arow__body';
      var t=document.createElement('div');t.className='arow__title';t.textContent=a.title;b.appendChild(t);
      var r=document.createElement('div');r.className='arow__right';
      var p=document.createElement('span');p.className='pill p-'+(a.status==='waiting'?'waiting':'open');p.textContent=a.status;r.appendChild(p);
      row.appendChild(chk);row.appendChild(b);row.appendChild(r);minBody.appendChild(row);
    });

    if(isOwner){var note=document.createElement('div');note.style.cssText='margin-top:12px;font-size:12px;color:var(--muted);font-style:italic';note.textContent='You can edit the minutes above before publishing.';minBody.appendChild(note);}
    minSec.appendChild(minBody);pb.appendChild(minSec);
  }
}

/* ── LIVE MODAL ── */
function openModal(m, isNew){
  if(isNew){liveMtg=m;liveIdx=null;liveDone={};if(m.phase!=='after')m.phase='during';updateBanner();}
  var isOwner=m.owner===ME;
  document.getElementById('mDot').style.background=PROJ[m.project]||'#888';
  document.getElementById('mTitle').textContent=m.title;
  document.getElementById('mMeta').textContent=m.date+' · '+m.project+' · '+(isOwner?'You are the owner':'You are a participant');
  document.getElementById('mEndBtn').textContent=isOwner?'✕ End meeting':'✕ Leave';
  renderModalAgenda();
  updateProgress();
  // Default right panel
  var rb=document.getElementById('mRightBody');rb.innerHTML='';
  document.getElementById('mRightTitle').textContent='Scratchpad';
  document.getElementById('mRightMeta').textContent='Private to you · nobody else can see this';
  renderScratchpad(rb,m,isOwner);
  document.getElementById('backdrop').classList.add('open');
}

function renderScratchpad(container,m,isOwner){
  container.innerHTML='';
  var lbl=document.createElement('div');lbl.className='sp-label';lbl.textContent='Your notes — private';container.appendChild(lbl);
  if(!m.scratchpad)m.scratchpad={};
  var ta=document.createElement('textarea');ta.className='scratchpad';ta.style.flex='1';
  ta.placeholder='Free-form notes for this meeting…\nNobody else sees these unless you choose to share.';
  ta.value=m.scratchpad[ME]||'';
  ta.oninput=function(){m.scratchpad[ME]=ta.value;};
  container.appendChild(ta);
  if(!isOwner){
    var sb=document.createElement('div');sb.className='share-bar';sb.style.borderRadius='0 0 '+getComputedStyle(document.documentElement).getPropertyValue('--radius')+' '+getComputedStyle(document.documentElement).getPropertyValue('--radius');
    var chk=document.createElement('input');chk.type='checkbox';chk.id='mShareChk';chk.style.cursor='pointer';
    var lbl2=document.createElement('label');lbl2.htmlFor='mShareChk';lbl2.style.cssText='cursor:pointer;flex:1;font-size:12px;color:var(--muted)';
    lbl2.textContent='Share with '+m.ownerName+' for AI minutes';
    var sn=document.createElement('span');sn.className='share-note';sn.textContent='Owner will see these';
    chk.onchange=function(){sn.style.opacity=chk.checked?'1':'0';if(chk.checked)toast('Notes shared with '+m.ownerName,'info');};
    sb.appendChild(chk);sb.appendChild(lbl2);sb.appendChild(sn);container.appendChild(sb);
  }
  setTimeout(function(){if(ta)ta.focus();},50);
}

function renderModalAgenda(){
  var list=document.getElementById('maList');list.innerHTML='';
  if(!liveMtg)return;
  liveMtg.agenda.forEach(function(a,i){
    var item=document.createElement('div');item.className='ma-item'+(liveIdx===i?' active':'');
    var num=document.createElement('div');num.className='ma-item__num';num.textContent=liveDone[i]?'✓':(i+1);
    var body=document.createElement('div');
    var title=document.createElement('div');title.className='ma-item__title';title.textContent=a.title;
    var time=document.createElement('div');time.className='ma-item__time';time.textContent=a.time+(liveDone[i]?' · done':'');
    body.appendChild(title);body.appendChild(time);
    item.appendChild(num);item.appendChild(body);
    item.onclick=function(){
      liveIdx=i;
      // Clicking agenda item just highlights it — scratchpad stays as is
      renderModalAgenda();updateProgress();
      if(liveDone[i]===undefined){}
      // Toggle done on double click via button below
    };
    list.appendChild(item);
  });

  // Mark current item done button
  var existing=document.getElementById('maDoneRow');if(existing)existing.remove();
  if(liveIdx!==null){
    var doneRow=document.createElement('div');doneRow.id='maDoneRow';doneRow.style.cssText='padding:10px 15px;border-top:1px solid var(--border);margin-top:auto';
    var doneBtn=document.createElement('button');
    doneBtn.className='btn btn-sm'+(liveDone[liveIdx]?' btn-p':' btn-g');doneBtn.style.width='100%';
    doneBtn.textContent=liveDone[liveIdx]?'✓ Item done':'Mark item done';
    doneBtn.onclick=function(){
      liveDone[liveIdx]=!liveDone[liveIdx];
      renderModalAgenda();updateProgress();
      if(liveDone[liveIdx])toast('Item done','success');
    };
    doneRow.appendChild(doneBtn);
    document.querySelector('.modal-agenda').appendChild(doneRow);
  }
}

function updateProgress(){
  if(!liveMtg)return;
  var total=liveMtg.agenda.length;
  var done=Object.keys(liveDone).filter(function(k){return liveDone[k];}).length;
  document.getElementById('mProgTxt').textContent=done+' of '+total+' items';
  document.getElementById('mProgFill').style.width=(total?Math.round(done/total*100):0)+'%';
}

function mNext(){if(!liveMtg)return;liveIdx=liveIdx===null?0:Math.min(liveIdx+1,liveMtg.agenda.length-1);renderModalAgenda();updateProgress();}
function mPrev(){if(!liveMtg||liveIdx===null||liveIdx===0)return;liveIdx--;renderModalAgenda();updateProgress();}

function endMeeting(){
  var isOwner=liveMtg&&liveMtg.owner===ME;
  document.getElementById('backdrop').classList.remove('open');
  if(isOwner)toast('Meeting ended — open the meeting to generate minutes','success');
  else toast('Left meeting','info');
  liveMtg=null;updateBanner();
  if(curMeeting){var pb=document.getElementById('pb');pb.innerHTML='';openDetail(curMeeting);}
}

document.getElementById('backdrop').addEventListener('click',function(e){if(e.target===this)document.getElementById('backdrop').classList.remove('open');});

/* ── ACTIONS ── */
function renderActions(c){
  var fr=document.createElement('div');fr.className='frow';
  ['all','open','waiting','done'].forEach(function(f){
    var chip=document.createElement('div');chip.className='chip'+(afilt===f?' active':'');chip.textContent=f.charAt(0).toUpperCase()+f.slice(1);
    chip.onclick=function(){afilt=f;c.innerHTML='';renderActions(c);};fr.appendChild(chip);
  });c.appendChild(fr);
  var st=document.createElement('div');st.className='stats';

    '<div class="stat"><div class="stat__n" style="color:var(--amber)">'+wc+'</div><div class="stat__l">Waiting</div></div>'+
    '<div class="stat"><div class="stat__n" style="color:var(--green)">'+dc+'</div><div class="stat__l">Done</div></div>';
  c.appendChild(st);
  var filtered=afilt==='all'?actions:actions.filter(function(a){return a.status===afilt;});
  filtered.forEach(function(a){
    var row=document.createElement('div');row.className='arow';
    var chk=document.createElement('div');chk.className='acheck '+(a.status==='done'?'done':a.status==='waiting'?'waiting':'');chk.textContent=a.status==='done'?'✓':a.status==='waiting'?'~':'';
    var b=document.createElement('div');b.className='arow__body';
    var t=document.createElement('div');t.className='arow__title'+(a.status==='done'?' done':'');t.textContent=a.title;
    var m=document.createElement('div');m.className='arow__meta';m.textContent=a.meeting+' · Due '+a.due+(a.assignee?' · '+a.assignee:'');
    b.appendChild(t);b.appendChild(m);
    var r=document.createElement('div');r.className='arow__right';
    var pp=document.createElement('span');pp.className='pill p-'+a.status;pp.textContent=a.status;
    var pj=document.createElement('span');pj.style.cssText='font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px';
    var pd=document.createElement('span');pd.style.cssText='width:7px;height:7px;border-radius:50%;background:'+(PROJ[a.project]||'#888');
    pj.appendChild(pd);pj.appendChild(document.createTextNode(a.project));
    r.appendChild(pp);r.appendChild(pj);
    row.appendChild(chk);row.appendChild(b);row.appendChild(r);c.appendChild(row);
  });
}

/* ── CALENDAR ── */
function renderCalendar(c){
  var h=document.createElement('div');h.style.cssText='font-size:16px;font-variation-settings:"wght" 800;margin-bottom:12px';h.textContent='April 2026';c.appendChild(h);
  var g=document.createElement('div');g.className='cal';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(function(d){var l=document.createElement('div');l.className='cal-lbl';l.textContent=d;g.appendChild(l);});
  for(var b=0;b<2;b++)g.appendChild(document.createElement('div'));
  var md=[18,22,23];
  for(var d=1;d<=30;d++){var cell=document.createElement('div');cell.className='cal-cell'+(d===23?' today':'')+(md.indexOf(d)>-1?' has':'');cell.textContent=d;g.appendChild(cell);}
  c.appendChild(g);
  var leg=document.createElement('div');leg.style.cssText='margin-top:12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px';
  leg.innerHTML='<span style="width:8px;height:8px;border-radius:50%;background:var(--primary);display:inline-block"></span> Meeting scheduled';
  c.appendChild(leg);
}

/* ── CONTACTS ── */
function renderContacts(c){
  var fr=document.createElement('div');fr.className='frow';
  ['All','Two Circles','EFL','National League'].forEach(function(o){
    var key=o==='All'?'all':o;
    var chip=document.createElement('div');chip.className='chip'+(ofilt===key?' active':'');chip.textContent=o;
    chip.onclick=function(){ofilt=key;c.innerHTML='';renderContacts(c);};fr.appendChild(chip);
  });c.appendChild(fr);
  var g=document.createElement('div');g.className='cgrid';
  var filtered=ofilt==='all'?contacts:contacts.filter(function(x){return x.org===ofilt;});
  filtered.forEach(function(x){
