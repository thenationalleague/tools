<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Single Fixture Builder</title>

<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">

<style>
:root{
  --border:#d0d7de;
  --bg:#f6f8fa;
  --fg:#24292f;
  --muted:#57606a;
  --brand:#9e0000;
  --blue:#223b7c;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"carbona-variable", system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  font-size:14px;
  color:var(--fg);
  background:#fff;
}

.page{
  width:100%;
  padding:20px 18px 26px;
}

.app-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.app-header h1{
  margin:0;
  font-size:22px;
  font-weight:800;
}

.app{
  display:grid;
  grid-template-columns:minmax(520px, 900px) minmax(360px, 1fr);
  gap:18px;
  align-items:start;
}

@media (max-width: 980px){
  .app{ grid-template-columns:1fr; }
}

.previewWrap{
  position:sticky;
  top:14px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--bg);
  padding:10px;
}

canvas{
  display:block;
  width:100%;
  height:auto;
  background:#fff;
}

@media (max-width: 420px){
  .page{ padding:14px 12px 18px; }
  .box{ padding:10px; }
}

.panel{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-width:0;
}

.box{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  background:#fff;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.controls select,
.controls input{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font:inherit;
}

.controls button{
  padding:8px 10px;
  border:1px solid var(--brand);
  border-radius:10px;
  background:var(--brand);
  color:#fff;
  font:inherit;
  cursor:pointer;
}

.controls button:hover{ filter:brightness(.95); }

.section{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.pairGrid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  align-items:center;
}

.pairGrid .colHead{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  letter-spacing:0.3px;
  margin-bottom:-4px;
}

.pairGrid select,
.pairGrid input{
  padding:10px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font:inherit;
  width:100%;
  min-width:0;
  max-width:100%;
}

.pairGrid select{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

@media (max-width: 640px){
  .pairGrid{ grid-template-columns: 1fr; }
}

footer{
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>
<div class="page">

<header class="app-header">
  <img src="https://rckd-nl.github.io/nl-tools/assets/divisions/The%20National%20League.png" alt="The National League" style="height:42px;width:auto;border:none;border-radius:0;">
  <h1>Single Fixture Builder</h1>
</header>

<div class="app">

  <div class="previewWrap">
    <canvas id="preview" width="1347" height="1347"></canvas>
  </div>

  <div class="panel">

    <div class="box controls">
      <select id="division" title="Division">
        <option value="National">National</option>
        <option value="North">North</option>
        <option value="South">South</option>
      </select>

      <button type="button" id="download">Download 1x1 PNG</button>
      <button type="button" id="download45">Download 4x5 PNG</button>
      <button type="button" id="resetAll" title="Wipe all fields back to defaults">Reset</button>
    </div>

    <div class="box section">
      <div class="pairGrid">
        <div class="colHead">Home</div>
        <div class="colHead">Away</div>

        <select id="homeTeam" title="Home team"></select>
        <select id="awayTeam" title="Away team"></select>
      </div>
    </div>
    
    <div class="box section">
      <div class="pairGrid">
        <div class="colHead">Date / time</div>
        <div></div>

        <input id="kickoff" type="datetime-local" title="Kick-off date and time" />
        <div></div>
      </div>
    </div>

    <footer>
      <span id="statusText">Ready</span>
    </footer>

  </div>
</div>

</div>

<script>
(function(){
  "use strict";

  /* ================= CONFIG ================= */

  const VERSION = "v1.1";
  const STORAGE_KEY = "single-fixture-builder-v1.1";

  const CANVAS_SIZE = 1347;

  // Absolute (works no matter where this HTML file sits)
  const ASSET_BASE = "https://rckd-nl.github.io/nl-tools/assets";

  function assetUrl(relPath){
    return encodeURI(`${ASSET_BASE}/${relPath}`);
  }

  function crestUrlForName(teamName){
    return `${ASSET_BASE}/crests/${encodeURIComponent(teamName)}.png`;
  }

  // Background (same as your Fixtures / Results Builder)
  const BG_URL = "Fixtures%20background%201x1.png";

  const FONT_FAMILY = `"carbona-variable", system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif`;

  // Division badges (same switcher logic)
  const DIV_BADGE = {
    National: assetUrl("divisions/National.png"),
    North:    assetUrl("divisions/North.png"),
    South:    assetUrl("divisions/South.png")
  };
  const DIV_BADGE_POS = { x: 750, y: 300, scale: 0.075 };

  // Crest placement (your requested midpoints)
  const CREST_HOME_POS = { x: 550, y: 600 };
  const CREST_AWAY_POS = { x: 950, y: 600 };
  const CREST_MAX_W = 300;
  const CREST_MAX_H = 300;

  // Fixture text
  const FIXTURE_TEXT = {
    x: 750,
    y: 1000,
    size: 40,
    weight: 800,
    lineGap: 36,          // px (canvas doesn’t do pt; this matches your “36pt” intent visually)
    blue: "#223b7c",
    red:  "#9e0000"
  };

  const KICKOFF_TEXT = {
    x: 750,
    size: 24,
    weight: 800,
    color: "#9e0000",
    offsetBelowAwayLine: 100
  };

  const TEAM_NAMES = [
    "Aldershot Town","Altrincham","Boreham Wood","Boston United","Brackley Town","Braintree Town","Carlisle United","Eastleigh",
    "FC Halifax Town","Forest Green Rovers","Gateshead","Hartlepool United","Morecambe","Rochdale","Scunthorpe United","Solihull Moors",
    "Southend United","Sutton United","Tamworth","Truro City","Wealdstone","Woking","Yeovil Town","York City","AFC Fylde","AFC Telford United",
    "Alfreton Town","Bedford Town","Buxton","Chester","Chorley","Curzon Ashton","Darlington","Hereford","Kidderminster Harriers","King's Lynn Town",
    "Leamington","Macclesfield","Marine","Merthyr Town","Oxford City","Peterborough Sports","Radcliffe","Scarborough Athletic","South Shields","Southport",
    "Spennymoor Town","Worksop Town","AFC Totton","Bath City","Chelmsford City","Chesham United","Chippenham Town","Dagenham & Redbridge","Dorking Wanderers",
    "Dover Athletic","Eastbourne Borough","Ebbsfleet United","Enfield Town","Farnborough","Hampton & Richmond Borough","Hemel Hempstead Town","Hornchurch",
    "Horsham","Maidenhead United","Maidstone United","Salisbury","Slough Town","Tonbridge Angels","Torquay United","Weston-super-Mare","Worthing"
  ];

  const TEAM_CODES = [
    "ALD","ALT","BHW","BOS","BRK","BRA","CAR","EAS",
    "HAL","FGR","GAT","HAR","MOR","ROC","SCU","SOL",
    "SOU","SUT","TAM","TRU","WEA","WOK","YEO","YOR","FYL","TEL",
    "ALF","BED","BUX","CHE","CHO","CUR","DAR","HER","KID","KLT",
    "LEA","MAC","MAR","MER","OXC","PBS","RAD","SCA","SSH","SPT",
    "SPE","WRK","TOT","BAT","CHC","CHU","CHI","DAG","DOR",
    "DOV","EAB","EBB","ENF","FAB","HRB","HHT","HOR",
    "HRS","MHU","MSU","SAL","SLO","TON","TOR","WSM","WOR"
  ];

  const CODE_TO_NAME = new Map();
  const NAME_TO_CODE = new Map();
  const CODE_TO_CREST = new Map();
  const TEAM_CODE_SET = new Set(TEAM_CODES);

  for(let i=0;i<TEAM_NAMES.length;i++){
    const code = TEAM_CODES[i] || "";
    const name = TEAM_NAMES[i] || "";
    if(code){
      CODE_TO_NAME.set(code, name);
      CODE_TO_CREST.set(code, name ? crestUrlForName(name) : "");
    }
    if(name && code){
      NAME_TO_CODE.set(name, code);
    }
  }

  /* ================= ELEMENTS ================= */

  const canvas = document.getElementById("preview");
  const ctx = canvas.getContext("2d");

  const divisionSel = document.getElementById("division");
  const homeSel = document.getElementById("homeTeam");
  const awaySel = document.getElementById("awayTeam");
  const downloadBtn = document.getElementById("download");
  const kickoffEl = document.getElementById("kickoff");
  const download45Btn = document.getElementById("download45");
  const resetAllBtn = document.getElementById("resetAll");

  const statusTextEl = document.getElementById("statusText");

  /* ================= STATE ================= */

  const imgCache = new Map();
  let bgImg = null;
  let divBadgeImg = null;

  const state = { home:"", away:"", kickoff:"" }; // kickoff is datetime-local string "YYYY-MM-DDTHH:MM"

  /* ================= HELPERS ================= */

  function setStatus(msg){
    statusTextEl.textContent = msg;
    window.clearTimeout(setStatus._t);
    setStatus._t = window.setTimeout(()=> statusTextEl.textContent = "Ready", 900);
  }

  function loadImage(url){
    if(!url) return Promise.reject(new Error("Empty URL"));
    if(imgCache.has(url)) return imgCache.get(url);

    const p = new Promise((resolve,reject)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = ()=> resolve(img);
      img.onerror = ()=> reject(new Error("Failed to load: " + url));
      img.src = url;
    });

    imgCache.set(url, p);
    return p;
  }

  function setTextStyle(c, sizePx, colorHex, weight){
    c.fillStyle = colorHex;
    c.font = `${weight} ${sizePx}px ${FONT_FAMILY}`;
    c.textBaseline = "middle";
  }

  function safeUpper(s){
    return (s || "").replace(/\s+/g," ").trim().toUpperCase();
  }

  function normalizeTeamCode(v){
    const t = (v || "").trim();
    if(!t) return "";
    if(TEAM_CODE_SET.has(t)) return t;
    if(NAME_TO_CODE.has(t)) return NAME_TO_CODE.get(t) || "";
    return "";
  }

  function drawContainedImage(c, img, centerX, centerY, maxW, maxH){
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if(!iw || !ih) return;

    const s = Math.min(maxW / iw, maxH / ih);
    const dw = iw * s;
    const dh = ih * s;

    const x = centerX - dw/2;
    const y = centerY - dh/2;

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(img, x, y, dw, dh);
  }

  function drawMixedCenteredLine(c, parts, centerX, y){
    // parts: [{text, color}]
    // assumes font already set
    let totalW = 0;
    for(const p of parts){
      totalW += c.measureText(p.text).width;
    }
    let x = centerX - (totalW / 2);

    for(const p of parts){
      c.fillStyle = p.color;
      c.fillText(p.text, x, y);
      x += c.measureText(p.text).width;
    }
  }

  async function ensureBaseImages(){
    if(!bgImg) bgImg = await loadImage(BG_URL);
    const divUrl = DIV_BADGE[divisionSel.value] || DIV_BADGE.National;
    divBadgeImg = await loadImage(divUrl);
  }

  async function preloadNeededCrests(){
    const urls = new Set();

    const hCode = normalizeTeamCode(state.home);
    const aCode = normalizeTeamCode(state.away);

    const h = hCode ? (CODE_TO_CREST.get(hCode) || "") : "";
    const a = aCode ? (CODE_TO_CREST.get(aCode) || "") : "";

    if(h) urls.add(h);
    if(a) urls.add(a);

    const tasks = [];
    for(const u of urls){
      tasks.push(loadImage(u).catch(()=>null));
    }
    await Promise.all(tasks);
  }

  function dateStamp(d){
    const day = String(d.getDate());
    const mon = d.toLocaleString("en-GB", { month: "short" });
    const yy  = String(d.getFullYear()).slice(-2);
    return `${day}${mon}${yy}`;
  }

  function formatKickoff(datetimeLocal){
    // Input: "YYYY-MM-DDTHH:MM" (from <input type="datetime-local">)
    // Output: "Fri 20 Feb 2026, 19:45"
    if(!datetimeLocal) return "";

    const d = new Date(datetimeLocal);
    if(Number.isNaN(d.getTime())) return "";

    const parts = new Intl.DateTimeFormat("en-GB", {
      weekday: "short",
      day: "numeric",
      month: "short",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
      hourCycle: "h23"
    }).formatToParts(d);

    const get = (type) => (parts.find(p => p.type === type)?.value || "");

    const weekday = get("weekday"); // e.g. "Fri"
    const day = get("day");         // e.g. "20"
    const month = get("month");     // e.g. "Feb"
    const year = get("year");       // e.g. "2026"
    const hour = get("hour");       // e.g. "19"
    const minute = get("minute");   // e.g. "45"

    return `${weekday} ${day} ${month} ${year}, ${hour}:${minute}`;
  }

  function buildFilename(kind){
    const div = divisionSel.value;
    const suffix = (kind === "4x5") ? "4x5" : "1x1";
    const hCode = normalizeTeamCode(state.home);
    const aCode = normalizeTeamCode(state.away);

    const hName = hCode ? (CODE_TO_NAME.get(hCode) || hCode) : "Home";
    const aName = aCode ? (CODE_TO_NAME.get(aCode) || aCode) : "Away";

    const stamp = dateStamp(new Date());
    return `Fixture ${div} - ${hName} v ${aName} ${stamp} - ${suffix}.png`.replace(/\s+/g," ").trim();
  }

  // Narrow screens show 3-letter codes in dropdown; wide screens show full names
  const MQ_COMPACT = window.matchMedia("(max-width: 640px)");

  function updateSelectOptionLabels(sel){
    if(!sel) return;
    const opts = sel.options;
    for(let i=0;i<opts.length;i++){
      const opt = opts[i];
      const code = opt.value || "";
      if(code === ""){
        opt.textContent = "None";
        continue;
      }
      opt.textContent = MQ_COMPACT.matches ? code : (CODE_TO_NAME.get(code) || code);
    }
  }

  function updateAllSelectLabels(){
    updateSelectOptionLabels(homeSel);
    updateSelectOptionLabels(awaySel);
  }

  try{
    MQ_COMPACT.addEventListener("change", ()=> updateAllSelectLabels());
  }catch{
    MQ_COMPACT.addListener(()=> updateAllSelectLabels());
  }

  function buildClubSelectOptions(sel){
    sel.innerHTML = "";

    const none = document.createElement("option");
    none.value = "";
    none.textContent = "None";
    sel.appendChild(none);

    for(const code of TEAM_CODES){
      const o = document.createElement("option");
      o.value = code;
      o.textContent = MQ_COMPACT.matches ? code : (CODE_TO_NAME.get(code) || code);
      o.title = CODE_TO_NAME.get(code) || code;
      sel.appendChild(o);
    }
  }

  function autosave(){
    const payload = {
      v: VERSION,
      division: divisionSel.value,
      home: state.home,
      away: state.away,
      kickoff: state.kickoff
    };

    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); }catch{}
  }

  function autoload(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const d = JSON.parse(raw);
      if(!d || typeof d !== "object") return;

      if(typeof d.division === "string") divisionSel.value = d.division;

      if(typeof d.home === "string") state.home = normalizeTeamCode(d.home);
      if(typeof d.away === "string") state.away = normalizeTeamCode(d.away);
      if(typeof d.kickoff === "string") state.kickoff = d.kickoff.trim();

    }catch{}
  }

  /* ================= RENDER ================= */

  async function renderToContext(c){
    await ensureBaseImages();
    await preloadNeededCrests();

    c.setTransform(1,0,0,1,0,0);
    c.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE);

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(bgImg, 0, 0, CANVAS_SIZE, CANVAS_SIZE);

    // Division badge (bottom)
    if(divBadgeImg){
      const iw = divBadgeImg.naturalWidth || divBadgeImg.width;
      const ih = divBadgeImg.naturalHeight || divBadgeImg.height;
      const dw = iw * DIV_BADGE_POS.scale;
      const dh = ih * DIV_BADGE_POS.scale;
      const bx = DIV_BADGE_POS.x - dw/2;
      const by = DIV_BADGE_POS.y - dh/2;
      c.drawImage(divBadgeImg, bx, by, dw, dh);
    }

    // Crests
    const hCode = normalizeTeamCode(state.home);
    const aCode = normalizeTeamCode(state.away);

    const hUrl = hCode ? (CODE_TO_CREST.get(hCode) || "") : "";
    const aUrl = aCode ? (CODE_TO_CREST.get(aCode) || "") : "";

    if(hUrl){
      const img = await loadImage(hUrl).catch(()=>null);
      if(img) drawContainedImage(c, img, CREST_HOME_POS.x, CREST_HOME_POS.y, CREST_MAX_W, CREST_MAX_H);
    }

    if(aUrl){
      const img = await loadImage(aUrl).catch(()=>null);
      if(img) drawContainedImage(c, img, CREST_AWAY_POS.x, CREST_AWAY_POS.y, CREST_MAX_W, CREST_MAX_H);
    }

    // Fixture text
    const homeName = hCode ? (CODE_TO_NAME.get(hCode) || "") : "";
    const awayName = aCode ? (CODE_TO_NAME.get(aCode) || "") : "";

    const homeLine = safeUpper(homeName);
    const awayLine = safeUpper(awayName);

    c.textAlign = "center";
    setTextStyle(c, FIXTURE_TEXT.size, FIXTURE_TEXT.blue, FIXTURE_TEXT.weight);

    if(homeLine){
      c.fillStyle = FIXTURE_TEXT.blue;
      c.fillText(homeLine, FIXTURE_TEXT.x, FIXTURE_TEXT.y);
    }

    // Second line: "v " (red) + AWAY (blue), centered as one combined line
    if(awayLine){
      setTextStyle(c, FIXTURE_TEXT.size, FIXTURE_TEXT.blue, FIXTURE_TEXT.weight);
      c.textAlign = "left"; // we manually center via measurement
      drawMixedCenteredLine(
        c,
        [
          { text: "v ", color: FIXTURE_TEXT.red },
          { text: awayLine, color: FIXTURE_TEXT.blue }
        ],
        FIXTURE_TEXT.x,
        FIXTURE_TEXT.y + FIXTURE_TEXT.lineGap
      );
    }
        // Kick-off (100px below the away line), sentence case, red
    const koText = formatKickoff(state.kickoff);
    if(koText){
      const koY = (FIXTURE_TEXT.y + FIXTURE_TEXT.lineGap) + KICKOFF_TEXT.offsetBelowAwayLine;
      c.textAlign = "center";
      setTextStyle(c, KICKOFF_TEXT.size, KICKOFF_TEXT.color, KICKOFF_TEXT.weight);
      c.fillText(koText, KICKOFF_TEXT.x, koY);
    }
  }

  let renderQueued = false;
  function scheduleRender(){
    if(renderQueued) return;
    renderQueued = true;

    requestAnimationFrame(async ()=>{
      renderQueued = false;
      try{
        if(document.fonts && document.fonts.ready) await document.fonts.ready;
        await renderToContext(ctx);
        autosave();
      }catch(e){
        console.error(e);
        setStatus("Render error (CORS?)");
      }
    });
  }

  async function renderNow(){
    if(document.fonts && document.fonts.ready) await document.fonts.ready;
    await renderToContext(ctx);
    autosave();
  }

  /* ================= DOWNLOAD ================= */

  async function downloadPNG_1x1(){
    try{
      await ensureBaseImages();
      if(document.fonts && document.fonts.ready) await document.fonts.ready;

      const out = document.createElement("canvas");
      out.width = CANVAS_SIZE;
      out.height = CANVAS_SIZE;
      const c = out.getContext("2d");

      await renderToContext(c);

      const blob = await new Promise(res => out.toBlob(res, "image/png"));
      if(!blob){ setStatus("Export failed"); return; }

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = buildFilename("1x1");
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);

      setStatus("Downloaded");
    }catch(e){
      console.error(e);
      setStatus("Export error (CORS?)");
    }
  }

  async function downloadPNG_4x5(){
    try{
      await ensureBaseImages();
      if(document.fonts && document.fonts.ready) await document.fonts.ready;

      const full = document.createElement("canvas");
      full.width = CANVAS_SIZE;
      full.height = CANVAS_SIZE;
      const fc = full.getContext("2d");

      await renderToContext(fc);

      const OUT_W = 1080;
      const OUT_H = 1347;
      const SRC_X = 190;
      const SRC_Y = 0;

      const out = document.createElement("canvas");
      out.width = OUT_W;
      out.height = OUT_H;
      const oc = out.getContext("2d");

      oc.imageSmoothingEnabled = true;
      oc.imageSmoothingQuality = "high";
      oc.drawImage(full, SRC_X, SRC_Y, OUT_W, OUT_H, 0, 0, OUT_W, OUT_H);

      const blob = await new Promise(res => out.toBlob(res, "image/png"));
      if(!blob){ setStatus("Export failed"); return; }

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = buildFilename("4x5");
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);

      setStatus("Downloaded");
    }catch(e){
      console.error(e);
      setStatus("Export error (CORS?)");
    }
  }

  /* ================= RESET ================= */

  function resetAll(){
    divisionSel.value = "National";
    state.home = "";
    state.away = "";
    state.kickoff = "";
    homeSel.value = "";
    awaySel.value = "";
    kickoffEl.value = "";
    divBadgeImg = null;
    autosave();
    scheduleRender();
    setStatus("Reset");
  }

  /* ================= INIT ================= */

  function bindUI(){
    divisionSel.addEventListener("change", ()=>{
      divBadgeImg = null;
      autosave();
      scheduleRender();
    });

    homeSel.addEventListener("change", ()=>{
      state.home = homeSel.value || "";
      autosave();
      scheduleRender();
    });

    awaySel.addEventListener("change", ()=>{
      state.away = awaySel.value || "";
      autosave();
      scheduleRender();
    });
    
    kickoffEl.addEventListener("change", ()=>{
      state.kickoff = (kickoffEl.value || "").trim();
      autosave();
      scheduleRender();
    });

    downloadBtn.addEventListener("click", downloadPNG_1x1);
    download45Btn.addEventListener("click", downloadPNG_4x5);
    resetAllBtn.addEventListener("click", resetAll);
  }

  async function start(){
    buildClubSelectOptions(homeSel);
    buildClubSelectOptions(awaySel);

    autoload();

    homeSel.value = normalizeTeamCode(state.home) || "";
    awaySel.value = normalizeTeamCode(state.away) || "";

    kickoffEl.value = state.kickoff || "";

    updateAllSelectLabels();
    bindUI();

    try{
      if(document.fonts && document.fonts.ready) await document.fonts.ready;
      await ensureBaseImages();
      await renderNow();
      setStatus("Loaded");
    }catch(e){
      console.error(e);
      setStatus("Image load error (CORS?)");
    }
  }

  start();

})();
</script>
</body>
</html>
