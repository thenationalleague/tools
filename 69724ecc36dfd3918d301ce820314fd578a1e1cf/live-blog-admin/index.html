<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Blog Admin (v3.3)</title>
<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">
<style>
/* Live Blog Admin v3.3 */
:root{
  --red:#9e0000;
  --blue:#223b7c;
  --bg:#f0f2f5;
  --panel:#fff;
  --text:#111;
  --muted:#6b7280;
  --line:#d9dee5;
  --dark:#111;
  --dark2:#1c1c1c;
  --success:#0a7d2a;
  --danger:#b00020;
  --rail-w:290px;
  --topbar-h:52px;
  --feed-max:800px;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:"carbona-variable",system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size:14px;
  line-height:1.45;
}

.topbar{
  position:fixed;
  top:0; left:0; right:0;
  height:var(--topbar-h);
  background:var(--dark);
  color:#fff;
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:10px;
  border-bottom:2px solid var(--red);
  z-index:100;
}

.topbar__brand{
  font-size:.84rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  white-space:nowrap;
}

.topbar__version{
  font-size:.64rem;
  opacity:.3;
  font-weight:400;
  margin-left:5px;
}

.topbar__sep{
  width:1px; height:22px;
  background:rgba(255,255,255,.12);
  flex-shrink:0;
}

.topbar__right{
  display:flex;
  align-items:center;
  gap:8px;
  margin-left:auto;
  flex-shrink:0;
}

.topbar__status{
  font-size:.74rem;
  color:rgba(255,255,255,.45);
  white-space:nowrap;
}

.topbar__status.is-error{ color:#f87171; font-weight:700; }
.topbar__status.is-success{ color:#4ade80; font-weight:700; }

.layout{
  display:grid;
  grid-template-columns:1fr var(--rail-w);
  min-height:100vh;
  padding-top:var(--topbar-h);
}

.feed-col{
  min-width:0;
  display:flex;
  flex-direction:column;
}

/* EDITOR */
.editor-wrap{
  position:sticky;
  top:var(--topbar-h);
  z-index:50;
  background:var(--bg);
  border-bottom:2px solid var(--line);
  box-shadow:0 4px 14px rgba(0,0,0,.07);
}

.editor-collapsed{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 16px;
  background:var(--dark2);
  cursor:pointer;
  transition:background .15s;
  user-select:none;
}

.editor-collapsed:hover{ background:#242424; }

.editor-collapsed__info{ flex:1 1 auto; min-width:0; }

.editor-collapsed__title{
  font-size:.76rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:#fff;
}

.editor-collapsed__sub{
  font-size:.66rem;
  color:rgba(255,255,255,.32);
  margin:2px 0 0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.editor-collapsed__chevron{
  font-size:.8rem;
  color:rgba(255,255,255,.35);
  transition:transform .2s;
  flex-shrink:0;
}

.editor-collapsed__chevron.is-open{ transform:rotate(180deg); }

.editor-panel{ background:var(--panel); display:none; }
.editor-panel.is-open{ display:block; }

.editor-panel__head{
  padding:11px 16px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  color:#fff;
  border-bottom:3px solid rgba(0,0,0,.15);
}

/* Edit head uses team colours derived via JS inline style */
.editor-panel__head--new{ background:var(--blue); }
.editor-panel__head--edit{ background:var(--blue); } /* overridden inline per team */

.editor-panel__title{
  font-size:.82rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.editor-panel__subtitle{ font-size:.68rem; opacity:.65; margin:2px 0 0; }
.editor-panel__id{ font-size:.62rem; opacity:.4; margin:3px 0 0; font-family:monospace; word-break:break-all; }

.editor-body{
  padding:12px 16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.erow{ display:flex; flex-wrap:wrap; gap:8px; align-items:flex-end; }

.ef{ display:flex; flex-direction:column; gap:3px; min-width:0; }
.ef--grow{ flex:1 1 auto; }
.ef--w56{ width:56px; flex-shrink:0; }
.ef--w80{ width:80px; flex-shrink:0; }
.ef--w120{ width:120px; flex-shrink:0; }

.elabel{
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
}

.einput,
.eselect{
  height:32px;
  padding:0 9px;
  border:1px solid #cfd6de;
  border-radius:7px;
  background:#fff;
  color:#111;
  font:inherit;
  font-size:.82rem;
  outline:none;
  width:100%;
  transition:border-color .15s, box-shadow .15s;
}

.einput:focus,
.eselect:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

.combo{ position:relative; }

.combo__input{
  height:32px;
  padding:0 9px;
  border:1px solid #cfd6de;
  border-radius:7px;
  background:#fff;
  color:#111;
  font:inherit;
  font-size:.82rem;
  outline:none;
  width:100%;
  transition:border-color .15s, box-shadow .15s;
}

.combo__input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

.combo__list{
  position:absolute;
  top:calc(100% + 3px);
  left:0; right:0;
  background:#fff;
  border:1px solid var(--blue);
  border-radius:8px;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  z-index:200;
  max-height:200px;
  overflow-y:auto;
  display:none;
}

.combo__list.is-open{ display:block; }
.combo__opt{ padding:7px 10px; font-size:.82rem; cursor:pointer; }
.combo__opt:hover,.combo__opt.is-focused{ background:#eef2f7; }

.score-strip{
  display:flex;
  align-items:center;
  gap:4px;
  background:#f8f9fb;
  border:1px solid var(--line);
  border-radius:8px;
  padding:0 8px;
  height:32px;
  flex-shrink:0;
}

.score-strip__label{
  font-size:.58rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:var(--muted);
  white-space:nowrap;
}

.score-strip__sep{ font-size:.9rem; font-weight:900; color:#ccc; }

.score-input{
  width:32px; height:22px;
  text-align:center;
  padding:0 3px;
  border:1px solid #cfd6de;
  border-radius:5px;
  background:#fff;
  color:#111;
  font:inherit;
  font-size:.82rem;
  font-weight:900;
  outline:none;
}

.score-input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 2px rgba(34,59,124,.1);
}

.rte-wrap{
  border:1px solid #cfd6de;
  border-radius:8px;
  overflow:hidden;
  transition:border-color .15s, box-shadow .15s;
}

.rte-wrap:focus-within{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

.rte-bar{
  display:flex;
  align-items:center;
  gap:2px;
  padding:4px 7px;
  background:#f8f9fb;
  border-bottom:1px solid #e8ecf2;
}

.rte-btn{
  appearance:none; border:0;
  background:transparent;
  border-radius:5px;
  padding:3px 7px;
  cursor:pointer;
  font:inherit;
  font-size:.76rem;
  color:#374151;
  line-height:1;
  transition:background .1s;
}

.rte-btn:hover{ background:#e8ecf2; }
.rte-btn.is-on{ background:#dbeafe; color:var(--blue); }
.rte-btn--b{ font-weight:900; }
.rte-btn--i{ font-style:italic; }
.rte-sep{ width:1px; height:14px; background:#d9dee5; margin:0 2px; }

.rte-editor{
  min-height:70px;
  padding:8px 10px;
  outline:none;
  font-size:.86rem;
  line-height:1.6;
  background:#fff;
  color:#111;
}

.rte-editor:empty::before{ content:attr(data-ph); color:#bbb; pointer-events:none; }
.rte-editor p{ margin:0 0 .4em; }
.rte-editor p:last-child{ margin:0; }

.editor-actions{
  padding:10px 16px;
  border-top:1px solid var(--line);
  background:#f8f9fb;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.status-btn{
  appearance:none;
  border:2px solid transparent;
  border-radius:999px;
  cursor:pointer;
  font:inherit;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:0 14px;
  min-height:36px;
  font-size:.74rem;
  transition:all .15s;
  flex-shrink:0;
}

.status-btn--publish{ background:#f0fdf4; color:#15803d; border-color:#86efac; }
.status-btn--publish.is-on{ background:#15803d; color:#fff; border-color:#15803d; }
.status-btn--pin{ background:#fefce8; color:#854d0e; border-color:#fde68a; }
.status-btn--pin.is-on{ background:#854d0e; color:#fff; border-color:#854d0e; }

.status-btn__dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.status-btn--publish .status-btn__dot{ background:#86efac; }
.status-btn--publish.is-on .status-btn__dot{ background:rgba(255,255,255,.6); }
.status-btn--pin .status-btn__dot{ background:#fde68a; }
.status-btn--pin.is-on .status-btn__dot{ background:rgba(255,255,255,.6); }

.status-label{
  display:inline-flex;
  align-items:center;
  min-height:22px;
  padding:0 9px;
  border-radius:999px;
  font-size:.64rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.status-label--draft{ background:#f3f4f6; color:#6b7280; }
.status-label--published{ background:#dcfce7; color:#15803d; }
.status-label--unpublished{ background:#fee2e2; color:#b91c1c; }

.btn{
  appearance:none; border:0;
  border-radius:999px;
  cursor:pointer;
  font:inherit;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  white-space:nowrap;
  transition:filter .15s, opacity .15s;
  flex-shrink:0;
}

.btn:hover:not(:disabled){ filter:brightness(.9); }
.btn:disabled{ opacity:.45; cursor:default; }

.btn--sm{ min-height:30px; padding:0 12px; font-size:.68rem; }
.btn--md{ min-height:36px; padding:0 14px; font-size:.74rem; }
.btn--lg{ min-height:40px; padding:0 18px; font-size:.78rem; }

.btn--blue{ background:var(--blue); color:#fff; }
.btn--ghost{ background:#eef2f7; color:#111; }
.btn--danger{ background:var(--danger); color:#fff; }
.btn--white{ background:#fff; color:#111; border:1px solid var(--line); }

/* FEED */
.feed-toolbar{
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:10px;
}

.feed-toolbar__title{
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
  flex:1 1 auto;
}

.feed{
  padding:0 16px 24px;
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
}

/* FEED CARDS */
.fcard{
  width:100%;
  max-width:var(--feed-max);
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--line);
  box-shadow:0 3px 14px rgba(0,0,0,.05);
  cursor:pointer;
  transition:box-shadow .2s, transform .15s;
  position:relative;
}

.fcard:hover{ box-shadow:0 6px 22px rgba(0,0,0,.1); transform:translateY(-1px); }

.fcard.is-editing{
  box-shadow:0 0 0 3px var(--blue), 0 6px 22px rgba(0,0,0,.1);
  transform:none;
  cursor:default;
}

.fcard.is-pinned{ border-color:rgba(216,162,29,.5); }
.fcard--sub{ cursor:default; }
.fcard--sub:hover{ transform:none; box-shadow:0 3px 14px rgba(0,0,0,.05); }

.fcard__head{
  padding:11px 14px;
  color:#fff;
  border-bottom:3px solid #9e0000;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}

.fcard__head-left{
  display:flex;
  align-items:center;
  gap:9px;
  min-width:0;
  flex:1 1 auto;
}

.fcard__chip{
  display:inline-flex;
  align-items:center;
  min-height:22px;
  padding:0 8px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  font-size:.64rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  white-space:nowrap;
  flex-shrink:0;
}

.fcard__team{
  font-size:.92rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.02em;
  line-height:1.05;
}

.fcard__event{
  font-size:.64rem;
  font-weight:900;
  letter-spacing:.07em;
  text-transform:uppercase;
  opacity:.8;
  margin:2px 0 0;
}

.fcard__score-wrap{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:4px;
  flex-shrink:0;
}

.fcard__score{
  display:inline-flex;
  align-items:center;
  min-height:28px;
  padding:0 12px;
  border-radius:999px;
  background:#fff;
  color:#111;
  font-size:.88rem;
  font-weight:900;
  letter-spacing:.04em;
}

.fcard__pens{
  display:inline-flex;
  align-items:center;
  min-height:20px;
  padding:0 8px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  color:#fff;
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.04em;
  white-space:nowrap;
}

.fcard__body{
  padding:11px 14px;
  font-size:.88rem;
  line-height:1.6;
  background:#fff;
  color:#111;
}

.fcard__body p{ margin:0 0 .5em; }
.fcard__body p:last-child{ margin:0; }

.fcard__footer{
  padding:6px 14px 8px;
  background:#fff;
  border-top:1px solid #f0f2f5;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

.fpill{
  display:inline-flex;
  align-items:center;
  min-height:18px;
  padding:0 7px;
  border-radius:999px;
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.fpill--live{ background:#dcfce7; color:#15803d; }
.fpill--draft{ background:#f3f4f6; color:#6b7280; }
.fpill--unpub{ background:#fee2e2; color:#b91c1c; }
.fpill--pinned{ background:#fef9c3; color:#854d0e; }
.fpill--editing{ background:#dbeafe; color:#1e40af; }

.fcard__icon{
  width:26px; height:26px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.fcard__icon img{
  display:block;
  width:22px; height:22px;
  object-fit:contain;
  filter:invert(1) drop-shadow(0 1px 2px rgba(0,0,0,.28));
}

/* FAN NOTE */
.fcard--sub{
  background:
    radial-gradient(circle at top left,rgba(34,59,124,.07) 0%,rgba(34,59,124,0) 34%),
    radial-gradient(circle at bottom right,rgba(158,0,0,.06) 0%,rgba(158,0,0,0) 34%),
    #fbfbfc;
  border-color:#dbe2f3;
  display:flex;
  flex-direction:column;
  min-height:160px;
}

.fcard--sub .fcard__main{
  padding:18px 18px 10px;
  text-align:center;
  flex:1 1 auto;
}

.fcard--sub .fan-time{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:24px;
  padding:0 10px;
  margin:0 0 10px;
  border-radius:999px;
  background:#fff;
  color:#223b7c;
  border:1px solid rgba(34,59,124,.12);
  font-size:.7rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}

.fcard--sub .fan-quote{
  margin:0 0 10px;
  color:#1c2330;
  font-size:1.3rem;
  line-height:1.3;
  font-weight:400;
  font-style:italic;
  font-family:"Viktorie","Times New Roman",serif;
}

.fcard--sub .fan-byline{
  color:#4e5a6d;
  font-size:.86rem;
  font-weight:500;
}

.fcard--sub .fcard__strip{
  background:#223b7c;
  padding:8px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.fcard--sub .fcard__strip-label{
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:rgba(255,255,255,.6);
}

/* SUBMISSIONS RAIL */
.sub-rail{
  background:var(--dark2);
  border-left:1px solid #000;
  display:flex;
  flex-direction:column;
  height:calc(100vh - var(--topbar-h));
  position:sticky;
  top:var(--topbar-h);
  overflow:hidden;
}

.sub-rail__head{
  padding:10px 12px 8px;
  border-bottom:1px solid #2a2a2a;
  flex-shrink:0;
}

.sub-rail__title{
  font-size:.68rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(255,255,255,.4);
  margin:0 0 3px;
}

.sub-rail__counts{ font-size:.62rem; color:rgba(255,255,255,.22); }

.sub-rail__body{
  flex:1 1 auto;
  overflow-y:auto;
  padding:8px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.sub-rail__body::-webkit-scrollbar{ width:3px; }
.sub-rail__body::-webkit-scrollbar-thumb{ background:#333; border-radius:999px; }

.scard{
  border-radius:10px;
  overflow:hidden;
  border:1px solid #333;
  background:#1a1a1a;
}

.scard.is-hidden{ display:none; }

.scard__body{ padding:8px 10px; }

.scard__name{ font-size:.74rem; font-weight:900; color:#fff; margin:0 0 1px; }
.scard__time{ font-size:.6rem; color:rgba(255,255,255,.28); margin:0 0 5px; }

.scard__note{
  font-size:.78rem;
  color:rgba(255,255,255,.62);
  line-height:1.45;
  white-space:pre-wrap;
  word-break:break-word;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
  margin:0 0 6px;
}

.scard__actions{
  display:grid;
  grid-template-columns:1fr 1fr auto;
  border-top:1px solid #2a2a2a;
}

.scard__btn{
  appearance:none; border:0;
  padding:6px 4px;
  font:inherit;
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .12s, color .12s;
  line-height:1;
}

.scard__btn--pub{ background:#1a2a1a; color:#4ade80; border-right:1px solid #2a2a2a; }
.scard__btn--pub.is-active{ background:#15803d; color:#fff; }
.scard__btn--hide{ background:#2a1a1a; color:#f87171; border-right:1px solid #2a2a2a; }
.scard__btn--hide.is-active{ background:#b91c1c; color:#fff; }
.scard__btn--del{ background:#1a1a1a; color:rgba(255,255,255,.22); padding:6px 8px; font-size:.68rem; }
.scard__btn:hover:not(.is-active){ filter:brightness(1.4); }

.rail-empty{
  padding:20px 10px;
  text-align:center;
  font-size:.72rem;
  color:rgba(255,255,255,.18);
}

.feed-empty{
  width:100%;
  max-width:var(--feed-max);
  padding:40px 20px;
  text-align:center;
  color:var(--muted);
  font-size:.84rem;
  border:1px dashed var(--line);
  border-radius:16px;
  background:#fff;
}

@media (max-width:900px){
  .layout{ grid-template-columns:1fr; }
  .sub-rail{ height:auto; max-height:50vh; position:relative; top:0; border-left:0; border-top:1px solid #000; }
  .erow{ flex-direction:column; }
  .ef--w56,.ef--w80,.ef--w120{ width:100%; }
}

@media (max-width:600px){
  .topbar__status{ display:none; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar__brand">
    Live Blog Admin<span class="topbar__version">v3.3</span>
  </div>
  <div class="topbar__sep"></div>
  <div class="topbar__right">
    <div class="topbar__status" id="tStatus">Ready.</div>
    <button class="btn btn--ghost btn--sm" id="btnReload" type="button">Reload</button>
  </div>
</header>

<div class="layout">

  <div class="feed-col">

    <!-- EDITOR -->
    <div class="editor-wrap" id="editorWrap">

</div>

<script>
(function(){
  'use strict';

  /* Live Blog Admin v3.3 */

  const API = 'https://script.google.com/macros/s/AKfycbwD3Yf25tVVvd0S46eC6ldWDQWK043FdTzwW6VoCHHppGzzg1o1S5vNMFNSbNGGEqlzcw/exec';

  const ICON_BASE = 'https://raw.githubusercontent.com/rckd-nl/nl-tools/main/assets/icons/';

  const ICON_MAP = {
    'goal':               ICON_BASE + 'goal.svg',
    'assist':             ICON_BASE + 'goal.svg',
    'yellow card':        ICON_BASE + 'yellow-card.svg',
    'red card':           ICON_BASE + 'red-card.svg',
    'substitution':       ICON_BASE + 'substitution.svg',
    'corner':             ICON_BASE + 'corner.svg',
    'offside':            ICON_BASE + 'offside.svg',
    'free kick won':      ICON_BASE + 'free-kick.svg',
    'free kick lost':     ICON_BASE + 'free-kick.svg',
    'attempt saved':      ICON_BASE + 'save.svg',
    'miss':               ICON_BASE + 'miss.svg',
    'attempt missed':     ICON_BASE + 'miss.svg',
    'attempt blocked':    ICON_BASE + 'block.svg',
    'lineup':             ICON_BASE + 'lineup.svg',
    'kick-off':           ICON_BASE + 'play.svg',
    'start':              ICON_BASE + 'play.svg',
    'half-time':          ICON_BASE + 'stop.svg',
    'full-time':          ICON_BASE + 'stop.svg',
    'end of first half':  ICON_BASE + 'stop.svg',
    'end of second half': ICON_BASE + 'stop.svg'
  };

  const EVENT_OPTIONS = [
    'Goal','Assist','Attempt saved','Miss','Attempt missed','Attempt blocked',
    'Free kick won','Free kick lost','Offside','Corner','Substitution',
    'Yellow card','Red card','Lineup',
    'Kick-off','Half-time','Full-time','Start',
    'End of first half','End of second half'
  ];

  const TEAM_OPTIONS = ['Boreham Wood','West Ham United'];

  const TEAM_COLORS = {
    'Boreham Wood':   { bg:'linear-gradient(105deg,#000 0%,#000 50%,#e6e6e6 75%,#fff 100%)', border:'#555' },
    'West Ham United':{ bg:'linear-gradient(105deg,#8e1d41 0%,#8e1d41 50%,#81c4dd 75%,#fff 100%)', border:'#81c4dd' }
  };

  const NEUTRAL = { bg:'#223b7c', border:'#9e0000' };

  const state = {
    posts: [],
    submissions: [],
    hiddenSubs: new Set(),
    activeId: '',
    isNew: true,
    isPublished: true,
    isPinned: false,
    editorOpen: false,
    search: '',
    editSnapshot: null,
    renderTimer: null
  };

  const $ = id => document.getElementById(id);

  const dom = {
    status:           $('tStatus'),
    feedEl:           $('feedEl'),
    feedTitle:        $('feedTitle'),
    feedSearch:       $('feedSearch'),
    subRailBody:      $('subRailBody'),
    subCounts:        $('subCounts'),
    editorCollapsed:  $('editorCollapsed'),
    collapsedTitle:   $('collapsedTitle'),
    collapsedSub:     $('collapsedSub'),
    collapsedChevron: $('collapsedChevron'),
    editorPanel:      $('editorPanel'),
    editorHead:       $('editorHead'),
    editorTitle:      $('editorTitle'),
    editorSubtitle:   $('editorSubtitle'),
    editorId:         $('editorId'),
    clockTimeField:   $('clockTimeField'),
    statusLabel:      $('statusLabel'),
    btnReload:        $('btnReload'),
    btnPublish:       $('btnPublish'),
    btnPublishLabel:  $('btnPublishLabel'),
    btnPin:           $('btnPin'),
    btnPinLabel:      $('btnPinLabel'),
    btnUpdate:        $('btnUpdate'),
    btnCancel:        $('btnCancel'),
    btnDelete:        $('btnDelete'),
    fEvent:           $('fEvent'),
    fTeam:            $('fTeam'),
    fMatchTime:       $('fMatchTime'),
    fClockTime:       $('fClockTime'),
    fHome:            $('fHome'),
    fAway:            $('fAway'),
    fHomePens:        $('fHomePens'),
    fAwayPens:        $('fAwayPens'),
    fCopy:            $('fCopy'),
    fMediaType:       $('fMediaType'),
    fMediaUrl:        $('fMediaUrl')
  };

  /* ── HELPERS ── */
  function setStatus(msg, type){
    dom.status.textContent = msg||'';
    dom.status.classList.remove('is-error','is-success');
    if(type) dom.status.classList.add('is-'+type);
  }

  function escHtml(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function getColors(team){ return TEAM_COLORS[team] || NEUTRAL; }

  function getEventIcon(event){
    if(!event) return '';
    const url = ICON_MAP[(event||'').toLowerCase()];
    if(!url) return '';
    return `<span class="fcard__icon" aria-hidden="true"><img src="${escHtml(url)}" alt="" width="22" height="22"></span>`;
  }

  /* ── FETCH ── */
  async function apiFetch(params){
    const body = new URLSearchParams();
    Object.entries(params).forEach(([k,v]) => body.append(k, v==null?'':String(v)));
    const res = await fetch(API, { method:'POST', body });
    const text = await res.text();
    let data;
    try{ data = JSON.parse(text); }catch(e){ throw new Error('Invalid JSON from API.'); }
    if(data && data.ok === false) throw new Error(data.error||'API error.');
    return data;
  }

  async function apiGet(params){
    const qs = new URLSearchParams(params).toString();
    const res = await fetch(API+'?'+qs);
    const text = await res.text();
    let data;
    try{ data = JSON.parse(text); }catch(e){ throw new Error('Invalid JSON from API.'); }
    if(data && data.ok === false) throw new Error(data.error||'API error.');
    return data;
  }

  /* ── RICH TEXT ── */
  function extractRichData(el){
    const result = { text:'', formats:[] };
    let pos = 0;
    function walk(node){
      if(node.nodeType === Node.TEXT_NODE){ const t=node.textContent||''; result.text+=t; pos+=t.length; return; }
      if(node.nodeType !== Node.ELEMENT_NODE) return;
      const tag = node.tagName.toUpperCase();
      if(tag==='BR'){ result.text+='\n'; pos+=1; return; }
      if(tag==='P'||tag==='DIV'){
        Array.from(node.childNodes).forEach(walk);
        if(node.nextSibling){ result.text+='\n'; pos+=1; }
        return;
      }
      const isBold = tag==='B'||tag==='STRONG';
      const isItalic = tag==='I'||tag==='EM';
      if(isBold||isItalic){
        const start=pos;
        Array.from(node.childNodes).forEach(walk);
        if(pos>start) result.formats.push({start,end:pos,bold:isBold,italic:isItalic});
        return;
      }
      Array.from(node.childNodes).forEach(walk);
    }
    Array.from(el.childNodes).forEach(walk);
    result.text=result.text.replace(/\n+$/,'');
    return result;
  }

  /* ── STATUS UI ── */
  function syncStatusUI(){
    const pub = state.isPublished;
    const pin = state.isPinned;
    const hasId = !!state.activeId;

    dom.statusLabel.className='status-label';
    if(!hasId){ dom.statusLabel.textContent='Draft'; dom.statusLabel.classList.add('status-label--draft'); }
    else if(pub){ dom.statusLabel.textContent='Published'; dom.statusLabel.classList.add('status-label--published'); }
    else{ dom.statusLabel.textContent='Unpublished'; dom.statusLabel.classList.add('status-label--unpublished'); }

    dom.btnPublish.classList.toggle('is-on', pub);
    dom.btnPublishLabel.textContent = pub ? 'Published' : 'Publish';
    dom.btnPin.classList.toggle('is-on', pin);
    dom.btnPinLabel.textContent = pin ? 'Pinned' : 'Pin';
  }

  /* ── EDITOR ── */
  function toggleEditorPanel(){
    state.editorOpen = !state.editorOpen;
    dom.editorPanel.classList.toggle('is-open', state.editorOpen);
    dom.collapsedChevron.classList.toggle('is-open', state.editorOpen);
    if(state.editorOpen) scheduleFeedRender();
  }

  function openEditorPanel(){
    state.editorOpen = true;
    dom.editorPanel.classList.add('is-open');
    dom.collapsedChevron.classList.add('is-open');
  }

  function closeEditorPanel(){
    state.editorOpen = false;
    dom.editorPanel.classList.remove('is-open');
    dom.collapsedChevron.classList.remove('is-open');
  }

  function clearEditorFields(){
    dom.fEvent.value=''; dom.fTeam.value=''; dom.fMatchTime.value='';
    dom.fClockTime.value=''; dom.fHome.value=''; dom.fAway.value='';
    dom.fHomePens.value=''; dom.fAwayPens.value='';
    dom.fCopy.innerHTML=''; dom.fMediaType.value=''; dom.fMediaUrl.value='';
  }

function setEditorNew(){
    state.activeId=''; state.isNew=true; state.isPublished=false;
    state.isPinned=false; state.editSnapshot=null;

    dom.editorHead.className='editor-panel__head editor-panel__head--new';
    dom.editorHead.style.background='';
    dom.editorHead.style.borderBottomColor='';
    dom.editorTitle.textContent='New post';
    dom.editorSubtitle.textContent='Compose a new live blog entry';
    dom.editorId.style.display='none';
    dom.editorId.textContent='';
    dom.clockTimeField.style.display='none';
    dom.btnDelete.style.display='none';
    dom.btnUpdate.style.display='none';
    dom.collapsedTitle.textContent='+ New Post';
    dom.collapsedSub.textContent='Click to compose · or click a post to edit';

    syncStatusUI();
  }

  function openNewEditor(){
    clearEditorFields();
    setEditorNew();
    openEditorPanel();
    scheduleFeedRender();
    dom.fEvent.focus();
  }

  function openEditEditor(post){
    state.editSnapshot = {
      event:post.event||'', team:post.team||'', match_time:post.match_time||'',
      clock_time:post.clock_time?post.clock_time.slice(0,16):'',
      home:post.home!=null?String(post.home):'', away:post.away!=null?String(post.away):'',
      home_pens:post.home_pens||'', away_pens:post.away_pens||'',
      copy_html:post.copy_html||'', media_type:post.media_type||'',
      media_url:post.media_url||'', published:!!post.published, pinned:!!post.pinned
    };

    state.activeId=post.id||''; state.isNew=false;
    state.isPublished=!!post.published; state.isPinned=!!post.pinned;

    dom.fEvent.value=post.event||''; dom.fTeam.value=post.team||'';
    dom.fMatchTime.value=post.match_time||'';
    dom.fClockTime.value=post.clock_time?post.clock_time.slice(0,16):'';
    dom.fHome.value=post.home!=null?post.home:''; dom.fAway.value=post.away!=null?post.away:'';
    dom.fHomePens.value=post.home_pens||''; dom.fAwayPens.value=post.away_pens||'';
    dom.fCopy.innerHTML=post.copy_html||'';
    dom.fMediaType.value=post.media_type||''; dom.fMediaUrl.value=post.media_url||'';

    // Derive card colours for edit head
    const colors = getColors(post.team);
    dom.editorHead.className='editor-panel__head editor-panel__head--edit';
    dom.editorHead.style.background=colors.bg;
    dom.editorHead.style.borderBottomColor=colors.border;

    dom.editorTitle.textContent='Editing: '+(post.team||post.event||post.id||'');
    dom.editorSubtitle.textContent=post.match_time||(post.clock_time?post.clock_time.slice(11,16):'');
    dom.editorId.textContent='ID: '+post.id;
    dom.editorId.style.display='block';
    dom.clockTimeField.style.display='flex';
    dom.btnDelete.style.display='inline-flex';
    dom.btnUpdate.style.display='inline-flex';
    dom.collapsedTitle.textContent='Editing: '+(post.team||post.event||post.id);
    dom.collapsedSub.textContent='Click to expand editor';

    syncStatusUI();
    openEditorPanel();
    scheduleFeedRender();
    setStatus('Editing: '+(post.team||post.event||post.id));
  }

  function handleCancel(){
    if(!state.isNew && state.editSnapshot){
      const s=state.editSnapshot;
      dom.fEvent.value=s.event; dom.fTeam.value=s.team;
      dom.fMatchTime.value=s.match_time; dom.fClockTime.value=s.clock_time;
      dom.fHome.value=s.home; dom.fAway.value=s.away;
      dom.fHomePens.value=s.home_pens; dom.fAwayPens.value=s.away_pens;
      dom.fCopy.innerHTML=s.copy_html; dom.fMediaType.value=s.media_type;
      dom.fMediaUrl.value=s.media_url;
      state.isPublished=s.published; state.isPinned=s.pinned;
      syncStatusUI();
    }
    closeEditorPanel();
    setEditorNew();
    scheduleFeedRender();
  }

  /* ── DEBOUNCED RENDER ── */
  function scheduleFeedRender(){
    if(state.renderTimer) clearTimeout(state.renderTimer);
    state.renderTimer = setTimeout(renderFeed, 150);
  }

  /* ── FEED RENDER ── */
  function renderFeed(){
    const q = state.search.toLowerCase();

    const postItems = state.posts
      .filter(p => !p.deleted)
      .map(p => ({ type:'post', data:p, sort:Number(p.clockSort)||0, id:p.id }));

    const subItems = state.submissions
      .filter(s => s.published && !state.hiddenSubs.has(String(s.row_id)))
      .map(s => ({ type:'sub', data:s, sort:s.timestamp_ms||0, id:'sub-'+s.row_id }));

    // Sort by clockSort/timestamp_ms descending — identical to front end
    let all = [...postItems,...subItems].sort((a,b) => {
      if(b.sort !== a.sort) return b.sort - a.sort;
      return String(b.id).localeCompare(String(a.id));
    });

    if(q){
      all = all.filter(item => {
        const d=item.data;
        return (d.team||'').toLowerCase().includes(q)
          ||(d.event||'').toLowerCase().includes(q)
          ||(d.match_time||'').toLowerCase().includes(q)
          ||(d.name||'').toLowerCase().includes(q)
          ||(d.note||'').toLowerCase().includes(q)
          ||(d.copy_html||'').replace(/<[^>]+>/g,'').toLowerCase().includes(q);
      });
    }

    const total = state.posts.filter(p=>!p.deleted).length;
    const live = state.posts.filter(p=>p.published&&!p.deleted).length;
    dom.feedTitle.textContent=`Live feed — ${live} live of ${total} posts`;

    // Build inline preview for active editor
    const editorPreview = state.editorOpen ? buildEditorPreviewData() : null;
    const hasPreview = editorPreview && (editorPreview.team||editorPreview.event||editorPreview.copy_html);

    let html='';

    if(state.isNew && hasPreview){
      html += buildPostCardHtml({id:'__preview__',...editorPreview}, true);
    }

    all.forEach(item=>{
      if(item.type==='sub'){
        html += buildSubCardHtml(item.data);
      } else {
        const isEditing = !state.isNew && String(item.data.id)===String(state.activeId);
        if(isEditing && hasPreview){
          html += buildPostCardHtml(item.data, true, editorPreview);
        } else {
          html += buildPostCardHtml(item.data, false);
        }
      }
    });

    if(!html){
      dom.feedEl.innerHTML='<div class="feed-empty">No published posts or fan notes yet.</div>';
      return;
    }

    dom.feedEl.innerHTML=html;

    dom.feedEl.querySelectorAll('.fcard[data-pid]').forEach(el=>{
      el.addEventListener('click', function(){
        const post = state.posts.find(p=>String(p.id)===el.getAttribute('data-pid'));
        if(post) openEditEditor(post);
      });
    });

    dom.feedEl.querySelectorAll('[data-sub-unpub]').forEach(btn=>{
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        updateSub(btn.getAttribute('data-sub-unpub'), false).catch(handleErr);
      });
    });
  }

  function buildEditorPreviewData(){
    return {
      team:       dom.fTeam.value.trim(),
      event:      dom.fEvent.value.trim(),
      match_time: dom.fMatchTime.value.trim(),
      home:       dom.fHome.value.trim(),
      away:       dom.fAway.value.trim(),
      home_pens:  dom.fHomePens.value.trim(),
      away_pens:  dom.fAwayPens.value.trim(),
      copy_html:  dom.fCopy.innerHTML.trim(),
      pinned:     state.isPinned,
      published:  state.isPublished
    };
  }

  function buildPostCardHtml(post, isPreview, overrides){
    const p = overrides ? Object.assign({},post,overrides) : post;
    const colors = getColors(p.team);
    const timeLabel = escHtml(p.match_time||(p.clock_time?p.clock_time.slice(11,16):''));
    const iconHtml = getEventIcon(p.event);

    const home = String(p.home??'').trim();
    const away = String(p.away??'').trim();
    const hp = String(p.home_pens??'').trim();
    const ap = String(p.away_pens??'').trim();
    const scoreLabel = home!==''&&away!=='' ? escHtml(home+' – '+away) : '';
    const pensLabel = hp&&ap ? escHtml('('+hp+' – '+ap+' pens)') : '';

    const pills=[];
    if(isPreview) pills.push('<span class="fpill fpill--editing">Editing</span>');
    if(p.published) pills.push('<span class="fpill fpill--live">Live</span>');
    else pills.push('<span class="fpill fpill--draft">Draft</span>');
    if(p.pinned) pills.push('<span class="fpill fpill--pinned">Pinned</span>');

    const isEditing = !isPreview && String(p.id)===String(state.activeId);

    return `
      <div class="fcard${isEditing?' is-editing':''}${p.pinned?' is-pinned':''}"
           ${!isPreview?`data-pid="${escHtml(post.id)}"`:''}
           style="cursor:${isPreview?'default':'pointer'}">
        <div class="fcard__head" style="background:${colors.bg};border-bottom-color:${colors.border}">
          <div class="fcard__head-left">
            ${timeLabel?`<span class="fcard__chip">${timeLabel}</span>`:''}
            ${iconHtml}
            <div>
              ${p.team?`<div class="fcard__team">${escHtml(p.team)}</div>`:''}
              ${p.event?`<div class="fcard__event">${escHtml(p.event)}</div>`:''}
            </div>
          </div>
          <div class="fcard__score-wrap">
            ${scoreLabel?`<span class="fcard__score">${scoreLabel}</span>`:''}
            ${pensLabel?`<span class="fcard__pens">${pensLabel}</span>`:''}
          </div>
        </div>
        ${p.copy_html?`<div class="fcard__body">${p.copy_html}</div>`:''}
        <div class="fcard__footer">${pills.join('')}</div>
      </div>`;
  }

  function buildSubCardHtml(sub){
    const name = escHtml(sub.name||'Anonymous');
    const note = escHtml(sub.note||'');
    const time = sub.timestamp?escHtml(sub.timestamp.slice(0,16).replace('T',' ')):'';

    return `
      <div class="fcard fcard--sub" style="max-width:var(--feed-max);">
        <div class="fcard__main">
          ${time?`<div class="fan-time">${time}</div>`:''}
          <div class="fan-quote">${note}</div>
          <div class="fan-byline">— ${name}</div>
        </div>
        <div class="fcard__strip">
          <span class="fcard__strip-label">Fan note</span>
          <button class="btn btn--sm" style="background:rgba(255,255,255,.15);color:#fff;font-size:.62rem;"
                  data-sub-unpub="${sub.row_id}" type="button">Unpublish</button>
        </div>
      </div>`;
  }

  /* ── SUBMISSIONS RAIL ── */
  function renderSubRail(){
    const visible = state.submissions.filter(s=>!state.hiddenSubs.has(String(s.row_id)));
    const pending = visible.filter(s=>!s.published).length;
    dom.subCounts.textContent=`${visible.length} total · ${pending} pending`;

    if(!visible.length){ dom.subRailBody.innerHTML='<div class="rail-empty">No submissions.</div>'; return; }

    dom.subRailBody.innerHTML=visible.map(item=>{
      const name=escHtml(item.name||'Anonymous');
      const note=escHtml(item.note||'');
      const time=item.timestamp?escHtml(item.timestamp.slice(0,16).replace('T',' ')):'';
      const isPub=!!item.published;

      return `
        <div class="scard">
          <div class="scard__body">
            <div class="scard__name">${name}</div>
            <div class="scard__time">${time}</div>
            <div class="scard__note">${note}</div>
          </div>
          <div class="scard__actions">
            <button class="scard__btn scard__btn--pub${isPub?' is-active':''}"
                    data-sub="publish" data-row="${item.row_id}" type="button">✓ Publish</button>
            <button class="scard__btn scard__btn--hide${!isPub?' is-active':''}"
                    data-sub="unpublish" data-row="${item.row_id}" type="button">✕ Hide</button>
            <button class="scard__btn scard__btn--del"
                    data-sub="delete" data-row="${item.row_id}" type="button">🗑</button>
          </div>
        </div>`;
    }).join('');

    dom.subRailBody.querySelectorAll('[data-sub]').forEach(btn=>{
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        const action=btn.getAttribute('data-sub');
        const row=btn.getAttribute('data-row');
          if(action==='delete'){
          state.hiddenSubs.add(String(row));
          saveHiddenSubs();
          renderSubRail(); renderFeed();
        } else {
          updateSub(row, action==='publish').catch(handleErr);
        }
      });
    });
  }

  /* ── SAVE / DELETE ── */
  async function savePost(){
    const richData = extractRichData(dom.fCopy);

    const payload = {
      action: 'savePost',
      id: state.activeId||'',
      published: state.isPublished?'TRUE':'FALSE',
      pinned: state.isPinned?'TRUE':'FALSE',
      deleted: 'FALSE',
      event: dom.fEvent.value.trim(),
      team: dom.fTeam.value.trim(),
      match_time: dom.fMatchTime.value.trim(),
      clock_time: dom.fClockTime.value.trim(),
      home: dom.fHome.value.trim(),
      away: dom.fAway.value.trim(),
      home_pens: dom.fHomePens.value.trim(),
      away_pens: dom.fAwayPens.value.trim(),
      copy_text: richData.text,
      copy_formats: JSON.stringify(richData.formats),
      media_type: dom.fMediaType.value.trim(),
      media_url: dom.fMediaUrl.value.trim()
    };

    if(!payload.event && !payload.team && !payload.copy_text){
      setStatus('Needs at least event, team or copy.','error'); return;
    }

    setStatus('Saving…');
    dom.btnUpdate.disabled=true;

    try{
      const data = await apiFetch(payload);
      setStatus(data.message||'Saved.','success');
      await loadPosts();

      if(data.id){
        const saved = state.posts.find(p=>String(p.id)===String(data.id));
        if(saved){
          // Refresh snapshot
          state.editSnapshot = {
            event:saved.event||'', team:saved.team||'', match_time:saved.match_time||'',
            clock_time:saved.clock_time?saved.clock_time.slice(0,16):'',
            home:saved.home!=null?String(saved.home):'', away:saved.away!=null?String(saved.away):'',
            home_pens:saved.home_pens||'', away_pens:saved.away_pens||'',
            copy_html:saved.copy_html||'', media_type:saved.media_type||'',
            media_url:saved.media_url||'', published:!!saved.published, pinned:!!saved.pinned
          };
        } else {
          state.activeId=data.id; state.isNew=false;
          dom.editorId.textContent='ID: '+data.id;
          dom.editorId.style.display='block';
          dom.clockTimeField.style.display='flex';
          dom.btnDelete.style.display='inline-flex';
          dom.btnUpdate.style.display='inline-flex';
          syncStatusUI(); renderFeed();
        }
      }
    }finally{
      dom.btnUpdate.disabled=false;
    }
  }

async function updateAndClose(){
    await savePost();
    state.activeId = '';
    state.isNew = true;
    closeEditorPanel();
    setEditorNew();
    clearEditorFields();
    renderFeed();
  }

  async function deletePost(){
    const id=state.activeId;
    if(!id){ setStatus('No post selected.','error'); return; }
    if(!window.confirm('Soft-delete this post? It stays in the sheet but disappears from the blog.')) return;
    setStatus('Deleting…');
    const data=await apiFetch({ action:'deletePost', id });
    setStatus(data.message||'Deleted.','success');
    closeEditorPanel(); setEditorNew(); clearEditorFields();
    await loadPosts();
  }

  /* ── SUBMISSIONS ── */
async function updateSub(rowId, publish){
  const current = state.submissions.find(s => String(s.row_id) === String(rowId));
  if(!current){ setStatus('Submission not found.', 'error'); return; }

  const prev = { published: current.published, timestamp_ms: current.timestamp_ms, timestamp: current.timestamp };

  if(publish){
    const now = new Date();
    current.published = true;
    current.timestamp_ms = now.getTime();
    current.timestamp = now.toISOString().slice(0,16).replace('T',' ');
  } else {
    current.published = false;
    current.timestamp_ms = 0;
    current.timestamp = '';
  }

  renderSubRail();
  renderFeed();

  try{
    await apiFetch({
      action: 'updateSubmission',
      row_id: rowId,
      name: current.name || '',
      note: current.note || '',
      status: publish ? 'published' : 'pending',
      published: publish ? 'TRUE' : 'FALSE'
    });
    setStatus(publish ? 'Published.' : 'Unpublished.', 'success');
  } catch(err){
    current.published = prev.published;
    current.timestamp_ms = prev.timestamp_ms;
    current.timestamp = prev.timestamp;
    renderSubRail();
    renderFeed();
    handleErr(err);
  }
}

  /* ── API LOAD ── */
  async function loadPosts(){
    const data=await apiGet({ action:'listPosts' });
    state.posts=Array.isArray(data.items)?data.items:[];
    renderFeed();
  }

function normaliseSubs(items){
    return items.map(function(item){
      if(item.publishtime){
        const d = new Date(item.publishtime);
        if(!isNaN(d.getTime())){
          item.timestamp_ms = d.getTime();
          item.timestamp = item.publishtime.slice(0,16).replace('T',' ');
          return item;
        }
      }
      if(!item.published){
        item.timestamp_ms = 0;
        item.timestamp = '';
      }
      return item;
    });
  }

  async function loadSubs(){
    const data=await apiGet({ action:'listSubmissions' });
    state.submissions=normaliseSubs(Array.isArray(data.items)?data.items:[]);
    renderSubRail(); renderFeed();
  }

  async function reloadAll(){
    setStatus('Loading…');
    await Promise.all([loadPosts(), loadSubs()]);
    setStatus('Loaded.','success');
  }

  /* ── RTE ── */
  function bindRTE(){
    document.querySelectorAll('.rte-btn[data-cmd]').forEach(btn=>{
      btn.addEventListener('mousedown', function(e){
        e.preventDefault();
        const cmd=btn.getAttribute('data-cmd');
        if(cmd==='para') document.execCommand('insertHTML',false,'<p><br></p>');
        else if(cmd==='br') document.execCommand('insertHTML',false,'<br>');
        else if(cmd==='clear') document.execCommand('removeFormat',false,null);
        else document.execCommand(cmd,false,null);
        dom.fCopy.focus(); syncRTEBar(); scheduleFeedRender();
      });
    });
    dom.fCopy.addEventListener('input', ()=>{ syncRTEBar(); scheduleFeedRender(); });
    dom.fCopy.addEventListener('keyup', syncRTEBar);
    dom.fCopy.addEventListener('mouseup', syncRTEBar);
  }

  function syncRTEBar(){
    ['bold','italic'].forEach(cmd=>{
      const btn=document.querySelector(`.rte-btn[data-cmd="${cmd}"]`);
      if(btn) btn.classList.toggle('is-on', document.queryCommandState(cmd));
    });
  }

  /* ── COMBOS ── */
  function buildCombo(inputEl, listEl, options){
    let focused=-1;

    function showList(filter){
      const f=(filter||'').toLowerCase();
      const filtered=options.filter(o=>o.toLowerCase().includes(f));
      if(!filtered.length){ listEl.classList.remove('is-open'); return; }
      listEl.innerHTML=filtered.map(o=>`<div class="combo__opt" data-val="${escHtml(o)}">${escHtml(o)}</div>`).join('');
      listEl.classList.add('is-open');
      focused=-1;
      listEl.querySelectorAll('.combo__opt').forEach(el=>{
        el.addEventListener('mousedown', function(e){
          e.preventDefault();
          inputEl.value=el.getAttribute('data-val');
          listEl.classList.remove('is-open');
          scheduleFeedRender();
        });
      });
    }

    inputEl.addEventListener('focus', ()=>showList(inputEl.value));
    inputEl.addEventListener('input', ()=>{ showList(inputEl.value); scheduleFeedRender(); });

    inputEl.addEventListener('keydown', function(e){
      const opts=listEl.querySelectorAll('.combo__opt');
      if(e.key==='ArrowDown'){ e.preventDefault(); focused=Math.min(focused+1,opts.length-1); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); focused=Math.max(focused-1,0); }
      else if(e.key==='Enter'&&focused>=0){
        e.preventDefault();
        inputEl.value=opts[focused].getAttribute('data-val');
        listEl.classList.remove('is-open');
        scheduleFeedRender(); return;
      }
      else if(e.key==='Escape'){ listEl.classList.remove('is-open'); return; }
      opts.forEach((o,i)=>o.classList.toggle('is-focused',i===focused));
    });

    document.addEventListener('click', function(e){
      if(!inputEl.contains(e.target)&&!listEl.contains(e.target)) listEl.classList.remove('is-open');
    });
  }

  /* ── EVENTS ── */
  function handleErr(err){
    console.error(err);
    setStatus(err&&err.message?err.message:'Something went wrong.','error');
  }

  function bindEvents(){
    dom.btnReload.addEventListener('click', ()=>reloadAll().catch(handleErr));
    dom.editorCollapsed.addEventListener('click', toggleEditorPanel);

    dom.btnPublish.addEventListener('click', function(){
      state.isPublished=!state.isPublished;
      syncStatusUI(); scheduleFeedRender();
    });

    dom.btnPin.addEventListener('click', function(){
      state.isPinned=!state.isPinned;
      syncStatusUI(); scheduleFeedRender();
    });

    dom.btnUpdate.addEventListener('click', ()=>updateAndClose().catch(handleErr));
    dom.btnCancel.addEventListener('click', handleCancel);
    dom.btnDelete.addEventListener('click', ()=>deletePost().catch(handleErr));

    dom.feedSearch.addEventListener('input', function(){
      state.search=dom.feedSearch.value;
      renderFeed();
    });

    [dom.fMatchTime, dom.fHome, dom.fAway, dom.fHomePens,
     dom.fAwayPens, dom.fMediaUrl].forEach(el=>el.addEventListener('input', scheduleFeedRender));

    dom.fMediaType.addEventListener('change', scheduleFeedRender);
  }

  /* ── INIT ── */
function loadHiddenSubs(){
    try{
      const raw = localStorage.getItem('nllb-hidden-subs');
      if(raw) JSON.parse(raw).forEach(id => state.hiddenSubs.add(String(id)));
    }catch(e){}
  }

  function saveHiddenSubs(){
    try{
      localStorage.setItem('nllb-hidden-subs', JSON.stringify([...state.hiddenSubs]));
    }catch(e){}
  }

  async function init(){
    loadHiddenSubs();
    buildCombo(dom.fEvent, $('comboEventList'), EVENT_OPTIONS);
    buildCombo(dom.fTeam, $('comboTeamList'), TEAM_OPTIONS);
    bindRTE();
    bindEvents();
    setEditorNew();
    await reloadAll();
    window.setInterval(() => loadSubs().catch(handleErr), 30000);
  }

  init().catch(handleErr);

})();
</script>
