<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Blog Admin (v2.0)</title>
<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">
<style>
/* Live Blog Admin v2.0 */
:root{
  --red:#9e0000;
  --blue:#223b7c;
  --bg:#f4f5f7;
  --panel:#ffffff;
  --text:#111111;
  --muted:#6b7280;
  --line:#d9dee5;
  --dark:#111111;
  --success:#0a7d2a;
  --danger:#b00020;
  --sidebar-w:300px;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:"carbona-variable",system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size:14px;
  line-height:1.45;
}

/* ── LAYOUT ── */
.admin{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  grid-template-rows:auto 1fr;
  grid-template-areas:
    "topbar topbar"
    "sidebar main";
  min-height:100vh;
}

/* ── TOPBAR ── */
.admin__topbar{
  grid-area:topbar;
  background:var(--dark);
  color:#fff;
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-bottom:2px solid var(--red);
}

.admin__brand{
  font-size:.9rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
}

.admin__topbar-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.admin__status{
  font-size:.8rem;
  color:rgba(255,255,255,.6);
  min-height:18px;
}

.admin__status.is-error{ color:#f87171; font-weight:700; }
.admin__status.is-success{ color:#4ade80; font-weight:700; }

/* ── SIDEBAR ── */
.admin__sidebar{
  grid-area:sidebar;
  background:var(--dark);
  color:#fff;
  display:flex;
  flex-direction:column;
  border-right:1px solid #222;
  overflow:hidden;
}

.admin__sidebar-tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  border-bottom:1px solid #333;
  flex:0 0 auto;
}

.admin__tab{
  appearance:none;
  border:0;
  background:transparent;
  color:rgba(255,255,255,.5);
  font:inherit;
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  padding:10px 8px;
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s, border-color .15s;
}

.admin__tab.is-active{
  color:#fff;
  border-bottom-color:var(--red);
}

.admin__sidebar-actions{
  padding:10px;
  border-bottom:1px solid #222;
  flex:0 0 auto;
}

.admin__list-wrap{
  flex:1 1 auto;
  overflow-y:auto;
}

.admin__list-wrap::-webkit-scrollbar{ width:4px; }
.admin__list-wrap::-webkit-scrollbar-thumb{ background:#333; border-radius:999px; }

.admin__post-list,
.admin__sub-list{
  list-style:none;
}

.admin__post-item,
.admin__sub-item{
  padding:10px 12px;
  border-bottom:1px solid #1a1a1a;
  cursor:pointer;
  position:relative;
}

.admin__post-item:hover{ background:#1a1a1a; }
.admin__post-item.is-active{ background:#9e0000; }
.admin__post-item.is-deleted{ opacity:.4; }

.admin__post-item-event{
  font-size:.68rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(255,255,255,.5);
  margin:0 0 3px;
}

.admin__post-item.is-active .admin__post-item-event{
  color:rgba(255,255,255,.7);
}

.admin__post-item-team{
  font-size:.88rem;
  font-weight:900;
  color:#fff;
  line-height:1.1;
  margin:0 0 4px;
}

.admin__post-item-meta{
  font-size:.7rem;
  color:rgba(255,255,255,.45);
}

.admin__post-item-pills{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  margin:5px 0 0;
}

.admin__pill{
  display:inline-flex;
  align-items:center;
  min-height:18px;
  padding:0 7px;
  border-radius:999px;
  font-size:.62rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  background:rgba(255,255,255,.1);
  color:rgba(255,255,255,.7);
}

.admin__pill--live{ background:rgba(0,160,60,.25); color:#4ade80; }
.admin__pill--deleted{ background:rgba(180,0,0,.25); color:#f87171; }
.admin__pill--pinned{ background:rgba(216,162,29,.2); color:#fbbf24; }

.admin__sub-item{
  cursor:default;
  padding:10px 12px;
}

.admin__sub-item-name{
  font-size:.84rem;
  font-weight:900;
  color:#fff;
  margin:0 0 3px;
}

.admin__sub-item-time{
  font-size:.7rem;
  color:rgba(255,255,255,.4);
  margin:0 0 6px;
}

.admin__sub-item-note{
  font-size:.8rem;
  color:rgba(255,255,255,.7);
  white-space:pre-wrap;
  word-break:break-word;
  margin:0 0 8px;
  max-height:80px;
  overflow:hidden;
}

.admin__sub-item-actions{
  display:flex;
  gap:6px;
}

/* ── MAIN ── */
.admin__main{
  grid-area:main;
  display:grid;
  grid-template-columns:1fr 340px;
  gap:0;
  overflow:hidden;
  height:calc(100vh - 50px);
}

.admin__editor-wrap{
  overflow-y:auto;
  padding:16px;
}

.admin__editor-wrap::-webkit-scrollbar{ width:4px; }
.admin__editor-wrap::-webkit-scrollbar-thumb{ background:#ccc; border-radius:999px; }

.admin__preview-wrap{
  border-left:1px solid var(--line);
  background:#f0f2f5;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.admin__preview-wrap::-webkit-scrollbar{ width:4px; }
.admin__preview-wrap::-webkit-scrollbar-thumb{ background:#ccc; border-radius:999px; }

.admin__preview-label{
  font-size:.68rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
  margin:0 0 8px;
}

/* ── EDITOR CARD ── */
.editor-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  margin:0 0 12px;
}

.editor-card__title{
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
  margin:0 0 12px;
  padding:0 0 8px;
  border-bottom:1px solid var(--line);
}

.editor-grid{
  display:grid;
  gap:10px;
}

.editor-grid--2{
  grid-template-columns:1fr 1fr;
}

.editor-grid--3{
  grid-template-columns:1fr 1fr 1fr;
}

.editor-field{
  display:grid;
  gap:4px;
}

.editor-label{
  font-size:.68rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:#374151;
}

.editor-input,
.editor-textarea,
.editor-select{
  width:100%;
  border:1px solid #cfd6de;
  border-radius:10px;
  background:#fff;
  color:#111;
  font:inherit;
  font-size:.88rem;
  padding:8px 10px;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}

.editor-input:focus,
.editor-textarea:focus,
.editor-select:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

.editor-textarea{
  min-height:120px;
  resize:vertical;
  font-size:.85rem;
  line-height:1.5;
}

/* ── RICH TEXT TOOLBAR ── */
.richtext-wrap{
  border:1px solid #cfd6de;
  border-radius:10px;
  overflow:hidden;
  transition:border-color .15s, box-shadow .15s;
}

.richtext-wrap:focus-within{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

.richtext-toolbar{
  display:flex;
  gap:2px;
  padding:6px 8px;
  background:#f8f9fb;
  border-bottom:1px solid #e8ecf2;
}

.richtext-btn{
  appearance:none;
  border:0;
  background:transparent;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font:inherit;
  font-size:.78rem;
  font-weight:700;
  color:#374151;
  line-height:1;
  transition:background .12s;
}

.richtext-btn:hover{ background:#e8ecf2; }
.richtext-btn.is-active{ background:#e8ecf2; color:var(--blue); }

.richtext-btn--b{ font-weight:900; }
.richtext-btn--i{ font-style:italic; }

.richtext-editor{
  min-height:120px;
  padding:10px 12px;
  outline:none;
  font-size:.88rem;
  line-height:1.55;
  background:#fff;
  color:#111;
}

.richtext-editor:empty::before{
  content:attr(data-placeholder);
  color:#aaa;
  pointer-events:none;
}

.richtext-editor p{ margin:0 0 .6em; }
.richtext-editor p:last-child{ margin-bottom:0; }

/* ── TOGGLE ── */
.toggle-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 14px;
  border-radius:10px;
  background:#f8f9fb;
  border:1px solid var(--line);
}

.toggle-label{
  font-size:.84rem;
  font-weight:700;
  color:#111;
}

.toggle-label small{
  display:block;
  font-size:.72rem;
  font-weight:400;
  color:var(--muted);
  margin:2px 0 0;
}

.toggle{
  position:relative;
  width:44px;
  height:24px;
  flex:0 0 auto;
}

.toggle input{
  opacity:0;
  width:0;
  height:0;
  position:absolute;
}

.toggle-track{
  position:absolute;
  inset:0;
  border-radius:999px;
  background:#d1d5db;
  cursor:pointer;
  transition:background .2s;
}

.toggle input:checked + .toggle-track{ background:var(--blue); }

.toggle-thumb{
  position:absolute;
  top:3px;
  left:3px;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  pointer-events:none;
  transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}

.toggle input:checked ~ .toggle-thumb{ transform:translateX(20px); }

/* ── BUTTONS ── */
.btn{
  appearance:none;
  border:0;
  border-radius:999px;
  cursor:pointer;
  font:inherit;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  white-space:nowrap;
  transition:filter .15s, opacity .15s;
}

.btn:hover{ filter:brightness(.92); }
.btn:disabled{ opacity:.5; cursor:default; filter:none; }

.btn--sm{ min-height:32px; padding:0 12px; font-size:.7rem; }
.btn--md{ min-height:38px; padding:0 16px; font-size:.76rem; }
.btn--lg{ min-height:42px; padding:0 20px; font-size:.8rem; }

.btn--red{ background:var(--red); color:#fff; }
.btn--blue{ background:var(--blue); color:#fff; }
.btn--dark{ background:#444; color:#fff; }
.btn--ghost{ background:#eef2f7; color:#111; }
.btn--danger{ background:var(--danger); color:#fff; }
.btn--success{ background:var(--success); color:#fff; }

.btn-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:14px 0 0;
}

/* ── PREVIEW CARD ── */
.preview-card{
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--line);
  background:#fff;
  box-shadow:0 4px 16px rgba(0,0,0,.05);
}

.preview-card__head{
  padding:10px 12px;
  color:#fff;
  background:var(--blue);
  border-bottom:3px solid var(--red);
}

.preview-card__meta{
  display:flex;
  align-items:center;
  gap:8px;
  margin:0 0 4px;
  flex-wrap:wrap;
}

.preview-card__chip{
  display:inline-flex;
  align-items:center;
  gap:5px;
  min-height:24px;
  padding:0 9px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  font-size:.68rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.preview-card__score{
  display:inline-flex;
  align-items:center;
  min-height:28px;
  padding:0 12px;
  border-radius:999px;
  background:#fff;
  color:#111;
  font-size:.84rem;
  font-weight:900;
  letter-spacing:.04em;
}

.preview-card__team{
  font-size:.95rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.02em;
}

.preview-card__event{
  font-size:.7rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  opacity:.85;
  margin:2px 0 0;
}

.preview-card__body{
  padding:12px 14px;
  font-size:.88rem;
  color:#111;
  line-height:1.55;
}

.preview-card__body p{ margin:0 0 .6em; }
.preview-card__body p:last-child{ margin-bottom:0; }

.preview-empty{
  text-align:center;
  padding:32px 20px;
  color:var(--muted);
  font-size:.84rem;
}

/* ── EMPTY STATES ── */
.list-empty{
  padding:20px 12px;
  text-align:center;
  font-size:.78rem;
  color:rgba(255,255,255,.35);
}

/* ── COUNTS ── */
.admin__counts{
  font-size:.72rem;
  color:rgba(255,255,255,.4);
}

/* ── MOBILE ── */
@media (max-width:900px){
  .admin{
    grid-template-columns:1fr;
    grid-template-areas:
      "topbar"
      "sidebar"
      "main";
  }

  .admin__sidebar{
    height:auto;
    max-height:40vh;
  }

  .admin__main{
    height:auto;
    grid-template-columns:1fr;
  }

  .admin__preview-wrap{
    border-left:0;
    border-top:1px solid var(--line);
  }

  .editor-grid--2,
  .editor-grid--3{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="admin" id="admin">

  <header class="admin__topbar">
    <div class="admin__brand">Live Blog Admin <span style="opacity:.4;font-weight:400">v2.0</span></div>
    <div class="admin__topbar-right">
      <div class="admin__status" id="adminStatus">Ready.</div>
      <span class="admin__counts" id="adminCounts"></span>
      <button class="btn btn--ghost btn--sm" id="adminReloadBtn" type="button">Reload</button>
      <button class="btn btn--blue btn--sm" id="adminNewPostBtn" type="button">+ New Post</button>
    </div>
  </header>

  <aside class="admin__sidebar">
    <div class="admin__sidebar-tabs">
      <button class="admin__tab is-active" id="tabPostsBtn" type="button">Posts</button>
      <button class="admin__tab" id="tabSubsBtn" type="button">Submissions</button>
    </div>

    <div id="tabPosts">
      <div class="admin__list-wrap">
        <ul class="admin__post-list" id="adminPostList">
          <li class="list-empty">Loading…</li>
        </ul>
      </div>
    </div>

    <div id="tabSubs" style="display:none; flex:1 1 auto; overflow:hidden; display:none; flex-direction:column;">
      <div class="admin__list-wrap">
        <ul class="admin__sub-list" id="adminSubList">
          <li class="list-empty">Loading…</li>
        </ul>
      </div>
    </div>
  </aside>

  <main class="admin__main">

    <div class="admin__editor-wrap">

      <div class="editor-card">
        <div class="editor-card__title">Status</div>

        <div class="editor-grid" style="gap:8px;">
          <div class="toggle-row">
            <div class="toggle-label">
              Live / Published
              <small>Visible on the front-end blog</small>
            </div>
            <label class="toggle">
              <input type="checkbox" id="fieldPublished">
              <span class="toggle-track"></span>
              <span class="toggle-thumb"></span>
            </label>
          </div>

          <div class="toggle-row">
            <div class="toggle-label">
              Pinned
              <small>Always shows at top of feed</small>
            </div>
            <label class="toggle">
              <input type="checkbox" id="fieldPinned">
              <span class="toggle-track"></span>
              <span class="toggle-thumb"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="editor-card">
        <div class="editor-card__title">Match Info</div>
        <div class="editor-grid">
          <div class="editor-grid editor-grid--2">
            <div class="editor-field">
              <label class="editor-label" for="fieldEvent">Event</label>
              <input class="editor-input" id="fieldEvent" type="text" placeholder="goal / yellow card / full-time">
            </div>
            <div class="editor-field">
              <label class="editor-label" for="fieldTeam">Team</label>
              <input class="editor-input" id="fieldTeam" type="text" placeholder="Boreham Wood">
            </div>
          </div>

          <div class="editor-grid editor-grid--2">
            <div class="editor-field">
              <label class="editor-label" for="fieldMatchTime">Match time</label>
              <input class="editor-input" id="fieldMatchTime" type="text" placeholder="12' / HT / FT">
            </div>
            <div class="editor-field">
              <label class="editor-label" for="fieldClockTime">Clock time</label>
              <input class="editor-input" id="fieldClockTime" type="text" placeholder="Leave blank to auto-stamp">
            </div>
          </div>

          <div class="editor-grid editor-grid--3">
            <div class="editor-field">
              <label class="editor-label" for="fieldHome">Home score</label>
              <input class="editor-input" id="fieldHome" type="text" placeholder="1">
            </div>
            <div class="editor-field">
              <label class="editor-label" for="fieldAway">Away score</label>
              <input class="editor-input" id="fieldAway" type="text" placeholder="0">
            </div>
            <div class="editor-field">
              <label class="editor-label">Pens</label>
              <div class="editor-grid editor-grid--2" style="gap:6px;">
                <input class="editor-input" id="fieldHomePens" type="text" placeholder="H">
                <input class="editor-input" id="fieldAwayPens" type="text" placeholder="A">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="editor-card">
        <div class="editor-card__title">Copy</div>
        <div class="richtext-wrap">
          <div class="richtext-toolbar">
            <button class="richtext-btn richtext-btn--b" type="button" data-cmd="bold" title="Bold">B</button>
            <button class="richtext-btn richtext-btn--i" type="button" data-cmd="italic" title="Italic">I</button>
            <button class="richtext-btn" type="button" data-cmd="insertParagraph" title="New paragraph">¶</button>
            <button class="richtext-btn" type="button" data-cmd="insertLineBreak" title="Line break">↵</button>
            <button class="richtext-btn" type="button" data-cmd="removeFormat" title="Clear formatting" style="margin-left:auto;">✕ fmt</button>
          </div>
          <div class="richtext-editor" id="fieldCopy" contenteditable="true" data-placeholder="Post copy here…" spellcheck="true"></div>
        </div>
      </div>

      <div class="editor-card">
        <div class="editor-card__title">Media</div>
        <div class="editor-grid editor-grid--2">
          <div class="editor-field">
            <label class="editor-label" for="fieldMediaType">Type</label>
            <select class="editor-select" id="fieldMediaType">
              <option value="">None</option>
              <option value="image">Image</option>
              <option value="video">Video</option>
              <option value="gallery">Gallery</option>
              <option value="embed">Embed (X / Instagram / YouTube)</option>
            </select>
          </div>
          <div class="editor-field">
            <label class="editor-label" for="fieldMediaUrl">URL</label>
            <input class="editor-input" id="fieldMediaUrl" type="text" placeholder="URL or comma-separated for gallery">
          </div>
        </div>
      </div>

      <div class="editor-card" id="fieldIdCard" style="display:none;">
        <div class="editor-card__title">Post ID</div>
        <input class="editor-input" id="fieldId" type="text" readonly placeholder="Auto-generated">
      </div>

      <div class="btn-row">
        <button class="btn btn--blue btn--lg" id="adminSaveBtn" type="button">Save Post</button>
        <button class="btn btn--ghost btn--lg" id="adminClearBtn" type="button">Clear</button>
        <button class="btn btn--danger btn--lg" id="adminDeleteBtn" type="button">Delete Post</button>
      </div>

    </div>

    <div class="admin__preview-wrap">
      <div class="admin__preview-label">Live preview</div>
      <div id="adminPreview">
        <div class="preview-empty">Fill in the form to see a preview.</div>
      </div>
    </div>

  </main>
</div>

<script>
(function(){
  'use strict';

  /* Live Blog Admin v2.0 */

  const API = 'https://script.google.com/macros/s/AKfycbwD3Yf25tVVvd0S46eC6ldWDQWK043FdTzwW6VoCHHppGzzg1o1S5vNMFNSbNGGEqlzcw/exec';

  const state = {
    posts: [],
    submissions: [],
    activePostId: '',
    activeTab: 'posts'
  };

  const dom = {
    status: document.getElementById('adminStatus'),
    counts: document.getElementById('adminCounts'),
    postList: document.getElementById('adminPostList'),
    subList: document.getElementById('adminSubList'),
    preview: document.getElementById('adminPreview'),
    newPostBtn: document.getElementById('adminNewPostBtn'),
    reloadBtn: document.getElementById('adminReloadBtn'),
    saveBtn: document.getElementById('adminSaveBtn'),
    clearBtn: document.getElementById('adminClearBtn'),
    deleteBtn: document.getElementById('adminDeleteBtn'),
    tabPostsBtn: document.getElementById('tabPostsBtn'),
    tabSubsBtn: document.getElementById('tabSubsBtn'),
    tabPosts: document.getElementById('tabPosts'),
    tabSubs: document.getElementById('tabSubs'),
    fieldId: document.getElementById('fieldId'),
    fieldIdCard: document.getElementById('fieldIdCard'),
    fieldPublished: document.getElementById('fieldPublished'),
    fieldPinned: document.getElementById('fieldPinned'),
    fieldEvent: document.getElementById('fieldEvent'),
    fieldTeam: document.getElementById('fieldTeam'),
    fieldMatchTime: document.getElementById('fieldMatchTime'),
    fieldClockTime: document.getElementById('fieldClockTime'),
    fieldHome: document.getElementById('fieldHome'),
    fieldAway: document.getElementById('fieldAway'),
    fieldHomePens: document.getElementById('fieldHomePens'),
    fieldAwayPens: document.getElementById('fieldAwayPens'),
    fieldCopy: document.getElementById('fieldCopy'),
    fieldMediaType: document.getElementById('fieldMediaType'),
    fieldMediaUrl: document.getElementById('fieldMediaUrl')
  };

  function setStatus(msg, type){
    dom.status.textContent = msg || '';
    dom.status.classList.remove('is-error','is-success');
    if(type === 'error') dom.status.classList.add('is-error');
    if(type === 'success') dom.status.classList.add('is-success');
  }

  function escapeHtml(str){
    return String(str || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  async function fetchJson(url, options){
    const res = await fetch(url, options);
    const text = await res.text();
    let data = null;
    try{ data = JSON.parse(text); }catch(e){ throw new Error('Response was not valid JSON.'); }
    if(!res.ok) throw new Error((data && data.error) || 'Request failed.');
    if(data && data.ok === false) throw new Error(data.error || 'Request failed.');
    return data;
  }

  function updateCounts(){
    const live = state.posts.filter(p => p.published && !p.deleted).length;
    const deleted = state.posts.filter(p => p.deleted).length;
    const pending = state.submissions.filter(s => !s.published).length;
    dom.counts.textContent = `${live} live · ${deleted} deleted · ${pending} pending subs`;
  }

  /* ── TABS ── */
  function switchTab(tab){
    state.activeTab = tab;
    dom.tabPostsBtn.classList.toggle('is-active', tab === 'posts');
    dom.tabSubsBtn.classList.toggle('is-active', tab === 'subs');
    dom.tabPosts.style.display = tab === 'posts' ? 'flex' : 'none';
    dom.tabPosts.style.flexDirection = 'column';
    dom.tabPosts.style.flex = '1 1 auto';
    dom.tabPosts.style.overflow = 'hidden';
    dom.tabSubs.style.display = tab === 'subs' ? 'flex' : 'none';
    dom.tabSubs.style.flexDirection = 'column';
    dom.tabSubs.style.flex = '1 1 auto';
    dom.tabSubs.style.overflow = 'hidden';
  }

  /* ── POST LIST ── */
  function renderPostList(){
    if(!state.posts.length){
      dom.postList.innerHTML = '<li class="list-empty">No posts yet. Create one with + New Post.</li>';
      return;
    }

    dom.postList.innerHTML = state.posts.map(function(post){
      const isActive = String(post.id) === String(state.activePostId);
      const pills = [];
      if(post.deleted){
        pills.push('<span class="admin__pill admin__pill--deleted">Deleted</span>');
      }else if(post.published){
        pills.push('<span class="admin__pill admin__pill--live">Live</span>');
      }else{
        pills.push('<span class="admin__pill">Draft</span>');
      }
      if(post.pinned) pills.push('<span class="admin__pill admin__pill--pinned">Pinned</span>');

      const team = escapeHtml(post.team || '(No team)');
      const event = escapeHtml(post.event || '');
      const matchTime = escapeHtml(post.match_time || '');
      const clockTime = post.clock_time ? escapeHtml(post.clock_time.slice(11,16)) : '';
      const metaParts = [matchTime, clockTime].filter(Boolean).join(' · ');

      return `
        <li class="admin__post-item${isActive ? ' is-active' : ''}${post.deleted ? ' is-deleted' : ''}" data-post-id="${escapeHtml(post.id)}">
          ${event ? `<div class="admin__post-item-event">${event}</div>` : ''}
          <div class="admin__post-item-team">${team}</div>
          ${metaParts ? `<div class="admin__post-item-meta">${metaParts}</div>` : ''}
          <div class="admin__post-item-pills">${pills.join('')}</div>
        </li>
      `;
    }).join('');

    dom.postList.querySelectorAll('[data-post-id]').forEach(function(el){
      el.addEventListener('click', function(){
        const id = el.getAttribute('data-post-id');
        const post = state.posts.find(p => String(p.id) === String(id));
        if(post) loadPostIntoEditor(post);
      });
    });
  }

  /* ── SUBMISSION LIST ── */
  function renderSubList(){
    if(!state.submissions.length){
      dom.subList.innerHTML = '<li class="list-empty">No submissions yet.</li>';
      return;
    }

    dom.subList.innerHTML = state.submissions.map(function(item){
      const name = escapeHtml(item.name || 'Anonymous');
      const note = escapeHtml(item.note || '');
      const time = escapeHtml(item.timestamp ? item.timestamp.slice(0,16).replace('T',' ') : '');
      const isPublished = item.published;

      return `
        <li class="admin__sub-item">
          <div class="admin__sub-item-name">${name}</div>
          <div class="admin__sub-item-time">${time}</div>
          <div class="admin__sub-item-note">${note}</div>
          <div class="admin__sub-item-actions">
            ${!isPublished
              ? `<button class="btn btn--success btn--sm" type="button" data-sub-action="publish" data-row="${item.row_id}">Publish</button>`
              : `<button class="btn btn--ghost btn--sm" type="button" data-sub-action="unpublish" data-row="${item.row_id}">Unpublish</button>`
            }
          </div>
        </li>
      `;
    }).join('');

    dom.subList.querySelectorAll('[data-sub-action]').forEach(function(btn){
      btn.addEventListener('click', function(){
        const action = btn.getAttribute('data-sub-action');
        const row = btn.getAttribute('data-row');
        updateSubmission(row, action === 'publish').catch(handleError);
      });
    });
  }

  /* ── EDITOR ── */
  function clearEditor(){
    state.activePostId = '';
    dom.fieldId.value = '';
    dom.fieldIdCard.style.display = 'none';
    dom.fieldPublished.checked = true;
    dom.fieldPinned.checked = false;
    dom.fieldEvent.value = '';
    dom.fieldTeam.value = '';
    dom.fieldMatchTime.value = '';
    dom.fieldClockTime.value = '';
    dom.fieldHome.value = '';
    dom.fieldAway.value = '';
    dom.fieldHomePens.value = '';
    dom.fieldAwayPens.value = '';
    dom.fieldCopy.innerHTML = '';
    dom.fieldMediaType.value = '';
    dom.fieldMediaUrl.value = '';
    renderPostList();
    updatePreview();
    setStatus('New post ready.');
  }

  function loadPostIntoEditor(post){
    state.activePostId = post.id || '';
    dom.fieldId.value = post.id || '';
    dom.fieldIdCard.style.display = 'block';
    dom.fieldPublished.checked = !!post.published;
    dom.fieldPinned.checked = !!post.pinned;
    dom.fieldEvent.value = post.event || '';
    dom.fieldTeam.value = post.team || '';
    dom.fieldMatchTime.value = post.match_time || '';
    dom.fieldClockTime.value = post.clock_time ? post.clock_time.slice(0,16) : '';
    dom.fieldHome.value = post.home || '';
    dom.fieldAway.value = post.away || '';
    dom.fieldHomePens.value = post.home_pens || '';
    dom.fieldAwayPens.value = post.away_pens || '';
    dom.fieldCopy.innerHTML = post.copy_html || '';
    dom.fieldMediaType.value = post.media_type || '';
    dom.fieldMediaUrl.value = post.media_url || '';
    renderPostList();
    updatePreview();
    setStatus('Loaded: ' + (post.team || post.event || post.id));
  }

  function buildPostPayload(){
    return {
      action: 'savePost',
      id: dom.fieldId.value.trim(),
      published: dom.fieldPublished.checked ? 'TRUE' : 'FALSE',
      pinned: dom.fieldPinned.checked ? 'TRUE' : 'FALSE',
      deleted: 'FALSE',
      event: dom.fieldEvent.value.trim(),
      team: dom.fieldTeam.value.trim(),
      match_time: dom.fieldMatchTime.value.trim(),
      clock_time: dom.fieldClockTime.value.trim(),
      home: dom.fieldHome.value.trim(),
      away: dom.fieldAway.value.trim(),
      home_pens: dom.fieldHomePens.value.trim(),
      away_pens: dom.fieldAwayPens.value.trim(),
      copy_html: dom.fieldCopy.innerHTML.trim(),
      media_type: dom.fieldMediaType.value.trim(),
      media_url: dom.fieldMediaUrl.value.trim()
    };
  }

  /* ── PREVIEW ── */
  function updatePreview(){
    const team = dom.fieldTeam.value.trim();
    const event = dom.fieldEvent.value.trim();
    const matchTime = dom.fieldMatchTime.value.trim();
    const clockTime = dom.fieldClockTime.value.trim();
    const home = dom.fieldHome.value.trim();
    const away = dom.fieldAway.value.trim();
    const homePens = dom.fieldHomePens.value.trim();
    const awayPens = dom.fieldAwayPens.value.trim();
    const copy = dom.fieldCopy.innerHTML.trim();

    const hasContent = team || event || copy;

    if(!hasContent){
      dom.preview.innerHTML = '<div class="preview-empty">Fill in the form to see a preview.</div>';
      return;
    }

    const timeLabel = matchTime || (clockTime ? clockTime.slice(11,16) : '');
    const scoreLabel = (home !== '' && away !== '') ? `${home} – ${away}` : '';
    const pensLabel = (homePens && awayPens) ? `Pens: ${homePens} – ${awayPens}` : '';

    dom.preview.innerHTML = `
      <div class="preview-card">
        <div class="preview-card__head">
          <div class="preview-card__meta">
            ${timeLabel ? `<span class="preview-card__chip">${escapeHtml(timeLabel)}</span>` : ''}
            ${scoreLabel ? `<span class="preview-card__score">${escapeHtml(scoreLabel)}</span>` : ''}
            ${pensLabel ? `<span class="preview-card__chip">${escapeHtml(pensLabel)}</span>` : ''}
          </div>
          ${team ? `<div class="preview-card__team">${escapeHtml(team)}</div>` : ''}
          ${event ? `<div class="preview-card__event">${escapeHtml(event)}</div>` : ''}
        </div>
        ${copy ? `<div class="preview-card__body">${copy}</div>` : ''}
      </div>
    `;
  }

  /* ── RICH TEXT ── */
  function bindRichText(){
    document.querySelectorAll('.richtext-btn[data-cmd]').forEach(function(btn){
      btn.addEventListener('mousedown', function(e){
        e.preventDefault();
        const cmd = btn.getAttribute('data-cmd');
        if(cmd === 'insertParagraph'){
          document.execCommand('insertHTML', false, '<p><br></p>');
        }else if(cmd === 'insertLineBreak'){
          document.execCommand('insertHTML', false, '<br>');
        }else{
          document.execCommand(cmd, false, null);
        }
        dom.fieldCopy.focus();
        updateToolbarState();
        updatePreview();
      });
    });

    dom.fieldCopy.addEventListener('input', function(){
      updateToolbarState();
      updatePreview();
    });

    dom.fieldCopy.addEventListener('keyup', updateToolbarState);
    dom.fieldCopy.addEventListener('mouseup', updateToolbarState);
  }

  function updateToolbarState(){
    document.querySelectorAll('.richtext-btn[data-cmd]').forEach(function(btn){
      const cmd = btn.getAttribute('data-cmd');
      if(cmd === 'bold' || cmd === 'italic'){
        btn.classList.toggle('is-active', document.queryCommandState(cmd));
      }
    });
  }

  /* ── API CALLS ── */
  async function loadPosts(){
    const data = await fetchJson(API + '?action=listPosts');
    state.posts = Array.isArray(data.items) ? data.items : [];
    renderPostList();
    updateCounts();
  }

  async function loadSubmissions(){
    const data = await fetchJson(API + '?action=listSubmissions');
    state.submissions = Array.isArray(data.items) ? data.items : [];
    renderSubList();
    updateCounts();
  }

  async function reloadAll(){
    setStatus('Loading…');
    await Promise.all([loadPosts(), loadSubmissions()]);
    setStatus('Loaded.', 'success');
  }

  async function savePost(){
    const payload = buildPostPayload();

    if(!payload.event && !payload.team && !payload.copy_html){
      setStatus('Post needs at least event, team or copy.', 'error');
      return;
    }

    setStatus('Saving…');
    dom.saveBtn.disabled = true;

    try{
      const data = await fetchJson(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      setStatus(data.message || 'Saved.', 'success');
      await loadPosts();

      if(data.id){
        const saved = state.posts.find(p => String(p.id) === String(data.id));
        if(saved){
          loadPostIntoEditor(saved);
        }else{
          dom.fieldId.value = data.id;
          dom.fieldIdCard.style.display = 'block';
          state.activePostId = data.id;
          renderPostList();
        }
      }
    }finally{
      dom.saveBtn.disabled = false;
    }
  }

  async function deletePost(){
    const id = dom.fieldId.value.trim();
    if(!id){
      setStatus('No post selected.', 'error');
      return;
    }

    if(!window.confirm('Soft-delete this post? It will be hidden from the blog but kept in the sheet.')){
      return;
    }

    setStatus('Deleting…');

    const data = await fetchJson(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'deletePost', id: id })
    });

    setStatus(data.message || 'Deleted.', 'success');
    clearEditor();
    await loadPosts();
  }

  async function updateSubmission(rowId, published){
    setStatus(published ? 'Publishing…' : 'Unpublishing…');

    const current = state.submissions.find(s => String(s.row_id) === String(rowId));
    if(!current){
      setStatus('Submission not found.', 'error');
      return;
    }

    const data = await fetchJson(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'updateSubmission',
        row_id: Number(rowId),
        name: current.name || '',
        note: current.note || '',
        status: published ? 'published' : 'pending',
        published: published ? 'TRUE' : 'FALSE'
      })
    });

    await loadSubmissions();
    setStatus(data.message || 'Updated.', 'success');
  }

  /* ── LIVE PREVIEW BINDINGS ── */
  function bindPreviewInputs(){
    const liveFields = [
      'fieldEvent','fieldTeam','fieldMatchTime','fieldClockTime',
      'fieldHome','fieldAway','fieldHomePens','fieldAwayPens',
      'fieldMediaType','fieldMediaUrl'
    ];

    liveFields.forEach(function(id){
      const el = dom[id];
      if(el) el.addEventListener('input', updatePreview);
    });

    dom.fieldPublished.addEventListener('change', updatePreview);
    dom.fieldPinned.addEventListener('change', updatePreview);
  }

  function handleError(err){
    console.error(err);
    setStatus(err && err.message ? err.message : 'Something went wrong.', 'error');
  }

  /* ── INIT ── */
  function bindEvents(){
    dom.newPostBtn.addEventListener('click', clearEditor);
    dom.reloadBtn.addEventListener('click', () => reloadAll().catch(handleError));
    dom.saveBtn.addEventListener('click', () => savePost().catch(handleError));
    dom.clearBtn.addEventListener('click', clearEditor);
    dom.deleteBtn.addEventListener('click', () => deletePost().catch(handleError));
    dom.tabPostsBtn.addEventListener('click', () => switchTab('posts'));
    dom.tabSubsBtn.addEventListener('click', () => switchTab('subs'));
  }

  async function init(){
    bindEvents();
    bindRichText();
    bindPreviewInputs();
    switchTab('posts');
    clearEditor();
    await reloadAll();
  }

  init().catch(handleError);

})();
</script>

</body>
</html>
