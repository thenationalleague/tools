<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Blog Admin (v3.0)</title>
<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">
<style>
/* Live Blog Admin v3.0 */
:root{
  --red:#9e0000;
  --blue:#223b7c;
  --bg:#f0f2f5;
  --panel:#fff;
  --text:#111;
  --muted:#6b7280;
  --line:#d9dee5;
  --dark:#111;
  --dark2:#1c1c1c;
  --success:#0a7d2a;
  --danger:#b00020;
  --rail-w:280px;
  --topbar-h:52px;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:"carbona-variable",system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size:14px;
  line-height:1.45;
}

/* ── TOPBAR ── */
.topbar{
  position:fixed;
  top:0; left:0; right:0;
  height:var(--topbar-h);
  background:var(--dark);
  color:#fff;
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:10px;
  border-bottom:2px solid var(--red);
  z-index:100;
}

.topbar__brand{
  font-size:.84rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-right:6px;
}

.topbar__version{
  font-size:.64rem;
  opacity:.3;
  font-weight:400;
}

.topbar__sep{
  width:1px;
  height:22px;
  background:rgba(255,255,255,.12);
  flex-shrink:0;
}

/* compact match strip */
.topbar__match{
  display:flex;
  align-items:center;
  gap:6px;
  flex:1 1 auto;
  min-width:0;
  overflow:hidden;
}

.tfield{
  display:flex;
  flex-direction:column;
  gap:2px;
  flex-shrink:0;
}

.tfield__label{
  font-size:.54rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(255,255,255,.35);
  line-height:1;
}

.tfield__input{
  height:28px;
  padding:0 8px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:7px;
  background:rgba(255,255,255,.07);
  color:#fff;
  font:inherit;
  font-size:.78rem;
  outline:none;
  transition:border-color .15s, background .15s;
  min-width:0;
}

.tfield__input:focus{
  border-color:rgba(255,255,255,.35);
  background:rgba(255,255,255,.12);
}

.tfield__input::placeholder{ color:rgba(255,255,255,.25); }

.tfield--w60 .tfield__input{ width:60px; }
.tfield--w80 .tfield__input{ width:80px; }
.tfield--w100 .tfield__input{ width:100px; }
.tfield--w130 .tfield__input{ width:130px; }

.tfield__select{
  height:28px;
  padding:0 6px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:7px;
  background:rgba(255,255,255,.07);
  color:#fff;
  font:inherit;
  font-size:.78rem;
  outline:none;
}

.tfield__select option{ color:#111; background:#fff; }

/* score boxes */
.score-strip{
  display:flex;
  align-items:center;
  gap:4px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:9px;
  padding:4px 8px;
}

.score-strip__label{
  font-size:.58rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:rgba(255,255,255,.35);
  white-space:nowrap;
}

.score-strip__sep{
  font-size:.9rem;
  font-weight:900;
  color:rgba(255,255,255,.3);
  padding:0 2px;
}

.score-input{
  width:36px;
  height:26px;
  text-align:center;
  padding:0 4px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:6px;
  background:rgba(255,255,255,.1);
  color:#fff;
  font:inherit;
  font-size:.84rem;
  font-weight:900;
  outline:none;
}

.score-input:focus{
  border-color:rgba(255,255,255,.4);
  background:rgba(255,255,255,.18);
}

/* topbar toggles */
.ttoggle{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:.7rem;
  font-weight:700;
  color:rgba(255,255,255,.5);
  cursor:pointer;
  flex-shrink:0;
}

.ttoggle input{ display:none; }

.ttoggle__track{
  width:34px;
  height:18px;
  border-radius:999px;
  background:#333;
  position:relative;
  transition:background .2s;
  flex-shrink:0;
}

.ttoggle input:checked + .ttoggle__track{ background:var(--blue); }

.ttoggle__thumb{
  position:absolute;
  top:2px; left:2px;
  width:14px; height:14px;
  border-radius:50%;
  background:#fff;
  transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}

.ttoggle input:checked ~ .ttoggle__thumb{ transform:translateX(16px); }

.topbar__right{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
  margin-left:auto;
}

.topbar__status{
  font-size:.74rem;
  color:rgba(255,255,255,.45);
  white-space:nowrap;
}

.topbar__status.is-error{ color:#f87171; font-weight:700; }
.topbar__status.is-success{ color:#4ade80; font-weight:700; }

/* ── LAYOUT ── */
.layout{
  display:grid;
  grid-template-columns:1fr var(--rail-w);
  min-height:100vh;
  padding-top:var(--topbar-h);
}

/* ── FEED COLUMN ── */
.feed-col{
  min-width:0;
  padding:16px 20px;
  display:flex;
  flex-direction:column;
  gap:0;
}

.feed-col__toolbar{
  display:flex;
  align-items:center;
  gap:10px;
  margin:0 0 14px;
}

.feed-col__title{
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
  flex:1 1 auto;
}

/* ── FEED CARDS ── */
.feed{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* front-end style card */
.fcard{
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--line);
  box-shadow:0 3px 14px rgba(0,0,0,.05);
  cursor:pointer;
  transition:box-shadow .2s, transform .2s;
  position:relative;
}

.fcard:hover{ box-shadow:0 6px 22px rgba(0,0,0,.1); transform:translateY(-1px); }
.fcard.is-editing{ box-shadow:0 0 0 3px var(--red), 0 6px 22px rgba(0,0,0,.1); }
.fcard.is-deleted{ opacity:.35; }
.fcard.is-pinned{ border-color:rgba(216,162,29,.5); }

.fcard.is-preview{
  border-style:dashed;
  border-color:var(--blue);
  opacity:.85;
  cursor:default;
}

.fcard.is-preview:hover{ transform:none; box-shadow:0 3px 14px rgba(0,0,0,.05); }

.fcard__head{
  padding:11px 14px;
  color:#fff;
  border-bottom:3px solid #9e0000;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}

.fcard__head-left{
  display:flex;
  align-items:center;
  gap:9px;
  min-width:0;
  flex:1 1 auto;
}

.fcard__chip{
  display:inline-flex;
  align-items:center;
  min-height:22px;
  padding:0 8px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  font-size:.64rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  white-space:nowrap;
  flex-shrink:0;
}

.fcard__team{
  font-size:.92rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.02em;
  line-height:1.05;
}

.fcard__event{
  font-size:.64rem;
  font-weight:900;
  letter-spacing:.07em;
  text-transform:uppercase;
  opacity:.8;
  margin:2px 0 0;
}

.fcard__score{
  display:inline-flex;
  align-items:center;
  min-height:28px;
  padding:0 12px;
  border-radius:999px;
  background:#fff;
  color:#111;
  font-size:.88rem;
  font-weight:900;
  letter-spacing:.04em;
  flex-shrink:0;
}

.fcard__body{
  padding:11px 14px;
  font-size:.88rem;
  line-height:1.6;
  background:#fff;
  color:#111;
}

.fcard__body p{ margin:0 0 .5em; }
.fcard__body p:last-child{ margin:0; }

.fcard__footer{
  padding:6px 14px 8px;
  background:#fff;
  border-top:1px solid #f0f2f5;
  display:flex;
  align-items:center;
  gap:8px;
}

.fcard__pill{
  display:inline-flex;
  align-items:center;
  min-height:18px;
  padding:0 7px;
  border-radius:999px;
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.fcard__pill--live{ background:#dcfce7; color:#15803d; }
.fcard__pill--draft{ background:#f3f4f6; color:#6b7280; }
.fcard__pill--deleted{ background:#fee2e2; color:#b91c1c; }
.fcard__pill--pinned{ background:#fef9c3; color:#854d0e; }
.fcard__pill--preview{ background:#dbeafe; color:#1e40af; }
.fcard__pill--sub{ background:#ede9fe; color:#5b21b6; }

/* fan note style */
.fcard--sub .fcard__body{
  background:linear-gradient(180deg,#fbfbfc,#fff);
  font-style:italic;
  font-size:.9rem;
}

/* ── EDITOR PANEL ── */
.editor-panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  margin:14px 0 0;
  overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.07);
  display:none;
}

.editor-panel.is-open{ display:block; }

.editor-panel__head{
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  color:#fff;
}

.editor-panel__head--new{ background:var(--blue); }
.editor-panel__head--edit{ background:var(--red); }

.editor-panel__title{
  font-size:.82rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.editor-panel__subtitle{
  font-size:.7rem;
  opacity:.65;
  margin:2px 0 0;
}

.editor-panel__body{
  padding:14px 16px;
}

/* compact editor rows */
.erow{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:flex-end;
  margin:0 0 10px;
}

.erow:last-child{ margin:0; }

.ef{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.ef--grow{ flex:1 1 auto; min-width:80px; }
.ef--fixed60{ width:60px; flex-shrink:0; }
.ef--fixed80{ width:80px; flex-shrink:0; }
.ef--fixed120{ width:120px; flex-shrink:0; }
.ef--fixed160{ width:160px; flex-shrink:0; }

.elabel{
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
}

.einput,
.eselect{
  height:34px;
  padding:0 10px;
  border:1px solid #cfd6de;
  border-radius:8px;
  background:#fff;
  color:#111;
  font:inherit;
  font-size:.84rem;
  outline:none;
  width:100%;
  transition:border-color .15s, box-shadow .15s;
}

.einput:focus,
.eselect:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

/* combo */
.combo{ position:relative; }

.combo__input{
  height:34px;
  padding:0 10px;
  border:1px solid #cfd6de;
  border-radius:8px;
  background:#fff;
  color:#111;
  font:inherit;
  font-size:.84rem;
  outline:none;
  width:100%;
  transition:border-color .15s, box-shadow .15s;
}

.combo__input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

.combo__list{
  position:absolute;
  top:calc(100% + 3px);
  left:0; right:0;
  background:#fff;
  border:1px solid var(--blue);
  border-radius:8px;
  box-shadow:0 8px 20px rgba(0,0,0,.1);
  z-index:50;
  max-height:200px;
  overflow-y:auto;
  display:none;
}

.combo__list.is-open{ display:block; }

.combo__opt{
  padding:7px 10px;
  font-size:.82rem;
  cursor:pointer;
}

.combo__opt:hover,
.combo__opt.is-focused{ background:#eef2f7; }

/* richtext */
.rte-wrap{
  border:1px solid #cfd6de;
  border-radius:8px;
  overflow:hidden;
  transition:border-color .15s, box-shadow .15s;
}

.rte-wrap:focus-within{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

.rte-bar{
  display:flex;
  align-items:center;
  gap:2px;
  padding:4px 7px;
  background:#f8f9fb;
  border-bottom:1px solid #e8ecf2;
}

.rte-btn{
  appearance:none;
  border:0;
  background:transparent;
  border-radius:5px;
  padding:3px 7px;
  cursor:pointer;
  font:inherit;
  font-size:.75rem;
  color:#374151;
  line-height:1;
  transition:background .1s;
}

.rte-btn:hover{ background:#e8ecf2; }
.rte-btn.is-on{ background:#dbeafe; color:var(--blue); }
.rte-btn--b{ font-weight:900; }
.rte-btn--i{ font-style:italic; }

.rte-sep{ width:1px; height:14px; background:#d9dee5; margin:0 2px; }

.rte-editor{
  min-height:80px;
  padding:8px 10px;
  outline:none;
  font-size:.86rem;
  line-height:1.6;
  background:#fff;
  color:#111;
}

.rte-editor:empty::before{
  content:attr(data-ph);
  color:#bbb;
  pointer-events:none;
}

.rte-editor p{ margin:0 0 .4em; }
.rte-editor p:last-child{ margin:0; }

/* toggles in editor */
.etoggle{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:.76rem;
  font-weight:700;
  color:#374151;
  cursor:pointer;
  padding:6px 10px;
  border-radius:8px;
  border:1px solid var(--line);
  background:#f8f9fb;
  white-space:nowrap;
}

.etoggle input{ display:none; }

.etoggle__track{
  width:32px;
  height:17px;
  border-radius:999px;
  background:#d1d5db;
  position:relative;
  transition:background .2s;
  flex-shrink:0;
}

.etoggle input:checked + .etoggle__track{ background:var(--blue); }

.etoggle__thumb{
  position:absolute;
  top:2px; left:2px;
  width:13px; height:13px;
  border-radius:50%;
  background:#fff;
  transition:transform .2s;
  box-shadow:0 1px 2px rgba(0,0,0,.2);
}

.etoggle input:checked ~ .etoggle__thumb{ transform:translateX(15px); }

/* buttons */
.btn{
  appearance:none;
  border:0;
  border-radius:999px;
  cursor:pointer;
  font:inherit;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  white-space:nowrap;
  transition:filter .15s, opacity .15s;
  flex-shrink:0;
}

.btn:hover:not(:disabled){ filter:brightness(.9); }
.btn:disabled{ opacity:.45; cursor:default; }

.btn--xs{ min-height:26px; padding:0 10px; font-size:.64rem; }
.btn--sm{ min-height:30px; padding:0 12px; font-size:.68rem; }
.btn--md{ min-height:36px; padding:0 14px; font-size:.74rem; }
.btn--lg{ min-height:40px; padding:0 18px; font-size:.78rem; }

.btn--red{ background:var(--red); color:#fff; }
.btn--blue{ background:var(--blue); color:#fff; }
.btn--dark{ background:#444; color:#fff; }
.btn--ghost{ background:#eef2f7; color:#111; }
.btn--danger{ background:var(--danger); color:#fff; }
.btn--success{ background:var(--success); color:#fff; }
.btn--white{ background:#fff; color:#111; border:1px solid var(--line); }

.btn-row{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin:12px 0 0;
  padding:12px 16px;
  border-top:1px solid var(--line);
  background:#f8f9fb;
}

/* ── SUBMISSIONS RAIL ── */
.sub-rail{
  background:var(--dark2);
  border-left:1px solid #000;
  display:flex;
  flex-direction:column;
  height:calc(100vh - var(--topbar-h));
  position:sticky;
  top:var(--topbar-h);
  overflow:hidden;
}

.sub-rail__head{
  padding:10px 12px 8px;
  border-bottom:1px solid #2a2a2a;
  flex-shrink:0;
}

.sub-rail__title{
  font-size:.68rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(255,255,255,.4);
  margin:0 0 6px;
}

.sub-rail__counts{
  font-size:.64rem;
  color:rgba(255,255,255,.25);
}

.sub-rail__body{
  flex:1 1 auto;
  overflow-y:auto;
  padding:8px;
}

.sub-rail__body::-webkit-scrollbar{ width:3px; }
.sub-rail__body::-webkit-scrollbar-thumb{ background:#333; border-radius:999px; }

/* submission card */
.scard{
  border-radius:10px;
  margin:0 0 8px;
  overflow:hidden;
  border:1px solid #2a2a2a;
}

.scard__body{
  padding:8px 10px;
  background:#1a1a1a;
}

.scard__name{
  font-size:.74rem;
  font-weight:900;
  color:#fff;
  margin:0 0 2px;
}

.scard__time{
  font-size:.62rem;
  color:rgba(255,255,255,.3);
  margin:0 0 6px;
}

.scard__note{
  font-size:.74rem;
  color:rgba(255,255,255,.6);
  line-height:1.45;
  white-space:pre-wrap;
  word-break:break-word;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.scard__toggle{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.scard__toggle-btn{
  appearance:none;
  border:0;
  padding:7px 4px;
  font:inherit;
  font-size:.62rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .15s, color .15s;
  line-height:1;
}

.scard__toggle-btn--pub{
  background:#1a2e1a;
  color:#4ade80;
}

.scard__toggle-btn--pub.is-active{
  background:#15803d;
  color:#fff;
}

.scard__toggle-btn--hide{
  background:#2e1a1a;
  color:#f87171;
}

.scard__toggle-btn--hide.is-active{
  background:#b91c1c;
  color:#fff;
}

.scard__toggle-btn:hover:not(.is-active){
  filter:brightness(1.3);
}

.rail-empty{
  padding:20px 10px;
  text-align:center;
  font-size:.72rem;
  color:rgba(255,255,255,.2);
}

/* ── MISC ── */
.feed-empty{
  padding:40px 20px;
  text-align:center;
  color:var(--muted);
  font-size:.84rem;
  border:1px dashed var(--line);
  border-radius:16px;
  background:#fff;
}

@media (max-width:900px){
  .layout{ grid-template-columns:1fr; }
  .sub-rail{ height:auto; max-height:50vh; position:relative; top:0; border-left:0; border-top:1px solid #000; }
  .topbar__match{ display:none; }
}

@media (max-width:600px){
  .topbar__status{ display:none; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar__brand">
    Live Blog Admin
    <span class="topbar__version">v3.0</span>
  </div>

  <div class="topbar__sep"></div>

  <!-- Compact match strip -->
  <div class="topbar__match">
    <div class="tfield tfield--w130">
      <div class="tfield__label">Event</div>
      <input class="tfield__input" id="tEvent" type="text" placeholder="goal / HT / FT…" autocomplete="off">
    </div>
    <div class="tfield tfield--w100">
      <div class="tfield__label">Team</div>
      <input class="tfield__input" id="tTeam" type="text" placeholder="BHW / WHU…" autocomplete="off">
    </div>
    <div class="tfield tfield--w60">
      <div class="tfield__label">Match time</div>
      <input class="tfield__input" id="tMatchTime" type="text" placeholder="45'">
    </div>

    <div class="score-strip">
      <div class="tfield__label">Score</div>
      <input class="score-input" id="tHome" type="text" placeholder="0" title="Boreham Wood">
      <span class="score-strip__sep">–</span>
      <input class="score-input" id="tAway" type="text" placeholder="0" title="West Ham United">
    </div>

    <div class="score-strip" style="gap:3px;">
      <div class="tfield__label">Pens</div>
      <input class="score-input" id="tHomePens" type="text" placeholder="–">
      <span class="score-strip__sep">–</span>
      <input class="score-input" id="tAwayPens" type="text" placeholder="–">
    </div>

    <div class="tfield tfield--w100">
      <div class="tfield__label">Media type</div>
      <select class="tfield__select" id="tMediaType">
        <option value="">None</option>
        <option value="image">Image</option>

<script>
(function(){
  'use strict';

  /* Live Blog Admin v3.0 */

  const API = 'https://script.google.com/macros/s/AKfycbwD3Yf25tVVvd0S46eC6ldWDQWK043FdTzwW6VoCHHppGzzg1o1S5vNMFNSbNGGEqlzcw/exec';

  const EVENT_OPTIONS = [
    'Goal','Assist','Attempt saved','Miss','Attempt missed','Attempt blocked',
    'Free kick won','Free kick lost','Offside','Corner','Substitution',
    'Yellow card','Red card','Lineup',
    'Kick-off','Half-time','Full-time','Start',
    'End of first half','End of second half'
  ];

  const TEAM_OPTIONS = ['Boreham Wood','West Ham United'];

  const TEAM_COLORS = {
    'Boreham Wood':   { bg:'linear-gradient(105deg,#000 0%,#000 50%,#e6e6e6 75%,#fff 100%)', border:'#555' },
    'West Ham United':{ bg:'linear-gradient(105deg,#8e1d41 0%,#8e1d41 50%,#81c4dd 75%,#fff 100%)', border:'#81c4dd' }
  };

  const NEUTRAL = { bg:'#223b7c', border:'#9e0000' };

  const state = {
    posts: [],
    submissions: [],
    activeId: '',
    isNew: true,
    search: ''
  };

  const $ = id => document.getElementById(id);

  const dom = {
    status:       $('tStatus'),
    feedEl:       $('feedEl'),
    feedTitle:    $('feedTitle'),
    feedSearch:   $('feedSearch'),
    subRailBody:  $('subRailBody'),
    subCounts:    $('subCounts'),
    editorPanel:  $('editorPanel'),
    editorHead:   $('editorHead'),
    editorTitle:  $('editorTitle'),
    editorSubtitle:$('editorSubtitle'),
    idFieldWrap:  $('idFieldWrap'),
    btnNew:       $('btnNew'),
    btnReload:    $('btnReload'),
    btnSave:      $('btnSave'),
    btnClear:     $('btnClear'),
    btnDelete:    $('btnDelete'),
    btnEditorClose:$('btnEditorClose'),
    // topbar fields
    tEvent:       $('tEvent'),
    tTeam:        $('tTeam'),
    tMatchTime:   $('tMatchTime'),
    tHome:        $('tHome'),
    tAway:        $('tAway'),
    tHomePens:    $('tHomePens'),
    tAwayPens:    $('tAwayPens'),
    tMediaType:   $('tMediaType'),
    tMediaUrl:    $('tMediaUrl'),
    tPublished:   $('tPublished'),
    tPinned:      $('tPinned'),
    // editor fields
    fId:          $('fId'),
    fCopy:        $('fCopy'),
    fClockTime:   $('fClockTime')
  };

  /* ── STATUS ── */
  function setStatus(msg, type){
    dom.status.textContent = msg || '';
    dom.status.classList.remove('is-error','is-success');
    if(type) dom.status.classList.add('is-' + type);
  }

  function escHtml(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /* ── FETCH ── */
  async function apiFetch(params){
    const body = new URLSearchParams();
    Object.entries(params).forEach(([k,v]) => body.append(k, v == null ? '' : String(v)));
    const res = await fetch(API, { method:'POST', body });
    const text = await res.text();
    let data;
    try{ data = JSON.parse(text); }
    catch(e){ throw new Error('Invalid JSON from API.'); }
    if(data && data.ok === false) throw new Error(data.error || 'API error.');
    return data;
  }

  async function apiGet(params){
    const qs = new URLSearchParams(params).toString();
    const res = await fetch(API + '?' + qs);
    const text = await res.text();
    let data;
    try{ data = JSON.parse(text); }
    catch(e){ throw new Error('Invalid JSON from API.'); }
    if(data && data.ok === false) throw new Error(data.error || 'API error.');
    return data;
  }

  /* ── RICH TEXT EXTRACT ── */
  function extractRichData(editorEl){
    const result = { text:'', formats:[] };
    let pos = 0;

    function walk(node){
      if(node.nodeType === Node.TEXT_NODE){
        const t = node.textContent || '';
        result.text += t;
        pos += t.length;
        return;
      }
      if(node.nodeType !== Node.ELEMENT_NODE) return;

      const tag = node.tagName.toUpperCase();

      if(tag === 'BR'){
        result.text += '\n';
        pos += 1;
        return;
      }

      if(tag === 'P' || tag === 'DIV'){
        Array.from(node.childNodes).forEach(walk);
        if(node.nextSibling){
          result.text += '\n';
          pos += 1;
        }
        return;
      }

      const isBold = tag === 'B' || tag === 'STRONG';
      const isItalic = tag === 'I' || tag === 'EM';

      if(isBold || isItalic){
        const start = pos;
        Array.from(node.childNodes).forEach(walk);
        if(pos > start){
          result.formats.push({ start, end: pos, bold: isBold, italic: isItalic });
        }
        return;
      }

      Array.from(node.childNodes).forEach(walk);
    }

    Array.from(editorEl.childNodes).forEach(walk);
    result.text = result.text.replace(/\n+$/, '');
    return result;
  }

  /* ── COLORS ── */
  function getColors(team){
    return TEAM_COLORS[team] || NEUTRAL;
  }

  /* ── FEED RENDER ── */
  function buildFeedItems(){
    const q = state.search.toLowerCase();

    const postItems = state.posts.map(p => ({ type:'post', data:p, sort:p.clockSort || 0, id:p.id }));
    const subItems = state.submissions
      .filter(s => s.published)
      .map(s => ({
        type:'sub',
        data:s,
        sort: s.timestamp_ms || 0,
        id:'sub-' + s.row_id
      }));

    let all = [...postItems, ...subItems].sort((a,b) => {
      if(b.sort !== a.sort) return b.sort - a.sort;
      return String(b.id).localeCompare(String(a.id));
    });

    if(q){
      all = all.filter(item => {
        const d = item.data;
        return (d.team||'').toLowerCase().includes(q)
          || (d.event||'').toLowerCase().includes(q)
          || (d.match_time||'').toLowerCase().includes(q)
          || (d.name||'').toLowerCase().includes(q)
          || (d.note||d.copy_html||'').toLowerCase().includes(q);
      });
    }

    return all;
  }

  function renderFeed(){
    const items = buildFeedItems();

    const total = state.posts.filter(p => !p.deleted).length;
    const live = state.posts.filter(p => p.published && !p.deleted).length;
    dom.feedTitle.textContent = `Live feed — ${live} live of ${total} posts`;

    if(!items.length){
      dom.feedEl.innerHTML = '<div class="feed-empty">No posts yet. Hit + New Post to get started.</div>';
      return;
    }

    // Build preview card for inline insertion
    const previewHtml = buildPreviewCardHtml();

    const cardHtmls = items.map(item => {
      if(item.type === 'sub') return buildSubCardHtml(item.data);
      return buildPostCardHtml(item.data);
    });

    // If editing/new, insert preview at top (or in correct position for edits)
    if(dom.editorPanel.classList.contains('is-open') && previewHtml){
      // For new posts insert at top; for edits replace that card
      if(state.isNew){
        dom.feedEl.innerHTML = previewHtml + cardHtmls.join('');
      } else {
        // replace the card matching activeId with preview
        const replaced = cardHtmls.map((html, i) => {
          const item = items[i];
          if(item.type === 'post' && String(item.data.id) === String(state.activeId)){
            return previewHtml;
          }
          return html;
        });
        dom.feedEl.innerHTML = replaced.join('');
      }
    } else {
      dom.feedEl.innerHTML = cardHtmls.join('');
    }

    // Bind clicks
    dom.feedEl.querySelectorAll('.fcard[data-pid]').forEach(function(el){
      el.addEventListener('click', function(){
        const post = state.posts.find(p => String(p.id) === el.getAttribute('data-pid'));
        if(post) openEditor(post);
      });
    });
  }

  function buildPostCardHtml(post){
    const isEditing = String(post.id) === String(state.activeId) && !state.isNew;
    const colors = getColors(post.team);
    const timeLabel = escHtml(post.match_time || (post.clock_time ? post.clock_time.slice(11,16) : ''));
    const scoreLabel = (post.home !== '' && post.away !== '' && post.home != null && post.away != null)
      ? escHtml(post.home + ' – ' + post.away) : '';

    const pills = [];
    if(post.deleted) pills.push('<span class="fcard__pill fcard__pill--deleted">Deleted</span>');
    else if(post.published) pills.push('<span class="fcard__pill fcard__pill--live">Live</span>');
    else pills.push('<span class="fcard__pill fcard__pill--draft">Draft</span>');
    if(post.pinned && !post.deleted) pills.push('<span class="fcard__pill fcard__pill--pinned">Pinned</span>');

    return `
      <div class="fcard${isEditing?' is-editing':''}${post.deleted?' is-deleted':''}${post.pinned?' is-pinned':''}"
           data-pid="${escHtml(post.id)}">
        <div class="fcard__head" style="background:${colors.bg};border-bottom-color:${colors.border}">
          <div class="fcard__head-left">
            ${timeLabel ? `<span class="fcard__chip">${timeLabel}</span>` : ''}
            <div>
              ${post.team ? `<div class="fcard__team">${escHtml(post.team)}</div>` : ''}
              ${post.event ? `<div class="fcard__event">${escHtml(post.event)}</div>` : ''}
            </div>
          </div>
          ${scoreLabel ? `<span class="fcard__score">${scoreLabel}</span>` : ''}
        </div>
        ${post.copy_html ? `<div class="fcard__body">${post.copy_html}</div>` : ''}
        <div class="fcard__footer">${pills.join('')}</div>
      </div>
    `;
  }

  function buildSubCardHtml(sub){
    const name = escHtml(sub.name || 'Anonymous');
    const note = escHtml(sub.note || '');
    const time = sub.timestamp ? escHtml(sub.timestamp.slice(0,16).replace('T',' ')) : '';

    return `
      <div class="fcard fcard--sub">
        <div class="fcard__head" style="background:#223b7c;border-bottom-color:#9e0000;">
          <div class="fcard__head-left">
            ${time ? `<span class="fcard__chip">${time}</span>` : ''}
            <div class="fcard__team">${name}</div>
          </div>
          <span class="fcard__pill fcard__pill--sub" style="background:rgba(255,255,255,.15);color:#fff;">Fan note</span>
        </div>
        <div class="fcard__body"><em>${note}</em></div>
      </div>
    `;
  }

  function buildPreviewCardHtml(){
    const team = dom.tTeam.value.trim();
    const event = dom.tEvent.value.trim();
    const matchTime = dom.tMatchTime.value.trim();
    const home = dom.tHome.value.trim();
    const away = dom.tAway.value.trim();
    const homePens = dom.tHomePens.value.trim();
    const awayPens = dom.tAwayPens.value.trim();
    const copy = dom.fCopy.innerHTML.trim();

    if(!team && !event && !copy) return '';

    const colors = getColors(team);
    const timeLabel = matchTime ? escHtml(matchTime) : '';
    const scoreLabel = home !== '' && away !== '' ? escHtml(home + ' – ' + away) : '';
    const pensLabel = homePens && awayPens ? escHtml('Pens: ' + homePens + ' – ' + awayPens) : '';

    return `
      <div class="fcard is-preview">
        <div class="fcard__head" style="background:${colors.bg};border-bottom-color:${colors.border}">
          <div class="fcard__head-left">
            ${timeLabel ? `<span class="fcard__chip">${timeLabel}</span>` : ''}
            <div>
              ${team ? `<div class="fcard__team">${escHtml(team)}</div>` : ''}
              ${event ? `<div class="fcard__event">${escHtml(event)}</div>` : ''}
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            ${scoreLabel ? `<span class="fcard__score">${scoreLabel}</span>` : ''}
            ${pensLabel ? `<span class="fcard__chip">${pensLabel}</span>` : ''}
          </div>
        </div>
        ${copy ? `<div class="fcard__body">${copy}</div>` : ''}
        <div class="fcard__footer"><span class="fcard__pill fcard__pill--preview">Preview</span></div>
      </div>
    `;
  }

  /* ── SUBMISSIONS RAIL ── */
  function renderSubRail(){
    const total = state.submissions.length;
    const pending = state.submissions.filter(s => !s.published).length;
    dom.subCounts.textContent = `${total} total · ${pending} pending`;

    if(!total){
      dom.subRailBody.innerHTML = '<div class="rail-empty">No submissions yet.</div>';
      return;
    }

    dom.subRailBody.innerHTML = state.submissions.map(function(item){
      const name = escHtml(item.name || 'Anonymous');
      const note = escHtml(item.note || '');
      const time = item.timestamp ? escHtml(item.timestamp.slice(0,16).replace('T',' ')) : '';
      const isPub = !!item.published;

      return `
        <div class="scard">
          <div class="scard__body">
            <div class="scard__name">${name}</div>
            <div class="scard__time">${time}</div>
            <div class="scard__note">${note}</div>
          </div>
          <div class="scard__toggle">
            <button class="scard__toggle-btn scard__toggle-btn--pub${isPub?' is-active':''}"
                    data-sub="publish" data-row="${item.row_id}" type="button">
              ✓ Publish
            </button>
            <button class="scard__toggle-btn scard__toggle-btn--hide${!isPub?' is-active':''}"
                    data-sub="unpublish" data-row="${item.row_id}" type="button">
              ✕ Hide
            </button>
          </div>
        </div>
      `;
    }).join('');

    dom.subRailBody.querySelectorAll('[data-sub]').forEach(function(btn){
      btn.addEventListener('click', function(){
        updateSub(btn.getAttribute('data-row'), btn.getAttribute('data-sub') === 'publish').catch(handleErr);
      });
    });
  }

  /* ── EDITOR ── */
  function openEditor(post){
    // populate topbar fields
    dom.tEvent.value = post.event || '';
    dom.tTeam.value = post.team || '';
    dom.tMatchTime.value = post.match_time || '';
    dom.tHome.value = post.home != null ? post.home : '';
    dom.tAway.value = post.away != null ? post.away : '';
    dom.tHomePens.value = post.home_pens || '';
    dom.tAwayPens.value = post.away_pens || '';
    dom.tMediaType.value = post.media_type || '';
    dom.tMediaUrl.value = post.media_url || '';
    dom.tPublished.checked = !!post.published;
    dom.tPinned.checked = !!post.pinned;

    // editor fields
    dom.fId.value = post.id || '';
    dom.fClockTime.value = post.clock_time ? post.clock_time.slice(0,16) : '';
    dom.fCopy.innerHTML = post.copy_html || '';
    dom.idFieldWrap.style.display = 'flex';

    state.activeId = post.id;
    state.isNew = false;

    // red head = editing
    dom.editorHead.className = 'editor-panel__head editor-panel__head--edit';
    dom.editorTitle.textContent = 'Editing post';
    dom.editorSubtitle.textContent = (post.team || post.event || post.id || '');

    dom.editorPanel.classList.add('is-open');
    dom.editorPanel.scrollIntoView({ behavior:'smooth', block:'nearest' });

    renderFeed();
    setStatus('Editing: ' + (post.team || post.event || post.id));
  }

  function openNewEditor(){
    clearTopbar();
    dom.fId.value = '';
    dom.fClockTime.value = '';
    dom.fCopy.innerHTML = '';
    dom.idFieldWrap.style.display = 'none';

    state.activeId = '';
    state.isNew = true;

    dom.editorHead.className = 'editor-panel__head editor-panel__head--new';
    dom.editorTitle.textContent = 'New post';
    dom.editorSubtitle.textContent = 'Fill in the topbar fields, add copy below, then save.';

    dom.editorPanel.classList.add('is-open');
    dom.editorPanel.scrollIntoView({ behavior:'smooth', block:'nearest' });

    renderFeed();
    setStatus('New post ready.');
  }

  function closeEditor(){
    dom.editorPanel.classList.remove('is-open');
    state.activeId = '';
    state.isNew = true;
    renderFeed();
  }

  function clearTopbar(){
    dom.tEvent.value = '';
    dom.tTeam.value = '';
    dom.tMatchTime.value = '';
    dom.tHome.value = '';
    dom.tAway.value = '';
    dom.tHomePens.value = '';
    dom.tAwayPens.value = '';
    dom.tMediaType.value = '';
    dom.tMediaUrl.value = '';
    dom.tPublished.checked = true;
    dom.tPinned.checked = false;
  }

  /* ── SAVE / DELETE ── */
  async function savePost(){
    const richData = extractRichData(dom.fCopy);

    const payload = {
      action: 'savePost',
      id: dom.fId.value.trim(),
      published: dom.tPublished.checked ? 'TRUE' : 'FALSE',
      pinned: dom.tPinned.checked ? 'TRUE' : 'FALSE',
      deleted: 'FALSE',
      event: dom.tEvent.value.trim(),
      team: dom.tTeam.value.trim(),
      match_time: dom.tMatchTime.value.trim(),
      clock_time: dom.fClockTime.value.trim(),
      home: dom.tHome.value.trim(),
      away: dom.tAway.value.trim(),
      home_pens: dom.tHomePens.value.trim(),
      away_pens: dom.tAwayPens.value.trim(),
      copy_text: richData.text,
      copy_formats: JSON.stringify(richData.formats),
      media_type: dom.tMediaType.value.trim(),
      media_url: dom.tMediaUrl.value.trim()
    };

    if(!payload.event && !payload.team && !payload.copy_text){
      setStatus('Needs at least event, team or copy.', 'error');
      return;
    }

    setStatus('Saving…');
    dom.btnSave.disabled = true;

    try{
      const data = await apiFetch(payload);
      setStatus(data.message || 'Saved.', 'success');
      await loadPosts();

      if(data.id){
        const saved = state.posts.find(p => String(p.id) === String(data.id));
        if(saved){
          openEditor(saved);
        } else {
          dom.fId.value = data.id;
          dom.idFieldWrap.style.display = 'flex';
          state.activeId = data.id;
          state.isNew = false;
          renderFeed();
        }
      }
    } finally {
      dom.btnSave.disabled = false;
    }
  }

  async function deletePost(){
    const id = dom.fId.value.trim();
    if(!id){ setStatus('No post selected.', 'error'); return; }
    if(!window.confirm('Soft-delete this post?')) return;

    setStatus('Deleting…');
    const data = await apiFetch({ action:'deletePost', id });
    setStatus(data.message || 'Deleted.', 'success');
    closeEditor();
    await loadPosts();
  }

  /* ── SUBMISSIONS ── */
  async function updateSub(rowId, publish){
    const current = state.submissions.find(s => String(s.row_id) === String(rowId));
    if(!current){ setStatus('Submission not found.', 'error'); return; }

    // Optimistic UI update
    current.published = publish;
    renderSubRail();
    renderFeed();

    try{
      await apiFetch({
        action: 'updateSubmission',
        row_id: rowId,
        name: current.name || '',
        note: current.note || '',
        status: publish ? 'published' : 'pending',
        published: publish ? 'TRUE' : 'FALSE'
      });
      setStatus(publish ? 'Published.' : 'Hidden.', 'success');
    } catch(err) {
      // Revert on failure
      current.published = !publish;
      renderSubRail();
      renderFeed();
      handleErr(err);
    }
  }

  /* ── API LOAD ── */
  async function loadPosts(){
    const data = await apiGet({ action:'listPosts' });
    state.posts = Array.isArray(data.items) ? data.items : [];
    renderFeed();
  }

  async function loadSubs(){
    const data = await apiGet({ action:'listSubmissions' });
    state.submissions = Array.isArray(data.items) ? data.items : [];
    renderSubRail();
    renderFeed();
  }

  async function reloadAll(){
    setStatus('Loading…');
    await Promise.all([loadPosts(), loadSubs()]);
    setStatus('Loaded.', 'success');
  }

  /* ── RTE ── */
  function bindRTE(){
    document.querySelectorAll('.rte-btn[data-cmd]').forEach(function(btn){
      btn.addEventListener('mousedown', function(e){
        e.preventDefault();
        const cmd = btn.getAttribute('data-cmd');
        if(cmd === 'para') document.execCommand('insertHTML', false, '<p><br></p>');
        else if(cmd === 'br') document.execCommand('insertHTML', false, '<br>');
        else if(cmd === 'clear') document.execCommand('removeFormat', false, null);
        else document.execCommand(cmd, false, null);
        dom.fCopy.focus();
        syncRTEBar();
        renderFeed();
      });
    });

    dom.fCopy.addEventListener('input', () => { syncRTEBar(); renderFeed(); });
    dom.fCopy.addEventListener('keyup', syncRTEBar);
    dom.fCopy.addEventListener('mouseup', syncRTEBar);
  }

  function syncRTEBar(){
    ['bold','italic'].forEach(function(cmd){
      const btn = document.querySelector(`.rte-btn[data-cmd="${cmd}"]`);
      if(btn) btn.classList.toggle('is-on', document.queryCommandState(cmd));
    });
  }

  /* ── EVENTS ── */
  function handleErr(err){
    console.error(err);
    setStatus(err && err.message ? err.message : 'Something went wrong.', 'error');
  }

  function bindEvents(){
    dom.btnNew.addEventListener('click', openNewEditor);
    dom.btnReload.addEventListener('click', () => reloadAll().catch(handleErr));
    dom.btnSave.addEventListener('click', () => savePost().catch(handleErr));
    dom.btnClear.addEventListener('click', openNewEditor);
    dom.btnDelete.addEventListener('click', () => deletePost().catch(handleErr));
    dom.btnEditorClose.addEventListener('click', closeEditor);

    dom.feedSearch.addEventListener('input', function(){
      state.search = dom.feedSearch.value;
      renderFeed();
    });

    // All topbar fields trigger live preview re-render
    [dom.tEvent, dom.tTeam, dom.tMatchTime, dom.tHome, dom.tAway,
     dom.tHomePens, dom.tAwayPens, dom.tMediaUrl].forEach(function(el){
      el.addEventListener('input', renderFeed);
    });

    dom.tMediaType.addEventListener('change', renderFeed);
    dom.tPublished.addEventListener('change', renderFeed);
    dom.tPinned.addEventListener('change', renderFeed);
  }

  /* ── INIT ── */
  async function init(){
    bindRTE();
    bindEvents();
    await reloadAll();
  }

  init().catch(handleErr);

})();
</script>
</body>
</html>
