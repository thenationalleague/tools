<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Blog Admin v37</title>
<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">
<style>
:root{
  --red:#9e0000;
  --blue:#223b7c;
  --bg:#f0f2f5;
  --panel:#fff;
  --text:#111;
  --muted:#6b7280;
  --line:#d9dee5;
  --dark:#111;
  --dark2:#1c1c1c;
  --danger:#b00020;
  --rail-w:290px;
  --topbar-h:52px;
  --bottombar-h:56px;
  --feed-max:800px;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; background:var(--bg); color:var(--text); font-family:"carbona-variable",system-ui,-apple-system,"Segoe UI",sans-serif; font-size:14px; line-height:1.45; }

@media (max-width:768px){
  html,body{ font-size:20px !important; }
}

/* ── TOPBAR ── */
.topbar{ position:fixed; top:0; left:0; right:0; height:var(--topbar-h); background:var(--dark); color:#fff; display:flex; align-items:center; padding:0 14px; gap:10px; border-bottom:2px solid var(--red); z-index:100; }
.topbar__brand{ font-size:.84rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase; white-space:nowrap; }
.topbar__version{ font-size:.64rem; opacity:.3; font-weight:400; margin-left:5px; }
.topbar__sep{ width:1px; height:22px; background:rgba(255,255,255,.12); flex-shrink:0; }
.topbar__right{ display:flex; align-items:center; gap:8px; margin-left:auto; flex-shrink:0; }
.topbar__status{ font-size:.74rem; color:rgba(255,255,255,.45); white-space:nowrap; }
.topbar__status.is-error{ color:#f87171; font-weight:700; }
.topbar__status.is-success{ color:#4ade80; font-weight:700; }

/* ── LAYOUT ── */
.layout{ display:grid; grid-template-columns:1fr var(--rail-w); min-height:100vh; padding-top:var(--topbar-h); }
.feed-col{ min-width:0; display:flex; flex-direction:column; }

/* ── EDITOR ── */
.editor-wrap{ position:sticky; top:var(--topbar-h); z-index:50; background:var(--bg); border-bottom:2px solid var(--line); box-shadow:0 4px 14px rgba(0,0,0,.07); }
.editor-collapsed{ display:flex; align-items:center; gap:10px; padding:8px 16px; background:var(--dark2); cursor:pointer; transition:background .15s; user-select:none; }
.editor-collapsed:hover{ background:#242424; }
.editor-collapsed__info{ flex:1 1 auto; min-width:0; }
.editor-collapsed__title{ font-size:.76rem; font-weight:900; letter-spacing:.05em; text-transform:uppercase; color:#fff; }
.editor-collapsed__sub{ font-size:.66rem; color:rgba(255,255,255,.32); margin:2px 0 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.editor-collapsed__chevron{ font-size:.8rem; color:rgba(255,255,255,.35); transition:transform .2s; flex-shrink:0; }
.editor-collapsed__chevron.is-open{ transform:rotate(180deg); }
.editor-panel{ background:var(--panel); display:none; }
.editor-panel.is-open{ display:block; }
.editor-panel__head{ padding:11px 16px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; color:#fff; border-bottom:3px solid rgba(0,0,0,.15); }
.editor-panel__head--new,.editor-panel__head--edit{ background:var(--blue); }
.editor-panel__title{ font-size:.82rem; font-weight:900; letter-spacing:.05em; text-transform:uppercase; }
.editor-panel__subtitle{ font-size:.68rem; opacity:.65; margin:2px 0 0; }
.editor-panel__id{ font-size:.62rem; opacity:.4; margin:3px 0 0; font-family:monospace; word-break:break-all; }
.editor-body{ padding:12px 16px; display:flex; flex-direction:column; gap:10px; }
.erow{ display:flex; flex-wrap:wrap; gap:8px; align-items:flex-end; }
.ef{ display:flex; flex-direction:column; gap:3px; min-width:0; }
.ef--grow{ flex:1 1 auto; }
.ef--w80{ width:80px; flex-shrink:0; }
.ef--w120{ width:120px; flex-shrink:0; }
.elabel{ font-size:.6rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
.einput,.eselect{ height:32px; padding:0 9px; border:1px solid #cfd6de; border-radius:7px; background:#fff; color:#111; font:inherit; font-size:.82rem; outline:none; width:100%; transition:border-color .15s,box-shadow .15s; }
.einput:focus,.eselect:focus{ border-color:var(--blue); box-shadow:0 0 0 3px rgba(34,59,124,.1); }
.combo{ position:relative; }
.combo__input{ height:32px; padding:0 9px; border:1px solid #cfd6de; border-radius:7px; background:#fff; color:#111; font:inherit; font-size:.82rem; outline:none; width:100%; transition:border-color .15s,box-shadow .15s; }
.combo__input:focus{ border-color:var(--blue); box-shadow:0 0 0 3px rgba(34,59,124,.1); }
.combo__list{ position:absolute; top:calc(100% + 3px); left:0; right:0; background:#fff; border:1px solid var(--blue); border-radius:8px; box-shadow:0 8px 20px rgba(0,0,0,.12); z-index:200; max-height:200px; overflow-y:auto; display:none; }
.combo__list.is-open{ display:block; }
.combo__opt{ padding:7px 10px; font-size:.82rem; cursor:pointer; }
.combo__opt:hover,.combo__opt.is-focused{ background:#eef2f7; }
.score-strip{ display:flex; align-items:center; gap:4px; background:#f8f9fb; border:1px solid var(--line); border-radius:8px; padding:0 8px; height:32px; flex-shrink:0; }
.score-strip__label{ font-size:.58rem; font-weight:900; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
.score-strip__sep{ font-size:.9rem; font-weight:900; color:#ccc; }
.score-input{ width:32px; height:22px; text-align:center; padding:0 3px; border:1px solid #cfd6de; border-radius:5px; background:#fff; color:#111; font:inherit; font-size:.82rem; font-weight:900; outline:none; }
.score-input:focus{ border-color:var(--blue); box-shadow:0 0 0 2px rgba(34,59,124,.1); }
.rte-wrap{ border:1px solid #cfd6de; border-radius:8px; overflow:hidden; transition:border-color .15s,box-shadow .15s; }
.rte-wrap:focus-within{ border-color:var(--blue); box-shadow:0 0 0 3px rgba(34,59,124,.1); }
.rte-bar{ display:flex; align-items:center; gap:2px; padding:4px 7px; background:#f8f9fb; border-bottom:1px solid #e8ecf2; }
.rte-btn{ appearance:none; border:0; background:transparent; border-radius:5px; padding:3px 7px; cursor:pointer; font:inherit; font-size:.76rem; color:#374151; line-height:1; transition:background .1s; }
.rte-btn:hover{ background:#e8ecf2; }
.rte-btn.is-on{ background:#dbeafe; color:var(--blue); }
.rte-btn--b{ font-weight:900; }
.rte-btn--i{ font-style:italic; }
.rte-sep{ width:1px; height:14px; background:#d9dee5; margin:0 2px; }
.rte-editor{ min-height:70px; padding:8px 10px; outline:none; font-size:.86rem; line-height:1.6; background:#fff; color:#111; }
.rte-editor:empty::before{ content:attr(data-ph); color:#bbb; pointer-events:none; }
.rte-editor p{ margin:0 0 .4em; }
.rte-editor p:last-child{ margin:0; }
.editor-actions{ padding:10px 16px; border-top:1px solid var(--line); background:#f8f9fb; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.status-btn{ appearance:none; border:2px solid transparent; border-radius:999px; cursor:pointer; font:inherit; font-weight:900; letter-spacing:.04em; text-transform:uppercase; display:inline-flex; align-items:center; gap:6px; padding:0 14px; min-height:36px; font-size:.74rem; transition:all .15s; flex-shrink:0; }
.status-btn--publish{ background:#f0fdf4; color:#15803d; border-color:#86efac; }
.status-btn--publish.is-on{ background:#15803d; color:#fff; border-color:#15803d; }
.status-btn--pin{ background:#fefce8; color:#854d0e; border-color:#fde68a; }
.status-btn--pin.is-on{ background:#854d0e; color:#fff; border-color:#854d0e; }
.status-btn__dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.status-btn--publish .status-btn__dot{ background:#86efac; }
.status-btn--publish.is-on .status-btn__dot{ background:rgba(255,255,255,.6); }
.status-btn--pin .status-btn__dot{ background:#fde68a; }
.status-btn--pin.is-on .status-btn__dot{ background:rgba(255,255,255,.6); }
.status-label{ display:inline-flex; align-items:center; min-height:22px; padding:0 9px; border-radius:999px; font-size:.64rem; font-weight:900; letter-spacing:.05em; text-transform:uppercase; }
.status-label--draft{ background:#f3f4f6; color:#6b7280; }
.status-label--published{ background:#dcfce7; color:#15803d; }
.status-label--unpublished{ background:#fee2e2; color:#b91c1c; }
.btn{ appearance:none; border:0; border-radius:999px; cursor:pointer; font:inherit; font-weight:900; letter-spacing:.04em; text-transform:uppercase; display:inline-flex; align-items:center; justify-content:center; gap:5px; white-space:nowrap; transition:filter .15s,opacity .15s; flex-shrink:0; }
.btn:hover:not(:disabled){ filter:brightness(.9); }
.btn:disabled{ opacity:.45; cursor:default; }
.btn--sm{ min-height:30px; padding:0 12px; font-size:.68rem; }
.btn--md{ min-height:36px; padding:0 14px; font-size:.74rem; }
.btn--blue{ background:var(--blue); color:#fff; }
.btn--ghost{ background:#eef2f7; color:#111; }
.btn--danger{ background:var(--danger); color:#fff; }

/* ── FEED ── */
.feed-toolbar{ padding:10px 16px; display:flex; align-items:center; gap:10px; }
.feed-toolbar__title{ font-size:.72rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); flex:1 1 auto; }
.feed{ padding:0 16px 24px; display:flex; flex-direction:column; gap:10px; align-items:center; }
.fcard{ width:100%; max-width:var(--feed-max); border-radius:18px; overflow:hidden; border:1px solid var(--line); box-shadow:0 3px 14px rgba(0,0,0,.05); cursor:pointer; transition:box-shadow .2s,transform .15s; position:relative; }
.fcard:hover{ box-shadow:0 6px 22px rgba(0,0,0,.1); transform:translateY(-1px); }
.fcard.is-editing{ box-shadow:0 0 0 3px var(--blue),0 6px 22px rgba(0,0,0,.1); transform:none; cursor:default; }
.fcard.is-pinned{ border-color:rgba(216,162,29,.5); }
.fcard--sub{ cursor:default; }
.fcard--sub:hover{ transform:none; box-shadow:0 3px 14px rgba(0,0,0,.05); }
.fcard__head{ padding:11px 14px; color:#fff; border-bottom:3px solid #9e0000; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.fcard__head-left{ display:flex; align-items:center; gap:9px; min-width:0; flex:1 1 auto; }
.fcard__chip{ display:inline-flex; align-items:center; min-height:22px; padding:0 8px; border-radius:999px; background:rgba(255,255,255,.15); font-size:.64rem; font-weight:900; letter-spacing:.05em; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
.fcard__team{ font-size:.92rem; font-weight:900; text-transform:uppercase; letter-spacing:.02em; line-height:1.05; }
.fcard__event{ font-size:.64rem; font-weight:900; letter-spacing:.07em; text-transform:uppercase; opacity:.8; margin:2px 0 0; }
.fcard__score-wrap{ display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.fcard__score{ display:inline-flex; align-items:center; min-height:28px; padding:0 12px; border-radius:999px; background:#fff; color:#111; font-size:.88rem; font-weight:900; letter-spacing:.04em; }
.fcard__pens{ display:inline-flex; align-items:center; min-height:20px; padding:0 8px; border-radius:999px; background:rgba(255,255,255,.15); color:#fff; font-size:.6rem; font-weight:900; letter-spacing:.04em; white-space:nowrap; }
.fcard__body{ padding:11px 14px; font-size:.88rem; line-height:1.6; background:#fff; color:#111; }
.fcard__body p{ margin:0 0 .5em; }
.fcard__body p:last-child{ margin:0; }
.fcard__footer{ padding:6px 14px 8px; background:#fff; border-top:1px solid #f0f2f5; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.fpill{ display:inline-flex; align-items:center; min-height:18px; padding:0 7px; border-radius:999px; font-size:.6rem; font-weight:900; letter-spacing:.05em; text-transform:uppercase; }
.fpill--live{ background:#dcfce7; color:#15803d; }
.fpill--draft{ background:#f3f4f6; color:#6b7280; }
.fpill--pinned{ background:#fef9c3; color:#854d0e; }
.fpill--editing{ background:#dbeafe; color:#1e40af; }
.fcard__icon{ width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
.fcard__icon img{ display:block; width:22px; height:22px; object-fit:contain; filter:invert(1) drop-shadow(0 1px 2px rgba(0,0,0,.28)); }
.fcard--sub{ background:radial-gradient(circle at top left,rgba(34,59,124,.07) 0%,rgba(34,59,124,0) 34%),radial-gradient(circle at bottom right,rgba(158,0,0,.06) 0%,rgba(158,0,0,0) 34%),#fbfbfc; border-color:#dbe2f3; display:flex; flex-direction:column; min-height:160px; }
.fcard--sub .fcard__main{ padding:18px 18px 10px; text-align:center; flex:1 1 auto; }
.fcard--sub .fan-time{ display:inline-flex; align-items:center; justify-content:center; min-height:24px; padding:0 10px; margin:0 0 10px; border-radius:999px; background:#fff; color:#223b7c; border:1px solid rgba(34,59,124,.12); font-size:.7rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase; }
.fcard--sub .fan-quote{ margin:0 0 10px; color:#1c2330; font-size:1.3rem; line-height:1.3; font-weight:400; font-style:italic; font-family:"Viktorie","Times New Roman",serif; }
.fcard--sub .fan-byline{ color:#4e5a6d; font-size:.86rem; font-weight:500; }
.fcard--sub .fcard__strip{ background:#223b7c; padding:8px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.fcard--sub .fcard__strip-label{ font-size:.72rem; font-weight:900; letter-spacing:.05em; text-transform:uppercase; color:rgba(255,255,255,.6); }
.feed-empty{ width:100%; max-width:var(--feed-max); padding:40px 20px; text-align:center; color:var(--muted); font-size:.84rem; border:1px dashed var(--line); border-radius:16px; background:#fff; }

/* ── DESKTOP RAIL ── */
.sub-rail{ background:var(--dark2); border-left:1px solid #000; display:flex; flex-direction:column; height:calc(100vh - var(--topbar-h)); position:sticky; top:var(--topbar-h); overflow:hidden; }
.sub-rail__head{ padding:10px 12px 8px; border-bottom:1px solid #2a2a2a; flex-shrink:0; }
.sub-rail__title{ font-size:.68rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,.4); margin:0 0 3px; }
.sub-rail__counts{ font-size:.62rem; color:rgba(255,255,255,.22); }
.sub-rail__body{ flex:1 1 auto; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:8px; }
.sub-rail__body::-webkit-scrollbar{ width:3px; }
.sub-rail__body::-webkit-scrollbar-thumb{ background:#333; border-radius:999px; }

/* scard — shared desktop + mobile */
.scard{ border-radius:10px; overflow:hidden; border:1px solid #383838; background:#222; }
.scard__body{ padding:10px 12px; }
.scard__name{ font-size:.9rem; font-weight:900; color:#fff; margin:0 0 2px; }
.scard__time{ font-size:.74rem; color:rgba(255,255,255,.5); margin:0 0 7px; }
.scard__note{ font-size:.88rem; color:rgba(255,255,255,.85); line-height:1.5; white-space:pre-wrap; word-break:break-word; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; margin:0; }
.scard__actions{ display:grid; grid-template-columns:1fr 1fr auto; border-top:1px solid #333; }
.scard__btn{ appearance:none; border:0; padding:10px 4px; font:inherit; font-size:.76rem; font-weight:900; letter-spacing:.04em; text-transform:uppercase; cursor:pointer; transition:background .12s,color .12s; line-height:1; }
.scard__btn--pub{ background:#1a2a1a; color:#4ade80; border-right:1px solid #333; }
.scard__btn--pub.is-active{ background:#15803d; color:#fff; }
.scard__btn--hide{ background:#2a1a1a; color:#f87171; border-right:1px solid #333; }
.scard__btn--hide.is-active{ background:#b91c1c; color:#fff; }
.scard__btn--del{ background:#1a1a1a; color:rgba(255,255,255,.4); padding:10px 10px; font-size:.8rem; }
.scard__btn:hover:not(.is-active){ filter:brightness(1.4); }
.rail-empty{ padding:20px 10px; text-align:center; font-size:.82rem; color:rgba(255,255,255,.35); }

/* ── MOBILE ONLY ── */
@media (max-width:768px){
  .layout{ grid-template-columns:1fr; padding-bottom:var(--bottombar-h); }
  .sub-rail{ display:none; }
  .editor-wrap{ display:none; }
  .erow{ flex-direction:column !important; }
  .ef,.ef--grow,.ef--w80,.ef--w120{ width:100% !important; flex:none !important; }
  .score-strip{ width:100%; }
  .sheet__body .erow{ flex-direction:column !important; }
  .sheet__body .ef{ width:100% !important; }
  .topbar__status{ display:none; }

  /* tabs */
  .mobile-tabs{ display:flex; position:fixed; bottom:0; left:0; right:0; height:var(--bottombar-h); background:var(--dark); border-top:2px solid var(--red); z-index:150; }
  .mobile-tab{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; appearance:none; border:0; background:transparent; color:rgba(255,255,255,.55); cursor:pointer; font:inherit; font-size:.68rem; font-weight:900; letter-spacing:.04em; text-transform:uppercase; padding:6px 0; position:relative; transition:color .15s; }
  .mobile-tab.is-active{ color:#fff; }
  .mobile-tab svg{ width:22px; height:22px; display:block; }
  .mobile-tab__badge{ position:absolute; top:6px; right:calc(50% - 20px); min-width:16px; height:16px; padding:0 4px; background:var(--red); color:#fff; border-radius:999px; font-size:.54rem; font-weight:900; display:none; align-items:center; justify-content:center; }
  .mobile-tab__badge.is-visible{ display:inline-flex; }

  /* FAB */
  .fab{ display:flex; position:fixed; bottom:calc(var(--bottombar-h) + 14px); right:16px; width:52px; height:52px; border-radius:50%; background:var(--blue); color:#fff; border:0; cursor:pointer; z-index:160; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(34,59,124,.45); font-size:1.6rem; font-weight:300; line-height:1; transition:transform .15s,background .2s; }
  .fab.is-editing{ background:var(--red); }

  /* panels */
  .mobile-panel{ display:none; width:100%; }
  .mobile-panel.is-active{ display:block; }

  /* subs panel */
  .mobile-subs-wrap{ background:var(--dark2); min-height:calc(100vh - var(--topbar-h) - var(--bottombar-h)); display:flex; flex-direction:column; }
  .mobile-subs-head{ padding:14px 16px 12px; border-bottom:1px solid #333; }
  .mobile-subs-title{ font-size:.84rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,.75); }
  .mobile-subs-counts{ font-size:.78rem; color:rgba(255,255,255,.45); margin:3px 0 0; }
  .mobile-subs-body{ flex:1; padding:10px; display:flex; flex-direction:column; gap:8px; }

  /* bottom sheet */
  .sheet-backdrop{ display:block; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
  .sheet-backdrop.is-open{ opacity:1; pointer-events:auto; }
  .sheet{ display:flex; flex-direction:column; position:fixed; left:0; right:0; bottom:0; z-index:201; background:#fff; border-radius:20px 20px 0 0; box-shadow:0 -8px 32px rgba(0,0,0,.18); max-height:92vh; transform:translateY(100%); transition:transform .3s cubic-bezier(.22,.68,0,1.1); }
  .sheet.is-open{ transform:translateY(0); }
  .sheet__handle{ display:flex; justify-content:center; padding:10px 0 4px; cursor:grab; flex-shrink:0; }
  .sheet__handle-bar{ width:36px; height:4px; border-radius:999px; background:#d1d5db; }
  .sheet__head{ flex-shrink:0; padding:8px 16px 12px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; color:#fff; border-bottom:3px solid rgba(0,0,0,.15); }
  .sheet__head--new,.sheet__head--edit{ background:var(--blue); }
  .sheet__title{ font-size:.82rem; font-weight:900; letter-spacing:.05em; text-transform:uppercase; }
  .sheet__subtitle{ font-size:.68rem; opacity:.65; margin:2px 0 0; }
  .sheet__id{ font-size:.62rem; opacity:.4; margin:3px 0 0; font-family:monospace; word-break:break-all; }
  .sheet__close{ appearance:none; border:0; background:rgba(255,255,255,.2); color:#fff; border-radius:50%; width:28px; height:28px; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .sheet__body{ flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:12px; -webkit-overflow-scrolling:touch; }
  .sheet__actions{ flex-shrink:0; padding:10px 16px 20px; border-top:1px solid var(--line); background:#f8f9fb; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
}

/* hide mobile elements on desktop */
@media (min-width:769px){
  .mobile-tabs,.fab,.sheet,.sheet-backdrop,.mobile-panel{ display:none !important; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar__brand">Live Blog Admin<span class="topbar__version">v37</span></div>
  <div class="topbar__sep"></div>
  <div class="topbar__right">
    <div class="topbar__status" id="tStatus">Ready.</div>
    <button class="btn btn--ghost btn--sm" id="btnReload" type="button">Reload</button>
  </div>
</header>

<div class="layout">
  <div class="feed-col">

    <!-- DESKTOP EDITOR (hidden on mobile) -->
    <div class="editor-wrap" id="editorWrap">
      <div class="editor-collapsed" id="editorCollapsed">
        <div class="editor-collapsed__info">
          <div class="editor-collapsed__title" id="collapsedTitle">+ New Post</div>
          <div class="editor-collapsed__sub" id="collapsedSub">Click to compose · or click a post in the feed to edit</div>
        </div>

<script>
(function(){
'use strict';

const API='https://script.google.com/macros/s/AKfycbwD3Yf25tVVvd0S46eC6ldWDQWK043FdTzwW6VoCHHppGzzg1o1S5vNMFNSbNGGEqlzcw/exec';
const ICON_BASE='https://raw.githubusercontent.com/rckd-nl/nl-tools/main/assets/icons/';
const ICON_MAP={'goal':ICON_BASE+'goal.svg','assist':ICON_BASE+'goal.svg','yellow card':ICON_BASE+'yellow-card.svg','red card':ICON_BASE+'red-card.svg','substitution':ICON_BASE+'substitution.svg','corner':ICON_BASE+'corner.svg','offside':ICON_BASE+'offside.svg','free kick won':ICON_BASE+'free-kick.svg','free kick lost':ICON_BASE+'free-kick.svg','attempt saved':ICON_BASE+'save.svg','miss':ICON_BASE+'miss.svg','attempt missed':ICON_BASE+'miss.svg','attempt blocked':ICON_BASE+'block.svg','lineup':ICON_BASE+'lineup.svg','kick-off':ICON_BASE+'play.svg','start':ICON_BASE+'play.svg','half-time':ICON_BASE+'stop.svg','full-time':ICON_BASE+'stop.svg','end of first half':ICON_BASE+'stop.svg','end of second half':ICON_BASE+'stop.svg'};
const EVENT_OPTIONS=['Goal','Assist','Attempt saved','Miss','Attempt missed','Attempt blocked','Free kick won','Free kick lost','Offside','Corner','Substitution','Yellow card','Red card','Lineup','Kick-off','Half-time','Full-time','Start','End of first half','End of second half'];
const TEAM_OPTIONS=['Boreham Wood','West Ham United'];
const TEAM_COLORS={'Boreham Wood':{bg:'linear-gradient(105deg,#000 0%,#000 50%,#e6e6e6 75%,#fff 100%)',border:'#555'},'West Ham United':{bg:'linear-gradient(105deg,#8e1d41 0%,#8e1d41 50%,#81c4dd 75%,#fff 100%)',border:'#81c4dd'}};
const NEUTRAL={bg:'#223b7c',border:'#9e0000'};

const state={posts:[],submissions:[],hiddenSubs:new Set(),activeId:'',isNew:true,isPublished:false,isPinned:false,editorOpen:false,search:'',renderTimer:null};

const $=id=>document.getElementById(id);
const dom={
  status:$('tStatus'),feedEl:$('feedEl'),feedTitle:$('feedTitle'),feedSearch:$('feedSearch'),
  subRailBody:$('subRailBody'),subCounts:$('subCounts'),
  subRailBodyMobile:$('subRailBodyMobile'),subCountsMobile:$('subCountsMobile'),subBadge:$('subBadge'),
  editorCollapsed:$('editorCollapsed'),collapsedTitle:$('collapsedTitle'),collapsedSub:$('collapsedSub'),collapsedChevron:$('collapsedChevron'),
  editorPanel:$('editorPanel'),editorHead:$('editorHead'),editorTitle:$('editorTitle'),editorSubtitle:$('editorSubtitle'),editorId:$('editorId'),clockTimeField:$('clockTimeField'),
  statusLabel:$('statusLabel'),btnPublish:$('btnPublish'),btnPublishLabel:$('btnPublishLabel'),btnPin:$('btnPin'),btnPinLabel:$('btnPinLabel'),btnUpdate:$('btnUpdate'),btnCancel:$('btnCancel'),btnDelete:$('btnDelete'),
  fEvent:$('fEvent'),fTeam:$('fTeam'),fMatchTime:$('fMatchTime'),fClockTime:$('fClockTime'),fHome:$('fHome'),fAway:$('fAway'),fHomePens:$('fHomePens'),fAwayPens:$('fAwayPens'),fCopy:$('fCopy'),fMediaType:$('fMediaType'),fMediaUrl:$('fMediaUrl'),
  fab:$('fab'),sheet:$('sheet'),sheetBackdrop:$('sheetBackdrop'),sheetHead:$('sheetHead'),sheetTitle:$('sheetTitle'),sheetSubtitle:$('sheetSubtitle'),sheetId:$('sheetId'),sheetClose:$('sheetClose'),sheetHandle:$('sheetHandle'),
  sfStatusLabel:$('sfStatusLabel'),sfBtnPublish:$('sfBtnPublish'),sfBtnPublishLabel:$('sfBtnPublishLabel'),sfBtnPin:$('sfBtnPin'),sfBtnPinLabel:$('sfBtnPinLabel'),sfBtnUpdate:$('sfBtnUpdate'),sfBtnCancel:$('sfBtnCancel'),sfBtnDelete:$('sfBtnDelete'),
  sfEvent:$('sfEvent'),sfTeam:$('sfTeam'),sfMatchTime:$('sfMatchTime'),sfClockTime:$('sfClockTime'),sfClockTimeField:$('sfClockTimeField'),sfHome:$('sfHome'),sfAway:$('sfAway'),sfHomePens:$('sfHomePens'),sfAwayPens:$('sfAwayPens'),sfCopy:$('sfCopy'),sfMediaType:$('sfMediaType'),sfMediaUrl:$('sfMediaUrl'),
  tabFeed:$('tabFeed'),tabSubs:$('tabSubs'),panelSubs:$('panelSubs')
};

function isMobile(){ return window.innerWidth<=768; }
function setStatus(msg,type){ dom.status.textContent=msg||''; dom.status.classList.remove('is-error','is-success'); if(type) dom.status.classList.add('is-'+type); }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function getColors(team){ return TEAM_COLORS[team]||NEUTRAL; }
function getEventIcon(event){ if(!event) return ''; const url=ICON_MAP[(event||'').toLowerCase()]; if(!url) return ''; return `<span class="fcard__icon"><img src="${escHtml(url)}" alt="" width="22" height="22"></span>`; }

async function apiFetch(params){ const body=new URLSearchParams(); Object.entries(params).forEach(([k,v])=>body.append(k,v==null?'':String(v))); const res=await fetch(API,{method:'POST',body}); const text=await res.text(); let data; try{ data=JSON.parse(text); }catch(e){ throw new Error('Invalid JSON from API.'); } if(data&&data.ok===false) throw new Error(data.error||'API error.'); return data; }
async function apiGet(params){ const qs=new URLSearchParams(params).toString(); const res=await fetch(API+'?'+qs); const text=await res.text(); let data; try{ data=JSON.parse(text); }catch(e){ throw new Error('Invalid JSON from API.'); } if(data&&data.ok===false) throw new Error(data.error||'API error.'); return data; }

function extractRichData(el){ const result={text:'',formats:[]}; let pos=0; function walk(node){ if(node.nodeType===Node.TEXT_NODE){ const t=node.textContent||''; result.text+=t; pos+=t.length; return; } if(node.nodeType!==Node.ELEMENT_NODE) return; const tag=node.tagName.toUpperCase(); if(tag==='BR'){ result.text+='\n'; pos+=1; return; } if(tag==='P'||tag==='DIV'){ Array.from(node.childNodes).forEach(walk); if(node.nextSibling){ result.text+='\n'; pos+=1; } return; } const isBold=tag==='B'||tag==='STRONG'; const isItalic=tag==='I'||tag==='EM'; if(isBold||isItalic){ const start=pos; Array.from(node.childNodes).forEach(walk); if(pos>start) result.formats.push({start,end:pos,bold:isBold,italic:isItalic}); return; } Array.from(node.childNodes).forEach(walk); } Array.from(el.childNodes).forEach(walk); result.text=result.text.replace(/\n+$/,''); return result; }

/* ── STATUS UI ── */
function syncStatusUI(){
  const pub=state.isPublished; const pin=state.isPinned; const hasId=!!state.activeId;
  // desktop
  dom.statusLabel.className='status-label';
  if(!hasId){ dom.statusLabel.textContent='Draft'; dom.statusLabel.classList.add('status-label--draft'); }
  else if(pub){ dom.statusLabel.textContent='Published'; dom.statusLabel.classList.add('status-label--published'); }
  else{ dom.statusLabel.textContent='Unpublished'; dom.statusLabel.classList.add('status-label--unpublished'); }
  dom.btnPublish.classList.toggle('is-on',pub); dom.btnPublishLabel.textContent=pub?'Published':'Publish';
  dom.btnPin.classList.toggle('is-on',pin); dom.btnPinLabel.textContent=pin?'Pinned':'Pin';
  // sheet
  dom.sfStatusLabel.className='status-label';
  if(!hasId){ dom.sfStatusLabel.textContent='Draft'; dom.sfStatusLabel.classList.add('status-label--draft'); }
  else if(pub){ dom.sfStatusLabel.textContent='Published'; dom.sfStatusLabel.classList.add('status-label--published'); }
  else{ dom.sfStatusLabel.textContent='Unpublished'; dom.sfStatusLabel.classList.add('status-label--unpublished'); }
  dom.sfBtnPublish.classList.toggle('is-on',pub); dom.sfBtnPublishLabel.textContent=pub?'Published':'Publish';
  dom.sfBtnPin.classList.toggle('is-on',pin); dom.sfBtnPinLabel.textContent=pin?'Pinned':'Pin';
}

/* ── SHEET ── */
function openSheet(){ dom.sheet.classList.add('is-open'); dom.sheetBackdrop.classList.add('is-open'); dom.fab.classList.add('is-editing'); document.body.style.overflow='hidden'; }

/* ── DESKTOP EDITOR ── */
function toggleEditorPanel(){ state.editorOpen=!state.editorOpen; dom.editorPanel.classList.toggle('is-open',state.editorOpen); dom.collapsedChevron.classList.toggle('is-open',state.editorOpen); }
function openEditorPanel(){ state.editorOpen=true; dom.editorPanel.classList.add('is-open'); dom.collapsedChevron.classList.add('is-open'); }
function closeEditorPanel(){ state.editorOpen=false; dom.editorPanel.classList.remove('is-open'); dom.collapsedChevron.classList.remove('is-open'); }

/* ── CLEAR / FILL ── */
function clearDesktop(){ dom.fEvent.value=''; dom.fTeam.value=''; dom.fMatchTime.value=''; dom.fClockTime.value=''; dom.fHome.value=''; dom.fAway.value=''; dom.fHomePens.value=''; dom.fAwayPens.value=''; dom.fCopy.innerHTML=''; dom.fMediaType.value=''; dom.fMediaUrl.value=''; }
function clearSheet(){ dom.sfEvent.value=''; dom.sfTeam.value=''; dom.sfMatchTime.value=''; dom.sfClockTime.value=''; dom.sfHome.value=''; dom.sfAway.value=''; dom.sfHomePens.value=''; dom.sfAwayPens.value=''; dom.sfCopy.innerHTML=''; dom.sfMediaType.value=''; dom.sfMediaUrl.value=''; }

function fillDesktop(p){ dom.fEvent.value=p.event||''; dom.fTeam.value=p.team||''; dom.fMatchTime.value=p.match_time||''; dom.fClockTime.value=p.clock_time?p.clock_time.slice(0,16):''; dom.fHome.value=p.home!=null?p.home:''; dom.fAway.value=p.away!=null?p.away:''; dom.fHomePens.value=p.home_pens||''; dom.fAwayPens.value=p.away_pens||''; dom.fCopy.innerHTML=p.copy_html||''; dom.fMediaType.value=p.media_type||''; dom.fMediaUrl.value=p.media_url||''; }
function fillSheet(p){ dom.sfEvent.value=p.event||''; dom.sfTeam.value=p.team||''; dom.sfMatchTime.value=p.match_time||''; dom.sfClockTime.value=p.clock_time?p.clock_time.slice(0,16):''; dom.sfHome.value=p.home!=null?p.home:''; dom.sfAway.value=p.away!=null?p.away:''; dom.sfHomePens.value=p.home_pens||''; dom.sfAwayPens.value=p.away_pens||''; dom.sfCopy.innerHTML=p.copy_html||''; dom.sfMediaType.value=p.media_type||''; dom.sfMediaUrl.value=p.media_url||''; }

/* ── EDITOR STATE ── */
function setEditorNew(){
  state.activeId=''; state.isNew=true; state.isPublished=false; state.isPinned=false;
  dom.editorHead.className='editor-panel__head editor-panel__head--new'; dom.editorHead.style.background=''; dom.editorHead.style.borderBottomColor='';
  dom.editorTitle.textContent='New post'; dom.editorSubtitle.textContent='Compose a new live blog entry';
  dom.editorId.style.display='none'; dom.clockTimeField.style.display='none';
  dom.btnDelete.style.display='none'; dom.btnUpdate.style.display='none';
  dom.collapsedTitle.textContent='+ New Post'; dom.collapsedSub.textContent='Click to compose · or click a post to edit';
  dom.sheetHead.className='sheet__head sheet__head--new'; dom.sheetHead.style.background=''; dom.sheetHead.style.borderBottomColor='';
  dom.sheetTitle.textContent='New post'; dom.sheetSubtitle.textContent='Compose a new entry';
  dom.sheetId.style.display='none'; dom.sfClockTimeField.style.display='none';
  dom.sfBtnDelete.style.display='none'; dom.sfBtnUpdate.style.display='none';
  dom.fab.classList.remove('is-editing');
  syncStatusUI();
}

function openEditEditor(post){
  state.activeId=post.id||''; state.isNew=false; state.isPublished=!!post.published; state.isPinned=!!post.pinned;
  const colors=getColors(post.team);
  const label='Editing: '+(post.team||post.event||post.id||'');
  const sub=post.match_time||(post.clock_time?post.clock_time.slice(11,16):'');
  fillDesktop(post); fillSheet(post);
  // desktop
  dom.editorHead.className='editor-panel__head editor-panel__head--edit'; dom.editorHead.style.background=colors.bg; dom.editorHead.style.borderBottomColor=colors.border;
  dom.editorTitle.textContent=label; dom.editorSubtitle.textContent=sub; dom.editorId.textContent='ID: '+post.id; dom.editorId.style.display='block';
  dom.clockTimeField.style.display='flex'; dom.btnDelete.style.display='inline-flex'; dom.btnUpdate.style.display='inline-flex';
  dom.collapsedTitle.textContent=label; dom.collapsedSub.textContent='Click to expand editor';
  // sheet
  dom.sheetHead.className='sheet__head sheet__head--edit'; dom.sheetHead.style.background=colors.bg; dom.sheetHead.style.borderBottomColor=colors.border;
  dom.sheetTitle.textContent=label; dom.sheetSubtitle.textContent=sub; dom.sheetId.textContent='ID: '+post.id; dom.sheetId.style.display='block';
  dom.sfClockTimeField.style.display='flex'; dom.sfBtnDelete.style.display='inline-flex'; dom.sfBtnUpdate.style.display='inline-flex';
  syncStatusUI(); scheduleFeedRender();
  if(isMobile()) openSheet(); else openEditorPanel();
  setStatus('Editing: '+(post.team||post.event||post.id));

function handleCancel(){ closeEditorPanel(); closeSheet(); clearDesktop(); clearSheet(); setEditorNew(); scheduleFeedRender(); }

/* ── FEED ── */
function scheduleFeedRender(){ if(state.renderTimer) clearTimeout(state.renderTimer); state.renderTimer=setTimeout(renderFeed,150); }

function renderFeed(){
  const q=state.search.toLowerCase();
  const postItems=state.posts.filter(p=>!p.deleted).map(p=>({type:'post',data:p,sort:Number(p.clockSort)||Number(p.updated_at_ms)||0,id:p.id}));
  const subItems=state.submissions.filter(s=>s.published&&!state.hiddenSubs.has(String(s.sub_id||s.row_id))).map(s=>({type:'sub',data:s,sort:s.timestamp_ms||0,id:'sub-'+(s.sub_id||s.row_id)}));
  let all=[...postItems,...subItems].sort((a,b)=>b.sort!==a.sort?b.sort-a.sort:String(b.id).localeCompare(String(a.id)));
  if(q) all=all.filter(item=>{ const d=item.data; return (d.team||'').toLowerCase().includes(q)||(d.event||'').toLowerCase().includes(q)||(d.match_time||'').toLowerCase().includes(q)||(d.name||'').toLowerCase().includes(q)||(d.note||'').toLowerCase().includes(q)||(d.copy_html||'').replace(/<[^>]+>/g,'').toLowerCase().includes(q); });
  const total=state.posts.filter(p=>!p.deleted).length; const live=state.posts.filter(p=>p.published&&!p.deleted).length;
  dom.feedTitle.textContent=`Live feed — ${live} live of ${total} posts`;
  let html='';
  all.forEach(item=>{ if(item.type==='sub') html+=buildSubCardHtml(item.data); else html+=buildPostCardHtml(item.data); });
  if(!html){ dom.feedEl.innerHTML='<div class="feed-empty">No posts yet.</div>'; return; }
  dom.feedEl.innerHTML=html;
  dom.feedEl.querySelectorAll('.fcard[data-pid]').forEach(el=>{ el.addEventListener('click',function(){ const post=state.posts.find(p=>String(p.id)===el.getAttribute('data-pid')); if(post) openEditEditor(post); }); });
  dom.feedEl.querySelectorAll('[data-sub-unpub]').forEach(btn=>{ btn.addEventListener('click',function(e){ e.stopPropagation(); updateSub(btn.getAttribute('data-sub-unpub'),false).catch(handleErr); }); });
}

function buildMediaPreview(post){
  const type=String(post.media_type||'').toLowerCase();
  const url=String(post.media_url||'').trim();
  if(!url) return '';
  if(type==='image') return `<div style="width:100%;background:#000;"><img src="${escHtml(url)}" alt="" style="display:block;width:100%;max-height:320px;object-fit:cover;"></div>`;
  if(type==='video') return `<div style="width:100%;background:#000;"><video controls preload="metadata" playsinline style="display:block;width:100%;max-height:320px;"><source src="${escHtml(url)}"></video></div>`;
  if(type==='gallery'){
    const urls=url.split(',').map(u=>u.trim()).filter(Boolean);
    if(!urls.length) return '';
    return `<div style="display:flex;gap:4px;padding:6px;background:#f6f7f9;overflow-x:auto;">${urls.map(u=>`<img src="${escHtml(u)}" alt="" style="height:80px;border-radius:6px;object-fit:cover;flex-shrink:0;">`).join('')}</div>`;
  }
  if(type==='embed') return `<div style="padding:8px 14px;background:#f6f7f9;font-size:.74rem;color:#555;">Embed: <a href="${escHtml(url)}" target="_blank" rel="noopener" style="color:var(--blue);">${escHtml(url.slice(0,60))}${url.length>60?'…':''}</a></div>`;
  return '';
}

function buildPostCardHtml(post){
  const colors=getColors(post.team); const timeLabel=escHtml(post.match_time||(post.clock_time?post.clock_time.slice(11,16):'')); const home=String(post.home??'').trim(); const away=String(post.away??'').trim(); const hp=String(post.home_pens??'').trim(); const ap=String(post.away_pens??'').trim(); const scoreLabel=home!==''&&away!==''?escHtml(home+' – '+away):''; const pensLabel=hp&&ap?escHtml('('+hp+' – '+ap+' pens)'):'';
  const pills=[]; if(post.published) pills.push('<span class="fpill fpill--live">Live</span>'); else pills.push('<span class="fpill fpill--draft">Draft</span>'); if(post.pinned) pills.push('<span class="fpill fpill--pinned">Pinned</span>'); if(String(post.id)===String(state.activeId)) pills.push('<span class="fpill fpill--editing">Editing</span>');
  return `<div class="fcard${post.pinned?' is-pinned':''}${String(post.id)===String(state.activeId)?' is-editing':''}" data-pid="${escHtml(post.id)}"><div class="fcard__head" style="background:${colors.bg};border-bottom-color:${colors.border}"><div class="fcard__head-left">${timeLabel?`<span class="fcard__chip">${timeLabel}</span>`:''}${getEventIcon(post.event)}<div>${post.team?`<div class="fcard__team">${escHtml(post.team)}</div>`:''}${post.event?`<div class="fcard__event">${escHtml(post.event)}</div>`:''}</div></div><div class="fcard__score-wrap">${scoreLabel?`<span class="fcard__score">${scoreLabel}</span>`:''}${pensLabel?`<span class="fcard__pens">${pensLabel}</span>`:''}</div></div>${buildMediaPreview(post)}${post.copy_html?`<div class="fcard__body">${post.copy_html}</div>`:''}<div class="fcard__footer">${pills.join('')}</div></div>`;
}

function buildSubCardHtml(sub){ const name=escHtml(sub.name||'Anonymous'); const note=escHtml(sub.note||''); const time=sub.timestamp?escHtml(sub.timestamp.slice(0,16).replace('T',' ')):''; return `<div class="fcard fcard--sub" style="max-width:var(--feed-max);"><div class="fcard__main">${time?`<div class="fan-time">${time}</div>`:''}<div class="fan-quote">${note}</div><div class="fan-byline">— ${name}</div></div><div class="fcard__strip"><span class="fcard__strip-label">Fan note</span><button class="btn btn--sm" style="background:rgba(255,255,255,.15);color:#fff;font-size:.62rem;" data-sub-unpub="${sub.row_id}" type="button">Unpublish</button></div></div>`; }

/* ── SUBMISSIONS ── */
function renderSubRail(){
  const visible=state.submissions.filter(s=>!state.hiddenSubs.has(String(s.sub_id||s.row_id)));
  const pending=visible.filter(s=>!s.published).length;
  const countText=`${visible.length} total · ${pending} pending`;
  dom.subCounts.textContent=countText; dom.subCountsMobile.textContent=countText;
  dom.subBadge.textContent=String(pending); dom.subBadge.classList.toggle('is-visible',pending>0);
  const html=visible.length?visible.map(item=>{ const name=escHtml(item.name||'Anonymous'); const note=escHtml(item.note||''); const time=item.timestamp?escHtml(item.timestamp.slice(0,16).replace('T',' ')):''; const isPub=!!item.published; const stableId=String(item.sub_id||item.row_id); return `<div class="scard"><div class="scard__body"><div class="scard__name">${name}</div><div class="scard__time">${time}</div><div class="scard__note">${note}</div></div><div class="scard__actions"><button class="scard__btn scard__btn--pub${isPub?' is-active':''}" data-sub="publish" data-row="${item.row_id}" type="button">✓ Publish</button><button class="scard__btn scard__btn--hide${!isPub?' is-active':''}" data-sub="unpublish" data-row="${item.row_id}" type="button">✕ Hide</button><button class="scard__btn scard__btn--del" data-sub="delete" data-stable="${stableId}" type="button">🗑</button></div></div>`; }).join(''):'<div class="rail-empty">No submissions.</div>';
  dom.subRailBody.innerHTML=html; dom.subRailBodyMobile.innerHTML=html;
  [dom.subRailBody,dom.subRailBodyMobile].forEach(container=>{ container.querySelectorAll('[data-sub]').forEach(btn=>{ btn.addEventListener('click',function(e){ e.stopPropagation(); const action=btn.getAttribute('data-sub'); const row=btn.getAttribute('data-row'); if(action==='delete'){ const sid=btn.getAttribute('data-stable')||row; state.hiddenSubs.add(String(sid)); saveHiddenSubs(); renderSubRail(); renderFeed(); } else updateSub(row,action==='publish').catch(handleErr); }); }); });
}

/* ── SAVE / DELETE ── */
function getPayload(isSheet){
  const ev=isSheet?dom.sfEvent:dom.fEvent; const team=isSheet?dom.sfTeam:dom.fTeam; const mt=isSheet?dom.sfMatchTime:dom.fMatchTime; const ct=isSheet?dom.sfClockTime:dom.fClockTime; const h=isSheet?dom.sfHome:dom.fHome; const a=isSheet?dom.sfAway:dom.fAway; const hp=isSheet?dom.sfHomePens:dom.fHomePens; const ap=isSheet?dom.sfAwayPens:dom.fAwayPens; const copy=isSheet?dom.sfCopy:dom.fCopy; const mt2=isSheet?dom.sfMediaType:dom.fMediaType; const mu=isSheet?dom.sfMediaUrl:dom.fMediaUrl;
  const richData=extractRichData(copy);
  return {
    action:'savePost', id:state.activeId||'',
    published:state.isPublished?'TRUE':'FALSE',
    pinned:state.isPinned?'TRUE':'FALSE',
    deleted:'FALSE',
    event:ev.value.trim(), team:team.value.trim(),
    match_time:mt.value.trim(), clock_time:ct.value.trim(),
    home:h.value.trim(), away:a.value.trim(),
    home_pens:hp.value.trim(), away_pens:ap.value.trim(),
    copy_text:richData.text,
    copy_html:copy.innerHTML.trim(),
    copy_formats:JSON.stringify(richData.formats),
    media_type:mt2.value.trim(), media_url:mu.value.trim()
  };
}

async function savePost(isSheet){
  const payload=getPayload(isSheet);
  if(!payload.event&&!payload.team&&!payload.copy_text){ setStatus('Needs event, team or copy.','error'); return; }
  const updBtn=isSheet?dom.sfBtnUpdate:dom.btnUpdate;
  const pubBtn=isSheet?dom.sfBtnPublish:dom.btnPublish;
  const pubLbl=isSheet?dom.sfBtnPublishLabel:dom.btnPublishLabel;
  const prevPubLabel=pubLbl.textContent;
  updBtn.disabled=true; updBtn.textContent='Updating…';
  pubBtn.disabled=true; pubLbl.textContent='Saving…';
  setStatus('Saving…');
  try{
    const data=await apiFetch(payload);
    setStatus(data.message||'Saved.','success');
    await loadPosts();
  }finally{
    updBtn.disabled=false; updBtn.innerHTML='Update';
    pubBtn.disabled=false; pubLbl.textContent=prevPubLabel;
  }
}

async function updateAndClose(isSheet){ await savePost(isSheet); closeEditorPanel(); closeSheet(); clearDesktop(); clearSheet(); setEditorNew(); renderFeed(); }

async function deletePost(){
  if(!state.activeId){ setStatus('No post selected.','error'); return; }
  if(!window.confirm('Soft-delete this post?')) return;
  setStatus('Deleting…'); const data=await apiFetch({action:'deletePost',id:state.activeId});
  setStatus(data.message||'Deleted.','success'); closeEditorPanel(); closeSheet(); setEditorNew(); clearDesktop(); clearSheet(); await loadPosts();
}

async function updateSub(rowId,publish){
  const current=state.submissions.find(s=>String(s.row_id)===String(rowId)); if(!current){ setStatus('Submission not found.','error'); return; }
  const prev={published:current.published,timestamp_ms:current.timestamp_ms,timestamp:current.timestamp};
  if(publish){ const now=new Date(); current.published=true; current.timestamp_ms=now.getTime(); current.timestamp=now.toISOString().slice(0,16).replace('T',' '); } else{ current.published=false; current.timestamp_ms=0; current.timestamp=''; }
  renderSubRail(); renderFeed();
  try{ await apiFetch({action:'updateSubmission',row_id:rowId,name:current.name||'',note:current.note||'',status:publish?'published':'pending',published:publish?'TRUE':'FALSE'}); setStatus(publish?'Published.':'Unpublished.','success'); }
  catch(err){ current.published=prev.published; current.timestamp_ms=prev.timestamp_ms; current.timestamp=prev.timestamp; renderSubRail(); renderFeed(); handleErr(err); }
}

async function loadPosts(){ const data=await apiGet({action:'listPosts'}); state.posts=Array.isArray(data.items)?data.items:[]; renderFeed(); }
function normaliseSubs(items){ return items.map(function(item){ const rawPubTime=item.publishtime||item.publish_time||''; if(rawPubTime){ const d=new Date(rawPubTime); if(!isNaN(d.getTime())){ item.timestamp_ms=d.getTime(); item.timestamp=rawPubTime.slice(0,16).replace('T',' '); return item; } } const rawSubmitted=item.timestamp||''; if(rawSubmitted){ const d=new Date(rawSubmitted); if(!isNaN(d.getTime())){ item.timestamp_ms=0; item.timestamp=rawSubmitted.slice(0,16).replace('T',' '); return item; } } item.timestamp_ms=0; item.timestamp=''; return item; }); }
async function loadSubs(){ const data=await apiGet({action:'listSubmissions'}); state.submissions=normaliseSubs(Array.isArray(data.items)?data.items:[]); renderSubRail(); renderFeed(); }
async function reloadAll(){ setStatus('Loading…'); try{ await Promise.all([loadPosts(),loadSubs()]); setStatus('Loaded.','success'); }catch(err){ handleErr(err); dom.feedEl.innerHTML='<div class="feed-empty">Could not load — check API URL.</div>'; } }

/* ── RTE ── */
function bindRTE(){
  document.querySelectorAll('.rte-btn[data-cmd]').forEach(btn=>{ btn.addEventListener('mousedown',function(e){ e.preventDefault(); const cmd=btn.getAttribute('data-cmd'); if(cmd==='para') document.execCommand('insertHTML',false,'<p><br></p>'); else if(cmd==='br') document.execCommand('insertHTML',false,'<br>'); else if(cmd==='clear') document.execCommand('removeFormat',false,null); else document.execCommand(cmd,false,null); dom.fCopy.focus(); scheduleFeedRender(); }); });
  document.querySelectorAll('.rte-btn[data-scmd]').forEach(btn=>{ btn.addEventListener('mousedown',function(e){ e.preventDefault(); const cmd=btn.getAttribute('data-scmd'); if(cmd==='para') document.execCommand('insertHTML',false,'<p><br></p>'); else if(cmd==='br') document.execCommand('insertHTML',false,'<br>'); else if(cmd==='clear') document.execCommand('removeFormat',false,null); else document.execCommand(cmd,false,null); dom.sfCopy.focus(); }); });
  dom.fCopy.addEventListener('input',scheduleFeedRender);
}

/* ── COMBOS ── */
function buildCombo(inputEl,listEl,options){ let focused=-1; function showList(filter){ const f=(filter||'').toLowerCase(); const filtered=options.filter(o=>o.toLowerCase().includes(f)); if(!filtered.length){ listEl.classList.remove('is-open'); return; } listEl.innerHTML=filtered.map(o=>`<div class="combo__opt" data-val="${escHtml(o)}">${escHtml(o)}</div>`).join(''); listEl.classList.add('is-open'); focused=-1; listEl.querySelectorAll('.combo__opt').forEach(el=>{ el.addEventListener('mousedown',function(e){ e.preventDefault(); inputEl.value=el.getAttribute('data-val'); listEl.classList.remove('is-open'); scheduleFeedRender(); }); }); } inputEl.addEventListener('focus',()=>showList(inputEl.value)); inputEl.addEventListener('input',()=>{ showList(inputEl.value); scheduleFeedRender(); }); inputEl.addEventListener('keydown',function(e){ const opts=listEl.querySelectorAll('.combo__opt'); if(e.key==='ArrowDown'){ e.preventDefault(); focused=Math.min(focused+1,opts.length-1); } else if(e.key==='ArrowUp'){ e.preventDefault(); focused=Math.max(focused-1,0); } else if(e.key==='Enter'&&focused>=0){ e.preventDefault(); inputEl.value=opts[focused].getAttribute('data-val'); listEl.classList.remove('is-open'); scheduleFeedRender(); return; } else if(e.key==='Escape'){ listEl.classList.remove('is-open'); return; } opts.forEach((o,i)=>o.classList.toggle('is-focused',i===focused)); }); document.addEventListener('click',function(e){ if(!inputEl.contains(e.target)&&!listEl.contains(e.target)) listEl.classList.remove('is-open'); }); }

/* ── SHEET DRAG ── */
function bindSheetDrag(){ let startY=0,dragging=false; dom.sheetHandle.addEventListener('touchstart',function(e){ startY=e.touches[0].clientY; dragging=true; },{passive:true}); document.addEventListener('touchend',function(e){ if(!dragging) return; dragging=false; if(e.changedTouches[0].clientY-startY>80) handleCancel(); },{passive:true}); }

/* ── TABS ── */
function switchTab(tab){
  dom.tabFeed.classList.toggle('is-active', tab==='feed');
  dom.tabSubs.classList.toggle('is-active', tab==='subs');
  if(tab==='subs'){
    dom.panelSubs.style.display='block';
    dom.panelSubs.style.minHeight='calc(100vh - '+getComputedStyle(document.documentElement).getPropertyValue('--topbar-h')+' - '+getComputedStyle(document.documentElement).getPropertyValue('--bottombar-h')+')';
    // hide feed content
    document.querySelector('.feed-toolbar').style.display='none';
    dom.feedEl.style.display='none';
  } else {
    dom.panelSubs.style.display='none';
    document.querySelector('.feed-toolbar').style.display='';
    dom.feedEl.style.display='';
  }
}

/* ── HIDDEN SUBS ── */
function loadHiddenSubs(){ try{ const raw=localStorage.getItem('nllb-hidden-subs'); if(raw) JSON.parse(raw).forEach(id=>state.hiddenSubs.add(String(id))); }catch(e){} }
function saveHiddenSubs(){ try{ localStorage.setItem('nllb-hidden-subs',JSON.stringify([...state.hiddenSubs])); }catch(e){} }
function handleErr(err){ console.error(err); setStatus(err&&err.message?err.message:'Something went wrong.','error'); }

/* ── INIT ── */
async function init(){
  loadHiddenSubs();
  buildCombo(dom.fEvent,$('comboEventList'),EVENT_OPTIONS);
  buildCombo(dom.fTeam,$('comboTeamList'),TEAM_OPTIONS);
  buildCombo(dom.sfEvent,$('sfComboEventList'),EVENT_OPTIONS);
  buildCombo(dom.sfTeam,$('sfComboTeamList'),TEAM_OPTIONS);
  bindRTE();
  bindSheetDrag();

  dom.editorCollapsed.addEventListener('click',toggleEditorPanel);

  // desktop actions
  dom.btnPublish.addEventListener('click',function(){ if(state.isNew){ state.isPublished=true; syncStatusUI(); updateAndClose(false).catch(handleErr); } else{ state.isPublished=!state.isPublished; syncStatusUI(); scheduleFeedRender(); } });
  dom.btnPin.addEventListener('click',function(){ state.isPinned=!state.isPinned; syncStatusUI(); scheduleFeedRender(); });
  dom.btnUpdate.addEventListener('click',()=>updateAndClose(false).catch(handleErr));
  dom.btnCancel.addEventListener('click',handleCancel);
  dom.btnDelete.addEventListener('click',()=>deletePost().catch(handleErr));
  [dom.fMatchTime,dom.fHome,dom.fAway,dom.fHomePens,dom.fAwayPens,dom.fMediaUrl].forEach(el=>el.addEventListener('input',scheduleFeedRender));
  dom.fMediaType.addEventListener('change',scheduleFeedRender);

  // sheet actions
  dom.sfBtnPublish.addEventListener('click',function(){ if(state.isNew){ state.isPublished=true; syncStatusUI(); updateAndClose(true).catch(handleErr); } else{ state.isPublished=!state.isPublished; syncStatusUI(); } });
  dom.sfBtnPin.addEventListener('click',function(){ state.isPinned=!state.isPinned; syncStatusUI(); });
  dom.sfBtnUpdate.addEventListener('click',()=>updateAndClose(true).catch(handleErr));
  dom.sfBtnCancel.addEventListener('click',handleCancel);
  dom.sfBtnDelete.addEventListener('click',()=>deletePost().catch(handleErr));

  // FAB
  dom.fab.addEventListener('click',function(){ if(dom.sheet.classList.contains('is-open')){ handleCancel(); } else{ setEditorNew(); clearSheet(); openSheet(); } });
  dom.sheetClose.addEventListener('click',handleCancel);
  dom.sheetBackdrop.addEventListener('click',handleCancel);

  // tabs
  dom.tabFeed.addEventListener('click',()=>switchTab('feed'));
  dom.tabSubs.addEventListener('click',()=>switchTab('subs'));

  $('btnReload').addEventListener('click',()=>reloadAll().catch(handleErr));
  dom.feedSearch.addEventListener('input',function(){ state.search=dom.feedSearch.value; renderFeed(); });

  setEditorNew();
  await reloadAll();
  window.setInterval(()=>loadSubs().catch(handleErr),30000);
}

init().catch(handleErr);
})();
</script>
</body>
