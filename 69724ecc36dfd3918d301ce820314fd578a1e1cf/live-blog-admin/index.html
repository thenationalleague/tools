<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Blog Admin (v3.1)</title>
<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">
<style>
/* Live Blog Admin v3.1 */
:root{
  --red:#9e0000;
  --blue:#223b7c;
  --bg:#f0f2f5;
  --panel:#fff;
  --text:#111;
  --muted:#6b7280;
  --line:#d9dee5;
  --dark:#111;
  --dark2:#1c1c1c;
  --success:#0a7d2a;
  --danger:#b00020;
  --rail-w:290px;
  --topbar-h:52px;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:"carbona-variable",system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size:14px;
  line-height:1.45;
}

/* ── TOPBAR ── */
.topbar{
  position:fixed;
  top:0; left:0; right:0;
  height:var(--topbar-h);
  background:var(--dark);
  color:#fff;
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:10px;
  border-bottom:2px solid var(--red);
  z-index:100;
}

.topbar__brand{
  font-size:.84rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  white-space:nowrap;
}

.topbar__version{
  font-size:.64rem;
  opacity:.3;
  font-weight:400;
  margin-left:5px;
}

.topbar__sep{
  width:1px;
  height:22px;
  background:rgba(255,255,255,.12);
  flex-shrink:0;
}

.topbar__right{
  display:flex;
  align-items:center;
  gap:8px;
  margin-left:auto;
  flex-shrink:0;
}

.topbar__status{
  font-size:.74rem;
  color:rgba(255,255,255,.45);
  white-space:nowrap;
}

.topbar__status.is-error{ color:#f87171; font-weight:700; }
.topbar__status.is-success{ color:#4ade80; font-weight:700; }

/* ── LAYOUT ── */
.layout{
  display:grid;
  grid-template-columns:1fr var(--rail-w);
  min-height:100vh;
  padding-top:var(--topbar-h);
}

/* ── FEED COLUMN ── */
.feed-col{
  min-width:0;
  display:flex;
  flex-direction:column;
}

/* ── EDITOR (sticky, collapsible) ── */
.editor-wrap{
  position:sticky;
  top:var(--topbar-h);
  z-index:50;
  background:var(--bg);
  border-bottom:2px solid var(--line);
}

.editor-collapsed{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 16px;
  background:var(--dark2);
  cursor:pointer;
  transition:background .15s;
  border-bottom:2px solid #2a2a2a;
}

.editor-collapsed:hover{ background:#242424; }

.editor-collapsed__info{
  flex:1 1 auto;
  min-width:0;
}

.editor-collapsed__title{
  font-size:.76rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:#fff;
}

.editor-collapsed__sub{
  font-size:.68rem;
  color:rgba(255,255,255,.35);
  margin:2px 0 0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.editor-collapsed__chevron{
  font-size:.8rem;
  color:rgba(255,255,255,.4);
  transition:transform .2s;
  flex-shrink:0;
}

.editor-collapsed__chevron.is-open{ transform:rotate(180deg); }

.editor-panel{
  background:var(--panel);
  border-bottom:1px solid var(--line);
  display:none;
}

.editor-panel.is-open{ display:block; }

.editor-panel__head{
  padding:11px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  color:#fff;
}

.editor-panel__head--new{ background:var(--blue); }
.editor-panel__head--edit{ background:var(--red); }

.editor-panel__title{
  font-size:.82rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.editor-panel__subtitle{
  font-size:.68rem;
  opacity:.65;
  margin:2px 0 0;
}

/* compact field rows */
.editor-body{
  padding:12px 16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.erow{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:flex-end;
}

.ef{
  display:flex;
  flex-direction:column;
  gap:3px;
  min-width:0;
}

.ef--grow{ flex:1 1 auto; }
.ef--w56{ width:56px; flex-shrink:0; }
.ef--w80{ width:80px; flex-shrink:0; }
.ef--w120{ width:120px; flex-shrink:0; }
.ef--w160{ width:160px; flex-shrink:0; }

.elabel{
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
}

.einput,
.eselect{
  height:32px;
  padding:0 9px;
  border:1px solid #cfd6de;
  border-radius:7px;
  background:#fff;
  color:#111;
  font:inherit;
  font-size:.82rem;
  outline:none;
  width:100%;
  transition:border-color .15s, box-shadow .15s;
}

.einput:focus,
.eselect:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

.einput--center{ text-align:center; }

/* combobox */
.combo{ position:relative; }

.combo__input{
  height:32px;
  padding:0 9px;
  border:1px solid #cfd6de;
  border-radius:7px;
  background:#fff;
  color:#111;
  font:inherit;
  font-size:.82rem;
  outline:none;
  width:100%;
  transition:border-color .15s, box-shadow .15s;
}

.combo__input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

.combo__list{
  position:absolute;
  top:calc(100% + 3px);
  left:0; right:0;
  background:#fff;
  border:1px solid var(--blue);
  border-radius:8px;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  z-index:200;
  max-height:200px;
  overflow-y:auto;
  display:none;
}

.combo__list.is-open{ display:block; }

.combo__opt{
  padding:7px 10px;
  font-size:.82rem;
  cursor:pointer;
}

.combo__opt:hover,
.combo__opt.is-focused{ background:#eef2f7; }

/* score strip */
.score-strip{
  display:flex;
  align-items:center;
  gap:4px;
  background:#f8f9fb;
  border:1px solid var(--line);
  border-radius:8px;
  padding:0 8px;
  height:32px;
  flex-shrink:0;
}

.score-strip__label{
  font-size:.58rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:var(--muted);
  white-space:nowrap;
}

.score-strip__sep{
  font-size:.9rem;
  font-weight:900;
  color:#ccc;
}

.score-input{
  width:32px;
  height:22px;
  text-align:center;
  padding:0 3px;
  border:1px solid #cfd6de;
  border-radius:5px;
  background:#fff;
  color:#111;
  font:inherit;
  font-size:.82rem;
  font-weight:900;
  outline:none;
}

.score-input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 2px rgba(34,59,124,.1);
}

/* rich text */
.rte-wrap{
  border:1px solid #cfd6de;
  border-radius:8px;
  overflow:hidden;
  transition:border-color .15s, box-shadow .15s;
}

.rte-wrap:focus-within{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,59,124,.1);
}

.rte-bar{
  display:flex;
  align-items:center;
  gap:2px;
  padding:4px 7px;
  background:#f8f9fb;
  border-bottom:1px solid #e8ecf2;
}

.rte-btn{
  appearance:none;
  border:0;
  background:transparent;
  border-radius:5px;
  padding:3px 7px;
  cursor:pointer;
  font:inherit;
  font-size:.76rem;
  color:#374151;
  line-height:1;
  transition:background .1s;
}

.rte-btn:hover{ background:#e8ecf2; }
.rte-btn.is-on{ background:#dbeafe; color:var(--blue); }
.rte-btn--b{ font-weight:900; }
.rte-btn--i{ font-style:italic; }
.rte-sep{ width:1px; height:14px; background:#d9dee5; margin:0 2px; }

.rte-editor{
  min-height:70px;
  padding:8px 10px;
  outline:none;
  font-size:.86rem;
  line-height:1.6;
  background:#fff;
  color:#111;
}

.rte-editor:empty::before{
  content:attr(data-ph);
  color:#bbb;
  pointer-events:none;
}

.rte-editor p{ margin:0 0 .4em; }
.rte-editor p:last-child{ margin:0; }

/* action buttons row */
.editor-actions{
  padding:10px 16px;
  border-top:1px solid var(--line);
  background:#f8f9fb;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

/* status toggle buttons */
.status-btn{
  appearance:none;
  border:2px solid transparent;
  border-radius:999px;
  cursor:pointer;
  font:inherit;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:0 14px;
  min-height:36px;
  font-size:.74rem;
  transition:all .15s;
}

.status-btn--publish{
  background:#f0fdf4;
  color:#15803d;
  border-color:#86efac;
}

.status-btn--publish.is-on{
  background:#15803d;
  color:#fff;
  border-color:#15803d;
}

.status-btn--pin{
  background:#fefce8;
  color:#854d0e;
  border-color:#fde68a;
}

.status-btn--pin.is-on{
  background:#854d0e;
  color:#fff;
  border-color:#854d0e;
}

.status-btn__dot{
  width:8px;
  height:8px;
  border-radius:50%;
  flex-shrink:0;
}

.status-btn--publish .status-btn__dot{ background:#86efac; }
.status-btn--publish.is-on .status-btn__dot{ background:#fff; }
.status-btn--pin .status-btn__dot{ background:#fde68a; }
.status-btn--pin.is-on .status-btn__dot{ background:#fff; }

.status-label{
  display:inline-flex;
  align-items:center;
  min-height:22px;
  padding:0 9px;
  border-radius:999px;
  font-size:.64rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.status-label--draft{ background:#f3f4f6; color:#6b7280; }
.status-label--published{ background:#dcfce7; color:#15803d; }
.status-label--unpublished{ background:#fee2e2; color:#b91c1c; }

/* generic button */
.btn{
  appearance:none;
  border:0;
  border-radius:999px;
  cursor:pointer;
  font:inherit;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  white-space:nowrap;
  transition:filter .15s, opacity .15s;
  flex-shrink:0;
}

.btn:hover:not(:disabled){ filter:brightness(.9); }
.btn:disabled{ opacity:.45; cursor:default; }

.btn--sm{ min-height:30px; padding:0 12px; font-size:.68rem; }
.btn--md{ min-height:36px; padding:0 14px; font-size:.74rem; }
.btn--lg{ min-height:40px; padding:0 18px; font-size:.78rem; }

.btn--red{ background:var(--red); color:#fff; }
.btn--blue{ background:var(--blue); color:#fff; }
.btn--ghost{ background:#eef2f7; color:#111; }
.btn--danger{ background:var(--danger); color:#fff; }
.btn--white{ background:#fff; color:#111; border:1px solid var(--line); }

/* ── FEED ── */
.feed-toolbar{
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:10px;
}

.feed-toolbar__title{
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
  flex:1 1 auto;
}

.feed{
  padding:0 16px 24px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ── FEED CARDS ── */
.fcard{
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--line);
  box-shadow:0 3px 14px rgba(0,0,0,.05);
  cursor:pointer;
  transition:box-shadow .2s, transform .15s;
  position:relative;
}

.fcard:hover{ box-shadow:0 6px 22px rgba(0,0,0,.1); transform:translateY(-1px); }
.fcard.is-editing{
  box-shadow:0 0 0 3px var(--red), 0 6px 22px rgba(0,0,0,.1);
  transform:none;
  cursor:default;
}

.fcard.is-deleted{ display:none; }
.fcard.is-pinned{ border-color:rgba(216,162,29,.5); }
.fcard--sub{ cursor:default; }
.fcard--sub:hover{ transform:none; box-shadow:0 3px 14px rgba(0,0,0,.05); }

.fcard__head{
  padding:11px 14px;
  color:#fff;
  border-bottom:3px solid #9e0000;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}

.fcard__head-left{
  display:flex;
  align-items:center;
  gap:9px;
  min-width:0;
  flex:1 1 auto;
}

.fcard__chip{
  display:inline-flex;
  align-items:center;
  min-height:22px;
  padding:0 8px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  font-size:.64rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  white-space:nowrap;
  flex-shrink:0;
}

.fcard__team{
  font-size:.92rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.02em;
  line-height:1.05;
}

.fcard__event{
  font-size:.64rem;
  font-weight:900;
  letter-spacing:.07em;
  text-transform:uppercase;
  opacity:.8;
  margin:2px 0 0;
}

.fcard__score{
  display:inline-flex;
  align-items:center;
  min-height:28px;
  padding:0 12px;
  border-radius:999px;
  background:#fff;
  color:#111;
  font-size:.88rem;
  font-weight:900;
  letter-spacing:.04em;
  flex-shrink:0;
}

.fcard__body{
  padding:11px 14px;
  font-size:.88rem;
  line-height:1.6;
  background:#fff;
  color:#111;
}

.fcard__body p{ margin:0 0 .5em; }
.fcard__body p:last-child{ margin:0; }

.fcard__footer{
  padding:6px 14px 8px;
  background:#fff;
  border-top:1px solid #f0f2f5;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

.fpill{
  display:inline-flex;
  align-items:center;
  min-height:18px;
  padding:0 7px;
  border-radius:999px;
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.fpill--live{ background:#dcfce7; color:#15803d; }
.fpill--draft{ background:#f3f4f6; color:#6b7280; }
.fpill--unpub{ background:#fee2e2; color:#b91c1c; }
.fpill--pinned{ background:#fef9c3; color:#854d0e; }
.fpill--sub{ background:#ede9fe; color:#5b21b6; }

/* fan note style */
.fcard--sub .fcard__body{
  background:linear-gradient(180deg,#fbfbfc,#fff);
  padding:16px 18px;
}

.fcard--sub .fan-quote{
  font-style:italic;
  font-size:1.05rem;
  line-height:1.5;
  color:#1c2330;
  font-family:"Viktorie","Times New Roman",serif;
  margin:0 0 8px;
}

.fcard--sub .fan-byline{
  font-size:.82rem;
  color:#4e5a6d;
}

.fcard--sub .fcard__head{
  background:#223b7c;
  border-bottom-color:#9e0000;
}

/* ── SUBMISSIONS RAIL ── */
.sub-rail{
  background:var(--dark2);
  border-left:1px solid #000;
  display:flex;
  flex-direction:column;
  height:calc(100vh - var(--topbar-h));
  position:sticky;
  top:var(--topbar-h);
  overflow:hidden;
}

.sub-rail__head{
  padding:10px 12px 8px;
  border-bottom:1px solid #2a2a2a;
  flex-shrink:0;
}

.sub-rail__title{
  font-size:.68rem;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(255,255,255,.4);
  margin:0 0 3px;
}

.sub-rail__counts{
  font-size:.62rem;
  color:rgba(255,255,255,.22);
}

.sub-rail__body{
  flex:1 1 auto;
  overflow-y:auto;
  padding:8px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.sub-rail__body::-webkit-scrollbar{ width:3px; }
.sub-rail__body::-webkit-scrollbar-thumb{ background:#333; border-radius:999px; }

.scard{
  border-radius:10px;
  overflow:hidden;
  border:1px solid #333;
  background:#1a1a1a;
}

.scard.is-hidden{ display:none; }

.scard__body{
  padding:8px 10px;
}

.scard__name{
  font-size:.74rem;
  font-weight:900;
  color:#fff;
  margin:0 0 1px;
}

.scard__time{
  font-size:.6rem;
  color:rgba(255,255,255,.28);
  margin:0 0 5px;
}

.scard__note{
  font-size:.72rem;
  color:rgba(255,255,255,.55);
  line-height:1.4;
  white-space:pre-wrap;
  word-break:break-word;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
  margin:0 0 6px;
}

.scard__actions{
  display:grid;
  grid-template-columns:1fr 1fr auto;
  gap:0;
  border-top:1px solid #2a2a2a;
}

.scard__btn{
  appearance:none;
  border:0;
  padding:6px 4px;
  font:inherit;
  font-size:.6rem;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .12s, color .12s;
  line-height:1;
}

.scard__btn--pub{
  background:#1a2a1a;
  color:#4ade80;
  border-right:1px solid #2a2a2a;
}

.scard__btn--pub.is-active{
  background:#15803d;
  color:#fff;
}

.scard__btn--hide{
  background:#2a1a1a;
  color:#f87171;
  border-right:1px solid #2a2a2a;
}

.scard__btn--hide.is-active{
  background:#b91c1c;
  color:#fff;
}

.scard__btn--del{
  background:#1a1a1a;
  color:rgba(255,255,255,.25);
  padding:6px 8px;
  font-size:.68rem;
}

.scard__btn:hover:not(.is-active){
  filter:brightness(1.4);
}

.rail-empty{
  padding:20px 10px;
  text-align:center;
  font-size:.72rem;
  color:rgba(255,255,255,.18);
}

.feed-empty{
  padding:40px 20px;
  text-align:center;
  color:var(--muted);
  font-size:.84rem;
  border:1px dashed var(--line);
  border-radius:16px;
  background:#fff;
}

/* event icon colours on card head */
.fcard__icon{
  width:26px;
  height:26px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  opacity:.92;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));
}

.fcard__icon svg{
  width:22px;
  height:22px;
  display:block;
}

@media (max-width:900px){
  .layout{ grid-template-columns:1fr; }
  .sub-rail{
    height:auto;
    max-height:50vh;
    position:relative;
    top:0;
    border-left:0;
    border-top:1px solid #000;
  }
  .erow{ flex-direction:column; }
}

@media (max-width:600px){
  .topbar__status{ display:none; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar__brand">
    Live Blog Admin<span class="topbar__version">v3.1</span>
  </div>
  <div class="topbar__sep"></div>
  <div class="topbar__right">
    <div class="topbar__status" id="tStatus">Ready.</div>
    <button class="btn btn--ghost btn--sm" id="btnReload" type="button">Reload</button>
    <button class="btn btn--blue btn--sm" id="btnNew" type="button">+ New Post</button>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- FEED COLUMN -->
  <div class="feed-col">

    <!-- EDITOR WRAP (sticky, collapsible) -->
    <div class="editor-wrap" id="editorWrap">

      <!-- Collapsed bar -->
      <div class="editor-collapsed" id="editorCollapsed">
        <div class="editor-collapsed__info">
          <div class="editor-collapsed__title" id="collapsedTitle">Editor</div>
          <div class="editor-collapsed__sub" id="collapsedSub">Click to open · or click a post in the feed</div>
        </div>
        <span class="editor-collapsed__chevron" id="collapsedChevron">▾</span>
      </div>

      <!-- Editor panel -->
      <div class="editor-panel" id="editorPanel">

        <div class="editor-panel__head editor-panel__head--new" id="editorHead">
          <div>
            <div class="editor-panel__title" id="editorTitle">New post</div>
            <div class="editor-panel__subtitle" id="editorSubtitle">Compose a new live blog entry</div>
          </div>
          <input class="einput" id="fId" type="text" readonly

</div>

<script>
(function(){
  'use strict';

  /* Live Blog Admin v3.1 */

  const API = 'https://script.google.com/macros/s/AKfycbwD3Yf25tVVvd0S46eC6ldWDQWK043FdTzwW6VoCHHppGzzg1o1S5vNMFNSbNGGEqlzcw/exec';

  const EVENT_OPTIONS = [
    'Goal','Assist','Attempt saved','Miss','Attempt missed','Attempt blocked',
    'Free kick won','Free kick lost','Offside','Corner','Substitution',
    'Yellow card','Red card','Lineup',
    'Kick-off','Half-time','Full-time','Start',
    'End of first half','End of second half'
  ];

  const TEAM_OPTIONS = ['Boreham Wood','West Ham United'];

  const EVENT_ICONS = {
    'goal': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2 5 5 2 12l3 7 7 3 7-3 3-7-3-7zm5.7 7.3-6.5 6.5-3.2-3.2 1.4-1.4 1.8 1.8 5.1-5.1z"/></svg>`,
    'assist': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2 5 5 2 12l3 7 7 3 7-3 3-7-3-7zm5.7 7.3-6.5 6.5-3.2-3.2 1.4-1.4 1.8 1.8 5.1-5.1z"/></svg>`,
    'yellow card': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 4h10a2 2 0 0 1 2 2v12H9a2 2 0 0 0-2 2z"/></svg>`,
    'red card': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 4h10a2 2 0 0 1 2 2v12H9a2 2 0 0 0-2 2z"/></svg>`,
    'substitution': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 7h8V4l5 5-5 5v-3H7zm10 10H9v3l-5-5 5-5v3h8z"/></svg>`,
    'corner': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M5 3h2v18H5zm2 1c4 0 6 2 10 2v5c-4 0-6-2-10-2z"/></svg>`,
    'offside': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 3h2v18H6zm2 1h9l-2 3 2 3H8z"/></svg>`,
    'attempt saved': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 4h2v6h1V3h2v7h1V5h2v7h1V7h2v7c0 4-2.5 7-7 7S4 18 4 14V8h2v6h1z"/></svg>`,
    'miss': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2m4.3 12.9-1.4 1.4L12 13.4l-2.9 2.9-1.4-1.4 2.9-2.9-2.9-2.9 1.4-1.4 2.9 2.9 2.9-2.9 1.4 1.4-2.9 2.9z"/></svg>`,
    'kick-off': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M8.5 7.5c0-2.48 2.02-4.5 4.5-4.5h1v4.15c2.58.49 4.5 2.76 4.5 5.48 0 3.08-2.42 5.37-5.63 5.37H8.5C5.47 18 3 15.53 3 12.5S5.47 7 8.5 7z"/></svg>`,
    'half-time': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M8.5 7.5c0-2.48 2.02-4.5 4.5-4.5h1v4.15c2.58.49 4.5 2.76 4.5 5.48 0 3.08-2.42 5.37-5.63 5.37H8.5C5.47 18 3 15.53 3 12.5S5.47 7 8.5 7z"/></svg>`,
    'full-time': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M8.5 7.5c0-2.48 2.02-4.5 4.5-4.5h1v4.15c2.58.49 4.5 2.76 4.5 5.48 0 3.08-2.42 5.37-5.63 5.37H8.5C5.47 18 3 15.53 3 12.5S5.47 7 8.5 7z"/></svg>`,
    'lineup': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 7a2.25 2.25 0 1 1 2.25-2.25A2.25 2.25 0 0 1 7 7m10 0a2.25 2.25 0 1 1 2.25-2.25A2.25 2.25 0 0 1 17 7M7 9.5c-2.9 0-5 1.47-5 3.5V15h10v-2c0-2.03-2.1-3.5-5-3.5m10 0c-1.22 0-2.34.25-3.23.69A4.8 4.8 0 0 1 15 13v2h7v-2c0-2.03-2.1-3.5-5-3.5"/></svg>`,
    'free kick won': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M5 20h14v2H5zm6-18h2v8h3l-4 5-4-5h3z"/></svg>`,
    'free kick lost': `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M5 20h14v2H5zm6-18h2v8h3l-4 5-4-5h3z"/></svg>`
  };

  const TEAM_COLORS = {
    'Boreham Wood':   { bg:'linear-gradient(105deg,#000 0%,#000 50%,#e6e6e6 75%,#fff 100%)', border:'#555' },
    'West Ham United':{ bg:'linear-gradient(105deg,#8e1d41 0%,#8e1d41 50%,#81c4dd 75%,#fff 100%)', border:'#81c4dd' }
  };

  const NEUTRAL = { bg:'#223b7c', border:'#9e0000' };

  const state = {
    posts: [],
    submissions: [],
    hiddenSubs: new Set(),
    activeId: '',
    isNew: true,
    isPublished: false,
    isPinned: false,
    editorOpen: false,
    search: ''
  };

  const $ = id => document.getElementById(id);

  const dom = {
    status:           $('tStatus'),
    feedEl:           $('feedEl'),
    feedTitle:        $('feedTitle'),
    feedSearch:       $('feedSearch'),
    subRailBody:      $('subRailBody'),
    subCounts:        $('subCounts'),
    editorCollapsed:  $('editorCollapsed'),
    collapsedTitle:   $('collapsedTitle'),
    collapsedSub:     $('collapsedSub'),
    collapsedChevron: $('collapsedChevron'),
    editorPanel:      $('editorPanel'),
    editorHead:       $('editorHead'),
    editorTitle:      $('editorTitle'),
    editorSubtitle:   $('editorSubtitle'),
    statusLabel:      $('statusLabel'),
    btnNew:           $('btnNew'),
    btnReload:        $('btnReload'),
    btnSave:          $('btnSave'),
    btnClear:         $('btnClear'),
    btnDelete:        $('btnDelete'),
    btnPublish:       $('btnPublish'),
    btnPublishLabel:  $('btnPublishLabel'),
    btnPin:           $('btnPin'),
    btnPinLabel:      $('btnPinLabel'),
    fId:              $('fId'),
    fEvent:           $('fEvent'),
    fTeam:            $('fTeam'),
    fMatchTime:       $('fMatchTime'),
    fClockTime:       $('fClockTime'),
    fHome:            $('fHome'),
    fAway:            $('fAway'),
    fHomePens:        $('fHomePens'),
    fAwayPens:        $('fAwayPens'),
    fCopy:            $('fCopy'),
    fMediaType:       $('fMediaType'),
    fMediaUrl:        $('fMediaUrl')
  };

  /* ── STATUS ── */
  function setStatus(msg, type){
    dom.status.textContent = msg || '';
    dom.status.classList.remove('is-error','is-success');
    if(type) dom.status.classList.add('is-' + type);
  }

  function escHtml(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /* ── FETCH ── */
  async function apiFetch(params){
    const body = new URLSearchParams();
    Object.entries(params).forEach(([k,v]) => body.append(k, v == null ? '' : String(v)));
    const res = await fetch(API, { method:'POST', body });
    const text = await res.text();
    let data;
    try{ data = JSON.parse(text); }
    catch(e){ throw new Error('Invalid JSON from API.'); }
    if(data && data.ok === false) throw new Error(data.error || 'API error.');
    return data;
  }

  async function apiGet(params){
    const qs = new URLSearchParams(params).toString();
    const res = await fetch(API + '?' + qs);
    const text = await res.text();
    let data;
    try{ data = JSON.parse(text); }
    catch(e){ throw new Error('Invalid JSON from API.'); }
    if(data && data.ok === false) throw new Error(data.error || 'API error.');
    return data;
  }

  /* ── RICH TEXT ── */
  function extractRichData(editorEl){
    const result = { text:'', formats:[] };
    let pos = 0;

    function walk(node){
      if(node.nodeType === Node.TEXT_NODE){
        const t = node.textContent || '';
        result.text += t; pos += t.length; return;
      }
      if(node.nodeType !== Node.ELEMENT_NODE) return;
      const tag = node.tagName.toUpperCase();
      if(tag === 'BR'){ result.text += '\n'; pos += 1; return; }
      if(tag === 'P' || tag === 'DIV'){
        Array.from(node.childNodes).forEach(walk);
        if(node.nextSibling){ result.text += '\n'; pos += 1; }
        return;
      }
      const isBold = tag === 'B' || tag === 'STRONG';
      const isItalic = tag === 'I' || tag === 'EM';
      if(isBold || isItalic){
        const start = pos;
        Array.from(node.childNodes).forEach(walk);
        if(pos > start) result.formats.push({ start, end:pos, bold:isBold, italic:isItalic });
        return;
      }
      Array.from(node.childNodes).forEach(walk);
    }

    Array.from(editorEl.childNodes).forEach(walk);
    result.text = result.text.replace(/\n+$/, '');
    return result;
  }

  /* ── COLORS & ICONS ── */
  function getColors(team){
    return TEAM_COLORS[team] || NEUTRAL;
  }

  function getEventIcon(event){
    if(!event) return '';
    const key = event.toLowerCase();
    const svg = EVENT_ICONS[key] || '';
    if(!svg) return '';
    return `<span class="fcard__icon" aria-hidden="true">${svg}</span>`;
  }

  /* ── PUBLISH / PIN STATE ── */
  function syncStatusUI(){
    const pub = state.isPublished;
    const pin = state.isPinned;
    const hasId = !!dom.fId.value.trim();

    // Status label
    dom.statusLabel.className = 'status-label';
    if(!hasId){
      dom.statusLabel.textContent = 'Draft';
      dom.statusLabel.classList.add('status-label--draft');
    } else if(pub){
      dom.statusLabel.textContent = 'Published';
      dom.statusLabel.classList.add('status-label--published');
    } else {
      dom.statusLabel.textContent = 'Unpublished';
      dom.statusLabel.classList.add('status-label--unpublished');
    }

    // Publish button
    dom.btnPublish.classList.toggle('is-on', pub);
    dom.btnPublishLabel.textContent = pub ? 'Published' : 'Publish';

    // Pin button
    dom.btnPin.classList.toggle('is-on', pin);
    dom.btnPinLabel.textContent = pin ? 'Pinned' : 'Pin';
  }

  /* ── EDITOR OPEN/CLOSE ── */
  function toggleEditorPanel(){
    state.editorOpen = !state.editorOpen;
    dom.editorPanel.classList.toggle('is-open', state.editorOpen);
    dom.collapsedChevron.classList.toggle('is-open', state.editorOpen);
  }

  function openEditorPanel(){
    state.editorOpen = true;
    dom.editorPanel.classList.add('is-open');
    dom.collapsedChevron.classList.add('is-open');
  }

  function setEditorMode(isNew, post){
    state.isNew = isNew;

    if(isNew){
      dom.editorHead.className = 'editor-panel__head editor-panel__head--new';
      dom.editorTitle.textContent = 'New post';
      dom.editorSubtitle.textContent = 'Compose a new live blog entry';
      dom.collapsedTitle.textContent = 'New post';
      dom.collapsedSub.textContent = 'Click to expand editor';
      dom.btnDelete.style.display = 'none';
      dom.fId.style.display = 'none';
    } else {
      dom.editorHead.className = 'editor-panel__head editor-panel__head--edit';
      dom.editorTitle.textContent = 'Editing post';
      dom.editorSubtitle.textContent = post.team || post.event || post.id || '';
      dom.collapsedTitle.textContent = 'Editing: ' + (post.team || post.event || post.id);
      dom.collapsedSub.textContent = 'Click to expand editor';
      dom.btnDelete.style.display = 'inline-flex';
      dom.fId.style.display = 'block';
    }

    syncStatusUI();
  }

  function clearEditorFields(){
    dom.fId.value = '';
    dom.fEvent.value = '';
    dom.fTeam.value = '';
    dom.fMatchTime.value = '';
    dom.fClockTime.value = '';
    dom.fHome.value = '';
    dom.fAway.value = '';
    dom.fHomePens.value = '';
    dom.fAwayPens.value = '';
    dom.fCopy.innerHTML = '';
    dom.fMediaType.value = '';
    dom.fMediaUrl.value = '';
    state.isPublished = true;
    state.isPinned = false;
    state.activeId = '';
  }

  function openNewEditor(){
    clearEditorFields();
    setEditorMode(true, null);
    openEditorPanel();
    renderFeed();
    dom.fEvent.focus();
  }

  function openEditEditor(post){
    state.activeId = post.id || '';
    dom.fId.value = post.id || '';
    dom.fEvent.value = post.event || '';
    dom.fTeam.value = post.team || '';
    dom.fMatchTime.value = post.match_time || '';
    dom.fClockTime.value = post.clock_time ? post.clock_time.slice(0,16) : '';
    dom.fHome.value = post.home != null ? post.home : '';
    dom.fAway.value = post.away != null ? post.away : '';
    dom.fHomePens.value = post.home_pens || '';
    dom.fAwayPens.value = post.away_pens || '';
    dom.fCopy.innerHTML = post.copy_html || '';
    dom.fMediaType.value = post.media_type || '';
    dom.fMediaUrl.value = post.media_url || '';
    state.isPublished = !!post.published;
    state.isPinned = !!post.pinned;
    setEditorMode(false, post);
    openEditorPanel();
    renderFeed();
    setStatus('Editing: ' + (post.team || post.event || post.id));
  }

  /* ── FEED RENDER ── */
  function renderFeed(){
    const q = state.search.toLowerCase();

    // Merge posts + published submissions
    const postItems = state.posts
      .filter(p => !p.deleted)
      .map(p => ({ type:'post', data:p, sort: Number(p.clockSort) || 0, id:p.id }));

    const subItems = state.submissions
      .filter(s => s.published && !state.hiddenSubs.has(String(s.row_id)))
      .map(s => ({ type:'sub', data:s, sort: s.timestamp_ms || 0, id:'sub-' + s.row_id }));

    let all = [...postItems, ...subItems].sort((a,b) => {
      if(b.sort !== a.sort) return b.sort - a.sort;
      return String(b.id).localeCompare(String(a.id));
    });

    if(q){
      all = all.filter(item => {
        const d = item.data;
        return (d.team||'').toLowerCase().includes(q)
          || (d.event||'').toLowerCase().includes(q)
          || (d.match_time||'').toLowerCase().includes(q)
          || (d.name||'').toLowerCase().includes(q)
          || (d.note||'').toLowerCase().includes(q)
          || (d.copy_html||'').replace(/<[^>]+>/g,'').toLowerCase().includes(q);
      });
    }

    const total = state.posts.filter(p => !p.deleted).length;
    const live = state.posts.filter(p => p.published && !p.deleted).length;
    dom.feedTitle.textContent = `Live feed — ${live} live of ${total} posts`;

    if(!all.length){
      dom.feedEl.innerHTML = '<div class="feed-empty">No published posts or submissions yet.</div>';
      return;
    }

    // Build inline preview if editor is open
    const previewHtml = state.editorOpen ? buildPreviewCardHtml() : '';

    let html = '';

    if(state.isNew && previewHtml){
      html += previewHtml;
    }

    all.forEach(item => {
      if(item.type === 'sub'){
        html += buildSubCardHtml(item.data);
      } else {
        const isEditing = !state.isNew && String(item.data.id) === String(state.activeId);
        if(isEditing && previewHtml){
          html += previewHtml;
        } else {
          html += buildPostCardHtml(item.data);
        }
      }
    });

    dom.feedEl.innerHTML = html;

    // Bind card clicks for editing
    dom.feedEl.querySelectorAll('.fcard[data-pid]').forEach(function(el){
      el.addEventListener('click', function(){
        const post = state.posts.find(p => String(p.id) === el.getAttribute('data-pid'));
        if(post) openEditEditor(post);
      });
    });
  }

  function getEventColor(event){
    if(!event) return null;
    const key = (event||'').toLowerCase();
    if(key === 'yellow card') return '#ca8a04';
    if(key === 'red card') return '#dc2626';
    return null;
  }

  function buildPostCardHtml(post){
    const colors = getColors(post.team);
    const timeLabel = escHtml(post.match_time || (post.clock_time ? post.clock_time.slice(11,16) : ''));
    const home = String(post.home ?? '').trim();
    const away = String(post.away ?? '').trim();
    const homePens = String(post.home_pens ?? '').trim();
    const awayPens = String(post.away_pens ?? '').trim();
    const scoreLabel = home !== '' && away !== '' ? escHtml(home + ' – ' + away) : '';
    const pensLabel = homePens && awayPens ? escHtml('(' + homePens + ' – ' + awayPens + ' pens)') : '';

    const iconHtml = getEventIcon(post.event);

    const pills = [];
    if(post.published) pills.push('<span class="fpill fpill--live">Live</span>');
    else pills.push('<span class="fpill fpill--draft">Draft</span>');
    if(post.pinned) pills.push('<span class="fpill fpill--pinned">Pinned</span>');

    return `
      <div class="fcard" data-pid="${escHtml(post.id)}">
        <div class="fcard__head" style="background:${colors.bg};border-bottom-color:${colors.border}">
          <div class="fcard__head-left">
            ${timeLabel ? `<span class="fcard__chip">${timeLabel}</span>` : ''}
            ${iconHtml}
            <div>
              ${post.team ? `<div class="fcard__team">${escHtml(post.team)}</div>` : ''}
              ${post.event ? `<div class="fcard__event">${escHtml(post.event)}</div>` : ''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            ${scoreLabel ? `<span class="fcard__score">${scoreLabel}</span>` : ''}
            ${pensLabel ? `<span class="fcard__chip" style="font-size:.6rem;">${pensLabel}</span>` : ''}
          </div>
        </div>
        ${post.copy_html ? `<div class="fcard__body">${post.copy_html}</div>` : ''}
        <div class="fcard__footer">${pills.join('')}</div>
      </div>
    `;
  }

  function buildSubCardHtml(sub){
    const name = escHtml(sub.name || 'Anonymous');
    const note = escHtml(sub.note || '');
    const time = sub.timestamp ? escHtml(sub.timestamp.slice(0,16).replace('T',' ')) : '';

    return `
      <div class="fcard fcard--sub">
        <div class="fcard__head" style="background:#223b7c;border-bottom-color:#9e0000;">
          <div class="fcard__head-left">
            ${time ? `<span class="fcard__chip">${time}</span>` : ''}
            <div class="fcard__team">${name}</div>
          </div>
          <span class="fpill fpill--sub" style="background:rgba(255,255,255,.15);color:#fff;align-self:center;">Fan note</span>
        </div>
        <div class="fcard__body">
          <div class="fan-quote">${note}</div>
          <div class="fan-byline">— ${name}</div>
        </div>
      </div>
    `;
  }

  function buildPreviewCardHtml(){
    const team = dom.fTeam.value.trim();
    const event = dom.fEvent.value.trim();
    const matchTime = dom.fMatchTime.value.trim();
    const home = dom.fHome.value.trim();
    const away = dom.fAway.value.trim();
    const homePens = dom.fHomePens.value.trim();
    const awayPens = dom.fAwayPens.value.trim();
    const copy = dom.fCopy.innerHTML.trim();

    if(!team && !event && !copy) return '';

    const colors = getColors(team);
    const timeLabel = matchTime ? escHtml(matchTime) : '';
    const scoreLabel = home !== '' && away !== '' ? escHtml(home + ' – ' + away) : '';
    const pensLabel = homePens && awayPens ? escHtml('(' + homePens + ' – ' + awayPens + ' pens)') : '';
    const iconHtml = getEventIcon(event);

    return `
      <div class="fcard is-editing" style="cursor:default;">
        <div class="fcard__head" style="background:${colors.bg};border-bottom-color:${colors.border}">
          <div class="fcard__head-left">
            ${timeLabel ? `<span class="fcard__chip">${timeLabel}</span>` : ''}
            ${iconHtml}
            <div>
              ${team ? `<div class="fcard__team">${escHtml(team)}</div>` : ''}
              ${event ? `<div class="fcard__event">${escHtml(event)}</div>` : ''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            ${scoreLabel ? `<span class="fcard__score">${scoreLabel}</span>` : ''}
            ${pensLabel ? `<span class="fcard__chip" style="font-size:.6rem;">${pensLabel}</span>` : ''}
          </div>
        </div>
        ${copy ? `<div class="fcard__body">${copy}</div>` : ''}
        <div class="fcard__footer">
          <span class="fpill" style="background:#dbeafe;color:#1e40af;">
            ${state.isNew ? 'New · editing' : 'Editing'}
          </span>
          ${state.isPublished ? '<span class="fpill fpill--live">Live</span>' : '<span class="fpill fpill--draft">Draft</span>'}
          ${state.isPinned ? '<span class="fpill fpill--pinned">Pinned</span>' : ''}
        </div>
      </div>
    `;
  }

  /* ── SUBMISSIONS RAIL ── */
  function renderSubRail(){
    const visible = state.submissions.filter(s => !state.hiddenSubs.has(String(s.row_id)));
    const pending = visible.filter(s => !s.published).length;
    dom.subCounts.textContent = `${visible.length} submissions · ${pending} pending`;

    if(!visible.length){
      dom.subRailBody.innerHTML = '<div class="rail-empty">No submissions.</div>';
      return;
    }

    dom.subRailBody.innerHTML = visible.map(function(item){
      const name = escHtml(item.name || 'Anonymous');
      const note = escHtml(item.note || '');
      const time = item.timestamp ? escHtml(item.timestamp.slice(0,16).replace('T',' ')) : '';
      const isPub = !!item.published;

      return `
        <div class="scard" data-srow="${item.row_id}">
          <div class="scard__body">
            <div class="scard__name">${name}</div>
            <div class="scard__time">${time}</div>
            <div class="scard__note">${note}</div>
          </div>
          <div class="scard__actions">
            <button class="scard__btn scard__btn--pub${isPub?' is-active':''}"
                    data-sub="publish" data-row="${item.row_id}" type="button">✓ Publish</button>
            <button class="scard__btn scard__btn--hide${!isPub?' is-active':''}"
                    data-sub="unpublish" data-row="${item.row_id}" type="button">✕ Hide</button>
            <button class="scard__btn scard__btn--del"
                    data-sub="delete" data-row="${item.row_id}" type="button">🗑</button>
          </div>
        </div>
      `;
    }).join('');

    dom.subRailBody.querySelectorAll('[data-sub]').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        const action = btn.getAttribute('data-sub');
        const row = btn.getAttribute('data-row');
        if(action === 'delete'){
          state.hiddenSubs.add(String(row));
          renderSubRail();
          renderFeed();
        } else {
          updateSub(row, action === 'publish').catch(handleErr);
        }
      });
    });
  }

  /* ── SAVE / DELETE ── */
  async function savePost(){
    const richData = extractRichData(dom.fCopy);

    const payload = {
      action: 'savePost',
      id: dom.fId.value.trim(),
      published: state.isPublished ? 'TRUE' : 'FALSE',
      pinned: state.isPinned ? 'TRUE' : 'FALSE',
      deleted: 'FALSE',
      event: dom.fEvent.value.trim(),
      team: dom.fTeam.value.trim(),
      match_time: dom.fMatchTime.value.trim(),
      clock_time: dom.fClockTime.value.trim(),
      home: dom.fHome.value.trim(),
      away: dom.fAway.value.trim(),
      home_pens: dom.fHomePens.value.trim(),
      away_pens: dom.fAwayPens.value.trim(),
      copy_text: richData.text,
      copy_formats: JSON.stringify(richData.formats),
      media_type: dom.fMediaType.value.trim(),
      media_url: dom.fMediaUrl.value.trim()
    };

    if(!payload.event && !payload.team && !payload.copy_text){
      setStatus('Needs at least event, team or copy.', 'error');
      return;
    }

    setStatus('Saving…');
    dom.btnSave.disabled = true;

    try{
      const data = await apiFetch(payload);
      setStatus(data.message || 'Saved.', 'success');
      await loadPosts();

      if(data.id){
        const saved = state.posts.find(p => String(p.id) === String(data.id));
        if(saved){
          openEditEditor(saved);
        } else {
          dom.fId.value = data.id;
          dom.fId.style.display = 'block';
          state.activeId = data.id;
          state.isNew = false;
          renderFeed();
        }
      }
    } finally {
      dom.btnSave.disabled = false;
    }
  }

  async function deletePost(){
    const id = dom.fId.value.trim();
    if(!id){ setStatus('No post selected.', 'error'); return; }
    if(!window.confirm('Soft-delete this post? It stays in the sheet but disappears from the blog.')) return;

    setStatus('Deleting…');
    const data = await apiFetch({ action:'deletePost', id });
    setStatus(data.message || 'Deleted.', 'success');
    clearEditorFields();
    setEditorMode(true, null);
    state.editorOpen = false;
    dom.editorPanel.classList.remove('is-open');
    dom.collapsedChevron.classList.remove('is-open');
    await loadPosts();
  }

  /* ── SUBMISSIONS ── */
  async function updateSub(rowId, publish){
    const current = state.submissions.find(s => String(s.row_id) === String(rowId));
    if(!current){ setStatus('Submission not found.', 'error'); return; }

    const prev = current.published;
    current.published = publish;
    // stamp or clear timestamp for feed ordering
    if(publish){
      current.timestamp_ms = Date.now();
      current.timestamp = new Date().toISOString().slice(0,16).replace('T',' ');
    } else {
      current.timestamp_ms = 0;
    }

    renderSubRail();
    renderFeed();

    try{
      await apiFetch({
        action: 'updateSubmission',
        row_id: rowId,
        name: current.name || '',
        note: current.note || '',
        status: publish ? 'published' : 'pending',
        published: publish ? 'TRUE' : 'FALSE'
      });
      setStatus(publish ? 'Published.' : 'Hidden.', 'success');
    } catch(err){
      current.published = prev;
      if(!publish) current.timestamp_ms = 0;
      renderSubRail();
      renderFeed();
      handleErr(err);
    }
  }

  /* ── API LOAD ── */
  async function loadPosts(){
    const data = await apiGet({ action:'listPosts' });
    state.posts = Array.isArray(data.items) ? data.items : [];
    renderFeed();
  }

  async function loadSubs(){
    const data = await apiGet({ action:'listSubmissions' });
    state.submissions = Array.isArray(data.items) ? data.items : [];
    renderSubRail();
    renderFeed();
  }

  async function reloadAll(){
    setStatus('Loading…');
    await Promise.all([loadPosts(), loadSubs()]);
    setStatus('Loaded.', 'success');
  }

  /* ── RTE ── */
  function bindRTE(){
    document.querySelectorAll('.rte-btn[data-cmd]').forEach(function(btn){
      btn.addEventListener('mousedown', function(e){
        e.preventDefault();
        const cmd = btn.getAttribute('data-cmd');
        if(cmd === 'para') document.execCommand('insertHTML', false, '<p><br></p>');
        else if(cmd === 'br') document.execCommand('insertHTML', false, '<br>');
        else if(cmd === 'clear') document.execCommand('removeFormat', false, null);
        else document.execCommand(cmd, false, null);
        dom.fCopy.focus();
        syncRTEBar();
        renderFeed();
      });
    });

    dom.fCopy.addEventListener('input', () => { syncRTEBar(); renderFeed(); });
    dom.fCopy.addEventListener('keyup', syncRTEBar);
    dom.fCopy.addEventListener('mouseup', syncRTEBar);
  }

  function syncRTEBar(){
    ['bold','italic'].forEach(function(cmd){
      const btn = document.querySelector(`.rte-btn[data-cmd="${cmd}"]`);
      if(btn) btn.classList.toggle('is-on', document.queryCommandState(cmd));
    });
  }

  /* ── COMBOS ── */
  function buildCombo(inputEl, listEl, options){
    let focused = -1;

    function showList(filter){
      const f = (filter||'').toLowerCase();
      const filtered = options.filter(o => o.toLowerCase().includes(f));
      if(!filtered.length){ listEl.classList.remove('is-open'); return; }
      listEl.innerHTML = filtered.map(o =>
        `<div class="combo__opt" data-val="${escHtml(o)}">${escHtml(o)}</div>`
      ).join('');
      listEl.classList.add('is-open');
      focused = -1;
      listEl.querySelectorAll('.combo__opt').forEach(function(el){
        el.addEventListener('mousedown', function(e){
          e.preventDefault();
          inputEl.value = el.getAttribute('data-val');
          listEl.classList.remove('is-open');
          renderFeed();
        });
      });
    }

    inputEl.addEventListener('focus', () => showList(inputEl.value));
    inputEl.addEventListener('input', () => { showList(inputEl.value); renderFeed(); });

    inputEl.addEventListener('keydown', function(e){
      const opts = listEl.querySelectorAll('.combo__opt');
      if(e.key === 'ArrowDown'){ e.preventDefault(); focused = Math.min(focused+1, opts.length-1); }
      else if(e.key === 'ArrowUp'){ e.preventDefault(); focused = Math.max(focused-1, 0); }
      else if(e.key === 'Enter' && focused >= 0){
        e.preventDefault();
        inputEl.value = opts[focused].getAttribute('data-val');
        listEl.classList.remove('is-open');
        renderFeed();
        return;
      }
      else if(e.key === 'Escape'){ listEl.classList.remove('is-open'); return; }
      opts.forEach((o,i) => o.classList.toggle('is-focused', i === focused));
    });

    document.addEventListener('click', function(e){
      if(!inputEl.contains(e.target) && !listEl.contains(e.target)){
        listEl.classList.remove('is-open');
      }
    });
  }

  /* ── BIND EVENTS ── */
  function handleErr(err){
    console.error(err);
    setStatus(err && err.message ? err.message : 'Something went wrong.', 'error');
  }

  function bindEvents(){
    dom.btnNew.addEventListener('click', openNewEditor);
    dom.btnReload.addEventListener('click', () => reloadAll().catch(handleErr));
    dom.btnSave.addEventListener('click', () => savePost().catch(handleErr));
    dom.btnClear.addEventListener('click', openNewEditor);
    dom.btnDelete.addEventListener('click', () => deletePost().catch(handleErr));

    dom.editorCollapsed.addEventListener('click', toggleEditorPanel);

    dom.btnPublish.addEventListener('click', function(){
      state.isPublished = !state.isPublished;
      syncStatusUI();
      renderFeed();
    });

    dom.btnPin.addEventListener('click', function(){
      state.isPinned = !state.isPinned;
      syncStatusUI();
      renderFeed();
    });

    dom.feedSearch.addEventListener('input', function(){
      state.search = dom.feedSearch.value;
      renderFeed();
    });

    // Live preview on field changes
    [dom.fEvent, dom.fTeam, dom.fMatchTime, dom.fHome, dom.fAway,
     dom.fHomePens, dom.fAwayPens, dom.fMediaUrl].forEach(function(el){
      el.addEventListener('input', renderFeed);
    });

    dom.fMediaType.addEventListener('change', renderFeed);
    dom.fMatchTime.addEventListener('input', renderFeed);
  }

  /* ── INIT ── */
  async function init(){
    buildCombo(dom.fEvent, $('comboEventList'), EVENT_OPTIONS);
    buildCombo(dom.fTeam, $('comboTeamList'), TEAM_OPTIONS);
    bindRTE();
    bindEvents();
    syncStatusUI();
    await reloadAll();
  }

  init().catch(handleErr);

})();
</script>
</body>
</html>
