<!-- nl-tools protected launcher v1.0 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NL Tools</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; }
    .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card { width: min(720px, 100%); border: 1px solid rgba(127,127,127,.35); border-radius: 14px; padding: 22px; }
    h1 { margin: 0 0 14px; font-size: 22px; }
    .btns { display: flex; flex-wrap: wrap; gap: 12px; }
    a.btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 14px 16px; border-radius: 12px;
      border: 1px solid rgba(127,127,127,.45);
      text-decoration: none; font-size: 16px; min-width: 220px;
    }
    a.btn:hover { opacity: .9; }
    .row { display: flex; gap: 12px; align-items: center; justify-content: space-between; margin-top: 14px; flex-wrap: wrap; }
    button {
      padding: 10px 12px; border-radius: 10px;
      border: 1px solid rgba(127,127,127,.45);
      cursor: pointer; font-size: 14px;
      background: transparent;
    }
    .hint { font-size: 12px; opacity: .75; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>NL Tools</h1>

      <div class="btns">
        <a class="btn" href="./totw/">TOTW</a>
        <a class="btn" href="./article-composer/">Article Composer</a>
      </div>

      <div class="row">
        <div class="hint">Tip: bookmark this page.</div>
        <button id="logout" type="button">Log out</button>
      </div>
    </div>
  </div>

  <script>
    // nl-tools protected launcher v1.0
    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("nltools_gate_hash_v1");
      window.location.href = "../";
    });
  </script>
</body>
</html>
