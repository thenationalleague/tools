<!-- nl-tools launcher v1.1 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NL Tools</title>
  <meta name="robots" content="noindex,nofollow" />

  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      background: #f6f7f9;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 600;
    }

    .sub {
      margin-bottom: 20px;
      opacity: .7;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(240px,1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    a.tool {
      padding: 18px;
      border-radius: 14px;
      text-decoration: none;
      background: #9e0000;
      color: white;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    a.tool span {
      font-size: 13px;
      opacity: .85;
      font-weight: 400;
    }

    a.tool:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,.15);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    .hint {
      font-size: 12px;
      opacity: .6;
    }

    button {
      border: 1px solid #d4d7dc;
      background: transparent;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>NL Tools</h1>
      <div class="sub">Internal utilities</div>

      <div class="grid">
        <a class="tool" href="./totw/">
          TOTW Builder
          <span>Create and export Team of the Week graphics</span>
        </a>

        <a class="tool" href="./article-composer/">
          Article Composer
          <span>Write and format articles quickly</span>
        </a>
      </div>

      <div class="footer">
        <div class="hint">Bookmark this page</div>
        <button id="logout">Log out</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("nltools_gate_hash_v1");
      window.location.href = "../";
    });
  </script>
</body>
</html>
