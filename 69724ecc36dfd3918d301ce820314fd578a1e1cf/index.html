<!-- nl-tools launcher v1.5 -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>National League</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">

  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }

    body {
      font-family: "carbona-variable", sans-serif;
      font-weight: 400;
      margin: 0;
      background: #f6f7f9;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: white;
      border-radius: 20px;
      padding: 32px 30px 28px;
      box-shadow: 0 12px 34px rgba(0,0,0,.08);
      text-align: center;
    }

    .logo {
      width: 80px;
      margin: 0 auto 14px;
      display: block;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      font-weight: 800;
    }

    .sub {
      margin-bottom: 22px;
      opacity: .65;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(240px,1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    a.tool {
      padding: 20px;
      border-radius: 14px;
      text-decoration: none;
      background: #9e0000;
      color: white;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    a.tool span {
      font-size: 13px;
      opacity: .85;
      font-weight: 400;
    }

    a.tool:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,.15);
    }

    .footer {
      display: flex;
      justify-content: center;
      margin-top: 6px;
    }

    button {
      border: 1px solid #d4d7dc;
      background: transparent;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <img class="logo" id="nlLogo" src="" alt="National League logo">

      <h1>National League</h1>
      <div class="sub">Internal tools</div>

      <div class="grid">
        <a class="tool" href="./totw/">
          TOTW Builder
          <span>Create and export Team of the Week graphics</span>
        </a>

        <a class="tool" href="./article-composer/">
          Article Composer
          <span>Write and format articles quickly</span>
        </a>

        <a class="tool" href="./fixtures-results/">
          Fixtures / Results Builder
          <span>Build matchday fixtures or results graphics with crests, scores and status markers</span>
        </a>
      </div>

      <div class="footer">
        <button id="logout">Log out</button>
      </div>

    </div>
  </div>

  <script>
    // ===== Assets (same structure as league tables) =====
    const ASSETS_BASE = "./assets/";
    const CRESTS_BASE = ASSETS_BASE + "crests/";
    const DIVISIONS_BASE = ASSETS_BASE + "divisions/";

    function assetUrl(path){
      return encodeURI(path);
    }

    // Launcher logo: use the same division badge style
    // (change filename here if you later add a proper NL logo inside assets/)
    const nlLogo = document.getElementById("nlLogo");
    if(nlLogo){
      nlLogo.src = assetUrl(DIVISIONS_BASE + "National.png");
    }

    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("nltools_gate_hash_v1");
      window.location.href = "../";
    });
  </script>
</body>
</html>
