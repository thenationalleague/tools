<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Table Builder</title>

<!-- Adobe Fonts (same kit) -->
<link rel="preconnect" href="https://use.typekit.net" crossorigin>
<link rel="preconnect" href="https://p.typekit.net" crossorigin>

<style>
:root{
  --border:#d0d7de;
  --bg:#f6f8fa;
  --fg:#24292f;
  --muted:#57606a;
  --brand:#9e0000;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"carbona-variable", system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  font-size:14px;
  color:var(--fg);
  background:#fff;
}

.page{
  width:100%;
  padding:24px 18px 28px;
}

.app-header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:18px;
}

.app-header h1{
  margin:0;
  font-size:24px;
  font-weight:800;
}

.app{
  display:grid;
  grid-template-columns:minmax(520px, 980px) minmax(360px, 1fr);
  gap:20px;
  align-items:start;
}

@media (max-width: 980px){
  .app{ grid-template-columns:1fr; }
}

.previewWrap{
  position:sticky;
  top:16px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--bg);
  padding:10px;
}

canvas{
  display:block;
  width:100%;
  height:auto;
}

.panel{
  display:flex;
  flex-direction:column;
  gap:14px;
  min-width:0;
}

.box{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  background:#fff;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.controls select,
.controls input{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font:inherit;
}

.controls button,
.box button{
  padding:8px 10px;
  border:1px solid var(--brand);
  border-radius:10px;
  background:var(--brand);
  color:#fff;
  font:inherit;
  cursor:pointer;
}

.controls button:hover,
.box button:hover{ filter:brightness(.95); }

.section{
  display:flex;
  flex-direction:column;
  gap:6px;
}

textarea{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:12px;
  font:inherit;
  resize:vertical;
}

footer{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<!-- font warmup -->
<span id="fontWarmup" style="position:absolute;left:-9999px;top:-9999px;font-family:'carbona-extrabold','carbona-variable',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;">
  FONT-WARMUP-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz
</span>

<div class="page">

<header class="app-header">
  <h1>Table Builder</h1>
</header>

<div class="app">

  <div class="previewWrap">
    <canvas id="preview" width="1347" height="1347"></canvas>
  </div>

  <div class="panel">

    <div class="box controls">
      <select id="division" title="Division">
        <option value="National">National</option>
        <option value="North">North</option>
        <option value="South">South</option>
      </select>

      <select id="matchday" title="Matchday">
        <option value="">N/A</option>
      </select>

      <button type="button" id="renderBtn" title="Rebuild from pasted table">Render</button>
      <button type="button" id="download" title="Download PNG export">Download PNG</button>
      <button type="button" id="resetAll" title="Reset everything">Reset all</button>
    </div>

    <div class="box section">
      <label for="pasteIn">Paste league table (TSV/CSV)</label>
      <textarea id="pasteIn" rows="14" placeholder="Paste your table here (with or without header row, with or without Pos column)."></textarea>
    </div>

    <footer>
      <span id="status">Ready</span>
      <span id="fontStatus" style="margin-left:auto;">Font: …</span>
    </footer>

  </div>
</div>

</div>

  function loadImage(url){
    if(imgCache.has(url)) return imgCache.get(url);

    const p = new Promise((resolve,reject)=>{
      const img = new Image();

      // Only needed for cross-origin images (badges/crests).
      // Safe to leave on, but the real requirement is: server must send CORS headers.
      img.crossOrigin = "anonymous";

      img.onload = ()=> {
        imgObjCache.set(url, img);
        resolve(img);
      };

      img.onerror = ()=> {
        reject(new Error(
          "IMAGE LOAD FAILED: " + url +
          " (Check filename/case, and that the file exists in /league-tables. On GitHub Pages, case matters.)"
        ));
      };

      img.src = url;
    });

    imgCache.set(url, p);
    return p;
  }

  function safeText(s){ return (s || "").replace(/\s+/g," ").trim(); }

  function toAllCaps(s){ return safeText(s).toUpperCase(); }

  function normalizeTeamName(team){
    let t = safeText(team);
    t = t.replace(/^\s*\d+\s+/, "");
    if(/^Hampton\s*&\s*Richmond\s*Borough$/i.test(t)) t = "Hampton & Richmond";
    return t;
  }
  
  function drawContainedImage(c, img, x, y, w, h, maxSize){
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if(!iw || !ih) return;

    const s = Math.min(maxSize / iw, maxSize / ih);
    const dw = iw * s;
    const dh = ih * s;

    const cx = x + w/2;
    const cy = y + h/2;

    const dx = cx - dw/2;
    const dy = cy - dh/2;

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(img, dx, dy, dw, dh);
  }

  async function preloadCrests(){
    const urls = new Set();
    for(const r of rows){
      const teamCaps = safeText(r.team);
      if(!teamCaps) continue;
      const u = getCrestUrlForTeamCaps(teamCaps);
      if(u) urls.add(u);
    }
    await Promise.all([...urls].map(u => loadImage(u).catch(()=>null)));
  }

  function normalizeGD(s){
    const v = safeText(s);
    if(!v) return "";
    return v.replace(/^(\+)?0$/, "0");
  }

    const joined = cells.map(c=>String(c||"")).join(" ").toLowerCase();

  }

  function splitLine(line){
    if(line.includes("\t")) return line.split("\t").map(s=>s.trim()).filter(s=>s.length>0);
    if(line.includes(",")) return line.split(",").map(s=>s.trim()).filter(s=>s.length>0);
    return line.trim().split(/\s{2,}|\s+\|\s+|\s+/).map(s=>s.trim()).filter(s=>s.length>0);
  }

  function isIntLike(s){
    return /^-?\d+$/.test(String(s||"").trim());
  }

  function isNumLike(s){
    const v = String(s||"").trim();
    return /^[-+]?(\d+)$/.test(v) || /^[-+]?(\d+)\.(\d+)$/.test(v);
  }

  function parsePastedTable(raw){
    const text = (raw || "").replace(/\r/g, "\n");
    const lines = text.split("\n").map(l=>l.trim()).filter(l=>l.length>0);
    if(lines.length === 0) return Array.from({length: ROWS}, () => ({ team:"", p:"", gd:"", pts:"" }));

    let startIdx = 0;
    const firstCells = splitLine(lines[0]);
    if(firstCells.length && isProbablyHeader(firstCells)){
      startIdx = 1;
    }

    const out = [];
    for(let i = startIdx; i < lines.length; i++){
      const cells = splitLine(lines[i]);
      if(cells.length === 0) continue;
      if(isProbablyHeader(cells)) continue;

      const hasPos = cells.length >= 2 && isIntLike(cells[0]) && !isIntLike(cells[1]);
      const teamIdx = hasPos ? 1 : 0;

      const teamRaw = cells[teamIdx] || "";
      const team = normalizeTeamName(teamRaw);

      const rest = cells.slice(teamIdx + 1);
      const nums = rest.filter(isNumLike).map(s=>String(s).trim());

      if(team){
        const p = nums.length >= 1 ? nums[0] : "";
        const pts = nums.length >= 1 ? nums[nums.length - 1] : "";
        const gd = nums.length >= 2 ? nums[nums.length - 2] : "";

        out.push({
          team: toAllCaps(team),
          p: safeText(p),
          gd: normalizeGD(gd),
          pts: safeText(pts)
        });
      }

      if(out.length >= ROWS) break;
    }

    while(out.length < ROWS){
      out.push({ team:"", p:"", gd:"", pts:"" });
    }

    return out.slice(0, ROWS);
  }

  function titleForDivision(div){
    if(div === "North") return "ENTERPRISE NATIONAL LEAGUE NORTH";
    if(div === "South") return "ENTERPRISE NATIONAL LEAGUE SOUTH";
    return "ENTERPRISE NATIONAL LEAGUE";
  }

  function refreshFontStatus(){
    if(!fontStatusEl) return;

    const t = document.createElement("canvas");
    const c = t.getContext("2d");
    const sample = "FONT-WARMUP-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";

    c.font = `800 ${TITLE_SIZE}px ${CANVAS_FALLBACK_STACK}`;
    const wFallback = c.measureText(sample).width;

    c.font = `800 ${TITLE_SIZE}px ${FONT_ALL_STACK}`;
    const wTest = c.measureText(sample).width;

    const active = Math.abs(wFallback - wTest) >= 2;
    fontStatusEl.textContent = "Font: " + (active ? "CARBONA ACTIVE" : "FALLBACK");
  }

  async function ensureFontsLoaded(){
    try{
      const warm = document.getElementById("fontWarmup");
      if(warm){ void warm.offsetWidth; }

      if(document.fonts && document.fonts.load){
        await Promise.all([
          document.fonts.load(`800 ${TITLE_SIZE}px "carbona-extrabold"`).catch(()=>[]),
          document.fonts.load(`800 ${TEAM_TEXT_SIZE}px "carbona-extrabold"`).catch(()=>[]),
          document.fonts.load(`800 ${COL_VALUE_SIZE}px "carbona-extrabold"`).catch(()=>[]),
          document.fonts.load(`800 ${MATCHDAY_SIZE}px "carbona-extrabold"`).catch(()=>[]),
          document.fonts.load(`800 ${TITLE_SIZE}px "carbona-variable"`).catch(()=>[])
        ]);
        if(document.fonts.ready) await document.fonts.ready;
      }

      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      await new Promise(r => setTimeout(r, 120));
    }catch{}
  }

  /* ================= RENDER ================= */

  async function ensureBaseImages(){
    if(!bgImg) bgImg = await loadImage(BG_URL);

    const divUrl = DIV_BADGE[divisionSel.value] || DIV_BADGE.National;
    badgeImg = await loadImage(divUrl);

    if(!ticImg) ticImg = await loadImage(TIC_URL);
  }

  function drawTitleAndMatchday(c){
    const div = divisionSel.value || "National";
    const title = titleForDivision(div);

    c.save();
    c.textAlign = "left";
    c.textBaseline = "alphabetic";

    // Align titles to the left edge of the NEW crest squares
    // crest square left edge = (ROW_START_X + GLOBAL_DX) - CREST_BOX_W
    const titleX = (ROW_START_X - CREST_BOX_W) + GLOBAL_DX;

    c.fillStyle = TITLE_COLOR;
    c.font = `800 ${TITLE_SIZE}px ${FONT_ALL_STACK}`;
    c.fillText(title, titleX, TITLE_Y + GLOBAL_DY);

    const md = matchdaySel.value;
    if(md){
      c.fillStyle = MATCHDAY_COLOR;
      c.font = `800 ${MATCHDAY_SIZE}px ${FONT_ALL_STACK}`;
      c.fillText(`MATCHDAY ${md}`, titleX, MATCHDAY_Y + GLOBAL_DY);
    }

    c.restore();
  }

  function drawBadge(c){
    if(!badgeImg) return;

    const iw = badgeImg.naturalWidth || badgeImg.width;
    const ih = badgeImg.naturalHeight || badgeImg.height;
    const dw = iw * BADGE_MID.scale;
    const dh = ih * BADGE_MID.scale;

    // Midpoint is (x,y), so draw top-left at (x - dw/2, y - dh/2)
    const x = (BADGE_MID.x + GLOBAL_DX) - dw/2;
    const y = (BADGE_MID.y + GLOBAL_DY) - dh/2;

    c.drawImage(badgeImg, x, y, dw, dh);
  }
  function drawTicHealth(c){
    if(!ticImg) return;

    const iw = ticImg.naturalWidth || ticImg.width;
    const ih = ticImg.naturalHeight || ticImg.height;
    const dw = iw * TIC_SCALE;
    const dh = ih * TIC_SCALE;

    // Centre X matches badge midpoint X (same distance from left)
    // Centre Y is vertically centred on the canvas
    const cx = (BADGE_MID.x + GLOBAL_DX);
    const cy = (EXPORT_SIZE / 2) + GLOBAL_DY;

    const rad = (TIC_ROT_DEG * Math.PI) / 180;

    c.save();
    c.translate(cx, cy);
    c.rotate(rad);
    c.drawImage(ticImg, -dw/2, -dh/2, dw, dh);
    c.restore();
  }

  function drawColumnHeaders(c){
    c.save();
    c.textAlign = "center";
    c.textBaseline = "alphabetic";
    c.fillStyle = COL_HEADER_COLOR;
    c.font = `800 ${COL_HEADER_SIZE}px ${FONT_ALL_STACK}`;

    c.fillText("P",   COL_P_X + GLOBAL_DX,   COL_HEADER_Y + GLOBAL_DY);
    c.fillText("GD",  COL_GD_X + GLOBAL_DX,  COL_HEADER_Y + GLOBAL_DY);
    c.fillText("PTS", COL_PTS_X + GLOBAL_DX, COL_HEADER_Y + GLOBAL_DY);

    c.restore();
  }

  function drawRows(c){
    for(let i=0; i<ROWS; i++){
      const y = (ROW_START_Y + i * (ROW_H + ROW_GAP)) + GLOBAL_DY;

      const blueX = ROW_START_X + GLOBAL_DX;

      // NEW crest square sits immediately to the left of the blue number square
      const crestX = blueX - CREST_BOX_W;

      const r = rows[i] || {team:"", p:"", gd:"", pts:""};
      const teamCaps = safeText(r.team || "");
      const team = toAllCaps(teamCaps);

      // Crest square (maroon)
      c.fillStyle = CREST_BOX_COLOR;
      c.fillRect(crestX, y, CREST_BOX_W, CREST_BOX_H);

      // Crest image (max 36px)
      const crestUrl = teamCaps ? getCrestUrlForTeamCaps(teamCaps) : null;
      const crestImg = crestUrl ? imgObjCache.get(crestUrl) : null;
      if(crestImg){
        drawContainedImage(c, crestImg, crestX, y, CREST_BOX_W, CREST_BOX_H, CREST_MAX);
      }

      // Existing number square (blue)
      c.fillStyle = BLUE_BOX_COLOR;
      c.fillRect(blueX, y, BLUE_BOX_W, BLUE_BOX_H);

      // Existing team name square (red)
      const redX = blueX + BLUE_BOX_W + 0;
      c.fillStyle = RED_BOX_COLOR;
      c.fillRect(redX, y, RED_BOX_W, RED_BOX_H);

      const posNum = String(i+1);

      c.save();
      c.textBaseline = "middle";

      // Position number (2px lower than middle)
      c.textAlign = "center";
      c.fillStyle = POS_TEXT_COLOR;
      c.font = `800 ${POS_TEXT_SIZE}px ${FONT_ALL_STACK}`;
      c.fillText(posNum, blueX + BLUE_BOX_W/2, y + BLUE_BOX_H/2 + 2);

      // Team name (all caps, 2px lower than middle)
      c.textAlign = "left";
      c.fillStyle = TEAM_TEXT_COLOR;
      c.font = `800 ${TEAM_TEXT_SIZE}px ${FONT_ALL_STACK}`;
      c.fillText(team, redX + TEAM_TEXT_LEFT_PAD, y + RED_BOX_H/2 + 2);

      // Stats centered in columns (2px lower)
      c.textAlign = "center";
      c.fillStyle = COL_VALUE_COLOR;
      c.font = `800 ${COL_VALUE_SIZE}px ${FONT_ALL_STACK}`;
      c.fillText(String(r.p || ""),   COL_P_X + GLOBAL_DX,   y + ROW_H/2 + 2);
      c.fillText(String(r.gd || ""),  COL_GD_X + GLOBAL_DX,  y + ROW_H/2 + 2);
      c.fillText(String(r.pts || ""), COL_PTS_X + GLOBAL_DX, y + ROW_H/2 + 2);

      c.restore();
    }
  }

  async function render(){
    try{
      await ensureBaseImages();

      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,EXPORT_SIZE,EXPORT_SIZE);

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(bgImg, 0, 0, EXPORT_SIZE, EXPORT_SIZE);

      await preloadCrests();

      drawBadge(ctx);
      drawTitleAndMatchday(ctx);
      drawColumnHeaders(ctx);
      drawRows(ctx);

      // Overlay ON TOP of everything
      drawTicHealth(ctx);

      refreshFontStatus();
      setStatus("Rendered");

    }catch(e){
      console.error(e);
      setStatus(String(e && e.message ? e.message : e));
    }
  }

  function buildFilename(){
    const div = divisionSel.value || "National";
    const md = matchdaySel.value ? (" MD" + matchdaySel.value) : "";
    return `League Table ${div}${md}.png`;
  }

  async function downloadPNG(){
    const out = document.createElement("canvas");
    out.width = EXPORT_SIZE;
    out.height = EXPORT_SIZE;
    const outCtx = out.getContext("2d");

    try{
      await ensureBaseImages();

      outCtx.setTransform(1,0,0,1,0,0);
      outCtx.clearRect(0,0,EXPORT_SIZE,EXPORT_SIZE);

      outCtx.imageSmoothingEnabled = true;
      outCtx.imageSmoothingQuality = "high";
      outCtx.drawImage(bgImg, 0, 0, EXPORT_SIZE, EXPORT_SIZE);

      await preloadCrests();

      drawBadge(outCtx);
      drawTitleAndMatchday(outCtx);
      drawColumnHeaders(outCtx);
      drawRows(outCtx);

      // Overlay ON TOP of everything
      drawTicHealth(outCtx);

      let blob = null;

      try{
        blob = await new Promise(res => out.toBlob(res, "image/png"));
      }catch(err){
        // Some browsers throw if canvas is tainted by cross-origin images without CORS headers
        setStatus("EXPORT BLOCKED (CORS): a badge/crest image may not allow canvas export.");
        return;
      }

      if(!blob){
        setStatus("EXPORT BLOCKED (CORS): a badge/crest image may not allow canvas export.");
        return;
      }

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = buildFilename();
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);

      setStatus("Downloaded");
    }catch(e){
      console.error(e);
      setStatus(String(e && e.message ? e.message : e));
    }
  }

  /* ================= AUTOSAVE ================= */

  function autosave(){
    const payload = {
      v: VERSION,
      division: divisionSel.value,
      matchday: matchdaySel.value,
      pasteIn: pasteEl.value,
      rows
    };
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); }catch{}
  }

  function autoload(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const d = JSON.parse(raw);
      if(!d || typeof d !== "object") return;

      if(d.division && DIV_BADGE[d.division]) divisionSel.value = d.division;
      if(typeof d.matchday === "string") matchdaySel.value = d.matchday;
      if(typeof d.pasteIn === "string") pasteEl.value = d.pasteIn;

      if(Array.isArray(d.rows) && d.rows.length){
        rows = d.rows.slice(0, ROWS);
        while(rows.length < ROWS) rows.push({ team:"", p:"", gd:"", pts:"" });
      }
    }catch{}
  }

  /* ================= UI ================= */

  function populateMatchday(){
    for(let i=1;i<=46;i++){
      const o = document.createElement("option");
      o.value = String(i);
      o.textContent = String(i);
      matchdaySel.appendChild(o);
    }
  }

  function rebuildFromPaste(){
    rows = parsePastedTable(pasteEl.value);
    autosave();
    render();
  }

  function resetAll(){
    try{ localStorage.removeItem(STORAGE_KEY); }catch{}

    divisionSel.value = "National";
    matchdaySel.value = "";
    pasteEl.value = "";
    rows = Array.from({length: ROWS}, () => ({ team:"", p:"", gd:"", pts:"" }));

    bgImg = null;
    badgeImg = null;
    ticImg = null;

    autosave();
    render();
    setStatus("Reset all");
  }

  function bindUI(){
    divisionSel.addEventListener("change", ()=>{
      badgeImg = null;
      autosave();
      render();
    });

    matchdaySel.addEventListener("change", ()=>{
      autosave();
      render();
    });

    pasteEl.addEventListener("input", ()=>{
      autosave();
    });

    pasteEl.addEventListener("paste", ()=>{
      window.clearTimeout(bindUI._pt);
      bindUI._pt = window.setTimeout(()=> rebuildFromPaste(), 30);
    });

    renderBtn.addEventListener("click", rebuildFromPaste);
    downloadBtn.addEventListener("click", downloadPNG);
    resetAllBtn.addEventListener("click", resetAll);
  }

  /* ================= INIT ================= */

  async function start(){
    populateMatchday();
    autoload();
    bindUI();

    await ensureFontsLoaded();

    if(safeText(pasteEl.value)){
      rows = parsePastedTable(pasteEl.value);
    }

    await render();
  }

  start();

})();
</script>
