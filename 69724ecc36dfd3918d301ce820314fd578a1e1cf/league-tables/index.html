<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Table Builder</title>

<!-- Adobe Fonts (same kit) -->
<link rel="preconnect" href="https://use.typekit.net" crossorigin>
<link rel="preconnect" href="https://p.typekit.net" crossorigin>
<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">
<script src="https://use.typekit.net/gff4ipy.js"></script>
<script>
  try{ Typekit.load({ async:true }); }catch(e){}
</script>

<style>
:root{
  --border:#d0d7de;
  --bg:#f6f8fa;
  --fg:#24292f;
  --muted:#57606a;
  --brand:#9e0000;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"carbona-variable", system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  font-size:14px;
  color:var(--fg);
  background:#fff;
}

.page{
  width:100%;
  padding:24px 18px 28px;
}

.app-header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:18px;
}

.app-header h1{
  margin:0;
  font-size:24px;
  font-weight:800;
}

.app{
  display:grid;
  grid-template-columns:minmax(520px, 980px) minmax(420px, 1fr);
  gap:20px;
  align-items:start;
}

@media (max-width: 980px){
  .app{ grid-template-columns:1fr; }
}

.previewWrap{
  position:sticky;
  top:16px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--bg);
  padding:10px;
}

canvas{
  display:block;
  width:100%;
  height:auto;
}

.panel{
  display:flex;
  flex-direction:column;
  gap:14px;
  min-width:0;
}

.box{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  background:#fff;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.controls select,
.controls input{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font:inherit;
}

.controls button,
.box button{
  padding:8px 10px;
  border:1px solid var(--brand);
  border-radius:10px;
  background:var(--brand);
  color:#fff;
  font:inherit;
  cursor:pointer;
}

.controls button:hover,
.box button:hover{ filter:brightness(.95); }

.section{
  display:flex;
  flex-direction:column;
  gap:6px;
}

textarea{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:12px;
  font:inherit;
  resize:vertical;
}

footer{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
}

/* ===== grid editor ===== */
.gridWrap{
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}

.gridTopBar{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
}

.gridTopBar .hint{
  font-size:12px;
  color:var(--muted);
}

.gridScroller{
  max-height:520px;
  overflow:auto;
  background:#fff;
}

table.grid{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  min-width:640px;
}

.grid thead th{
  position:sticky;
  top:0;
  z-index:2;
  background:#fff;
  border-bottom:1px solid var(--border);
  font-size:12px;
  color:var(--muted);
  text-align:left;
  padding:10px 10px;
  white-space:nowrap;
}

.grid tbody td{
  border-bottom:1px solid #eef1f4;
  padding:6px 8px;
  vertical-align:middle;
}

.grid tbody tr:last-child td{
  border-bottom:none;
}

.cell-pos{
  width:54px;
  text-align:center;
  font-weight:800;
  color:#111;
}

.grid select,
.grid input{
  width:100%;
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font:inherit;
}

.grid .small{
  width:74px;
  text-align:center;
}

.grid .override{
  width:84px;
  text-align:center;
}

.grid .team{
  min-width:260px;
}

@media (max-width: 980px){
  .gridScroller{ max-height:360px; }
}
</style>
</head>

<body>

<!-- font warmup -->
<span id="fontWarmup" style="position:absolute;left:-9999px;top:-9999px;font-family:'carbona-extrabold','carbona-variable',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;">
  FONT-WARMUP-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz
</span>

<div class="page">

<header class="app-header">
  <h1>Table Builder</h1>
</header>

<div class="app">

  <div class="previewWrap">
    <canvas id="preview" width="1347" height="1347"></canvas>
  </div>

  <div class="panel">

    <div class="box controls">
      <select id="division" title="Division">
        <option value="National">National</option>
        <option value="North">North</option>
        <option value="South">South</option>
      </select>

      <select id="matchday" title="Matchday">
        <option value="">N/A</option>
      </select>

      <button type="button" id="download1x1" title="Download square export (1347 x 1347)">Download 1x1 PNG</button>
      <button type="button" id="download4x5" title="Download 4x5 export (1080 x 1347)">Download 4x5 PNG</button>
      <button type="button" id="resetAll" title="Reset everything">Reset all</button>
    </div>

    <div class="box section">
      <label for="pasteIn">Paste league table (TSV/CSV)</label>
      <textarea id="pasteIn" rows="10" placeholder="Paste your table here (with or without header row)."></textarea>
    </div>

    <div class="box section">
      <div class="gridWrap">
        <div class="gridTopBar">
          <div style="font-weight:800;">Grid editor</div>
          <div class="hint">Edits update the graphic instantly. Paste ↔ grid stays in sync.</div>
        </div>

        <div class="gridScroller">
          <table class="grid" aria-label="Table grid editor">
            <thead>
              <tr>
                <th style="width:54px;">Pos</th>
                <th style="width:84px;">Flag</th>
                <th>Team</th>
                <th style="width:84px;">P</th>
                <th style="width:84px;">GD</th>
                <th style="width:84px;">Pts</th>
              </tr>
            </thead>
            <tbody id="gridBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <footer>
      <span id="status">Ready</span>
      <span id="fontStatus" style="margin-left:auto;">Font: …</span>
    </footer>

  </div>
</div>

</div>

<script>
(function(){
  "use strict";

  /* ================= CONFIG ================= */

  const VERSION = "v2.4";
  const STORAGE_KEY = "table-builder-v2.4";

  const EXPORT_SIZE = 1347;

  const GLOBAL_DX = 0;
  const GLOBAL_DY = -10;

  function localAssetUrl(filename){
    return encodeURI("./" + filename);
  }

  const BG_URL = localAssetUrl("League Table background.png");

  const DIV_BADGE = {
    National: "https://images.gc.nationalleagueservices.co.uk/a95e6fe0-0b4a-11f1-81c5-055e14995095.png",
    North:    "https://images.gc.nationalleagueservices.co.uk/b02360b0-0b4a-11f1-81c5-055e14995095.png",
    South:    "https://images.gc.nationalleagueservices.co.uk/b9b1f8d0-0b4a-11f1-81c5-055e14995095.png"
  };

  const TIC_URL = localAssetUrl("TIC Health.png");
  const TIC_SCALE = 0.30;
  const TIC_ROT_DEG = -90;

  const BADGE_MID = { x:180, y:120, scale:0.08 };

  /* ===== TEAMS (dropdown list = official names) ===== */
  const TEAMS_DROPDOWN = [
    "Aldershot Town","Altrincham","Boreham Wood","Boston United","Brackley Town","Braintree Town","Carlisle United","Eastleigh",
    "FC Halifax Town","Forest Green Rovers","Gateshead","Hartlepool United","Morecambe","Rochdale","Scunthorpe United","Solihull Moors",
    "Southend United","Sutton United","Tamworth","Truro City","Wealdstone","Woking","Yeovil Town","York City",
    "AFC Fylde","AFC Telford United","Alfreton Town","Bedford Town","Buxton","Chester","Chorley","Curzon Ashton","Darlington","Hereford",
    "Kidderminster Harriers","King's Lynn Town","Leamington","Macclesfield","Marine","Merthyr Town","Oxford City","Peterborough Sports",
    "Radcliffe","Scarborough Athletic","South Shields","Southport","Spennymoor Town","Worksop Town",
    "AFC Totton","Bath City","Chelmsford City","Chesham United","Chippenham Town","Dagenham & Redbridge","Dorking Wanderers","Dover Athletic",
    "Eastbourne Borough","Ebbsfleet United","Enfield Town","Farnborough","Hampton & Richmond Borough","Hemel Hempstead Town","Hornchurch","Horsham",
    "Maidenhead United","Maidstone United","Salisbury","Slough Town","Tonbridge Angels","Torquay United","Weston-super-Mare","Worthing"
  ];

  /* ===== CRESTS (local GitHub folder) ===== */
  function safeText(s){ return (s || "").replace(/\s+/g," ").trim(); }
  function toAllCaps(s){ return safeText(s).toUpperCase(); }

  // Build a crest URL from the exact dropdown team name.
  // Files live at: assets/crests/<Team Name>.png
  // Example: assets/crests/Eastleigh.png
  function crestUrlForTeam(teamName){
    const t = safeText(teamName);
    if(!t) return null;

    // encodeURI keeps slashes but safely encodes spaces, &, etc.
    // (Important for names like "Dagenham & Redbridge.png")
    return encodeURI(`assets/crests/${t}.png`);
  }

  // Only return a crest URL if the team is in your dropdown list (prevents random bad filenames)
  const TEAM_SET = new Set(TEAMS_DROPDOWN.map(t => t.toLowerCase()));
  function getCrestUrlForTeamExact(teamName){
    const key = safeText(teamName).toLowerCase();
    if(!key) return null;
    if(!TEAM_SET.has(key)) return null;
    return crestUrlForTeam(teamName);
  }

  /* ===== RENDERED TEAM TEXT (ONLY change is Hampton & Richmond Borough) ===== */
  function teamTextForGraphic(teamName){
    const t = safeText(teamName);
    if(!t) return "";
    if(t.toLowerCase() === "hampton & richmond borough") return "HAMPTON & RICHMOND";
    return toAllCaps(t);
  }

  // Crest square
  const CREST_BOX_W = 42;
  const CREST_BOX_H = 42;
  const CREST_BOX_COLOR = "#9e0000";
  const CREST_MAX = 36;

  // Title
  const TITLE_Y = 70;
  const TITLE_COLOR = "#9e0000";
  const TITLE_SIZE = 36;

  // Matchday
  const MATCHDAY_Y = 115;
  const MATCHDAY_COLOR = "#223b7c";
  const MATCHDAY_SIZE = 28;

  // Rows layout
  const ROWS = 24;
  const ROW_H = 42;
  const ROW_GAP = 8;

  const ROW_START_X = 450;
  const ROW_START_Y = 145;

  const BLUE_BOX_W = 42;
  const BLUE_BOX_H = 42;

  const BASE_POS_COLOR = "#223b7c"; // must be your base

  const RED_BOX_W = 420;
  const RED_BOX_H = 42;
  const RED_BOX_COLOR = "#9e0000";

  // Numeric position zone colours (all numeric text stays WHITE)
  const POS_CHAMP_COLOR = "#7F99DC"; // 1 
  const POS_SF_COLOR    = "#3760C8"; // 2-3
  const POS_QF_COLOR    = "#2D4FA4"; // 4-7 
  const POS_RELEG_COLOR = "#192C5C"; // 21-24

  // Override tokens (grid flag)
  const OVERRIDE_NONE = "-";
  const OVERRIDE_C    = "C";
  const OVERRIDE_SF   = "SF";
  const OVERRIDE_QF   = "QF";
  const OVERRIDE_R    = "R";

  // Special visuals
  const POS_C_BG = "gold";
  const POS_C_FG = "#000000";

  const POS_PO_QF_BG = "silver";
  const POS_PO_SF_BG = "#9aa3ad";   // darker-than-silver for SF PO
  const POS_PO_FG    = "#000000";   // both PO variants black text

  const POS_R_BG = "#000000";
  const POS_R_FG = "#ffffff";

  // Text
  const POS_TEXT_SIZE = 24;
  const TEAM_TEXT_SIZE = 24;
  const TEAM_TEXT_LEFT_PAD = 30;

  const POS_TEXT_COLOR_DEFAULT = "#ffffff";
  const TEAM_TEXT_COLOR = "#ffffff";

  // Stat columns
  const COL_P_X   = 960;
  const COL_GD_X  = 1010;
  const COL_PTS_X = 1060;

  const COL_HEADER_Y = 135;
  const COL_HEADER_SIZE = 20;
  const COL_HEADER_COLOR = "#000000";

  const COL_VALUE_SIZE = 24;
  const COL_VALUE_COLOR = "#223b7c";

  // Separator lines
  const DOTTED_AFTER_ROWS = [1, 3, 7, 20];

  // Chunky dashes (tweakable)
  const SEP_DASH_W = 12;
  const SEP_DASH_H = 2;
  const SEP_GAP    = 4;

  // Move the separator UP/DOWN:
  // - increase this number to move DOWN (e.g. from -1 to 0 moves down 1px)
  const SEP_Y_NUDGE = -1;

  const SEP_RIGHT_TRIM = 10;

  function drawDottedSeparator(c, y){
    const x1 = (ROW_START_X + GLOBAL_DX) - CREST_BOX_W;
    const x2 = (COL_PTS_X + GLOBAL_DX) + 24 - SEP_RIGHT_TRIM;
    const step = SEP_DASH_W + SEP_GAP;

    c.save();
    c.fillStyle = "#223b7c";

    const yTop = y + SEP_Y_NUDGE;

    for(let x = x1; x <= x2; x += step){
      const w = Math.min(SEP_DASH_W, (x2 - x));
      if(w > 0) c.fillRect(x, yTop, w, SEP_DASH_H);
    }

    c.restore();
  }

  // Fonts
  const FONT_ALL_STACK = `"carbona-extrabold","carbona-variable",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif`;
  const CANVAS_FALLBACK_STACK = `Arial,sans-serif`;

  /* ================= ELEMENTS ================= */

  const canvas = document.getElementById("preview");
  const ctx = canvas.getContext("2d");

  const divisionSel = document.getElementById("division");
  const matchdaySel = document.getElementById("matchday");
  const pasteEl = document.getElementById("pasteIn");
  const gridBody = document.getElementById("gridBody");

  const download1x1Btn = document.getElementById("download1x1");
  const download4x5Btn = document.getElementById("download4x5");
  const resetAllBtn = document.getElementById("resetAll");
  const statusEl = document.getElementById("status");
  const fontStatusEl = document.getElementById("fontStatus");

  /* ================= STATE ================= */

  // 24 rows: { team, p, gd, pts, flag }
  // flag: "-", "C", "SF", "QF", "R"
  let rows = Array.from({length: ROWS}, () => ({ team:"", p:"", gd:"", pts:"", flag: OVERRIDE_NONE }));

  let bgImg = null;
  let badgeImg = null;
  let ticImg = null;

  const imgCache = new Map();
  const imgObjCache = new Map();

  // sync guards (paste <-> grid)
  let isUpdatingFromGrid = false;
  let isUpdatingFromPaste = false;

  /* ================= HELPERS ================= */

  function setStatus(msg){
    statusEl.textContent = msg;
    window.clearTimeout(setStatus._t);
    setStatus._t = window.setTimeout(()=> statusEl.textContent = "Ready", 900);
  }

  function loadImage(url){
    if(imgCache.has(url)) return imgCache.get(url);

    const p = new Promise((resolve,reject)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";

      img.onload = ()=> {
        imgObjCache.set(url, img);
        resolve(img);
      };

      img.onerror = ()=> {
        reject(new Error(
          "IMAGE LOAD FAILED: " + url +
          " (Check filename/case, and that the file exists. On GitHub Pages, case matters.)"
        ));
      };

      img.src = url;
    });

    imgCache.set(url, p);
    return p;
  }

  function clamp3(s){
    return String(s || "").slice(0, 3);
  }

  function digitsOnly3(s){
    const v = String(s || "").replace(/[^\d]/g, "");
    return clamp3(v);
  }

  function gdOnly3(s){
    // allow + or - then digits, max 3 chars total
    let v = String(s || "").toUpperCase().replace(/[^0-9+\-]/g, "");
    // collapse multiple signs to first char only
    if(v.length >= 2){
      const first = v[0];
      if(first === "+" || first === "-"){
        v = first + v.slice(1).replace(/[+\-]/g, "");
      }else{
        v = v.replace(/[+\-]/g, "");
      }
    }
    return clamp3(v);
  }

  function isProbablyHeader(cells){
    const joined = cells.map(c=>String(c||"")).join(" ").toLowerCase();
    return joined.includes("team") && (joined.includes("pts") || joined.includes("points"));
  }

  function splitLine(line){
    if(line.includes("\t")) return line.split("\t").map(s=>s.trim());
    if(line.includes(",")) return line.split(",").map(s=>s.trim());
    return line.trim().split(/\s{2,}|\s+\|\s+|\s+/).map(s=>s.trim());
  }

  function isNumLike(s){
    const v = String(s||"").trim();
    return /^[-+]?(\d+)$/.test(v) || /^[-+]?(\d+)\.(\d+)$/.test(v);
  }

  function normalizeGD(s){
    const v = safeText(s);
    if(!v) return "";
    return v.replace(/^(\+)?0$/, "0");
  }

  function titleForDivision(div){
    if(div === "North") return "ENTERPRISE NATIONAL LEAGUE NORTH";
    if(div === "South") return "ENTERPRISE NATIONAL LEAGUE SOUTH";
    return "ENTERPRISE NATIONAL LEAGUE";
  }

  function refreshFontStatus(){
    if(!fontStatusEl) return;

    const t = document.createElement("canvas");
    const c = t.getContext("2d");
    const sample = "FONT-WARMUP-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";

    c.font = `800 ${TITLE_SIZE}px ${CANVAS_FALLBACK_STACK}`;
    const wFallback = c.measureText(sample).width;

    c.font = `800 ${TITLE_SIZE}px ${FONT_ALL_STACK}`;
    const wTest = c.measureText(sample).width;

    const active = Math.abs(wFallback - wTest) >= 2;
    fontStatusEl.textContent = "Font: " + (active ? "CARBONA ACTIVE" : "FALLBACK");
  }

  async function ensureFontsLoaded(){
    try{
      const warm = document.getElementById("fontWarmup");
      if(warm){ void warm.offsetWidth; }

      if(document.fonts && document.fonts.load){
        await Promise.all([
          document.fonts.load(`800 ${TITLE_SIZE}px "carbona-extrabold"`).catch(()=>[]),
          document.fonts.load(`800 ${TEAM_TEXT_SIZE}px "carbona-extrabold"`).catch(()=>[]),
          document.fonts.load(`800 ${COL_VALUE_SIZE}px "carbona-extrabold"`).catch(()=>[]),
          document.fonts.load(`800 ${MATCHDAY_SIZE}px "carbona-extrabold"`).catch(()=>[]),
          document.fonts.load(`800 ${TITLE_SIZE}px "carbona-variable"`).catch(()=>[])
        ]);
        if(document.fonts.ready) await document.fonts.ready;
      }

      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      await new Promise(r => setTimeout(r, 120));
    }catch{}
  }

  function formatDate_DDMMMyy(d){
    const parts = new Intl.DateTimeFormat("en-GB", {
      day: "2-digit",
      month: "short",
      year: "2-digit"
    }).formatToParts(d);

    const dd = (parts.find(p => p.type === "day") || {value:""}).value;
    const mmm = (parts.find(p => p.type === "month") || {value:""}).value;
    const yy = (parts.find(p => p.type === "year") || {value:""}).value;

    const mmmNorm = mmm ? (mmm[0].toUpperCase() + mmm.slice(1).toLowerCase()) : "";
    return `${dd}${mmmNorm}${yy}`;
  }

  function buildFilename(sizeTag){
    const div = (divisionSel.value || "National").trim();
    const dateStr = formatDate_DDMMMyy(new Date());
    const sizeSuffix = sizeTag ? (` - ${sizeTag}`) : "";
    return `Table ${div} ${dateStr}${sizeSuffix}.png`;
  }

  function drawContainedImage(c, img, x, y, w, h, maxSize){
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if(!iw || !ih) return;

    const s = Math.min(maxSize / iw, maxSize / ih);
    const dw = iw * s;
    const dh = ih * s;

    const cx = x + w/2;
    const cy = y + h/2;

    const dx = cx - dw/2;
    const dy = cy - dh/2;

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(img, dx, dy, dw, dh);
  }

  async function preloadCrests(){
    const urls = new Set();
    for(const r of rows){
      const teamName = safeText(r.team);
      if(!teamName) continue;
      const u = getCrestUrlForTeamExact(teamName);
      if(u) urls.add(u);
    }
    await Promise.all([...urls].map(u => loadImage(u).catch(()=>null)));
  }

  /* ================= PARSING / SERIALISING ================= */

  function parsePastedTable(raw){
    const text = (raw || "").replace(/\r/g, "\n");
    const lines = text.split("\n").map(l=>l.trim()).filter(l=>l.length>0);
    if(lines.length === 0){
      return Array.from({length: ROWS}, () => ({ team:"", p:"", gd:"", pts:"", flag: OVERRIDE_NONE }));
    }

    let startIdx = 0;
    const firstCells = splitLine(lines[0]);
    if(firstCells.length && isProbablyHeader(firstCells)){
      startIdx = 1;
    }

    const teamSet = new Set(TEAMS_DROPDOWN.map(t => t.toLowerCase()));
    const out = [];

    const validFlags = new Set([OVERRIDE_NONE, OVERRIDE_C, OVERRIDE_SF, OVERRIDE_QF, OVERRIDE_R]);

    for(let i = startIdx; i < lines.length; i++){
      const cells = splitLine(lines[i]).filter(s => String(s||"").trim().length > 0);
      if(cells.length === 0) continue;
      if(isProbablyHeader(cells)) continue;

      const first = safeText(cells[0] || "").toUpperCase();

      // Detect whether the first column is:
      // - numeric position (e.g. "1")
      // - a flag token (C / SF / QF / R / -)
      // - or no pos column at all (team starts at col 0)
      const firstIsNumeric = /^\d+$/.test(first);
      const firstIsFlag = validFlags.has(first);

      let teamIdx = 0;
      let flag = OVERRIDE_NONE;

      if(firstIsNumeric){
        teamIdx = 1;
        flag = OVERRIDE_NONE;
      }else if(firstIsFlag){
        teamIdx = 1;
        flag = first; // already normalised to upper-case
      }else{
        teamIdx = 0;
        flag = OVERRIDE_NONE;
      }

      const teamRaw = safeText(cells[teamIdx] || "");
      const teamOk = teamSet.has(teamRaw.toLowerCase());
      const team = teamOk ? teamRaw : "";

      const rest = cells.slice(teamIdx + 1);
      const nums = rest.filter(isNumLike).map(s=>String(s).trim());

      const p = nums.length >= 1 ? nums[0] : "";
      const pts = nums.length >= 1 ? nums[nums.length - 1] : "";
      const gd = nums.length >= 2 ? nums[nums.length - 2] : "";

      out.push({
        team,
        p: digitsOnly3(p),
        gd: gdOnly3(normalizeGD(gd)),
        pts: digitsOnly3(pts),
        flag
      });

      if(out.length >= ROWS) break;
    }

    while(out.length < ROWS){
      out.push({ team:"", p:"", gd:"", pts:"", flag: OVERRIDE_NONE });
    }

    return out.slice(0, ROWS);
  }

  function rowsToTSV(){
    const head = ["Pos","Team","P","GD","Pts"].join("\t");
    const lines = [head];

    for(let i=0;i<ROWS;i++){
      const r = rows[i] || {};
      const flag = safeText(r.flag || OVERRIDE_NONE).toUpperCase();

      // If a flag is set, it overrides the numeric position in the paste output
      const posOut = (flag && flag !== OVERRIDE_NONE) ? flag : String(i + 1);

      const team = safeText(r.team);
      const p = safeText(r.p);
      const gd = safeText(r.gd);
      const pts = safeText(r.pts);

      lines.push([posOut, team, p, gd, pts].join("\t"));
    }
    return lines.join("\n");
  }

  /* ================= GRID UI ================= */

  function buildTeamOptions(selectEl){
    // First option blank
    const opt0 = document.createElement("option");
    opt0.value = "";
    opt0.textContent = "";
    selectEl.appendChild(opt0);

    for(const t of TEAMS_DROPDOWN){
      const o = document.createElement("option");
      o.value = t;
      o.textContent = t;
      selectEl.appendChild(o);
    }
  }

  function buildFlagOptions(selectEl){
    const opts = [
      {v: OVERRIDE_NONE, t: "-"},
      {v: OVERRIDE_C,    t: "C"},
      {v: OVERRIDE_SF,   t: "SF"},
      {v: OVERRIDE_QF,   t: "QF"},
      {v: OVERRIDE_R,    t: "R"}
    ];
    for(const it of opts){
      const o = document.createElement("option");
      o.value = it.v;
      o.textContent = it.t;
      selectEl.appendChild(o);
    }
  }

  function makeCellPos(i){
    const td = document.createElement("td");
    td.className = "cell-pos";
    td.textContent = String(i + 1);
    return td;
  }

  function makeFlagCell(i){
    const td = document.createElement("td");
    const sel = document.createElement("select");
    sel.className = "override";
    buildFlagOptions(sel);

    sel.addEventListener("change", ()=>{
      rows[i].flag = sel.value;
      autosave();
      syncPasteFromGrid();
      render();
    });

    td.appendChild(sel);
    return {td, el: sel};
  }

  function makeTeamCell(i){
    const td = document.createElement("td");
    const sel = document.createElement("select");
    sel.className = "team";
    buildTeamOptions(sel);

    sel.addEventListener("change", ()=>{
      rows[i].team = sel.value;
      autosave();
      syncPasteFromGrid();
      render();
    });

    td.appendChild(sel);
    return {td, el: sel};
  }

  function makeSmallInputCell(i, key, kind){
    const td = document.createElement("td");
    const inp = document.createElement("input");
    inp.className = "small";
    inp.inputMode = "numeric";
    inp.autocomplete = "off";
    inp.spellcheck = false;
    inp.maxLength = 3;

    inp.addEventListener("input", ()=>{
      let v = inp.value;
      if(kind === "digits") v = digitsOnly3(v);
      if(kind === "gd") v = gdOnly3(v);
      inp.value = v;
      rows[i][key] = v;

      autosave();
      syncPasteFromGrid();
      render();
    });

    td.appendChild(inp);
    return {td, el: inp};
  }

  const gridEls = []; // per row: { flagSel, teamSel, pInp, gdInp, ptsInp }

  function buildGrid(){
    gridBody.innerHTML = "";
    gridEls.length = 0;

    for(let i=0;i<ROWS;i++){
      const tr = document.createElement("tr");

      tr.appendChild(makeCellPos(i));

      const f = makeFlagCell(i);
      tr.appendChild(f.td);

      const t = makeTeamCell(i);
      tr.appendChild(t.td);

      const p = makeSmallInputCell(i, "p", "digits");
      tr.appendChild(p.td);

      const gd = makeSmallInputCell(i, "gd", "gd");
      tr.appendChild(gd.td);

      const pts = makeSmallInputCell(i, "pts", "digits");
      tr.appendChild(pts.td);

      gridBody.appendChild(tr);

      gridEls.push({
        flagSel: f.el,
        teamSel: t.el,
        pInp: p.el,
        gdInp: gd.el,
        ptsInp: pts.el
      });
    }
  }

  function syncGridFromRows(){
    for(let i=0;i<ROWS;i++){
      const r = rows[i] || {team:"", p:"", gd:"", pts:"", flag: OVERRIDE_NONE};
      const els = gridEls[i];
      if(!els) continue;

      els.flagSel.value = r.flag || OVERRIDE_NONE;
      els.teamSel.value = r.team || "";
      els.pInp.value = safeText(r.p);
      els.gdInp.value = safeText(r.gd);
      els.ptsInp.value = safeText(r.pts);
    }
  }

  function syncPasteFromGrid(){
    if(isUpdatingFromPaste) return;
    isUpdatingFromGrid = true;
    try{
      pasteEl.value = rowsToTSV();
    }finally{
      isUpdatingFromGrid = false;
    }
  }

  function syncRowsFromPaste(){
    if(isUpdatingFromGrid) return;
    isUpdatingFromPaste = true;
    try{
      const parsed = parsePastedTable(pasteEl.value);
      // keep existing flags if teams match row index? no — paste is the source: reset flags to "-"
      rows = parsed;
      syncGridFromRows();
      autosave();
      render();
    }finally{
      isUpdatingFromPaste = false;
    }
  }

  /* ================= RENDER ================= */

  async function ensureBaseImages(){
    if(!bgImg) bgImg = await loadImage(BG_URL);

    const divUrl = DIV_BADGE[divisionSel.value] || DIV_BADGE.National;
    badgeImg = await loadImage(divUrl);

    if(!ticImg) ticImg = await loadImage(TIC_URL);
  }

  function drawTitleAndMatchday(c){
    const div = divisionSel.value || "National";
    const title = titleForDivision(div);

    c.save();
    c.textAlign = "left";
    c.textBaseline = "alphabetic";

    const titleX = (ROW_START_X - CREST_BOX_W) + GLOBAL_DX;

    c.fillStyle = TITLE_COLOR;
    c.font = `800 ${TITLE_SIZE}px ${FONT_ALL_STACK}`;
    c.fillText(title, titleX, TITLE_Y + GLOBAL_DY);

    const md = matchdaySel.value;
    if(md){
      c.fillStyle = MATCHDAY_COLOR;
      c.font = `800 ${MATCHDAY_SIZE}px ${FONT_ALL_STACK}`;
      c.fillText(`MATCHDAY ${md}`, titleX, MATCHDAY_Y + GLOBAL_DY);
    }

    c.restore();
  }

  function drawBadge(c){
    if(!badgeImg) return;

    const iw = badgeImg.naturalWidth || badgeImg.width;
    const ih = badgeImg.naturalHeight || badgeImg.height;
    const dw = iw * BADGE_MID.scale;
    const dh = ih * BADGE_MID.scale;

    const x = (BADGE_MID.x + GLOBAL_DX) - dw/2;
    const y = (BADGE_MID.y + GLOBAL_DY) - dh/2;

    c.drawImage(badgeImg, x, y, dw, dh);
  }

  function drawTicHealth(c){
    if(!ticImg) return;

    const iw = ticImg.naturalWidth || ticImg.width;
    const ih = ticImg.naturalHeight || ticImg.height;
    const dw = iw * TIC_SCALE;
    const dh = ih * TIC_SCALE;

    const cx = (BADGE_MID.x + GLOBAL_DX);
    const cy = (EXPORT_SIZE / 2) + GLOBAL_DY;

    const rad = (TIC_ROT_DEG * Math.PI) / 180;

    c.save();
    c.translate(cx, cy);
    c.rotate(rad);
    c.drawImage(ticImg, -dw/2, -dh/2, dw, dh);
    c.restore();
  }

  function drawColumnHeaders(c){
    c.save();
    c.textAlign = "center";
    c.textBaseline = "alphabetic";
    c.fillStyle = COL_HEADER_COLOR;
    c.font = `800 ${COL_HEADER_SIZE}px ${FONT_ALL_STACK}`;

    c.fillText("P",   COL_P_X + GLOBAL_DX,   COL_HEADER_Y + GLOBAL_DY);
    c.fillText("GD",  COL_GD_X + GLOBAL_DX,  COL_HEADER_Y + GLOBAL_DY);
    c.fillText("PTS", COL_PTS_X + GLOBAL_DX, COL_HEADER_Y + GLOBAL_DY);

    c.restore();
  }

  function numericPosBoxColor(n){
    if(n === 1) return POS_CHAMP_COLOR;
    if(n >= 2 && n <= 3) return POS_SF_COLOR;
    if(n >= 4 && n <= 7) return POS_QF_COLOR;
    if(n >= 21 && n <= 24) return POS_RELEG_COLOR;
    return BASE_POS_COLOR;
  }

  function drawRows(c){
    for(let i=0; i<ROWS; i++){
      const y = (ROW_START_Y + i * (ROW_H + ROW_GAP)) + GLOBAL_DY;
      const blueX = ROW_START_X + GLOBAL_DX;
      const crestX = blueX - CREST_BOX_W;

      const r = rows[i] || {team:"", p:"", gd:"", pts:"", flag: OVERRIDE_NONE};

      // crest box
      c.fillStyle = CREST_BOX_COLOR;
      c.fillRect(crestX, y, CREST_BOX_W, CREST_BOX_H);

      // crest image (only if exact match is in map)
      const crestUrl = safeText(r.team) ? getCrestUrlForTeamExact(r.team) : null;
      const crestImg = crestUrl ? imgObjCache.get(crestUrl) : null;
      if(crestImg){
        drawContainedImage(c, crestImg, crestX, y, CREST_BOX_W, CREST_BOX_H, CREST_MAX);
      }

      const numericPos = i + 1;

      // default numeric presentation
      let posLabel = String(numericPos);
      let posBoxColor = numericPosBoxColor(numericPos);
      let posTextColor = POS_TEXT_COLOR_DEFAULT;

      // overrides (flag wins)
      const flag = safeText(r.flag || OVERRIDE_NONE).toUpperCase();

      if(flag === OVERRIDE_C){
        posLabel = "C";
        posBoxColor = POS_C_BG;
        posTextColor = POS_C_FG;
      }else if(flag === OVERRIDE_SF){
        posLabel = "PO";
        posBoxColor = POS_PO_SF_BG;
        posTextColor = POS_PO_FG;
      }else if(flag === OVERRIDE_QF){
        posLabel = "PO";
        posBoxColor = POS_PO_QF_BG;
        posTextColor = POS_PO_FG;
      }else if(flag === OVERRIDE_R){
        posLabel = "R";
        posBoxColor = POS_R_BG;
        posTextColor = POS_R_FG;
      }

      // pos box
      c.fillStyle = posBoxColor;
      c.fillRect(blueX, y, BLUE_BOX_W, BLUE_BOX_H);

      // team box
      const redX = blueX + BLUE_BOX_W;
      c.fillStyle = RED_BOX_COLOR;
      c.fillRect(redX, y, RED_BOX_W, RED_BOX_H);

      c.save();
      c.textBaseline = "middle";

      // pos label
      c.textAlign = "center";
      c.fillStyle = posTextColor;
      c.font = `800 ${POS_TEXT_SIZE}px ${FONT_ALL_STACK}`;
      c.fillText(posLabel, blueX + BLUE_BOX_W/2, y + BLUE_BOX_H/2 + 2);

      // team text (blank if not matched)
      const teamGraphic = safeText(r.team) ? teamTextForGraphic(r.team) : "";
      c.textAlign = "left";
      c.fillStyle = TEAM_TEXT_COLOR;
      c.font = `800 ${TEAM_TEXT_SIZE}px ${FONT_ALL_STACK}`;
      c.fillText(teamGraphic, redX + TEAM_TEXT_LEFT_PAD, y + RED_BOX_H/2 + 2);

      // stats
      c.textAlign = "center";
      c.fillStyle = COL_VALUE_COLOR;
      c.font = `800 ${COL_VALUE_SIZE}px ${FONT_ALL_STACK}`;
      c.fillText(String(r.p || ""),   COL_P_X + GLOBAL_DX,   y + ROW_H/2 + 2);
      c.fillText(String(r.gd || ""),  COL_GD_X + GLOBAL_DX,  y + ROW_H/2 + 2);
      c.fillText(String(r.pts || ""), COL_PTS_X + GLOBAL_DX, y + ROW_H/2 + 2);

      c.restore();

      // separators
      const rowNumber = i + 1;
      if(DOTTED_AFTER_ROWS.includes(rowNumber)){
        const lineY = y + ROW_H + Math.floor(ROW_GAP / 2);
        drawDottedSeparator(c, lineY);
      }
    }
  }

  async function render(){
    try{
      await ensureBaseImages();

      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,EXPORT_SIZE,EXPORT_SIZE);

      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(bgImg, 0, 0, EXPORT_SIZE, EXPORT_SIZE);

      await preloadCrests();

      drawBadge(ctx);
      drawTitleAndMatchday(ctx);
      drawColumnHeaders(ctx);
      drawRows(ctx);
      drawTicHealth(ctx);

      refreshFontStatus();
      setStatus("Rendered");
    }catch(e){
      console.error(e);
      setStatus(String(e && e.message ? e.message : e));
    }
  }

  async function renderToFullCanvas(){
    await ensureBaseImages();

    const full = document.createElement("canvas");
    full.width = EXPORT_SIZE;
    full.height = EXPORT_SIZE;
    const c = full.getContext("2d");

    c.setTransform(1,0,0,1,0,0);
    c.clearRect(0,0,EXPORT_SIZE,EXPORT_SIZE);

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(bgImg, 0, 0, EXPORT_SIZE, EXPORT_SIZE);

    await preloadCrests();

    drawBadge(c);
    drawTitleAndMatchday(c);
    drawColumnHeaders(c);
    drawRows(c);
    drawTicHealth(c);

    return full;
  }

  async function downloadPNG_1x1(){
    try{
      const full = await renderToFullCanvas();

      const blob = await new Promise(res => full.toBlob(res, "image/png"));
      if(!blob){
        setStatus("EXPORT BLOCKED (CORS): a badge/crest image may not allow canvas export.");
        return;
      }

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = buildFilename("1x1");
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);

      setStatus("Downloaded 1x1");
    }catch(e){
      console.error(e);
      setStatus(String(e && e.message ? e.message : e));
    }
  }

  async function downloadPNG_4x5(){
    const OUT_W = 1080;
    const OUT_H = 1347;

    const CROP_X = 54;
    const CROP_Y = 0;
    const CROP_W = 1080;
    const CROP_H = 1347;

    try{
      const full = await renderToFullCanvas();

      const out = document.createElement("canvas");
      out.width = OUT_W;
      out.height = OUT_H;
      const c = out.getContext("2d");

      c.setTransform(1,0,0,1,0,0);
      c.clearRect(0,0,OUT_W,OUT_H);

      c.imageSmoothingEnabled = true;
      c.imageSmoothingQuality = "high";

      c.drawImage(
        full,
        CROP_X, CROP_Y, CROP_W, CROP_H,
        0, 0, OUT_W, OUT_H
      );

      const blob = await new Promise(res => out.toBlob(res, "image/png"));
      if(!blob){
        setStatus("EXPORT BLOCKED (CORS): a badge/crest image may not allow canvas export.");
        return;
      }

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = buildFilename("4x5");
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);

      setStatus("Downloaded 4x5");
    }catch(e){
      console.error(e);
      setStatus(String(e && e.message ? e.message : e));
    }
  }

  /* ================= AUTOSAVE ================= */

  function autosave(){
    const payload = {
      v: VERSION,
      division: divisionSel.value,
      matchday: matchdaySel.value,
      pasteIn: pasteEl.value,
      rows
    };
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); }catch{}
  }

  function autoload(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const d = JSON.parse(raw);
      if(!d || typeof d !== "object") return;

      if(d.division && DIV_BADGE[d.division]) divisionSel.value = d.division;
      if(typeof d.matchday === "string") matchdaySel.value = d.matchday;
      if(typeof d.pasteIn === "string") pasteEl.value = d.pasteIn;

      if(Array.isArray(d.rows) && d.rows.length){
        rows = d.rows.slice(0, ROWS);
        while(rows.length < ROWS) rows.push({ team:"", p:"", gd:"", pts:"", flag: OVERRIDE_NONE });
      }
    }catch{}
  }

  /* ================= UI ================= */

  function populateMatchday(){
    for(let i=1;i<=46;i++){
      const o = document.createElement("option");
      o.value = String(i);
      o.textContent = String(i);
      matchdaySel.appendChild(o);
    }
  }

  function resetAll(){
    try{ localStorage.removeItem(STORAGE_KEY); }catch{}

    divisionSel.value = "National";
    matchdaySel.value = "";
    pasteEl.value = "";

    rows = Array.from({length: ROWS}, () => ({ team:"", p:"", gd:"", pts:"", flag: OVERRIDE_NONE }));
    syncGridFromRows();
    syncPasteFromGrid();

    bgImg = null;
    badgeImg = null;
    ticImg = null;

    autosave();
    render();
    setStatus("Reset all");
  }

  function bindUI(){
    divisionSel.addEventListener("change", ()=>{
      badgeImg = null;
      autosave();
      render();
    });

    matchdaySel.addEventListener("change", ()=>{
      autosave();
      render();
    });

    pasteEl.addEventListener("input", ()=>{
      autosave();
      // debounce parse
      window.clearTimeout(bindUI._pt);
      bindUI._pt = window.setTimeout(()=> syncRowsFromPaste(), 80);
    });

    download1x1Btn.addEventListener("click", downloadPNG_1x1);
    download4x5Btn.addEventListener("click", downloadPNG_4x5);
    resetAllBtn.addEventListener("click", resetAll);
  }

  /* ================= INIT ================= */

  async function start(){
    populateMatchday();
    buildGrid();
    autoload();
    bindUI();

    await ensureFontsLoaded();

    // initial sync direction:
    // if paste has something, treat paste as source; otherwise create paste from rows
    if(safeText(pasteEl.value)){
      syncRowsFromPaste();
    }else{
      syncGridFromRows();
      syncPasteFromGrid();
    }

    await render();
  }

  start();

})();
</script>
