<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fixtures / Results Builder</title>

<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">

<style>
:root{
  --border:#d0d7de;
  --bg:#f6f8fa;
  --fg:#24292f;
  --muted:#57606a;
  --brand:#9e0000;
  --blue:#223b7c;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"carbona-variable", system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  font-size:14px;
  color:var(--fg);
  background:#fff;
}

.page{
  width:100%;
  padding:20px 18px 26px;
}

.app-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.app-header h1{
  margin:0;
  font-size:22px;
  font-weight:800;
}

.app{
  display:grid;
  grid-template-columns:minmax(520px, 900px) minmax(360px, 1fr);
  gap:18px;
  align-items:start;
}

@media (max-width: 980px){
  .app{ grid-template-columns:1fr; }
}

.previewWrap{
  position:sticky;
  top:14px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--bg);
  padding:10px;
}

canvas{
  display:block;
  width:100%;
  height:auto;
  background:#fff;
}

@media (max-width: 420px){
  .page{
    padding:14px 12px 18px;
  }

  .box{
    padding:10px;
  }
}

.panel{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-width:0;
}

.box{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  background:#fff;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.controls select,
.controls input{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font:inherit;
}

.controls button{
  padding:8px 10px;
  border:1px solid var(--brand);
  border-radius:10px;
  background:var(--brand);
  color:#fff;
  font:inherit;
  cursor:pointer;
}

.controls button:hover{ filter:brightness(.95); }

.section{
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* Allow grid items (selects/inputs/div headers) to shrink properly */
.rowsGrid > *{
  min-width:0;
}
.rowsGrid{
  display:grid;
  grid-template-columns: 1fr 140px 1fr 120px;
  gap:8px;
  align-items:center;
}
.rowsGrid select,
.rowsGrid input{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font:inherit;
  width:100%;
  min-width:0;
  max-width:100%;
}

.rowsGrid select{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
  
.rowsGrid input{
  text-align:center;
  letter-spacing:0.5px;
}
  
.rowsGrid .colHead{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  letter-spacing:0.3px;
}

.rowsGrid input:disabled{
  background:#eeeeee;
  color:#777777;
  border-color:#d7d7d7;
  cursor:not-allowed;
  opacity:1;
}

footer{
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
}

/* --- v1.7 mobile override (must be AFTER the desktop .rowsGrid rule) --- */
@media (max-width: 640px){
  .rowsGrid{
    /* Home/Away flex; Score/Status fixed; keep more room for teams */
    grid-template-columns: minmax(0, 1fr) 64px minmax(0, 1fr) 48px;
    gap:6px;
  }

  .rowsGrid > *{
    min-width:0;
  }

  .rowsGrid select,
  .rowsGrid input{
    min-width:0;
    max-width:100%;
    width:100%;
  }
}

@media (max-width: 420px){
  .rowsGrid{
    grid-template-columns: minmax(0, 1fr) 60px minmax(0, 1fr) 44px;
    gap:6px;
  }
}
</style>
</head>

<body>
<div class="page">

<header class="app-header">
  <img src="https://rckd-nl.github.io/nl-tools/assets/divisions/The%20National%20League.png" alt="The National League" style="height:42px;width:auto;border:none;border-radius:0;">
  <h1>Fixtures / Results Builder</h1>
</header>

<div class="app">

  <div class="previewWrap">
    <canvas id="preview" width="1347" height="1347"></canvas>
  </div>

  <div class="panel">

    <div class="box controls">
      <select id="matchday" title="Matchday">
        <option value="NA">N/A</option>
      </select>

      <select id="division" title="Division">
        <option value="National">National</option>
        <option value="North">North</option>
        <option value="South">South</option>
      </select>

      <select id="status" title="Status">
        <option value="Fixtures">Fixtures</option>
        <option value="Results">Results</option>
      </select>

      <button type="button" id="download">Download 1x1 PNG</button>
      <button type="button" id="download45">Download 4x5 PNG</button>
      <button type="button" id="resetAll" title="Wipe all fields back to defaults">Reset all</button>
    </div>

    <div class="box section">
      <div class="rowsGrid" id="rowsGrid"></div>
    </div>

    <footer>
      <span id="statusText">Ready</span>
    </footer>

  </div>
</div>

</div>

<script>
(function(){
  "use strict";

  /* ================= CONFIG ================= */

  const VERSION = "v1.9";
  const STORAGE_KEY = "fixtures-results-builder-v1.9";
  
  const CANVAS_SIZE = 1347;

  // Absolute (works no matter where this HTML file sits)
  const ASSET_BASE = "https://rckd-nl.github.io/nl-tools/assets";

  function assetUrl(relPath){
    // relPath example: "divisions/National.png" or "crests/Eastleigh.png"
    return encodeURI(`${ASSET_BASE}/${relPath}`);
  }

  function crestUrlForName(teamName){
    // teamName MUST match the filename in assets/crests exactly (case/spaces/&/dashes)
    return `${ASSET_BASE}/crests/${encodeURIComponent(teamName)}.png`;
  }

  // Background (keep local, as currently authored)
  // If you later move the background into /assets/, change to: assetUrl("fixtures/Fixtures background 1x1.png") (or whatever path)
  const BG_URL = "Fixtures%20background%201x1.png";

  const FONT_FAMILY = `"carbona-variable", system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif`;

  const HEADER_1 = { x: 750, y: 150, size: 84, color: "#9e0000", weight: 800, align: "center" };
  const HEADER_2 = { x: 750, y: 220, size: 32, color: "#223b7c", weight: 800, align: "center" };

  const DIV_BADGE = {
    National: assetUrl("divisions/National.png"),
    North:    assetUrl("divisions/North.png"),
    South:    assetUrl("divisions/South.png")
  };
  const DIV_BADGE_POS = { x: 750, y: 1258, scale: 0.075 };

  const ROWS_Y_START = 330;
  const ROWS_LINE_GAP = 70.2;

  const HOME_COL  = { x: 710, align: "right",  size: 22.6, color: "#ffffff", weight: 800 };
  const SCORE_COL = { x: 750, align: "center", size: 27.2, color: "#223b7c", weight: 800 };
  const AWAY_COL  = { x: 790, align: "left",   size: 22.6, color: "#ffffff", weight: 800 };
  const SCORE_SMALL = { size: 22.6, weight: 800 };

  const HOME_ICON_X = 360;
  const AWAY_ICON_X = 1140;

  const BLUE_PILL  = { w: (AWAY_ICON_X - HOME_ICON_X), h: 52, color: "#223b7c" };
  const WHITE_BOX  = { w: 52, h: 56,  color: "#ffffff" };
  const RED_BOX    = { w: 52, h: 52,  color: "#9e0000" };

  const CREST_MAX = 45;

  const TEAM_NAMES = [
    "Aldershot Town","Altrincham","Boreham Wood","Boston United","Brackley Town","Braintree Town","Carlisle United","Eastleigh",
    "FC Halifax Town","Forest Green Rovers","Gateshead","Hartlepool United","Morecambe","Rochdale","Scunthorpe United","Solihull Moors",
    "Southend United","Sutton United","Tamworth","Truro City","Wealdstone","Woking","Yeovil Town","York City","AFC Fylde","AFC Telford United",
    "Alfreton Town","Bedford Town","Buxton","Chester","Chorley","Curzon Ashton","Darlington","Hereford","Kidderminster Harriers","King's Lynn Town",
    "Leamington","Macclesfield","Marine","Merthyr Town","Oxford City","Peterborough Sports","Radcliffe","Scarborough Athletic","South Shields","Southport",
    "Spennymoor Town","Worksop Town","AFC Totton","Bath City","Chelmsford City","Chesham United","Chippenham Town","Dagenham & Redbridge","Dorking Wanderers",
    "Dover Athletic","Eastbourne Borough","Ebbsfleet United","Enfield Town","Farnborough","Hampton & Richmond Borough","Hemel Hempstead Town","Hornchurch",
    "Horsham","Maidenhead United","Maidstone United","Salisbury","Slough Town","Tonbridge Angels","Torquay United","Weston-super-Mare","Worthing"
  ];

  const TEAM_CODES = [
    "ALD","ALT","BHW","BOS","BRK","BRA","CAR","EAS",
    "HAL","FGR","GAT","HAR","MOR","ROC","SCU","SOL",
    "SOU","SUT","TAM","TRU","WEA","WOK","YEO","YOR","FYL","TEL",
    "ALF","BED","BUX","CHE","CHO","CUR","DAR","HER","KID","KLT",
    "LEA","MAC","MAR","MER","OXC","PBS","RAD","SCA","SSH","SPT",
    "SPE","WRK","TOT","BAT","CHC","CHU","CHI","DAG","DOR",
    "DOV","EAB","EBB","ENF","FAB","HRB","HHT","HOR",
    "HRS","MHU","MSU","SAL","SLO","TON","TOR","WSM","WOR"
  ];
  const CODE_TO_NAME = new Map();
  const NAME_TO_CODE = new Map();
  const CODE_TO_CREST = new Map();
  const TEAM_CODE_SET = new Set(TEAM_CODES);

  for(let i=0;i<TEAM_NAMES.length;i++){
    const code = TEAM_CODES[i] || "";
    const name = TEAM_NAMES[i] || "";

    if(code){
      CODE_TO_NAME.set(code, name);
      CODE_TO_CREST.set(code, name ? crestUrlForName(name) : "");
    }
    if(name && code){
      NAME_TO_CODE.set(name, code);
    }
  }

  /* ================= ELEMENTS ================= */

  const canvas = document.getElementById("preview");
  const ctx = canvas.getContext("2d");

  const matchdaySel = document.getElementById("matchday");
  const divisionSel = document.getElementById("division");
  const statusSel = document.getElementById("status");
  const downloadBtn = document.getElementById("download");
  const download45Btn = document.getElementById("download45");
  const resetAllBtn = document.getElementById("resetAll");

  const rowsGridEl = document.getElementById("rowsGrid");
  const statusTextEl = document.getElementById("statusText");

  /* ================= STATE ================= */

  const imgCache = new Map();
  let bgImg = null;
  let divBadgeImg = null;

  const ROWS_COUNT = 12;
  const rowsState = Array.from({length: ROWS_COUNT}, ()=> ({ home:"", away:"", score:"", issue:"" }));
  // ===== Per-division saved states (National / North / South) =====
  const DIVISIONS = ["National","North","South"];

  function cloneRows(src){
    if(!Array.isArray(src)) return Array.from({length: ROWS_COUNT}, ()=> ({ home:"", away:"", score:"", issue:"" }));
    const out = [];
    for(let i=0;i<ROWS_COUNT;i++){
      const r = src[i] && typeof src[i] === "object" ? src[i] : {};
      out.push({
        home:  typeof r.home  === "string" ? normalizeTeamCode(r.home) : "",
        away:  typeof r.away  === "string" ? normalizeTeamCode(r.away) : "",
        score: typeof r.score === "string" ? r.score : "",
        issue: typeof r.issue === "string" ? r.issue : ""
      });
    }
    return out;
  }

  function applyRowsToUI(){
    for(let i=0;i<ROWS_COUNT;i++){
      if(homeSelectEls[i]) homeSelectEls[i].value = normalizeTeamCode(rowsState[i].home) || "";
      if(awaySelectEls[i]) awaySelectEls[i].value = normalizeTeamCode(rowsState[i].away) || "";
      if(scoreInputEls[i]) scoreInputEls[i].value = rowsState[i].score || "";
      if(issueSelectEls[i]) issueSelectEls[i].value = rowsState[i].issue || "";
    }
    syncScoreInputsEnabled();
    updateAllClubSelectLabels();
  }

  function saveActiveDivisionState(d){
    const payload = getStoredPayload();
    payload.byDivision = payload.byDivision && typeof payload.byDivision === "object" ? payload.byDivision : {};
    payload.byDivision[d] = cloneRows(rowsState);
    setStoredPayload(payload);
  }

  function loadDivisionStateOrBlank(d){
    const payload = getStoredPayload();
    const by = payload.byDivision && typeof payload.byDivision === "object" ? payload.byDivision : {};
    const found = by[d];
    const loaded = cloneRows(found);
    for(let i=0;i<ROWS_COUNT;i++){
      rowsState[i].home  = loaded[i].home;
      rowsState[i].away  = loaded[i].away;
      rowsState[i].score = loaded[i].score;
      rowsState[i].issue = loaded[i].issue;
    }
  }
  const homeSelectEls = [];
  const awaySelectEls = [];
  const scoreInputEls = [];
  const issueSelectEls = [];

  /* ================= HELPERS ================= */

  function setStatus(msg){
    statusTextEl.textContent = msg;
    window.clearTimeout(setStatus._t);
    setStatus._t = window.setTimeout(()=> statusTextEl.textContent = "Ready", 900);
  }

  function loadImage(url){
    if(!url) return Promise.reject(new Error("Empty URL"));
    if(imgCache.has(url)) return imgCache.get(url);

    const p = new Promise((resolve,reject)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = ()=> resolve(img);
      img.onerror = ()=> reject(new Error("Failed to load: " + url));
      img.src = url;
    });

    imgCache.set(url, p);
    return p;
  }

  function drawContainedImage(c, img, centerX, centerY, maxW, maxH){
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if(!iw || !ih) return;

    const s = Math.min(maxW / iw, maxH / ih);
    const dw = iw * s;
    const dh = ih * s;

    const x = centerX - dw/2;
    const y = centerY - dh/2;

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(img, x, y, dw, dh);
  }

  function setTextStyle(c, sizePx, colorHex, weight){
    c.fillStyle = colorHex;
    c.font = `${weight} ${sizePx}px ${FONT_FAMILY}`;
    c.textBaseline = "middle";
  }

  function safeUpper(s){
    return (s || "").replace(/\s+/g," ").trim().toUpperCase();
  }

  function normalizeTeamCode(v){
    const t = (v || "").trim();
    if(!t) return "";
    if(TEAM_CODE_SET.has(t)) return t;
    if(NAME_TO_CODE.has(t)) return NAME_TO_CODE.get(t) || "";
    return "";
  }

  // Narrow screens show 3-letter codes in dropdown; wide screens show full names
  const MQ_COMPACT = window.matchMedia("(max-width: 640px)");

  function displayClubNameFromCode(code){
    const name = CODE_TO_NAME.get(code) || "";
    if(!name) return "";
    // Only contraction requested
    if(name === "Hampton & Richmond Borough") return "Hampton & Richmond";
    return name;
  }

  function updateAllClubSelectLabels(){
    // Update every Home/Away select option text based on screen width
    const selects = [...homeSelectEls, ...awaySelectEls].filter(Boolean);

    for(const sel of selects){
      const opts = sel.options;
      for(let i=0;i<opts.length;i++){
        const opt = opts[i];
        const code = opt.value || "";

        // Keep "None" as-is
        if(code === ""){
          opt.textContent = "None";
          continue;
        }

        opt.textContent = MQ_COMPACT.matches
          ? code
          : (CODE_TO_NAME.get(code) || code);
      }
    }
  }

  // React live if the viewport crosses the breakpoint
  try{
    MQ_COMPACT.addEventListener("change", ()=>{
      updateAllClubSelectLabels();
    });
  }catch{
    // Safari fallback
    MQ_COMPACT.addListener(()=> updateAllClubSelectLabels());
  }

  function buildMatchdayText(){
    const v = matchdaySel.value;
    if(v === "NA") return "MATCHDAY";
    return `MATCHDAY ${v}`;
  }

  function buildDivisionStatusText(){
    const div = divisionSel.value;
    const st = statusSel.value;
    if(div === "National") return `NATIONAL LEAGUE ${st}`.toUpperCase();
    return `NATIONAL LEAGUE ${div} ${st}`.toUpperCase();
  }

  function drawCenteredRect(c, centerX, centerY, w, h, colorHex){
    c.fillStyle = colorHex;
    c.fillRect(centerX - (w/2), centerY - (h/2), w, h);
  }

  async function ensureBaseImages(){
    if(!bgImg) bgImg = await loadImage(BG_URL);
    const divUrl = DIV_BADGE[divisionSel.value] || DIV_BADGE.National;
    divBadgeImg = await loadImage(divUrl);
  }

  async function preloadRowCrests(){
    const urls = new Set();

    for(let i=0;i<ROWS_COUNT;i++){
      const row = rowsState[i];
      if(isRowHidden(row)) continue;

      const homeCode = normalizeTeamCode(row.home);
      const awayCode = normalizeTeamCode(row.away);

      const h = homeCode ? (CODE_TO_CREST.get(homeCode) || "") : "";
      const a = awayCode ? (CODE_TO_CREST.get(awayCode) || "") : "";

      if(h) urls.add(h);
      if(a) urls.add(a);
    }

    const tasks = [];
    for(const u of urls){
      tasks.push(loadImage(u).catch(()=>null));
    }
    await Promise.all(tasks);
  }

  function dateStamp(d){
    // e.g. 17Feb26 (uses local browser date)
    const day = String(d.getDate());
    const mon = d.toLocaleString("en-GB", { month: "short" });
    const yy  = String(d.getFullYear()).slice(-2);
    return `${day}${mon}${yy}`;
  }

  function buildFilename(kind){
    const status = statusSel.value;      // Fixtures / Results
    const div = divisionSel.value;       // National / North / South
    const mdVal = matchdaySel.value;     // "NA" or "1".."46"
    const suffix = (kind === "4x5") ? "4x5" : "1x1";

    if(mdVal && mdVal !== "NA"){
      return `${status} ${div} MD${mdVal} - ${suffix}.png`.replace(/\s+/g, " ").trim();
    }

    const stamp = dateStamp(new Date());
    return `${status} ${div} ${stamp} - ${suffix}.png`.replace(/\s+/g, " ").trim();
  }
  
  function buildClubSelect(){
    const s = document.createElement("select");

    const none = document.createElement("option");
    none.value = "";
    none.textContent = "None";
    s.appendChild(none);

    for(const code of TEAM_CODES){
      const o = document.createElement("option");
      o.value = code;
      // Label depends on screen width:
      // - Wide: full name
      // - Narrow: 3-letter code
      o.textContent = MQ_COMPACT.matches ? code : (CODE_TO_NAME.get(code) || code);
      o.title = CODE_TO_NAME.get(code) || code;
      s.appendChild(o);
    }

    return s;
  }

  function buildIssueSelect(){
    const s = document.createElement("select");

    const normal = document.createElement("option");
    normal.value = "";
    normal.textContent = "-";
    s.appendChild(normal);

    for(const code of ["P-P","A-A","L-L"]){
      const o = document.createElement("option");
      o.value = code;
      o.textContent = code;
      s.appendChild(o);
    }

    return s;
  }

  function isRowHidden(row){
    return !row.home && !row.away;
  }

  function syncScoreInputsEnabled(){
    const isResults = (statusSel.value === "Results");

    for(let i=0;i<ROWS_COUNT;i++){
      const inp = scoreInputEls[i];
      if(!inp) continue;

      const issue = (rowsState[i] && rowsState[i].issue) ? rowsState[i].issue : "";
      inp.disabled = (!isResults) || !!issue;
      inp.placeholder = isResults ? "e.g. 2-1" : "";
    }
  }

  function rebuildRowsUI(){
    rowsGridEl.innerHTML = "";

    // Column headers
    const h1 = document.createElement("div"); h1.className = "colHead"; h1.textContent = "Home";
    const h2 = document.createElement("div"); h2.className = "colHead"; h2.textContent = "Score";
    const h3 = document.createElement("div"); h3.className = "colHead"; h3.textContent = "Away";
    const h4 = document.createElement("div"); h4.className = "colHead"; h4.textContent = "Status";

    rowsGridEl.appendChild(h1);
    rowsGridEl.appendChild(h2);
    rowsGridEl.appendChild(h3);
    rowsGridEl.appendChild(h4);

    homeSelectEls.length = 0;
    awaySelectEls.length = 0;
    scoreInputEls.length = 0;
    issueSelectEls.length = 0;

    for(let i=0;i<ROWS_COUNT;i++){
      const homeSel = buildClubSelect();
      const awaySel = buildClubSelect();
      const issueSel = buildIssueSelect();

      const scoreInp = document.createElement("input");
      scoreInp.type = "text";
      scoreInp.inputMode = "text";
      scoreInp.autocomplete = "off";

      // Keep score box behaviour tight (e.g. "3-3", "10-0")
      scoreInp.maxLength = 5;
      scoreInp.placeholder = "";

      // Set current values from saved state
      homeSel.value = normalizeTeamCode(rowsState[i].home) || "";
      awaySel.value = normalizeTeamCode(rowsState[i].away) || "";
      scoreInp.value = rowsState[i].score || "";
      issueSel.value = rowsState[i].issue || "";

      homeSel.addEventListener("change", ()=>{
        rowsState[i].home = homeSel.value || "";
        autosave();
        scheduleRender();
      });

      awaySel.addEventListener("change", ()=>{
        rowsState[i].away = awaySel.value || "";
        autosave();
        scheduleRender();
      });

      scoreInp.addEventListener("input", ()=>{
        rowsState[i].score = scoreInp.value || "";
        autosave();
        scheduleRender();
      });

      issueSel.addEventListener("change", ()=>{
        rowsState[i].issue = issueSel.value || "";
        syncScoreInputsEnabled();
      // Ensure dropdown labels match current screen width
        updateAllClubSelectLabels(); 
        autosave();
        scheduleRender();
      });

      scoreInp.addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){
          e.preventDefault();
          const nextIndex = i + 1;
          if(nextIndex < ROWS_COUNT && scoreInputEls[nextIndex]){
            scoreInputEls[nextIndex].focus();
            scoreInputEls[nextIndex].select();
          }
        }
      });

      if(i === 0){
        scoreInp.addEventListener("paste", (e)=>{
          if(statusSel.value !== "Results") return;

          const text = (e.clipboardData && e.clipboardData.getData("text")) ? e.clipboardData.getData("text") : "";
          if(!text) return;

          if(/\r?\n/.test(text)){
            e.preventDefault();

            const lines = text
              .split(/\r?\n/)
              .map(x => (x || "").trim())
              .slice(0, ROWS_COUNT);

            for(let r=0;r<ROWS_COUNT;r++){
              const v = lines[r] || "";
              rowsState[r].score = v;
              if(scoreInputEls[r]) scoreInputEls[r].value = v;
            }

            autosave();
            scheduleRender();
          }
        });
      }

      rowsGridEl.appendChild(homeSel);
      rowsGridEl.appendChild(scoreInp);
      rowsGridEl.appendChild(awaySel);
      rowsGridEl.appendChild(issueSel);

      homeSelectEls.push(homeSel);
      scoreInputEls.push(scoreInp);
      awaySelectEls.push(awaySel);
      issueSelectEls.push(issueSel);
    }

    syncScoreInputsEnabled();
  }

  }catch{

}

}

  payload.byDivision[divisionSel.value] = cloneRows(rowsState);

  /* ================= RENDER (shared) ================= */

  async function renderToContext(c){
    await ensureBaseImages();
    await preloadRowCrests();

    c.setTransform(1,0,0,1,0,0);
    c.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE);

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(bgImg, 0, 0, CANVAS_SIZE, CANVAS_SIZE);

    const header1 = buildMatchdayText().toUpperCase();
    c.textAlign = HEADER_1.align;
    setTextStyle(c, HEADER_1.size, HEADER_1.color, HEADER_1.weight);
    c.fillText(header1, HEADER_1.x, HEADER_1.y);

    const header2 = buildDivisionStatusText();
    c.textAlign = HEADER_2.align;
    setTextStyle(c, HEADER_2.size, HEADER_2.color, HEADER_2.weight);
    c.fillText(header2, HEADER_2.x, HEADER_2.y);

    if(divBadgeImg){
      const iw = divBadgeImg.naturalWidth || divBadgeImg.width;
      const ih = divBadgeImg.naturalHeight || divBadgeImg.height;
      const dw = iw * DIV_BADGE_POS.scale;
      const dh = ih * DIV_BADGE_POS.scale;
      const bx = DIV_BADGE_POS.x - dw/2;
      const by = DIV_BADGE_POS.y - dh/2;
      c.drawImage(divBadgeImg, bx, by, dw, dh);
    }

    const isResults = (statusSel.value === "Results");

    for(let i=0;i<ROWS_COUNT;i++){
      const row = rowsState[i];
      if(isRowHidden(row)) continue;

      const cy = ROWS_Y_START + (i * ROWS_LINE_GAP);
      const ty = cy + 2; // text Y offset

      drawCenteredRect(c, SCORE_COL.x, cy, BLUE_PILL.w, BLUE_PILL.h, BLUE_PILL.color);
      drawCenteredRect(c, SCORE_COL.x, cy, WHITE_BOX.w, WHITE_BOX.h, WHITE_BOX.color);
      drawCenteredRect(c, HOME_ICON_X, cy, RED_BOX.w, RED_BOX.h, RED_BOX.color);
      drawCenteredRect(c, AWAY_ICON_X, cy, RED_BOX.w, RED_BOX.h, RED_BOX.color);

      const homeCode = normalizeTeamCode(row.home);
      const awayCode = normalizeTeamCode(row.away);

      const homeCrestUrl = homeCode ? (CODE_TO_CREST.get(homeCode) || "") : "";
      const awayCrestUrl = awayCode ? (CODE_TO_CREST.get(awayCode) || "") : "";

      if(homeCrestUrl){
        const img = await loadImage(homeCrestUrl).catch(()=>null);
        if(img) drawContainedImage(c, img, HOME_ICON_X, cy, CREST_MAX, CREST_MAX);
      }

      if(awayCrestUrl){
        const img = await loadImage(awayCrestUrl).catch(()=>null);
        if(img) drawContainedImage(c, img, AWAY_ICON_X, cy, CREST_MAX, CREST_MAX);
      }

      const homeText = safeUpper(displayClubNameFromCode(homeCode));
      const awayText = safeUpper(displayClubNameFromCode(awayCode));

      if(homeText){
        c.textAlign = HOME_COL.align;
        setTextStyle(c, HOME_COL.size, HOME_COL.color, HOME_COL.weight);
        c.fillText(homeText, HOME_COL.x, ty);
      }

      if(awayText){
        c.textAlign = AWAY_COL.align;
        setTextStyle(c, AWAY_COL.size, AWAY_COL.color, AWAY_COL.weight);
        c.fillText(awayText, AWAY_COL.x, ty);
      }

      let scoreText = "";
      const issue = (row.issue || "").trim();

      if(issue){
        scoreText = issue;
      }else if(!isResults){
        scoreText = (row.home && row.away) ? "V" : "";
      }else{
        scoreText = (row.score || "").trim();
      }

      scoreText = safeUpper(scoreText);

      if(scoreText){
        c.textAlign = SCORE_COL.align;

        // A-A / P-P / L-L should be FULL size (same as scorelines)
        // Only "V" in Fixtures stays small
        const isV = (!isResults && !issue && scoreText === "V");

        if(isV){
          setTextStyle(c, SCORE_SMALL.size, SCORE_COL.color, SCORE_SMALL.weight);
        }else{
          setTextStyle(c, SCORE_COL.size, SCORE_COL.color, SCORE_COL.weight);
        }

        c.fillText(scoreText, SCORE_COL.x, ty);
      }
    }
  }
  let renderQueued = false;
  function scheduleRender(){
    if(renderQueued) return;
    renderQueued = true;

    requestAnimationFrame(async ()=>{
      renderQueued = false;
      try{
        if(document.fonts && document.fonts.ready) await document.fonts.ready;
        await renderToContext(ctx);
        autosave();
      }catch(e){
        console.error(e);
        setStatus("Render error (CORS?)");
      }
    });
  }

  async function renderNow(){
    if(document.fonts && document.fonts.ready) await document.fonts.ready;
    await renderToContext(ctx);
    autosave();
  }

  /* ================= DOWNLOAD ================= */

  async function downloadPNG_1x1(){
    try{
      await ensureBaseImages();
      if(document.fonts && document.fonts.ready) await document.fonts.ready;

      const out = document.createElement("canvas");
      out.width = CANVAS_SIZE;
      out.height = CANVAS_SIZE;
      const c = out.getContext("2d");

      await renderToContext(c);

      const blob = await new Promise(res => out.toBlob(res, "image/png"));
      if(!blob){ setStatus("Export failed"); return; }

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = buildFilename("1x1");
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);

      setStatus("Downloaded");
    }catch(e){
      console.error(e);
      setStatus("Export error (CORS?)");
    }
  }

  async function downloadPNG_4x5(){
    try{
      await ensureBaseImages();
      if(document.fonts && document.fonts.ready) await document.fonts.ready;

      const full = document.createElement("canvas");
      full.width = CANVAS_SIZE;
      full.height = CANVAS_SIZE;
      const fc = full.getContext("2d");

      await renderToContext(fc);

      const OUT_W = 1080;
      const OUT_H = 1347;
      const SRC_X = 190;
      const SRC_Y = 0;

      const out = document.createElement("canvas");
      out.width = OUT_W;
      out.height = OUT_H;
      const oc = out.getContext("2d");

      oc.imageSmoothingEnabled = true;
      oc.imageSmoothingQuality = "high";
      oc.drawImage(full, SRC_X, SRC_Y, OUT_W, OUT_H, 0, 0, OUT_W, OUT_H);

      const blob = await new Promise(res => out.toBlob(res, "image/png"));
      if(!blob){ setStatus("Export failed"); return; }

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = buildFilename("4x5");
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);

      setStatus("Downloaded");
    }catch(e){
      console.error(e);
      setStatus("Export error (CORS?)");
    }
  }

  /* ================= RESET ALL ================= */

  function resetAll(){
    matchdaySel.value = "NA";
    divisionSel.value = "National";
    statusSel.value = "Fixtures";

    for(let i=0;i<ROWS_COUNT;i++){
      rowsState[i].home = "";
      rowsState[i].away = "";
      rowsState[i].score = "";
      rowsState[i].issue = "";

      if(homeSelectEls[i]) homeSelectEls[i].value = "";
      if(awaySelectEls[i]) awaySelectEls[i].value = "";
      if(scoreInputEls[i]) scoreInputEls[i].value = "";
      if(issueSelectEls[i]) issueSelectEls[i].value = "";
    }

    syncScoreInputsEnabled();
    divBadgeImg = null;

    autosave();
    scheduleRender();
    setStatus("Reset");
  }

  /* ================= INIT ================= */

  function buildMatchdayOptions(){
    matchdaySel.innerHTML = "";

    const na = document.createElement("option");
    na.value = "NA";
    na.textContent = "N/A";
    matchdaySel.appendChild(na);

    for(let i=1;i<=46;i++){
      const o = document.createElement("option");
      o.value = String(i);
      o.textContent = String(i);
      matchdaySel.appendChild(o);
    }
  }

  function bindUI(){
    matchdaySel.addEventListener("change", ()=>{
      autosave();
      scheduleRender();
    });

divisionSel.addEventListener("change", ()=>{
  // Save what you were editing for the previous division
  // (divisionSel.value has already changed, so use the previous value we track)
  divBadgeImg = null;

  // We need the old division, so store it on the element the first time
  const prev = divisionSel._prevDivision || "National";
  saveActiveDivisionState(prev);

  // Load the newly-selected division’s saved rows (or blank)
  loadDivisionStateOrBlank(divisionSel.value);
  applyRowsToUI();

  // Track current for next switch
  divisionSel._prevDivision = divisionSel.value;

  autosave();
  scheduleRender();
});
    statusSel.addEventListener("change", ()=>{
      syncScoreInputsEnabled();
      autosave();
      scheduleRender();
    });

    downloadBtn.addEventListener("click", downloadPNG_1x1);
    download45Btn.addEventListener("click", downloadPNG_4x5);
    resetAllBtn.addEventListener("click", resetAll);
  }

  async function start(){
    buildMatchdayOptions();
    autoload();
    rebuildRowsUI();
    
    // Set the previous-division tracker AFTER autoload picked the current division
    divisionSel._prevDivision = divisionSel.value;
    
    // Push loaded rowsState into the freshly-built UI
    applyRowsToUI();
    
    bindUI();
    
    syncScoreInputsEnabled();

    try{
      if(document.fonts && document.fonts.ready) await document.fonts.ready;
      await ensureBaseImages();
      await renderNow();
      setStatus("Loaded");
    }catch(e){
      console.error(e);
      setStatus("Image load error (CORS?)");
    }
  }

  start();

})();
