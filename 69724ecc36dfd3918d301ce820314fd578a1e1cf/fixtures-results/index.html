<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fixtures / Results Builder</title>

<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">

<style>
:root{
  --border:#d0d7de;
  --bg:#f6f8fa;
  --fg:#24292f;
  --muted:#57606a;
  --brand:#9e0000;
  --blue:#223b7c;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"carbona-variable", system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  font-size:14px;
  color:var(--fg);
  background:#fff;
}

.page{
  width:100%;
  padding:20px 18px 26px;
}

.app-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.app-header h1{
  margin:0;
  font-size:22px;
  font-weight:800;
}

.app{
  display:grid;
  grid-template-columns:minmax(520px, 900px) minmax(360px, 1fr);
  gap:18px;
  align-items:start;
}

@media (max-width: 980px){
  .app{ grid-template-columns:1fr; }
}

.previewWrap{
  position:sticky;
  top:14px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--bg);
  padding:10px;
}

canvas{
  display:block;
  width:100%;
  height:auto;
  background:#fff;
}

.panel{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-width:0;
}

.box{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  background:#fff;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.controls select,
.controls input{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font:inherit;
}

.controls button{
  padding:8px 10px;
  border:1px solid var(--brand);
  border-radius:10px;
  background:var(--brand);
  color:#fff;
  font:inherit;
  cursor:pointer;
}

.controls button:hover{ filter:brightness(.95); }

.section{
  display:flex;
  flex-direction:column;
  gap:6px;
}

textarea{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:12px;
  font:inherit;
  resize:vertical;
  min-height:140px;
}
.rowsGrid{
  display:grid;
  grid-template-columns: 1fr 140px 1fr;
  gap:8px;
  align-items:center;
}

.rowsGrid select,
.rowsGrid input{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font:inherit;
  width:100%;
}

.rowsGrid input{
  text-align:center;
}

.rowsGrid .rowHint{
  grid-column: 1 / -1;
  font-size:12px;
  color:var(--muted);
}
footer{
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>
<div class="page">

<header class="app-header">
  <h1>Fixtures / Results Builder</h1>
</header>

<div class="app">

  <div class="previewWrap">
    <canvas id="preview" width="1347" height="1347"></canvas>
  </div>

  <div class="panel">

    <div class="box controls">
      <select id="matchday" title="Matchday">
        <option value="NA">N/A</option>
      </select>

      <select id="division" title="Division">
        <option value="National">National</option>
        <option value="North">North</option>
        <option value="South">South</option>
      </select>

      <select id="status" title="Status">
        <option value="Fixtures">Fixtures</option>
        <option value="Results">Results</option>
      </select>

      <button type="button" id="download">Download PNG</button>
      <button type="button" id="resetAll" title="Wipe all fields back to defaults">Reset all</button>
    </div>

    <div class="box section">
      <label>Rows (12)</label>
      <div class="rowsGrid" id="rowsGrid">
        <div class="rowHint">Home / Score / Away. Choose “None” on both sides to hide that row completely.</div>
      </div>
    </div>

    <footer>
      <span id="statusText">Ready</span>
    </footer>

  </div>
</div>

</div>

  function loadImage(url){
    if(!url) return Promise.reject(new Error("Empty URL"));
    if(imgCache.has(url)) return imgCache.get(url);

    const p = new Promise((resolve,reject)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = ()=> resolve(img);
      img.onerror = ()=> reject(new Error("Failed to load: " + url));
      img.src = url;
    });

    imgCache.set(url, p);
    return p;
  }

  function drawContainedImage(c, img, centerX, centerY, maxW, maxH){
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if(!iw || !ih) return;

    const s = Math.min(maxW / iw, maxH / ih);
    const dw = iw * s;
    const dh = ih * s;
    const x = centerX - dw/2;
    const y = centerY - dh/2;

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(img, x, y, dw, dh);
  }

  function normalizeClubKey(s){
    // Robust matching for user-entered club names
    // - uppercases
    // - collapses spaces
    // - strips most punctuation but keeps & as AND-ish
    let t = (s || "").toUpperCase().trim();
    t = t.replace(/&/g, " AND ");
    t = t.replace(/[^A-Z0-9 ]+/g, " ");
    t = t.replace(/\s+/g, " ").trim();
    return t;
  }

  const CLUB_LOOKUP = (function(){
    const m = new Map();
    for(const name of TEAM_NAMES){
      m.set(normalizeClubKey(name), name);
    }

    // (safe to keep minimal; add more if needed)
    m.set(normalizeClubKey("Dagenham and Redbridge"), "Dagenham & Redbridge");
    m.set(normalizeClubKey("Halifax Town"), "FC Halifax Town");
    m.set(normalizeClubKey("Hampton and Richmond Borough"), "Hampton & Richmond Borough");
    m.set(normalizeClubKey("Kings Lynn Town"), "King's Lynn Town");

    return m;
  })();

  function resolveClubName(inputLine){
    const key = normalizeClubKey(inputLine);
    return CLUB_LOOKUP.get(key) || null;
  }

  function getClubCrestUrlFromLine(inputLine){
    const resolved = resolveClubName(inputLine);
    if(!resolved) return "";
    return TEAM_CREST_MAP.get(resolved) || "";
  }

    c.fillRect(centerX - (w/2), centerY - (h/2), w, h);

    const none = document.createElement("option");
    none.value = "";
    none.textContent = "None";
    s.appendChild(none);

    for(const name of TEAM_NAMES){
      const o = document.createElement("option");
      o.value = name;
      o.textContent = name;
      s.appendChild(o);
    }

    return s;
  }

  function isRowHidden(row){
    // Hide all row elements only when BOTH sides are None
    return !row.home && !row.away;
  }

  function syncScoreInputsEnabled(){
    const isResults = (statusSel.value === "Results");
    for(let i=0;i<ROWS_COUNT;i++){
      const inp = scoreInputEls[i];
      if(!inp) continue;
      inp.disabled = !isResults;
      inp.placeholder = isResults ? "e.g. 2-1" : "";
    }
  }

  function rebuildRowsUI(){
    // Keep the existing hint node (first child) if present
    const hint = rowsGridEl.querySelector(".rowHint");
    rowsGridEl.innerHTML = "";
    if(hint) rowsGridEl.appendChild(hint);

    homeSelectEls.length = 0;
    awaySelectEls.length = 0;
    scoreInputEls.length = 0;

    for(let i=0;i<ROWS_COUNT;i++){
      const homeSel = buildClubSelect();
      const awaySel = buildClubSelect();

      const scoreInp = document.createElement("input");
      scoreInp.type = "text";
      scoreInp.inputMode = "text";
      scoreInp.autocomplete = "off";

      homeSel.value = rowsState[i].home || "";
      awaySel.value = rowsState[i].away || "";
      scoreInp.value = rowsState[i].score || "";

      homeSel.addEventListener("change", ()=>{
        rowsState[i].home = homeSel.value || "";
        autosave();
        scheduleRender();
      });

      awaySel.addEventListener("change", ()=>{
        rowsState[i].away = awaySel.value || "";
        autosave();
        scheduleRender();
      });

      scoreInp.addEventListener("input", ()=>{
        rowsState[i].score = scoreInp.value || "";
        autosave();
        scheduleRender();
      });

      // Paste spread: only on the TOP score box (row 0), in Results mode
      if(i === 0){
              // Enter moves to next score box instead of adding newline
      scoreInp.addEventListener("keydown", (e)=>{
        if(e.key === "Enter"){
          e.preventDefault();

          const nextIndex = i + 1;
          if(nextIndex < ROWS_COUNT && scoreInputEls[nextIndex]){
            scoreInputEls[nextIndex].focus();
            scoreInputEls[nextIndex].select();
          }
        }
      });
        scoreInp.addEventListener("paste", (e)=>{
          if(statusSel.value !== "Results") return;

          const text = (e.clipboardData && e.clipboardData.getData("text")) ? e.clipboardData.getData("text") : "";
          if(!text) return;

          // If it looks multi-line, spread into all 12
          if(/\r?\n/.test(text)){
            e.preventDefault();

            const lines = text
              .split(/\r?\n/)
              .map(x => (x || "").trim())
              .slice(0, ROWS_COUNT);

            for(let r=0;r<ROWS_COUNT;r++){
              const v = lines[r] || "";
              rowsState[r].score = v;
              if(scoreInputEls[r]) scoreInputEls[r].value = v;
            }

            autosave();
            scheduleRender();
          }
        });
      }

      rowsGridEl.appendChild(homeSel);
      rowsGridEl.appendChild(scoreInp);
      rowsGridEl.appendChild(awaySel);

      homeSelectEls.push(homeSel);
      scoreInputEls.push(scoreInp);
      awaySelectEls.push(awaySel);
    }

    syncScoreInputsEnabled();
  }
  function autosave(){
    const payload = {
      v: VERSION,
      matchday: matchdaySel.value,
      division: divisionSel.value,
      status: statusSel.value,
      rowsState: rowsState
    };
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }catch{}
  }

  function autoload(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const d = JSON.parse(raw);
      if(!d || typeof d !== "object") return;

      if(typeof d.matchday === "string") matchdaySel.value = d.matchday;
      if(typeof d.division === "string") divisionSel.value = d.division;
      if(typeof d.status === "string") statusSel.value = d.status;

      if(Array.isArray(d.rowsState)){
        for(let i=0;i<ROWS_COUNT;i++){
          const r = d.rowsState[i];
          if(!r || typeof r !== "object") continue;
          rowsState[i].home = typeof r.home === "string" ? r.home : "";
          rowsState[i].away = typeof r.away === "string" ? r.away : "";
          rowsState[i].score = typeof r.score === "string" ? r.score : "";
        }
      }
    }catch{}
  }

  /* ================= RENDER ================= */

  let renderQueued = false;
  function scheduleRender(){
    if(renderQueued) return;
    renderQueued = true;

    requestAnimationFrame(async ()=>{
      renderQueued = false;
      try{
        await render();
      }catch(e){
        console.error(e);
        setStatus("Render error (CORS?)");
      }
    });
  }

  async function render(){
    await ensureBaseImages();

    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE);

    // Background
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(bgImg, 0, 0, CANVAS_SIZE, CANVAS_SIZE);

    // Header line 1
    const header1 = buildMatchdayText().toUpperCase();
    ctx.textAlign = HEADER_1.align;
    setTextStyle(ctx, HEADER_1.size, HEADER_1.color, HEADER_1.weight);
    ctx.fillText(header1, HEADER_1.x, HEADER_1.y);

    // Header line 2 (moved to y=270)
    const header2 = buildDivisionStatusText();
    ctx.textAlign = HEADER_2.align;
    setTextStyle(ctx, HEADER_2.size, HEADER_2.color, HEADER_2.weight);
    ctx.fillText(header2, HEADER_2.x, HEADER_2.y);

    // Division badge
    if(divBadgeImg){
      const iw = divBadgeImg.naturalWidth || divBadgeImg.width;
      const ih = divBadgeImg.naturalHeight || divBadgeImg.height;
      const dw = iw * DIV_BADGE_POS.scale;
      const dh = ih * DIV_BADGE_POS.scale;
      const bx = DIV_BADGE_POS.x - dw/2;
      const by = DIV_BADGE_POS.y - dh/2;
      ctx.drawImage(divBadgeImg, bx, by, dw, dh);
    }

    // Rows from dropdowns (always 12; hide when both sides are None)
    const isResults = (statusSel.value === "Results");

    for(let i=0;i<ROWS_COUNT;i++){
      const row = rowsState[i];
      if(isRowHidden(row)) continue;

      const cy = ROWS_Y_START + (i * ROWS_LINE_GAP);

      // Blue bar (spans 360..1140) + center white square
      drawCenteredRect(ctx, SCORE_COL.x, cy, BLUE_PILL.w, BLUE_PILL.h, BLUE_PILL.color);
      drawCenteredRect(ctx, SCORE_COL.x, cy, WHITE_BOX.w, WHITE_BOX.h, WHITE_BOX.color);

      // Red squares left/right
      drawCenteredRect(ctx, HOME_ICON_X, cy, RED_BOX.w, RED_BOX.h, RED_BOX.color);
      drawCenteredRect(ctx, AWAY_ICON_X, cy, RED_BOX.w, RED_BOX.h, RED_BOX.color);

      // Crests (from selected club)
      const homeCrestUrl = row.home ? (TEAM_CREST_MAP.get(row.home) || "") : "";
      const awayCrestUrl = row.away ? (TEAM_CREST_MAP.get(row.away) || "") : "";

      if(homeCrestUrl){
        try{
          const img = await loadImage(homeCrestUrl);
          drawContainedImage(ctx, img, HOME_ICON_X, cy, CREST_MAX, CREST_MAX);
        }catch{}
      }

      if(awayCrestUrl){
        try{
          const img = await loadImage(awayCrestUrl);
          drawContainedImage(ctx, img, AWAY_ICON_X, cy, CREST_MAX, CREST_MAX);
        }catch{}
      }

      // Home/Away names (display mapping)
      const homeText = safeUpper(displayClubName(row.home));
      const awayText = safeUpper(displayClubName(row.away));

      if(homeText){
        ctx.textAlign = HOME_COL.align;
        setTextStyle(ctx, HOME_COL.size, HOME_COL.color, HOME_COL.weight);
        ctx.fillText(homeText, HOME_COL.x, cy);
      }

      if(awayText){
        ctx.textAlign = AWAY_COL.align;
        setTextStyle(ctx, AWAY_COL.size, AWAY_COL.color, AWAY_COL.weight);
        ctx.fillText(awayText, AWAY_COL.x, cy);
      }

      // Score / V
      let scoreText = "";
      if(!isResults){
        // Fixtures: show V when BOTH teams selected
        scoreText = (row.home && row.away) ? "V" : "";
      }else{
        scoreText = (row.score || "").trim();
      }

      scoreText = safeUpper(scoreText);

      if(scoreText){
        ctx.textAlign = SCORE_COL.align;
        setTextStyle(ctx, SCORE_COL.size, SCORE_COL.color, SCORE_COL.weight);
        ctx.fillText(scoreText, SCORE_COL.x, cy);
      }
    }

    autosave();
  }

  /* ================= DOWNLOAD ================= */

  async function downloadPNG(){
    const out = document.createElement("canvas");
    out.width = CANVAS_SIZE;
    out.height = CANVAS_SIZE;
    const c = out.getContext("2d");

    // Render to offscreen at 1:1
    // (Reuse render logic but drawing to "c" — easiest: temporarily swap ctx)
    const prevCtx = ctx;
    try{
      // crude but safe: copy render body with target ctx
      await ensureBaseImages();

      c.setTransform(1,0,0,1,0,0);
      c.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE);

      c.imageSmoothingEnabled = true;
      c.imageSmoothingQuality = "high";
      c.drawImage(bgImg, 0, 0, CANVAS_SIZE, CANVAS_SIZE);

      const header1 = buildMatchdayText().toUpperCase();
      c.textAlign = HEADER_1.align;
      c.fillStyle = HEADER_1.color;
      c.font = `${HEADER_1.weight} ${HEADER_1.size}px ${FONT_FAMILY}`;
      c.textBaseline = "middle";
      c.fillText(header1, HEADER_1.x, HEADER_1.y);

      const header2 = buildDivisionStatusText();
      c.textAlign = HEADER_2.align;
      c.fillStyle = HEADER_2.color;
      c.font = `${HEADER_2.weight} ${HEADER_2.size}px ${FONT_FAMILY}`;
      c.textBaseline = "middle";
      c.fillText(header2, HEADER_2.x, HEADER_2.y);

      if(divBadgeImg){
        const iw = divBadgeImg.naturalWidth || divBadgeImg.width;
        const ih = divBadgeImg.naturalHeight || divBadgeImg.height;
        const dw = iw * DIV_BADGE_POS.scale;
        const dh = ih * DIV_BADGE_POS.scale;
        const bx = DIV_BADGE_POS.x - dw/2;
        const by = DIV_BADGE_POS.y - dh/2;
        c.drawImage(divBadgeImg, bx, by, dw, dh);
      }

      // Rows from dropdowns (always 12; hide when both sides are None)
      const isResults = (statusSel.value === "Results");

      for(let i=0;i<ROWS_COUNT;i++){
        const row = rowsState[i];
        if(isRowHidden(row)) continue;

        const cy = ROWS_Y_START + (i * ROWS_LINE_GAP);

        // Blue bar + center white square
        c.fillStyle = BLUE_PILL.color;
        c.fillRect(SCORE_COL.x - (BLUE_PILL.w/2), cy - (BLUE_PILL.h/2), BLUE_PILL.w, BLUE_PILL.h);

        c.fillStyle = WHITE_BOX.color;
        c.fillRect(SCORE_COL.x - (WHITE_BOX.w/2), cy - (WHITE_BOX.h/2), WHITE_BOX.w, WHITE_BOX.h);

        // Red squares
        c.fillStyle = RED_BOX.color;
        c.fillRect(HOME_ICON_X - (RED_BOX.w/2), cy - (RED_BOX.h/2), RED_BOX.w, RED_BOX.h);
        c.fillRect(AWAY_ICON_X - (RED_BOX.w/2), cy - (RED_BOX.h/2), RED_BOX.w, RED_BOX.h);

        // Crests
        const homeCrestUrl = row.home ? (TEAM_CREST_MAP.get(row.home) || "") : "";
        const awayCrestUrl = row.away ? (TEAM_CREST_MAP.get(row.away) || "") : "";

        if(homeCrestUrl){
          try{
            const img = await loadImage(homeCrestUrl);
            drawContainedImage(c, img, HOME_ICON_X, cy, CREST_MAX, CREST_MAX);
          }catch{}
        }
        if(awayCrestUrl){
          try{
            const img = await loadImage(awayCrestUrl);
            drawContainedImage(c, img, AWAY_ICON_X, cy, CREST_MAX, CREST_MAX);
          }catch{}
        }

        // Text baseline
        c.textBaseline = "middle";

        // Home text
        const homeText = safeUpper(displayClubName(row.home));
        if(homeText){
          c.textAlign = HOME_COL.align;
          c.fillStyle = HOME_COL.color;
          c.font = `${HOME_COL.weight} ${HOME_COL.size}px ${FONT_FAMILY}`;
          c.fillText(homeText, HOME_COL.x, cy);
        }

        // Away text
        const awayText = safeUpper(displayClubName(row.away));
        if(awayText){
          c.textAlign = AWAY_COL.align;
          c.fillStyle = AWAY_COL.color;
          c.font = `${AWAY_COL.weight} ${AWAY_COL.size}px ${FONT_FAMILY}`;
          c.fillText(awayText, AWAY_COL.x, cy);
        }

        // Score / V
        let scoreText = "";
        if(!isResults){
          scoreText = (row.home && row.away) ? "V" : "";
        }else{
          scoreText = (row.score || "").trim();
        }
        scoreText = safeUpper(scoreText);

        if(scoreText){
          c.textAlign = SCORE_COL.align;
          c.fillStyle = SCORE_COL.color;
          c.font = `${SCORE_COL.weight} ${SCORE_COL.size}px ${FONT_FAMILY}`;
          c.fillText(scoreText, SCORE_COL.x, cy);
        }
      }
    }catch(e){
      console.error(e);
      setStatus("Export error (CORS?)");
      return;
    }finally{
      // no-op
    }

    const blob = await new Promise(res => out.toBlob(res, "image/png"));
    if(!blob){
      setStatus("Export failed");
      return;
    }

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = buildFilename();
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);

    setStatus("Downloaded");
  }

  /* ================= RESET ALL ================= */

  function resetAll(){
    matchdaySel.value = "NA";
    divisionSel.value = "National";
    statusSel.value = "Fixtures";

    for(let i=0;i<ROWS_COUNT;i++){
      rowsState[i].home = "";
      rowsState[i].away = "";
      rowsState[i].score = "";
      if(homeSelectEls[i]) homeSelectEls[i].value = "";
      if(awaySelectEls[i]) awaySelectEls[i].value = "";
      if(scoreInputEls[i]) scoreInputEls[i].value = "";
    }

    syncScoreInputsEnabled();

    // force reload badge on next render
    divBadgeImg = null;

    autosave();
    scheduleRender();
    setStatus("Reset");
  }

  /* ================= INIT ================= */

  function buildMatchdayOptions(){
    // N/A + 1..46
    matchdaySel.innerHTML = "";

    const na = document.createElement("option");
    na.value = "NA";
    na.textContent = "N/A";
    matchdaySel.appendChild(na);

    for(let i=1;i<=46;i++){
      const o = document.createElement("option");
      o.value = String(i);
      o.textContent = String(i);
      matchdaySel.appendChild(o);
    }
  }

  function bindUI(){
    matchdaySel.addEventListener("change", ()=>{
      autosave();
      scheduleRender();
    });

    divisionSel.addEventListener("change", ()=>{
      divBadgeImg = null;
      autosave();
      scheduleRender();
    });

    statusSel.addEventListener("change", ()=>{
      syncScoreInputsEnabled();
      autosave();
      scheduleRender();
    });

    downloadBtn.addEventListener("click", downloadPNG);
    resetAllBtn.addEventListener("click", resetAll);
  }

  async function start(){
    buildMatchdayOptions();
    autoload();
    rebuildRowsUI();
    bindUI();

    // Make sure UI reflects current status mode on load
    syncScoreInputsEnabled();

    try{
      await ensureBaseImages();
      scheduleRender();
      setStatus("Loaded");
    }catch(e){
      console.error(e);
      setStatus("Image load error (CORS?)");
    }
  }

  start();

})();
</script>
