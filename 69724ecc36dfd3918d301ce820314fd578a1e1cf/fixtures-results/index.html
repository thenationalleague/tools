<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fixtures/Results Graphic Tool</title>

<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">

<style>
:root{
  --border:#d0d7de;
  --bg:#f6f8fa;
  --fg:#24292f;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"carbona-variable", system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:#fff;
  color:var(--fg);
}

.page{ padding:22px 18px 28px; }

.app{
  display:grid;
  grid-template-columns:minmax(520px,900px) minmax(320px,1fr);
  gap:20px;
}

.previewWrap{
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--bg);
  padding:10px;
}

canvas{ width:100%; height:auto; display:block; }

.panel{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.box{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  background:#fff;
}

.controls{
  display:flex;
  flex-direction:column;
  gap:8px;
}

select{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  font:inherit;
}

button{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid #9e0000;
  background:#9e0000;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="page">

<div class="app">

<div class="previewWrap">
<canvas id="preview" width="1347" height="1347"></canvas>
</div>

<div class="panel">

<div class="box controls">

<label>Matchday</label>
<select id="matchday"></select>

<label>Division</label>
<select id="division">
<option>National</option>
<option>North</option>
<option>South</option>
</select>

<label>Status</label>
<select id="status">
<option>Fixtures</option>
<option>Results</option>
</select>

<button id="download">Download PNG</button>

</div>

</div>
</div>
</div>

<script>
const VERSION="v2.2";

const canvas=document.getElementById("preview");
const ctx=canvas.getContext("2d");

const matchdaySel=document.getElementById("matchday");
const divisionSel=document.getElementById("division");
const statusSel=document.getElementById("status");
const downloadBtn=document.getElementById("download");

const BG_URL="Fixtures background 1x1.png";

const DIV_BADGE={
National:"https://images.gc.nationalleagueservices.co.uk/a95e6fe0-0b4a-11f1-81c5-055e14995095.png",
North:"https://images.gc.nationalleagueservices.co.uk/b02360b0-0b4a-11f1-81c5-055e14995095.png",
South:"https://images.gc.nationalleagueservices.co.uk/b9b1f8d0-0b4a-11f1-81c5-055e14995095.png"
};

let bgImg=null;
let crestImg=null;

function loadImage(url){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.crossOrigin="anonymous";
    img.onload=()=>resolve(img);
    img.onerror=()=>reject();
    img.src=url;
  });
}

async function ensureImages(){
  if(!bgImg) bgImg=await loadImage(BG_URL);
  crestImg=await loadImage(DIV_BADGE[divisionSel.value]);
}

function buildMatchdayOptions(){
  matchdaySel.innerHTML="";
  const na=document.createElement("option");
  na.value="N/A";
  na.textContent="N/A";
  matchdaySel.appendChild(na);

  for(let i=1;i<=46;i++){
    const o=document.createElement("option");
    o.value=i;
    o.textContent=i;
    matchdaySel.appendChild(o);
  }
}

function getMatchdayText(){
  if(matchdaySel.value==="N/A") return "MATCHDAY";
  return "MATCHDAY "+matchdaySel.value;
}

function getCompetitionText(){
  const div=divisionSel.value;
  const status=statusSel.value;

  if(div==="National") return `NATIONAL LEAGUE ${status.toUpperCase()}`;
  return `NATIONAL LEAGUE ${div.toUpperCase()} ${status.toUpperCase()}`;
}

async function render(){
  await ensureImages();

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(bgImg,0,0,canvas.width,canvas.height);

  ctx.textAlign="center";

  /* LINE 1 — MATCHDAY */
  ctx.fillStyle="#9e0000";
  ctx.font="800 84px carbona-variable, Arial Black, Arial";
  ctx.fillText(getMatchdayText(),750,200);

  /* LINE 2 — COMPETITION */
  ctx.fillStyle="#223b7c";
  ctx.font="800 32px carbona-variable, Arial Black, Arial";
  ctx.fillText(getCompetitionText(),750,270);

  /* CREST */
  const scale=0.075;
  const w=crestImg.width*scale;
  const h=crestImg.height*scale;
  ctx.drawImage(crestImg,750-w/2,1258-h/2,w,h);
}

downloadBtn.onclick=async()=>{
  await render();
  const a=document.createElement("a");
  a.href=canvas.toDataURL("image/png");
  a.download="fixtures-results.png";
  a.click();
};

matchdaySel.onchange=render;
divisionSel.onchange=render;
statusSel.onchange=render;

buildMatchdayOptions();
render();
</script>

</body>
</html>
