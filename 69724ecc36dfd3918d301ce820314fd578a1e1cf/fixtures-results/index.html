<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fixtures/Results Graphic Tool v1.0</title>

<!-- Typekit (Carbona) -->
<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">

<style>
  :root{
    --border:#d0d7de;
    --bg:#f6f8fa;
    --fg:#24292f;
    --muted:#57606a;
    --brand:#9e0000;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family:"carbona-variable", system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    color:var(--fg);
    background:#fff;
    font-size:14px;
  }

  .page{
    width:100%;
    padding:22px 18px 28px;
  }

  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
  }

  h1{
    margin:0;
    font-size:22px;
    font-weight:800;
  }

  .meta{
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
  }

  .app{
    display:grid;
    grid-template-columns:minmax(520px, 900px) minmax(360px, 1fr);
    gap:18px;
    align-items:start;
  }

  @media (max-width: 980px){
    .app{ grid-template-columns:1fr; }
  }

  .previewWrap{
    position:sticky;
    top:16px;
    border:1px solid var(--border);
    border-radius:14px;
    background:var(--bg);
    padding:10px;
  }

  canvas{
    display:block;
    width:100%;
    height:auto;
    border-radius:10px;
  }

  .panel{
    display:flex;
    flex-direction:column;
    gap:12px;
    min-width:0;
  }

  .box{
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px;
    background:#fff;
  }

  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
  }

  label{
    display:flex;
    flex-direction:column;
    gap:6px;
    min-width:220px;
    flex:1 1 240px;
  }

  input[type="text"]{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:10px;
    font:inherit;
  }

  button{
    padding:10px 12px;
    border:1px solid var(--brand);
    border-radius:10px;
    background:var(--brand);
    color:#fff;
    font:inherit;
    cursor:pointer;
  }

  button:hover{ filter:brightness(.95); }

  .row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:flex-end;
  }

  .smallNote{
    margin-top:8px;
    color:var(--muted);
    font-size:12px;
    line-height:1.35;
  }

  footer{
    margin-top:2px;
    color:var(--muted);
    font-size:12px;
    display:flex;
    justify-content:space-between;
    gap:10px;
  }
</style>
</head>

<body>
<div class="page">

  <header>
    <h1>Fixtures/Results Graphic Tool</h1>
    <div class="meta">v1.0 • 1347×1347</div>
  </header>

  <div class="app">

    <div class="previewWrap">
      <canvas id="preview" width="1347" height="1347"></canvas>
    </div>

    <div class="panel">

      <div class="box">
        <div class="row">
          <label>
            Line 1 (84pt, #9e0000, ALL CAPS)
            <input id="line1" type="text" placeholder="ENTER TEXT..." autocomplete="off" />
          </label>

          <label>
            Line 2 (32pt, #223b7c, ALL CAPS)
            <input id="line2" type="text" placeholder="ENTER TEXT..." autocomplete="off" />
          </label>
        </div>

        <div class="controls" style="margin-top:10px;">
          <button type="button" id="download">Download PNG</button>
          <button type="button" id="reset">Reset</button>
        </div>

        <div class="smallNote">
          Background file expected at: <strong>Fixtures background 1x1.png</strong> (same folder as this HTML).<br>
          Text positions are fixed to your spec: (750,200) and (750,210), centred.
        </div>
      </div>

      <footer>
        <span id="status">Ready</span>
        <span>Tip: it live-updates as you type.</span>
      </footer>

    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  /* ================= CONFIG (v1.0) ================= */

  const VERSION = "v1.0";
  const EXPORT_W = 1347;
  const EXPORT_H = 1347;

  const BG_SRC = "Fixtures background 1x1.png";

  // Line 1 spec
  const L1_X = 750;
  const L1_Y = 200;
  const L1_SIZE_PT = 84;
  const L1_COLOR = "#9e0000";

  // Line 2 spec
  const L2_X = 750;
  const L2_Y = 270;
  const L2_SIZE_PT = 32;
  const L2_COLOR = "#223b7c";

  // Carbona ExtraBold-ish stack (Typekit provides Carbona; we use heavy weight)
  const FONT_STACK = `"carbona-variable","carbona",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif`;

  /* ================= ELEMENTS ================= */

  const canvas = document.getElementById("preview");
  const ctx = canvas.getContext("2d");

  const line1El = document.getElementById("line1");
  const line2El = document.getElementById("line2");
  const downloadBtn = document.getElementById("download");
  const resetBtn = document.getElementById("reset");
  const statusEl = document.getElementById("status");

  /* ================= HELPERS ================= */

  function setStatus(msg){
    statusEl.textContent = msg;
    window.clearTimeout(setStatus._t);
    setStatus._t = window.setTimeout(()=> statusEl.textContent = "Ready", 900);
  }

  function safeAllCaps(s){
    return (s || "")
      .replace(/\s+/g, " ")
      .trim()
      .toUpperCase();
  }

  function loadImage(src){
    return new Promise((resolve, reject)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = ()=> resolve(img);
      img.onerror = ()=> reject(new Error("Failed to load: " + src));
      img.src = src;
    });
  }

  function setTextStyle(c, ptSize, color){
    // Canvas uses px, but we’ll treat "pt" as "px" for visual parity.
    // (If you want strict pt->px conversion, tell me and I’ll apply 96/72 scaling.)
    c.font = `800 ${ptSize}px ${FONT_STACK}`;
    c.fillStyle = color;
    c.textAlign = "center";
    c.textBaseline = "middle";
  }

  function drawText(c, text, x, y, ptSize, color){
    const t = safeAllCaps(text);
    if(!t) return;
    setTextStyle(c, ptSize, color);
    c.fillText(t, x, y);
  }

  /* ================= RENDER ================= */

  let bgImg = null;

  async function ensureBg(){
    if(!bgImg) bgImg = await loadImage(BG_SRC);
  }

  async function render(){
    try{
      await ensureBg();
    }catch(e){
      console.error(e);
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,EXPORT_W,EXPORT_H);
      setStatus("Background missing/blocked");
      return;
    }

    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,EXPORT_W,EXPORT_H);

    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(bgImg, 0, 0, EXPORT_W, EXPORT_H);

    // Lines
    drawText(ctx, line1El.value, L1_X, L1_Y, L1_SIZE_PT, L1_COLOR);
    drawText(ctx, line2El.value, L2_X, L2_Y, L2_SIZE_PT, L2_COLOR);
  }

  let renderQueued = false;
  function scheduleRender(){
    if(renderQueued) return;
    renderQueued = true;
    requestAnimationFrame(async ()=>{
      renderQueued = false;
      await render();
    });
  }

  /* ================= DOWNLOAD ================= */

  function buildFilename(){
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const dd = String(d.getDate()).padStart(2,"0");
    return `Fixtures-Results-${yyyy}${mm}${dd}.png`;
  }

  async function downloadPNG(){
    // Ensure latest render
    await render();

    const out = document.createElement("canvas");
    out.width = EXPORT_W;
    out.height = EXPORT_H;

    const octx = out.getContext("2d");
    octx.imageSmoothingEnabled = true;
    octx.imageSmoothingQuality = "high";

    // Redraw from source to guarantee export is pristine
    if(!bgImg){
      setStatus("Export failed");
      return;
    }
    octx.drawImage(bgImg, 0, 0, EXPORT_W, EXPORT_H);
    drawText(octx, line1El.value, L1_X, L1_Y, L1_SIZE_PT, L1_COLOR);
    drawText(octx, line2El.value, L2_X, L2_Y, L2_SIZE_PT, L2_COLOR);

    const blob = await new Promise(res => out.toBlob(res, "image/png"));
    if(!blob){
      setStatus("Export failed");
      return;
    }

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = buildFilename();
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);

    setStatus("Downloaded");
  }

  /* ================= RESET ================= */

  function resetAll(){
    line1El.value = "";
    line2El.value = "";
    scheduleRender();
    setStatus("Reset");
  }

  /* ================= INIT ================= */

  function bindUI(){
    line1El.addEventListener("input", scheduleRender);
    line2El.addEventListener("input", scheduleRender);

    downloadBtn.addEventListener("click", downloadPNG);
    resetBtn.addEventListener("click", resetAll);
  }

  async function start(){
    bindUI();
    // Wait a tick for fonts to start loading, then render
    scheduleRender();
    setStatus("Loaded");
  }

  start();

})();
</script>

</body>
</html>
