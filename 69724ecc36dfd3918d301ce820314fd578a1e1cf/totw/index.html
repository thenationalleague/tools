<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team of the Week Builder</title>

<link rel="preconnect" href="https://use.typekit.net" crossorigin>
<link rel="preconnect" href="https://p.typekit.net" crossorigin>
<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">

<style>
:root{
  --border:#d0d7de;
  --bg:#f6f8fa;
  --fg:#24292f;
  --muted:#57606a;
  --brand:#9e0000;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:"carbona-variable", system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  /* (removed invalid @font-face block; player names use Adobe Fonts family via canvas) */
  font-size:14px;
  color:var(--fg);
  background:#fff;
}

/* ===== PAGE WRAP ===== */
.page{
  width:100%;
  padding:24px 18px 28px;
}

/* ===== HEADER ===== */
.app-header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:22px;
}

.app-header img{
  height:48px;
  width:auto;
  border:none;
  border-radius:0;
}

.app-header h1{
  margin:0;
  font-size:24px;
  font-weight:800;
}

/* ===== APP LAYOUT ===== */
.app{
  display:grid;
  grid-template-columns:minmax(520px, 900px) minmax(360px, 1fr);
  gap:20px;
  align-items:start;
}

@media (max-width: 980px){
  .app{ grid-template-columns:1fr; }
}

/* ===== PREVIEW ===== */
.previewWrap{
  position:sticky;
  top:16px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--bg);
  padding:10px;
}

canvas{
  display:block;
  width:100%;
  height:auto;
}

/* ===== PANEL ===== */
.panel{
  display:flex;
  flex-direction:column;
  gap:14px;
  min-width:0;
}

.box{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  background:#fff;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.controls select,
.controls input{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font:inherit;
}

.controls button,
.box button{
  padding:8px 10px;
  border:1px solid var(--brand);
  border-radius:10px;
  background:var(--brand);
  color:#fff;
  font:inherit;
  cursor:pointer;
}

.controls button:hover,
.box button:hover{ filter:brightness(.95); }

/* ===== LINEUP ===== */
.lineup{
  display:grid;
  grid-template-columns:64px 240px minmax(160px,1fr) minmax(280px,2fr);
  gap:6px;
  align-items:center;
}

.lineup .pos{
  font-weight:700;
  color:var(--muted);
  text-align:center;
}

.lineup input,
.lineup select{
  width:100%;
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  font:inherit;
}

.lineup input.perf{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

@media (max-width:720px){
  .lineup{ grid-template-columns:64px 1fr; }
}

/* ===== TEXTAREAS ===== */
.section{
  display:flex;
  flex-direction:column;
  gap:6px;
}

textarea{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:12px;
  font:inherit;
  resize:vertical;
}

footer{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

   const TEAMS = TEAM_NAMES.map((name) => ({

  const offsetsByFormation = {};

  function formatDMMMyy(dateStr){
    if(!dateStr) return "";
    const [y,m,d] = dateStr.split("-").map(Number);
    if(!y || !m || !d) return "";
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const dd = String(d);
    const mon = months[m-1] || "";
    const yy = String(y).slice(-2);
    return `${dd}${mon}${yy}`;
  }

  function formatDDMMYYYY(dateStr){
    if(!dateStr) return "";
    const [y,m,d] = dateStr.split("-").map(Number);
    if(!y || !m || !d) return "";
    const dd = String(d).padStart(2, "0");
    const mm = String(m).padStart(2, "0");
    const yyyy = String(y);
    return `${dd}/${mm}/${yyyy}`;

  function setOffset(formation, posKey, dx, dy){
    if(!offsetsByFormation[formation]) offsetsByFormation[formation] = {};
    offsetsByFormation[formation][posKey] = {dx,dy};
  }

  function resetOffsetsForFormation(formation){
    offsetsByFormation[formation] = {};
  }

  function screenToCanvas(e){
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: cx * scaleX, y: cy * scaleY };
  }

  function canvasToWorld(pt){
    return {
      x: (pt.x - viewPanX) / viewScale,
      y: (pt.y - viewPanY) / viewScale
    };
  }

  function worldToCanvas(pt){
    return {
      x: pt.x * viewScale + viewPanX,
      y: pt.y * viewScale + viewPanY
    };
  }

  function pinchDistance(t0,t1){
    const dx = t0.clientX - t1.clientX;
    const dy = t0.clientY - t1.clientY;
    return Math.hypot(dx,dy);
  }

  function loadImage(url){
    if(imgCache.has(url)) return imgCache.get(url);
    const p = new Promise((resolve,reject)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = ()=> resolve(img);
      img.onerror = ()=> reject(new Error("Failed to load: " + url));
      img.src = url;
    });
    imgCache.set(url, p);
    return p;
  }

      if(document.fonts && document.fonts.load){
        const specs = NAME_FONT_CANDIDATES.map(f => `400 ${NAME_FONT_SIZE}px "${f}"`);
        await Promise.all(specs.map(spec => document.fonts.load(spec).catch(()=>[])));
        if(document.fonts.ready) await document.fonts.ready;
      }

      // Pick the first candidate that is actually present.
      // Use BOTH: document.fonts.check (availability) + canvas width-difference (real rendering).
      let picked = "";
      for(const fam of NAME_FONT_CANDIDATES){
        const ok = (document.fonts && document.fonts.check)
          ? document.fonts.check(`400 ${NAME_FONT_SIZE}px "${fam}"`, "DINWARMUP")
          : true;

        const stack = `"${fam}",${NAME_FONT_FALLBACK_STACK}`;
        const canvasOk = isFontActiveForCanvas(stack);

        if(ok && canvasOk){
          picked = fam;
          break;
        }
      }

      nameFontFamily = picked; // can remain "" if nothing matches
      applyWarmupFont();

      // Give browsers a tick after applying the warmup stack (helps stubborn cases)
      await new Promise(r => requestAnimationFrame(r));
      await new Promise(r => setTimeout(r, 50));

    }catch{
      nameFontFamily = "";
      applyWarmupFont();
    }
  }

  function drawContainedImage(c, img, centerX, centerY, maxW, maxH){
    const iw = img.naturalWidth || img.width;
    const ih = img.naturalHeight || img.height;
    if(!iw || !ih) return;

    const s = Math.min(maxW / iw, maxH / ih);
    const dw = iw * s;
    const dh = ih * s;
    const x = centerX - dw/2;
    const y = centerY - dh/2;

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(img, x, y, dw, dh);
  }

  function drawName(c, text, centerX, crestCenterY){
    const name = (text || "").trim();
    if(!name) return;

    c.font = `${NAME_FONT_WEIGHT} ${NAME_FONT_SIZE}px ${getNameFontStack()}`;
    c.fillStyle = NAME_COLOR;
    c.textAlign = "center";
    c.textBaseline = "middle";

    c.fillText(name, centerX, crestCenterY + NAME_OFFSET);
  }

  function safeText(s){ return (s || "").replace(/\s+/g," ").trim(); }

  function refreshFontStatus(){
    if(!fontStatusEl) return;
    const active = isFontActiveForCanvas(getNameFontStack());
    fontStatusEl.textContent = "Font: " + (nameFontFamily ? nameFontFamily : "UNKNOWN") + " • " + (active ? "ACTIVE" : "FALLBACK");
  }

  /* ================= RENDER ================= */
    function clampViewport(){

    // Keep the transformed 1080x1080 world covering the 1080x1080 preview.
    // When zoomed in (scale > 1), pan is limited to [min..max] so no empty space shows.
    const scaled = EXPORT_SIZE * viewScale;

    const minPanX = EXPORT_SIZE - scaled; // negative when scale > 1
    const maxPanX = 0;

    const minPanY = EXPORT_SIZE - scaled;
    const maxPanY = 0;

    viewPanX = clamp(viewPanX, minPanX, maxPanX);
    viewPanY = clamp(viewPanY, minPanY, maxPanY);
  }

  function clampPlayerOffset(formation, posKey, dx, dy){
    // Keep crest centre inside the export canvas (prevents dragging players off the graphic)
    const slots = getFormationPositions(formation);
    const base = slots.find(s => s.pos === posKey);
    if(!base) return { dx, dy };

    const half = CREST_MAX / 2;

    const x = base.x + dx;
    const y = base.y + dy;

    const clampedX = clamp(x, half, EXPORT_SIZE - half);
    const clampedY = clamp(y, half, EXPORT_SIZE - half);

    return { dx: clampedX - base.x, dy: clampedY - base.y };
  }

  let bgImg = null;
  let divBadgeImg = null;

  async function ensureBaseImages(){
    if(!bgImg) bgImg = await loadImage(BG_URL);
    const divUrl = DIV_BADGE[divisionSel.value] || DIV_BADGE.National;
    divBadgeImg = await loadImage(divUrl);
  }

  async function renderTo(c, useViewport){
    await ensureBaseImages();
    
    c.setTransform(1,0,0,1,0,0);
    c.clearRect(0,0,EXPORT_SIZE,EXPORT_SIZE);

    if(useViewport){
      c.setTransform(viewScale,0,0,viewScale,viewPanX,viewPanY);
    }else{
      c.setTransform(1,0,0,1,0,0);
    }

    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    c.drawImage(bgImg, 0, 0, EXPORT_SIZE, EXPORT_SIZE);

    const formation = formationSel.value;
    const slots = getFormationPositions(formation);

    for(const slot of slots){
      const posKey = slot.pos;
      const s = stateByPos[posKey] || {};
      const team = s.team || TEAMS[0].name;
      const crestUrl = getTeamCrestUrl(team);

      let crestImg = null;
      try{ crestImg = await loadImage(crestUrl); }catch{ crestImg = null; }

      const off = getOffset(formation, posKey);
      const x = slot.x + (off.dx || 0);
      const y = slot.y + (off.dy || 0);

      if(crestImg){
        drawContainedImage(c, crestImg, x, y, CREST_MAX, CREST_MAX);
      }

      drawName(c, s.name, x, y);
    }

    if(divBadgeImg){
      const iw = divBadgeImg.naturalWidth || divBadgeImg.width;
      const ih = divBadgeImg.naturalHeight || divBadgeImg.height;
      const dw = iw * DIV_BADGE_POS.scale;
      const dh = ih * DIV_BADGE_POS.scale;
      const bx = DIV_BADGE_POS.x - dw/2;
      const by = DIV_BADGE_POS.y - dh/2;
      c.drawImage(divBadgeImg, bx, by, dw, dh);
    }

    refreshFontStatus();
  }

  // Live-build the two output textareas as you type (debounced)
  let outputsQueued = false;
  function scheduleOutputs(){
    if(outputsQueued) return;
    outputsQueued = true;

    window.clearTimeout(scheduleOutputs._t);
    scheduleOutputs._t = window.setTimeout(()=>{
      outputsQueued = false;
      buildExportText({ silent:true });
      buildExcelTSV({ silent:true });
    }, 120);
  }

  let renderQueued = false;
  function scheduleRender(){
    if(renderQueued) return;
    renderQueued = true;

    requestAnimationFrame(async ()=>{
      renderQueued = false;
      try{
        await renderTo(ctx, true);
      }catch(e){
        console.error(e);
        setStatus("Render error (check image CORS)");
      }
    });
  }

  /* ================= LINEUP UI + TAB ORDER ================= */

  function rebuildLineup(){
    lineupEl.innerHTML = "";

    const teamEls = [];
    const nameEls = [];
    const perfEls = [];

    const formation = formationSel.value;
    const slots = getFormationPositions(formation);

    for(const slot of slots){
      const posKey = slot.pos;
      const saved = stateByPos[posKey] || { team: TEAMS[0].name, name:"", perf:"" };

      const posCell = document.createElement("div");
      posCell.className = "pos";
      posCell.textContent = posKey;

      const teamSel = buildTeamSelect(saved.team);

      const nameInp = document.createElement("input");
      nameInp.type = "text";
      nameInp.placeholder = "Insert player name";
      nameInp.value = saved.name || "";

      const perfInp = document.createElement("input");
      perfInp.type = "text";
      perfInp.className = "perf";
      perfInp.placeholder = "Insert performance details";
      perfInp.value = saved.perf || "";

      teamSel.addEventListener("input", ()=>{
        stateByPos[posKey] = stateByPos[posKey] || {};
        stateByPos[posKey].team = teamSel.value;
        autosave();
        scheduleRender();
        scheduleOutputs();
      });

      nameInp.addEventListener("input", ()=>{
        stateByPos[posKey] = stateByPos[posKey] || {};
        stateByPos[posKey].name = nameInp.value;
        autosave();
        scheduleRender();
        scheduleOutputs();
      });

      perfInp.addEventListener("input", ()=>{
        stateByPos[posKey] = stateByPos[posKey] || {};
        stateByPos[posKey].perf = perfInp.value;
        autosave();
        scheduleOutputs();
      });

      lineupEl.appendChild(posCell);
      lineupEl.appendChild(teamSel);
      lineupEl.appendChild(nameInp);
      lineupEl.appendChild(perfInp);

      teamEls.push(teamSel);
      nameEls.push(nameInp);
      perfEls.push(perfInp);
    }

    // Tab order: teams (down) → names (down) → performance (down)
    lineupTabOrder = [...teamEls, ...nameEls, ...perfEls];
    lineupTabIndexMap = new Map();
    lineupTabOrder.forEach((el, idx)=> lineupTabIndexMap.set(el, idx));
  }

  /* ================= EXPORT TEXT ================= */

  function buildExportText(opts){
    const silent = !!(opts && opts.silent);
    const scores = (scoresEl.value || "").trim();
    const formation = formationSel.value;
    const slots = getFormationPositions(formation);

    const lines = [];
    if(scores) lines.push(scores, "");

    for(const slot of slots){
      const posKey = slot.pos;
      const s = stateByPos[posKey] || {};
      const team = safeText(s.team);
      const name = safeText(s.name);
      const perf = safeText(s.perf);

      const line = [posKey, team, name, perf].filter(Boolean).join(" ");
      if(line) lines.push(line);
    }

    exportOutEl.value = lines.join("\n");
    if(!silent) setStatus("Export built");
    autosave();
  }

  async function copyExportText(){
    try{
      await navigator.clipboard.writeText(exportOutEl.value || "");
      setStatus("Copied");
    }catch{
      setStatus("Clipboard blocked");
    }
  }
    function buildExcelTSV(opts){
    const silent = !!(opts && opts.silent);
    const formation = formationSel.value;
    const slots = getFormationPositions(formation);

    const dateOut = formatDDMMYYYY(dateEl.value);

    const rows = [];
    for(const slot of slots){
      const s = stateByPos[slot.pos] || {};
      const player = safeText(s.name);
      const teamName = safeText(s.team);

      if(!player) continue;

      const short = getTeamShort(teamName) || "";
      rows.push([dateOut, player, short].join("\t"));
    }

    excelOutEl.value = rows.join("\n");
    autosave();
    if(!silent) setStatus("Excel built");
  }

  async function copyExcelTSV(){
    buildExcelTSV();
    try{
      await navigator.clipboard.writeText(excelOutEl.value || "");
      setStatus("Copied (Excel)");
    }catch{
      setStatus("Clipboard blocked");
    }
  }


  /* ================= DOWNLOAD ================= */

  async function downloadPNG(){
    const out = document.createElement("canvas");
    out.width = EXPORT_SIZE;
    out.height = EXPORT_SIZE;
    const outCtx = out.getContext("2d");

    try{
      await renderTo(outCtx, false);
    }catch(e){
      console.error(e);
      setStatus("Export error (check image CORS)");
      return;
    }

    const blob = await new Promise(res => out.toBlob(res, "image/png"));
    if(!blob){
      setStatus("Export failed");
      return;
    }

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = buildFilename();
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);

    setStatus("Downloaded");
  }

    function getStoredPayload(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return {};
      const d = JSON.parse(raw);
      return (d && typeof d === "object") ? d : {};
    }catch{
      return {};
    }
  }

  function setStoredPayload(obj){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
    }catch{}
  }

  function deepClone(obj){
    try{ return JSON.parse(JSON.stringify(obj)); }catch{ return {}; }
  }

  function getCurrentDivisionSnapshot(){
    return {
      formation: formationSel.value,
      date: dateEl.value,
      scores: scoresEl.value,
      exportOut: exportOutEl.value,
      excelOut: excelOutEl.value,
      stateByPos: deepClone(stateByPos),
      offsetsByFormation: deepClone(offsetsByFormation),
      viewport: { viewScale, viewPanX, viewPanY }
    };
  }

  function applyDivisionSnapshot(snap){
    const s = (snap && typeof snap === "object") ? snap : {};

    // Formation + basic fields
    if(s.formation && FORMATIONS[s.formation]) formationSel.value = s.formation;

    if(typeof s.date === "string") dateEl.value = s.date;
    if(typeof s.scores === "string") scoresEl.value = s.scores;
    if(typeof s.exportOut === "string") exportOutEl.value = s.exportOut;
    if(typeof s.excelOut === "string") excelOutEl.value = s.excelOut;

    // Clear + replace objects in-place
    for(const k of Object.keys(stateByPos)) delete stateByPos[k];
    if(s.stateByPos && typeof s.stateByPos === "object"){
      for(const k of Object.keys(s.stateByPos)){
        stateByPos[k] = s.stateByPos[k];
      }
    }

    for(const f of Object.keys(offsetsByFormation)) delete offsetsByFormation[f];
    if(s.offsetsByFormation && typeof s.offsetsByFormation === "object"){
      for(const f of Object.keys(s.offsetsByFormation)){
        offsetsByFormation[f] = s.offsetsByFormation[f];
      }
    }

    // Viewport
    if(s.viewport && typeof s.viewport === "object"){
      if(typeof s.viewport.viewScale === "number") viewScale = clamp(s.viewport.viewScale, 1.0, 4.0);
      if(typeof s.viewport.viewPanX === "number") viewPanX = s.viewport.viewPanX;
      if(typeof s.viewport.viewPanY === "number") viewPanY = s.viewport.viewPanY;
    }else{
      viewScale = 1;
      viewPanX = 0;
      viewPanY = 0;
    }

    clampViewport();
  }

  function saveDivisionSnapshot(div){
    const payload = getStoredPayload();
    payload.v = VERSION;
    payload.lastDivision = div;

    payload.byDivision = (payload.byDivision && typeof payload.byDivision === "object") ? payload.byDivision : {};
    payload.byDivision[div] = getCurrentDivisionSnapshot();

    setStoredPayload(payload);
  }

  function loadDivisionSnapshotOrBlank(div){
    const payload = getStoredPayload();
    const by = (payload.byDivision && typeof payload.byDivision === "object") ? payload.byDivision : {};
    const snap = by[div];

    if(snap && typeof snap === "object"){
      applyDivisionSnapshot(snap);
      return;
    }

    // Blank defaults for a division with no saved state yet
    formationSel.value = "4-3-3";
    scoresEl.value = "";
    exportOutEl.value = "";
    excelOutEl.value = "";

    for(const k of Object.keys(stateByPos)) delete stateByPos[k];
    for(const f of Object.keys(offsetsByFormation)) delete offsetsByFormation[f];

    viewScale = 1;
    viewPanX = 0;
    viewPanY = 0;

    clampViewport();
  }
  
  /* ================= AUTOSAVE ================= */

  function autosave(){
    // Always save into the currently selected division bucket
    saveDivisionSnapshot(divisionSel.value);
  }
  
  function autoload(){
    try{
      const d = getStoredPayload();
      if(!d || typeof d !== "object") return;

      // Restore last-used division if present
      const lastDiv = (typeof d.lastDivision === "string" && DIV_BADGE[d.lastDivision]) ? d.lastDivision : "";
      if(lastDiv) divisionSel.value = lastDiv;

      // Load the snapshot for the currently-selected division (or blank)
      loadDivisionSnapshotOrBlank(divisionSel.value);
    }catch{}
  }
  
  /* ================= INTERACTION ================= */

    function resetAll(){
    // Clear saved state
    try{ localStorage.removeItem(STORAGE_KEY); }catch{}

    // Reset top-level controls
    formationSel.value = "4-3-3";
    divisionSel.value = "National";

    // Reset date to today
    dateEl.value = "";
    setDefaultDateIfBlank();

    // Clear text areas
    scoresEl.value = "";
    exportOutEl.value = "";
    excelOutEl.value = "";

    // Clear lineup + manual offsets
    for(const k of Object.keys(stateByPos)) delete stateByPos[k];
    for(const f of Object.keys(offsetsByFormation)) delete offsetsByFormation[f];

    // Reset viewport
    viewScale = 1;
    viewPanX = 0;
    viewPanY = 0;

    // Division badge depends on division
    divBadgeImg = null;

    rebuildLineup();
    autosave();
    scheduleRender();
    scheduleOutputs();
    setStatus("Reset all");
  }

  function resetViewport(){
    viewScale = 1;
    viewPanX = 0;
    viewPanY = 0;
    clampViewport();
    autosave();
    scheduleRender();
  }

  function hitTestPlayer(worldPt){
    const formation = formationSel.value;
    const slots = getFormationPositions(formation);

    for(let i = slots.length - 1; i >= 0; i--){
      const slot = slots[i];
      const off = getOffset(formation, slot.pos);
      const cx = slot.x + (off.dx||0);
      const cy = slot.y + (off.dy||0);

      const half = CREST_MAX/2 + 6;
      if(worldPt.x >= cx - half && worldPt.x <= cx + half && worldPt.y >= cy - half && worldPt.y <= cy + half){
        return slot.pos;
      }
    }
    return null;
  }

  function onPointerDown(e){
    const pt = screenToCanvas(e);
    const world = canvasToWorld(pt);

    isDragging = true;
    dragStart = { x: world.x, y: world.y };
    dragStartPan = { x: viewPanX, y: viewPanY };

    if(manualMoveEl.checked){
      const hit = hitTestPlayer(world);
      if(hit){
        dragMode = "player";
        dragPosKey = hit;
        const off = getOffset(formationSel.value, hit);
        dragStartOffset = { dx: off.dx || 0, dy: off.dy || 0 };
      }else{
        dragMode = "pan";
        dragPosKey = null;
      }
    }else{
      dragMode = "pan";
      dragPosKey = null;
    }

    e.preventDefault();
  }

  function onPointerMove(e){
    if(!isDragging) return;
    const pt = screenToCanvas(e);
    const world = canvasToWorld(pt);

    const dx = world.x - dragStart.x;
    const dy = world.y - dragStart.y;

    if(dragMode === "pan"){
      viewPanX = dragStartPan.x + dx * viewScale;
      viewPanY = dragStartPan.y + dy * viewScale;
      clampViewport();
      autosave();
      scheduleRender();
    }else if(dragMode === "player" && dragPosKey){
      const formation = formationSel.value;
      const next = clampPlayerOffset(
        formation,
        dragPosKey,
        dragStartOffset.dx + dx,
        dragStartOffset.dy + dy
      );
      setOffset(formation, dragPosKey, next.dx, next.dy);
      autosave();
      scheduleRender();
    }

    e.preventDefault();
  }

  function onPointerUp(){
    isDragging = false;
    dragMode = "pan";
    dragPosKey = null;
  }

  function onWheel(e){
    e.preventDefault();

    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const cy = (e.clientY - rect.top) * (canvas.height / rect.height);

    const worldBefore = canvasToWorld({x:cx, y:cy});

    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    viewScale = clamp(viewScale * factor, 1.0, 4.0);
    
    const canvasAfter = worldToCanvas(worldBefore);
    viewPanX += (cx - canvasAfter.x);
    viewPanY += (cy - canvasAfter.y);

      clampViewport();
      autosave();
    scheduleRender();
  }

  function onTouchStart(e){
    if(e.touches && e.touches.length === 2){
      lastPinchDist = pinchDistance(e.touches[0], e.touches[1]);
    }else{
      onPointerDown(e);
    }
  }

  function onTouchMove(e){
    if(e.touches && e.touches.length === 2){
      e.preventDefault();

      const d = pinchDistance(e.touches[0], e.touches[1]);
      if(lastPinchDist){
        const rect = canvas.getBoundingClientRect();
        const midClientX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midClientY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

        const cx = (midClientX - rect.left) * (canvas.width / rect.width);
        const cy = (midClientY - rect.top) * (canvas.height / rect.height);

        const worldBefore = canvasToWorld({x:cx, y:cy});

        const factor = d / lastPinchDist;
        viewScale = clamp(viewScale * factor, 1.0, 4.0);
        const canvasAfter = worldToCanvas(worldBefore);
        viewPanX += (cx - canvasAfter.x);
        viewPanY += (cy - canvasAfter.y);

      clampViewport();
      autosave();
        scheduleRender();
      }
      lastPinchDist = d;
    }else{
      onPointerMove(e);
    }
  }

  function onTouchEnd(){
    lastPinchDist = 0;
    onPointerUp();
  }

  /* ================= INIT ================= */

  function setDefaultDateIfBlank(){
    if(dateEl.value) return;
    const now = new Date();
    const y = now.getFullYear();
    const m = pad2(now.getMonth()+1);
    const d = pad2(now.getDate());
    dateEl.value = `${y}-${m}-${d}`;
  }

  function bindUI(){
    formationSel.addEventListener("change", ()=>{
      rebuildLineup();
      autosave();
      scheduleRender();
      scheduleOutputs();
    });

    divisionSel.addEventListener("change", async ()=>{
      // Save what you were editing for the previous division
      const prev = divisionSel._prevDivision || "National";
      saveDivisionSnapshot(prev);

      // Load the newly-selected division snapshot (or blank)
      loadDivisionSnapshotOrBlank(divisionSel.value);

      // Badge depends on division
      divBadgeImg = null;

      // Track current for next switch
      divisionSel._prevDivision = divisionSel.value;

      rebuildLineup();
      autosave();
      scheduleRender();
      scheduleOutputs();
    });
    
    dateEl.addEventListener("input", ()=>{
      autosave();
      scheduleOutputs();
    });

    scoresEl.addEventListener("input", ()=>{
      autosave();
      scheduleOutputs();
    });

    zoomResetBtn.addEventListener("click", resetViewport);

    resetPositionsBtn.addEventListener("click", ()=>{
      resetOffsetsForFormation(formationSel.value);
      autosave();
      scheduleRender();
      setStatus("Positions reset");
    });

    downloadBtn.addEventListener("click", downloadPNG);
    copyExportBtn.addEventListener("click", copyExportText);
    copyExcelBtn.addEventListener("click", copyExcelTSV);
    resetAllBtn.addEventListener("click", resetAll);

    // Preview interactions
    canvas.addEventListener("wheel", onWheel, {passive:false});
    canvas.addEventListener("mousedown", onPointerDown);
    window.addEventListener("mousemove", onPointerMove);
    window.addEventListener("mouseup", onPointerUp);

    canvas.addEventListener("touchstart", onTouchStart, {passive:false});
    canvas.addEventListener("touchmove", onTouchMove, {passive:false});
    window.addEventListener("touchend", onTouchEnd, {passive:true});

    // Lineup: Tab goes down columns (team → name → performance)
    lineupEl.addEventListener("keydown", (e)=>{
      if(e.key !== "Tab") return;

      const active = document.activeElement;
      if(!lineupTabIndexMap.has(active)) return;

      e.preventDefault();

      const idx = lineupTabIndexMap.get(active);
      const dir = e.shiftKey ? -1 : 1;
      const nextIdx = idx + dir;

      if(nextIdx < 0 || nextIdx >= lineupTabOrder.length){
        if(!e.shiftKey){
          scoresEl.focus();
        }else{
          dateEl.focus();
        }
        return;
      }

      lineupTabOrder[nextIdx].focus();
    });
  }

  async function start(){
    setDefaultDateIfBlank();
    autoload();
    divisionSel._prevDivision = divisionSel.value;
    rebuildLineup();
    bindUI();
    scheduleOutputs();
    
    try{
      // Make sure the Adobe font is genuinely active before the very first canvas draw (mobile Safari fix)
      await ensureNameFontLoaded();

      await ensureBaseImages();

      // Prime canvas text engine AFTER we know which family we’re using
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      await new Promise(r => setTimeout(r, 120));

      ctx.save();
      ctx.font = `${NAME_FONT_WEIGHT} ${NAME_FONT_SIZE}px ${getNameFontStack()}`;
      ctx.measureText("DIN-WARMUP");
      ctx.restore();

      refreshFontStatus();

      await renderTo(ctx, true);
      await renderTo(ctx, true);

      setStatus("Loaded");
    }catch(e){
      console.error(e);
      setStatus("Image load error (CORS?)");
    }
  }

  start();

})();
</script>
