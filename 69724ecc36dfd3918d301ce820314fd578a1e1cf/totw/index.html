<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Team of the Week Builder</title>

<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">

<style>
:root{
  --border:#d0d7de;
  --bg:#f6f8fa;
  --fg:#24292f;
  --muted:#57606a;
  --brand:#9e0000;
}

*{ box-sizing:border-box; }

body{
  margin:16px;
  font-family:"carbona-variable", sans-serif;
  font-weight:400;
  color:var(--fg);
  background:#fff;
}

/* ===== HEADER ===== */

.appHeader{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.appHeader img{
  height:44px;
  width:auto;
  border:none;
  border-radius:0;
}

.appHeader h1{
  font-size:22px;
  font-weight:800;
  margin:0;
}

/* ===== APP LAYOUT ===== */

.app{
  display:grid;
  grid-template-columns: minmax(480px, 920px) minmax(380px, 1fr);
  gap:16px;
  align-items:start;
}

.previewWrap{ grid-column:1; grid-row:1; }
.panel{ grid-column:2; grid-row:1; }

@media (max-width: 980px){
  .app{ grid-template-columns: 1fr; }
  .previewWrap{ grid-column:1; grid-row:1; }
  .panel{ grid-column:1; grid-row:2; }
}

/* ===== PREVIEW ===== */

.previewWrap{
  position:sticky;
  top:12px;
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--bg);
  overflow:hidden;
}

canvas{
  display:block;
  width:100%;
  height:auto;
  touch-action:none;
}

/* ===== PANEL ===== */

.panel{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-width:0;
}

.box{
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  background:#fff;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.controls select,
.controls input{
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#fff;
  font-family:inherit;
}

.controls button,
.box button{
  padding:8px 10px;
  border:1px solid var(--brand);
  border-radius:10px;
  background:var(--brand);
  color:#fff;
  font-family:inherit;
  font-weight:500;
  cursor:pointer;
}

.controls button:hover,
.box button:hover{ filter:brightness(0.95); }

/* ===== LINEUP ===== */

.lineup{
  display:grid;
  grid-template-columns: 64px 240px minmax(160px, 1fr) minmax(280px, 2fr);
  gap:6px;
  align-items:center;
}

.lineup .pos{
  font-weight:700;
  color:var(--muted);
  text-align:center;
}

.lineup input,
.lineup select{
  width:100%;
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:10px;
  font-family:inherit;
}

.lineup input.perf{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

@media (max-width: 720px){
  .lineup{ grid-template-columns: 64px 1fr; }
}

/* ===== TEXT ===== */

.section{
  display:flex;
  flex-direction:column;
  gap:6px;
}

textarea{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:12px;
  font-family:inherit;
  resize:vertical;
}

footer{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<header class="appHeader">
  <img src="https://images.gc.nationalleagueservices.co.uk/fit-in/170x170/c64a92f0-2748-11f0-956a-2f0bc148c6f8.png" alt="National League logo">
  <h1>Team of the Week Builder</h1>
</header>
