<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Article Composer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">

<style>
:root { --border:#d0d7de; --bg:#f6f8fa; --fg:#24292f; --accent:#0969da; --ok:#1a7f37; --warn:#b54708; --toast:#111827; --toastfg:#f9fafb; }

* { box-sizing:border-box; }

body {
  margin:24px;
  font-family:"carbona-variable", sans-serif;
  font-weight:400;
  color:var(--fg);
  line-height:1.5;
}

.app-header {
  display:flex;
  align-items:center;
  gap:12px;
  margin:0 0 12px;
}

.app-header img {
  height:40px;
  width:auto;
  object-fit:contain;
  border:none;
  border-radius:0;
}

.app-header h1 {
  font-size:22px;
  font-weight:800;
  margin:0;
}

.toolbar { display:flex; flex-wrap:wrap; gap:8px; margin:0 0 10px; align-items:center; }

.toolbar button, .toolbar label, .toolbar select {
  padding:8px 10px;
  border:1px solid var(--border);
  background:#fff;
  border-radius:10px;
  cursor:pointer;
  font-family:inherit;
  font-weight:500;
}

.toolbar select { padding:8px; }

.toolbar .sep { width:1px; height:28px; background:var(--border); margin:0 4px; }

.wrap { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }

@media (max-width:800px){ .wrap { grid-template-columns:1fr; } }

.panel { display:flex; flex-direction:column; gap:8px; }

.panel h2 { margin:0; font-size:14px; color:#57606a; font-weight:600; }

.editor, pre {
  width:100%;
  height:54vh;
  border:1px solid var(--border);
  border-radius:12px;
  background:#fff;
}

.editor { padding:12px; overflow:auto; }

.editor:focus { outline:2px solid rgba(9,105,218,0.15); }

.editor:empty::before { content:attr(data-placeholder); color:#9aa1a9; }

pre {
  margin:0;
  padding:12px;
  background:var(--bg);
  overflow:auto;
  white-space:pre-wrap;
  word-break:break-word;
}

.below { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

.below button {
  padding:8px 10px;
  border:1px solid var(--border);
  background:#fff;
  border-radius:10px;
  cursor:pointer;
  font-family:inherit;
  font-weight:500;
}

footer {
  margin-top:10px;
  color:#57606a;
  font-size:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.status { font-size:12px; color:#57606a; }
.status.ok { color:var(--ok); }
.status.warn { color:var(--warn); }

.toast {
  position:fixed;
  left:50%;
  bottom:32px;
  transform:translateX(-50%);
  background:var(--toast);
  color:var(--toastfg);
  padding:10px 14px;
  border-radius:10px;
  box-shadow:0 6px 24px rgba(0,0,0,.18);
  opacity:0;
  pointer-events:none;
  transition:opacity .18s ease, transform .18s ease;
}

.toast.show { opacity:1; transform:translateX(-50%) translateY(-6px); }

.mobile-only { display:none; }

@media (max-width:800px){ .mobile-only { display:inline-flex; } }
</style>
</head>

<body>

<header class="app-header">
  <img src="https://images.gc.nationalleagueservices.co.uk/fit-in/170x170/c64a92f0-2748-11f0-956a-2f0bc148c6f8.png" alt="National League logo">
  <h1>Article Composer</h1>
</header>

<!-- EVERYTHING BELOW UNCHANGED FUNCTIONALLY -->

<div class="toolbar" aria-label="Formatting toolbar">
<select id="styleSelect">
<option value="p">Paragraph</option>
<option value="h1">Heading 1</option>
<option value="h2">Heading 2</option>
<option value="h3">Heading 3</option>
<option value="h4">Heading 4</option>
<option value="h5">Heading 5</option>
<option value="h6">Heading 6</option>
</select>
<span class="sep"></span>
<button type="button" data-cmd="bold">B</button>
<button type="button" data-cmd="italic">I</button>
<button type="button" data-cmd="underline">U</button>
<span class="sep"></span>
<button type="button" data-cmd="insertUnorderedList">• List</button>
<button type="button" data-cmd="insertOrderedList">1 List</button>
<span class="sep"></span>
<button type="button" id="undoBtn">Undo</button>
<button type="button" id="redoBtn">Redo</button>
<span class="sep"></span>
<button type="button" id="clearFmt">Clear formatting</button>
<button type="button" id="restart">Restart</button>
<button type="button" id="convertMobile" class="mobile-only">Convert</button>
</div>

<div class="wrap">
<div class="panel">
<h2>Editor</h2>
<div id="editor" class="editor" contenteditable="true" spellcheck="true" data-placeholder="Start typing or paste"></div>
<div class="below"><button id="copyText">Copy Text</button></div>
</div>

<div class="panel">
<h2>HTML (cleaned)</h2>
<pre id="out"></pre>
<div class="below"><button id="copyHtml">Copy HTML</button></div>
</div>
</div>

<footer>
<span class="status" id="status">Autosave: idle</span>
</footer>

<div id="toast" class="toast">Copied to clipboard</div>

<script>
/* YOUR ORIGINAL SCRIPT COMPLETELY UNCHANGED */
</script>

</body>
</html>
