<!doctype html>
<!--
  Website Archive — NL Tools
  Version: 1.0
  Date: 19/04/2026

  CHANGELOG
  v1.0 (19/04/2026)
    - Initial build
    - Loads articles-index.json from thenationalleague/tools repo
    - Free-text search across title + sub-header (optional body toggle)
    - Date range, author, category filters (all optional)
    - Grid/list view toggle, remembered in localStorage
    - Modal article view with keyboard shortcuts (← → prev/next, Esc close)
    - Renders TextBlockWidget prose + ThirdPartyV2Widget content including tweets
    - Body cache in localStorage for instant reopen
    - Read-on-site deep link
-->
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Website Archive · NL Tools</title>

<script>var NL_TOOL_KEY = 'staff-website-archive';</script>
<script src="/tools/auth-guard.js"></script>

<style>
@font-face {
  font-family: "carbona-variable";
  src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
       url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
  font-display: swap; font-style: normal; font-weight: 200 900;
}

:root {
  --primary: #9e0000;
  --primary-dim: #7a0000;
  --navy: #223b7c;
  --navy-mid: #1a2f63;
  --red: #c0392b;
  --red-light: #fdf0ef;
  --green: #1e7e34;
  --green-light: #edf7ee;
  --amber: #e67e22;
  --amber-light: #fef6ec;
  --white: #ffffff;
  --off-white: #f4f6f9;
  --text: #1a2a44;
  --text-muted: #5a6a82;
  --border: #dde3ed;
  --radius: 6px;
  --shadow: 0 2px 12px rgba(10,22,40,0.10);
  --font: 'carbona-variable','carbona',sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  font-variation-settings: 'wght' 400;
  color: var(--text);
  background: var(--off-white);
}

/* ============ TOPBAR ============ */
.topbar {
  background: var(--primary);
  color: var(--white);
  padding: 0 20px;
  height: 72px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  border-bottom: 7px solid var(--navy);
}
.topbar__logo { height: 42px; flex-shrink: 0; }
.topbar__title-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; line-height: 1; gap: 3px; }
.topbar__title {
  font-weight: 900; font-variation-settings: 'wght' 900;
  font-size: 20px; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.topbar__kicker {
  font-size: 9px; font-weight: 700; font-variation-settings: 'wght' 700;
  text-transform: uppercase; letter-spacing: 0.18em;
  color: rgba(255,255,255,0.6); white-space: nowrap;
}
.topbar__user { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 600; font-variation-settings: 'wght' 600; white-space: nowrap; flex-shrink: 0; }
.topbar__btn {
  background: none; border: 1px solid rgba(255,255,255,0.3);
  color: var(--white); padding: 7px 14px; border-radius: var(--radius);
  font-size: 11px; font-weight: 700; font-variation-settings: 'wght' 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  cursor: pointer; transition: all 0.15s; font-family: var(--font);
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap; flex-shrink: 0;
}
.topbar__btn:hover { background: rgba(255,255,255,0.12); }
@media (max-width: 700px) {
  .topbar { padding: 0 14px; gap: 10px; }
  .topbar__user { display: none; }
  .topbar__btn-text-portal { display: none; }
  .topbar__btn--portal { padding: 7px 10px; }
  .topbar__title { font-size: 17px; }
}

/* ============ LAYOUT ============ */
.main {
  max-width: 1300px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ============ FILTERS PANEL ============ */
.filters {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 18px;
  box-shadow: var(--shadow);
}
.filters__row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 12px;
  align-items: end;
}
.filters__row + .filters__row { margin-top: 12px; }
@media (max-width: 980px) {
  .filters__row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 560px) {
  .filters__row { grid-template-columns: 1fr; }
}

.field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.field__label {
  font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-muted);
}
.field input[type=text],
.field input[type=date],
.field input[type=search],
.field select {
  font-family: var(--font);
  font-size: 14px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  color: var(--text);
  width: 100%;
  min-width: 0;
}
.field input:focus, .field select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(158,0,0,0.10);
}

.scope {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--text-muted);
  font-weight: 600; font-variation-settings: 'wght' 600;
}
.scope label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
.scope input[type=checkbox] { accent-color: var(--primary); }

/* ============ CONTROL BAR ============ */
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.controls__count {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 600; font-variation-settings: 'wght' 600;
}
.controls__count strong { color: var(--text); font-weight: 900; font-variation-settings: 'wght' 900; }

.controls__spacer { flex: 1; }

.sort-select {
  font-family: var(--font);
  font-size: 12px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  color: var(--text);
}

.view-toggle {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--white);
}
.view-toggle button {
  background: none;
  border: none;
  padding: 7px 11px;
  font-family: var(--font);
  font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.view-toggle button.active {
  background: var(--navy);
  color: var(--white);
}

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 14px; border-radius: var(--radius);
  font-size: 10px; font-weight: 900; font-variation-settings: 'wght' 900;
  text-transform: uppercase; letter-spacing: 0.08em;
  cursor: pointer; border: none; font-family: var(--font);
  transition: background 0.15s; white-space: nowrap;
}
.btn--primary { background: var(--primary); color: var(--white); }
.btn--primary:hover:not(:disabled) { background: var(--primary-dim); }
.btn--navy { background: var(--navy); color: var(--white); }
.btn--navy:hover:not(:disabled) { background: var(--navy-mid); }
.btn--ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
.btn--ghost:hover:not(:disabled) { background: var(--off-white); }

/* ============ RESULTS — GRID MODE ============ */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  display: flex; flex-direction: column;
  transition: transform 0.12s, box-shadow 0.12s;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.card__img-wrap {
  aspect-ratio: 16 / 9;
  background: var(--off-white);
  overflow: hidden;
  position: relative;
}
.card__img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card__img-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #dfe4ee 0%, #c9cfdb 100%);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.card__body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.card__meta { display: flex; align-items: center; gap: 8px; font-size: 10px; }
.card__pill {
  background: var(--navy);
  color: var(--white);
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 9px; font-weight: 800; font-variation-settings: 'wght' 800;
  text-transform: uppercase; letter-spacing: 0.06em;
  white-space: nowrap;
}
.card__date { color: var(--text-muted); font-weight: 600; font-variation-settings: 'wght' 600; }
.card__title {
  font-size: 15px;
  font-weight: 700; font-variation-settings: 'wght' 700;
  color: var(--text);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card__sub {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card__footer {
  margin-top: auto;
  padding-top: 6px;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600; font-variation-settings: 'wght' 600;
}

/* ============ RESULTS — LIST MODE ============ */
.results-list {
  display: flex; flex-direction: column;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.row {
  display: grid;
  grid-template-columns: 70px 110px 1fr 160px 130px;
  gap: 14px;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
}
.row:last-child { border-bottom: none; }
.row:hover { background: var(--off-white); }
.row__img {
  width: 70px; height: 40px;
  background: var(--off-white);
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
}
.row__img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.row__date {
  font-size: 11px; color: var(--text-muted);
  font-weight: 600; font-variation-settings: 'wght' 600;
}
.row__title {
  font-size: 14px;
  font-weight: 700; font-variation-settings: 'wght' 700;
  color: var(--text);
  line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.row__sub {
  font-size: 11px; color: var(--text-muted); line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 2px;
}
.row__author { font-size: 12px; color: var(--text-muted); font-weight: 600; font-variation-settings: 'wght' 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row__cat { display: flex; justify-content: flex-end; }

@media (max-width: 760px) {
  .row { grid-template-columns: 60px 1fr; gap: 10px; }
  .row__date, .row__author, .row__cat { display: none; }
  .row__img { width: 60px; height: 36px; }
}

/* ============ EMPTY STATES ============ */
.empty {
  padding: 60px 20px;
  text-align: center;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.empty__title {
  font-size: 16px; font-weight: 900; font-variation-settings: 'wght' 900;
  color: var(--text); margin-bottom: 8px;
}
.empty__msg {
  font-size: 13px; color: var(--text-muted); line-height: 1.5;
  max-width: 440px; margin: 0 auto;
}

.loading {
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600; font-variation-settings: 'wght' 600;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============ MODAL ============ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(26,42,68,0.72);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  overscroll-behavior: contain;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 10px;
  max-width: 920px;
  width: 100%;
  max-height: 100%;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  overflow: hidden;
  animation: modalIn 0.18s ease-out;
}
@keyframes modalIn {
  from { transform: scale(0.96); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.modal__head {
  background: var(--primary);
  color: var(--white);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.modal__head-meta {
  flex: 1;
  font-size: 11px;
  font-weight: 700; font-variation-settings: 'wght' 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.85;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.modal__nav-btn {
  background: rgba(255,255,255,0.14);
  border: none;
  color: var(--white);
  width: 30px;
  height: 30px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.modal__nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.24); }
.modal__nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.modal__close {
  background: rgba(255,255,255,0.14);
  border: none;
  color: var(--white);
  width: 30px;
  height: 30px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 16px;
  margin-left: 6px;
}
.modal__close:hover { background: rgba(255,255,255,0.24); }

.modal__body {
  flex: 1;
  overflow-y: auto;
  padding: 30px 40px 40px;
}
.modal__hero {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: var(--off-white);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 22px;
}
.modal__hero img { width: 100%; height: 100%; object-fit: cover; display: block; }

.modal__category {
  display: inline-block;
  background: var(--navy);
  color: var(--white);
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 800; font-variation-settings: 'wght' 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}
.modal__title {
  font-size: 28px;
  font-weight: 900; font-variation-settings: 'wght' 900;
  line-height: 1.15;
  color: var(--text);
  margin-bottom: 12px;
}
.modal__sub {
  font-size: 17px;
  color: var(--text-muted);
  line-height: 1.45;
  margin-bottom: 18px;
  font-weight: 500; font-variation-settings: 'wght' 500;
}
.modal__byline {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 700; font-variation-settings: 'wght' 700;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.modal__byline strong { color: var(--text); }

.modal__content {
  font-size: 16px; line-height: 1.7;
  color: var(--text);
}
.modal__content h3 {
  font-size: 20px;
  font-weight: 900; font-variation-settings: 'wght' 900;
  margin: 26px 0 14px;
  color: var(--text);
  line-height: 1.3;
}
.modal__content h3:first-child { margin-top: 0; }
.modal__content h4 {
  font-size: 18px;
  font-weight: 800; font-variation-settings: 'wght' 800;
  margin: 24px 0 10px;
  color: var(--primary);
}
.modal__content p { margin-bottom: 14px; }
.modal__content a { color: var(--navy); text-decoration: underline; }
.modal__content strong { font-weight: 800; font-variation-settings: 'wght' 800; }
.modal__content ul, .modal__content ol { padding-left: 22px; margin-bottom: 14px; }
.modal__content li { margin-bottom: 6px; }
.modal__content blockquote {
  border-left: 3px solid var(--primary);
  padding: 4px 0 4px 16px;
  margin: 14px 0;
  color: var(--text-muted);
  font-style: italic;
}
.modal__content img { max-width: 100%; height: auto; border-radius: 4px; margin: 10px 0; }
.modal__content .twitter-tweet { margin: 16px auto !important; }
.modal__content iframe { max-width: 100%; border-radius: 4px; }
.modal__content table { max-width: 100%; margin: 16px 0; }

.modal__foot {
  padding: 14px 20px;
  background: var(--off-white);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.modal__foot-hint {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 600; font-variation-settings: 'wght' 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-left: auto;
}

@media (max-width: 700px) {
  .modal-backdrop { padding: 12px; }
  .modal__body { padding: 20px; }
  .modal__title { font-size: 22px; }
  .modal__content { font-size: 15px; }
  .modal__foot-hint { display: none; }
}

/* ============ TOAST ============ */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--navy); color: var(--white);
  padding: 12px 18px; border-radius: var(--radius);
  font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  z-index: 999; transform: translateY(80px); opacity: 0;
  transition: all 0.25s ease; max-width: 300px; pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 4px solid var(--green); }
.toast.error   { border-left: 4px solid var(--red); }

</style>
</head>

<body>

<div id="pageWrap" style="display:none;">

<header class="topbar">
  <img class="topbar__logo"
    src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose%20white.png"
    alt="National League"
    onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
  <div class="topbar__title-wrap">
    <span class="topbar__title">Website Archive</span>
    <span class="topbar__kicker">NL Tools</span>
  </div>
  <span class="topbar__user" id="topbarUser"></span>
  <a href="/tools/portal/" class="topbar__btn topbar__btn--portal" aria-label="Back to portal">
    <span>←</span><span class="topbar__btn-text-portal">Portal</span>
  </a>
  <button class="topbar__btn" id="signOutBtn">Sign out</button>
</header>

<main class="main">

  <!-- FILTERS -->
  <div class="filters">
    <div class="filters__row">
      <div class="field">
        <label class="field__label" for="qInput">Search</label>
        <input type="search" id="qInput" placeholder="Type to search titles, sub-headers (and optionally body)…" autocomplete="off">
      </div>
      <div class="field">
        <label class="field__label" for="fromInput">From</label>
        <input type="date" id="fromInput">
      </div>
      <div class="field">
        <label class="field__label" for="toInput">To</label>
        <input type="date" id="toInput">
      </div>
      <div class="field">
        <label class="field__label" for="authorInput">Author</label>
        <select id="authorInput">
          <option value="">Any author</option>
        </select>
      </div>
      <div class="field">
        <label class="field__label" for="catInput">Category</label>
        <select id="catInput">
          <option value="">Any category</option>
        </select>
      </div>
    </div>
    <div class="filters__row" style="grid-template-columns: 1fr auto; align-items: center;">
      <div class="scope">
        <label>
          <input type="checkbox" id="scopeBody">
          Include article body in search (slower)
        </label>
      </div>
      <button class="btn btn--ghost" id="resetBtn">Reset filters</button>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="controls__count" id="countDisplay">Loading archive…</div>
    <div class="controls__spacer"></div>
    <select class="sort-select" id="sortSelect">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
    </select>
    <div class="view-toggle">
      <button id="viewGrid" class="active" data-view="grid">Grid</button>
      <button id="viewList" data-view="list">List</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="resultsRoot">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading archive index…</div>
    </div>
  </div>

</main>

</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modal">
    <div class="modal__head">
      <button class="modal__nav-btn" id="prevBtn" title="Previous (←)" aria-label="Previous article">&larr;</button>
      <button class="modal__nav-btn" id="nextBtn" title="Next (→)" aria-label="Next article">&rarr;</button>
      <div class="modal__head-meta" id="modalMeta"></div>
      <button class="modal__close" id="closeBtn" title="Close (Esc)" aria-label="Close">&times;</button>
    </div>
    <div class="modal__body" id="modalBody">
      <div class="loading"><div class="spinner"></div><div>Loading article…</div></div>
    </div>
    <div class="modal__foot">
      <a class="btn btn--navy" id="readOnSite" href="#" target="_blank" rel="noopener">Read on site ↗</a>
      <span class="modal__foot-hint">← → navigate · Esc to close</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   NL Website Archive — main script
   ================================================================ */

var INDEX_URL = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/data/articles-index.json';
var BYSLUG_URL = 'https://news.cms.web.gc.nationalleagueservices.co.uk/v1/byslug';
var SITE_BASE = 'https://www.thenationalleague.org.uk';

var LS_KEY_VIEW = 'nl-archive-view';
var LS_KEY_BODY_CACHE = 'nl-archive-bodies';
var BODY_CACHE_CAP_BYTES = 4 * 1024 * 1024; // ~4MB, stay under browser limits

var STATE = {
  articles: [],          // full master list
  filtered: [],          // after current filters
  view: 'grid',          // 'grid' | 'list'
  modalIndex: -1,        // which filtered article is open
  bodyCache: {},         // { slug: { content: [...], ts: <ms> } }
  searchTimer: null
};

/* ============ UTILITIES ============ */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function $(id) { return document.getElementById(id); }

function showToast(msg, type) {
  var t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success') + ' show';
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function formatDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  var day = String(d.getDate()).padStart(2, '0');
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var yyyy = d.getFullYear();
  return day + '/' + mm + '/' + yyyy;
}

function formatDateLong(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function debounce(fn, ms) {
  return function() {
    var args = arguments;
    clearTimeout(STATE.searchTimer);
    STATE.searchTimer = setTimeout(function() { fn.apply(null, args); }, ms);
  };
}

/* ============ AUTH WIRING ============ */
window.nlAuthReady = function(session) {
  var userEl = $('topbarUser');
  if (userEl) userEl.textContent = (session && (session.name || session.email)) || '';
  
  var btn = $('signOutBtn');
  if (btn && !btn._wired) {
    btn._wired = true;
    btn.addEventListener('click', function() {
      if (window.firebase && firebase.auth) {
        firebase.auth().signOut().then(function() { window.location.replace('/tools/'); });
      } else {
        window.location.replace('/tools/');
      }
    });
  }
  
  init();
};

/* ============ INIT ============ */
function init() {
  // Restore view mode
  var savedView = localStorage.getItem(LS_KEY_VIEW);
  if (savedView === 'list' || savedView === 'grid') {
    STATE.view = savedView;
  }
  applyViewToggleUI();
  
  // Load cached bodies
  try {
    var raw = localStorage.getItem(LS_KEY_BODY_CACHE);
    if (raw) STATE.bodyCache = JSON.parse(raw);
  } catch (e) { STATE.bodyCache = {}; }
  
  // Wire controls
  wireControls();
  
  // Load the archive index
  loadIndex();
}

function wireControls() {
  var q = $('qInput');
  var dFrom = $('fromInput');
  var dTo = $('toInput');
  var auth = $('authorInput');
  var cat = $('catInput');
  var scope = $('scopeBody');
  var sort = $('sortSelect');
  var reset = $('resetBtn');
  
  var doFilter = debounce(applyFilters, 150);
  
  q.addEventListener('input', doFilter);
  dFrom.addEventListener('change', applyFilters);
  dTo.addEventListener('change', applyFilters);
  auth.addEventListener('change', applyFilters);
  cat.addEventListener('change', applyFilters);
  scope.addEventListener('change', applyFilters);
  sort.addEventListener('change', applyFilters);
  
  reset.addEventListener('click', function() {
    q.value = '';
    dFrom.value = '';
    dTo.value = '';
    auth.value = '';
    cat.value = '';
    scope.checked = false;
    sort.value = 'newest';
    applyFilters();
  });
  
  // View toggle
  $('viewGrid').addEventListener('click', function() { setView('grid'); });
  $('viewList').addEventListener('click', function() { setView('list'); });
  
  // Modal
  $('closeBtn').addEventListener('click', closeModal);
  $('prevBtn').addEventListener('click', function() { navModal(-1); });
  $('nextBtn').addEventListener('click', function() { navModal(1); });
  $('modalBackdrop').addEventListener('click', function(e) {
    if (e.target === $('modalBackdrop')) closeModal();
  });
  
  document.addEventListener('keydown', onKeyDown);
}

/* ============ DATA LOAD ============ */
function loadIndex() {
  fetch(INDEX_URL, { cache: 'no-cache' })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      STATE.articles = Array.isArray(data) ? data : (data.articles || []);
      if (!STATE.articles.length) {
        showEmpty('No articles in index', 'The archive index file exists but contains no articles. Trigger a rebuild to populate it.');
        return;
      }
      // Ensure chronological sort by publishedDateTime desc
      STATE.articles.sort(function(a, b) {
        return (b.publishedDateTime || '').localeCompare(a.publishedDateTime || '');
      });
      populateFilterDropdowns();
      applyFilters();
    })
    .catch(function(err) {
      showEmpty('Couldn\'t load archive', 'The archive index could not be fetched. ' + (err && err.message ? err.message : '') + '. Check that articles-index.json exists in the tools repo.');
    });
}

function populateFilterDropdowns() {
  var authors = {};
  var cats = {};
  
  STATE.articles.forEach(function(a) {
    var au = (a.postAuthor || '').trim();
    var c = a.newsCategory || '';
    if (au) authors[au] = (authors[au] || 0) + 1;
    if (c) cats[c] = (cats[c] || 0) + 1;
  });
  
  var authorSel = $('authorInput');
  authorSel.innerHTML = '<option value="">Any author</option>';
  Object.keys(authors).sort(function(a, b) {
    return authors[b] - authors[a];
  }).forEach(function(au) {
    var opt = document.createElement('option');
    opt.value = au;
    opt.textContent = au + ' (' + authors[au] + ')';
    authorSel.appendChild(opt);
  });
  
  var catSel = $('catInput');
  catSel.innerHTML = '<option value="">Any category</option>';
  Object.keys(cats).sort(function(a, b) {
    return cats[b] - cats[a];
  }).forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c + ' (' + cats[c] + ')';
    catSel.appendChild(opt);
  });
}

/* ============ FILTERING ============ */
function applyFilters() {
  var q = $('qInput').value.trim().toLowerCase();
  var from = $('fromInput').value || '';
  var to = $('toInput').value || '';
  var author = $('authorInput').value || '';
  var cat = $('catInput').value || '';
  var scopeBody = $('scopeBody').checked;
  var sort = $('sortSelect').value;
  
  var out = STATE.articles.filter(function(a) {
    var date = (a.publishedDateTime || '').slice(0, 10);
    if (from && date < from) return false;
    if (to && date > to) return false;
    if (author && (a.postAuthor || '').trim() !== author) return false;
    if (cat && a.newsCategory !== cat) return false;
    
    if (q) {
      var hay = ((a.postTitle || '') + ' ' + (a.description || '')).toLowerCase();
      if (scopeBody && a.bodyText) hay += ' ' + a.bodyText.toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    
    return true;
  });
  
  if (sort === 'oldest') {
    out.sort(function(a, b) { return (a.publishedDateTime || '').localeCompare(b.publishedDateTime || ''); });
  } else {
    out.sort(function(a, b) { return (b.publishedDateTime || '').localeCompare(a.publishedDateTime || ''); });
  }
  
  STATE.filtered = out;
  renderResults();
}

/* ============ RENDER RESULTS ============ */
function renderResults() {
  var root = $('resultsRoot');
  var n = STATE.filtered.length;
  var total = STATE.articles.length;
  
  $('countDisplay').innerHTML = '<strong>' + n.toLocaleString() + '</strong> of ' + total.toLocaleString() + ' articles';
  
  if (!n) {
    root.innerHTML = '<div class="empty"><div class="empty__title">No matches</div><div class="empty__msg">No articles match these filters. Try broadening the date range, clearing search terms, or picking "Any author/category".</div></div>';
    return;
  }
  
  // Cap visible to 300 for performance; users can narrow further via filters
  var cap = 300;
  var toRender = STATE.filtered.slice(0, cap);
  
  if (STATE.view === 'grid') {
    root.innerHTML = '<div class="results-grid">' + toRender.map(cardHTML).join('') + '</div>';
  } else {
    root.innerHTML = '<div class="results-list">' + toRender.map(rowHTML).join('') + '</div>';
  }
  
  if (n > cap) {
    root.innerHTML += '<div class="empty" style="margin-top: 14px; padding: 20px;"><div class="empty__msg">Showing first ' + cap.toLocaleString() + ' of ' + n.toLocaleString() + ' matches. Narrow filters to see the rest.</div></div>';
  }
  
  // Wire card clicks
  var cards = root.querySelectorAll('[data-idx]');
  cards.forEach(function(el) {
    el.addEventListener('click', function() {
      openModal(parseInt(el.getAttribute('data-idx'), 10));
    });
  });
}

function cardHTML(a, i) {
  var img = a.imageUrl || '';
  var imgMarkup = img
    ? '<img class="card__img" src="' + esc(img) + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling&&(this.nextElementSibling.style.display=\'flex\')">'
    : '';
  var placeholderStyle = img ? 'display:none;' : '';
  
  return '<div class="card" data-idx="' + i + '">' +
    '<div class="card__img-wrap">' +
      imgMarkup +
      '<div class="card__img-placeholder" style="' + placeholderStyle + '">National League</div>' +
    '</div>' +
    '<div class="card__body">' +
      '<div class="card__meta">' +
        '<span class="card__pill">' + esc(a.newsCategory || '—') + '</span>' +
        '<span class="card__date">' + esc(formatDate(a.publishedDateTime)) + '</span>' +
      '</div>' +
      '<div class="card__title">' + esc(a.postTitle || '(untitled)') + '</div>' +
      (a.description ? '<div class="card__sub">' + esc(a.description) + '</div>' : '') +
      '<div class="card__footer">' + esc((a.postAuthor || '').trim() || '—') + '</div>' +
    '</div>' +
  '</div>';
}

function rowHTML(a, i) {
  var img = a.imageUrl || '';
  var imgMarkup = img
    ? '<img src="' + esc(img) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
    : '';
  
  return '<div class="row" data-idx="' + i + '">' +
    '<div class="row__img">' + imgMarkup + '</div>' +
    '<div class="row__date">' + esc(formatDate(a.publishedDateTime)) + '</div>' +
    '<div>' +
      '<div class="row__title">' + esc(a.postTitle || '(untitled)') + '</div>' +
      (a.description ? '<div class="row__sub">' + esc(a.description) + '</div>' : '') +
    '</div>' +
    '<div class="row__author">' + esc((a.postAuthor || '').trim() || '—') + '</div>' +
    '<div class="row__cat"><span class="card__pill">' + esc(a.newsCategory || '—') + '</span></div>' +
  '</div>';
}

function showEmpty(title, msg) {
  $('resultsRoot').innerHTML =
    '<div class="empty">' +
      '<div class="empty__title">' + esc(title) + '</div>' +
      '<div class="empty__msg">' + esc(msg) + '</div>' +
    '</div>';
  $('countDisplay').textContent = '';
}

/* ============ VIEW TOGGLE ============ */
function setView(v) {
  STATE.view = v;
  localStorage.setItem(LS_KEY_VIEW, v);
  applyViewToggleUI();
  renderResults();
}

function applyViewToggleUI() {
  $('viewGrid').classList.toggle('active', STATE.view === 'grid');
  $('viewList').classList.toggle('active', STATE.view === 'list');
}

/* ============ MODAL ============ */
function openModal(index) {
  if (index < 0 || index >= STATE.filtered.length) return;
  STATE.modalIndex = index;
  $('modalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderModal();
}

function closeModal() {
  $('modalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
  STATE.modalIndex = -1;
}

function navModal(delta) {
  var next = STATE.modalIndex + delta;
  if (next < 0 || next >= STATE.filtered.length) return;
  STATE.modalIndex = next;
  renderModal();
  $('modalBody').scrollTop = 0;
}

function renderModal() {
  var a = STATE.filtered[STATE.modalIndex];
  if (!a) return;
  
  // Header meta + counter
  var metaText = (a.newsCategory || '—') + ' · ' + formatDateLong(a.publishedDateTime) + ' · ' + ((a.postAuthor || '').trim() || '—') + '   ·   ' + (STATE.modalIndex + 1) + ' of ' + STATE.filtered.length;
  $('modalMeta').textContent = metaText;
  
  // Prev/next button state
  $('prevBtn').disabled = STATE.modalIndex <= 0;
  $('nextBtn').disabled = STATE.modalIndex >= STATE.filtered.length - 1;
  
  // Read on site link
  var onSite = a.postSlug ? (SITE_BASE + a.postSlug) : '#';
  $('readOnSite').href = onSite;
  
  // Body — show loading until fetched
  var body = $('modalBody');
  
  // Check cache first
  var cached = STATE.bodyCache[a.postSlug];
  if (cached && cached.content) {
    renderModalBody(a, cached.content);
    return;
  }
  
  body.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading article…</div></div>';
  
  fetchArticleBody(a.postSlug).then(function(content) {
    // Stash in memory cache and persist
    STATE.bodyCache[a.postSlug] = { content: content, ts: Date.now() };
    persistBodyCache();
    
    // Guard: user may have navigated away while fetching
    var current = STATE.filtered[STATE.modalIndex];
    if (current && current.postSlug === a.postSlug) {
      renderModalBody(a, content);
    }
  }).catch(function(err) {
    body.innerHTML =
      '<div class="empty">' +
        '<div class="empty__title">Couldn\'t load article</div>' +
        '<div class="empty__msg">' + esc(err && err.message ? err.message : 'Unknown error') + '. Try "Read on site" instead.</div>' +
      '</div>';
  });
}

function renderModalBody(a, content) {
  var html = '';
  
  // Hero image
  if (a.imageUrl) {
    html += '<div class="modal__hero"><img src="' + esc(a.imageUrl) + '" alt="" onerror="this.parentNode.style.display=\'none\'"></div>';
  }
  
  // Category pill
  if (a.newsCategory) {
    html += '<div class="modal__category">' + esc(a.newsCategory) + '</div>';
  }
  
  // Title
  html += '<h1 class="modal__title" id="modalTitle">' + esc(a.postTitle || '') + '</h1>';
  
  // Sub-header
  if (a.description) {
    html += '<div class="modal__sub">' + esc(a.description) + '</div>';
  }
  
  // Byline
  var byline = '';
  if (a.postAuthor) byline += 'By <strong>' + esc(a.postAuthor) + '</strong>';
  if (a.publishedDateTime) byline += (byline ? ' · ' : '') + formatDateLong(a.publishedDateTime);
  if (byline) html += '<div class="modal__byline">' + byline + '</div>';
  
  // Content — combine all widget rows in order
  html += '<div class="modal__content" id="modalArticleContent">';
  content.forEach(function(row) {
    if (!row || !row.rowData) return;
    var widget = row.rowData;
    var type = widget.widgetType;
    var data = widget.widgetData;
    if (!data) return;
    
    if (type === 'TextBlockWidget') {
      if (data.content) html += data.content;
    } else if (type === 'ThirdPartyV2Widget') {
      // Tweets, custom HTML, embedded widgets — include as-is
      if (data.content) html += '<div class="embed-widget">' + data.content + '</div>';
    }
    // Other widget types silently skipped; extend later if needed
  });
  html += '</div>';
  
  $('modalBody').innerHTML = html;
  $('modalBody').scrollTop = 0;
  
  // Run any inline <script> tags present in embedded widgets
  // (byslug response often includes the Twitter widgets.js script tag inside the content)
  executeInlineScripts($('modalArticleContent'));
  
  // Nudge Twitter to rescan — their widgets.js watches for new tweets
  setTimeout(function() {
    if (window.twttr && window.twttr.widgets && window.twttr.widgets.load) {
      try { window.twttr.widgets.load($('modalArticleContent')); } catch(e) {}
    }
  }, 100);
}

function executeInlineScripts(container) {
  if (!container) return;
  var scripts = container.querySelectorAll('script');
  scripts.forEach(function(oldScript) {
    var newScript = document.createElement('script');
    Array.from(oldScript.attributes).forEach(function(attr) {
      newScript.setAttribute(attr.name, attr.value);
    });
    if (oldScript.textContent) newScript.textContent = oldScript.textContent;
    oldScript.parentNode.replaceChild(newScript, oldScript);
  });
}

/* ============ BYSLUG FETCH ============ */
function fetchArticleBody(slug) {
  if (!slug) return Promise.reject(new Error('No slug provided'));
  var url = BYSLUG_URL + '?postSlug=' + encodeURI(slug);
  
  return fetch(url, { method: 'GET', headers: { 'Accept': '*/*' } })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(json) {
      if (!json.success || !json.body || !json.body[0]) {
        throw new Error('Unexpected response shape');
      }
      return json.body[0].content || [];
    });
}

/* ============ BODY CACHE PERSISTENCE ============ */
function persistBodyCache() {
  try {
    var raw = JSON.stringify(STATE.bodyCache);
    // Evict oldest entries if we're over the cap
    if (raw.length > BODY_CACHE_CAP_BYTES) {
      evictOldestCacheEntries();
      raw = JSON.stringify(STATE.bodyCache);
    }
    localStorage.setItem(LS_KEY_BODY_CACHE, raw);
  } catch (e) {
    // Quota exceeded — nuke and try again
    STATE.bodyCache = {};
    try { localStorage.removeItem(LS_KEY_BODY_CACHE); } catch (_) {}
  }
}

function evictOldestCacheEntries() {
  var entries = Object.keys(STATE.bodyCache).map(function(k) {
    return { key: k, ts: STATE.bodyCache[k].ts || 0 };
  });
  entries.sort(function(a, b) { return a.ts - b.ts; });
  // Drop oldest 25%
  var dropCount = Math.ceil(entries.length * 0.25);
  for (var i = 0; i < dropCount; i++) {
    delete STATE.bodyCache[entries[i].key];
  }
}

/* ============ KEYBOARD ============ */
function onKeyDown(e) {
  var modalOpen = $('modalBackdrop').classList.contains('open');
  
  if (modalOpen) {
    if (e.key === 'Escape') { e.preventDefault(); closeModal(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); navModal(-1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); navModal(1); }
    // Up/Down scroll is native for modal body; nothing to intercept
  } else {
    // "/" focuses search (not inside inputs already)
    if (e.key === '/' && document.activeElement && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT' && document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault();
      $('qInput').focus();
    }
  }
}

</script>

</body>
</html>
