<style>
/* ── Tool-specific stat colours (base styles in nl-brand.css) ── */
.stat--live .stat__num    { color: var(--green); }
.stat--soon .stat__num    { color: var(--amber); }
.stat--expired .stat__num { color: var(--red); }

/* ── Section head ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
.section-head h2{font-size:13px;font-weight:900;color:var(--navy);text-transform:uppercase;letter-spacing:0.1em;}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:3px;margin-bottom:16px;}
.tab{flex:1;text-align:center;padding:8px 12px;border-radius:4px;font-size:11px;font-weight:800;cursor:pointer;color:var(--text-muted);border:none;background:none;text-transform:uppercase;letter-spacing:0.08em;font-family:var(--font);}
.tab.active{background:var(--primary);color:var(--white);}

/* ── Buttons ── */
.btn--accent{background:var(--primary);color:var(--white);}
.btn--accent:hover{background:var(--primary-dim);}
.btn--primary:hover{background:var(--navy-light);}
.btn--ghost:hover{background:var(--off-white);}
.btn--danger:hover{background:#fbe4e2;}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(10,22,40,0.65);z-index:200;display:none;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--white);border-radius:10px;width:100%;max-width:640px;}

/* ── Form ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group input,.form-group select,.form-group textarea{padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);}

input[type="checkbox"]{width:16px!important;height:16px!important;padding:0!important;border:1px solid var(--border)!important;border-radius:3px!important;accent-color:var(--primary);}

/* ── Club picker ── */
.club-picker{position:relative;}
.club-picker__wrap{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;background:var(--white);}
.club-picker__crest{width:28px;height:28px;object-fit:contain;flex-shrink:0;}
.club-picker__input{flex:1;border:none!important;padding:0!important;font-size:13px;outline:none;background:transparent;}

/* ── Spinner etc ── */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:var(--white);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-row td,.empty-row td{text-align:center;padding:40px;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;}

/* ── Mobile topbar override ── */
@media (max-width: 700px) {

}
</style>
