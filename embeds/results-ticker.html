<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NL Results Ticker Embed</title>
  <style>
    html, body { margin:0; padding:0; background:transparent; }
  </style>
</head>
<body>
  <div
    data-nl-results-ticker
    data-csv="https://docs.google.com/spreadsheets/d/e/2PACX-1vTOvhhj8bPbZCsAEOurgzBzK_iZN6-qCux9ThncoO7_gZuPWmCHfrxf3vReW8m97hJ4guc954TzRrra/pub?output=csv"
    data-clubs-meta="https://rckd-nl.github.io/nl-tools/assets/data/clubs-meta.json"
    data-height="74"
    data-speed="80"
    data-refresh-ms="120000"
    data-max-items="60"
    data-days-back="3"
    data-days-forward="3"
    data-switcher="stacked"
    data-switcher-sep="false"
    data-match-hub-url="https://www.thenationalleague.org.uk/match-hub/"
  ></div>

  <script defer src="https://rckd-nl.github.io/nl-tools/widgets/results-ticker-widget.js"></script>
</body>
</html>
