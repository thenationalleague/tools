<!--
  NL Transfer Centre — Frontend
  v46.6 — Centred social embeds within media area; top-right updated time now shows hours
           and minutes only; removed seconds from header clock display
  v46.4 — Removed duplicate legacy buildMediaHTML/loadEmbeds functions; keeps only the
           proper X/Twitter + Instagram auto-detect embed handling from v46.3
  v46.2 — Fixed isKnownClub logic; contract crest now falls back to rose instead of hiding;
           article title now falls back to copy_text/copy; sting queue preload now uses
           shared crest lookup logic for direct /assets/crests/ paths
  v45 — Added Loan Extension type; NL rose crest fallback for Unattached and unknown clubs;
         removed fee/contract row; plain-text copy now honours paragraph breaks
  v44 — Based on v29; direct @font-face (no domain lock); inlined traced font data;
         font-family preserved in takeover(); contract card crest; bottom bar mobile fix
  v29 — Contract sig: centred below New Contract pill inside centre div;
         no more absolute positioning; sig-wrap is flex column centred
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National League Transfer Centre</title>
<style>

<style>
  /* ─── RESET scoped to widget only ───────────────────────────────────────── */
  .tc-wrap *, .tc-wrap *::before, .tc-wrap *::after { box-sizing: border-box; margin: 0; padding: 0; }
  .tc-wrap a { color: inherit; text-decoration: none; }
  .tc-wrap img { display: block; }
  .tc-wrap button { cursor: pointer; }

  .tc-wrap {
    background: #0a0a0a !important;
    color: #f0f0f0 !important;
    font-family: 'carbona-variable', 'carbona', sans-serif !important;
    font-size: 16px;
    line-height: 1.45;
    min-width: 0;
    position: fixed !important;
    top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
    width: 100vw !important; height: 100vh !important;
    z-index: 999990 !important;
    overflow-y: scroll !important; overflow-x: hidden !important;
    -webkit-overflow-scrolling: touch;
    display: block !important;
  }

  .tc-wrap .tc-header {
    background: #0a0a0a !important;
    border-bottom: 3px solid #FFD700;
    padding: 0 20px;
    position: sticky; top: 0; z-index: 100;
  }
  .tc-wrap .tc-header__inner {
    max-width: 960px; margin: 0 auto;
    display: flex; align-items: center; gap: 16px; height: 68px;
  }
  .tc-wrap .tc-header__badge {
    background: #FFD700 !important; color: #000 !important;
    font-family: 'carbona-variable', 'carbona', sans-serif !important;
    font-size: 11px !important; font-weight: 900 !important;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 2px; white-space: nowrap;
    font-variation-settings: 'wght' 900; line-height: 1;
  }
  .tc-wrap .tc-header__title {
    font-family: 'carbona-variable', 'carbona', sans-serif !important;
    font-size: 24px !important; font-weight: 900 !important;
    letter-spacing: -0.02em; text-transform: uppercase;
    color: #fff !important; font-variation-settings: 'wght' 900;
    flex: 1; line-height: 1;
  }
  .tc-wrap .tc-header__title span { color: #FFD700 !important; }
  .tc-live-dot {
    width: 9px; height: 9px; border-radius: 50%; background: #FFD700;
    animation: tcPulseDot 2s ease-in-out infinite; flex-shrink: 0;
  }
  @keyframes tcPulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  .tc-wrap .tc-last-updated {
    font-size: 12px !important; color: #555 !important;
    white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em;
  }

  .tc-wrap .tc-main { max-width: 960px; margin: 0 auto; padding: 24px 20px 80px; }
  .tc-wrap .tc-feed { display: flex; flex-direction: column; gap: 12px; }
  .tc-wrap .tc-empty {
    text-align: center; color: #555 !important; padding: 80px 0;
    font-size: 16px !important; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .tc-wrap .tc-empty__icon { font-size: 40px; margin-bottom: 16px; }

  .tc-wrap .tc-card {
    background: #111111 !important; border: 1px solid #2a2a2a !important;
    border-radius: 10px; overflow: hidden;
    animation: tcCardIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    position: relative; width: 100%;
  }
  @keyframes tcCardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .tc-wrap .tc-card--pinned {
    border-color: #FFD700 !important;
    box-shadow: 0 0 0 1px #FFD700, 0 6px 28px rgba(255,215,0,0.12);
  }
  .tc-wrap .tc-card--pinned::before {
    content: '📌 PINNED'; display: block;
    background: #FFD700 !important; color: #000 !important;
    font-family: 'carbona-variable', 'carbona', sans-serif !important;
    font-size: 10px; font-weight: 900; letter-spacing: 0.18em;
    text-align: center; padding: 4px; text-transform: uppercase;
  }
  .tc-wrap .tc-card--rumour { border-style: dashed !important; border-color: #333 !important; background: #0d0d0d !important; }
  .tc-wrap .tc-card--rumour .tc-card__header { background: #121212 !important; }
  .tc-wrap .tc-card--loan     { border-color: #1a2e1a !important; }
  .tc-wrap .tc-card--contract { border-color: #1a1a2e !important; }
  .tc-wrap .tc-card--general  { background: #0f0f08 !important; border-color: #B89800 !important; }

  .tc-wrap .tc-breaking {
    display: flex !important; align-items: center; gap: 0;
    overflow: hidden; height: 32px; background: #cc0000 !important; position: relative;
  }
  .tc-wrap .tc-breaking__label {
    background: #FFD700 !important; color: #000 !important;
    font-family: 'carbona-variable', 'carbona', sans-serif !important;
    font-size: 11px !important; font-weight: 900 !important;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 0 14px; height: 100%; display: flex !important; align-items: center;
    white-space: nowrap; flex-shrink: 0; font-variation-settings: 'wght' 900;
  }
  .tc-wrap .tc-breaking__ticker { flex: 1; overflow: hidden; position: relative; height: 100%; }
  .tc-wrap .tc-breaking__text {
    position: absolute; top: 50%; transform: translateY(-50%);
    white-space: nowrap; color: #fff !important;
    font-family: 'carbona-variable', 'carbona', sans-serif !important;
    font-size: 11px !important; font-weight: 800 !important;
    letter-spacing: 0.1em; text-transform: uppercase; font-variation-settings: 'wght' 800;
    animation: tcTickerScroll 26s linear infinite; padding-left: 100%;
  }
  @keyframes tcTickerScroll {
    0%   { transform: translateY(-50%) translateX(0); }
    100% { transform: translateY(-50%) translateX(-100%); }
  }
  .tc-wrap .tc-card--confirmed-new {
    animation: tcCardIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both,
               tcConfirmedFlash 1.2s ease-in-out 0.4s 3 both !important;
  }
  @keyframes tcConfirmedFlash {
    0%,100% { box-shadow: 0 0 0 1px #2a2a2a; }
    50%     { box-shadow: 0 0 0 3px #FFD700, 0 0 32px rgba(255,215,0,0.4); }
  }
  .tc-wrap .tc-cta {
    display: inline-flex !important; align-items: center; gap: 8px; margin-top: 14px;
    background: transparent !important; border: 2px solid #FFD700 !important;
    color: #FFD700 !important;
    font-family: 'carbona-variable', 'carbona', sans-serif !important;
    font-size: 13px !important; font-weight: 900 !important;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 10px 20px; border-radius: 4px; font-variation-settings: 'wght' 900;
    text-decoration: none !important; transition: background 0.15s, color 0.15s; cursor: pointer;
  }
  .tc-wrap .tc-cta:hover { background: #FFD700 !important; color: #000 !important; }
  .tc-wrap .tc-cta__arrow { font-size: 16px; line-height: 1; }

  /* ─── STING ─────────────────────────────────────────────────────────────── */
  .tc-sting {
    position: fixed !important; inset: 0 !important; z-index: 999999 !important;
    pointer-events: none; overflow: hidden;
    font-family: 'carbona-variable', 'carbona', sans-serif !important;
  }
  .tc-sting--last { animation: tcStingFinalFade 0.8s ease 9s forwards !important; }
  @keyframes tcStingFinalFade { 0% { opacity: 1; } 100% { opacity: 0; } }

  .tc-sting__bg {
    position: absolute; inset: 0; z-index: 1;
    transform: scaleX(0); transform-origin: left center;
    animation: tcStingBgIn 0.32s cubic-bezier(0.86,0,0.07,1) 0s forwards;
  }
  @keyframes tcStingBgIn {
    from { transform: scaleX(0); transform-origin: left center; }
    to   { transform: scaleX(1); transform-origin: left center; }
  }
  .tc-sting__top-bar, .tc-sting__bottom-bar, .tc-sting__centre { z-index: 2; }
  @keyframes tcStingFadeIn { to { opacity: 1; } }

  .tc-sting__top-bar {
    position: absolute; top: 0; left: 0; right: 0; min-height: 56px;
    display: flex !important; align-items: stretch;
    background: #cc0000 !important; transform: translateY(-100%); overflow: hidden;
    animation: tcStingBarDown 0.45s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
  }
  @keyframes tcStingBarDown { to { transform: translateY(0); } }
  .tc-sting__top-badge {
    background: #FFD700 !important; color: #000 !important;
    font-size: 11px !important; font-weight: 900 !important;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 0 16px; display: flex !important; align-items: center;
    gap: 8px; white-space: nowrap; flex-shrink: 0; font-variation-settings: 'wght' 900;
  }
  .tc-sting__live-dot {
    width: 9px; height: 9px; border-radius: 50%; background: #cc0000 !important;
    flex-shrink: 0; animation: tcStingDotPulse 1.2s ease-in-out infinite;
  }
  @keyframes tcStingDotPulse {
    0%, 100% { transform: scale(1);   box-shadow: 0 0 0 0 rgba(204,0,0,0.7); }
    50%      { transform: scale(1.3); box-shadow: 0 0 0 6px rgba(204,0,0,0); }
  }
  .tc-sting__top-text-wrap {
    flex: 1; display: flex !important; flex-direction: column;
    justify-content: center; padding: 8px 16px; gap: 2px; min-width: 0;
  }
  .tc-sting__top-type {
    color: rgba(255,255,255,0.7) !important; font-size: 9px !important;
    font-weight: 800 !important; letter-spacing: 0.2em; text-transform: uppercase;
    font-variation-settings: 'wght' 800; white-space: nowrap;
  }
  .tc-sting__top-text {
    color: #fff !important; font-size: 13px !important; font-weight: 900 !important;
    letter-spacing: 0.06em; text-transform: uppercase; font-variation-settings: 'wght' 900;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .tc-sting__bottom-bar {
    position: absolute;
    bottom: 84px; left: 0; right: 0; /* fixed px — avoids iOS CSS max() bug */
    min-height: 44px; height: auto;
    background: rgba(0,0,0,0.88) !important;
    border-top: 2px solid rgba(255,215,0,0.6); border-bottom: 2px solid rgba(255,215,0,0.6);
    display: flex !important; align-items: center; justify-content: center;
    padding: 0 12px; gap: 8px;
    transform: translateY(calc(100vh + 100%));
    animation: tcStingBarUp2 0.45s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
    overflow: hidden; flex-wrap: nowrap; box-sizing: border-box;
  }
  @keyframes tcStingBarUp2 { to { transform: translateY(0); } }
  .tc-sting__bottom-label {
    font-size: clamp(8px, 2vw, 10px) !important; font-weight: 900 !important;
    letter-spacing: 0.1em; text-transform: uppercase; color: #FFD700 !important;
    white-space: nowrap; flex-shrink: 0; font-variation-settings: 'wght' 900;
  }
  .tc-sting__bottom-from, .tc-sting__bottom-to {
    font-size: clamp(9px, 2.4vw, 13px) !important; font-weight: 800 !important;
    letter-spacing: 0.02em; text-transform: uppercase; color: #fff !important;
    font-variation-settings: 'wght' 800; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 0 1 auto;
    max-width: 36vw;
  }
  .tc-sting__bottom-arrow {
    display: flex !important; align-items: center; gap: 0; flex-shrink: 0;
    align-self: center; line-height: 1;
  }
  .tc-sting__bottom-arrow .chv {
    font-size: 18px !important; color: #FFD700 !important; font-weight: 900;
    line-height: 1; display: block; opacity: 0.2;
    animation: tcBottomChevWave 2s ease-in-out infinite;
  }
  .tc-sting__bottom-arrow .chv:nth-child(1) { animation-delay: 0s; }
  .tc-sting__bottom-arrow .chv:nth-child(2) { animation-delay: 0.2s; }
  .tc-sting__bottom-arrow .chv:nth-child(3) { animation-delay: 0.4s; }

  @keyframes tcBottomChevWave {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }
  .tc-sting__centre {
    position: absolute;
    top: 64px;
    bottom: 168px;
    left: 0;
    right: 0;
    display: flex !important;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(10px, 2vh, 18px);
    padding: 16px 16px 16px;
  }
  .tc-sting__clubs-row {
    display: flex !important;
    align-items: flex-start;
    gap: clamp(12px, 4vw, 40px);
    opacity: 0;
    width: 100%;
    justify-content: center;
    margin-bottom: clamp(8px, 1.5vh, 16px);
    animation: tcStingFadeIn 0.55s ease 0.65s forwards;
  }
  .tc-sting__club-col {
    position: relative; display: flex !important; flex-direction: column;
    align-items: center; gap: 6px; flex: 1; min-width: 0; max-width: 38vw;
    padding-bottom: clamp(28px, 5vw, 48px);
  }
  .tc-sting__crest-ring {
    width: clamp(60px, 18vw, 110px); height: clamp(60px, 18vw, 110px);
    border-radius: 50%; background: #ffffff !important;
    display: flex !important; align-items: center; justify-content: center;
    overflow: hidden; border: 3px solid rgba(255,255,255,0.4);
    transform: scale(0.4); opacity: 0; flex-shrink: 0;
  }
  .tc-sting__crest-ring--from { animation: tcStingCrestPop 0.65s cubic-bezier(0.22,1,0.36,1) 0.7s forwards; }
  .tc-sting__crest-ring--to   { animation: tcStingCrestPop 0.65s cubic-bezier(0.22,1,0.36,1) 0.95s forwards; }
  @keyframes tcStingCrestPop { to { transform: scale(1); opacity: 1; } }
  .tc-sting__crest-img { width: 70%; height: 70%; object-fit: contain; display: block !important; }
  .tc-sting__club-name {
    font-size: clamp(9px, 2.5vw, 13px) !important; font-weight: 900 !important;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.85) !important; text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    font-variation-settings: 'wght' 900; text-align: center;
    line-height: 1.25; word-break: break-word; width: 100%;
  }
  .tc-sting__arrow-mid {
    display: flex !important; align-items: center; gap: 2px; opacity: 0;
    flex-shrink: 0; align-self: flex-start;
    margin-top: clamp(15px, 4.5vw, 28px);
    animation: tcStingArrowPop 0.55s cubic-bezier(0.22,1,0.36,1) 0.9s forwards;
  }
  @keyframes tcStingArrowPop { to { opacity: 1; } }
  .tc-sting__arrow-mid .chv {
    font-size: clamp(56px, 14vw, 110px) !important; color: #FFD700 !important;
    font-weight: 900; line-height: 1; display: block; opacity: 0.2;
    animation: tcChevWave 2s ease-in-out infinite;
  }
  .tc-sting__arrow-mid .chv:nth-child(1) { animation-delay: 0s; }
  .tc-sting__arrow-mid .chv:nth-child(2) { animation-delay: 0.25s; }
  .tc-sting__arrow-mid .chv:nth-child(3) { animation-delay: 0.5s; }
  @keyframes tcChevWave { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

  .tc-sting__name {
    font-size: clamp(36px, 9vw, 132px) !important;
    font-weight: 950 !important;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: #fff !important;
    font-variation-settings: 'wght' 950;
    text-align: center;
    line-height: 0.95;
    opacity: 0;
    transform: translateY(20px) scaleY(0.8);
    text-shadow: 0 4px 32px rgba(0,0,0,0.8);
    animation: tcStingNameSlam 0.65s cubic-bezier(0.22,1,0.36,1) 1.15s forwards;
    width: min(94vw, 1180px);
    max-width: 94vw;
    word-break: break-word;
    margin: 0 0 4px 0;
    padding: 0;
  }
  .tc-sting__type-label {
    margin-top: 2px;
  }
  @keyframes tcStingNameSlam { to { opacity: 1; transform: translateY(0) scaleY(1); } }

  /* Signature wraps */
  .tc-sting__sig-wrap, .tc-sting__transfer-sig-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    pointer-events: none;
    overflow: visible;
    z-index: 20;
    width: auto;
    max-width: 94vw;
    margin: 0 auto;
    flex: 0 0 auto;
    min-height: clamp(52px, 8vw, 86px);
  }
  .tc-sting__sig-text, .tc-sting__transfer-sig-text {
    font-family: 'viktorie', cursive !important;
    font-size: clamp(27px, 4.8vw, 60px) !important;
    font-weight: 400 !important;
    color: rgba(255,255,255,0.88) !important;
    line-height: 1;
    display: block;
    white-space: nowrap;
    text-align: center;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.38s ease;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    visibility: visible;
  }
  .tc-sting__sig-canvas, .tc-sting__transfer-sig-canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    pointer-events: none;
  }
  .tc-sting__sig-underline, .tc-sting__transfer-sig-underline {
    display: block;
    position: absolute;
    left: 50%;
    bottom: 0;
    height: clamp(1px, 0.12em, 2px);
    background: rgba(255,215,0,0.75);
    border-radius: 2px;
    transform: translateX(-50%) scaleX(0);
    transform-origin: center;
    transition: transform 0.9s ease-out;
    margin-top: 0;
  }
  .tc-sting__sig-underline.drawn, .tc-sting__transfer-sig-underline.drawn { transform: translateX(-50%) scaleX(1); }
  
  .tc-sting__type-label {
    font-size: clamp(9px, 1.8vw, 14px) !important; font-weight: 900 !important;
    letter-spacing: 0.28em; text-transform: uppercase; color: #FFD700 !important;
    font-variation-settings: 'wght' 900; background: #000 !important;
    padding: 6px 20px; border-radius: 3px; opacity: 0;
    animation: tcStingFadeIn 0.45s ease 1.7s forwards;
  }

  /* ─── CARDS ─────────────────────────────────────────────────────────────── */
  .tc-wrap .tc-card__gradient-bar { height: 4px; width: 100%; display: block; }
  .tc-wrap .tc-card__header {
    display: flex !important; align-items: center; gap: 10px;
    padding: 12px 18px 10px; background: #161616 !important;
  }
  .tc-wrap .tc-card__type-icon { font-size: 15px; flex-shrink: 0; line-height: 1; }
  .tc-wrap .tc-card__type-label {
    font-family: 'carbona-variable', 'carbona', sans-serif !important;
    font-size: 11px !important; font-weight: 900 !important;
    letter-spacing: 0.16em; text-transform: uppercase;
    flex: 1; font-variation-settings: 'wght' 900; line-height: 1;
  }

  // ─── COLOUR UTILITIES ─────────────────────────────────────────────────────
  function hexToRgb(hex) {
    hex = String(hex || '').replace('#', '');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    if (!/^[0-9a-fA-F]{6}$/.test(hex)) return { r:34, g:59, b:124 };
    return { r: parseInt(hex.substr(0,2),16), g: parseInt(hex.substr(2,2),16), b: parseInt(hex.substr(4,2),16) };
  }

  function getTeamPalette(clubName) {
    var c = state.clubs[clubName];
    if (c && c.colors) return c.colors;
    var extractKey = '__extract_' + clubName;
    if (clubName && !isUnattachedClub(clubName) && !state.clubs[extractKey]) {
      state.clubs[extractKey] = true;
      extractCrestColours(clubName);
    }
    return getFallbackPalette(clubName);
  }

  function extractCrestColours(name) {
    var url = getClubCrestUrl(name);
    if (!url || url === ROSE_CREST) return;
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      try {
        var canvas = document.createElement('canvas');
        var SIZE = 64; canvas.width = SIZE; canvas.height = SIZE;
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, SIZE, SIZE); ctx.drawImage(img, 0, 0, SIZE, SIZE);
        var data = ctx.getImageData(0, 0, SIZE, SIZE).data;
        var counts = {};
        for (var i = 0; i < data.length; i += 4) {
          var r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
          if (a < 200) continue;
          var bright = (r + g + b) / 3;
          if (bright < 40 || bright > 220) continue;
          var max = Math.max(r, g, b), min = Math.min(r, g, b);
          var saturation = max === 0 ? 0 : (max - min) / max;
          if (saturation < 0.25) continue;
          r = Math.round(r/40)*40; g = Math.round(g/40)*40; b = Math.round(b/40)*40;
          var key = r + ',' + g + ',' + b;
          counts[key] = (counts[key] || 0) + 1;
        }
        var sorted = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; });
        if (!sorted.length) return;
        function hex(k){ var p=k.split(','); return '#'+p.map(function(v){ return ('0'+parseInt(v).toString(16)).slice(-2); }).join(''); }
        if (!state.clubs[name] || !state.clubs[name].colors) {
          state.clubs[name] = { name: name, colors: {
            primary: hex(sorted[0]),
            secondary: sorted[1] ? hex(sorted[1]) : hex(sorted[0]),
            tertiary:  sorted[2] ? hex(sorted[2]) : (sorted[1] ? hex(sorted[1]) : hex(sorted[0]))
          }};
        }
      } catch(e) {}
    };
    img.onerror = function() {};
    img.src = url;
  }

  // ─── HELPERS ──────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTime(val) {
    if (!val) return '';
    if (isNaN(Date.parse(val))) return val;
    var d = new Date(val), now = new Date(), diff = now - d;
    if (diff < 60000)    return 'Just now';
    if (diff < 3600000)  return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }

  function isUnattachedClub(name) {
    return String(name || '').trim().toLowerCase() === 'unattached';
  }

  function isKnownClub(name) {
    return !!(name && state.clubs && state.clubs[name] && String(name || '').trim().toLowerCase() !== 'unattached');
  }

  function getClubCrestUrl(name) {
    var clean = String(name || '').trim();
    if (!clean) return ROSE_CREST;
    if (isUnattachedClub(clean)) return ROSE_CREST;
    return CREST_BASE + encodeURIComponent(clean) + '.png';
  }

  function getFallbackPalette(name) {
    if (isUnattachedClub(name)) return ROSE_FALLBACK_COLOURS;
    return ROSE_FALLBACK_COLOURS;
  }

  function renderCopyMarkup(raw) {
    var text = String(raw || '');
    if (!text.trim()) return '';
    if (/<[a-z][\s\S]*>/i.test(text)) return text;
    return text
      .replace(/\r\n/g, '\n')
      .split(/\n\s*\n/)
      .map(function(block) {
        return '<p>' + escHtml(block).replace(/\n/g, '<br>') + '</p>';
      })
      .join('');
  }

  function getPostCopyMarkup(post) {
    return renderCopyMarkup(post.copy_text || post.copy || '');
  }
  
  function crestUrl(name) { return getClubCrestUrl(name); }
  
  function fetchWithTimeout(url, ms) {
    return Promise.race([
      fetch(url, { cache: 'no-store' }),
      new Promise(function(_, rej) { setTimeout(function() { rej(new Error('timeout')); }, ms); })
    ]);
  }

  // ─── LOAD CLUBS ───────────────────────────────────────────────────────────

      .then(function(r) { return r.json(); })
      .then(function(data) {
        (data.clubs || []).forEach(function(c) { if (c && c.name) state.clubs[c.name] = c; });
      })
      .catch(function() {});

  // ─── FETCH FEED ───────────────────────────────────────────────────────────

    var url = API_URL + (API_URL.indexOf('?') >= 0 ? '&' : '?') + 'cb=' + Date.now();
    return fetchWithTimeout(url, FETCH_TIMEOUT_MS)
      .then(function(r) { return r.json(); })
      .catch(function() { return { ok: false, items: [] }; });

  // ─── RENDER ───────────────────────────────────────────────────────────────
  function render(posts) {
    var feed = document.getElementById('tc-feed');
    if (!feed) return;
    var hasRenderedCards = feed.querySelectorAll('.tc-card[data-id]').length > 0;
    Array.from(feed.children).forEach(function(el) {
      if (!el.dataset.id && !el.classList.contains('tc-empty')) feed.removeChild(el);
    });
    if (!posts || posts.length === 0) {
      if (!hasRenderedCards) feed.innerHTML = '<div class="tc-empty"><div class="tc-empty__icon">🏟️</div>No transfers to show yet.</div>';
      return;
    }
    Array.from(feed.children).forEach(function(el) {
      if (el.classList.contains('tc-empty')) feed.removeChild(el);
    });
    var existing = {};
    Array.from(feed.querySelectorAll('.tc-card[data-id]')).forEach(function(el) { existing[el.dataset.id] = el; });
    var nextIds = {};
    posts.forEach(function(post, idx) {
      nextIds[post.id] = true;
      var el = existing[post.id];
      var preserve = el && (post.media_type === 'twitter' || post.media_type === 'instagram');
      if (!el) {
        el = buildCard(post);
        feed.insertBefore(el, feed.children[idx] || null);
      } else if (!preserve) {
        if ((el.dataset.updated || '') !== (post.updated_at || '')) {
          var fresh = buildCard(post);
          feed.replaceChild(fresh, el); el = fresh;
        }
        var cur = feed.children[idx];
        if (cur !== el) feed.insertBefore(el, cur || null);
      } else {
        var cur2 = feed.children[idx];
        if (cur2 !== el) feed.insertBefore(el, cur2 || null);
      }
    });
    Object.keys(existing).forEach(function(id) {
      if (!nextIds[id] && existing[id].parentNode === feed) feed.removeChild(existing[id]);
    });
    loadEmbeds();
  }

  // ─── STING QUEUE ──────────────────────────────────────────────────────────
  var BREAKING_MS       = 12 * 60 * 60 * 1000;
  var STING_DURATION_MS = 9000;
  var STING_FIRED_THIS_LOAD = {};
  var STING_QUEUE       = [];
  var STING_RUNNING     = false;
  var STING_TYPES = { confirmed_signing:1, confirmed_departure:1, loan_in:1, loan_out:1, loan_extension:1, contract_extension:1 };
  
  function isBreaking(post) {
    var ts = post.clock_time || post.created_at || '';
    if (!ts || isNaN(Date.parse(ts))) return false;
    if (!STING_TYPES[post.card_type]) return false;
    return (Date.now() - new Date(ts).getTime()) < BREAKING_MS;
  }

  function queueStings(posts) {
    var unfired = posts.filter(function(p) { return isBreaking(p) && !STING_FIRED_THIS_LOAD[p.id]; });
    if (!unfired.length) return;
    unfired.sort(function(a, b) {
      return new Date(a.clock_time||a.created_at||0).getTime() - new Date(b.clock_time||b.created_at||0).getTime();
    });
    unfired.forEach(function(p) { STING_FIRED_THIS_LOAD[p.id] = true; STING_QUEUE.push(p); });
    if (STING_RUNNING) return;
    var unknownClubs = [];
    STING_QUEUE.forEach(function(p) {
      [p.from_club, p.to_club].forEach(function(name) {
        if (name && (!state.clubs[name] || !state.clubs[name].colors) && unknownClubs.indexOf(name) === -1) unknownClubs.push(name);
      });
    });
    if (!unknownClubs.length) { playNextSting(); return; }
    var pending = unknownClubs.length, done = false;
    function onDone() { if (done) return; done = true; playNextSting(); }
    var timeout = setTimeout(onDone, 2000);
    unknownClubs.forEach(function(name) {
      var img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = function() {
        try {
          var canvas = document.createElement('canvas'), SIZE = 64;
          canvas.width = SIZE; canvas.height = SIZE;
          var ctx = canvas.getContext('2d');
          ctx.clearRect(0,0,SIZE,SIZE); ctx.drawImage(img,0,0,SIZE,SIZE);
          var data = ctx.getImageData(0,0,SIZE,SIZE).data, counts = {};
          for (var i=0;i<data.length;i+=4) {
            var r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
            if (a<200) continue;
            var bright=(r+g+b)/3;
            if (bright<40||bright>220) continue;
            var max=Math.max(r,g,b),min=Math.min(r,g,b);
            if (max===0||(max-min)/max<0.25) continue;
            r=Math.round(r/40)*40; g=Math.round(g/40)*40; b=Math.round(b/40)*40;
            var key=r+','+g+','+b; counts[key]=(counts[key]||0)+1;
          }
          var sorted=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];});
          if (sorted.length && (!state.clubs[name]||!state.clubs[name].colors)) {
            function hex(k){var p=k.split(',');return '#'+p.map(function(v){return ('0'+parseInt(v).toString(16)).slice(-2);}).join('');}
            state.clubs[name]={name:name,colors:{primary:hex(sorted[0]),secondary:sorted[1]?hex(sorted[1]):hex(sorted[0]),tertiary:sorted[2]?hex(sorted[2]):(sorted[1]?hex(sorted[1]):hex(sorted[0]))}};
          }
        } catch(e) {}
        pending--; if (pending<=0){clearTimeout(timeout);onDone();}
      };
      img.onerror = function() { pending--; if (pending<=0){clearTimeout(timeout);onDone();} };
      img.src = getClubCrestUrl(name);
    });
  }

  function playNextSting() {
    if (!STING_QUEUE.length) { STING_RUNNING = false; return; }
    STING_RUNNING = true;
    var post = STING_QUEUE.shift(), isLast = STING_QUEUE.length === 0;
    var el = buildStingEl(post);
    if (isLast) el.classList.add('tc-sting--last');
    document.body.appendChild(el);
    if (post.card_type === 'contract_extension' && post.player_name)
      setTimeout(function() { startStingPenReveal(post.id, false); }, 1600);
    if ((post.card_type==='confirmed_signing'||post.card_type==='confirmed_departure'||post.card_type==='loan_in'||post.card_type==='loan_out') && post.player_name && post.to_club)
      setTimeout(function() { startStingPenReveal(post.id, true); }, 1850);
    setTimeout(function() { playNextSting(); }, STING_DURATION_MS);
    var removeDelay = isLast ? STING_DURATION_MS + 700 : STING_DURATION_MS + 200;
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, removeDelay);
  }

  // ─── SIGNATURE REVEAL ─────────────────────────────────────────────────────
  function stingSignatureName(full) {
    var parts = (full || '').trim().split(/\s+/);
    if (parts.length === 1) return full;
    return parts[0].charAt(0) + '. ' + parts.slice(1).join(' ');
  }

  function getSignatureReserveMetrics(playerName) {
    var text = stingSignatureName(playerName || '');
    var fontPx = Math.max(27, Math.min(window.innerWidth * 0.048, 60));
    var fontString = '400 ' + fontPx + 'px viktorie';
    var plan = state.traced ? buildSignaturePlan(text, fontString) : null;

    if (plan && plan.glyphs && plan.glyphs.length) {
      var cssWidth = Math.max(40, Math.ceil(plan.totalWidth + (SIG_SIDE_PAD * 2)));
      var cssHeight = Math.max(40, Math.ceil(plan.totalHeight + SIG_TOP_PAD + SIG_BOTTOM_PAD));
      var underlineGapPx = Math.round(plan.totalHeight * SIG_UNDERLINE_GAP_RATIO);
      var underlineThicknessPx = Math.max(1, Math.round(plan.totalHeight * 0.035));
      return {
        width: cssWidth,
        height: cssHeight + underlineGapPx + underlineThicknessPx
      };
    }

    var measureCanvas = document.createElement('canvas');
    var measureCtx = measureCanvas.getContext('2d');
    measureCtx.font = fontString;
    var textWidth = Math.ceil(measureCtx.measureText(text).width);
    var sigWidth = Math.max(40, textWidth + (SIG_SIDE_PAD * 2));
    var sigHeight = Math.max(40, Math.ceil((fontPx * 1.2) + SIG_TOP_PAD + SIG_BOTTOM_PAD));
    var fallbackUnderlineGapPx = Math.round(fontPx * SIG_UNDERLINE_GAP_RATIO);
    var fallbackUnderlineThicknessPx = Math.max(1, Math.round(fontPx * 0.035));

    return {
      width: sigWidth,
      height: sigHeight + fallbackUnderlineGapPx + fallbackUnderlineThicknessPx
    };
  }

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function dist(a, b) { var dx=b.x-a.x,dy=b.y-a.y; return Math.sqrt(dx*dx+dy*dy); }

  function getCanvasFontFromEl(el) {
    var cs = window.getComputedStyle(el);
    var fsize = cs.fontSize;
    if (!fsize || fsize === '0px' || parseFloat(fsize) < 8)
      fsize = (el.offsetHeight > 10 ? Math.round(el.offsetHeight * 0.85) : 48) + 'px';
    return (cs.fontStyle||'normal') + ' ' + (cs.fontWeight||'400') + ' ' + fsize + ' ' + (cs.fontFamily||'"viktorie",cursive');
  }

  function makeMeasureContext(fontString) {
    var c = document.createElement('canvas');
    var mctx = c.getContext('2d');
    mctx.font = fontString; mctx.textAlign = 'left'; mctx.textBaseline = 'alphabetic';
    return mctx;
  }

  function measureGlyphBox(mctx, ch) {
    var m = mctx.measureText(ch);
    var left=m.actualBoundingBoxLeft||0, right=m.actualBoundingBoxRight||0;
    var ascent=m.actualBoundingBoxAscent||0, descent=m.actualBoundingBoxDescent||0;
    return { advance:m.width||0, left:left, right:right, ascent:ascent, descent:descent,
             width:Math.max(1,left+right), height:Math.max(1,ascent+descent) };
  }

  function normaliseGlyph(glyph) {
    if (!glyph||!glyph.strokes||!glyph.strokes.length) return null;
    var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    glyph.strokes.forEach(function(s){ s.forEach(function(pt){
      minX=Math.min(minX,pt[0]); minY=Math.min(minY,pt[1]);
      maxX=Math.max(maxX,pt[0]); maxY=Math.max(maxY,pt[1]);
    }); });
    if (!isFinite(minX)) return null;
    return { minX:minX,minY:minY,maxX:maxX,maxY:maxY,
             width:Math.max(1,maxX-minX), height:Math.max(1,maxY-minY),
             strokes:glyph.strokes.map(function(s){ return s.map(function(pt){ return {x:pt[0]-minX,y:pt[1]-minY}; }); }) };
  }

  function buildSignaturePlan(text, fontString) {
    if (!state.traced) return null;
    var mctx = makeMeasureContext(fontString);
    var chars = String(text||'').split('');
    var measured=[], cursorX=0, maxAscent=0, maxDescent=0;
    chars.forEach(function(ch) {
      var box = measureGlyphBox(mctx,ch);
      maxAscent=Math.max(maxAscent,box.ascent); maxDescent=Math.max(maxDescent,box.descent);
      measured.push({ch:ch,box:box,x:cursorX}); cursorX+=box.advance;
    });
    var baseline=maxAscent, totalWidth=Math.max(1,cursorX), totalHeight=Math.max(1,maxAscent+maxDescent);
    var glyphs=[], missing=[];
    measured.forEach(function(item) {
      var ch=item.ch,box=item.box;
      if (ch===' '){glyphs.push({ch:ch,isSpace:true,strokes:[],x:item.x,advance:box.advance});return;}
      var raw=state.traced[ch];
      if (!raw){missing.push(ch);glyphs.push({ch:ch,isMissing:true,strokes:[],x:item.x,advance:box.advance,box:box});return;}
      var norm=normaliseGlyph(raw);
      if (!norm){missing.push(ch);glyphs.push({ch:ch,isMissing:true,strokes:[],x:item.x,advance:box.advance,box:box});return;}
      var bboxLeft=item.x-box.left, bboxTop=baseline-box.ascent;
      var sx=box.width/norm.width, sy=box.height/norm.height;
      var strokes=norm.strokes.map(function(stroke){return stroke.map(function(pt){return{x:bboxLeft+pt.x*sx,y:bboxTop+pt.y*sy};});});
      glyphs.push({ch:ch,x:item.x,advance:box.advance,box:box,strokes:strokes});
    });
    return {text:text,font:fontString,baseline:baseline,totalWidth:totalWidth,totalHeight:totalHeight,glyphs:glyphs,missing:missing};
  }

  function strokeLength(stroke) {
    var total=0; for(var i=1;i<stroke.length;i++) total+=dist(stroke[i-1],stroke[i]); return total;
  }

  function pointAtDistance(stroke,target) {
    if (!stroke||!stroke.length) return null;
    if (stroke.length===1) return {x:stroke[0].x,y:stroke[0].y};
    var acc=0;
    for (var i=1;i<stroke.length;i++) {
      var a=stroke[i-1],b=stroke[i],seg=dist(a,b),next=acc+seg;
      if (target<=next||i===stroke.length-1) {
        var local=seg===0?0:(target-acc)/seg;
        return {x:a.x+(b.x-a.x)*local,y:a.y+(b.y-a.y)*local};
      }
      acc=next;
    }
    return {x:stroke[stroke.length-1].x,y:stroke[stroke.length-1].y};
  }

  function drawStrokeProgress(ctx,stroke,progress) {
    if (!stroke||!stroke.length) return;
    if (stroke.length===1){ctx.beginPath();ctx.arc(stroke[0].x,stroke[0].y,Math.max(1.5,SIG_REVEAL_WIDTH*0.55),0,Math.PI*2);ctx.fill();return;}
    var total=strokeLength(stroke),target=total*progress,acc=0;
    ctx.beginPath();ctx.moveTo(stroke[0].x,stroke[0].y);
    for (var i=1;i<stroke.length;i++) {
      var a=stroke[i-1],b=stroke[i],seg=dist(a,b),next=acc+seg;
      if (target>=next){ctx.lineTo(b.x,b.y);}
      else{var local=seg===0?0:(target-acc)/seg;ctx.lineTo(a.x+(b.x-a.x)*local,a.y+(b.y-a.y)*local);break;}
      acc=next;
    }
    ctx.stroke();
  }

  function drawMaskedSignatureFrame(displayCtx,canvasEl,plan,tasks,taskIndex,currentStroke,currentProgress) {
    var textCanvas=document.createElement('canvas'),maskCanvas=document.createElement('canvas');
    textCanvas.width=canvasEl.width;textCanvas.height=canvasEl.height;
    maskCanvas.width=canvasEl.width;maskCanvas.height=canvasEl.height;
    var tctx=textCanvas.getContext('2d'),mctx=maskCanvas.getContext('2d');
    tctx.scale(2,2);mctx.scale(2,2);
    tctx.font=plan.font;tctx.textAlign='left';tctx.textBaseline='alphabetic';
    tctx.fillStyle='rgba(255,255,255,0.92)';tctx.fillText(plan.text,SIG_SIDE_PAD,SIG_TOP_PAD+plan.baseline);
    mctx.lineCap='round';mctx.lineJoin='round';mctx.strokeStyle='#ffffff';mctx.fillStyle='#ffffff';
    mctx.lineWidth=SIG_TRACE_THICKNESS;mctx.shadowColor='#ffffff';mctx.shadowBlur=SIG_REVEAL_WIDTH;
    function drawFullStroke(stroke){
      if(!stroke||!stroke.length)return;
      if(stroke.length===1){mctx.beginPath();mctx.arc(SIG_SIDE_PAD+stroke[0].x,SIG_TOP_PAD+stroke[0].y,Math.max(1.5,SIG_REVEAL_WIDTH*0.55),0,Math.PI*2);mctx.fill();return;}
      mctx.beginPath();mctx.moveTo(SIG_SIDE_PAD+stroke[0].x,SIG_TOP_PAD+stroke[0].y);
      for(var j=1;j<stroke.length;j++)mctx.lineTo(SIG_SIDE_PAD+stroke[j].x,SIG_TOP_PAD+stroke[j].y);
      mctx.stroke();
    }
    for(var i=0;i<taskIndex;i++){if(tasks[i].kind==='stroke')drawFullStroke(tasks[i].stroke);}
    if(currentStroke){
      var shifted=currentStroke.map(function(pt){return{x:SIG_SIDE_PAD+pt.x,y:SIG_TOP_PAD+pt.y};});
      drawStrokeProgress(mctx,shifted,currentProgress);
    }
    displayCtx.clearRect(0,0,canvasEl.width,canvasEl.height);
    displayCtx.drawImage(textCanvas,0,0);
    displayCtx.globalCompositeOperation='destination-in';
    displayCtx.drawImage(maskCanvas,0,0);
    displayCtx.globalCompositeOperation='source-over';
  }

  function fadeInUnrevealed(displayCtx,canvasEl,plan,tasks) {
    var snapshot=document.createElement('canvas');
    snapshot.width=canvasEl.width;snapshot.height=canvasEl.height;
    snapshot.getContext('2d').drawImage(canvasEl,0,0);
    var maskCanvas=document.createElement('canvas');
    maskCanvas.width=canvasEl.width;maskCanvas.height=canvasEl.height;
    var mctx=maskCanvas.getContext('2d');
    mctx.scale(2,2);mctx.lineCap='round';mctx.lineJoin='round';
    mctx.strokeStyle='#ffffff';mctx.fillStyle='#ffffff';
    mctx.lineWidth=SIG_TRACE_THICKNESS;mctx.shadowColor='#ffffff';mctx.shadowBlur=SIG_REVEAL_WIDTH;
    function drawFullStroke(stroke){
      if(!stroke||!stroke.length)return;
      if(stroke.length===1){mctx.beginPath();mctx.arc(SIG_SIDE_PAD+stroke[0].x,SIG_TOP_PAD+stroke[0].y,Math.max(1.5,SIG_REVEAL_WIDTH*0.55),0,Math.PI*2);mctx.fill();return;}
      mctx.beginPath();mctx.moveTo(SIG_SIDE_PAD+stroke[0].x,SIG_TOP_PAD+stroke[0].y);
      for(var j=1;j<stroke.length;j++)mctx.lineTo(SIG_SIDE_PAD+stroke[j].x,SIG_TOP_PAD+stroke[j].y);
      mctx.stroke();
    }
    tasks.forEach(function(t){if(t.kind==='stroke')drawFullStroke(t.stroke);});
    var fullCanvas=document.createElement('canvas');
    fullCanvas.width=canvasEl.width;fullCanvas.height=canvasEl.height;
    var fctx=fullCanvas.getContext('2d');
    fctx.scale(2,2);fctx.font=plan.font;fctx.textAlign='left';fctx.textBaseline='alphabetic';
    fctx.fillStyle='rgba(255,255,255,0.92)';fctx.fillText(plan.text,SIG_SIDE_PAD,SIG_TOP_PAD+plan.baseline);
    fctx.globalCompositeOperation='destination-out';fctx.drawImage(maskCanvas,0,0);fctx.globalCompositeOperation='source-over';
    var start=null;
    function step(ts){
      if(!start)start=ts;
      var p=Math.min((ts-start)/SIG_FINAL_FILL_MS,1);
      displayCtx.clearRect(0,0,canvasEl.width,canvasEl.height);
      displayCtx.drawImage(snapshot,0,0);
      displayCtx.globalAlpha=p;displayCtx.drawImage(fullCanvas,0,0);displayCtx.globalAlpha=1;
      if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function animateTracedSignature(postId, isTransfer) {
    var wrap = document.getElementById('stingsig-' + postId);
    if (!wrap || !state.traced) return false;
    var textSel   = isTransfer ? '.tc-sting__transfer-sig-text'   : '.tc-sting__sig-text';
    var canvasSel = isTransfer ? '.tc-sting__transfer-sig-canvas' : '.tc-sting__sig-canvas';
    var ulSel     = isTransfer ? '.tc-sting__transfer-sig-underline' : '.tc-sting__sig-underline';
    var textEl=wrap.querySelector(textSel), canvasEl=wrap.querySelector(canvasSel), ul=wrap.querySelector(ulSel);
    if (!textEl || !canvasEl) return false;
    var fontString = getCanvasFontFromEl(textEl);
    var text = textEl.textContent || '';
    var plan = buildSignaturePlan(text, fontString);
    if (!plan || !plan.glyphs || !plan.glyphs.length) return false;
    var cssWidth  = Math.max(40, Math.ceil(plan.totalWidth  + SIG_SIDE_PAD * 2));
    var cssHeight = Math.max(40, Math.ceil(plan.totalHeight + SIG_TOP_PAD  + SIG_BOTTOM_PAD));
    console.log('[tc] canvas:', cssWidth, 'x', cssHeight, 'font:', fontString, 'text:', text);
    if (cssWidth < 50 || cssHeight < 20) {
      console.warn('[tc] canvas too small — showing text directly');
      textEl.style.opacity = '1';
      if (ul) ul.classList.add('drawn');
      return true;
    }
    canvasEl.width = cssWidth * 2;
    canvasEl.height = cssHeight * 2;
    canvasEl.style.width = cssWidth + 'px';
    canvasEl.style.height = cssHeight + 'px';

    textEl.style.opacity = '0';

    var underlineGapPx = Math.round(plan.totalHeight * SIG_UNDERLINE_GAP_RATIO);
    var underlineThicknessPx = Math.max(1, Math.round(plan.totalHeight * 0.035));
    var wrapHeightPx = cssHeight + underlineGapPx + underlineThicknessPx;

    if (!wrap.style.width) wrap.style.width = cssWidth + 'px';
    if (!wrap.style.height) wrap.style.height = wrapHeightPx + 'px';
    if (!wrap.style.minHeight) wrap.style.minHeight = wrapHeightPx + 'px';

    canvasEl.style.top = '0px';
    canvasEl.style.left = '50%';
    canvasEl.style.transform = 'translateX(-50%)';

    if (ul) {
      ul.style.width = Math.max(10, Math.ceil(plan.totalWidth)) + 'px';
      ul.style.left = '50%';
      ul.style.height = underlineThicknessPx + 'px';
      ul.style.top = (cssHeight + underlineGapPx) + 'px';
      ul.style.bottom = 'auto';
    }

    var ctx = canvasEl.getContext('2d');
    
    var tasks=[];
    plan.glyphs.forEach(function(glyph,gi){
      glyph.strokes.forEach(function(stroke){ tasks.push({glyphIndex:gi,stroke:stroke,length:strokeLength(stroke),kind:'stroke'}); });
      if (gi<plan.glyphs.length-1) tasks.push({kind:'char-gap',ms:SIG_CHAR_GAP_MS});
    });
    var taskIndex=0,taskStart=null;
    function runTask(ts){
      if (taskIndex>=tasks.length){
        drawMaskedSignatureFrame(ctx,canvasEl,plan,tasks,taskIndex,null,0);
        fadeInUnrevealed(ctx,canvasEl,plan,tasks);
        if(ul)setTimeout(function(){ul.classList.add('drawn');},20);
        return;
      }
      var task=tasks[taskIndex];
      if (task.kind!=='stroke'){
        drawMaskedSignatureFrame(ctx,canvasEl,plan,tasks,taskIndex,null,0);
        if(!taskStart)taskStart=ts;
        if(ts-taskStart>=task.ms){taskIndex++;taskStart=null;}
        requestAnimationFrame(runTask);return;
      }
      if(!taskStart)taskStart=ts;
      var dur=Math.max(60,task.length/SIG_PIXELS_PER_MS);
      var linear=Math.min((ts-taskStart)/dur,1);
      var eased=easeOutCubic(linear);
      drawMaskedSignatureFrame(ctx,canvasEl,plan,tasks,taskIndex,task.stroke,eased);
      if (linear>=1){
        taskIndex++;
        taskStart=null;
      }
      requestAnimationFrame(runTask);
    }
    requestAnimationFrame(runTask);
    return true;
  }

  function startStingPenReveal(postId, isTransfer) {
    var wrap = document.getElementById('stingsig-' + postId);
    if (!wrap) { console.warn('[tc] wrap not found:', postId); return; }
    if (!state.tracedReady || !state.traced) {
      console.warn('[tc] traced not ready:', state.tracedError);
      // Fallback: show text directly
      var textSel = isTransfer ? '.tc-sting__transfer-sig-text' : '.tc-sting__sig-text';
      var ulSel   = isTransfer ? '.tc-sting__transfer-sig-underline' : '.tc-sting__sig-underline';
      var textEl  = wrap.querySelector(textSel);
      var ul      = wrap.querySelector(ulSel);
      if (textEl) { textEl.style.opacity='1'; }
      if (ul) setTimeout(function(){ul.classList.add('drawn');},120);
      return;
    }
    var textSel = isTransfer ? '.tc-sting__transfer-sig-text' : '.tc-sting__sig-text';
    var textEl = wrap.querySelector(textSel);
    if (textEl) console.log('[tc] sig starting — font:', window.getComputedStyle(textEl).fontSize, 'text:', textEl.textContent);
    var ok = animateTracedSignature(postId, isTransfer);
    if (!ok) {
      console.warn('[tc] animation failed for', postId);
      if (textEl) {
        textEl.style.opacity = '1';
        textEl.style.position = 'relative';
        textEl.style.left = 'auto';
        textEl.style.transform = 'none';
      }
    }
  }

  function isXUrl(url) {
    var s = String(url || '').trim();
    return /^https?:\/\/(www\.)?(twitter\.com|x\.com)\/[^/]+\/status\/\d+/i.test(s) ||
           /^https?:\/\/(www\.)?x\.com\/i\/web\/status\/\d+/i.test(s);
  }

  function isInstagramUrl(url) {
    return /^https?:\/\/(www\.)?instagram\.com\/(p|reel|tv)\/[^/?#]+/i.test(String(url || '').trim());
  }

  function normaliseInstagramUrl(url) {
    var m = String(url || '').trim().match(/^https?:\/\/(www\.)?instagram\.com\/(p|reel|tv)\/[^/?#]+/i);
    return m ? (m[0] + '/') : String(url || '').trim();
  }

  function buildMediaHTML(post) {
    var mediaType = String(post.media_type || '').toLowerCase().trim();
    var mediaUrl = String(post.media_url || '').trim();
    if (!mediaUrl) return '';

    if (mediaType === 'image') {
      return '<img src="' + escHtml(mediaUrl) + '" style="width:100%;border-radius:4px;" loading="lazy">';
    }

    if (mediaType === 'twitter' || mediaType === 'x' || mediaType === 'tweet' || isXUrl(mediaUrl)) {
      return '<blockquote class="twitter-tweet" data-theme="dark"><a href="' + escHtml(mediaUrl) + '"></a></blockquote>';
    }

    if (mediaType === 'instagram' || isInstagramUrl(mediaUrl)) {
      return '<blockquote class="instagram-media" data-instgrm-permalink="' + escHtml(normaliseInstagramUrl(mediaUrl)) + '" data-instgrm-version="14" style="margin:0 auto;max-width:540px;width:100%;"></blockquote>';
    }

    return '';
  }

  // ─── REFRESH ──────────────────────────────────────────────────────────────
  function refresh() {
    if (state.refreshInFlight) return;
    state.refreshInFlight = true;
    fetchFeed()
      .then(function(data) {
        if (data && Array.isArray(data.items)) {
          state.posts = (data.items||[]).sort(function(a,b){
            if (a.pinned&&!b.pinned) return -1; if (!a.pinned&&b.pinned) return 1;
            var ta=new Date(a.clock_time||a.created_at).getTime()||0;
            var tb=new Date(b.clock_time||b.created_at).getTime()||0;
            return tb-ta;
          });
          render(state.posts); queueStings(state.posts); updateTimestamp();
        }
      })
      .catch(function(){})
      .then(function(){ state.refreshInFlight=false; });
  }

  function updateTimestamp() {
    var el=document.getElementById('tc-last-updated'); if (!el) return;
    var now=new Date();
    el.textContent='Updated '+now.getHours().toString().padStart(2,'0')+':'+
      now.getMinutes().toString().padStart(2,'0');
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────
  function init() {
    takeover();
    Promise.all([
      loadTracedFont().catch(function(){}),
      loadClubs().catch(function(){})
    ]).then(function(){
      refresh();
      setInterval(refresh, POLL_MS);
    });
    if (!window.twttr) {
      var s=document.createElement('script');
      s.src='https://platform.twitter.com/widgets.js';
      s.async=true;
      document.body.appendChild(s);
    }
    if (!window.instgrm) {
      var ig=document.createElement('script');
      ig.src='https://www.instagram.com/embed.js';
      ig.async=true;
      document.body.appendChild(ig);
    }
  }

  function takeover() {
    var wrap=document.querySelector('.tc-wrap'); if (!wrap) return;
    var el=wrap.parentElement;
    while (el && el!==document.body) {
      var st=window.getComputedStyle(el);
      if (st.transform!=='none'||st.filter!=='none'||st.willChange!=='auto') {
        el.style.transform='none'; el.style.filter='none'; el.style.willChange='auto';
      }
      el.style.overflow='visible'; el=el.parentElement;
    }
    // font-family included explicitly so cssText doesn't overwrite the class rule
    wrap.style.cssText=[
      'position:fixed','top:0','left:0','right:0','bottom:0',
      'width:100vw','height:100vh','z-index:999990',
      'overflow-y:scroll','overflow-x:hidden',
      'background:#0a0a0a','color:#f0f0f0',
      "font-family:'carbona-variable','carbona',sans-serif",
      'display:block'
    ].join('!important;')+'!important';
  }

  document.addEventListener('visibilitychange', function(){ if (document.visibilityState==='visible') refresh(); });
  window.addEventListener('pageshow', function(e){ if (e.persisted) refresh(); });

  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
  else init();

}());
</script>
</body>
</html>
