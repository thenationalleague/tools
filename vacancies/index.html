<!--
  NL Tools — Vacancies
  Version: 3.10
  Date: 08/04/2026

  CHANGELOG
  v3.5 (17/04/2026)
    - nl-brand.css v1.3: wider max-width + fluid typography via clamp()
    - Cache bumped to ?v=5 for nl-brand.css

  v3.4 (17/04/2026)
    - Removed inline safety !important rules
    - nl-brand.css v1.2 now has !important on layout-critical classes
      (.stats, .stat, .table, .table-wrap) so inline safety no longer needed
    - Cache bumped to ?v=4 (nl-brand.css, topbar.js, auth-guard.js)
    - nl-utils cache bumped to ?v=5 for date parsing fix

  v3.0 refactor
    - Restored dangling .stat--live/.stat--soon etc. modifiers as proper CSS
    - Restored .btn--accent and .btn--restore base rules (tool-specific,
      not in nl-brand.css)
    - Bumped system file cache to ?v=2

  v3.0 (17/04/2026)
    - System file migration: loads /tools/system/nl-brand.css,
      nl-utils.js, nl-topbar.js, and auth-guard.js
    - Topbar HTML reduced to <div id="nlTopbar"></div> (auto-rendered)
    - Removed duplicated utility functions (showToast, escJ, parseDate,
      ensureAuth — now on NL namespace)
    - Removed duplicated CSS for topbar, buttons, pills, base reset,
      fonts, tokens (now in nl-brand.css)
    - Script references updated to /tools/system/
  v1.9 (17/04/2026)
    - Topbar standardised: rose white logo (not logo white), tool name
      with 'NL Tools' secondary, Portal button + Sign out button
    - Matches brand skill topbar pattern for all tool pages

  v1.8 (17/04/2026)
    - Fixed 3 remaining old-path references in approve/save/reject
      submissions/ → ops-vacancies/submissions/ (missed in v1.7)

  v1.7 (17/04/2026)
    - RTDB restructure: paths moved under /ops-vacancies/ parent
      /vacancies/ → /ops-vacancies/listings/
      /submissions/ → /ops-vacancies/submissions/
      /analytics/vacancies/ → /ops-vacancies/analytics/

  v1.6 (08/04/2026)
    - Added click tracking — Clicks column in admin table
    - loadAnalytics() reads /analytics/vacancies in real time
    - Clicks column shows navy count if >0, muted if 0
    - analytics node added to Firebase rules (public write, admin read)

  v1.5 (08/04/2026)
    - loadSubs now waits for NL.ensureAuth() before reading /submissions
      (was firing before Firebase Auth resolved — silent permission denied)
    - Switched from once() to on() — submissions update in real time
      so new submissions appear in admin without page refresh

  v1.4 (08/04/2026)
    - Fixed permission_denied: NL.ensureAuth() now always waits for
      onAuthStateChanged and never trusts currentUser synchronously
      (currentUser is null at page load even when session is valid)
    - Fixed submit action name mismatch: was 'submitVacancyAuthed',
      now correctly 'vacancies_submitAuthed' to match GAS router

  v1.3 (08/04/2026)
    - Added NL.ensureAuth() wrapper on all Firebase writes
      Fixes permission_denied when auth-guard uses cached session
      (Firebase Auth not yet live despite valid session — same fix as
      judgements page v1.4)

  v1.2 (08/04/2026)
    - GAS URL updated to portal consolidated script
    - Submissions fully migrated to Firebase RTDB at /submissions/{id}
    - loadSubs() now reads from Firebase directly (no GAS)
    - saveSub/approveSub/rejectSub all write to Firebase directly
    - Approve copies vacancy fields to /vacancies/ as new job
    - reviewSubIndex replaced with reviewSubId (Firebase push ID)
    - getSubData() uses Firebase camelCase field names
    - GAS only used for email verification (vacancies_requestCode/validateCode/submit)

  v1.1 (08/04/2026)
    - Admin: removed Submit Vacancy button — admins use Add Vacancy only
    - Access users: no email verification needed — already authenticated
      Session name/email/role pre-filled and locked, submit unlocked immediately
    - Club users: club picker locked to session.club, cannot submit for other clubs
    - submitVacancyAuthed GAS action used for portal users (no code check)
    - External users (non-portal): still require 4-digit email verification

  v1.0 (08/04/2026)
    - Initial build
    - Portal tool at /tools/vacancies/
    - Auth via auth-guard.js + NL_TOOL_KEY = 'ops-vacancies'
    - admin level: full CRUD + submissions tab + approve/reject
    - access level: read-only listings + submit vacancy form
    - Firebase Realtime Database at /vacancies
    - Real-time listener — updates instantly on data change
    - Submission form uses GAS email verification (4-digit code)
-->

<div class="modal-backdrop" id="formModal">
  <div class="modal">
    <div class="modal__head">

    </div>

        <div class="form-group span2">

          <label>Vacancy Type</label>

<script>
var db           = firebase.database();
var FALLBACK     = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png';
var CREST_BASE   = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/';
var CLUBS_URL    = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/data/clubs-meta.json';
var GAS_URL      = 'https://script.google.com/macros/s/AKfycbyHutd1esz1kykMR5aLXBkgXY2LPC-CzhUWOLBAFjhN-6XCPlxocQ1N9BAoCpE6cdof/exec';

var STATE = {
  session: null, isAdmin: false,
  clubs: [], allVacancies: [], allSubs: [], analytics: {},
  currentTab: 'live', editId: null, reviewSubId: null,
  pendingAction: null, pendingId: null, pendingTitle: null,
  submitCodeVerified: false, submitCountdownInt: null,
};
var vacRef = db.ref('app-data/ops-vacancies/listings');
var vacListener = null;

/* ── Auth ready callback from guard ── */

/* Standard topbar wiring — set user name and bind sign out */
function wireTopbar(session) {
  var userEl = document.getElementById('topbarUser');
  if (userEl) userEl.textContent = session && (session.name || session.email) || '';
  var btn = document.getElementById('signOutBtn');
  if (btn) {
    btn.addEventListener('click', function() {
      firebase.auth().signOut().then(function() { window.location.replace('/tools/'); });
    });
  }
}

window.nlAuthReady = function(session) {
  STATE.session = session;
  var toolLevel = (session.tools && session.tools['ops-vacancies']) || 'access';
  STATE.isAdmin = (toolLevel === 'admin' || session.role === 'superadmin');
  /* topbarSubtitle removed in v2.0 topbar standardisation — line kept no-op for safety */

  loadClubs();
  startVacanciesListener();
  if (STATE.isAdmin) { loadSubs(); loadAnalytics(); }
  renderPage();
};

/* ── Page render (role-aware) ── */
function renderPage() {
  var main = document.getElementById('mainContent');
  if (STATE.isAdmin) {
    main.innerHTML = adminHTML();
  } else {
    main.innerHTML = accessHTML();
  }
}

function adminHTML() {
  return '<div class="stats">'
    + '<div class="stat stat--live"><div class="stat__num" id="statLive">—</div><div class="stat__label">Live</div></div>'
    + '<div class="stat stat--soon"><div class="stat__num" id="statSoon">—</div><div class="stat__label">Closing Soon</div></div>'
    + '<div class="stat stat--expired"><div class="stat__num" id="statExpired">—</div><div class="stat__label">Expired</div></div>'
    + '<div class="stat stat--deleted"><div class="stat__num" id="statDeleted">—</div><div class="stat__label">Deleted</div></div>'
    + '<div class="stat stat--pending" style="border-left:4px solid var(--amber);"><div class="stat__num" id="statPending" style="color:var(--amber);">—</div><div class="stat__label">Pending</div></div>'
    + '</div>'
    + '<div class="section-head">'
    + '<h2 id="sectionTitle">Vacancies</h2>'
    + '<button class="btn btn--accent" id="btnAdd" onclick="openAddModal()">+ Add Vacancy</button>'
    + '</div>'
    + '<div class="tabs">'
    + '<button class="tab active" id="tabLive" onclick="switchTab(\'live\')">Live</button>'
    + '<button class="tab" id="tabExpired" onclick="switchTab(\'expired\')">Expired</button>'
    + '<button class="tab" id="tabDeleted" onclick="switchTab(\'deleted\')">Deleted</button>'
    + '<button class="tab" id="tabSubmissions" onclick="switchTab(\'submissions\')">'
    + 'Submissions <span id="pendingBadge" style="display:none;background:var(--amber);color:#000;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px;"></span>'
    + '</button></div>'
    + '<div id="vacTableWrap" class="table-wrap"><table class="table">'
    + '<thead><tr><th style="width:36px"></th><th>Club</th><th>Role</th><th>Type</th><th>Closing</th><th>Status</th><th style="width:60px;text-align:center;">Clicks</th><th style="width:140px"></th></tr></thead>'

/* ── Real-time vacancies ── */
function startVacanciesListener() {
  if (vacListener) vacRef.off('value', vacListener);
  vacListener = vacRef.on('value', function(snap) {
    var raw = snap.val() || {};
    STATE.allVacancies = Object.keys(raw).map(function(id) {
      var v = raw[id]; v.id = id;
      v.crestUrl = CREST_BASE + encodeURIComponent(v.club || '') + '.png';
      return v;
    }).sort(function(a,b) {
      var da=NL.parseDate(a.closingDate), db2=NL.parseDate(b.closingDate);
      if (!da&&!db2) return 0; if (!da) return 1; if (!db2) return -1;
      return da-db2;
    });
    if (STATE.isAdmin) { updateStats(); renderVacTable(); }
    else { renderAccessTable(); }
  });
}

/* ── Submissions (Firebase) ── */
function loadSubs() {
  NL.ensureAuth().then(function() {
    db.ref('app-data/ops-vacancies/submissions').orderByChild('submittedAt').on('value', function(snap) {
      var raw = snap.val() || {};
      STATE.allSubs = Object.keys(raw).map(function(id) {
        var s = raw[id]; s.id = id;
        s.crestUrl = CREST_BASE + encodeURIComponent(s.club || '') + '.png';
        return s;
      }).sort(function(a,b) {
        // Newest first
        return (b.submittedAt||'') > (a.submittedAt||'') ? 1 : -1;
      });
      updateSubStats();
      if (STATE.currentTab === 'submissions') renderSubsTable();
    });
  }).catch(function(e) {
    console.warn('[loadSubs] auth error:', e.message);
  });
}

/* ── Analytics ── */
function loadAnalytics() {
  // Public read — no auth needed, but listen for real-time updates
  db.ref('app-data/ops-vacancies/analytics').on('value', function(snap) {
    STATE.analytics = snap.val() || {};
    if (STATE.currentTab !== 'submissions') renderVacTable();
  });
}
function updateStats() {
  var now=new Date(), soon=new Date(now.getTime()+3*86400000);
  var live=0,soonC=0,expired=0,deleted=0;
  STATE.allVacancies.forEach(function(v) {
    if (v.deleted){deleted++;return;}
    var d=NL.parseDate(v.closingDate);
    if (d&&d<now){expired++;return;}
    if (d&&d<=soon) soonC++;
    live++;
  });
  function s(id,val){var el=document.getElementById(id);if(el)el.textContent=val;}
  s('statLive',live);s('statSoon',soonC);s('statExpired',expired);s('statDeleted',deleted);
}
function updateSubStats() {
  var n=STATE.allSubs.filter(function(s){return s.status==='Pending';}).length;
  var el=document.getElementById('statPending'); if(el) el.textContent=n;
  var b=document.getElementById('pendingBadge');
  if(b){b.textContent=n;b.style.display=n>0?'inline':'none';}
}

/* ── Tabs (admin) ── */
function switchTab(tab) {
  STATE.currentTab=tab;
  ['live','expired','deleted','submissions'].forEach(function(t){
    var el=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.classList.toggle('active',t===tab);
  });
  var isSubs=tab==='submissions';
  var vw=document.getElementById('vacTableWrap'), sw=document.getElementById('subsTableWrap');
  var ba=document.getElementById('btnAdd'), st=document.getElementById('sectionTitle');
  if(vw) vw.style.display=isSubs?'none':'';
  if(sw) sw.style.display=isSubs?'':'none';
  if(ba) ba.style.display=isSubs?'none':'';
  if(st) st.textContent=isSubs?'Submissions':'Vacancies';
  if(isSubs) renderSubsTable(); else renderVacTable();
}

/* ── Admin table ── */
function renderVacTable() {
  var tbody=document.getElementById('vacTableBody'); if(!tbody) return;
  var now=new Date();
  var filtered=STATE.allVacancies.filter(function(v){
    var d=NL.parseDate(v.closingDate);
    if(STATE.currentTab==='deleted') return v.deleted;
    if(v.deleted) return false;
    return STATE.currentTab==='expired'?(d&&d<now):!(d&&d<now);
  });
  if(!filtered.length){tbody.innerHTML='<tr class="empty-row"><td colspan="8">No vacancies in this category.</td></tr>';return;}
  var soon=new Date(now.getTime()+3*86400000);
  tbody.innerHTML=filtered.map(function(v){
    var d=NL.parseDate(v.closingDate),status,pillCls;
    if(v.deleted){status='Deleted';pillCls='deleted';}
    else if(d&&d<now){status='Expired';pillCls='expired';}
    else if(d&&d<=soon){status='Closing Soon';pillCls='soon';}
    else{status='Live';pillCls='live';}
    var closing=d?fmtDT(d):'—';
    var clicks=(STATE.analytics[v.id]&&STATE.analytics[v.id].clicks)||0;
    var btns=v.deleted
      ?'<button class="btn btn--restore btn--sm" onclick="confirmRestore(\''+v.id+'\',\''+NL.escJ(v.jobTitle)+'\')">Restore</button>'
      :'<button class="btn btn--ghost btn--sm" onclick="openEditModal(\''+v.id+'\')">Edit</button> '
        +'<button class="btn btn--danger btn--sm" onclick="confirmDelete(\''+v.id+'\',\''+NL.escJ(v.jobTitle)+'\')">Delete</button>';
    return '<tr class="'+(v.deleted?'is-deleted':'')+'">'
      +'<td><img class="job-crest" src="'+esc(v.crestUrl)+'" alt="" onerror="this.src=\''+FALLBACK+'\'"></td>'
      +'<td><strong style="font-variation-settings:\'wght\' 700">'+esc(v.club)+'</strong></td>'
      +'<td>'+esc(v.jobTitle)+'</td>'
      +'<td>'+esc(v.vacancyType||'—')+'</td>'
      +'<td style="white-space:nowrap;font-size:12px;">'+closing+'</td>'
      +'<td><span class="pill pill--'+pillCls+'">'+status+'</span></td>'
      +'<td style="text-align:center;font-weight:700;font-variation-settings:\'wght\' 700;color:'+(clicks>0?'var(--navy)':'var(--text-muted)')+';">'+clicks+'</td>'
      +'<td style="white-space:nowrap;">'+btns+'</td>'
      +'</tr>';
  }).join('');
}

/* ── Access table (read only) ── */
function renderAccessTable() {
  var tbody=document.getElementById('vacTableBody'); if(!tbody) return;
  var now=new Date();
  var live=STATE.allVacancies.filter(function(v){
    if(v.deleted) return false;
    var d=NL.parseDate(v.closingDate); return !(d&&d<now);
  });
  if(!live.length){tbody.innerHTML='<tr class="empty-row"><td colspan="6">No vacancies currently listed.</td></tr>';return;}
  var soon=new Date(now.getTime()+3*86400000);
  tbody.innerHTML=live.map(function(v){
    var d=NL.parseDate(v.closingDate),pillCls;
    if(d&&d<=soon) pillCls='soon'; else pillCls='live';
    var closing=d?fmtDT(d):'—';
    return '<tr>'
      +'<td><img class="job-crest" src="'+esc(v.crestUrl)+'" alt="" onerror="this.src=\''+FALLBACK+'\'"></td>'
      +'<td><strong style="font-variation-settings:\'wght\' 700">'+esc(v.club)+'</strong></td>'
      +'<td>'+esc(v.jobTitle)+'</td>'
      +'<td>'+esc(v.vacancyType||'—')+'</td>'
      +'<td style="white-space:nowrap;font-size:12px;">'+closing+'</td>'
      +'<td><span class="pill pill--'+pillCls+'">'+(pillCls==='soon'?'Closing Soon':'Live')+'</span></td>'
      +'</tr>';
  }).join('');
}

/* ── Submissions table ── */
function renderSubsTable() {
  var tbody=document.getElementById('subTableBody'); if(!tbody) return;
  if(!STATE.allSubs.length){tbody.innerHTML='<tr class="empty-row"><td colspan="7">No submissions yet.</td></tr>';return;}
  tbody.innerHTML=STATE.allSubs.map(function(s){
    var when=s.submittedAt?fmtDT(new Date(s.submittedAt)):'—';
    var pillCls=s.status==='Approved'?'approved':s.status==='Rejected'?'rejected':'pending';

      +'<td>'+esc(s.jobTitle)+'</td>'
      +'<td style="font-size:12px;white-space:nowrap;">'+when+'</td>'

/* ── Ensure Firebase Auth is live ── */
// Never trust currentUser synchronously — auth-guard cached session means
// Firebase Auth resolves async. Always wait for onAuthStateChanged.
/* ensureAuth moved to NL.ensureAuth in nl-utils.js */

function saveJob() {
  var club=document.getElementById('fClub').value.trim();
  var title=document.getElementById('fJobTitle').value.trim();
  if(!club){NL.toast('Club is required.','error');return;}
  if(!title){NL.toast('Job title is required.','error');return;}
  var isNew=!STATE.editId;
  var addedBy=isNew?document.getElementById('fAddedBy').value.trim():undefined;
  if(isNew&&!addedBy){NL.toast('Please enter your name in Added By.','error');return;}
  var data={
    club:club,jobTitle:title,
    location:document.getElementById('fLocation').value.trim(),
    vacancyType:document.getElementById('fVacancyType').value,
    department:document.getElementById('fDept').value.trim(),
    salary:document.getElementById('fSalary').value.trim(),
    description:document.getElementById('fDesc').value.trim(),
    applyUrl:document.getElementById('fApplyUrl').value.trim(),
    closingDate:buildClosingStr('fClosingDate','fClosingTime','fNoTime'),
    deleted:false,
  };
  if(isNew){data.addedBy=addedBy;data.createdAt=Date.now();}
  var btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='Saving…';
  NL.ensureAuth().then(function(){
    var p=isNew?vacRef.push(data):db.ref('app-data/ops-vacancies/listings/'+STATE.editId).update(data);
    return p;
  })
  .then(function(){closeModal('formModal');NL.toast(isNew?'Vacancy added.':'Vacancy updated.','success');})
  .catch(function(e){NL.toast(e.message,'error');})
  .finally(function(){btn.disabled=false;btn.textContent=isNew?'Save Vacancy':'Update Vacancy';});
}

function setSubModalBtns(loading,which){
  ['subRejectBtn','subSaveBtn','subApproveBtn'].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    el.disabled=loading;el.style.opacity=loading?'0.6':'';
  });
  if(!loading){
    var a=document.getElementById('subApproveBtn');var r=document.getElementById('subRejectBtn');var s=document.getElementById('subSaveBtn');
    if(a)a.textContent='✓ Approve & Publish';if(r)r.textContent='Reject';if(s)s.textContent='Save Changes';
  } else {
    var btn=document.getElementById(which);
    if(btn) btn.textContent=which==='subApproveBtn'?'Publishing…':which==='subRejectBtn'?'Rejecting…':'Saving…';
  }

function gasPost(payload){
  return fetch(GAS_URL+'?cb='+Date.now(),{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)}).then(function(r){return r.json();});
}

  setSubModalBtns(true,'subSaveBtn');
  var data=getSubData();
  NL.ensureAuth().then(function(){
    return db.ref('app-data/ops-vacancies/submissions/'+STATE.reviewSubId).update(data);
  })
  .then(function(){NL.toast('Saved.','success');loadSubs();})
  .catch(function(e){NL.toast(e.message,'error');})
  .finally(function(){setSubModalBtns(false);});

function approveSub(){
  var approvedBy=document.getElementById('sApprovedBy').value.trim();
  if(!approvedBy){NL.toast('Please enter your name in Approved By.','error');return;}
  setSubModalBtns(true,'subApproveBtn');
  var data=getSubData();
  data.status='Approved';
  data.approvedBy=approvedBy;
  NL.ensureAuth().then(function(){
    return db.ref('app-data/ops-vacancies/submissions/'+STATE.reviewSubId).update(data);
  }).then(function(){
      var sub=STATE.allSubs.find(function(s){return s.id===STATE.reviewSubId;});
      if(!sub) return;
      return NL.ensureAuth().then(function(){
        return vacRef.push({
          club:        data.club        ||sub.club,
          jobTitle:    data.jobTitle    ||sub.jobTitle,
          location:    data.location    ||sub.location,
          vacancyType: data.vacancyType ||sub.vacancyType,
          department:  data.department  ||sub.department,
          salary:      data.salary      ||sub.salary,
          description: data.description ||sub.description,
          applyUrl:    data.liveListingUrl||sub.liveListingUrl,
          closingDate: data.closingDate ||sub.closingDate,
          addedBy:     approvedBy,
          createdAt:   Date.now(),
          deleted:     false,
        });
      });
  })
  .then(function(){closeModal('subModal');NL.toast('Approved and published.','success');loadSubs();})
  .catch(function(e){NL.toast(e.message,'error');setSubModalBtns(false);});
}
function rejectSub(){

    return db.ref('app-data/ops-vacancies/submissions/'+STATE.reviewSubId).update({status:'Rejected',notes:notes});
  })
  .then(function(){closeModal('subModal');NL.toast('Rejected.','success');loadSubs();})
  .catch(function(e){NL.toast(e.message,'error');setSubModalBtns(false);});
}

      +'</div>'
    : '<div class="form-group"><label>Your Name <span class="req">*</span></label><input type="text" id="sfName" placeholder="Full name"></div>'
      +'<div class="form-group"><label>Your Role at Club <span class="req">*</span></label><input type="text" id="sfRole" placeholder="e.g. Head of HR"></div>'
      +'<div class="form-group span2"><label>Your Email <span class="req">*</span></label>'
      +'<div class="email-row">'
      +'<div class="form-group" style="margin:0"><input type="email" id="sfEmail" placeholder="you@yourclub.co.uk"></div>'
      +'<button class="btn-send-code" id="sfSendCodeBtn" onclick="sendSubmitCode()">Send Code</button>'
      +'</div><span class="form-hint">A 4-digit code will be sent to verify your email</span></div>'
      +'<div class="form-group span2" id="sfCodeGroup" style="display:none;">'
      +'<label>Verification Code <span class="req">*</span></label>'
      +'<div style="display:flex;gap:10px;align-items:flex-end;">'
      +'<input type="text" id="sfCode" class="code-input" maxlength="4" placeholder="0000" inputmode="numeric">'
      +'</div>'
      +'<div id="sfCountdown" style="font-size:11px;color:var(--text-muted);margin-top:4px;display:none;"></div>'
      +'<div class="code-status" id="sfCodeStatus"></div>'
      +'</div>';

  body.innerHTML='<div class="submit-note">Your vacancy must already be listed on your club\'s own website before submitting. Submissions are reviewed by NL staff before going live. 1,000 character limit on description.</div>'
    +'<div class="form-grid">'
    +clubField
    +'<div class="form-group span2"><label>Job Title <span class="req">*</span></label><input type="text" id="sfTitle" placeholder="e.g. First Team Physiotherapist"></div>'
    +'<div class="form-group"><label>Location</label><input type="text" id="sfLocation" placeholder="e.g. Training ground"></div>'
    +'<div class="form-group"><label>Vacancy Type</label><select id="sfType"><option value="">— Select —</option><option>Permanent</option><option>Fixed Term</option><option>Contract</option><option>Casual</option><option>Part Time</option><option>Voluntary</option></select></div>'
    +'<div class="form-group"><label>Department</label><input type="text" id="sfDept" placeholder="e.g. Marketing"></div>'
    +'<div class="form-group"><label>Salary</label><input type="text" id="sfSalary" placeholder="e.g. £28,000 per year"></div>'
    +'<div class="form-group span2"><label>Description</label>'
    +'<div style="position:relative;">'
    +'<textarea id="sfDesc" maxlength="1000" oninput="updateDescCount()" style="padding-bottom:26px;" placeholder="High-level overview of the role…"></textarea>'
    +'<span id="sfDescCount" style="position:absolute;bottom:8px;right:10px;font-size:11px;color:var(--text-muted);pointer-events:none;">0 / 1,000</span>'
    +'</div></div>'
    +'<div class="form-group span2"><label>Live Listing URL <span class="req">*</span></label><input type="url" id="sfLiveUrl" placeholder="https://…"><span class="form-hint">Must be live on your club\'s own site before submitting</span></div>'
    +'<div class="form-group span2"><label>Closing Date &amp; Time</label>'
    +'<div class="datetime-row"><input type="date" id="sfClosingDate"><input type="time" id="sfClosingTime" value="17:00"></div>'
    +'<label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px;font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;">'
    +'<input type="checkbox" id="sfNoTime" onchange="onNoTimeToggle(\'sfClosingTime\',this.checked)"> No specific time — expires end of day</label></div>'
    +submitterSection
    +'</div>'
    +'<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">'
    +'<button class="btn btn--ghost" onclick="closeModal(\'submitModal\')">Cancel</button>'
    +'<button class="btn btn--accent" id="sfSubmitBtn" onclick="doSubmit()"'+(STATE.submitIsAuthed?'':' disabled')+'>Submit Vacancy</button>'
    +'</div>';

  // Wire up code input for external users
  if(!STATE.submitIsAuthed){
    setTimeout(function(){
      var ci=document.getElementById('sfCode');
      if(ci) ci.addEventListener('input',function(){
        this.value=this.value.replace(/\D/g,'').slice(0,4);
        if(this.value.length===4) verifySubmitCode(this.value);
      });
    },50);
  }
}

function updateDescCount(){
  var ta=document.getElementById('sfDesc'), el=document.getElementById('sfDescCount');
  if(!ta||!el) return;
  var n=ta.value.length;
  el.textContent=n.toLocaleString()+' / 1,000';
  el.style.color=n>=950?'var(--red)':n>=800?'var(--amber)':'var(--text-muted)';
}

function sendSubmitCode(){
  var email=document.getElementById('sfEmail').value.trim();
  var name=document.getElementById('sfName').value.trim();
  var role=document.getElementById('sfRole').value.trim();
  if(!name){NL.toast('Please enter your name first.','error');return;}
  if(!role){NL.toast('Please enter your role.','error');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){NL.toast('Please enter a valid email address.','error');return;}
  var btn=document.getElementById('sfSendCodeBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Sending…';
  gasPost({action:'vacancies_requestCode',email:email})
    .then(function(r){
      if(r.error) throw new Error(r.error);
      document.getElementById('sfCodeGroup').style.display='';
      startCodeCountdown();
      btn.textContent='Resend Code';btn.disabled=false;
    })
    .catch(function(e){NL.toast(e.message,'error');btn.textContent='Send Code';btn.disabled=false;});
}

function startCodeCountdown(){
  var el=document.getElementById('sfCountdown'); if(!el) return;
  el.style.display='block';el.style.color='var(--text-muted)';
  var secs=600;
  if(STATE.submitCountdownInt) clearInterval(STATE.submitCountdownInt);
  function tick(){
    if(!document.getElementById('sfCountdown')){clearInterval(STATE.submitCountdownInt);return;}
    if(secs<=0){clearInterval(STATE.submitCountdownInt);el.textContent='Code expired — request a new one.';el.style.color='var(--red)';STATE.submitCodeVerified=false;var sb=document.getElementById('sfSubmitBtn');if(sb)sb.disabled=true;return;}
    var m=Math.floor(secs/60),s=secs%60;
    el.textContent='Code expires in '+m+':'+String(s).padStart(2,'0');
    secs--;
  }
  tick();STATE.submitCountdownInt=setInterval(tick,1000);
}

function verifySubmitCode(code){
  var email=document.getElementById('sfEmail').value.trim();
  var status=document.getElementById('sfCodeStatus');
  if(code.length===4&&/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    status.className='code-status ok';status.textContent='✓ Code entered — submit when ready.';
    STATE.submitCodeVerified=true;
    var btn=document.getElementById('sfSubmitBtn');if(btn)btn.disabled=false;
  }
}

function doSubmit(){
  var club=document.getElementById('sfClub').value.trim();
  var title=document.getElementById('sfTitle').value.trim();
  var liveUrl=document.getElementById('sfLiveUrl').value.trim();
  var email=document.getElementById('sfEmail').value.trim();
  var name=document.getElementById('sfName').value.trim();
  var role=document.getElementById('sfRole').value.trim();
  if(!club){NL.toast('Club is required.','error');return;}
  if(!title){NL.toast('Job title is required.','error');return;}
  if(!liveUrl){NL.toast('Live listing URL is required.','error');return;}
  if(!STATE.submitIsAuthed){
    var code=document.getElementById('sfCode').value.trim();
    if(!STATE.submitCodeVerified||code.length!==4){NL.toast('Please verify your email first.','error');return;}
  }
  var btn=document.getElementById('sfSubmitBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Submitting…';

  // For authed portal users we bypass GAS verification — write directly
  // submitterRole uses jobTitle from session for portal users
  var payload={
    'Club':club,'Job Title':title,
    'Location':document.getElementById('sfLocation').value.trim(),
    'Vacancy Type':document.getElementById('sfType').value,
    'Department':document.getElementById('sfDept').value.trim(),
    'Salary':document.getElementById('sfSalary').value.trim(),
    'Description':document.getElementById('sfDesc').value.trim(),
    'Closing Date':buildClosingStr('sfClosingDate','sfClosingTime','sfNoTime'),
    'Live Listing URL':liveUrl,
    submitterName:name, submitterEmail:email, submitterRole:role,
  };

  if(STATE.submitIsAuthed){
    payload.action = 'vacancies_submitAuthed';
    payload.uid    = STATE.session.uid;
  } else {
    payload.action = 'vacancies_submit';
    payload.code   = document.getElementById('sfCode').value.trim();
  }

  gasPost(payload)
    .then(function(r){
      if(r.error) throw new Error(r.error);
      if(STATE.submitCountdownInt) clearInterval(STATE.submitCountdownInt);
      document.getElementById('submitModalBody').innerHTML=
        '<div class="success-screen">'
        +'<div class="success-screen__icon">✅</div>'
        +'<h2>Submission Received</h2>'
        +'<p>Thank you — your vacancy has been submitted for review by NL staff.</p>'
        +'</div>';
      if(STATE.isAdmin) loadSubs();
    })
    .catch(function(e){NL.toast(e.message,'error');btn.disabled=false;btn.textContent='Submit Vacancy';STATE.submitCodeVerified=false;});
}

/* ── Club picker (generic, takes IDs) ── */
function loadClubs(){
  fetch(CLUBS_URL).then(function(r){return r.json();}).then(function(d){STATE.clubs=d.clubs||[];}).catch(function(){});
}
function onClubInput(inputId,dropId,crestId,val){
  var dd=document.getElementById(dropId);if(!dd)return;
  if(!val.trim()){dd.classList.remove('open');updatePickerCrest(crestId,'');return;}
  var lower=val.toLowerCase();
  var matches=STATE.clubs.filter(function(c){return c.name.toLowerCase().indexOf(lower)!==-1||(c.short&&c.short.toLowerCase().indexOf(lower)!==-1);}).slice(0,10);
  var html=matches.map(function(c){
    var cr=CREST_BASE+encodeURIComponent(c.name)+'.png';
    return '<div class="club-picker__option" onmousedown="selectClub(\''+inputId+'\',\''+dropId+'\',\''+crestId+'\',\''+NL.escJ(c.name)+'\',\''+NL.escJ(cr)+'\')">'
      +'<img src="'+esc(cr)+'" onerror="this.src=\''+FALLBACK+'\'">'
      +'<span class="club-picker__option-name">'+esc(c.name)+'</span>'
      +'<span class="club-picker__option-div">'+esc(c.division||'')+'</span></div>';
  }).join('');
  html+='<div class="club-picker__freetext" onmousedown="selectClub(\''+inputId+'\',\''+dropId+'\',\''+crestId+'\',\''+NL.escJ(val)+'\',\'\')">Use "'+esc(val)+'" as entered</div>';
  dd.innerHTML=html;dd.classList.add('open');
}
function selectClub(inputId,dropId,crestId,name,cr){
  var el=document.getElementById(inputId);if(el)el.value=name;
  updatePickerCrest(crestId,cr||(CREST_BASE+encodeURIComponent(name)+'.png'));
  closeDropdown(dropId);
}
function updatePickerCrest(id,url){
  var img=document.getElementById(id);if(!img)return;
  img.src=url||FALLBACK;img.onerror=function(){this.src=FALLBACK;};
}
function closeDropdown(id){var el=document.getElementById(id);if(el)el.classList.remove('open');}

/* ── Date helpers ── */

function fmtDT(d){
  var dy=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return dy[d.getDay()]+' '+d.getDate()+' '+mo[d.getMonth()]+' '+d.getFullYear()+', '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function onNoTimeToggle(timeId,checked){var ti=document.getElementById(timeId);if(!ti)return;ti.disabled=checked;ti.style.opacity=checked?'0.35':'1';}
function buildClosingStr(dateId,timeId,noTimeId){
  var dv=document.getElementById(dateId);if(!dv||!dv.value)return '';
  var noTime=noTimeId&&document.getElementById(noTimeId)&&document.getElementById(noTimeId).checked;
  var tv=noTime?'23:59':(document.getElementById(timeId).value||'23:59');
  var p=dv.value.split('-');return p[2]+'/'+p[1]+'/'+p[0]+' '+tv;
}
function setClosingFields(dateId,timeId,noTimeId,str){
  var di=document.getElementById(dateId),ti=document.getElementById(timeId);
  if(!di)return;
  if(!str){di.value='';if(ti)ti.value='17:00';if(noTimeId){document.getElementById(noTimeId).checked=false;onNoTimeToggle(timeId,false);}return;}
  var d=NL.parseDate(str);if(!d){di.value='';if(ti)ti.value='17:00';return;}
  di.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var eod=d.getHours()===23&&d.getMinutes()===59;
  if(noTimeId){
    document.getElementById(noTimeId).checked=eod;
    onNoTimeToggle(timeId,eod);
  }
  if(!eod&&ti) ti.value=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

/* ── Modals / Toast / Helpers ── */
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

</script>
</body>
</html>
