<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Emoji-style robot inspired by Claudio Ranieri">
  <!-- head -->
  <rect x="136" y="88" width="240" height="220" rx="56" fill="#BFC7D1" stroke="#6D7884" stroke-width="6"></rect>

  <!-- antenna -->
  <line x1="256" y1="58" x2="256" y2="88" stroke="#6D7884" stroke-width="8" stroke-linecap="round"></line>
  <circle cx="256" cy="42" r="16" fill="#E74C3C" stroke="#A93226" stroke-width="4"></circle>

  <!-- ears -->
  <rect x="114" y="158" width="22" height="68" rx="10" fill="#8E99A5" stroke="#6D7884" stroke-width="4"></rect>
  <rect x="376" y="158" width="22" height="68" rx="10" fill="#8E99A5" stroke="#6D7884" stroke-width="4"></rect>

  <!-- glasses -->
  <rect x="170" y="144" width="68" height="50" rx="14" fill="#EAF2F8" fill-opacity="0.45" stroke="#2F3740" stroke-width="7"></rect>
  <rect x="274" y="144" width="68" height="50" rx="14" fill="#EAF2F8" fill-opacity="0.45" stroke="#2F3740" stroke-width="7"></rect>
  <rect x="238" y="160" width="36" height="8" rx="4" fill="#2F3740"></rect>

  <!-- eyebrows -->
  <line x1="180" y1="128" x2="228" y2="121" stroke="#7A858F" stroke-width="7" stroke-linecap="round"></line>
  <line x1="284" y1="121" x2="332" y2="128" stroke="#7A858F" stroke-width="7" stroke-linecap="round"></line>

  <!-- eyes -->
  <circle cx="204" cy="169" r="11" fill="#2F3740"></circle>
  <circle cx="308" cy="169" r="11" fill="#2F3740"></circle>
  <circle cx="200" cy="165" r="3.5" fill="#fff"></circle>
  <circle cx="304" cy="165" r="3.5" fill="#fff"></circle>

  <!-- nose -->
  <rect x="245" y="178" width="22" height="38" rx="9" fill="#8E99A5" stroke="#6D7884" stroke-width="4"></rect>

  <!-- moustache -->
  <path d="M208 227c16-12 35-13 48-2c13-11 32-10 48 2c-9 11-22 17-34 17c-7 0-11-2-14-4c-3 2-7 4-14 4c-12 0-25-6-34-17z" fill="#E3E8ED" stroke="#8A949E" stroke-width="4"></path>

  <!-- mouth -->
  <path d="M218 255c12 11 25 17 38 17s26-6 38-17" fill="none" stroke="#4F5D6A" stroke-width="7" stroke-linecap="round"></path>

  <!-- cheek plates -->
  <circle cx="176" cy="229" r="12" fill="#D9A0AA" fill-opacity="0.35"></circle>
  <circle cx="336" cy="229" r="12" fill="#D9A0AA" fill-opacity="0.35"></circle>

  <!-- side hair hints -->
  <path d="M150 130c-10 7-16 17-16 28c0 5 1 9 3 13c6-10 15-18 27-23z" fill="#E6EBF0" stroke="#9AA5AF" stroke-width="3"></path>
  <path d="M362 130c10 7 16 17 16 28c0 5-1 9-3 13c-6-10-15-18-27-23z" fill="#E6EBF0" stroke="#9AA5AF" stroke-width="3"></path>

  <!-- shoulders cut-off -->
  <path d="M178 308h156c22 0 40 18 40 40v20H138v-20c0-22 18-40 40-40z" fill="#2E4E86"></path>
  <path d="M224 308h64l10 60h-84z" fill="#F7F7F7"></path>
  <path d="M242 308h28l6 60h-40z" fill="#243447"></path>
</svg>