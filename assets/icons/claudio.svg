<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Emoji-style robot inspired by Claudio Ranieri">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7f7"></stop>
      <stop offset="100%" stop-color="#dfe6ee"></stop>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfd6de"></stop>
      <stop offset="100%" stop-color="#97a6b5"></stop>
    </linearGradient>
    <linearGradient id="metalDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8e9aa7"></stop>
      <stop offset="100%" stop-color="#64717d"></stop>
    </linearGradient>
    <linearGradient id="blueSuit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#324e7d"></stop>
      <stop offset="100%" stop-color="#213554"></stop>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"></feDropShadow>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"></rect>

  <!-- shoulders -->
  <g filter="url(#shadow)">
    <path d="M118 385c18-39 56-65 102-65h72c46 0 84 26 102 65l18 38H100z" fill="url(#blueSuit)"></path>
    <path d="M215 320h82l18 59h-118z" fill="#ffffff"></path>
    <path d="M235 320h42l8 59h-58z" fill="#1e2a38"></path>
    <polygon points="256,336 272,356 256,376 240,356" fill="#274b8f"></polygon>
  </g>

  <!-- neck -->
  <rect x="224" y="294" width="64" height="30" rx="12" fill="url(#metalDark)" stroke="#56616d" stroke-width="4"></rect>

  <!-- head -->
  <g filter="url(#shadow)">
    <rect x="126" y="92" width="260" height="214" rx="62" fill="url(#metal)" stroke="#6f7c88" stroke-width="6"></rect>
    
    <!-- antenna -->
    <line x1="256" y1="60" x2="256" y2="92" stroke="#6f7c88" stroke-width="10" stroke-linecap="round"></line>
    <circle cx="256" cy="47" r="18" fill="#e64b4b" stroke="#9e2323" stroke-width="5"></circle>
    
    <!-- ears -->
    <rect x="103" y="154" width="25" height="72" rx="10" fill="url(#metalDark)" stroke="#56616d" stroke-width="4"></rect>
    <rect x="384" y="154" width="25" height="72" rx="10" fill="url(#metalDark)" stroke="#56616d" stroke-width="4"></rect>
  </g>

  <!-- glasses -->
  <g>
    <rect x="165" y="142" width="76" height="54" rx="16" fill="#f7fbff" fill-opacity="0.55" stroke="#2f3740" stroke-width="8"></rect>
    <rect x="271" y="142" width="76" height="54" rx="16" fill="#f7fbff" fill-opacity="0.55" stroke="#2f3740" stroke-width="8"></rect>
    <rect x="241" y="160" width="30" height="10" rx="5" fill="#2f3740"></rect>
  </g>

  <!-- eyes -->
  <g>
    <circle cx="203" cy="169" r="12" fill="#2e3a46"></circle>
    <circle cx="309" cy="169" r="12" fill="#2e3a46"></circle>
    <circle cx="199" cy="165" r="4" fill="#ffffff"></circle>
    <circle cx="305" cy="165" r="4" fill="#ffffff"></circle>
  </g>

  <!-- eyebrows: slightly arched, expressive -->
  <g stroke="#6d7782" stroke-width="8" stroke-linecap="round">
    <line x1="176" y1="128" x2="226" y2="120"></line>
    <line x1="286" y1="120" x2="336" y2="128"></line>
  </g>

  <!-- nose -->
  <rect x="244" y="176" width="24" height="42" rx="10" fill="url(#metalDark)" stroke="#56616d" stroke-width="4"></rect>

  <!-- moustache, Claudio-ish -->
  <g>
    <path d="M203 226c18-16 42-18 53-2 11-16 35-14 53 2-9 12-23 19-36 19-8 0-13-2-17-5-4 3-9 5-17 5-13 0-27-7-36-19z" fill="#d7dde3" stroke="#7f8b96" stroke-width="4" stroke-linejoin="round"></path>
  </g>

  <!-- smile -->
  <path d="M212 252c14 14 31 21 44 21s30-7 44-21" fill="none" stroke="#4c5c6b" stroke-width="8" stroke-linecap="round"></path>

  <!-- rosy emoji cheeks -->
  <circle cx="172" cy="230" r="16" fill="#ff9cad" fill-opacity="0.45"></circle>
  <circle cx="340" cy="230" r="16" fill="#ff9cad" fill-opacity="0.45"></circle>

  <!-- hair side tufts / older silver look -->
  <g fill="#e7edf2" stroke="#95a2af" stroke-width="4">
    <path d="M147 127c-14 10-21 23-21 38 0 8 2 14 5 20 8-15 20-26 35-33z"></path>
    <path d="M365 127c14 10 21 23 21 38 0 8-2 14-5 20-8-15-20-26-35-33z"></path>
  </g>

  <!-- little lapel pin hint -->
  <circle cx="340" cy="368" r="7" fill="#f0c419"></circle>
</svg>