name: Build Club News JSON (v1.20)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *" # every 20 minutes

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser lxml

      - name: Build club-news.json
        run: |
          python scripts/build_club_news.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/club-news.json
          git commit -m "Update club-news.json (v1.20)"
          git push
