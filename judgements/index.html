<!--
  Judgements & Decisions — NL Tools Portal
  v2.0 | 17/04/2026
  Changelog:
    v1.4 — Fixed write permission_denied. When auth guard uses cached session,
           Firebase Auth isn't signed in yet. Added ensureAuth() wrapper that
           waits for onAuthStateChanged before any write operation.
    v1.3 — Fixed permission_denied crash. nlAuthReady now reads role/tools
           from the session object passed by auth guard instead of making
           a redundant Firebase read (which fails when using cached session).
    v1.2 — Fixed Firebase init order. initializeApp() now called before
           auth-guard.js loads. Was causing "No Firebase App" crash.
    v1.1 — Fixed tool key to ops-judgements (was ao-judgements).
           Admin check now handles both access formats: object {access,admin}
           and flat string ("admin"/"access"/"hidden"/"off").
    v1.0 — Initial build. Admin add/edit/delete + read-only portal view.
           Club picker with autocomplete. Firebase RTDB backend.
           Auth guard integration. Type 3 tool (staff publish, clubs read).
-->

<style>
@font-face {
  font-family: "carbona-variable";
  src: url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #9e0000;
  --primary-dim: #7a0000;
  --navy: #223b7c;
  --navy-mid: #1a2f63;
  --navy-light: #2a4a8c;
  --red: #c0392b;
  --red-light: #fdf0ef;
  --green: #1e7e34;

  --white: #ffffff;
  --off-white: #f4f6f9;
  --text: #1a2a44;

  --border: #dde3ed;

  --shadow: 0 2px 12px rgba(10,22,40,0.10);
  --font: 'carbona-variable','carbona',sans-serif;
}
body {
  font-family: var(--font);
  font-size: 17px;
  line-height: 1.5;
  font-variation-settings: 'wght' 400;
  color: var(--text);
  background: var(--off-white);
}

/* Topbar */








/* Main container */
.main { max-width: 1200px; margin: 0 auto; padding: 32px 20px 70px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 16px; border-radius: var(--radius);
  font-size: 11px; font-weight: 900; font-variation-settings: 'wght' 900;
  text-transform: uppercase; letter-spacing: 0.08em;
  cursor: pointer; border: none; font-family: var(--font);
  transition: background 0.15s; white-space: nowrap;
}
.btn--primary { background: var(--primary); color: var(--white); }
.btn--navy { background: var(--navy); color: var(--white); }
.btn--danger { background: var(--red-light); color: var(--red); border: 1px solid #f5c6c2; }
.btn--ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
.btn--primary:hover:not(:disabled) { background: var(--primary-dim); }
.btn--navy:hover:not(:disabled) { background: var(--navy-mid); }
.btn--danger:hover:not(:disabled) { background: #fae0de; }
.btn--ghost:hover:not(:disabled) { background: var(--off-white); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn--sm { padding: 5px 12px; font-size: 10px; }

/* Pills */
.pill {
  display: inline-block; padding: 3px 8px; border-radius: 12px;
  font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800;
  white-space: nowrap; text-transform: uppercase; letter-spacing: 0.06em;
}
.pill--live { background: var(--green-light); color: var(--green); }
.pill--expired { background: var(--red-light); color: var(--red); }
.pill--soon { background: var(--amber-light); color: var(--amber); }

/* Table */
.table-wrap { overflow-x: auto; }
.table {
  width: 100%; border-collapse: collapse; background: var(--white);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow); border: 1px solid var(--border); font-size: 15px;
}
.table th {
  background: var(--navy); color: var(--white);
  font-weight: 800; font-variation-settings: 'wght' 800;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  padding: 14px 16px; text-align: left; white-space: nowrap;
}
.table td { padding: 14px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--off-white); }
.table .actions { display: flex; gap: 6px; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 28px; }
@media (max-width: 600px) { .stats { grid-template-columns: 1fr; } }
.stat {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 16px;
  text-align: center; box-shadow: var(--shadow);
}
.stat__num { font-size: 44px; font-weight: 900; font-variation-settings: 'wght' 900; line-height: 1; margin-bottom: 6px; }
.stat__label { font-size: 10px; color: var(--text-muted); font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; }

/* Header row */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
.page-header h2 { font-size: 22px; font-weight: 900; font-variation-settings: 'wght' 900; text-transform: uppercase; letter-spacing: 0.02em; }

/* Form panel */
.form-panel {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px; margin-bottom: 28px;
  box-shadow: var(--shadow); display: none;
}
.form-panel.open { display: block; }
.form-panel h3 {
  font-size: 14px; font-weight: 900; font-variation-settings: 'wght' 900;
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 20px;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-row--full { grid-template-columns: 1fr; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
.form-group label {
  display: block; font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800;
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);

}
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 15px; font-family: var(--font);

.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(158,0,0,0.10);

.form-actions { display: flex; gap: 10px; margin-top: 20px; }

/* Club picker */
.club-picker { position: relative; }
.club-picker__wrap {
  display: flex; align-items: center; gap: 10px;
  border: 1px solid var(--border); border-radius: var(--radius);

.club-picker__wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(158,0,0,0.10); }
.club-picker__crest { width: 32px; height: 32px; object-fit: contain; flex-shrink: 0; }

.toast {

  padding: 12px 18px; border-radius: var(--radius);
  font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800;

}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 4px solid var(--green); }
.toast.error { border-left: 4px solid var(--red); }

<script>
/* ── State ── */
var STATE = {
  uid: null,
  isAdmin: false,
  clubs: [],
  records: [],
  deleteId: null
};

var CREST_BASE = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/';
var FALLBACK_CREST = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png';
var CLUBS_META_URL = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/data/clubs-meta.json';

/* ── Auth callback — called by auth-guard.js once access is confirmed ── */

/* Standard topbar wiring — set user name and bind sign out */
function wireTopbar(session) {
  var userEl = document.getElementById('topbarUser');
  if (userEl) userEl.textContent = session && (session.name || session.email) || '';
  var btn = document.getElementById('signOutBtn');
  if (btn) {
    btn.addEventListener('click', function() {
      firebase.auth().signOut().then(function() { window.location.replace('/tools/'); });
    });
  }
}

window.nlAuthReady = function(session) {
  STATE.uid = session.uid;

  // Determine admin status from session data (already loaded by auth guard)
  var role = session.role || '';
  var toolEntry = session.tools && session.tools[NL_TOOL_KEY];
  var toolAdmin = false;
  if (toolEntry && typeof toolEntry === 'object') {
    toolAdmin = !!toolEntry.admin;
  } else if (typeof toolEntry === 'string') {
    toolAdmin = (toolEntry === 'admin');
  }
  STATE.isAdmin = (role === 'superadmin' || role === 'admin' || toolAdmin);

  if (STATE.isAdmin) {
    document.getElementById('btnAdd').style.display = '';
    document.getElementById('colActions').style.display = '';
    document.getElementById('statsPanel').style.display = '';
  }

  loadClubs();
  listenForRecords();
};

/* ── Load clubs meta ── */
function loadClubs() {
  fetch(CLUBS_META_URL + '?cb=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      STATE.clubs = data.clubs || [];
    })
    .catch(function(err) {
      console.warn('Failed to load clubs-meta:', err);
    });
}

/* ── Listen for records (realtime) ── */
function listenForRecords() {
  var db = firebase.database();
  db.ref('app-data/ops-judgements/records').on('value', function(snap) {
    var val = snap.val();
    STATE.records = [];
    if (val && typeof val === 'object') {
      Object.keys(val).forEach(function(key) {
        var r = val[key];
        r.id = key;
        STATE.records.push(r);
      });
    }
    // Sort by start date descending (newest first) for admin view
    STATE.records.sort(function(a, b) {
      return (b.startDate || '').localeCompare(a.startDate || '');
    });
    renderTable();
    renderStats();
  });
}

/* ── Render table ── */
function renderTable() {
  var tbody = document.getElementById('tableBody');
  if (STATE.records.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="empty-state__icon">⚖️</div><div class="empty-state__msg">No records yet</div></td></tr>';
    return;
  }

  var today = new Date();
  today.setHours(0, 0, 0, 0);

  var html = STATE.records.map(function(r) {
    var status = getStatus(r, today);
    var pillClass = status === 'Active' ? 'pill--live' : 'pill--expired';

    var endDisplay = r.endDate ? formatDate(r.endDate) : '<span style="color:var(--amber);font-weight:700;">Unresolved</span>';

    var actionsHtml = '';
    if (STATE.isAdmin) {
      actionsHtml = '<td><div class="actions">'
        + '<button class="btn btn--ghost btn--sm" onclick="editRecord(\'' + esc(r.id) + '\')">Edit</button>'
        + '<button class="btn btn--danger btn--sm" onclick="openDeleteModal(\'' + esc(r.id) + '\')">Delete</button>'
        + '</div></td>';
    }

    return '<tr>'
      + '<td style="font-weight:700;">' + esc(r.club || '') + '</td>'
      + '<td>' + esc(r.rule || '') + '</td>'
      + '<td style="white-space:nowrap;">' + formatDate(r.startDate) + '</td>'
      + '<td style="white-space:nowrap;">' + endDisplay + '</td>'
      + '<td><span class="pill ' + pillClass + '">' + esc(status) + '</span></td>'
      + actionsHtml
      + '</tr>';
  }).join('');

  tbody.innerHTML = html;
}

/* ── Status helper ── */
function getStatus(r, today) {
  if (!r.endDate) return 'Active';
  var end = parseDate(r.endDate);
  return end >= today ? 'Active' : 'Resolved';
}

/* ── Render stats ── */
function renderStats() {
  if (!STATE.isAdmin) return;
  var today = new Date();
  today.setHours(0, 0, 0, 0);

  var active = 0;
  var clubSet = {};
  STATE.records.forEach(function(r) {
    if (getStatus(r, today) === 'Active') active++;
    if (r.club) clubSet[r.club] = true;
  });

  document.getElementById('statActive').textContent = active;
  document.getElementById('statTotal').textContent = STATE.records.length;
  document.getElementById('statClubs').textContent = Object.keys(clubSet).length;
}

/* ── Form open/close ── */
function openForm(id) {
  var panel = document.getElementById('formPanel');
  panel.classList.add('open');

  if (id) {
    // Edit mode
    var r = STATE.records.find(function(rec) { return rec.id === id; });
    if (!r) return;
    document.getElementById('formTitle').textContent = 'Edit record';
    document.getElementById('editId').value = id;
    document.getElementById('clubInput').value = r.club || '';
    document.getElementById('ruleInput').value = r.rule || '';
    document.getElementById('startInput').value = r.startDate || '';
    document.getElementById('endInput').value = r.endDate || '';
    updatePickerCrest(r.club ? (CREST_BASE + encodeURIComponent(r.club) + '.png') : '');
  } else {
    // Add mode
    document.getElementById('formTitle').textContent = 'Add new record';
    document.getElementById('editId').value = '';
    document.getElementById('clubInput').value = '';
    document.getElementById('ruleInput').value = '';
    document.getElementById('startInput').value = '';
    document.getElementById('endInput').value = '';
    updatePickerCrest('');
  }

  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeForm() {
  document.getElementById('formPanel').classList.remove('open');
  document.getElementById('editId').value = '';
}

/* ── Ensure Firebase Auth is ready (cached session may not have live auth) ── */
function ensureAuth() {
  return new Promise(function(resolve, reject) {
    var user = firebase.auth().currentUser;
    if (user) { resolve(user); return; }
    // Wait for auth state to resolve
    var unsubscribe = firebase.auth().onAuthStateChanged(function(u) {
      unsubscribe();
      if (u) { resolve(u); }
      else { reject(new Error('Not authenticated')); }
    });
  });
}

/* ── Save record ── */
function saveRecord() {
  var club = document.getElementById('clubInput').value.trim();
  var rule = document.getElementById('ruleInput').value.trim();
  var startDate = document.getElementById('startInput').value;
  var endDate = document.getElementById('endInput').value;
  var editId = document.getElementById('editId').value;

  if (!club) { showToast('Please select a club', 'error'); return; }
  if (!rule) { showToast('Please enter the rule breached', 'error'); return; }
  if (!startDate) { showToast('Please enter a start date', 'error'); return; }

  var data = {
    club: club,
    rule: rule,
    startDate: startDate,
    endDate: endDate || '',
    updatedAt: new Date().toISOString(),
    updatedBy: STATE.uid
  };

  ensureAuth().then(function() {
    var db = firebase.database();
    var promise;

    if (editId) {
      promise = db.ref('app-data/ops-judgements/records/' + editId).update(data);
    } else {
      data.createdAt = new Date().toISOString();
      data.createdBy = STATE.uid;
      promise = db.ref('app-data/ops-judgements/records').push(data);
    }

    return promise;
  }).then(function() {
    showToast(editId ? 'Record updated' : 'Record added', 'success');
    closeForm();
  }).catch(function(err) {
    showToast('Error: ' + err.message, 'error');
  });
}

/* ── Edit record ── */
function editRecord(id) {
  openForm(id);
}

/* ── Delete record ── */
function openDeleteModal(id) {
  STATE.deleteId = id;
  var r = STATE.records.find(function(rec) { return rec.id === id; });
  document.getElementById('deleteMsg').textContent = 'Delete the record for ' + (r ? r.club : 'this club') + '?';
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('open');
  STATE.deleteId = null;
}

function confirmDelete() {
  if (!STATE.deleteId) return;
  var id = STATE.deleteId;
  ensureAuth().then(function() {
    return firebase.database().ref('judgements/' + id).remove();
  }).then(function() {
    showToast('Record deleted', 'success');
    closeDeleteModal();
  }).catch(function(err) {
    showToast('Error: ' + err.message, 'error');
    closeDeleteModal();
  });
}

/* ── Club picker ── */
function onClubInput(val) {
  var dd = document.getElementById('clubDropdown');
  if (!val.trim()) { dd.classList.remove('open'); updatePickerCrest(''); return; }
  var lower = val.toLowerCase();
  var matches = STATE.clubs.filter(function(c) {
    return c.name.toLowerCase().indexOf(lower) !== -1 || (c.short && c.short.toLowerCase().indexOf(lower) !== -1);
  }).slice(0, 10);
  var html = matches.map(function(c) {
    var cr = CREST_BASE + encodeURIComponent(c.name) + '.png';
    return '<div class="club-picker__option" onmousedown="selectClub(\'' + escJ(c.name) + '\',\'' + escJ(cr) + '\')">'
      + '<img src="' + esc(cr) + '" onerror="this.onerror=null;this.src=\'' + FALLBACK_CREST + '\'">'
      + '<span class="club-picker__option-name">' + esc(c.name) + '</span>'
      + '<span class="club-picker__option-div">' + esc(c.division || '') + '</span>'
      + '</div>';
  }).join('');
  html += '<div class="club-picker__freetext" onmousedown="selectClub(\'' + escJ(val) + '\',\'\')">Use "' + esc(val) + '" as entered</div>';
  dd.innerHTML = html; dd.classList.add('open');
}

function selectClub(name, cr) {
  document.getElementById('clubInput').value = name;
  updatePickerCrest(cr || (CREST_BASE + encodeURIComponent(name) + '.png'));
  closeDropdown();
}

function updatePickerCrest(url) {
  var img = document.getElementById('pickerCrest');
  img.onerror = function() { this.onerror = null; this.src = FALLBACK_CREST; };
  img.src = url || FALLBACK_CREST;
}

function closeDropdown() { document.getElementById('clubDropdown').classList.remove('open'); }

/* ── Date helpers ── */
function parseDate(str) {
  var parts = str.split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
}

function formatDate(str) {
  if (!str) return '—';
  var d = parseDate(str);
  var day = d.getDate();
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return day + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

/* ── Toast ── */
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success') + ' show';
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}

/* ── Escape helpers ── */
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function escJ(s) { return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

/* ── Logout ── */
);
}
