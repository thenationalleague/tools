<!DOCTYPE html>
<html lang="en">
<head>
<!--
  NL Tools — Judgements & Decisions
  Version: 2.3
  Date: 17/04/2026

  CHANGELOG
  v2.3 (17/04/2026)
    - Added NL_CHANGELOG — clickable version badge opens "What's new" modal.

  v2.2 (17/04/2026)
    - Fixed status pill colouring: Active = amber (being enforced, ongoing),
      Resolved = green (cleared, positive outcome). Was Active=green,
      Resolved=red, which read as "error state" for resolved records.

  v2.1 (17/04/2026)
    - Fixed stat card colouring: Active Breaches only turns red when count > 0
      (was amber regardless). Total Records and Clubs Affected use navy (neutral).
    - Moved from inline style="color:..." to .stat--modifier class pattern
      matching vacancies convention.

  v2.0 (17/04/2026)
    - System file migration: loads /tools/system/nl-brand.css, nl-utils.js,
      nl-topbar.js, and auth-guard.js
    - Topbar reduced to <div id="nlTopbar"></div> (auto-rendered from NL_TOOL)
    - RTDB path updated: 'judgements' → 'app-data/ops-judgements/records'
    - Utility calls migrated to NL namespace: NL.toast, NL.escHtml, NL.escJ,
      NL.parseDate, NL.ensureAuth, NL.writeAudit
    - Removed duplicated CSS (topbar, stats, table, buttons, pills, modal,
      form-group, toast — all now in nl-brand.css)
    - Removed duplicated JS helpers (showToast, esc, escJ, parseDate,
      ensureAuth, doLogout — all on NL namespace)
    - Delete modal upgraded to .modal-backdrop pattern (matches vacancies)
    - Audit logging added for add/edit/delete

  v1.4 (08/04/2026) — Fixed write permission_denied via ensureAuth wrapper.
  v1.3 — nlAuthReady reads role/tools from session (not redundant Firebase read).
  v1.2 — Fixed Firebase init order.
  v1.1 — Fixed tool key to ops-judgements. Handles both access formats.
  v1.0 — Initial build.
-->

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judgements & Decisions — NL Tools</title>

<link rel="stylesheet" href="/tools/system/nl-brand.css?v=9">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
/* ────────────────────────────────────────────────────────────────
   Judgements-specific styles only.
   All shared patterns (topbar, stats, table, buttons, pills, modal,
   form-group, toast, spinner, section-head) live in nl-brand.css.
   ──────────────────────────────────────────────────────────────── */

/* Stat colour modifiers — only active breaches carries meaning */
.stat--active.has-active .stat__num { color: var(--red); }
.stat--active .stat__num             { color: var(--text); }
.stat--total .stat__num              { color: var(--navy); }
.stat--clubs .stat__num              { color: var(--navy); }

/* Page header */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.page-header h2 {
  font-size: 18px;
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  text-transform: uppercase;
  color: var(--navy);
  letter-spacing: 0.04em;
}

/* Form panel (collapses in/out) */
.form-panel {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 28px;
  box-shadow: var(--shadow);
  display: none;
}
.form-panel.open { display: block; }
.form-panel h3 {
  font-size: 14px;
  font-weight: 900;
  font-variation-settings: 'wght' 900;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 20px;
  color: var(--navy);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.form-row--full { grid-template-columns: 1fr; }
@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
}
.form-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}

/* Empty state (inside table tbody) */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state__icon {
  font-size: 40px;
  margin-bottom: 10px;
}
.empty-state__msg {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* Row actions */
.table .actions {
  display: flex;
  gap: 6px;
  white-space: nowrap;
}

/* Club picker (tool-specific — candidate for later extraction when other tools use) */
.club-picker { position: relative; }
.club-picker__wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 12px;
  background: var(--white);
  transition: border-color 0.15s;
}
.club-picker__wrap:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(158,0,0,0.10);
}
.club-picker__crest {
  width: 32px;
  height: 32px;
  object-fit: contain;
  flex-shrink: 0;
}
.club-picker__input {
  flex: 1;
  border: none !important;
  padding: 0 !important;
  font-size: 15px;
  outline: none;
  background: transparent;
  font-family: var(--font);
  font-variation-settings: 'wght' 400;
}
.club-picker__dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  z-index: 50;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-height: 240px;
  overflow-y: auto;
  display: none;
  margin-top: 2px;
}
.club-picker__dropdown.open { display: block; }
.club-picker__option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
}
.club-picker__option:last-child { border-bottom: none; }
.club-picker__option:hover { background: var(--off-white); }
.club-picker__option img {
  width: 28px;
  height: 28px;
  object-fit: contain;
}
.club-picker__option-name {
  flex: 1;
  font-weight: 600;
  font-variation-settings: 'wght' 600;
}
.club-picker__option-div {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
}
.club-picker__freetext {
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
  cursor: pointer;
  border-top: 1px solid var(--border);
  background: var(--off-white);
}
.club-picker__freetext:hover { background: #eaeef4; }
</style>
</head>
<body>

<div id="pageWrap" style="display:none;">

  <div id="nlTopbar"></div>

  <div class="main">

    <!-- Stats (admin only) -->
    <div class="stats" id="statsPanel" style="display:none;">
      <div class="stat stat--active">
        <div class="stat__num" id="statActive">0</div>
        <div class="stat__label">Active breaches</div>
      </div>
      <div class="stat stat--total">
        <div class="stat__num" id="statTotal">0</div>
        <div class="stat__label">Total records</div>
      </div>
      <div class="stat stat--clubs">
        <div class="stat__num" id="statClubs">0</div>
        <div class="stat__label">Clubs affected</div>
      </div>
    </div>

    <!-- Header + Add button -->
    <div class="page-header">
      <h2>All records</h2>
      <button class="btn btn--primary" id="btnAdd" style="display:none;" onclick="openForm()">+ Add record</button>
    </div>

    <!-- Add/Edit form panel (admin only) -->
    <div class="form-panel" id="formPanel">
      <h3 id="formTitle">Add new record</h3>
      <input type="hidden" id="editId" value="">

      <div class="form-row">
        <div class="form-group">
          <label>Club</label>
          <div class="club-picker">
            <div class="club-picker__wrap">
              <img class="club-picker__crest" id="pickerCrest"
                src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png"
                alt=""
                onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
              <input class="club-picker__input" id="clubInput" type="text"
                placeholder="Search or type club name…" autocomplete="off"
                oninput="onClubInput(this.value)"
                onblur="setTimeout(closeDropdown, 150)">
            </div>
            <div class="club-picker__dropdown" id="clubDropdown"></div>
          </div>
        </div>
        <div class="form-group">
          <label>Rule breached</label>
          <input type="text" id="ruleInput" placeholder="e.g. Non-compliance with League Financial Regulations">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Start date</label>
          <input type="date" id="startInput">
        </div>
        <div class="form-group">
          <label>End date (leave blank if unresolved)</label>
          <input type="date" id="endInput">
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn--primary" onclick="saveRecord()">Save</button>
        <button class="btn btn--ghost" onclick="closeForm()">Cancel</button>
      </div>
    </div>

    <!-- Records table -->
    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Club</th>
            <th>Rule</th>
            <th>Start</th>
            <th>End</th>
            <th>Status</th>
            <th id="colActions" style="display:none;">Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" class="empty-state"><div class="empty-state__icon">⚖️</div><div class="empty-state__msg">Loading records…</div></td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- Delete confirmation modal — uses shared .modal-backdrop pattern -->
<div class="modal-backdrop" id="deleteModal">
  <div class="modal">
    <div class="modal__head">
      <h3>Delete record</h3>
      <button class="modal__close" onclick="closeDeleteModal()">×</button>
    </div>
    <div class="modal__body">
      <p class="confirm-text">Are you sure you want to delete this record?</p>
      <p class="confirm-job" id="deleteMsg"></p>
    </div>
    <div class="modal__footer">
      <button class="btn btn--ghost" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn--danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
/* ── State ── */
var STATE = {
  uid: null,
  isAdmin: false,
  clubs: [],
  records: [],
  deleteId: null
};

var CREST_BASE     = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/';
var FALLBACK_CREST = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png';
var CLUBS_META_URL = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/data/clubs-meta.json';

/* ── Auth ready — called once access is confirmed ── */
window.nlAuthReady = function(session) {
  STATE.uid = session.uid;

  // Determine admin status from session (already loaded by auth guard)
  var role = session.role || '';
  var toolEntry = session.tools && session.tools[NL_TOOL_KEY];
  var toolAdmin = false;
  if (toolEntry && typeof toolEntry === 'object') {
    toolAdmin = !!toolEntry.admin;
  } else if (typeof toolEntry === 'string') {
    toolAdmin = (toolEntry === 'admin');
  }
  STATE.isAdmin = (role === 'superadmin' || role === 'admin' || toolAdmin);

  if (STATE.isAdmin) {
    document.getElementById('btnAdd').style.display = '';
    document.getElementById('colActions').style.display = '';
    document.getElementById('statsPanel').style.display = '';
  }

  loadClubs();
  listenForRecords();
};

/* ── Load clubs meta ── */
function loadClubs() {
  fetch(CLUBS_META_URL + '?cb=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      STATE.clubs = data.clubs || [];
    })
    .catch(function(err) {
      console.warn('Failed to load clubs-meta:', err);
    });
}

/* ── Listen for records (realtime) ── */
function listenForRecords() {
  var db = firebase.database();
  db.ref('app-data/ops-judgements/records').on('value', function(snap) {
    var val = snap.val();
    STATE.records = [];
    if (val && typeof val === 'object') {
      Object.keys(val).forEach(function(key) {
        var r = val[key];
        r.id = key;
        STATE.records.push(r);
      });
    }
    // Sort by start date descending (newest first)
    STATE.records.sort(function(a, b) {
      return (b.startDate || '').localeCompare(a.startDate || '');
    });
    renderTable();
    renderStats();
  });
}

/* ── Render table ── */
function renderTable() {
  var tbody = document.getElementById('tableBody');
  if (STATE.records.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="empty-state__icon">⚖️</div><div class="empty-state__msg">No records yet</div></td></tr>';
    return;
  }

  var today = new Date();
  today.setHours(0, 0, 0, 0);

  var html = STATE.records.map(function(r) {
    var status = getStatus(r, today);
    var pillClass = status === 'Active' ? 'pill--soon' : 'pill--live';

    var endDisplay = r.endDate
      ? fmtDate(r.endDate)
      : '<span style="color:var(--amber);font-weight:700;">Unresolved</span>';

    var actionsHtml = '';
    if (STATE.isAdmin) {
      actionsHtml = '<td><div class="actions">'
        + '<button class="btn btn--ghost btn--sm" onclick="editRecord(\'' + NL.escJ(r.id) + '\')">Edit</button>'
        + '<button class="btn btn--danger btn--sm" onclick="openDeleteModal(\'' + NL.escJ(r.id) + '\')">Delete</button>'
        + '</div></td>';
    }

    return '<tr>'
      + '<td style="font-weight:700;">' + NL.escHtml(r.club || '') + '</td>'
      + '<td>' + NL.escHtml(r.rule || '') + '</td>'
      + '<td style="white-space:nowrap;">' + fmtDate(r.startDate) + '</td>'
      + '<td style="white-space:nowrap;">' + endDisplay + '</td>'
      + '<td><span class="pill ' + pillClass + '">' + NL.escHtml(status) + '</span></td>'
      + actionsHtml
      + '</tr>';
  }).join('');

  tbody.innerHTML = html;
}

/* ── Status helper ── */
function getStatus(r, today) {
  if (!r.endDate) return 'Active';
  var end = NL.parseDate(r.endDate);
  return end && end >= today ? 'Active' : 'Resolved';
}

/* ── Render stats ── */
function renderStats() {
  if (!STATE.isAdmin) return;
  var today = new Date();
  today.setHours(0, 0, 0, 0);

  var active = 0;
  var clubSet = {};
  STATE.records.forEach(function(r) {
    if (getStatus(r, today) === 'Active') active++;
    if (r.club) clubSet[r.club] = true;
  });

  document.getElementById('statActive').textContent = active;
  document.getElementById('statTotal').textContent = STATE.records.length;
  document.getElementById('statClubs').textContent = Object.keys(clubSet).length;

  // Light up the Active Breaches card red when there are active records
  var activeCard = document.querySelector('.stat--active');
  if (activeCard) {
    if (active > 0) activeCard.classList.add('has-active');
    else            activeCard.classList.remove('has-active');
  }
}

/* ── Date formatter (ISO input → display) ── */
function fmtDate(str) {
  if (!str) return '—';
  var d = NL.parseDate(str);
  if (!d) return '—';
  var day = d.getDate();
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return day + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

/* ── Form open/close ── */
function openForm(id) {
  var panel = document.getElementById('formPanel');
  panel.classList.add('open');

  if (id) {
    // Edit mode
    var r = STATE.records.find(function(rec) { return rec.id === id; });
    if (!r) return;
    document.getElementById('formTitle').textContent = 'Edit record';
    document.getElementById('editId').value = id;
    document.getElementById('clubInput').value = r.club || '';
    document.getElementById('ruleInput').value = r.rule || '';
    document.getElementById('startInput').value = r.startDate || '';
    document.getElementById('endInput').value = r.endDate || '';
    updatePickerCrest(r.club ? (CREST_BASE + encodeURIComponent(r.club) + '.png') : '');
  } else {
    // Add mode
    document.getElementById('formTitle').textContent = 'Add new record';
    document.getElementById('editId').value = '';
    document.getElementById('clubInput').value = '';
    document.getElementById('ruleInput').value = '';
    document.getElementById('startInput').value = '';
    document.getElementById('endInput').value = '';
    updatePickerCrest('');
  }

  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeForm() {
  document.getElementById('formPanel').classList.remove('open');
  document.getElementById('editId').value = '';
}

/* ── Save record ── */
function saveRecord() {
  var club = document.getElementById('clubInput').value.trim();
  var rule = document.getElementById('ruleInput').value.trim();
  var startDate = document.getElementById('startInput').value;
  var endDate = document.getElementById('endInput').value;
  var editId = document.getElementById('editId').value;

  if (!club)      { NL.toast('Please select a club',           'error'); return; }
  if (!rule)      { NL.toast('Please enter the rule breached', 'error'); return; }
  if (!startDate) { NL.toast('Please enter a start date',      'error'); return; }

  var data = {
    club:      club,
    rule:      rule,
    startDate: startDate,
    endDate:   endDate || '',
    updatedAt: new Date().toISOString(),
    updatedBy: STATE.uid
  };

  NL.ensureAuth().then(function() {
    var db = firebase.database();
    var promise;

    if (editId) {
      promise = db.ref('app-data/ops-judgements/records/' + editId).update(data);
    } else {
      data.createdAt = new Date().toISOString();
      data.createdBy = STATE.uid;
      promise = db.ref('app-data/ops-judgements/records').push(data);
    }

    return promise;
  }).then(function() {
    NL.toast(editId ? 'Record updated' : 'Record added', 'success');
    if (NL.writeAudit) {
      NL.writeAudit(editId ? 'judgement_updated' : 'judgement_added',
                    club + ' — ' + rule);
    }
    closeForm();
  }).catch(function(err) {
    NL.toast('Error: ' + err.message, 'error');
  });
}

/* ── Edit record ── */
function editRecord(id) { openForm(id); }

/* ── Delete modal ── */
function openDeleteModal(id) {
  STATE.deleteId = id;
  var r = STATE.records.find(function(rec) { return rec.id === id; });
  document.getElementById('deleteMsg').textContent = r ? (r.club + ' — ' + (r.rule || '')) : '';
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('open');
  STATE.deleteId = null;
}

function confirmDelete() {
  if (!STATE.deleteId) return;
  var id = STATE.deleteId;
  var r = STATE.records.find(function(rec) { return rec.id === id; });
  var label = r ? (r.club + ' — ' + (r.rule || '')) : id;

  NL.ensureAuth().then(function() {
    return firebase.database().ref('app-data/ops-judgements/records/' + id).remove();
  }).then(function() {
    NL.toast('Record deleted', 'success');
    if (NL.writeAudit) NL.writeAudit('judgement_deleted', label);
    closeDeleteModal();
  }).catch(function(err) {
    NL.toast('Error: ' + err.message, 'error');
    closeDeleteModal();
  });
}

/* ── Club picker ── */
function onClubInput(val) {
  var dd = document.getElementById('clubDropdown');
  if (!val.trim()) { dd.classList.remove('open'); updatePickerCrest(''); return; }
  var lower = val.toLowerCase();
  var matches = STATE.clubs.filter(function(c) {
    return c.name.toLowerCase().indexOf(lower) !== -1
        || (c.short && c.short.toLowerCase().indexOf(lower) !== -1);
  }).slice(0, 10);
  var html = matches.map(function(c) {
    var cr = CREST_BASE + encodeURIComponent(c.name) + '.png';
    return '<div class="club-picker__option" onmousedown="selectClub(\'' + NL.escJ(c.name) + '\',\'' + NL.escJ(cr) + '\')">'
      + '<img src="' + NL.escHtml(cr) + '" onerror="this.onerror=null;this.src=\'' + FALLBACK_CREST + '\'">'
      + '<span class="club-picker__option-name">' + NL.escHtml(c.name) + '</span>'
      + '<span class="club-picker__option-div">' + NL.escHtml(c.division || '') + '</span>'
      + '</div>';
  }).join('');
  html += '<div class="club-picker__freetext" onmousedown="selectClub(\'' + NL.escJ(val) + '\',\'\')">Use "' + NL.escHtml(val) + '" as entered</div>';
  dd.innerHTML = html;
  dd.classList.add('open');
}

function selectClub(name, cr) {
  document.getElementById('clubInput').value = name;
  updatePickerCrest(cr || (CREST_BASE + encodeURIComponent(name) + '.png'));
  closeDropdown();
}

function updatePickerCrest(url) {
  var img = document.getElementById('pickerCrest');
  img.onerror = function() { this.onerror = null; this.src = FALLBACK_CREST; };
  img.src = url || FALLBACK_CREST;
}

function closeDropdown() { document.getElementById('clubDropdown').classList.remove('open'); }
</script>

</body>
</html>
