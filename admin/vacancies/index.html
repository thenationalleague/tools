<!DOCTYPE html>
<html lang="en">
<head>
<!--
  National League Jobs Board — Admin Interface
  Version: 1.8
  Date: 26/03/2026

  CHANGELOG
  v1.8 (26/03/2026)
    - Logo: "National League logo white.png" on red backgrounds
    - Split colour title: "Vacancies" red, "Admin" dimmed — both login and topbar
    - White font enforced on all coloured backgrounds (topbar, modal heads, table headers)
    - Navy border-bottom on topbar (~10% of header height = 7px)
    - All UI scaled up ~25%: body 17px, login box larger, topbar 72px, table 15px
    - Stat numbers larger (44px), table padding increased

  v1.7 (26/03/2026)
    - Fixed "No time" checkbox not being clickable — was inheriting
      form input CSS styles, now explicitly reset with appearance:checkbox

  v1.5 (26/03/2026)
    - Password rejection now instant for cached wrong passwords (no API round-trip)
    - "No specific time" checkbox — removes time picker, stores 23:59 (end of day)
    - Closing dates with 23:59 time auto-detect and show checkbox ticked on edit
    - Position renamed to Department throughout (form, data, sheet column)
    - NL brand colours and carbona-variable font throughout

  v1.4 (26/03/2026)
    - NL site theming: carbona-variable font, NL colour palette throughout
    - Login: wrong password error now shows correctly
    - Login: spinner/loading state shown while authenticating
    - Closing date: replaced freetext with date + time inputs — no bad format possible
      Outputs DD/MM/YYYY HH:MM to sheet; populates correctly from existing dates on edit
    - Fixed Unauthorised on edit/delete: password now also sent as URL param on POST
    - Crest URLs use full club name (e.g. "Scunthorpe United.png")

  v1.3 (26/03/2026)
    - Fetch simplified to match transfer centre pattern

  v1.2 (26/03/2026)
    - Various fetch fixes

  v1.1 (26/03/2026)
    - API URL baked in

  v1.0 (26/03/2026)
    - Initial build
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacancies Admin</title>
<style>
@font-face {
  font-family:"carbona-variable";
  src:url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/l?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff2"),
      url("https://use.typekit.net/af/184cf2/0000000000000000774c3175/31/d?primer=7cdcb44be4a7db8877ffa5c0007b8dd865b3bbc383831fe2ea177f62257a9191&fvd=n4&v=3") format("woff");
  font-display:swap;font-style:normal;font-weight:200 900;font-stretch:normal;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary:     #9e0000;   /* NL red — topbar border, active states, CTAs */
  --primary-dim: #7a0000;   /* Red hover */
  --navy:        #223b7c;   /* NL navy — topbar bg, table headers, primary buttons */
  --navy-mid:    #1a2f63;
  --navy-light:  #2a4a8c;
  --red:         #c0392b;   /* Error/danger (distinct from brand red) */
  --red-light:   #fdf0ef;
  --green:       #1e7e34;
  --green-light: #edf7ee;
  --amber:       #e67e22;
  --amber-light: #fef6ec;
  --white:       #ffffff;
  --off-white:   #f4f6f9;
  --text:        #1a2a44;
  --text-muted:  #5a6a82;
  --border:      #dde3ed;
  --radius:      6px;
  --shadow:      0 2px 12px rgba(10,22,40,0.10);
  --font:        'carbona-variable','carbona',sans-serif;
}

body {
  font-family: var(--font);
  background: var(--off-white);
  color: var(--text);
  font-size: 17px;
  line-height: 1.5;
  min-height: 100vh;
  font-variation-settings: 'wght' 400;
}

/* ── Login ── */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--primary);
}
.login-box {
  background: var(--white);
  border-radius: 12px;
  padding: 52px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  text-align: center;
}
.login-box img { width: 90px; margin-bottom: 24px; }
.login-box h1 {
  font-size: 28px; font-weight: 900; font-variation-settings: 'wght' 900;
  text-transform: uppercase; letter-spacing: -0.01em; margin-bottom: 5px;
}
.login-box h1 .word-vacancies { color: var(--primary); }
.login-box h1 .word-admin     { color: var(--navy); }
.login-box p {
  font-size: 12px; color: var(--text-muted); margin-bottom: 32px;
  text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; font-variation-settings: 'wght' 700;
}
.login-error {
  background: var(--red-light); color: var(--red); border: 1px solid #f5c6c2;
  border-radius: var(--radius); padding: 11px 16px; font-size: 17px;
  font-weight: 600; font-variation-settings: 'wght' 600;
  margin-bottom: 18px; display: none; text-align: left;
}
.login-loading {
  display: none; align-items: center; justify-content: center; gap: 10px;
  padding: 16px 0; font-size: 13px; color: var(--text-muted);
  font-weight: 700; font-variation-settings: 'wght' 700;
  text-transform: uppercase; letter-spacing: 0.1em;
}
.login-loading.show { display: flex; }
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── App shell ── */
.app { display: none; }
.app.visible { display: block; }

.topbar {
  background: var(--primary); color: var(--white); padding: 0 28px; height: 72px;
  display: flex; align-items: center; gap: 18px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  border-bottom: 7px solid var(--navy);
}
.topbar img { height: 42px; }
.topbar__title {
  font-weight: 900; font-variation-settings: 'wght' 900; font-size: 20px;
  flex: 1; text-transform: uppercase; letter-spacing: 0.04em; color: var(--white);
}
.topbar__title .word-vacancies { color: var(--white); }
.topbar__title .word-admin     { color: rgba(255,255,255,0.55); }
.topbar__logout {
  background: none; border: 1px solid rgba(255,255,255,0.3); color: var(--white);
  padding: 8px 18px; border-radius: var(--radius); font-size: 12px;
  font-weight: 700; font-variation-settings: 'wght' 700; text-transform: uppercase;
  letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; font-family: var(--font);
}
.topbar__logout:hover { background: rgba(255,255,255,0.12); }

.main { max-width: 1200px; margin: 0 auto; padding: 32px 20px 70px; }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
@media (max-width: 600px) { .stats { grid-template-columns: repeat(2,1fr); } }
.stat {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 16px; text-align: center; box-shadow: var(--shadow);
}
.stat__num { font-size: 36px; font-weight: 900; font-variation-settings: 'wght' 900; line-height: 1; margin-bottom: 6px; }
.stat__label { font-size: 10px; color: var(--text-muted); font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.1em; }
.stat--live    .stat__num { color: var(--green); }
.stat--soon    .stat__num { color: var(--amber); }
.stat--expired .stat__num { color: var(--red); }
.stat--deleted .stat__num { color: var(--text-muted); }

/* ── Section head ── */
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
.section-head h2 { font-size: 13px; font-weight: 900; font-variation-settings: 'wght' 900; color: var(--navy); text-transform: uppercase; letter-spacing: 0.1em; }

/* ── Tabs ── */
.tabs { display: flex; gap: 4px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 3px; margin-bottom: 16px; }
.tab {
  flex: 1; text-align: center; padding: 8px 12px; border-radius: 4px;
  font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800;
  cursor: pointer; color: var(--text-muted); border: none; background: none;
  transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font);
}
.tab.active { background: var(--primary); color: var(--white); }

/* ── Job table ── */
.job-table-wrap { overflow-x: auto; }
.job-table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); font-size: 15px; }
.job-table th { background: var(--navy); color: var(--white); font-weight: 800; font-variation-settings: 'wght' 800; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; padding: 14px 16px; text-align: left; white-space: nowrap; }
.job-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.job-table tr:last-child td { border-bottom: none; }
.job-table tr:hover td { background: var(--off-white); }
.job-table tr.is-deleted td { opacity: 0.45; }
.job-crest { width: 40px; height: 40px; object-fit: contain; display: block; }

.pill { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 800; font-variation-settings: 'wght' 800; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.06em; }
.pill--live    { background: var(--green-light); color: var(--green); }
.pill--soon    { background: var(--amber-light); color: var(--amber); }
.pill--expired { background: var(--red-light);   color: var(--red); }
.pill--deleted { background: var(--off-white);   color: var(--text-muted); border: 1px solid var(--border); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px;
  border-radius: var(--radius); font-size: 11px; font-weight: 900; font-variation-settings: 'wght' 900;
  cursor: pointer; border: none; transition: all 0.15s; text-decoration: none;
  white-space: nowrap; text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font);
}
.btn--primary  { background: var(--navy); color: var(--white); }
.btn--primary:hover { background: var(--navy-light); }
.btn--accent   { background: var(--primary); color: var(--white); }
.btn--accent:hover { background: var(--primary-dim); color: var(--white); }
.btn--ghost    { background: var(--white); color: var(--text); border: 1px solid var(--border); }
.btn--ghost:hover { background: var(--off-white); }
.btn--danger   { background: var(--red-light); color: var(--red); border: 1px solid #f5c6c2; }
.btn--danger:hover { background: #fbe4e2; }
.btn--restore  { background: var(--green-light); color: var(--green); border: 1px solid #b8e6c0; }
.btn--restore:hover { background: #d8f0dc; }
.btn--sm { padding: 5px 10px; font-size: 10px; }

/* ── Modal ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(10,22,40,0.65); z-index: 200; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; display: none; }
.modal-backdrop.open { display: flex; }
.modal { background: var(--white); border-radius: 10px; width: 100%; max-width: 640px; box-shadow: 0 16px 60px rgba(0,0,0,0.3); overflow: hidden; margin: auto; }
.modal__head { background: var(--primary); color: var(--white); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 7px solid var(--navy); }
.modal__head h3 { color: var(--white); font-size: 15px; font-weight: 900; font-variation-settings: 'wght' 900; text-transform: uppercase; letter-spacing: 0.1em; }
.modal__close { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 28px; cursor: pointer; line-height: 1; padding: 2px 6px; font-family: var(--font); }
.modal__close:hover { color: var(--white); }
.modal__body { padding: 24px; }
.modal__footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--off-white); }

/* ── Form ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.span2 { grid-column: 1 / -1; }
.form-group label { font-size: 10px; font-weight: 900; font-variation-settings: 'wght' 900; color: var(--navy); text-transform: uppercase; letter-spacing: 0.1em; }
.form-group input,
.form-group select,
.form-group textarea {
  padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 13px; font-family: var(--font); font-variation-settings: 'wght' 400;
  color: var(--text); background: var(--white); transition: border-color 0.15s; -webkit-appearance: none;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(200,168,75,0.15); }
.form-group textarea { resize: vertical; min-height: 100px; }
.form-hint { font-size: 11px; color: var(--text-muted); }

.datetime-row { display: flex; gap: 8px; }
.datetime-row input[type="date"] { flex: 1; }
.datetime-row input[type="time"] { flex: 0 0 120px; }
input[type="checkbox"] {
  width: 16px !important; height: 16px !important;
  padding: 0 !important; border: 1px solid var(--border) !important;
  border-radius: 3px !important; box-shadow: none !important;
  cursor: pointer; flex-shrink: 0; accent-color: var(--primary);
  -webkit-appearance: checkbox; appearance: checkbox;
}

/* ── Club picker ── */
.club-picker { position: relative; }
.club-picker__input-wrap { display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; background: var(--white); transition: border-color 0.15s; }
.club-picker__input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(200,168,75,0.15); }
.club-picker__crest { width: 30px; height: 30px; object-fit: contain; flex-shrink: 0; }
.club-picker__input { flex: 1; border: none !important; padding: 0 !important; font-size: 13px; outline: none; background: transparent; font-family: var(--font); font-variation-settings: 'wght' 400; box-shadow: none !important; }
.club-picker__dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); z-index: 50; max-height: 220px; overflow-y: auto; display: none; margin-top: 2px; }
.club-picker__dropdown.open { display: block; }
.club-picker__option { display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); }
.club-picker__option:last-child { border-bottom: none; }
.club-picker__option:hover { background: var(--off-white); }
.club-picker__option img { width: 26px; height: 26px; object-fit: contain; }
.club-picker__option-name { flex: 1; font-weight: 600; font-variation-settings: 'wght' 600; }
.club-picker__option-division { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.club-picker__freetext { padding: 9px 12px; font-size: 12px; color: var(--text-muted); font-style: italic; cursor: pointer; border-top: 1px solid var(--border); background: var(--off-white); }
.club-picker__freetext:hover { background: #eaeef4; }

/* ── Toast ── */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: var(--white); padding: 12px 18px; border-radius: var(--radius); font-size: 11px; font-weight: 800; font-variation-settings: 'wght' 800; text-transform: uppercase; letter-spacing: 0.08em; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.25s ease; max-width: 300px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 4px solid #4caf50; }
.toast.error   { border-left: 4px solid var(--red); }

.loading-row td, .empty-row td { text-align: center; padding: 48px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; font-variation-settings: 'wght' 700; }
.confirm-text { font-size: 17px; line-height: 1.6; color: var(--text); }
.confirm-job  { font-weight: 800; font-variation-settings: 'wght' 800; color: var(--navy); margin-top: 8px; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <img src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20logo%20white.png" alt="NL" onerror="this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
    <h1><span style="color:var(--primary)">Vacancies</span> <span style="color:var(--navy)">Admin</span></h1>
    <p>National League</p>
    <div class="login-error" id="loginError">Incorrect password — please try again.</div>
    <div class="login-loading" id="loginLoading"><div class="spinner"></div>Signing in…</div>
    <div id="loginForm">
      <div class="form-group" style="text-align:left;margin-bottom:14px;">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn--accent" style="width:100%;justify-content:center;padding:12px;" onclick="doLogin()">Sign In</button>
    </div>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="topbar">
    <img src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20logo%20white.png" alt="NL" onerror="this.src='https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png'">
    <span class="topbar__title"><span style="color:var(--white)">Vacancies</span> <span style="color:rgba(255,255,255,0.55)">Admin</span></span>
    <button class="topbar__logout" onclick="doLogout()">Sign out</button>
  </div>
  <div class="main">
    <div class="stats">
      <div class="stat stat--live"><div class="stat__num" id="statLive">—</div><div class="stat__label">Live</div></div>
      <div class="stat stat--soon"><div class="stat__num" id="statSoon">—</div><div class="stat__label">Closing Soon</div></div>
      <div class="stat stat--expired"><div class="stat__num" id="statExpired">—</div><div class="stat__label">Expired</div></div>
      <div class="stat stat--deleted"><div class="stat__num" id="statDeleted">—</div><div class="stat__label">Deleted</div></div>
    </div>
    <div class="section-head">
      <h2>Vacancies</h2>
      <button class="btn btn--accent" onclick="openAddModal()">+ Add Vacancy</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabLive"    onclick="switchTab('live')">Live</button>
      <button class="tab"        id="tabExpired" onclick="switchTab('expired')">Expired</button>
      <button class="tab"        id="tabDeleted" onclick="switchTab('deleted')">Deleted</button>
    </div>
    <div class="job-table-wrap">
      <table class="job-table">
        <thead><tr>
          <th style="width:40px"></th><th>Club</th><th>Role</th><th>Type</th>
          <th>Closing</th><th>Status</th><th style="width:150px"></th>
        </tr></thead>
        <tbody id="jobTableBody">
          <tr class="loading-row"><td colspan="7">Loading vacancies…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop" id="formModal">
  <div class="modal">
    <div class="modal__head">
      <h3 id="modalTitle">Add Vacancy</h3>
      <button class="modal__close" onclick="closeModal('formModal')">×</button>
    </div>
    <div class="modal__body">
      <div class="form-grid">
        <div class="form-group span2">
          <label>Club *</label>
          <div class="club-picker">
            <div class="club-picker__input-wrap">
              <img class="club-picker__crest" id="pickerCrest" src="https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png" alt="">
              <input class="club-picker__input" id="clubInput" type="text" placeholder="Search or type club name…" autocomplete="off" oninput="onClubInput(this.value)" onblur="setTimeout(closeClubDropdown,150)">
            </div>
            <div class="club-picker__dropdown" id="clubDropdown"></div>
          </div>
        </div>
        <div class="form-group span2">
          <label>Job Title *</label>
          <input type="text" id="fJobTitle" placeholder="e.g. Academy Analyst">
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="fLocation" placeholder="e.g. Aldershot">
        </div>
        <div class="form-group">
          <label>Vacancy Type</label>
          <select id="fVacancyType">
            <option value="">— Select —</option>
            <option>Permanent</option><option>Fixed Term</option><option>Contract</option>
            <option>Casual</option><option>Part Time</option><option>Voluntary</option>
          </select>
        </div>
        <div class="form-group">
          <label>Department</label>
          <input type="text" id="fPosition" placeholder="e.g. Academy Coaching">
        </div>
        <div class="form-group">
          <label>Salary</label>
          <input type="text" id="fSalary" placeholder="e.g. £26,000 per year">
        </div>
        <div class="form-group span2">
          <label>Description</label>
          <textarea id="fDescription" placeholder="Full job description…"></textarea>
        </div>
        <div class="form-group">
          <label>Apply URL</label>
          <input type="url" id="fApplyUrl" placeholder="https://…">
        </div>
        <div class="form-group">
          <label>More Info URL</label>
          <input type="url" id="fMoreUrl" placeholder="https://…">
        </div>
        <div class="form-group span2">
          <label>Closing Date &amp; Time</label>
          <div class="datetime-row">
            <input type="date" id="fClosingDate" oninput="onClosingDateChange()">
            <input type="time" id="fClosingTime" value="17:00">
          </div>
          <label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:12px;font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;">
            <input type="checkbox" id="fNoTime" onchange="onNoTimeToggle(this.checked)" style="width:auto;padding:0;border:none;box-shadow:none;">
            No specific time — expires end of closing day
          </label>
          <span class="form-hint">Leave date blank for no closing date</span>
        </div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--ghost" onclick="closeModal('formModal')">Cancel</button>
      <button class="btn btn--accent" id="saveBtn" onclick="saveJob()">Save Vacancy</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal" style="max-width:440px;">
    <div class="modal__head">
      <h3 id="confirmTitle">Confirm</h3>
      <button class="modal__close" onclick="closeModal('confirmModal')">×</button>
    </div>
    <div class="modal__body">
      <p class="confirm-text" id="confirmText"></p>
      <p class="confirm-job"  id="confirmJob"></p>
    </div>
    <div class="modal__footer">
      <button class="btn btn--ghost" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn btn--danger" id="confirmBtn" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API_URL        = 'https://script.google.com/macros/s/AKfycbz3aXu7-7Gp8_Sn33_ILnwTqV7vezItcZrJIV6cylJJ8SQbN7J1XooH75R8qfyVDWhW/exec';
var FALLBACK_CREST = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/National%20League%20rose.png';
var CREST_BASE     = 'https://raw.githubusercontent.com/thenationalleague/tools/refs/heads/main/assets/crests/';

var STATE = {
  password:'', clubs:[], allJobs:[], currentTab:'live',
  editRowIndex:null, pendingAction:null, pendingRowIndex:null, pendingJobTitle:null,
};

/* ── Login ── */
// We store a hashed version of the correct password after first successful login
// so subsequent wrong passwords fail instantly without an API round-trip.
var _pwHash = null;

function simpleHash(s) {
  var h = 0;
  for (var i = 0; i < s.length; i++) { h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; }
  return h;
}

function doLogin() {
  var pass = document.getElementById('passwordInput').value.trim();
  if (!pass) return;

  // If we've cached the hash from a previous login, check instantly
  if (_pwHash !== null && simpleHash(pass) !== _pwHash) {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
    return;
  }

  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginForm').style.display  = 'none';
  document.getElementById('loginLoading').classList.add('show');

  apiFetch('?action=all&password=' + encodeURIComponent(pass))
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      STATE.password = pass;
      _pwHash = simpleHash(pass); // cache for instant future checks
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      loadClubs();
      processAllJobs(data.jobs || []);
    })
    .catch(function() {
      document.getElementById('loginLoading').classList.remove('show');
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    });
}

function doLogout() {
  STATE.password = ''; STATE.allJobs = [];
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('loginLoading').classList.remove('show');
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('passwordInput').value = '';
}

/* ── Data ── */
function loadClubs() {
  apiFetch('?action=clubs')
    .then(function(d) { STATE.clubs = d.clubs || []; })
    .catch(function() { STATE.clubs = []; });
}

function refreshJobs() {
  document.getElementById('jobTableBody').innerHTML = '<tr class="loading-row"><td colspan="7">Loading…</td></tr>';
  apiFetch('?action=all&password=' + encodeURIComponent(STATE.password))
    .then(function(d) { if (d.error) throw new Error(d.error); processAllJobs(d.jobs||[]); })
    .catch(function(e) { showToast(e.message,'error'); });
}

function processAllJobs(jobs) { STATE.allJobs = jobs; updateStats(jobs); renderTable(); }

function updateStats(jobs) {
  var now=new Date(), soon=new Date(now.getTime()+7*86400000);
  var live=0,soonC=0,expired=0,deleted=0;
  jobs.forEach(function(j) {
    if (j.deleted) { deleted++; return; }
    var d = j.closingDate ? new Date(j.closingDate) : null;
    if (d && d<now) { expired++; return; }
    if (d && d<=soon) soonC++;
    live++;
  });
  document.getElementById('statLive').textContent    = live;
  document.getElementById('statSoon').textContent    = soonC;
  document.getElementById('statExpired').textContent = expired;
  document.getElementById('statDeleted').textContent = deleted;
}

/* ── Table ── */
function switchTab(tab) {
  STATE.currentTab = tab;
  ['live','expired','deleted'].forEach(function(t) {
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===tab);
  });
  renderTable();
}

function renderTable() {
  var now=new Date(), tbody=document.getElementById('jobTableBody');
  var filtered = STATE.allJobs.filter(function(j) {
    var d = j.closingDate ? new Date(j.closingDate) : null;
    if (STATE.currentTab==='deleted') return j.deleted;
    if (j.deleted) return false;
    return STATE.currentTab==='expired' ? (d&&d<now) : !(d&&d<now);
  });
  if (!filtered.length) { tbody.innerHTML='<tr class="empty-row"><td colspan="7">No vacancies in this category.</td></tr>'; return; }
  var soon=new Date(now.getTime()+7*86400000);
  tbody.innerHTML = filtered.map(function(j) {
    var d=j.closingDate?new Date(j.closingDate):null;
    var status,pillCls;
    if (j.deleted)           { status='Deleted';      pillCls='deleted'; }
    else if (d&&d<now)       { status='Expired';      pillCls='expired'; }
    else if (d&&d<=soon)     { status='Closing Soon'; pillCls='soon'; }
    else                     { status='Live';         pillCls='live'; }
    var crest = j.crestUrl||FALLBACK_CREST;
    var closing = d ? fmtDT(d) : '—';
    var btns = j.deleted
      ? '<button class="btn btn--restore btn--sm" onclick="confirmRestore('+j.rowIndex+',\''+escJ(j.jobTitle)+'\')">Restore</button>'
      : '<button class="btn btn--ghost btn--sm" onclick="openEditModal('+j.rowIndex+')">Edit</button> '
        +'<button class="btn btn--danger btn--sm" onclick="confirmDelete('+j.rowIndex+',\''+escJ(j.jobTitle)+'\')">Delete</button>';
    return '<tr class="'+(j.deleted?'is-deleted':'')+'">'
      +'<td><img class="job-crest" src="'+esc(crest)+'" alt="" onerror="this.src=\''+FALLBACK_CREST+'\'"></td>'
      +'<td><strong style="font-variation-settings:\'wght\' 700">'+esc(j.club)+'</strong></td>'
      +'<td>'+esc(j.jobTitle)+'</td>'
      +'<td>'+esc(j.vacancyType||'—')+'</td>'
      +'<td style="white-space:nowrap;font-size:12px;">'+closing+'</td>'
      +'<td><span class="pill pill--'+pillCls+'">'+status+'</span></td>'
      +'<td style="white-space:nowrap;">'+btns+'</td>'
      +'</tr>';
  }).join('');
}

/* ── Club picker ── */
function onClubInput(val) {
  var dd=document.getElementById('clubDropdown');
  if (!val.trim()) { dd.classList.remove('open'); updatePickerCrest(''); return; }
  var lower=val.toLowerCase();
  var matches=STATE.clubs.filter(function(c){
    return c.name.toLowerCase().indexOf(lower)!==-1||(c.short&&c.short.toLowerCase().indexOf(lower)!==-1);
  }).slice(0,10);
  var html=matches.map(function(c){
    var cr=CREST_BASE+encodeURIComponent(c.name)+'.png';
    return '<div class="club-picker__option" onmousedown="selectClub(\''+escJ(c.name)+'\',\''+escJ(cr)+'\')">'
      +'<img src="'+esc(cr)+'" onerror="this.src=\''+FALLBACK_CREST+'\'">'
      +'<span class="club-picker__option-name">'+esc(c.name)+'</span>'
      +'<span class="club-picker__option-division">'+esc(c.division||'')+'</span>'
      +'</div>';
  }).join('');
  html+='<div class="club-picker__freetext" onmousedown="selectClub(\''+escJ(val)+'\',\'\')">Use "'+esc(val)+'" as entered</div>';
  dd.innerHTML=html; dd.classList.add('open');
}
function selectClub(name,cr) { document.getElementById('clubInput').value=name; updatePickerCrest(cr||(CREST_BASE+encodeURIComponent(name)+'.png')); closeClubDropdown(); }
function updatePickerCrest(url) { var img=document.getElementById('pickerCrest'); img.src=url||FALLBACK_CREST; img.onerror=function(){this.src=FALLBACK_CREST;}; }
function closeClubDropdown() { document.getElementById('clubDropdown').classList.remove('open'); }

/* ── Date helpers ── */
function fmtDT(d) {
  var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function onNoTimeToggle(checked) {
  document.getElementById('fClosingTime').disabled = checked;
  document.getElementById('fClosingTime').style.opacity = checked ? '0.35' : '1';
}

function onClosingDateChange() {
  // If no time was previously set, keep no-time checked
}

// Returns DD/MM/YYYY HH:MM — if "no time" ticked, uses 23:59 (end of day)
function buildClosingDateString() {
  var dv=document.getElementById('fClosingDate').value;
  if (!dv) return '';
  var noTime = document.getElementById('fNoTime').checked;
  var tv = noTime ? '23:59' : (document.getElementById('fClosingTime').value || '23:59');
  var p=dv.split('-');
  return p[2]+'/'+p[1]+'/'+p[0]+' '+tv;
}

function setClosingDateFields(str) {
  var di=document.getElementById('fClosingDate'), ti=document.getElementById('fClosingTime'), ni=document.getElementById('fNoTime');
  if (!str) { di.value=''; ti.value='17:00'; ni.checked=false; onNoTimeToggle(false); return; }
  var d=new Date(str);
  if (isNaN(d.getTime())) { di.value=''; ti.value='17:00'; ni.checked=false; onNoTimeToggle(false); return; }
  di.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var isEndOfDay = d.getHours()===23 && d.getMinutes()===59;
  if (isEndOfDay) {
    ni.checked=true; onNoTimeToggle(true);
  } else {
    ni.checked=false; onNoTimeToggle(false);
    ti.value=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
}

/* ── Modals: Add/Edit ── */
function openAddModal() {
  STATE.editRowIndex=null;
  document.getElementById('modalTitle').textContent='Add Vacancy';
  document.getElementById('saveBtn').textContent='Save Vacancy';
  clearForm(); openModal('formModal');
}
function openEditModal(rowIndex) {
  var job=STATE.allJobs.find(function(j){return j.rowIndex===rowIndex;});
  if (!job) return;
  STATE.editRowIndex=rowIndex;
  document.getElementById('modalTitle').textContent='Edit Vacancy';
  document.getElementById('saveBtn').textContent='Update Vacancy';
  populateForm(job); openModal('formModal');
}
function clearForm() {
  ['fJobTitle','fLocation','fSalary','fPosition','fDescription','fApplyUrl','fMoreUrl'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('fVacancyType').value='';
  document.getElementById('clubInput').value='';
  document.getElementById('fClosingDate').value='';
  document.getElementById('fClosingTime').value='17:00';
  document.getElementById('fNoTime').checked=false;
  onNoTimeToggle(false);
  updatePickerCrest('');
}
function populateForm(job) {
  document.getElementById('clubInput').value    = job.club||'';
  document.getElementById('fJobTitle').value    = job.jobTitle||'';
  document.getElementById('fLocation').value    = job.location||'';
  document.getElementById('fVacancyType').value = job.vacancyType||'';
  document.getElementById('fPosition').value    = job.position||'';
  document.getElementById('fSalary').value      = job.salary||'';
  document.getElementById('fDescription').value = job.description||'';
  document.getElementById('fApplyUrl').value    = job.applyUrl||'';
  document.getElementById('fMoreUrl').value     = job.moreUrl||'';
  setClosingDateFields(job.closingDate||'');
  updatePickerCrest(job.crestUrl||(CREST_BASE+encodeURIComponent(job.club||'')+'.png'));
}
function saveJob() {
  var club=document.getElementById('clubInput').value.trim();
  var title=document.getElementById('fJobTitle').value.trim();
  if (!club)  { showToast('Club name is required.','error'); return; }
  if (!title) { showToast('Job title is required.','error'); return; }
  var data = {
    'Club':club,'Job Title':title,
    'Location':document.getElementById('fLocation').value.trim(),
    'Vacancy Type':document.getElementById('fVacancyType').value,
    'Department':document.getElementById('fPosition').value.trim(),
    'Salary':document.getElementById('fSalary').value.trim(),
    'Description':document.getElementById('fDescription').value.trim(),
    'Apply URL':document.getElementById('fApplyUrl').value.trim(),
    'More Info URL':document.getElementById('fMoreUrl').value.trim(),
    'Closing Date':buildClosingDateString(),
  };
  document.getElementById('saveBtn').textContent='Saving…';
  document.getElementById('saveBtn').disabled=true;
  var payload=STATE.editRowIndex
    ? {action:'update',password:STATE.password,rowIndex:STATE.editRowIndex,data:data}
    : {action:'add',   password:STATE.password,data:data};
  apiPost(payload)
    .then(function(res){
      if (res.error) throw new Error(res.error);
      closeModal('formModal');
      showToast(STATE.editRowIndex?'Vacancy updated.':'Vacancy added.','success');
      refreshJobs();
    })
    .catch(function(err){showToast(err.message,'error');})
    .finally(function(){
      document.getElementById('saveBtn').textContent=STATE.editRowIndex?'Update Vacancy':'Save Vacancy';
      document.getElementById('saveBtn').disabled=false;
    });
}

/* ── Confirm ── */
function confirmDelete(ri,title) {
  STATE.pendingAction='delete'; STATE.pendingRowIndex=ri; STATE.pendingJobTitle=title;
  document.getElementById('confirmTitle').textContent='Delete Vacancy';
  document.getElementById('confirmText').textContent='This vacancy will be hidden from the jobs board. You can restore it later.';
  document.getElementById('confirmJob').textContent=title;
  document.getElementById('confirmBtn').className='btn btn--danger';
  document.getElementById('confirmBtn').textContent='Delete';
  openModal('confirmModal');
}
function confirmRestore(ri,title) {
  STATE.pendingAction='restore'; STATE.pendingRowIndex=ri; STATE.pendingJobTitle=title;
  document.getElementById('confirmTitle').textContent='Restore Vacancy';
  document.getElementById('confirmText').textContent='This vacancy will be restored and visible on the jobs board.';
  document.getElementById('confirmJob').textContent=title;
  document.getElementById('confirmBtn').className='btn btn--restore';
  document.getElementById('confirmBtn').textContent='Restore';
  openModal('confirmModal');
}
function confirmAction() {
  var action=STATE.pendingAction, ri=STATE.pendingRowIndex;
  closeModal('confirmModal');
  apiPost({action:action,password:STATE.password,rowIndex:ri})
    .then(function(res){
      if (res.error) throw new Error(res.error);
      showToast(action==='delete'?'Vacancy deleted.':'Vacancy restored.','success');
      refreshJobs();
    })
    .catch(function(err){showToast(err.message,'error');});
}

/* ── API ── */
function apiFetch(query) {
  return fetch(API_URL+query+'&cb='+Date.now(),{cache:'no-store'}).then(function(r){return r.json();});
}
function apiPost(payload) {
  // Password in URL param AND body — GAS can be inconsistent about reading postData
  var url=API_URL+'?password='+encodeURIComponent(payload.password||'')+'&cb='+Date.now();
  return fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
    .then(function(r){return r.json();});
}

/* ── Modals ── */
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* ── Toast ── */
function showToast(msg,type) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(type||'');
  setTimeout(function(){t.classList.add('show');},10);
  setTimeout(function(){t.classList.remove('show');},3500);
}

/* ── Escape ── */
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJ(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>
