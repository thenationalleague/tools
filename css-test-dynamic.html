<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CSS Test — Dynamic</title>
<link rel="stylesheet" href="/tools/system/nl-brand.css?v=3">
</head>
<body>
<div class="main">
  <h1 style="margin-bottom:20px;">Dynamic render test</h1>
  
  <p>This test uses <strong>innerHTML</strong> to inject the stats block (same as vacancies does). If the static version (/tools/css-test.html) works but this one doesn't, the bug is timing-related to how CSS applies to dynamically-injected DOM.</p>
  
  <div id="mount" style="margin-top: 30px;"></div>
</div>

<script>
/* Wait for page to paint, then inject via innerHTML */
document.addEventListener('DOMContentLoaded', function() {
  var mount = document.getElementById('mount');
  mount.innerHTML = 
    '<div class="stats">' +
      '<div class="stat">' +
        '<div class="stat__num" style="color: var(--green);">7</div>' +
        '<div class="stat__label">Live</div>' +
      '</div>' +
      '<div class="stat">' +
        '<div class="stat__num" style="color: var(--amber);">0</div>' +
        '<div class="stat__label">Closing Soon</div>' +
      '</div>' +
      '<div class="stat">' +
        '<div class="stat__num" style="color: var(--red);">0</div>' +
        '<div class="stat__label">Expired</div>' +
      '</div>' +
      '<div class="stat">' +
        '<div class="stat__num">0</div>' +
        '<div class="stat__label">Deleted</div>' +
      '</div>' +
    '</div>';
});
</script>
</body>
</html>
